<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BOX RUSH</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body {
    height:100%; overflow:hidden;
    font-family:'Trebuchet MS','Apple SD Gothic Neo',sans-serif;
    color:#fff; -webkit-user-select:none; user-select:none; background:#1a1c22;
  }
  #stage { position:relative; width:100%; height:100%; display:flex; flex-direction:column;
    align-items:center; overflow:hidden; transition:background 0.6s ease; }

  #topbar { position:absolute; top:0; left:0; width:100%; padding:14px 16px;
    display:flex; justify-content:space-between; align-items:flex-start; z-index:10; }
  #logo { font-weight:bold; font-size:14px; letter-spacing:3px; opacity:0.5; }
  #topright { text-align:right; display:flex; flex-direction:column; gap:6px; align-items:flex-end; }
  #coinDisp { font-size:16px; font-weight:bold; color:#ffd54a; text-shadow:0 0 10px rgba(255,213,74,0.5); }
  #coinDisp .ic { margin-right:3px; }
  #best .lbl { font-size:9px; opacity:0.45; letter-spacing:2px; }
  #best .val { font-size:13px; font-weight:bold; }

  #center { position:relative; z-index:5; flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center; width:100%; padding-top:40px; }

  #rankName { font-size:38px; font-weight:800; letter-spacing:1px; margin-bottom:5px; text-align:center; transition:color 0.4s ease; }
  #rankStep { font-size:12px; opacity:0.55; letter-spacing:3px; margin-bottom:24px; }

  #boxWrap { position:relative; width:260px; height:210px; display:flex; align-items:center;
    justify-content:center; margin-bottom:14px; cursor:pointer; }
  #chestSvg { width:210px; height:190px; transition:transform 0.12s ease; overflow:visible; }
  #chestFloat { animation:float 3s ease-in-out infinite; transform-origin:center; }
  @keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }

  #odds { font-size:13px; letter-spacing:1px; margin-bottom:14px; opacity:0.78; }
  #odds b { font-size:19px; }
  #odds .luck { color:#7CFC9A; font-size:12px; }

  #chances { display:flex; gap:18px; margin-bottom:18px; align-items:center; }
  .arrow { position:relative; width:50px; height:50px; border-radius:50%; display:flex;
    align-items:center; justify-content:center; transition:all 0.25s ease; }
  .arrow svg { width:23px; height:23px; }
  .arrow.used { opacity:0.28; }
  .shadow { position:absolute; bottom:-10px; left:50%; width:30px; height:6px; margin-left:-15px;
    background:rgba(0,0,0,0.18); border-radius:50%; }

  #hint { font-size:19px; font-weight:800; height:26px; text-align:center; opacity:0.95; margin-bottom:14px; }

  #actions { display:flex; gap:12px; margin-bottom:10px; }
  .btn { padding:11px 22px; font-size:14px; font-weight:800; letter-spacing:1px; border:none;
    border-radius:12px; cursor:pointer; transition:all 0.1s ease; }
  #sellBtn { background:#ffd54a; color:#3a2e00; box-shadow:0 4px 0 #c9a51e; }
  #sellBtn:active { transform:translateY(3px); box-shadow:0 1px 0 #c9a51e; }
  #sellBtn:disabled { background:#444; color:#888; box-shadow:0 4px 0 #2a2a2a; cursor:default; opacity:0.6; }
  #shopBtn { background:#5a8dee; color:#fff; box-shadow:0 4px 0 #3a64b0; }
  #shopBtn:active { transform:translateY(3px); box-shadow:0 1px 0 #3a64b0; }

  #fx { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:8; }
  .particle { position:absolute; pointer-events:none; }
  #flash { position:absolute; top:0; left:0; width:100%; height:100%; background:#fff; opacity:0; pointer-events:none; z-index:9; }

  /* result */
  #result { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(10,10,16,0.94);
    z-index:20; display:none; flex-direction:column; align-items:center; justify-content:center; }
  #result.show { display:flex; animation:fadein 0.4s; }
  @keyframes fadein { from{opacity:0;} to{opacity:1;} }
  #boomTitle { font-size:44px; font-weight:800; letter-spacing:4px; color:#ff5252; text-shadow:0 0 30px #ff2222; margin-bottom:26px; }
  #reachedLabel { font-size:12px; opacity:0.5; letter-spacing:3px; margin-bottom:8px; }
  #reachedRank { font-size:32px; font-weight:800; margin-bottom:6px; }
  #reachedStep { font-size:12px; opacity:0.45; margin-bottom:14px; }
  #earned { font-size:15px; color:#ffd54a; letter-spacing:1px; margin-bottom:12px; }
  #newBest { font-size:14px; color:#ffd54a; letter-spacing:3px; margin-bottom:22px; text-shadow:0 0 14px #ffd54a; animation:pulse 0.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  #retryBtn { padding:15px 50px; font-size:18px; font-weight:800; letter-spacing:3px; border:none;
    border-radius:14px; background:#fff; color:#15151f; cursor:pointer; box-shadow:0 5px 0 rgba(255,255,255,0.35); transition:all 0.1s; }
  #retryBtn:active { transform:translateY(4px); box-shadow:0 1px 0 rgba(255,255,255,0.35); }

  /* shop */
  #shop { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(8,10,18,0.97);
    z-index:25; display:none; flex-direction:column; align-items:center; padding:24px 18px; overflow-y:auto; }
  #shop.show { display:flex; animation:fadein 0.3s; }
  #shopTitle { font-size:26px; font-weight:800; letter-spacing:3px; margin:30px 0 6px; }
  #shopCoin { font-size:15px; color:#ffd54a; margin-bottom:22px; font-weight:bold; }
  .shopItem { width:100%; max-width:420px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
    border-radius:14px; padding:14px 16px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; }
  .shopItem .info { flex:1; }
  .shopItem .nm { font-size:16px; font-weight:800; margin-bottom:3px; }
  .shopItem .ds { font-size:11px; opacity:0.6; line-height:1.4; }
  .shopItem .lv { font-size:11px; color:#7CFC9A; margin-top:3px; }
  .buyBtn { padding:10px 16px; font-size:13px; font-weight:800; border:none; border-radius:10px;
    background:#ffd54a; color:#3a2e00; cursor:pointer; box-shadow:0 3px 0 #c9a51e; white-space:nowrap; margin-left:10px; }
  .buyBtn:active { transform:translateY(2px); box-shadow:0 1px 0 #c9a51e; }
  .buyBtn:disabled { background:#444; color:#888; box-shadow:0 3px 0 #2a2a2a; opacity:0.55; cursor:default; }
  #ticketSection { width:100%; max-width:420px; margin-top:10px; }
  #ticketSection h3 { font-size:14px; letter-spacing:2px; opacity:0.6; margin:14px 0 10px; text-align:center; }
  #ticketList { display:flex; flex-direction:column; gap:8px; max-height:34vh; overflow-y:auto; padding-right:4px; }
  .ticket { display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.05);
    border-radius:10px; padding:10px 14px; }
  .ticket .tn { font-weight:800; font-size:14px; }
  .ticket .tbtn { padding:7px 14px; font-size:12px; font-weight:800; border:none; border-radius:8px;
    background:#5a8dee; color:#fff; cursor:pointer; box-shadow:0 3px 0 #3a64b0; }
  .ticket .tbtn:active { transform:translateY(2px); box-shadow:0 1px 0 #3a64b0; }
  .ticket .tbtn:disabled { background:#444; color:#888; box-shadow:0 3px 0 #2a2a2a; opacity:0.55; cursor:default; }
  #closeShop { margin-top:18px; padding:13px 40px; font-size:16px; font-weight:800; letter-spacing:2px;
    border:2px solid rgba(255,255,255,0.4); border-radius:12px; background:transparent; color:#fff; cursor:pointer; }
  #closeShop:active { background:rgba(255,255,255,0.1); }

  #toast { position:absolute; bottom:30px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8);
    padding:10px 20px; border-radius:20px; font-size:13px; font-weight:bold; z-index:40; opacity:0;
    transition:opacity 0.3s; pointer-events:none; }
  #toast.show { opacity:1; }

  #ending { position:absolute; top:0; left:0; width:100%; height:100%; z-index:30; display:none;
    align-items:center; justify-content:center; overflow:hidden;
    background:radial-gradient(circle at 50% 45%, #1a1030 0%, #000 75%); }
  #ending.show { display:flex; animation:fadein 0.8s; }
  #endInner { text-align:center; z-index:2; animation:endrise 1.2s ease; }
  @keyframes endrise { from{transform:translateY(30px);opacity:0;} to{transform:translateY(0);opacity:1;} }
  #endCrown { font-size:70px; margin-bottom:10px; animation:float 3s ease-in-out infinite; }
  #endTitle { font-size:52px; font-weight:800; letter-spacing:2px; margin-bottom:8px;
    background:linear-gradient(90deg,#ff0066,#ffcc00,#33ff66,#00ccff,#cc66ff);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    background-size:200% auto; animation:shine 3s linear infinite; }
  @keyframes shine { to { background-position:200% center; } }
  #endSub { font-size:16px; letter-spacing:4px; opacity:0.8; margin-bottom:28px; }
  #endDesc { font-size:13px; line-height:1.7; opacity:0.6; margin-bottom:36px; }
  #endBtn { padding:15px 46px; font-size:17px; font-weight:800; letter-spacing:2px; border:none;
    border-radius:14px; background:#fff; color:#15151f; cursor:pointer; box-shadow:0 5px 0 rgba(255,255,255,0.3); transition:all 0.1s; }
  #endBtn:active { transform:translateY(4px); box-shadow:0 1px 0 rgba(255,255,255,0.3); }

  .shake { animation:shake 0.3s; }
  @keyframes shake { 0%,100%{transform:translate(0,0);} 25%{transform:translate(-9px,3px);}
    50%{transform:translate(9px,-3px);} 75%{transform:translate(-6px,-3px);} }
  .pop { animation:pop 0.4s ease; }
  @keyframes pop { 0%{transform:scale(1);} 40%{transform:scale(1.18);} 100%{transform:scale(1);} }
</style>
</head>
<body>
<div id="stage">
  <div id="topbar">
    <div id="logo">BOX RUSH</div>
    <div id="topright">
      <div id="coinDisp"><span class="ic">●</span><span id="coinVal">0</span></div>
      <div id="best"><span class="lbl">BEST </span><span class="val" id="bestVal">우드</span></div>
    </div>
  </div>

  <div id="center">
    <div id="rankName">우드</div>
    <div id="rankStep">1 / 27</div>
    <div id="boxWrap"><div id="chestFloat"><svg id="chestSvg" viewBox="0 0 210 190"></svg></div></div>
    <div id="odds">강화 확률 <b id="oddsVal">62%</b> <span class="luck" id="luckTxt"></span></div>
    <div id="chances"></div>
    <div id="hint">탭하여 업그레이드하세요!</div>
    <div id="actions">
      <button class="btn" id="sellBtn">판매</button>
      <button class="btn" id="shopBtn">상점</button>
    </div>
  </div>

  <div id="fx"></div>
  <div id="flash"></div>

  <div id="result">
    <div id="boomTitle">터졌다!</div>
    <div id="reachedLabel">도달 등급</div>
    <div id="reachedRank">우드</div>
    <div id="reachedStep">1 / 27</div>
    <div id="earned">+0 코인</div>
    <div id="newBest">신기록!</div>
    <button id="retryBtn">다시</button>
  </div>

  <div id="shop">
    <div id="shopTitle">상점</div>
    <div id="shopCoin">● <span id="shopCoinVal">0</span> 코인</div>

    <div class="shopItem">
      <div class="info">
        <div class="nm">🍀 행운</div>
        <div class="ds">모든 강화 확률 +2% (영구)</div>
        <div class="lv" id="luckLv">Lv.0</div>
      </div>
      <button class="buyBtn" id="buyLuck">● 50</button>
    </div>

    <div class="shopItem">
      <div class="info">
        <div class="nm">➕ 기회</div>
        <div class="ds">시작 기회 +1 (영구, 최대 6)</div>
        <div class="lv" id="chanceLv">Lv.0</div>
      </div>
      <button class="buyBtn" id="buyChance">● 120</button>
    </div>

    <div id="ticketSection">
      <h3>시작 티켓 (도달한 등급까지)</h3>
      <div id="ticketList"></div>
    </div>

    <button id="closeShop">닫기</button>
  </div>

  <div id="toast"></div>

  <div id="ending">
    <div id="endInner">
      <div id="endCrown">👑</div>
      <div id="endTitle">에브리띵</div>
      <div id="endSub">모든 것을 손에 넣었다</div>
      <div id="endDesc">우드에서 시작해 27단계 끝까지.<br>당신은 BOX RUSH를 클리어했습니다.</div>
      <button id="endBtn">처음부터</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  var RANKS = [
    { name:"우드",       body:"#b07a3c", trim:"#e8c89a", bg:"#1f2128" },
    { name:"스크랩",     body:"#7d7d7d", trim:"#b3b3b3", bg:"#26262b" },
    { name:"아이언",     body:"#9aa4ac", trim:"#d6dde2", bg:"#272c30" },
    { name:"브론즈",     body:"#b5702f", trim:"#e6a55c", bg:"#2b2118" },
    { name:"실버",       body:"#c3ccd4", trim:"#f0f5f9", bg:"#5a6b78" },
    { name:"퀵실버",     body:"#8fa6b8", trim:"#cfe0ec", bg:"#3e4d59" },
    { name:"골드",       body:"#e0a82e", trim:"#ffe07a", bg:"#3a2f12" },
    { name:"리얼골드",   body:"#f2bc1f", trim:"#fff0a0", bg:"#4a3a0d" },
    { name:"에메랄드",   body:"#1faa6e", trim:"#6cf0b4", bg:"#0c3325" },
    { name:"에메티스트", body:"#9a4fd6", trim:"#d49cf5", bg:"#2a1340" },
    { name:"다이아",     body:"#3bc6e8", trim:"#a5edff", bg:"#0c3540" },
    { name:"크리스탈",   body:"#78dbe8", trim:"#d6f8ff", bg:"#4aa3c4" },
    { name:"슈퍼",       body:"#ff4d73", trim:"#ffb0c2", bg:"#4a0f1f" },
    { name:"하이퍼",     body:"#ff1f6b", trim:"#ff8fb8", bg:"#4d0a26" },
    { name:"울트라",     body:"#ff6a12", trim:"#ffc285", bg:"#3f1c05" },
    { name:"마스터",     body:"#6d4fe0", trim:"#b3a0ff", bg:"#1f1445" },
    { name:"오메가",     body:"#00d6b4", trim:"#8ffce8", bg:"#063b33" },
    { name:"레인보우",   body:"rainbow", trim:"#ffffff", bg:"#2a1530" },
    { name:"라이트",     body:"#fff0a8", trim:"#ffffff", bg:"#9a8f4a" },
    { name:"레전드",     body:"#ffa400", trim:"#ffe08a", bg:"#3d2600" },
    { name:"갓",         body:"#fff200", trim:"#ffffff", bg:"#6b5e00" },
    { name:"보이드",     body:"#2c2c3e", trim:"#5a5a78", bg:"#0a0a12" },
    { name:"공허",       body:"#16161f", trim:"#3a3a52", bg:"#040407" },
    { name:"셰도우",     body:"#3a1f5e", trim:"#7a4fb0", bg:"#120821" },
    { name:"얼티밋",     body:"#00e5ff", trim:"#b0f7ff", bg:"#003540" },
    { name:"카오스",     body:"#ff0033", trim:"#ff8099", bg:"#3d000c" },
    { name:"에브리띵",   body:"rainbow", trim:"#ffffff", bg:"#000000" }
  ];
  var MAX = RANKS.length;

  // 영구 상태
  var best = 0, coins = 0, luckLv = 0, chanceLv = 0;
  // 판 상태
  var rank = 0, chances = 3, locked = false, attempted = false;

  // 저장 불러오기
  try {
    var d = localStorage.getItem("boxrush_v3");
    if (d) { d = JSON.parse(d); best=d.best||0; coins=d.coins||0; luckLv=d.luckLv||0; chanceLv=d.chanceLv||0; }
  } catch(e){}

  function startChances(){ return 3 + chanceLv; }
  rank = 0; chances = startChances();

  // 가격
  function luckCost(){ return 50 + luckLv*60; }
  function chanceCost(){ return 120 + chanceLv*200; }
  function ticketCost(idx){ return Math.round(20 * Math.pow(1.7, idx)); }
  // 판매가
  function sellValue(idx){ return Math.round(8 * Math.pow(1.45, idx)); }

  // 확률 (낮춤): 우드 62% -> 에브리띵 1.5%, + 행운
  // 갓(idx20) 이후부터는 행운 효과 급감
  function successRate(idx){
    var t = idx/(MAX-1);
    var base = 0.62 - 0.605*t;
    var luckBonus = luckLv*0.02;
    if (idx > 20){
      // 갓 이후: 행운 효과를 1/10로 (거의 안 먹힘)
      luckBonus *= 0.1;
    }
    base += luckBonus;
    return Math.max(0.01, Math.min(0.95, base));
  }

  // DOM
  var stage=document.getElementById("stage"), chestSvg=document.getElementById("chestSvg"),
      chestFloat=document.getElementById("chestFloat"), boxWrap=document.getElementById("boxWrap"),
      rankName=document.getElementById("rankName"), rankStep=document.getElementById("rankStep"),
      oddsVal=document.getElementById("oddsVal"), luckTxt=document.getElementById("luckTxt"),
      chancesEl=document.getElementById("chances"), hint=document.getElementById("hint"),
      fx=document.getElementById("fx"), flash=document.getElementById("flash"),
      bestVal=document.getElementById("bestVal"), coinVal=document.getElementById("coinVal"),
      sellBtn=document.getElementById("sellBtn"), shopBtn=document.getElementById("shopBtn"),
      result=document.getElementById("result"), reachedRank=document.getElementById("reachedRank"),
      reachedStep=document.getElementById("reachedStep"), earned=document.getElementById("earned"),
      newBest=document.getElementById("newBest"), retryBtn=document.getElementById("retryBtn"),
      shop=document.getElementById("shop"), shopCoinVal=document.getElementById("shopCoinVal"),
      buyLuck=document.getElementById("buyLuck"), buyChance=document.getElementById("buyChance"),
      luckLvEl=document.getElementById("luckLv"), chanceLvEl=document.getElementById("chanceLv"),
      ticketList=document.getElementById("ticketList"), closeShop=document.getElementById("closeShop"),
      toast=document.getElementById("toast");

  function save(){
    try { localStorage.setItem("boxrush_v3", JSON.stringify({best:best,coins:coins,luckLv:luckLv,chanceLv:chanceLv})); } catch(e){}
  }

  function shade(hex, amt){
    if (hex==="rainbow") return "#888";
    hex=hex.replace("#","");
    var n=parseInt(hex,16);
    var r=Math.max(0,Math.min(255,((n>>16)&255)+amt));
    var g=Math.max(0,Math.min(255,((n>>8)&255)+amt));
    var b=Math.max(0,Math.min(255,(n&255)+amt));
    return "rgb("+r+","+g+","+b+")";
  }

  function buildChest(idx){
    var r=RANKS[idx], body=r.body, trim=r.trim, useRb=(body==="rainbow");
    var defs="", fill;
    if (useRb){
      defs+='<linearGradient id="rb" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff0066"/><stop offset="25%" stop-color="#ffcc00"/><stop offset="50%" stop-color="#33ff66"/><stop offset="75%" stop-color="#00ccff"/><stop offset="100%" stop-color="#cc66ff"/></linearGradient>';
      fill="url(#rb)";
    } else {
      defs+='<linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+shade(body,25)+'"/><stop offset="100%" stop-color="'+shade(body,-30)+'"/></linearGradient>';
      fill="url(#bg1)";
    }
    var glow=2+idx*0.8;
    defs+='<filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="'+glow+'" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
    var s='<defs>'+defs+'</defs>';
    s+='<ellipse cx="105" cy="180" rx="74" ry="10" fill="rgba(0,0,0,0.25)"/>';
    s+='<g filter="url(#glow)">';
    s+='<rect x="32" y="90" width="146" height="80" rx="10" fill="'+fill+'"/>';
    s+='<rect x="32" y="114" width="146" height="6" fill="rgba(0,0,0,0.18)"/>';
    s+='<path d="M32 94 Q32 56 105 56 Q178 56 178 94 L178 98 L32 98 Z" fill="'+fill+'"/>';
    s+='<path d="M42 90 Q42 65 105 65 Q168 65 168 90 L168 92 L42 92 Z" fill="rgba(255,255,255,0.18)"/>';
    s+='<rect x="28" y="82" width="25" height="92" rx="9" fill="'+trim+'"/>';
    s+='<rect x="157" y="82" width="25" height="92" rx="9" fill="'+trim+'"/>';
    s+='<rect x="92" y="84" width="26" height="74" fill="'+trim+'"/>';
    s+='<rect x="86" y="114" width="38" height="32" rx="9" fill="'+trim+'"/>';
    s+='<circle cx="105" cy="128" r="7" fill="rgba(0,0,0,0.35)"/>';
    if (idx>=6) s+='<circle cx="105" cy="128" r="5" fill="'+trim+'"/>';
    if (idx>=12){
      s+='<circle cx="41" cy="94" r="3.5" fill="'+shade(trim,-30)+'"/>';
      s+='<circle cx="169" cy="94" r="3.5" fill="'+shade(trim,-30)+'"/>';
      s+='<circle cx="41" cy="162" r="3.5" fill="'+shade(trim,-30)+'"/>';
      s+='<circle cx="169" cy="162" r="3.5" fill="'+shade(trim,-30)+'"/>';
    }
    if (idx>=18){
      s+='<path d="M86 52 L94 40 L105 50 L116 40 L124 52 Z" fill="'+trim+'"/>';
      s+='<circle cx="105" cy="38" r="4" fill="'+trim+'"/>';
    }
    s+='</g>';
    chestSvg.innerHTML=s;
  }

  function render(){
    var r=RANKS[rank];
    stage.style.background="radial-gradient(circle at 50% 40%, "+shade(r.bg,18)+" 0%, "+r.bg+" 70%)";
    rankName.textContent=r.name; rankName.style.color=r.trim;
    rankName.style.textShadow="0 0 "+(8+rank)+"px "+r.trim;
    rankStep.textContent=(rank+1)+" / "+MAX;
    oddsVal.textContent=Math.round(successRate(rank)*100)+"%";
    luckTxt.textContent = luckLv>0 ? "(🍀+"+(luckLv*2)+"%)" : "";
    buildChest(rank);

    var total=startChances();
    chancesEl.innerHTML="";
    for (var i=0;i<total;i++){
      var used=i>=chances;
      var a=document.createElement("div");
      a.className="arrow"+(used?" used":"");
      a.style.background= used?"rgba(0,0,0,0.18)":r.trim;
      var ac= used?"rgba(255,255,255,0.4)":r.bg;
      a.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="'+ac+'" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg><div class="shadow"></div>';
      chancesEl.appendChild(a);
    }

    bestVal.textContent=RANKS[best].name;
    coinVal.textContent=coins;

    // 판매 버튼: 강화 시도 안 했을 때만
    sellBtn.disabled = attempted;
    sellBtn.textContent = attempted ? "판매" : "판매 +"+sellValue(rank);
  }

  function showToast(msg){
    toast.textContent=msg; toast.className="show";
    setTimeout(function(){ toast.className=""; },1400);
  }

  function burst(color,count,power){
    var rect=boxWrap.getBoundingClientRect();
    var cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
    for (var i=0;i<count;i++){(function(){
      var p=document.createElement("div"); p.className="particle";
      var sz=5+Math.random()*9;
      p.style.width=sz+"px"; p.style.height=sz+"px"; p.style.background=color;
      p.style.borderRadius=Math.random()<0.5?"50%":"2px";
      p.style.boxShadow="0 0 8px "+color;
      p.style.left=cx+"px"; p.style.top=cy+"px"; fx.appendChild(p);
      var ang=Math.random()*Math.PI*2, dist=(50+Math.random()*130)*power;
      var dx=Math.cos(ang)*dist, dy=Math.sin(ang)*dist, dur=550+Math.random()*450, start=null;
      function step(ts){ if(!start)start=ts; var pr=(ts-start)/dur;
        if(pr>=1){ if(p.parentNode)p.parentNode.removeChild(p); return; }
        var e=1-Math.pow(1-pr,2);
        p.style.left=(cx+dx*e)+"px"; p.style.top=(cy+dy*e+pr*pr*70)+"px"; p.style.opacity=String(1-pr);
        requestAnimationFrame(step);
      } requestAnimationFrame(step);
    })();}
  }
  function doFlash(st){ flash.style.transition="none"; flash.style.opacity=String(st);
    setTimeout(function(){ flash.style.transition="opacity 0.45s ease"; flash.style.opacity="0"; },30); }

  function tryUpgrade(){
    if (locked) return;
    if (rank>=MAX-1) return;
    locked=true; attempted=true;
    chestSvg.style.transform="scale(0.9)";
    setTimeout(function(){ chestSvg.style.transform="scale(1)"; },120);
    var success=Math.random()<successRate(rank);
    setTimeout(function(){
      if (success){
        rank++; chances=startChances(); attempted=false;
        var c=RANKS[rank].trim;
        burst(c,20+rank,1+rank*0.04);
        doFlash(Math.min(0.95,0.3+rank*0.03));
        boxWrap.className="shake"; chestFloat.classList.add("pop");
        setTimeout(function(){ boxWrap.className=""; chestFloat.classList.remove("pop"); },420);
        if (rank>best){ best=rank; save(); }
        render();
        if (rank>=MAX-1){
          // 에브리띵 도달 = 엔딩
          locked=true;
          hint.textContent="에브리띵 달성!";
          showEnding();
          return;
        }
        hint.textContent="강화 성공!";
        locked=false;
        setTimeout(function(){ if(!locked&&rank<MAX-1) hint.textContent="탭하여 업그레이드하세요!"; },800);
      } else {
        chances--; render();
        if (chances<=0){ explode(); }
        else { boxWrap.className="shake"; setTimeout(function(){ boxWrap.className=""; },300);
          burst("#888",6,0.7); hint.textContent="기회가 "+chances+"번 남았습니다!"; locked=false; }
      }
    },130);
  }

  function explode(){
    burst("#ff5252",45,1.8); burst("#ffb300",30,1.4); doFlash(1);
    boxWrap.className="shake"; chestSvg.style.transform="scale(0)";
    var isNew=false;
    if (rank>best){ best=rank; isNew=true; }
    save();
    setTimeout(function(){
      var r=RANKS[rank];
      reachedRank.textContent=r.name; reachedRank.style.color=r.trim;
      reachedRank.style.textShadow="0 0 16px "+r.trim;
      reachedStep.textContent=(rank+1)+" / "+MAX;
      earned.textContent="코인 없음 — 터지면 빈손!";
      newBest.style.display=isNew?"block":"none";
      result.className="show";
    },480);
  }

  function reset(startRank){
    rank=startRank||0; chances=startChances(); locked=false; attempted=false;
    chestSvg.style.transform="scale(1)"; boxWrap.className=""; result.className="";
    document.getElementById("ending").className="";
    hint.textContent="탭하여 업그레이드하세요!";
    render();
  }

  // 엔딩: 에브리띵 달성
  function showEnding(){
    var ending=document.getElementById("ending");
    // 폭죽 난사
    var rb=["#ff0066","#ffcc00","#33ff66","#00ccff","#cc66ff","#ffffff"];
    var shots=0;
    var iv=setInterval(function(){
      burst(rb[shots%rb.length], 30, 2);
      doFlash(0.5);
      shots++;
      if (shots>=6){ clearInterval(iv); }
    },180);
    setTimeout(function(){ ending.className="show"; },1100);
  }

  // 판매: 코인 얻고 새 상자
  function sellBox(){
    if (attempted) return;
    var gain=sellValue(rank); coins+=gain; save();
    showToast("+"+gain+" 코인 판매!");
    burst("#ffd54a",16,1); doFlash(0.3);
    reset(0);
  }

  // 상점
  function openShop(){ renderShop(); shop.className="show"; }
  function closeShopFn(){ shop.className=""; render(); }

  function renderShop(){
    shopCoinVal.textContent=coins;
    luckLvEl.textContent="Lv."+luckLv+" (현재 +"+(luckLv*2)+"%)";
    chanceLvEl.textContent="Lv."+chanceLv+" (시작 기회 "+startChances()+")";
    buyLuck.textContent="● "+luckCost();
    buyLuck.disabled = coins<luckCost();
    buyChance.textContent= chanceLv>=3 ? "MAX" : "● "+chanceCost();
    buyChance.disabled = chanceLv>=3 || coins<chanceCost();

    // 티켓: best까지 (0은 기본이라 1부터)
    ticketList.innerHTML="";
    if (best<=0){
      var none=document.createElement("div");
      none.style.cssText="opacity:0.5;font-size:12px;text-align:center;padding:14px;";
      none.textContent="아직 도달한 상위 등급이 없습니다";
      ticketList.appendChild(none);
    }
    for (var i=1;i<=best;i++){(function(idx){
      var r=RANKS[idx], cost=ticketCost(idx);
      var t=document.createElement("div"); t.className="ticket";
      var canBuy=coins>=cost;
      t.innerHTML='<span class="tn" style="color:'+r.trim+'">'+r.name+'부터 시작</span>'
        +'<button class="tbtn" '+(canBuy?'':'disabled')+'>● '+cost+'</button>';
      t.querySelector(".tbtn").addEventListener("click",function(){ buyTicket(idx,cost); });
      ticketList.appendChild(t);
    })(i);}
  }

  buyLuck.addEventListener("click",function(){
    var c=luckCost(); if (coins<c) return;
    coins-=c; luckLv++; save(); renderShop(); showToast("🍀 행운 강화!");
  });
  buyChance.addEventListener("click",function(){
    if (chanceLv>=3) return; var c=chanceCost(); if (coins<c) return;
    coins-=c; chanceLv++; save(); renderShop(); showToast("➕ 기회 강화!");
  });
  function buyTicket(idx,cost){
    if (coins<cost) return;
    coins-=cost; save();
    shop.className="";
    showToast(RANKS[idx].name+"부터 시작!");
    reset(idx);
  }

  boxWrap.addEventListener("click",tryUpgrade);
  retryBtn.addEventListener("click",function(){ reset(0); });
  document.getElementById("endBtn").addEventListener("click",function(){ reset(0); });
  sellBtn.addEventListener("click",sellBox);
  shopBtn.addEventListener("click",openShop);
  closeShop.addEventListener("click",closeShopFn);

  render();
})();
</script>
</body>
</html>
