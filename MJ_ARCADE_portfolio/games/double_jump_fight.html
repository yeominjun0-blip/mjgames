<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUMP SMASH!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Fredoka One', cursive;
    overflow: hidden;
    user-select: none;
  }

  #title {
    color: #fff;
    font-size: 2.8rem;
    letter-spacing: 4px;
    text-shadow: 0 0 20px #ff6bff, 0 4px 0 #7700aa;
    margin-bottom: 6px;
    animation: titlePulse 2s ease-in-out infinite;
  }
  @keyframes titlePulse {
    0%,100% { text-shadow: 0 0 20px #ff6bff, 0 4px 0 #7700aa; }
    50% { text-shadow: 0 0 40px #ff6bff, 0 0 60px #ff00ff, 0 4px 0 #7700aa; }
  }

  #hud {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 8px;
    width: 700px;
  }

  .hp-bar-wrap {
    flex: 1;
  }
  .hp-label {
    font-size: 0.85rem;
    color: #ccc;
    margin-bottom: 2px;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
  }
  .hp-bar-bg {
    width: 100%;
    height: 18px;
    background: #330033;
    border-radius: 9px;
    border: 2px solid #660066;
    overflow: hidden;
  }
  #player-hp-bar { background: linear-gradient(90deg, #00e676, #69ff47); height: 100%; border-radius: 7px; transition: width 0.15s; }
  #enemy-hp-bar  { background: linear-gradient(90deg, #ff1744, #ff6d00); height: 100%; border-radius: 7px; transition: width 0.15s; float: right; }

  .vs-text {
    font-size: 1.4rem;
    color: #ff6bff;
    text-shadow: 0 0 10px #ff00ff;
    flex-shrink: 0;
  }

  #canvas {
    border-radius: 16px;
    border: 3px solid #660099;
    box-shadow: 0 0 40px #ff00ff44, 0 0 80px #7700aa33;
    display: block;
  }

  #controls-hint {
    margin-top: 8px;
    color: #9966cc;
    font-size: 0.8rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    letter-spacing: 1px;
  }

  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,0,30,0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  #overlay h2 {
    font-size: 3rem;
    color: #fff;
    text-shadow: 0 0 30px #ff6bff;
    margin-bottom: 12px;
  }
  #overlay p {
    color: #cc99ff;
    font-size: 1.1rem;
    margin-bottom: 28px;
    font-family: 'Nunito', sans-serif;
  }
  #overlay button {
    background: linear-gradient(135deg, #9900ff, #ff00cc);
    border: none;
    color: #fff;
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    padding: 12px 40px;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 0 20px #ff00cc88;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  #overlay button:hover {
    transform: scale(1.07);
    box-shadow: 0 0 40px #ff00cccc;
  }

  #combo-display {
    position: fixed;
    top: 30%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 2.5rem;
    color: #ffee00;
    text-shadow: 0 0 20px #ff8800;
    pointer-events: none;
    z-index: 50;
    opacity: 0;
    transition: opacity 0.3s;
  }
</style>
</head>
<body>

<div id="title">💥 JUMP SMASH!</div>

<div id="hud">
  <div class="hp-bar-wrap">
    <div class="hp-label" id="player-name-label">🍎 플레이어</div>
    <div class="hp-bar-bg"><div id="player-hp-bar" style="width:100%"></div></div>
  </div>
  <div class="vs-text">VS</div>
  <div class="hp-bar-wrap" style="text-align:right">
    <div class="hp-label" id="enemy-name-label" style="text-align:right">🤖 AI</div>
    <div class="hp-bar-bg"><div id="enemy-hp-bar" style="width:100%;float:right"></div></div>
  </div>
</div>

<canvas id="canvas" width="700" height="400"></canvas>
<div id="controls-hint">← → 이동 &nbsp;|&nbsp; SPACE 점프 &nbsp;|&nbsp; SPACE×2 더블점프 (눌러 찍기!)</div>

<div id="combo-display"></div>

<div id="overlay">
  <h2 id="overlay-title">JUMP SMASH!</h2>
  <p id="overlay-sub">더블 점프로 상대를 눌러라!</p>
  <button id="overlay-btn" onclick="startGame()">▶ 시작!</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const FLOOR_Y = H - 60;
const GRAVITY = 0.6;
const JUMP_FORCE = -14;
const MOVE_SPEED = 4;
const MAX_HP = 100;
const STOMP_DAMAGE = 18;
const STOMP_FORCE = -10;

const CHARACTERS = [
  { name: '배', emoji: '🍐', color: '#a8e063', size: 38 },
  { name: '사과', emoji: '🍎', color: '#ff4444', size: 36 },
  { name: '물병', emoji: '💧', color: '#64cfff', size: 34 },
  { name: '콜라', emoji: '🥤', color: '#8B4513', size: 35 },
  { name: '사람', emoji: '🧍', color: '#ffcc88', size: 36 },
  { name: '당근', emoji: '🥕', color: '#ff8c00', size: 34 },
  { name: '버섯', emoji: '🍄', color: '#cc4444', size: 38 },
  { name: '킹', emoji: '👑', color: '#ffd700', size: 40 },
];

// Platforms
const PLATFORMS = [
  { x: 0, y: FLOOR_Y, w: W, h: 60 },       // floor
  { x: 120, y: 280, w: 140, h: 14 },
  { x: 420, y: 280, w: 140, h: 14 },
  { x: 270, y: 200, w: 160, h: 14 },
];

let player, enemy, particles, gameRunning, winner;
let keys = {};
let comboCount = 0;
let comboTimer = null;

function pickChar(exclude) {
  let idx;
  do { idx = Math.floor(Math.random() * CHARACTERS.length); }
  while (idx === exclude);
  return idx;
}

function makeEntity(x, charIdx, isPlayer) {
  return {
    x, y: FLOOR_Y - 80,
    vx: 0, vy: 0,
    w: CHARACTERS[charIdx].size * 1.1,
    h: CHARACTERS[charIdx].size * 1.2,
    hp: MAX_HP,
    maxHp: MAX_HP,
    onGround: false,
    jumpCount: 0,
    charIdx,
    isPlayer,
    invincible: 0,
    squash: 1,
    stretch: 1,
    facingRight: isPlayer,
    stompEffect: 0,
    aiState: 'idle',
    aiTimer: 0,
    aiJumpCooldown: 0,
  };
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  const pi = pickChar(-1);
  const ei = pickChar(pi);
  player = makeEntity(120, pi, true);
  enemy  = makeEntity(540, ei, false);
  particles = [];
  gameRunning = true;
  winner = null;
  comboCount = 0;

  document.getElementById('player-name-label').textContent = CHARACTERS[pi].emoji + ' ' + CHARACTERS[pi].name;
  document.getElementById('enemy-name-label').textContent  = CHARACTERS[ei].emoji + ' ' + CHARACTERS[ei].name;

  updateHPBars();
  loop();
}

function updateHPBars() {
  document.getElementById('player-hp-bar').style.width = Math.max(0, (player.hp / player.maxHp) * 100) + '%';
  document.getElementById('enemy-hp-bar').style.width  = Math.max(0, (enemy.hp  / enemy.maxHp)  * 100) + '%';
}

// Particles
function spawnParticles(x, y, color, count=10) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 3,
      life: 1,
      decay: 0.04 + Math.random() * 0.04,
      r: 4 + Math.random() * 6,
      color,
    });
  }
}

function spawnStars(x, y) {
  const colors = ['#ffee00','#ff6600','#ff00cc','#00eeff'];
  for (let i = 0; i < 16; i++) {
    const angle = (i / 16) * Math.PI * 2;
    const speed = 3 + Math.random() * 6;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.025,
      r: 5 + Math.random() * 5,
      color: colors[Math.floor(Math.random() * colors.length)],
      star: true,
    });
  }
}

// Platform collision
function onPlatform(e) {
  for (const p of PLATFORMS) {
    if (e.vy >= 0 &&
        e.x + e.w > p.x + 6 &&
        e.x < p.x + p.w - 6 &&
        e.y + e.h >= p.y &&
        e.y + e.h <= p.y + p.h + e.vy + 2) {
      return p;
    }
  }
  return null;
}

function applyPhysics(e) {
  e.vy += GRAVITY;
  e.x += e.vx;
  e.y += e.vy;

  // friction
  e.vx *= 0.82;

  const plat = onPlatform(e);
  if (plat) {
    e.y = plat.y - e.h;
    e.vy = 0;
    e.onGround = true;
    e.jumpCount = 0;
    if (e.squash < 1) e.squash = 1;
    e.stretch = 1;
  } else {
    e.onGround = false;
  }

  // walls
  if (e.x < 0) { e.x = 0; e.vx = 0; }
  if (e.x + e.w > W) { e.x = W - e.w; e.vx = 0; }

  // fell off screen
  if (e.y > H + 100) {
    e.hp = 0;
  }

  if (e.invincible > 0) e.invincible--;
  e.squash += (1 - e.squash) * 0.2;
  e.stretch += (1 - e.stretch) * 0.2;
  if (e.stompEffect > 0) e.stompEffect--;
}

function jump(e) {
  if (e.jumpCount < 2) {
    e.vy = JUMP_FORCE;
    e.jumpCount++;
    e.onGround = false;
    e.stretch = 0.6;
    e.squash = 1.3;
    if (e.jumpCount === 2) {
      // double jump: burst
      spawnParticles(e.x + e.w/2, e.y + e.h/2, '#ff88ff', 8);
    }
  }
}

// Stomp check: attacker falls onto defender
function checkStomp(attacker, defender) {
  if (attacker.invincible > 0) return false;
  if (defender.invincible > 0) return false;

  // attacker must be falling (vy > 0)
  if (attacker.vy <= 0) return false;

  // overlap check
  const ax1 = attacker.x, ax2 = attacker.x + attacker.w;
  const ay1 = attacker.y, ay2 = attacker.y + attacker.h;
  const dx1 = defender.x, dx2 = defender.x + defender.w;
  const dy1 = defender.y, dy2 = defender.y + defender.h;

  const overlapX = ax1 < dx2 - 8 && ax2 > dx1 + 8;
  const overlapY = ay2 >= dy1 && ay2 <= dy2 + attacker.vy + 4;

  if (overlapX && overlapY) {
    // attacker lands on top
    attacker.vy = STOMP_FORCE;
    attacker.y = dy1 - attacker.h;
    attacker.jumpCount = 1; // allow one more jump
    attacker.onGround = false;

    defender.hp -= STOMP_DAMAGE;
    defender.invincible = 40;
    defender.squash = 0.5;
    defender.stompEffect = 20;

    // knockback
    const dir = attacker.x + attacker.w/2 < defender.x + defender.w/2 ? 1 : -1;
    defender.vx = dir * 5;
    defender.vy = -4;

    // particles
    spawnStars(defender.x + defender.w/2, defender.y);
    spawnParticles(defender.x + defender.w/2, defender.y, CHARACTERS[defender.charIdx].color, 14);

    updateHPBars();
    return true;
  }
  return false;
}

// AI logic
function updateAI() {
  const e = enemy;
  const p = player;
  e.aiTimer--;
  if (e.aiJumpCooldown > 0) e.aiJumpCooldown--;

  const dx = p.x + p.w/2 - (e.x + e.w/2);
  const dy = p.y - e.y;
  const dist = Math.abs(dx);

  // face direction
  e.facingRight = dx > 0;

  // Move toward player
  if (dist > 30) {
    e.vx += dx > 0 ? 0.7 : -0.7;
    e.vx = Math.max(-4.5, Math.min(4.5, e.vx));
  }

  // Jump strategy
  if (e.onGround && e.aiJumpCooldown <= 0) {
    // Jump toward player if they are above or far
    if (dy < -40) {
      // player above: jump up
      jump(e);
      e.aiJumpCooldown = 30;
    } else if (dist > 80 && Math.random() < 0.03) {
      jump(e);
      e.aiJumpCooldown = 25;
    }
  }

  // Double jump attack: if AI is airborne and above the player
  if (!e.onGround && e.jumpCount === 1 && e.aiJumpCooldown <= 0) {
    const abovePlayer = e.y + e.h < p.y + p.h && e.y < p.y;
    if (abovePlayer && dist < 80) {
      jump(e); // double jump down
      e.vy = 8; // dive
      e.aiJumpCooldown = 60;
    }
  }

  // Occasionally jump randomly to stay dynamic
  if (e.onGround && e.aiJumpCooldown <= 0 && Math.random() < 0.008) {
    jump(e);
    e.aiJumpCooldown = 40;
  }
}

// Input
document.addEventListener('keydown', e => {
  if (!gameRunning) return;
  keys[e.code] = true;
  if ((e.code === 'Space' || e.code === 'ArrowUp') && !e.repeat) {
    jump(player);
    e.preventDefault();
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch support
let touchLeft = false, touchRight = false;
canvas.addEventListener('touchstart', e => {
  const x = e.touches[0].clientX;
  if (x < W / 2) touchLeft = true;
  else { if (gameRunning) jump(player); }
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', () => { touchLeft = false; touchRight = false; });

function drawEntity(e) {
  const char = CHARACTERS[e.charIdx];
  const cx = e.x + e.w / 2;
  const cy = e.y + e.h / 2;

  ctx.save();
  ctx.translate(cx, cy);

  // squash/stretch
  const sx = 1 / e.squash;
  const sy = e.squash;
  ctx.scale(sx * (e.facingRight ? 1 : -1), sy);

  // shadow
  ctx.save();
  ctx.scale(1, 0.3);
  ctx.translate(0, e.h * 0.5 + 8);
  ctx.beginPath();
  ctx.ellipse(0, 0, e.w * 0.55 * e.squash, 8, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fill();
  ctx.restore();

  // stomp ring effect
  if (e.stompEffect > 0) {
    const alpha = e.stompEffect / 20;
    const radius = (20 - e.stompEffect) * 3;
    ctx.beginPath();
    ctx.arc(0, e.h * 0.1, radius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,200,0,${alpha})`;
    ctx.lineWidth = 4;
    ctx.stroke();
  }

  // invincible flash
  if (e.invincible > 0 && Math.floor(e.invincible / 4) % 2 === 0) {
    ctx.globalAlpha = 0.3;
  }

  // Draw emoji
  const fontSize = char.size * 1.6;
  ctx.font = `${fontSize}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(char.emoji, 0, 0);

  // HP mini bar above
  const barW = e.w * 1.1;
  const barH = 6;
  const barX = -barW / 2;
  const barY = -e.h * 0.6 - 14;
  ctx.globalAlpha = 0.85;
  ctx.fillStyle = '#330000';
  ctx.beginPath();
  ctx.roundRect(barX, barY, barW, barH, 3);
  ctx.fill();
  const hpRatio = Math.max(0, e.hp / e.maxHp);
  const hpColor = hpRatio > 0.5 ? '#44ff66' : hpRatio > 0.25 ? '#ffcc00' : '#ff3322';
  ctx.fillStyle = hpColor;
  ctx.beginPath();
  ctx.roundRect(barX, barY, barW * hpRatio, barH, 3);
  ctx.fill();
  ctx.globalAlpha = 1;

  ctx.restore();
}

function drawPlatforms() {
  for (const p of PLATFORMS) {
    if (p.y === FLOOR_Y) {
      // floor
      const grad = ctx.createLinearGradient(0, p.y, 0, H);
      grad.addColorStop(0, '#3d0066');
      grad.addColorStop(1, '#1a0033');
      ctx.fillStyle = grad;
      ctx.fillRect(p.x, p.y, p.w, p.h);
      // top line glow
      ctx.beginPath();
      ctx.moveTo(0, p.y);
      ctx.lineTo(W, p.y);
      ctx.strokeStyle = '#cc00ff';
      ctx.lineWidth = 3;
      ctx.shadowColor = '#ff00ff';
      ctx.shadowBlur = 10;
      ctx.stroke();
      ctx.shadowBlur = 0;
    } else {
      ctx.fillStyle = '#4d007a';
      ctx.beginPath();
      ctx.roundRect(p.x, p.y, p.w, p.h, 7);
      ctx.fill();
      ctx.strokeStyle = '#cc00ff';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawBackground() {
  // gradient bg
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0d0022');
  grad.addColorStop(1, '#1a003a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // grid lines
  ctx.strokeStyle = 'rgba(150,0,255,0.07)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

let frameCount = 0;

function loop() {
  if (!gameRunning) return;
  frameCount++;

  // Input
  if (keys['ArrowLeft'] || keys['KeyA'] || touchLeft) {
    player.vx -= 1.2;
    player.vx = Math.max(-MOVE_SPEED, player.vx);
    player.facingRight = false;
  }
  if (keys['ArrowRight'] || keys['KeyD'] || touchRight) {
    player.vx += 1.2;
    player.vx = Math.min(MOVE_SPEED, player.vx);
    player.facingRight = true;
  }

  // Update
  updateAI();
  applyPhysics(player);
  applyPhysics(enemy);

  // Stomp checks
  checkStomp(player, enemy);
  checkStomp(enemy, player);

  // Update particles
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life -= p.decay;
  }
  particles = particles.filter(p => p.life > 0);

  // Draw
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawParticles();
  drawPlatforms();
  drawEntity(player);
  drawEntity(enemy);

  // Check game over
  if (player.hp <= 0 || enemy.hp <= 0) {
    gameRunning = false;
    const pWon = enemy.hp <= 0;
    const pChar = CHARACTERS[player.charIdx];
    const eChar = CHARACTERS[enemy.charIdx];
    setTimeout(() => {
      const overlay = document.getElementById('overlay');
      overlay.style.display = 'flex';
      document.getElementById('overlay-title').textContent = pWon
        ? `${pChar.emoji} 승리!`
        : `${eChar.emoji} AI 승리...`;
      document.getElementById('overlay-sub').textContent = pWon
        ? '완벽한 짓누르기! 🎉'
        : '다시 도전해봐!';
      document.getElementById('overlay-btn').textContent = '다시 하기!';
    }, 600);
    return;
  }

  requestAnimationFrame(loop);
}
</script>
</body>
</html>
