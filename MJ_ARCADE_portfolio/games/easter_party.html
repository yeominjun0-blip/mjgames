<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐣 부활절 초콜릿 뽑기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:ital,wght@0,400;0,700;0,900;1,700&display=swap');

:root {
  --bg-top: #fff0f5;
  --bg-bot: #fde8c8;
  --text: #3a2518;
  --subtext: #a07860;
  --machine-body: #e8a830;
  --machine-dark: #b87818;
  --machine-light: #f8cc60;
  --chrome: #d8b870;
  --chrome-dark: #8a6830;
  --slot-dark: #200e04;
  --shadow: rgba(58,37,24,0.22);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(160deg, var(--bg-top) 0%, var(--bg-bot) 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 40px;
  overflow-x: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 15% 10%, rgba(255,200,220,0.35) 0%, transparent 45%),
    radial-gradient(ellipse at 85% 15%, rgba(180,230,255,0.30) 0%, transparent 40%),
    radial-gradient(ellipse at 50% 90%, rgba(200,240,210,0.30) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 70%, rgba(220,200,255,0.20) 0%, transparent 40%);
  pointer-events: none; z-index: 0;
}

.bg-eggs { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.bg-egg {
  position:absolute;
  opacity:0.12;
  animation: floatEgg linear infinite;
}
@keyframes floatEgg {
  0%   { transform: translateY(110vh) rotate(0deg); }
  100% { transform: translateY(-12vh) rotate(360deg); }
}

/* HEADER */
.header {
  position:relative; z-index:1;
  text-align:center;
  margin-top:30px; margin-bottom:4px;
}
.header h1 {
  font-family:'Fredoka One',cursive;
  font-size:2.3rem; color:var(--text);
  text-shadow: 0 2px 0 rgba(255,255,255,0.9), 0 4px 14px rgba(58,37,24,0.1);
  letter-spacing:1px;
}
.header p {
  font-size:0.84rem; color:var(--subtext);
  font-weight:700; margin-top:5px; letter-spacing:0.3px;
}

/* SCENE */
.scene {
  position:relative; z-index:1;
  width:340px;
  display:flex; flex-direction:column; align-items:center;
  margin-top:12px;
}

/* GLOBE */
.globe-outer {
  position:relative;
  width:230px; height:230px;
  z-index:4; margin-bottom:-16px;
  filter: drop-shadow(0 12px 30px rgba(58,37,24,0.22));
  animation: globeFloat 3.8s ease-in-out infinite;
}
.globe-outer.shake { animation: globeShake 0.36s ease-out; }

@keyframes globeFloat {
  0%,100% { transform:translateY(0); }
  50%      { transform:translateY(-5px); }
}
@keyframes globeShake {
  0%,100% { transform:translateX(0) rotate(0); }
  20% { transform:translateX(-4px) rotate(-1.2deg); }
  40% { transform:translateX(4px) rotate(1.2deg); }
  60% { transform:translateX(-3px); }
  80% { transform:translateX(3px); }
}

.globe-ring {
  position:absolute; inset:-5px; border-radius:50%;
  background:linear-gradient(145deg, var(--chrome) 0%, var(--chrome-dark) 65%);
  z-index:1;
  box-shadow: 0 4px 14px rgba(58,37,24,0.25), inset 0 1px 0 rgba(255,255,255,0.4);
}
.globe-ring::after {
  content:''; position:absolute; inset:6px; border-radius:50%;
  border:2px solid rgba(255,255,255,0.22);
}

.globe {
  position:absolute; inset:5px; border-radius:50%;
  background:
    radial-gradient(ellipse at 32% 28%, rgba(255,255,255,0.93) 0%, rgba(255,255,255,0.52) 22%, transparent 55%),
    radial-gradient(ellipse at 68% 72%, rgba(155,210,240,0.32) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(225,246,255,0.65) 0%, rgba(195,232,255,0.35) 100%);
  border:2.5px solid rgba(255,255,255,0.78);
  box-shadow:
    inset 0 0 45px rgba(145,198,238,0.22),
    inset -12px -12px 32px rgba(95,158,220,0.16),
    inset 7px 7px 20px rgba(255,255,255,0.62);
  overflow:hidden; z-index:2;
}

.candy-pile {
  position:absolute; bottom:0; left:0; right:0; height:95px; overflow:hidden;
}
.c-ball {
  position:absolute; border-radius:50%;
}

.globe-shine1 {
  position:absolute; top:14px; left:30px; width:74px; height:46px;
  background:radial-gradient(ellipse, rgba(255,255,255,0.96) 0%, transparent 100%);
  border-radius:50%; transform:rotate(-22deg);
  pointer-events:none; z-index:3;
}
.globe-shine2 {
  position:absolute; top:44px; left:20px; width:30px; height:18px;
  background:radial-gradient(ellipse, rgba(255,255,255,0.65) 0%, transparent 100%);
  border-radius:50%; pointer-events:none; z-index:3;
}

/* NECK */
.neck {
  width:72px; height:24px;
  background:linear-gradient(180deg, var(--chrome) 0%, var(--chrome-dark) 100%);
  border-radius:0 0 10px 10px;
  box-shadow:0 5px 12px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.35);
  z-index:3; position:relative;
}
.neck::before {
  content:''; position:absolute;
  top:4px; left:10px; right:10px; height:3px;
  background:rgba(255,255,255,0.28); border-radius:2px;
}

/* BODY */
.machine-body {
  width:230px;
  background:linear-gradient(175deg, var(--machine-light) 0%, var(--machine-body) 48%, var(--machine-dark) 100%);
  border-radius:20px 20px 30px 30px;
  padding:20px 26px 24px;
  box-shadow:
    0 12px 38px var(--shadow),
    inset 0 2px 0 rgba(255,255,255,0.42),
    inset -3px 0 0 rgba(0,0,0,0.07),
    inset  3px 0 0 rgba(255,255,255,0.14);
  display:flex; flex-direction:column; align-items:center; gap:16px;
  position:relative; z-index:3;
}
.machine-body::before {
  content:''; position:absolute;
  top:12px; left:18px; right:18px; height:2px;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.42), transparent);
  border-radius:1px;
}

.coin-slot {
  width:52px; height:7px;
  background:var(--slot-dark);
  border-radius:4px;
  box-shadow:inset 0 2px 5px rgba(0,0,0,0.85), 0 1px 0 rgba(255,255,255,0.22);
}

.slot-row {
  width:100%; display:flex; align-items:center; justify-content:center;
  position:relative;
}

.output-hole {
  width:76px; height:40px;
  background:linear-gradient(180deg,#180902,#2c1406);
  border-radius:12px 12px 30px 30px;
  box-shadow:inset 0 6px 16px rgba(0,0,0,0.85), 0 3px 7px rgba(0,0,0,0.38);
  display:flex; align-items:flex-end; justify-content:center;
  padding-bottom:5px; overflow:hidden;
}
.output-hole-inner {
  width:58px; height:26px;
  background:#0c0401;
  border-radius:8px 8px 24px 24px;
  box-shadow:inset 0 3px 9px rgba(0,0,0,0.95);
}

/* ═══════════════════════════
   LEVER
═══════════════════════════ */
.lever-assembly {
  position:absolute; right:-78px; top:50%;
  transform:translateY(-52%);
  cursor:pointer; user-select:none;
  -webkit-tap-highlight-color:transparent;
  z-index:10;
  display:flex; flex-direction:column; align-items:center;
}

.lever-svg { width:76px; height:118px; overflow:visible; }

.lever-arm {
  transform-origin:14px 76px;
  transition:transform 0.2s cubic-bezier(0.4,0,0.2,1);
}
.lever-assembly.pulling .lever-arm { transform:rotate(35deg); }

.lever-assembly.pulling .knob-circle {
  animation:knobPress 0.2s ease-out;
}
@keyframes knobPress {
  0%   { r:14; }
  45%  { r:11.5; }
  100% { r:14; }
}

.lever-tip {
  position:absolute; bottom:-22px;
  font-family:'Fredoka One',cursive;
  font-size:0.64rem; color:var(--subtext);
  letter-spacing:0.5px; white-space:nowrap;
}

/* BASE */
.machine-base {
  width:252px; height:30px;
  background:linear-gradient(180deg, var(--machine-dark) 0%, #7a4c10 100%);
  border-radius:0 0 22px 22px;
  box-shadow:0 9px 22px var(--shadow);
  position:relative; z-index:2; margin-top:-12px;
}
.machine-base::after {
  content:''; position:absolute;
  bottom:0; left:22px; right:22px; height:9px;
  background:linear-gradient(180deg,#5a3808,#3a2008);
  border-radius:0 0 18px 18px;
}

/* TRAY */
.tray {
  width:210px; height:46px;
  background:linear-gradient(180deg,#c08020,#8a5810);
  border-radius:0 0 26px 26px;
  box-shadow:0 7px 20px var(--shadow), inset 0 2px 7px rgba(0,0,0,0.38);
  display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden; margin-top:0;
}
.tray::before {
  content:''; position:absolute;
  top:7px; left:26px; right:26px; height:2px;
  background:rgba(255,255,255,0.14); border-radius:1px;
}
.tray-opening {
  width:74px; height:30px;
  background:linear-gradient(180deg,#0c0401,#180902);
  border-radius:37px;
  box-shadow:inset 0 4px 12px rgba(0,0,0,0.95);
}

/* DISPENSE */
.dispense-wrap {
  position:relative; z-index:1;
  width:310px; min-height:150px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  margin-top:6px;
}

.result-zone {
  display:flex; flex-direction:column;
  align-items:center; gap:10px;
  min-height:130px; justify-content:center;
}

.choco-wrap { display:none; flex-direction:column; align-items:center; gap:10px; }
.choco-wrap.show {
  display:flex;
  animation:resultPop 0.52s cubic-bezier(0.175,0.885,0.32,1.4) both;
}
@keyframes resultPop {
  0%   { opacity:0; transform:translateY(-36px) scale(0.45); }
  65%  { transform:translateY(7px) scale(1.1); }
  100% { opacity:1; transform:translateY(0) scale(1); }
}

.choco-ball-big {
  width:104px; height:104px; border-radius:50%;
  position:relative;
  box-shadow:
    0 12px 34px rgba(0,0,0,0.28),
    0 4px 10px rgba(0,0,0,0.18),
    inset -6px -6px 18px rgba(0,0,0,0.22),
    inset 5px 5px 16px rgba(255,255,255,0.58);
}
.choco-ball-big .b-shine1 {
  position:absolute; top:13px; left:20px; width:28px; height:18px;
  background:radial-gradient(ellipse,rgba(255,255,255,0.94) 0%,transparent 100%);
  border-radius:50%; transform:rotate(-28deg);
}
.choco-ball-big .b-shine2 {
  position:absolute; top:28px; left:15px; width:13px; height:8px;
  background:radial-gradient(ellipse,rgba(255,255,255,0.62) 0%,transparent 100%);
  border-radius:50%;
}
.b-spots { position:absolute; inset:0; border-radius:50%; overflow:hidden; }
.b-spot  { position:absolute; border-radius:50%; }

.choco-name {
  font-family:'Fredoka One',cursive;
  font-size:1.25rem; color:var(--text);
  text-shadow:0 1px 3px rgba(255,255,255,0.85);
  letter-spacing:0.5px;
}

.tags-row {
  display:flex; gap:7px; align-items:center;
  flex-wrap:wrap; justify-content:center;
}

.rarity-tag {
  font-family:'Fredoka One',cursive;
  font-size:0.77rem; padding:4px 14px;
  border-radius:20px;
  background:rgba(255,255,255,0.78); color:var(--text);
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  letter-spacing:0.5px;
}

.mut-tag {
  font-family:'Fredoka One',cursive;
  font-size:0.74rem; padding:4px 14px;
  border-radius:20px;
  background:linear-gradient(90deg,#ffb0c4,#ffdca0);
  color:#681828; display:none;
  box-shadow:0 2px 10px rgba(255,140,170,0.45);
  letter-spacing:0.5px;
}
.mut-tag.show {
  display:block;
  animation:tagPop 0.42s cubic-bezier(0.175,0.885,0.32,1.4) both;
}
@keyframes tagPop {
  0%   { transform:scale(0); opacity:0; }
  100% { transform:scale(1); opacity:1; }
}

/* PULL COUNT */
.pull-count {
  position:relative; z-index:1;
  font-family:'Fredoka One',cursive;
  font-size:0.82rem; color:var(--subtext);
  margin-top:4px; letter-spacing:0.5px;
}

/* HISTORY */
.history-section {
  position:relative; z-index:1;
  width:310px; margin-top:20px;
}
.history-section h3 {
  font-family:'Fredoka One',cursive;
  font-size:0.9rem; color:var(--subtext);
  text-align:center; margin-bottom:11px; letter-spacing:0.5px;
}
.hist-row {
  display:flex; flex-wrap:wrap; gap:8px; justify-content:center;
}
.h-ball {
  width:32px; height:32px; border-radius:50%;
  box-shadow:
    0 3px 9px rgba(0,0,0,0.2),
    inset -2px -2px 5px rgba(0,0,0,0.22),
    inset 2px 2px 5px rgba(255,255,255,0.58);
  position:relative; overflow:hidden;
  flex-shrink:0; transition:transform 0.15s ease;
}
.h-ball:hover { transform:scale(1.18); }
.h-shine {
  position:absolute; top:4px; left:6px;
  width:11px; height:7px;
  background:radial-gradient(ellipse,rgba(255,255,255,0.88) 0%,transparent 100%);
  border-radius:50%; transform:rotate(-20deg);
}
.h-spots { position:absolute; inset:0; border-radius:50%; overflow:hidden; }

/* GUIDE */
.guide-section {
  position:relative; z-index:1;
  width:310px; margin-top:22px; margin-bottom:36px;
  background:rgba(255,255,255,0.62);
  border-radius:22px; padding:20px 22px;
  box-shadow:0 7px 26px rgba(58,37,24,0.1), inset 0 1px 0 rgba(255,255,255,0.92);
  backdrop-filter:blur(10px);
}
.guide-section h3 {
  font-family:'Fredoka One',cursive;
  font-size:0.97rem; color:var(--text);
  text-align:center; margin-bottom:15px; letter-spacing:0.5px;
}
.g-row {
  display:flex; align-items:center; gap:12px;
  margin-bottom:10px; font-size:0.83rem;
}
.g-dot {
  width:23px; height:23px; border-radius:50%; flex-shrink:0;
  box-shadow:inset -2px -2px 4px rgba(0,0,0,0.2),inset 1px 1px 4px rgba(255,255,255,0.6),0 2px 7px rgba(0,0,0,0.14);
}
.g-name { flex:1; font-weight:900; color:var(--text); }
.g-prob { font-weight:700; color:var(--subtext); font-size:0.74rem; }
.g-divider {
  border:none; border-top:1.5px dashed rgba(160,120,96,0.22); margin:9px 0;
}

/* PARTICLES */
.particle {
  position:fixed; pointer-events:none; border-radius:50%; z-index:999;
  animation:pFloat ease-out forwards;
}
@keyframes pFloat {
  0%   { opacity:1; transform:translate(0,0) scale(1) rotate(0deg); }
  100% { opacity:0; transform:translate(var(--dx),var(--dy)) scale(0.15) rotate(var(--dr)); }
}

.gold-flash {
  position:fixed; inset:0; pointer-events:none; z-index:998;
  background:radial-gradient(ellipse at 50% 38%, rgba(255,218,56,0.52), transparent 68%);
  animation:gFlash 0.85s ease-out forwards;
}
@keyframes gFlash {
  0%   { opacity:0; }
  18%  { opacity:1; }
  100% { opacity:0; }
}
</style>
</head>
<body>

<div class="bg-eggs" id="bgEggs"></div>

<div class="header">
  <h1>🐣 부활절 초콜릿 뽑기</h1>
  <p>레버를 당겨서 행운의 초콜릿을 뽑아봐!</p>
</div>

<div class="scene">

  <!-- Globe -->
  <div class="globe-outer" id="globeOuter">
    <div class="globe-ring"></div>
    <div class="globe" id="globeEl">
      <div class="candy-pile" id="candyPile"></div>
      <div class="globe-shine1"></div>
      <div class="globe-shine2"></div>
    </div>
  </div>

  <div class="neck"></div>

  <div class="machine-body" id="machineBody">
    <div class="coin-slot"></div>

    <div class="slot-row">
      <div class="output-hole"><div class="output-hole-inner"></div></div>

      <!-- LEVER -->
      <div class="lever-assembly" id="leverAssembly" onclick="doPull()">
        <svg class="lever-svg" viewBox="0 0 76 118" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="sg" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%"   stop-color="#9a6010"/>
              <stop offset="30%"  stop-color="#f0c848"/>
              <stop offset="60%"  stop-color="#e0b030"/>
              <stop offset="100%" stop-color="#8a5810"/>
            </linearGradient>
            <linearGradient id="pg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%"   stop-color="#f0d870"/>
              <stop offset="100%" stop-color="#9a6820"/>
            </linearGradient>
            <radialGradient id="kg" cx="36%" cy="32%" r="58%">
              <stop offset="0%"   stop-color="#ff9ec4"/>
              <stop offset="42%"  stop-color="#e83070"/>
              <stop offset="100%" stop-color="#9a1040"/>
            </radialGradient>
            <radialGradient id="ks" cx="34%" cy="28%" r="48%">
              <stop offset="0%"   stop-color="rgba(255,255,255,0.82)"/>
              <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
            </radialGradient>
            <filter id="lshadow" x="-40%" y="-20%" width="180%" height="160%">
              <feDropShadow dx="2.5" dy="4" stdDeviation="3.5" flood-color="rgba(58,37,24,0.38)"/>
            </filter>
            <filter id="pivotShad" x="-60%" y="-60%" width="220%" height="220%">
              <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="rgba(58,37,24,0.4)"/>
            </filter>
          </defs>

          <!-- pivot mount (stays fixed) -->
          <rect x="0" y="64" width="18" height="24" rx="5" fill="url(#pg)" filter="url(#pivotShad)"/>
          <rect x="3" y="67" width="12" height="18" rx="3" fill="#c09030"/>
          <circle cx="9" cy="76" r="6" fill="url(#pg)" filter="url(#pivotShad)"/>
          <circle cx="9" cy="76" r="4" fill="#d0a040"/>
          <circle cx="9" cy="76" r="2.2" fill="#a07020"/>
          <circle cx="7.2" cy="74.2" r="1.2" fill="rgba(255,255,255,0.55)"/>

          <!-- arm (rotates around pivot center 14,76) -->
          <g class="lever-arm" id="leverArm">
            <!-- stick body -->
            <rect x="10" y="10" width="9" height="68" rx="4.5" fill="url(#sg)" filter="url(#lshadow)"/>
            <!-- stick highlight -->
            <rect x="12.5" y="15" width="3" height="54" rx="1.5" fill="rgba(255,255,255,0.38)"/>
            <!-- stick bottom cap -->
            <ellipse cx="14.5" cy="78" rx="4.5" ry="3" fill="#9a6010"/>

            <!-- knob -->
            <g id="leverKnobG">
              <!-- shadow under knob -->
              <ellipse cx="26" cy="22" rx="14" ry="5.5" fill="rgba(58,37,24,0.22)"/>
              <!-- knob body -->
              <circle class="knob-circle" cx="22" cy="15" r="14" fill="url(#kg)" filter="url(#lshadow)"/>
              <!-- knob rim -->
              <circle cx="22" cy="15" r="14" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.8"/>
              <!-- knob shine -->
              <ellipse cx="16.5" cy="9.5" rx="7" ry="4.5" fill="url(#ks)"/>
              <!-- knob center -->
              <circle cx="22" cy="15" r="3.5" fill="rgba(255,255,255,0.18)"/>
            </g>
          </g>
        </svg>
        <div class="lever-tip">👆 당기기!</div>
      </div>
      <!-- END LEVER -->
    </div>
  </div>

  <div class="machine-base"></div>
  <div class="tray"><div class="tray-opening"></div></div>
</div>

<!-- RESULT -->
<div class="dispense-wrap">
  <div class="result-zone">
    <div class="choco-wrap" id="chocoWrap">
      <div class="choco-ball-big" id="chocoBall">
        <div class="b-spots" id="bSpots"></div>
        <div class="b-shine1"></div>
        <div class="b-shine2"></div>
      </div>
      <div class="choco-name" id="chocoName"></div>
      <div class="tags-row">
        <div class="rarity-tag" id="rarityTag"></div>
        <div class="mut-tag" id="mutTag">✨ 점박이 변이!</div>
      </div>
    </div>
  </div>
</div>

<div class="pull-count" id="pullCount">총 0번 뽑음</div>

<div class="history-section">
  <h3>🍬 뽑기 기록</h3>
  <div class="hist-row" id="histRow"></div>
</div>

<div class="guide-section">
  <h3>희귀도 가이드</h3>
  <div class="g-row">
    <div class="g-dot" style="background:linear-gradient(135deg,#7ecce8,#3a9dc8)"></div>
    <span class="g-name">파랑 초콜릿</span>
    <span class="g-prob">커먼 — 가장 흔함</span>
  </div>
  <div class="g-row">
    <div class="g-dot" style="background:linear-gradient(135deg,#80d8b0,#38b880)"></div>
    <span class="g-name">초록 초콜릿</span>
    <span class="g-prob">언커먼</span>
  </div>
  <div class="g-row">
    <div class="g-dot" style="background:linear-gradient(135deg,#ffb0c4,#f86898)"></div>
    <span class="g-name">핑크 초콜릿</span>
    <span class="g-prob">레어 💜</span>
  </div>
  <div class="g-row">
    <div class="g-dot" style="background:linear-gradient(135deg,#c898e8,#9448d0)"></div>
    <span class="g-name">보라 초콜릿</span>
    <span class="g-prob">에픽 🔮</span>
  </div>
  <div class="g-row">
    <div class="g-dot" style="background:linear-gradient(135deg,#ffe055,#e89800)"></div>
    <span class="g-name">골드 초콜릿</span>
    <span class="g-prob">전설 ⭐ — 가장 희귀</span>
  </div>
  <hr class="g-divider">
  <div class="g-row">
    <div class="g-dot" style="background:linear-gradient(135deg,#ffe8f0,#ffb8cc);border:2px dashed rgba(220,100,140,0.5)"></div>
    <span class="g-name">점박이 변이</span>
    <span class="g-prob">1/5 추가 확률 (골드 제외)</span>
  </div>
</div>

<script>
const TYPES = [
  { id:'blue',   name:'파랑 초콜릿', weight:12,  rarity:'커먼',
    grad:'linear-gradient(145deg,#7ecce8,#3a9dc8)',
    spotBase:'rgba(20,80,160,',   particles:['#7ecce8','#b0e0f8','#3a9dc8','#aad8f0'] },
  { id:'green',  name:'초록 초콜릿', weight:6,   rarity:'언커먼',
    grad:'linear-gradient(145deg,#80d8b0,#38b880)',
    spotBase:'rgba(10,110,60,',   particles:['#80d8b0','#b8eed8','#38b880','#60d0a0'] },
  { id:'pink',   name:'핑크 초콜릿', weight:3,   rarity:'레어 💜',
    grad:'linear-gradient(145deg,#ffb0c4,#f86898)',
    spotBase:'rgba(180,30,80,',   particles:['#ffb0c4','#ffd8e8','#f86898','#ff90b8'] },
  { id:'purple', name:'보라 초콜릿', weight:2.4, rarity:'에픽 🔮',
    grad:'linear-gradient(145deg,#c898e8,#9448d0)',
    spotBase:'rgba(80,10,140,',   particles:['#c898e8','#e0c8f8','#9448d0','#b070e0'] },
  { id:'gold',   name:'골드 초콜릿', weight:2,   rarity:'전설 ⭐',
    grad:'linear-gradient(145deg,#ffe870,#e89800)',
    spotBase:null, noMutation:true,
    particles:['#ffe870','#fff0a0','#e89800','#ffd040','#fffac0'] },
];
const TOTAL_W = TYPES.reduce((s,t)=>s+t.weight,0);
let pullCount=0, busy=false;

// BG eggs
(()=>{
  const emojis=['🥚','🐣','🐥','🌸','🌷','🍫','🌼'];
  const wrap=document.getElementById('bgEggs');
  for(let i=0;i<16;i++){
    const e=document.createElement('div');
    e.className='bg-egg';
    e.textContent=emojis[i%emojis.length];
    e.style.cssText=`left:${Math.random()*95}%;font-size:${1+Math.random()*1.3}rem;animation-duration:${13+Math.random()*20}s;animation-delay:${-Math.random()*22}s;`;
    wrap.appendChild(e);
  }
})();

// Candy pile
(()=>{
  const pile=document.getElementById('candyPile');
  const cols=['#7ecce8','#80d8b0','#ffb0c4','#c898e8','#ffe870','#f86898','#38b880','#b0e0f8','#e0c8f8'];
  for(let i=0;i<34;i++){
    const b=document.createElement('div');
    b.className='c-ball';
    const sz=13+Math.random()*17;
    b.style.cssText=`width:${sz}px;height:${sz}px;background:${cols[i%cols.length]};left:${Math.random()*188}px;bottom:${Math.random()*72}px;box-shadow:inset -2px -2px 5px rgba(0,0,0,0.24),inset 1px 1px 4px rgba(255,255,255,0.62);`;
    pile.appendChild(b);
  }
})();

function pick(){
  let r=Math.random()*TOTAL_W;
  for(const t of TYPES){ r-=t.weight; if(r<=0) return t; }
  return TYPES[TYPES.length-1];
}

function doPull(){
  if(busy) return;
  busy=true;

  const lever=document.getElementById('leverAssembly');
  const globe=document.getElementById('globeOuter');

  lever.classList.add('pulling');
  globe.classList.add('shake');
  setTimeout(()=>{ lever.classList.remove('pulling'); globe.classList.remove('shake'); },360);

  document.getElementById('chocoWrap').classList.remove('show');

  setTimeout(()=>{
    const type=pick();
    const mut=!type.noMutation && Math.random()<0.2;
    pullCount++;
    document.getElementById('pullCount').textContent=`총 ${pullCount}번 뽑음`;
    showResult(type,mut);
    addHistory(type,mut);
    spawnParticles(type);
    if(type.id==='gold'){
      const f=document.createElement('div');
      f.className='gold-flash';
      f.addEventListener('animationend',()=>f.remove());
      document.body.appendChild(f);
    }
    busy=false;
  },380);
}

function showResult(type,mut){
  const ball=document.getElementById('chocoBall');
  const spots=document.getElementById('bSpots');
  ball.style.background=type.grad;
  document.getElementById('chocoName').textContent=type.name;
  document.getElementById('rarityTag').textContent=type.rarity;

  spots.innerHTML='';
  if(mut && type.spotBase){
    for(let i=0;i<10;i++){
      const s=document.createElement('div');
      s.className='b-spot';
      const sz=7+Math.random()*20;
      s.style.cssText=`width:${sz}px;height:${sz}px;background:${type.spotBase}0.38);left:${4+Math.random()*72}px;top:${4+Math.random()*72}px;`;
      spots.appendChild(s);
    }
    document.getElementById('mutTag').classList.add('show');
  } else {
    document.getElementById('mutTag').classList.remove('show');
  }

  const w=document.getElementById('chocoWrap');
  w.classList.remove('show');
  void w.offsetWidth;
  w.classList.add('show');
}

function addHistory(type,mut){
  const row=document.getElementById('histRow');
  const b=document.createElement('div');
  b.className='h-ball';
  b.style.background=type.grad;
  b.title=type.name+(mut?' (점박이)':'');

  const shine=document.createElement('div');
  shine.className='h-shine';
  b.appendChild(shine);

  if(mut && type.spotBase){
    const sp=document.createElement('div');
    sp.className='h-spots';
    for(let i=0;i<4;i++){
      const s=document.createElement('div');
      s.style.cssText=`position:absolute;border-radius:50%;width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;background:${type.spotBase}0.34);left:${Math.random()*24}px;top:${Math.random()*24}px;`;
      sp.appendChild(s);
    }
    b.appendChild(sp);
  }

  row.insertBefore(b,row.firstChild);
  while(row.children.length>32) row.removeChild(row.lastChild);
}

function spawnParticles(type){
  const lv=document.getElementById('leverAssembly');
  const rect=lv.getBoundingClientRect();
  const ox=rect.left+rect.width*0.38;
  const oy=rect.top+rect.height*0.12;
  const n=type.id==='gold'?26:15;

  for(let i=0;i<n;i++){
    const p=document.createElement('div');
    p.className='particle';
    const col=type.particles[i%type.particles.length];
    const sz=5+Math.random()*11;
    const ang=(Math.random()*280-140)*(Math.PI/180);
    const dist=90+Math.random()*130;
    p.style.cssText=`left:${ox}px;top:${oy}px;width:${sz}px;height:${sz}px;background:${col};--dx:${Math.cos(ang)*dist}px;--dy:${-Math.abs(Math.sin(ang)*dist)-30}px;--dr:${Math.random()*560-280}deg;animation-duration:${0.75+Math.random()*0.65}s;animation-delay:${Math.random()*0.13}s;box-shadow:0 0 ${sz*0.7}px ${col};`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1400);
  }
}
</script>
</body>
</html>
