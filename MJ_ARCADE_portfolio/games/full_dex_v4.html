  ctx.strokeStyle='rgba(200,150,50,0.7)';ctx.lineWidth=2;ctx.stroke();
  // 빛 발사
  ctx.save();ctx.globalAlpha=0.07+Math.sin(t*3)*0.02;
  ctx.beginPath();ctx.moveTo(lensX,lensY);ctx.lineTo(lensX-40,lensY-22);ctx.lineTo(lensX-40,lensY+22);ctx.closePath();
  ctx.fillStyle='rgba(255,240,160,1)';ctx.fill();ctx.restore();
  // 이빨 (경통 위아래)
  var teeth2=[{h:6},{h:9},{h:6},{h:7}];
  teeth2.forEach(function(tooth,i){
    var tx2=lensX-2+i*5.5;
    // 위 이빨
    ctx.beginPath();ctx.moveTo(tx2,lensY-6);ctx.lineTo(tx2+2.5,lensY-6-tooth.h);ctx.lineTo(tx2+5,lensY-6);ctx.closePath();
    ctx.fillStyle='#f0e8d0';ctx.fill();ctx.strokeStyle='rgba(100,70,20,0.3)';ctx.lineWidth=0.7;ctx.stroke();
    // 아래 이빨
    ctx.beginPath();ctx.moveTo(tx2,lensY+6);ctx.lineTo(tx2+2.5,lensY+6+tooth.h);ctx.lineTo(tx2+5,lensY+6);ctx.closePath();
    ctx.fillStyle='#f0e8d0';ctx.fill();ctx.strokeStyle='rgba(100,70,20,0.3)';ctx.lineWidth=0.7;ctx.stroke();
  });

  // 키득 이펙트
  if(isClap&&cc<0.15){
    var pa=(0.15-cc)/0.15;
    ctx.font=(8+pa*3)+'px monospace';ctx.fillStyle='rgba(200,255,200,'+pa*0.8+')';
    ctx.textAlign='center';ctx.fillText('키득ㅋ',cx+22+shX,bby2-8);
    // 파티클
    for(var i=0;i<4;i++){
      var pa2b=(i/4)*Math.PI*2;var pr2b=(1-pa)*16;
      ctx.beginPath();ctx.arc(cx+shX+Math.cos(pa2b)*pr2b,by+Math.sin(pa2b)*pr2b*0.4,1.5,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,'+(pa*0.4)+')';ctx.fill();
    }
  }
}

function drawUBIQUITI_CYBER(ctx, t) {
  var cx=60,cy=62;
  ctx.clearRect(0,0,120,120);
  var bob=Math.sin(t*1.7)*2.5,by=cy+bob;
  var lCX=cx-22,rCX=cx+22,lR=18;
  var glitch=Math.sin(t*7)>0.8;
  var glitch2=Math.sin(t*11)>0.88;

  // 글리치 배경
  if(glitch){
    ctx.save();ctx.globalAlpha=0.15;
    var gy=by-6+Math.floor(Math.random()*12)-6;
    ctx.fillStyle='#ff44cc';ctx.fillRect(cx-lR*2.5,gy,lR*5,3);
    ctx.fillStyle='#44aaff';ctx.fillRect(cx-lR*2.5,gy+8,lR*5,2);
    ctx.restore();
  }

  // 글로우
  [[lCX,'#4488ff'],[rCX,'#ff44cc']].forEach(function(item){
    var lx=item[0],col=item[1];
    var gr=ctx.createRadialGradient(lx,by,4,lx,by,lR+12);
    gr.addColorStop(0,col.replace('#','rgba(').replace(/(..)(..)(..)$/,function(m,r,g,b){return parseInt(r,16)+','+parseInt(g,16)+','+parseInt(b,16)+',0.18)';}));
    gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(lx,by,lR+12,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
  });

  // 렌즈 두 개
  [[lCX,'#0055ff','#4488ff'],[rCX,'#cc0088','#ff44cc']].forEach(function(item,li){
    var lx=item[0],dark=item[1],bright=item[2];
    ctx.beginPath();ctx.arc(lx,by,lR,0,Math.PI*2);
    ctx.fillStyle='rgba(0,5,20,0.92)';ctx.fill();
    // HUD 격자
    ctx.save();ctx.globalAlpha=0.1;
    for(var i=-2;i<=2;i++){
      ctx.beginPath();ctx.moveTo(lx-lR,by+i*6);ctx.lineTo(lx+lR,by+i*6);
      ctx.moveTo(lx+i*6,by-lR);ctx.lineTo(lx+i*6,by+lR);
      ctx.strokeStyle=bright;ctx.lineWidth=0.5;ctx.stroke();
    }
    ctx.restore();
    // 프레임
    ctx.beginPath();ctx.arc(lx,by,lR,0,Math.PI*2);
    ctx.strokeStyle=bright;ctx.lineWidth=2.5;ctx.stroke();
    // 글리치 프레임
    if(glitch2){
      ctx.save();ctx.globalAlpha=0.6;
      ctx.beginPath();ctx.arc(lx+(Math.random()-0.5)*4,by,lR,0,Math.PI*2);
      ctx.strokeStyle=li===0?'#ff44cc':'#4488ff';ctx.lineWidth=1;ctx.stroke();
      ctx.restore();
    }
    // 내부 데이터 링
    for(var r2=lR-5;r2>4;r2-=5){
      ctx.beginPath();ctx.arc(lx,by,r2,0,Math.PI*2);
      ctx.strokeStyle=bright.replace('#','rgba(').replace(/(..)(..)(..)$/,function(m,r,g,b){
        return parseInt(r,16)+','+parseInt(g,16)+','+parseInt(b,16)+',0.12)';});
      ctx.lineWidth=0.8;ctx.stroke();
    }
  });

  // 브릿지 + 다리
  ctx.beginPath();ctx.moveTo(lCX+lR,by-2);ctx.quadraticCurveTo(cx,by-8,rCX-lR,by-2);
  var bridgeG=ctx.createLinearGradient(lCX+lR,by,rCX-lR,by);
  bridgeG.addColorStop(0,'#4488ff');bridgeG.addColorStop(1,'#ff44cc');
  ctx.strokeStyle=bridgeG;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
  [[lCX-lR,'#4488ff'],[rCX+lR,'#ff44cc']].forEach(function(item){
    var lx=item[0],col=item[1];
    ctx.beginPath();ctx.moveTo(lx,by);ctx.quadraticCurveTo(lx+(lx<cx?-8:8),by-2,lx+(lx<cx?-18:18),by+4);
    ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
  });

  // 왼쪽 — 사이버 눈 (파랑)
  var blink=Math.sin(t*1.5)>0.9;
  if(!blink){
    ctx.beginPath();ctx.arc(lCX,by,11,0,Math.PI*2);
    ctx.fillStyle='rgba(180,220,255,0.9)';ctx.fill();
    var pd=Math.sin(t*1.8)*1.5;
    ctx.beginPath();ctx.arc(lCX+pd,by,6.5,0,Math.PI*2);
    var ig=ctx.createRadialGradient(lCX+pd,by,0,lCX+pd,by,6.5);
    ig.addColorStop(0,'#ffffff');ig.addColorStop(0.3,'#88ccff');ig.addColorStop(1,'#0044aa');
    ctx.fillStyle=ig;ctx.fill();
    // 픽셀 동공
    ctx.fillStyle='#000510';ctx.fillRect(lCX+pd-2,by-2,4,4);
    ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fillRect(lCX+pd+1,by-2,1.5,1.5);
    // 스캔라인
    ctx.beginPath();ctx.moveTo(lCX-10,by+Math.sin(t*8)*3);ctx.lineTo(lCX+10,by+Math.sin(t*8)*3);
    ctx.strokeStyle='rgba(100,200,255,0.3)';ctx.lineWidth=1;ctx.stroke();
  } else {
    ctx.beginPath();ctx.moveTo(lCX-10,by);ctx.lineTo(lCX+10,by);
    ctx.strokeStyle='rgba(100,200,255,0.8)';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
  }

  // 오른쪽 — 핑크 표적
  var tR=t*0.5,pulse2=0.5+Math.sin(t*3)*0.3;
  [10,6.5,3].forEach(function(r3,i){
    ctx.beginPath();ctx.arc(rCX,by,r3,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,68,200,'+(0.35+i*0.2+pulse2*0.1)+')';ctx.lineWidth=i===2?1.5:1;ctx.stroke();
  });
  ctx.save();ctx.translate(rCX,by);ctx.rotate(tR);
  [0,Math.PI/2].forEach(function(a){
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*4,Math.sin(a)*4);ctx.lineTo(Math.cos(a)*13,Math.sin(a)*13);
    ctx.moveTo(-Math.cos(a)*4,-Math.sin(a)*4);ctx.lineTo(-Math.cos(a)*13,-Math.sin(a)*13);
    ctx.strokeStyle='rgba(255,68,200,'+(0.6+pulse2*0.2)+')';ctx.lineWidth=1.2;ctx.lineCap='round';ctx.stroke();
  });
  ctx.beginPath();ctx.arc(0,0,2,0,Math.PI*2);ctx.fillStyle='#ff44cc';ctx.fill();
  ctx.restore();
  // 핑크 스캔 섹터
  ctx.save();ctx.translate(rCX,by);ctx.rotate(t*1.5);
  ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,lR-3,-0.18,0.18);ctx.closePath();
  ctx.fillStyle='rgba(255,68,200,0.1)';ctx.fill();ctx.restore();

  // 글로우 + 글리치 효과
  var g=ctx.createRadialGradient(cx,by,10,cx,by,58);
  g.addColorStop(0,'transparent');g.addColorStop(0.5,'rgba(68,136,255,0.04)');g.addColorStop(1,'rgba(255,68,200,0.04)');
  ctx.beginPath();ctx.arc(cx,by,58,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
}

function drawHUAWEI_DRAWER(ctx, t) {
  if(!ctx) return;
  var cx=60,cy=60;
  ctx.clearRect(0,0,120,120);
  var bob=Math.sin(t*1.5)*1.5,by=cy+bob;
  var FW=62,FH=90,fx=cx-FW/2,fy=by-FH/2;
  var dH=FH/3;

  var tc=(t*0.2)%1,d1=tc<0.25?tc/0.25:tc<0.55?1:1-(tc-0.55)/0.45;d1=d1*d1*(3-2*d1);
  var tc2=((t+2)*0.16)%1,d2=tc2<0.25?tc2/0.25:tc2<0.55?1:1-(tc2-0.55)/0.45;d2=d2*d2*(3-2*d2);
  var tc3=((t+4)*0.13)%1,d3=tc3<0.25?tc3/0.25:tc3<0.55?1:1-(tc3-0.55)/0.45;d3=d3*d3*(3-2*d3);

  // 본체
  var bg=ctx.createLinearGradient(fx,fy,fx+FW,fy+FH);
  bg.addColorStop(0,'#f5f0e8');bg.addColorStop(0.5,'#ffffff');bg.addColorStop(1,'#e8e0d0');
  ctx.beginPath();
  ctx.moveTo(fx+6,fy);ctx.lineTo(fx+FW-6,fy);ctx.quadraticCurveTo(fx+FW,fy,fx+FW,fy+6);
  ctx.lineTo(fx+FW,fy+FH-6);ctx.quadraticCurveTo(fx+FW,fy+FH,fx+FW-6,fy+FH);
  ctx.lineTo(fx+6,fy+FH);ctx.quadraticCurveTo(fx,fy+FH,fx,fy+FH-6);
  ctx.lineTo(fx,fy+6);ctx.quadraticCurveTo(fx,fy,fx+6,fy);
  ctx.closePath();ctx.fillStyle=bg;ctx.fill();
  ctx.strokeStyle='rgba(180,160,120,0.7)';ctx.lineWidth=1.5;ctx.stroke();

  // 서랍 구분선
  [1,2].forEach(function(i){
    ctx.beginPath();ctx.moveTo(fx+3,fy+dH*i);ctx.lineTo(fx+FW-3,fy+dH*i);
    ctx.strokeStyle='rgba(160,140,100,0.5)';ctx.lineWidth=1.5;ctx.stroke();
  });

  [{y:fy,open:d1},{y:fy+dH,open:d2},{y:fy+dH*2,open:d3}].forEach(function(dr,di){
    if(dr.open>0.05){
      ctx.save();ctx.beginPath();ctx.rect(fx+2,dr.y+2,FW-4,dH-2);ctx.clip();
      ctx.fillStyle='rgba(220,210,180,'+dr.open+')';ctx.fillRect(fx+2,dr.y+2,FW-4,dH-2);
      if(di===0){
        var al=Math.max(0,(dr.open-0.3)/0.7);
        if(al>0){
          ctx.globalAlpha=al;
          var ey2=dr.y+dH*0.42;
          [-8,8].forEach(function(ox){
            ctx.beginPath();ctx.arc(cx+ox,ey2,5,0,Math.PI*2);ctx.fillStyle='#fffde0';ctx.fill();
            ctx.beginPath();ctx.arc(cx+ox,ey2,2.8,0,Math.PI*2);
            var ig=ctx.createRadialGradient(cx+ox,ey2,0,cx+ox,ey2,2.8);
            ig.addColorStop(0,'#ffe066');ig.addColorStop(1,'#cc8800');
            ctx.fillStyle=ig;ctx.fill();
            ctx.beginPath();ctx.arc(cx+ox,ey2,1.2,0,Math.PI*2);ctx.fillStyle='#1a0a00';ctx.fill();
          });
          var armL=Math.max(0,(dr.open-0.1)/0.9);armL=armL*armL*(3-2*armL)*20;
          var ay=dr.y+dH*0.72;
          ctx.beginPath();ctx.moveTo(fx+4,ay);ctx.lineTo(fx-armL+4,ay-3);
          ctx.strokeStyle='#ffdd00';ctx.lineWidth=6;ctx.lineCap='round';ctx.stroke();
          ctx.beginPath();ctx.arc(fx-armL+3,ay,4,0,Math.PI*2);ctx.fillStyle='#ffdd00';ctx.fill();
          ctx.beginPath();ctx.moveTo(fx+FW-4,ay);ctx.lineTo(fx+FW+armL-4,ay-3);
          ctx.strokeStyle='#ffdd00';ctx.lineWidth=6;ctx.lineCap='round';ctx.stroke();
          ctx.beginPath();ctx.arc(fx+FW+armL-3,ay,4,0,Math.PI*2);ctx.fillStyle='#ffdd00';ctx.fill();
          ctx.globalAlpha=1;
        }
      } else if(di===1){
        var sw=cx,swY=dr.y+dH/2,swR=Math.min(FW/2-6,dH/2-4),swA=t*2;
        var cols=[[255,0,0],[255,120,0],[255,220,0],[0,220,60],[0,120,255],[100,0,255],[255,0,200]];
        for(var ring=0;ring<7;ring++){
          for(var s=0;s<20;s++){
            var a1=swA+(s/20)*Math.PI*2+ring*0.5,a2=swA+((s+1)/20)*Math.PI*2+ring*0.5;
            var r1=swR*(ring/7),r2=swR*((ring+1.05)/7);
            var c=cols[(ring*3+s)%cols.length];
            ctx.beginPath();ctx.moveTo(sw+Math.cos(a1)*r1,swY+Math.sin(a1)*r1);
            ctx.arc(sw,swY,r2,a1,a2);ctx.arc(sw,swY,r1,a2,a1,true);ctx.closePath();
            ctx.fillStyle='rgba('+c[0]+','+c[1]+','+c[2]+','+dr.open+')';ctx.fill();
          }
        }
      } else {
        ctx.globalAlpha=dr.open;
        for(var i=0;i<8;i++){
          var sa=t*3+i*0.8,sr2=7+Math.sin(t*5+i)*3;
          ctx.beginPath();ctx.arc(cx+Math.cos(sa)*sr2,dr.y+dH/2+Math.sin(sa)*sr2*0.6,1.5,0,Math.PI*2);
          ctx.fillStyle='rgba(255,220,100,'+(0.4+Math.sin(t*8+i)*0.4)+')';ctx.fill();
        }
        ctx.globalAlpha=1;
      }
      ctx.restore();
    }
    // 서랍 문 (앞으로 당김)
    var pull=dr.open*16;
    ctx.save();ctx.beginPath();ctx.rect(fx+2,dr.y+2,FW-4,dH-2);ctx.clip();
    var dg=ctx.createLinearGradient(fx,dr.y,fx+FW,dr.y);
    dg.addColorStop(0,'#eeeeee');dg.addColorStop(0.3,'#ffffff');dg.addColorStop(1,'#dddddd');
    ctx.beginPath();ctx.rect(fx+2,dr.y+2+pull,FW-4,dH-4);ctx.fillStyle=dg;ctx.fill();
    ctx.strokeStyle='rgba(160,140,100,0.4)';ctx.lineWidth=1;ctx.stroke();
    ctx.beginPath();ctx.arc(cx,dr.y+dH/2+pull,5,0,Math.PI*2);
    ctx.fillStyle='#c0a860';ctx.fill();ctx.strokeStyle='#8B7030';ctx.lineWidth=1;ctx.stroke();
    ctx.restore();
  });

  // 다리
  [-18,18].forEach(function(ox){
    ctx.beginPath();ctx.rect(cx+ox-4,fy+FH,8,7);ctx.fillStyle='#c8b880';ctx.fill();
  });
  ctx.beginPath();
  ctx.moveTo(fx+6,fy);ctx.lineTo(fx+FW-6,fy);ctx.quadraticCurveTo(fx+FW,fy,fx+FW,fy+6);
  ctx.lineTo(fx+FW,fy+FH-6);ctx.quadraticCurveTo(fx+FW,fy+FH,fx+FW-6,fy+FH);
  ctx.lineTo(fx+6,fy+FH);ctx.quadraticCurveTo(fx,fy+FH,fx,fy+FH-6);
  ctx.lineTo(fx,fy+6);ctx.quadraticCurveTo(fx,fy,cx-FW/2+6,fy);
  ctx.closePath();ctx.strokeStyle='rgba(140,120,80,0.6)';ctx.lineWidth=1.5;ctx.stroke();
}

function drawJUNK(ctx, t) {
  var cx=60, cy=62;
  ctx.clearRect(0,0,120,120);

  var bob = Math.sin(t*1.8)*2;
  var by = cy + bob;

  // ── 태엽 (뒤에, 먼저 그림) ──
  var springX = cx+18, springY = by-10;
  var springAngle = t * 1.2;

  // 태엽 기둥
  ctx.beginPath();
  ctx.moveTo(springX, by-2);
  ctx.lineTo(springX, by-28);
  ctx.strokeStyle='#666';ctx.lineWidth=4;ctx.lineCap='round';ctx.stroke();
  ctx.strokeStyle='#888';ctx.lineWidth=2;ctx.stroke();

  // 태엽 코일
  ctx.save();
  ctx.translate(springX, by-28);
  ctx.rotate(springAngle);
  for(var i=0;i<3;i++){
    var r=6+i*3;
    var alpha=0.8-i*0.2;
    ctx.beginPath();
    ctx.arc(0,0,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(180,140,40,'+alpha+')';
    ctx.lineWidth=2.5-i*0.5;
    ctx.stroke();
  }
  // 태엽 날개
  for(var i=0;i<4;i++){
    var a=(i/4)*Math.PI*2+springAngle;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*5,Math.sin(a)*5);
    ctx.lineTo(Math.cos(a)*13,Math.sin(a)*13);
    ctx.lineTo(Math.cos(a+0.3)*13,Math.sin(a+0.3)*13);
    ctx.closePath();
    ctx.fillStyle='rgba(200,160,40,0.8)';ctx.fill();
    ctx.strokeStyle='rgba(140,100,20,0.6)';ctx.lineWidth=0.8;ctx.stroke();
  }
  // 중심 나사
  ctx.beginPath();ctx.arc(0,0,3.5,0,Math.PI*2);
  ctx.fillStyle='#aaa';ctx.fill();
  ctx.strokeStyle='#666';ctx.lineWidth=1;ctx.stroke();
  ctx.restore();

  // ── 몸체 (울퉁불퉁 고철) ──
  // 불규칙한 덩어리 형태
  ctx.beginPath();
  var pts=[
    [cx-26,by-8],[cx-22,by-20],[cx-14,by-26],[cx-4,by-28],
    [cx+8,by-24],[cx+18,by-18],[cx+20,by-6],[cx+18,by+8],
    [cx+12,by+18],[cx+2,by+22],[cx-10,by+20],[cx-20,by+14],
    [cx-26,by+4]
  ];
  // 약간 흔들림
  ctx.moveTo(pts[0][0]+Math.sin(t*3)*1.5, pts[0][1]+Math.cos(t*2.5)*1);
  for(var i=1;i<pts.length;i++){
    var nx=pts[i][0]+Math.sin(t*3+i*0.5)*1.5;
    var ny=pts[i][1]+Math.cos(t*2.5+i*0.4)*1;
    ctx.lineTo(nx, ny);
  }
  ctx.closePath();

  // 회색+노랑 그라데이션
  var bg=ctx.createRadialGradient(cx-4,by-6,2,cx,by,28);
  bg.addColorStop(0,'#d4c84a');
  bg.addColorStop(0.3,'#a89830');
  bg.addColorStop(0.55,'#787878');
  bg.addColorStop(0.8,'#525252');
  bg.addColorStop(1,'#383838');
  ctx.fillStyle=bg;ctx.fill();
  ctx.strokeStyle='rgba(60,50,20,0.8)';ctx.lineWidth=2;ctx.stroke();

  // 몸체 질감 — 녹/스크래치
  ctx.save();
  ctx.beginPath();
  var pts2=[
    [cx-26,by-8],[cx-22,by-20],[cx-14,by-26],[cx-4,by-28],
    [cx+8,by-24],[cx+18,by-18],[cx+20,by-6],[cx+18,by+8],
    [cx+12,by+18],[cx+2,by+22],[cx-10,by+20],[cx-20,by+14],
    [cx-26,by+4]
  ];
  ctx.moveTo(pts2[0][0],pts2[0][1]);
  for(var i=1;i<pts2.length;i++) ctx.lineTo(pts2[i][0],pts2[i][1]);
  ctx.closePath();ctx.clip();

  // 노랑 패치들
  [[cx-14,by-18,8],[cx+10,by+10,6],[cx-8,by+14,5],[cx+6,by-18,4]].forEach(function(p){
    ctx.beginPath();ctx.arc(p[0],p[1],p[2],0,Math.PI*2);
    ctx.fillStyle='rgba(220,180,30,0.35)';ctx.fill();
  });
  // 스크래치
  [[cx-18,by-10,cx-8,by+2],[cx+4,by-20,cx+14,by-8],[cx-10,by+6,cx+4,by+18]].forEach(function(l){
    ctx.beginPath();ctx.moveTo(l[0],l[1]);ctx.lineTo(l[2],l[3]);
    ctx.strokeStyle='rgba(30,20,0,0.4)';ctx.lineWidth=1.5;ctx.stroke();
  });
  // 볼트
  [[cx-16,by-14],[cx+12,by-10],[cx-6,by+16],[cx+10,by+8]].forEach(function(b){
    ctx.beginPath();ctx.arc(b[0],b[1],3,0,Math.PI*2);
    ctx.fillStyle='#555';ctx.fill();
    ctx.strokeStyle='#333';ctx.lineWidth=0.8;ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(b[0]-2,b[1]);ctx.lineTo(b[0]+2,b[1]);
    ctx.moveTo(b[0],b[1]-2);ctx.lineTo(b[0],b[1]+2);
    ctx.strokeStyle='#222';ctx.lineWidth=0.8;ctx.stroke();
  });
  ctx.restore();

  // ── 앵그리버드 눈 두 개 ──
  var eyeY = by - 8;
  var browAngle = 0.35; // 찡그린 각도

  [-10, 10].forEach(function(ox, i){
    var ex = cx+ox;
    var flip = i===0 ? 1 : -1;

    // 눈 흰자
    ctx.beginPath();ctx.arc(ex,eyeY,9,0,Math.PI*2);
    ctx.fillStyle='#f8f0e0';ctx.fill();
    ctx.strokeStyle='rgba(60,30,10,0.5)';ctx.lineWidth=1;ctx.stroke();

    // 홍채 (빨간)
    var pd=Math.sin(t*1.2+i)*1.2;
    ctx.beginPath();ctx.arc(ex+pd,eyeY+1,5.5,0,Math.PI*2);
    var ig=ctx.createRadialGradient(ex+pd,eyeY+1,0,ex+pd,eyeY+1,5.5);
    ig.addColorStop(0,'#ff4444');
    ig.addColorStop(0.4,'#cc1111');
    ig.addColorStop(1,'#880000');
    ctx.fillStyle=ig;ctx.fill();

    // 동공
    ctx.beginPath();ctx.arc(ex+pd,eyeY+1,2.8,0,Math.PI*2);
    ctx.fillStyle='#0a0000';ctx.fill();

    // 반짝임
    ctx.beginPath();ctx.arc(ex+pd+2,eyeY-1,1.3,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fill();


  });

  // ── 입 (찡그린) ──
  ctx.beginPath();
  ctx.moveTo(cx-8, by+6);
  ctx.quadraticCurveTo(cx, by+2, cx+8, by+6);
  ctx.strokeStyle='#1a0a00';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
  // 아랫니
  [[cx-4,by+6],[cx,by+5],[cx+4,by+6]].forEach(function(t2){
    ctx.beginPath();ctx.rect(t2[0]-2,t2[1],4,4);
    ctx.fillStyle='#e8ddc8';ctx.fill();
  });

  // ── 글로우 ──
  var g=ctx.createRadialGradient(cx,by,10,cx,by,55);
  g.addColorStop(0,'transparent');
  g.addColorStop(1,'rgba(200,160,30,0.05)');
  ctx.beginPath();ctx.arc(cx,by,55,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
}

function drawSPEED(ctx, t) {
  var cx=60, cy=64;
  ctx.clearRect(0,0,120,120);

  var bob = Math.sin(t*8)*1.5; // 빠르게 덜컹
  var by = cy + bob;

  // ── 연기 파티클 (뒤에서 나옴) ──
  for(var i=0;i<5;i++){
    var age = (t*1.5 + i*0.4) % 1;
    var sx = cx + 22 + age*18;
    var sy = by - 8 - age*12;
    var sr = 4 + age*8;
    var sa = (1-age)*0.35;
    ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);
    ctx.fillStyle='rgba(180,180,180,'+sa+')';ctx.fill();
  }

  // ── 바퀴 2개 ──
  var wheelR = 14;
  var wheelY = by + 16;
  [-22, 22].forEach(function(ox, wi){
    var wx = cx + ox;
    var wheelAngle = -t * 4; // 앞으로 굴러가는 방향

    // 타이어 외곽
    ctx.beginPath();ctx.arc(wx, wheelY, wheelR, 0, Math.PI*2);
    ctx.fillStyle='#1a1a1a';ctx.fill();
    ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.stroke();

    // 타이어 트레드
    for(var j=0;j<8;j++){
      var ta = wheelAngle + (j/8)*Math.PI*2;
      ctx.beginPath();
      ctx.arc(wx, wheelY, wheelR-1, ta, ta+0.25);
      ctx.strokeStyle='#444';ctx.lineWidth=3;ctx.stroke();
    }

    // 휠 (금속)
    ctx.beginPath();ctx.arc(wx, wheelY, wheelR-4, 0, Math.PI*2);
    var wg = ctx.createRadialGradient(wx,wheelY,0,wx,wheelY,wheelR-4);
    wg.addColorStop(0,'#888');wg.addColorStop(0.6,'#555');wg.addColorStop(1,'#333');
    ctx.fillStyle=wg;ctx.fill();
    ctx.strokeStyle='#666';ctx.lineWidth=1;ctx.stroke();

    // 스포크 3개
    for(var j=0;j<3;j++){
      var sa2 = wheelAngle + (j/3)*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(wx+Math.cos(sa2)*2, wheelY+Math.sin(sa2)*2);
      ctx.lineTo(wx+Math.cos(sa2)*(wheelR-5), wheelY+Math.sin(sa2)*(wheelR-5));
      ctx.strokeStyle='#777';ctx.lineWidth=2;ctx.lineCap='round';ctx.stroke();
    }

    // 휠 중심
    ctx.beginPath();ctx.arc(wx, wheelY, 3, 0, Math.PI*2);
    ctx.fillStyle='#aaa';ctx.fill();
    ctx.strokeStyle='#666';ctx.lineWidth=1;ctx.stroke();

    // 속도감 선 (바퀴 옆)
    if(wi===0){
      for(var j=0;j<3;j++){
        var lx = wx - wheelR - 4 - j*6;
        var ly = wheelY - 4 + j*4;
        ctx.beginPath();
        ctx.moveTo(lx, ly);ctx.lineTo(lx-8-j*2, ly);
        ctx.strokeStyle='rgba(150,150,150,'+(0.5-j*0.15)+')';
        ctx.lineWidth=1.5;ctx.lineCap='round';ctx.stroke();
      }
    }
  });

  // ── 차축 ──
  ctx.beginPath();
  ctx.moveTo(cx-22, wheelY);ctx.lineTo(cx+22, wheelY);
  ctx.strokeStyle='#555';ctx.lineWidth=3;ctx.stroke();

  // ── 고철 판 몸체 ──
  var pw=54, ph=32;
  var px=cx-pw/2, pby=by-ph/2-4;

  // 판 그라데이션 (긁힌 금속)
  var bg=ctx.createLinearGradient(px,pby,px+pw,pby+ph);
  bg.addColorStop(0,'#6a6a6a');
  bg.addColorStop(0.3,'#858585');
  bg.addColorStop(0.6,'#5a5a5a');
  bg.addColorStop(1,'#404040');
  ctx.beginPath();
  ctx.moveTo(px+4,pby);ctx.lineTo(px+pw-4,pby);
  ctx.quadraticCurveTo(px+pw,pby,px+pw,pby+4);
  ctx.lineTo(px+pw,pby+ph-4);ctx.quadraticCurveTo(px+pw,pby+ph,px+pw-4,pby+ph);
  ctx.lineTo(px+4,pby+ph);ctx.quadraticCurveTo(px,pby+ph,px,pby+ph-4);
  ctx.lineTo(px,pby+4);ctx.quadraticCurveTo(px,pby,px+4,pby);
  ctx.closePath();
  ctx.fillStyle=bg;ctx.fill();
  ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.stroke();

  // 판 스크래치/질감
  [[px+6,pby+8,px+20,pby+18],[px+28,pby+6,px+44,pby+20],
   [px+10,pby+22,px+18,pby+28],[px+36,pby+18,px+50,pby+26]].forEach(function(l){
    ctx.beginPath();ctx.moveTo(l[0],l[1]);ctx.lineTo(l[2],l[3]);
    ctx.strokeStyle='rgba(30,30,30,0.4)';ctx.lineWidth=1;ctx.stroke();
  });

  // 노랑 경고 선 (옆면)
  ctx.beginPath();ctx.rect(px,pby+ph-8,pw,4);
  var yg=ctx.createLinearGradient(px,0,px+pw,0);
  for(var i=0;i<6;i++){
    yg.addColorStop(i/6, i%2===0?'rgba(220,180,0,0.5)':'rgba(0,0,0,0.3)');
    yg.addColorStop((i+1)/6, i%2===0?'rgba(220,180,0,0.5)':'rgba(0,0,0,0.3)');
  }
  ctx.fillStyle=yg;ctx.fill();

  // 볼트
  [[px+6,pby+6],[px+pw-6,pby+6],[px+6,pby+ph-6],[px+pw-6,pby+ph-6]].forEach(function(b){
    ctx.beginPath();ctx.arc(b[0],b[1],3,0,Math.PI*2);
    ctx.fillStyle='#666';ctx.fill();ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.stroke();
    ctx.beginPath();ctx.moveTo(b[0]-2,b[1]);ctx.lineTo(b[0]+2,b[1]);
    ctx.moveTo(b[0],b[1]-2);ctx.lineTo(b[0],b[1]+2);
    ctx.strokeStyle='#222';ctx.lineWidth=0.8;ctx.stroke();
  });

  // ── 배기구 (연기 출발점) ──
  ctx.beginPath();ctx.rect(cx+18,pby-4,8,8);
  var exG=ctx.createLinearGradient(0,pby-4,0,pby+4);
  exG.addColorStop(0,'#555');exG.addColorStop(1,'#333');
  ctx.fillStyle=exG;ctx.fill();
  ctx.strokeStyle='#222';ctx.lineWidth=1;ctx.stroke();
  // 배기구 구멍
  ctx.beginPath();ctx.arc(cx+22,pby,3,0,Math.PI*2);
  ctx.fillStyle='#111';ctx.fill();

  // ── 고글 ──
  var goggleY = pby + ph*0.38;

  // 고글 스트랩
  ctx.beginPath();
  ctx.moveTo(px, goggleY);
  ctx.lineTo(px+pw, goggleY);
  ctx.strokeStyle='rgba(100,60,20,0.6)';ctx.lineWidth=6;ctx.lineCap='round';ctx.stroke();

  // 고글 렌즈 2개 (갈색)
  [-10, 10].forEach(function(ox){
    var gx=cx+ox, gy=goggleY;

    // 렌즈 외곽 (고무 테두리)
    ctx.beginPath();ctx.arc(gx,gy,10,0,Math.PI*2);
    ctx.fillStyle='#3a1a05';ctx.fill();
    ctx.strokeStyle='#5a2a08';ctx.lineWidth=2;ctx.stroke();

    // 렌즈 유리 (갈색)
    ctx.beginPath();ctx.arc(gx,gy,8,0,Math.PI*2);
    var lg=ctx.createRadialGradient(gx-2,gy-2,0,gx,gy,8);
    lg.addColorStop(0,'rgba(180,110,40,0.85)');
    lg.addColorStop(0.5,'rgba(120,70,20,0.9)');
    lg.addColorStop(1,'rgba(60,30,5,0.95)');
    ctx.fillStyle=lg;ctx.fill();

    // 렌즈 반사
    ctx.beginPath();ctx.ellipse(gx-2,gy-3,3,2,0,0,Math.PI*2);
    ctx.fillStyle='rgba(255,200,100,0.25)';ctx.fill();

    // 렌즈 테두리 금속
    ctx.beginPath();ctx.arc(gx,gy,10,0,Math.PI*2);
    ctx.strokeStyle='rgba(160,100,30,0.8)';ctx.lineWidth=1.5;ctx.stroke();
  });

  // 고글 가운데 연결
  ctx.beginPath();ctx.moveTo(cx-2,goggleY);ctx.lineTo(cx+2,goggleY);
  ctx.strokeStyle='#5a2a08';ctx.lineWidth=4;ctx.lineCap='round';ctx.stroke();

  // 글로우
  var g=ctx.createRadialGradient(cx,by,10,cx,by,55);
  g.addColorStop(0,'transparent');g.addColorStop(1,'rgba(100,100,80,0.04)');
  ctx.beginPath();ctx.arc(cx,by,55,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
}

function drawROULETTE(ctx, t) {
  var cx=60, cy=66;
  ctx.clearRect(0,0,120,120);

  var bob = Math.sin(t*1.5)*2;
  var by = cy + bob;
  var wheelR = 32;

  // ── 룰렛 바퀴 ──
  var sections = 12;
  var colors = ['#111111','#cccccc','#555555','#ffffff','#222222','#aaaaaa',
                '#333333','#dddddd','#444444','#bbbbbb','#1a1a1a','#999999'];

  // 섹션 그리기
  for(var i=0;i<sections;i++){
    var a1 = (i/sections)*Math.PI*2 - Math.PI/2;
    var a2 = ((i+1)/sections)*Math.PI*2 - Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(cx, by);
    ctx.arc(cx, by, wheelR, a1, a2);
    ctx.closePath();
    ctx.fillStyle = colors[i];
    ctx.fill();
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }

  // 바퀴 테두리 금속 링
  ctx.beginPath();ctx.arc(cx, by, wheelR, 0, Math.PI*2);
  ctx.strokeStyle = '#aaaaaa';ctx.lineWidth = 3;ctx.stroke();
  ctx.beginPath();ctx.arc(cx, by, wheelR-3, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';ctx.lineWidth = 1;ctx.stroke();

  // 섹션 번호 점
  for(var i=0;i<sections;i++){
    var a = (i/sections)*Math.PI*2 - Math.PI/2 + Math.PI/sections;
    var dx = cx + Math.cos(a)*(wheelR-8);
    var dy = by + Math.sin(a)*(wheelR-8);
    ctx.beginPath();ctx.arc(dx, dy, 2, 0, Math.PI*2);
    ctx.fillStyle = colors[i]==='#ffffff'||colors[i]==='#cccccc'||colors[i]==='#dddddd'?'#333':'#ccc';
    ctx.fill();
  }

  // ── 가운데 화살표 (계속 회전) ──
  var arrowAngle = t * 2.5;
  ctx.save();
  ctx.translate(cx, by);
  ctx.rotate(arrowAngle);

  // 화살표 몸통
  ctx.beginPath();
  ctx.moveTo(0, -wheelR+8);
  ctx.lineTo(4, 4);
  ctx.lineTo(0, 2);
  ctx.lineTo(-4, 4);
  ctx.closePath();
  ctx.fillStyle='#ff2222';ctx.fill();
  ctx.strokeStyle='#880000';ctx.lineWidth=1;ctx.stroke();

  // 반대쪽 짧은 부분
  ctx.beginPath();
  ctx.moveTo(0, wheelR-8);
  ctx.lineTo(3, -2);
  ctx.lineTo(0, -1);
  ctx.lineTo(-3, -2);
  ctx.closePath();
  ctx.fillStyle='#555';ctx.fill();

  ctx.restore();

  // 중심 원 (핀)
  ctx.beginPath();ctx.arc(cx, by, 5, 0, Math.PI*2);
  var cg=ctx.createRadialGradient(cx,by,0,cx,by,5);
  cg.addColorStop(0,'#eee');cg.addColorStop(1,'#888');
  ctx.fillStyle=cg;ctx.fill();
  ctx.strokeStyle='#444';ctx.lineWidth=1.5;ctx.stroke();

  // ── 눈알 (바퀴 위에) ──
  var eyeY = by - wheelR - 14;

  // 눈 줄기 (바퀴 위로 달려있는 느낌)
  ctx.beginPath();
  ctx.moveTo(cx, by - wheelR);
  ctx.lineTo(cx, eyeY + 10);
  ctx.strokeStyle='#666';ctx.lineWidth=3;ctx.lineCap='round';ctx.stroke();

  // 흰자
  ctx.beginPath();ctx.arc(cx, eyeY, 11, 0, Math.PI*2);
  ctx.fillStyle='#f0f0f0';ctx.fill();
  ctx.strokeStyle='#888';ctx.lineWidth=1.5;ctx.stroke();

  // 홍채
  var pupilX = cx + Math.sin(t*1.2)*3;
  var pupilY = eyeY + Math.cos(t*0.8)*2;
  ctx.beginPath();ctx.arc(pupilX, pupilY, 6.5, 0, Math.PI*2);
  var ig=ctx.createRadialGradient(pupilX,pupilY,0,pupilX,pupilY,6.5);
  ig.addColorStop(0,'#888');ig.addColorStop(0.4,'#555');ig.addColorStop(1,'#222');
  ctx.fillStyle=ig;ctx.fill();

  // 동공
  ctx.beginPath();ctx.arc(pupilX, pupilY, 3, 0, Math.PI*2);
  ctx.fillStyle='#050505';ctx.fill();

  // 반짝임
  ctx.beginPath();ctx.arc(pupilX+2, pupilY-2, 1.5, 0, Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fill();

  // 눈 테두리
  ctx.beginPath();ctx.arc(cx, eyeY, 11, 0, Math.PI*2);
  ctx.strokeStyle='rgba(100,100,100,0.5)';ctx.lineWidth=1;ctx.stroke();

  // 글로우
  var g=ctx.createRadialGradient(cx,by,10,cx,by,52);
  g.addColorStop(0,'transparent');g.addColorStop(1,'rgba(150,150,150,0.04)');
  ctx.beginPath();ctx.arc(cx,by,52,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
}

function drawBOX(ctx, t) {
  var cx=60, cy=62;
  ctx.clearRect(0,0,120,120);

  var bob = Math.sin(t*1.4)*1.5;
  var by = cy + bob;

  var bw=58, bh=50;
  var bx=cx-bw/2, bby=by-bh/2;

  // 열림 사이클 — 3초마다 툭 열렸다 닫힘
  var cycle=(t*0.38)%1;
  var openAmt;
  if(cycle<0.15) openAmt=cycle/0.15;
  else if(cycle<0.35) openAmt=1;
  else openAmt=1-(cycle-0.35)/0.65;
  openAmt=openAmt*openAmt*(3-2*openAmt);

  var lidH = 18; // 뚜껑 높이
  var lidLift = openAmt * 28; // 최대 들림

  // ── 상자 본체 (아래) ──
  var bodyY = bby + lidH;
  var bodyH = bh - lidH;

  // 상자 안 (열리면 보임)
  if(openAmt > 0.05){
    ctx.beginPath();
    ctx.rect(bx+2, bodyY, bw-4, bodyH-2);
    ctx.fillStyle='#050505';
    ctx.fill();

    // 검은 몸체 튀어나옴
    var bodyOut = openAmt;
    ctx.save();
    ctx.beginPath();
    ctx.rect(bx+2, bodyY, bw-4, bodyH-2);
    ctx.clip();

    // 검은 덩어리
    var blobY = bodyY + bodyH - 10 - bodyOut*(bodyH*0.7);
    var blobH = bodyH*0.65*bodyOut;

    // 몸체 그라데이션
    var bg2=ctx.createRadialGradient(cx,blobY,0,cx,blobY+blobH*0.3,bw*0.5);
    bg2.addColorStop(0,'#1a1a1a');
    bg2.addColorStop(0.5,'#0d0d0d');
    bg2.addColorStop(1,'#050505');

    ctx.beginPath();
    ctx.moveTo(bx+4, bodyY+bodyH-2);
    ctx.lineTo(bx+4, blobY+6);
    ctx.quadraticCurveTo(bx+4, blobY, bx+14, blobY);
    ctx.lineTo(bx+bw-14, blobY);
    ctx.quadraticCurveTo(bx+bw-4, blobY, bx+bw-4, blobY+6);
    ctx.lineTo(bx+bw-4, bodyY+bodyH-2);
    ctx.closePath();
    ctx.fillStyle=bg2;
    ctx.fill();

    // 몸체 표면 텍스처
    ctx.globalAlpha=0.4*bodyOut;
    for(var i=0;i<3;i++){
      ctx.beginPath();
      ctx.moveTo(bx+10+i*14, blobY+4);
      ctx.lineTo(bx+16+i*14, blobY+bodyH*0.4);
      ctx.strokeStyle='rgba(40,40,40,0.8)';
      ctx.lineWidth=2;ctx.stroke();
    }
    ctx.globalAlpha=1;

    ctx.restore();
  }

  // 상자 하단 본체
  var bodyGrad=ctx.createLinearGradient(bx,bodyY,bx+bw,bodyY+bodyH);
  bodyGrad.addColorStop(0,'#5a5a5a');
  bodyGrad.addColorStop(0.4,'#707070');
  bodyGrad.addColorStop(1,'#3a3a3a');
  ctx.beginPath();
  ctx.moveTo(bx, bodyY);
  ctx.lineTo(bx+bw, bodyY);
  ctx.lineTo(bx+bw, bodyY+bodyH-4);
  ctx.quadraticCurveTo(bx+bw, bodyY+bodyH, bx+bw-4, bodyY+bodyH);
  ctx.lineTo(bx+4, bodyY+bodyH);
  ctx.quadraticCurveTo(bx, bodyY+bodyH, bx, bodyY+bodyH-4);
  ctx.closePath();
  ctx.fillStyle=bodyGrad;ctx.fill();
  ctx.strokeStyle='#2a2a2a';ctx.lineWidth=2;ctx.stroke();

  // 경첩 (뒤쪽)
  [bx+8, bx+bw-8].forEach(function(hx){
    ctx.beginPath();ctx.rect(hx-4, bodyY-3, 8, 6);
    ctx.fillStyle='#888';ctx.fill();
    ctx.strokeStyle='#444';ctx.lineWidth=1;ctx.stroke();
  });

  // 상자 하단 볼트/디테일
  [[bx+8,bodyY+bodyH-8],[bx+bw-8,bodyY+bodyH-8]].forEach(function(b){
    ctx.beginPath();ctx.arc(b[0],b[1],3.5,0,Math.PI*2);
    ctx.fillStyle='#666';ctx.fill();ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(b[0]-2,b[1]);ctx.lineTo(b[0]+2,b[1]);
    ctx.moveTo(b[0],b[1]-2);ctx.lineTo(b[0],b[1]+2);
    ctx.strokeStyle='#222';ctx.lineWidth=0.8;ctx.stroke();
  });

  // 상자 앞면 잠금장치
  ctx.beginPath();ctx.rect(cx-6,bodyY+6,12,10);
  ctx.fillStyle='#555';ctx.fill();ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,bodyY+13,3,0,Math.PI*2);
  ctx.fillStyle='#777';ctx.fill();

  // ── 눈 (틈새에서 노려봄) ──
  var eyeY = bodyY - 3;
  var eyeGap = 4 + openAmt*14; // 열릴수록 눈 잘 보임
  var eyeAlpha = 0.4 + openAmt*0.6;
  var eyeGlow = 0.3 + Math.sin(t*4)*0.2 + openAmt*0.5;

  // 눈빛 글로우
  if(eyeGlow > 0.2){
    var glow=ctx.createRadialGradient(cx,eyeY,0,cx,eyeY,20);
    glow.addColorStop(0,'rgba(255,0,0,'+(eyeGlow*0.3)+')');
    glow.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(cx,eyeY,20,0,Math.PI*2);
    ctx.fillStyle=glow;ctx.fill();
  }

  // 눈 클립 (틈새만 보이게)
  ctx.save();
  ctx.beginPath();
  ctx.rect(bx+2, eyeY-eyeGap/2, bw-4, eyeGap);
  ctx.clip();

  [-12, 12].forEach(function(ox, i){
    var ex = cx+ox;
    var pd = Math.sin(t*0.8+i)*1.5;

    // 눈 흰자 (없음 — 씨뻘건 눈)
    ctx.beginPath();ctx.arc(ex+pd, eyeY, 7, 0, Math.PI*2);
    var ig=ctx.createRadialGradient(ex+pd,eyeY,0,ex+pd,eyeY,7);
    ig.addColorStop(0,'#ff0000');
    ig.addColorStop(0.4,'#cc0000');
    ig.addColorStop(0.7,'#880000');
    ig.addColorStop(1,'#440000');
    ctx.fillStyle=ig;ctx.fill();

    // 동공 (세로로 긴 — 노려보는 느낌)
    ctx.beginPath();
    ctx.ellipse(ex+pd, eyeY, 2, 4.5, 0, 0, Math.PI*2);
    ctx.fillStyle='#0a0000';ctx.fill();

    // 눈빛 반짝임
    ctx.beginPath();ctx.arc(ex+pd+2, eyeY-2, 1.5, 0, Math.PI*2);
    ctx.fillStyle='rgba(255,100,100,0.7)';ctx.fill();
  });
  ctx.restore();

  // ── 뚜껑 (들림) ──
  ctx.save();
  // 뚜껑 위로 들림
  ctx.translate(bx, bby - lidLift);

  var lidGrad=ctx.createLinearGradient(0,0,bw,lidH);
  lidGrad.addColorStop(0,'#686868');
  lidGrad.addColorStop(0.4,'#808080');
  lidGrad.addColorStop(1,'#484848');
  ctx.beginPath();
  ctx.moveTo(4, 0);ctx.lineTo(bw-4, 0);
  ctx.quadraticCurveTo(bw, 0, bw, 4);
  ctx.lineTo(bw, lidH);
  ctx.lineTo(0, lidH);
  ctx.lineTo(0, 4);
  ctx.quadraticCurveTo(0, 0, 4, 0);
  ctx.closePath();
  ctx.fillStyle=lidGrad;ctx.fill();
  ctx.strokeStyle='#2a2a2a';ctx.lineWidth=2;ctx.stroke();

  // 뚜껑 디테일
  ctx.beginPath();ctx.moveTo(6, lidH*0.5);ctx.lineTo(bw-6, lidH*0.5);
  ctx.strokeStyle='rgba(40,40,40,0.4)';ctx.lineWidth=1;ctx.stroke();

  // 뚜껑 볼트
  [[8,lidH*0.35],[bw-8,lidH*0.35]].forEach(function(b){
    ctx.beginPath();ctx.arc(b[0],b[1],2.5,0,Math.PI*2);
    ctx.fillStyle='#777';ctx.fill();ctx.strokeStyle='#333';ctx.lineWidth=0.8;ctx.stroke();
  });

  // 스크래치
  [[10,4,20,12],[bw-20,4,bw-10,14],[bw*0.4,2,bw*0.5,lidH-2]].forEach(function(l){
    ctx.beginPath();ctx.moveTo(l[0],l[1]);ctx.lineTo(l[2],l[3]);
    ctx.strokeStyle='rgba(30,30,30,0.45)';ctx.lineWidth=1;ctx.stroke();
  });
  ctx.restore();

  // 열릴 때 충격 파티클
  if(openAmt > 0.7 && openAmt < 0.95){
    for(var i=0;i<4;i++){
      var pa=(i/4)*Math.PI*2;
      var pr=8+openAmt*12;
      ctx.beginPath();ctx.arc(cx+Math.cos(pa)*pr, bby-lidLift+Math.sin(pa)*pr*0.4, 2, 0, Math.PI*2);
      ctx.fillStyle='rgba(200,100,0,'+(0.5*(1-openAmt))+')';ctx.fill();
    }
  }

  // 전체 글로우
  var g=ctx.createRadialGradient(cx,by,10,cx,by,52);
  g.addColorStop(0,'transparent');
  g.addColorStop(1,'rgba(80,20,0,0.05)');
  ctx.beginPath();ctx.arc(cx,by,52,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
}

function drawGLOVE(ctx, t) {

  ctx.clearRect(0,0,120,120);

  var tilt = Math.sin(t*1.8)*0.18; // 살짝 기울기

  var gy = cy + bobY;

  ctx.translate(gx, gy);
  ctx.rotate(tilt);

  // ── 손목 커프 ──

  ctx.quadraticCurveTo(-cuffW/2,20+cuffH,-cuffW/2,20+cuffH-3);
  ctx.lineTo(-cuffW/2,23);
  ctx.quadraticCurveTo(-cuffW/2,20,-cuffW/2+3,20);
  ctx.closePath();

  palmGrad.addColorStop(0.5,'#787878');
  palmGrad.addColorStop(1,'#555');
  ctx.beginPath();
  ctx.moveTo(-18,20);
  ctx.lineTo(-20,-2);
  ctx.quadraticCurveTo(-20,-10,-12,-12);
  ctx.lineTo(14,-12);
  ctx.quadraticCurveTo(20,-12,20,-2);
  ctx.lineTo(18,20);
  ctx.closePath();

  ctx.strokeStyle='#333';ctx.lineWidth=1.5;ctx.stroke();

  ctx.beginPath();ctx.moveTo(-8,14);ctx.quadraticCurveTo(0,11,8,14);
  ctx.strokeStyle='rgba(40,40,40,0.3)';ctx.lineWidth=1;ctx.stroke();

  // ── 엄지손가락 ──
  var thumbAngle = Math.sin(t*2.2)*0.08 - 0.3;
  ctx.save();
  ctx.translate(-20, 2);
  ctx.rotate(thumbAngle);
  var tg=ctx.createLinearGradient(-8,0,8,18);
  tg.addColorStop(0,'#888');tg.addColorStop(1,'#555');
  ctx.beginPath();
  ctx.moveTo(-6,0);ctx.lineTo(6,0);
  ctx.quadraticCurveTo(8,0,8,4);
  ctx.lineTo(7,16);
  ctx.quadraticCurveTo(6,20,0,20);
  ctx.quadraticCurveTo(-6,20,-7,16);
  ctx.lineTo(-8,4);
  ctx.quadraticCurveTo(-8,0,-6,0);
  ctx.closePath();
  ctx.fillStyle=tg;ctx.fill();
  ctx.strokeStyle='#333';ctx.lineWidth=1.5;ctx.stroke();
  // 손가락 마디
  ctx.beginPath();ctx.moveTo(-7,8);ctx.lineTo(7,8);
  ctx.strokeStyle='rgba(40,40,40,0.4)';ctx.lineWidth=1;ctx.stroke();
  ctx.restore();

  // ── 손가락 4개 ──
  var fingerData=[
    {x:-12,w:10,h:26,bend:Math.sin(t*2.2)*0.06},
    {x:-2, w:10,h:30,bend:Math.sin(t*2.2+0.3)*0.06},
    {x:8,  w:10,h:28,bend:Math.sin(t*2.2+0.6)*0.06},
    {x:18, w:9, h:22,bend:Math.sin(t*2.2+0.9)*0.06},
  ];

  fingerData.forEach(function(f){
    ctx.save();
    ctx.translate(f.x+f.w/2, -12);
    ctx.rotate(f.bend);
    var fg=ctx.createLinearGradient(-f.w/2,0,f.w/2,f.h);
    fg.addColorStop(0,'#909090');fg.addColorStop(0.5,'#787878');fg.addColorStop(1,'#555');
    ctx.beginPath();
    ctx.moveTo(-f.w/2+2,0);ctx.lineTo(f.w/2-2,0);
    ctx.quadraticCurveTo(f.w/2,0,f.w/2,3);
    ctx.lineTo(f.w/2,f.h-4);
    ctx.quadraticCurveTo(f.w/2,f.h,f.w/2-3,f.h);
    ctx.lineTo(-f.w/2+3,f.h);
    ctx.quadraticCurveTo(-f.w/2,f.h,-f.w/2,f.h-4);
    ctx.lineTo(-f.w/2,3);
    ctx.quadraticCurveTo(-f.w/2,0,-f.w/2+2,0);
    ctx.closePath();
    ctx.fillStyle=fg;ctx.fill();
    ctx.strokeStyle='#333';ctx.lineWidth=1.5;ctx.stroke();
    // 손가락 마디 2개
    [f.h*0.35, f.h*0.65].forEach(function(my){
      ctx.beginPath();ctx.moveTo(-f.w/2+1,my);ctx.lineTo(f.w/2-1,my);
      ctx.strokeStyle='rgba(40,40,40,0.4)';ctx.lineWidth=1;ctx.stroke();
    });
    ctx.restore();
  });

  // 손등 하이라이트
  ctx.beginPath();ctx.ellipse(0,-4,12,6,0,0,Math.PI*2);
  ctx.fillStyle='rgba(200,200,200,0.08)';ctx.fill();

  ctx.restore();

  // 속도감 선 (날아다니는 느낌)
  var speedAlpha = Math.abs(Math.sin(t*2.2))*0.4;
  for(var i=0;i<3;i++){
    var lx = gx - 20 - i*10 + bobX*2;
    var ly = gy + 5 + i*5 + bobY*0.5;
    var lw = 12 - i*3;
    ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx-lw,ly);
    ctx.strokeStyle='rgba(150,150,150,'+(speedAlpha-i*0.1)+')';
    ctx.lineWidth=1.5;ctx.lineCap='round';ctx.stroke();
  }
}

function drawUNGLOVE(ctx, t) {
  var cx=60, cy=58;
  ctx.clearRect(0,0,120,120);

  // 뒤집어진 장갑 — 더 느리고 불안정하게 부유
  var bobY = Math.sin(t*1.8)*7;
  var bobX = Math.sin(t*1.1)*5;

    g.addColorStop(0.3,'#2a0066');
    g.addColorStop(0.55,'#0a1a88');
    g.addColorStop(0.8,'#1a00aa');

  ctx.beginPath();
  ctx.moveTo(-cuffW/2+3,20);ctx.lineTo(cuffW/2-3,20);
  ctx.quadraticCurveTo(cuffW/2,20,cuffW/2,23);
  ctx.lineTo(cuffW/2,20+cuffH-3);
  ctx.quadraticCurveTo(cuffW/2,20+cuffH,cuffW/2-3,20+cuffH);
  ctx.lineTo(-cuffW/2+3,20+cuffH);
  ctx.quadraticCurveTo(-cuffW/2,20+cuffH,-cuffW/2,20+cuffH-3);
  ctx.lineTo(-cuffW/2,23);
  ctx.quadraticCurveTo(-cuffW/2,20,-cuffW/2+3,20);
  ctx.closePath();
  ctx.fillStyle=cuffG;ctx.fill();
  ctx.strokeStyle='#110022';ctx.lineWidth=1.5;ctx.stroke();
  // 커프 줄무늬
  ctx.beginPath();ctx.moveTo(-cuffW/2+2,26);ctx.lineTo(cuffW/2-2,26);
  ctx.strokeStyle='rgba(100,0,200,0.4)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.beginPath();ctx.moveTo(-cuffW/2+2,30);ctx.lineTo(cuffW/2-2,30);
  ctx.strokeStyle='rgba(50,0,150,0.3)';ctx.lineWidth=1;ctx.stroke();

  // ── 손바닥 ──
  ctx.beginPath();
  ctx.moveTo(-18,20);
  ctx.lineTo(-20,-2);
  ctx.quadraticCurveTo(-20,-10,-12,-12);
  ctx.lineTo(14,-12);
  ctx.quadraticCurveTo(20,-12,20,-2);
  ctx.lineTo(18,20);
  ctx.closePath();
  ctx.fillStyle=bodyGrad(ctx,-18,-12,18,20);ctx.fill();
  ctx.strokeStyle='#110022';ctx.lineWidth=1.5;ctx.stroke();

  // 손바닥 주름 (보라빛)
  ctx.beginPath();ctx.moveTo(-10,8);ctx.quadraticCurveTo(0,4,10,8);
  ctx.strokeStyle='rgba(150,0,255,0.3)';ctx.lineWidth=1.2;ctx.lineCap='round';ctx.stroke();
  ctx.beginPath();ctx.moveTo(-8,14);ctx.quadraticCurveTo(0,11,8,14);
  ctx.strokeStyle='rgba(100,0,200,0.25)';ctx.lineWidth=1;ctx.stroke();

  // ── 엄지 ──
  var thumbAngle=Math.sin(t*1.8)*0.08-0.3;
  ctx.save();ctx.translate(-20,2);ctx.rotate(thumbAngle);
  ctx.beginPath();
  ctx.moveTo(-6,0);ctx.lineTo(6,0);ctx.quadraticCurveTo(8,0,8,4);
  ctx.lineTo(7,16);ctx.quadraticCurveTo(6,20,0,20);
  ctx.quadraticCurveTo(-6,20,-7,16);ctx.lineTo(-8,4);
  ctx.quadraticCurveTo(-8,0,-6,0);ctx.closePath();
  ctx.fillStyle=bodyGrad(ctx,-8,0,8,20);ctx.fill();
  ctx.strokeStyle='#110022';ctx.lineWidth=1.5;ctx.stroke();
  ctx.beginPath();ctx.moveTo(-7,8);ctx.lineTo(7,8);
  ctx.strokeStyle='rgba(100,0,200,0.3)';ctx.lineWidth=1;ctx.stroke();
  ctx.restore();

  // ── 손가락 4개 ──
  var fingerData=[
    {x:-12,w:10,h:26,bend:Math.sin(t*1.8)*0.06},
    {x:-2, w:10,h:30,bend:Math.sin(t*1.8+0.3)*0.06},
    {x:8,  w:10,h:28,bend:Math.sin(t*1.8+0.6)*0.06},
    {x:18, w:9, h:22,bend:Math.sin(t*1.8+0.9)*0.06},
  ];
  fingerData.forEach(function(f){
    ctx.save();ctx.translate(f.x+f.w/2,-12);ctx.rotate(f.bend);
    ctx.beginPath();
    ctx.moveTo(-f.w/2+2,0);ctx.lineTo(f.w/2-2,0);
    ctx.quadraticCurveTo(f.w/2,0,f.w/2,3);
    ctx.lineTo(f.w/2,f.h-4);ctx.quadraticCurveTo(f.w/2,f.h,f.w/2-3,f.h);
    ctx.lineTo(-f.w/2+3,f.h);ctx.quadraticCurveTo(-f.w/2,f.h,-f.w/2,f.h-4);
    ctx.lineTo(-f.w/2,3);ctx.quadraticCurveTo(-f.w/2,0,-f.w/2+2,0);
    ctx.closePath();
    ctx.fillStyle=bodyGrad(ctx,-f.w/2,0,f.w/2,f.h);ctx.fill();
    ctx.strokeStyle='#110022';ctx.lineWidth=1.5;ctx.stroke();
    [f.h*0.35,f.h*0.65].forEach(function(my){

      ctx.strokeStyle='rgba(100,0,200,0.25)';ctx.lineWidth=1;ctx.stroke();
    });
    ctx.restore();
  });

  // ── 하얀 눈 (손등 가운데) ──
  var eyeX=0, eyeY=2;
  var pulse=0.8+Math.sin(t*3)*0.2;

  // 눈 글로우
  var eg=ctx.createRadialGradient(eyeX,eyeY,0,eyeX,eyeY,18);
  eg.addColorStop(0,'rgba(255,255,255,0.15)');

  ctx.beginPath();ctx.arc(eyeX,eyeY,18,0,Math.PI*2);ctx.fillStyle=eg;ctx.fill();

  ctx.beginPath();ctx.arc(eyeX,eyeY,10,0,Math.PI*2);
  ctx.fillStyle='rgba(240,240,255,0.95)';ctx.fill();
  ctx.strokeStyle='rgba(150,100,255,0.5)';ctx.lineWidth=1.5;ctx.stroke();

  // 홍채 (하얀 계열)
  var pd=Math.sin(t*1.2)*2;
  ctx.beginPath();ctx.arc(eyeX+pd,eyeY,6,0,Math.PI*2);
  var ig=ctx.createRadialGradient(eyeX+pd,eyeY,0,eyeX+pd,eyeY,6);
  ig.addColorStop(0,'#ffffff');
  ig.addColorStop(0.4,'#ddddff');
  ig.addColorStop(0.8,'#aaaadd');
  ig.addColorStop(1,'#7777aa');
  ctx.fillStyle=ig;ctx.fill();

  // 동공 (연보라)
  ctx.beginPath();ctx.arc(eyeX+pd,eyeY,2.5,0,Math.PI*2);
  ctx.fillStyle='rgba(80,40,120,0.8)';ctx.fill();

  // 반짝임
  ctx.beginPath();ctx.arc(eyeX+pd+2.5,eyeY-2.5,1.5,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fill();
  ctx.beginPath();ctx.arc(eyeX+pd-1.5,eyeY+1.5,0.8,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fill();

  ctx.restore();

  // 보라 글로우 + 파티클
  var gGrad=ctx.createRadialGradient(gx,gy,8,gx,gy,52);
  gGrad.addColorStop(0,'rgba(80,0,180,0.08)');
  gGrad.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(gx,gy,52,0,Math.PI*2);ctx.fillStyle=gGrad;ctx.fill();

  // 마법 파티클
  for(var i=0;i<4;i++){
    var pa=(t*1.5+i*1.57)%(Math.PI*2);
    var pr=28+Math.sin(t*3+i)*6;
    var px2=gx+Math.cos(pa)*pr, py2=gy+Math.sin(pa)*pr;
    var pa2=0.3+Math.sin(t*5+i)*0.25;
    ctx.beginPath();ctx.arc(px2,py2,2,0,Math.PI*2);
    ctx.fillStyle='rgba(180,100,255,'+pa2+')';ctx.fill();
  }

  // 속도 선
  var speedA=Math.abs(Math.sin(t*1.8))*0.35;
  for(var i=0;i<3;i++){
    ctx.beginPath();
    ctx.moveTo(gx-18-i*9+bobX*2, gy+4+i*5+bobY*0.5);
    ctx.lineTo(gx-26-i*9+bobX*2, gy+4+i*5+bobY*0.5);
    ctx.strokeStyle='rgba(120,60,220,'+(speedA-i*0.08)+')';
    ctx.lineWidth=1.5;ctx.lineCap='round';ctx.stroke();
  }
}

function drawJUNKV2(ctx, t) {
  var cx=60, cy=60;

  var bob = Math.sin(t*1.8)*2;
  var by = cy + bob;

    {x:cx+16, y:by-8},
    {x:cx+4,  y:by-22},

      ctx.lineWidth=2-i*0.3;ctx.stroke();
    }
    // 날개
    for(var i=0;i<4;i++){
      var a=(i/4)*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*4,Math.sin(a)*4);
      ctx.lineTo(Math.cos(a)*11,Math.sin(a)*11);

      ctx.closePath();
      ctx.fillStyle='rgba(180,80,255,0.75)';ctx.fill();
      ctx.strokeStyle='rgba(100,40,160,0.5)';ctx.lineWidth=0.8;ctx.stroke();
    }
    // 나사
    ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);

    ctx.restore();
  });

  ctx.beginPath();ctx.arc(0,28,3,0,Math.PI*2);
  ctx.fillStyle='#aaa';ctx.fill();

  // 아래팔
  var forearmSwing = Math.sin(t*2+0.5)*0.2;

  var fg2=ctx.createLinearGradient(-6,0,6,24);

  ctx.fillStyle=fg2;ctx.fill();ctx.strokeStyle='#3a1a66';ctx.lineWidth=1.5;ctx.stroke();

  // 주먹
  ctx.beginPath();ctx.arc(0,30,9,0,Math.PI*2);
  ctx.fillStyle='#7a5aaa';ctx.fill();ctx.strokeStyle='#3a1a66';ctx.lineWidth=2;ctx.stroke();
  // 너클
  [-5,0,5].forEach(function(kx){
    ctx.beginPath();ctx.arc(kx,27,2.5,0,Math.PI*2);
    ctx.fillStyle='#9a7acc';ctx.fill();ctx.strokeStyle='#3a1a66';ctx.lineWidth=1;ctx.stroke();
  });
  ctx.restore();
  ctx.restore();

  // ── 몸체 ──
  ctx.beginPath();
  var pts=[
    [cx-22,by-8],[cx-18,by-20],[cx-10,by-26],[cx-2,by-28],
    [cx+8,by-24],[cx+18,by-18],[cx+22,by-6],[cx+20,by+8],
    [cx+14,by+18],[cx+4,by+22],[cx-8,by+20],[cx-18,by+14],[cx-22,by+4]
  ];
  ctx.moveTo(pts[0][0]+Math.sin(t*3)*1.5, pts[0][1]+Math.cos(t*2.5));
  for(var i=1;i<pts.length;i++){
    ctx.lineTo(pts[i][0]+Math.sin(t*3+i*0.5)*1.5, pts[i][1]+Math.cos(t*2.5+i*0.4));
  }
  ctx.closePath();

  // 회색+노랑+보라 그라데이션
  var bg=ctx.createRadialGradient(cx-4,by-6,2,cx,by,28);
  bg.addColorStop(0,'#c87acc');   // 보라빛
  bg.addColorStop(0.2,'#9a5a99');
  bg.addColorStop(0.4,'#8a6a30'); // 노랑
  bg.addColorStop(0.65,'#686868'); // 회색
  bg.addColorStop(1,'#383838');
  ctx.fillStyle=bg;ctx.fill();
  ctx.strokeStyle='rgba(60,20,80,0.8)';ctx.lineWidth=2;ctx.stroke();

  // 질감
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(pts[0][0],pts[0][1]);
  for(var i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.closePath();ctx.clip();

  // 보라 패치
  [[cx-12,by-16,7],[cx+8,by+8,5],[cx-6,by+12,4]].forEach(function(p){
    ctx.beginPath();ctx.arc(p[0],p[1],p[2],0,Math.PI*2);
    ctx.fillStyle='rgba(160,60,220,0.3)';ctx.fill();
  });
  // 노랑 패치
  [[cx+10,by+10,5],[cx-8,by+14,4]].forEach(function(p){
    ctx.beginPath();ctx.arc(p[0],p[1],p[2],0,Math.PI*2);
    ctx.fillStyle='rgba(220,180,30,0.3)';ctx.fill();
  });
  // 스크래치
  [[cx-16,by-10,cx-6,by+2],[cx+4,by-20,cx+14,by-8],[cx-8,by+6,cx+4,by+18]].forEach(function(l){
    ctx.beginPath();ctx.moveTo(l[0],l[1]);ctx.lineTo(l[2],l[3]);
    ctx.strokeStyle='rgba(30,0,40,0.45)';ctx.lineWidth=1.5;ctx.stroke();
  });
  // 볼트
  [[cx-16,by-14],[cx+12,by-10],[cx-6,by+16],[cx+10,by+8]].forEach(function(b){
    ctx.beginPath();ctx.arc(b[0],b[1],3,0,Math.PI*2);
    ctx.fillStyle='#666';ctx.fill();ctx.strokeStyle='#333';ctx.lineWidth=0.8;ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(b[0]-2,b[1]);ctx.lineTo(b[0]+2,b[1]);
    ctx.moveTo(b[0],b[1]-2);ctx.lineTo(b[0],b[1]+2);
    ctx.strokeStyle='#222';ctx.lineWidth=0.8;ctx.stroke();
  });
  ctx.restore();

  // ── 앵그리버드 눈 (빨간) ──
  var eyeY = by - 8;
  [-10, 10].forEach(function(ox, i){
    var ex = cx+ox;
    // 흰자
    ctx.beginPath();ctx.arc(ex,eyeY,9,0,Math.PI*2);
    ctx.fillStyle='#f8f0e0';ctx.fill();
    ctx.strokeStyle='rgba(60,0,80,0.4)';ctx.lineWidth=1;ctx.stroke();
    // 홍채
    var pd=Math.sin(t*1.2+i)*1.2;
    ctx.beginPath();ctx.arc(ex+pd,eyeY+1,5.5,0,Math.PI*2);
    var ig=ctx.createRadialGradient(ex+pd,eyeY+1,0,ex+pd,eyeY+1,5.5);
    ig.addColorStop(0,'#ff4444');ig.addColorStop(0.4,'#cc1111');ig.addColorStop(1,'#880000');
    ctx.fillStyle=ig;ctx.fill();
    // 동공
    ctx.beginPath();ctx.arc(ex+pd,eyeY+1,2.8,0,Math.PI*2);ctx.fillStyle='#0a0000';ctx.fill();
    // 반짝임
    ctx.beginPath();ctx.arc(ex+pd+2,eyeY-1,1.3,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fill();
  });

  // ── 입 ──
  ctx.beginPath();
  ctx.moveTo(cx-8,by+6);ctx.quadraticCurveTo(cx,by+2,cx+8,by+6);
  ctx.strokeStyle='#1a0020';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
  [[cx-4,by+6],[cx,by+5],[cx+4,by+6]].forEach(function(t2){
    ctx.beginPath();ctx.rect(t2[0]-2,t2[1],4,4);ctx.fillStyle='#e8ddc8';ctx.fill();
  });

  // 글로우
  var g=ctx.createRadialGradient(cx,by,10,cx,by,58);
  g.addColorStop(0,'transparent');g.addColorStop(1,'rgba(120,40,200,0.06)');
  ctx.beginPath();ctx.arc(cx,by,58,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
}

function drawULTRASPEED(ctx, t) {
  var cx=60, cy=62;
  ctx.clearRect(0,0,120,120);

  var bob = Math.sin(t*10)*1.2;
  var by = cy + bob;

  // ── 연기 (더 많이) ──
  for(var i=0;i<7;i++){
    var age=(t*2+i*0.3)%1;
    var sx=cx+28+age*22, sy=by-10-age*16;
    var sr=3+age*10, sa=(1-age)*0.3;
    ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);
    ctx.fillStyle='rgba(180,140,200,'+sa+')';ctx.fill();
  }

  // ── 바퀴 4개 ──
  var wheelR=12;
  var wheelY=by+18;
  var wheelXs=[-26,-10,10,26];
  wheelXs.forEach(function(ox,wi){
    var wx=cx+ox;
    var wa=-t*5;
    // 타이어
    ctx.beginPath();ctx.arc(wx,wheelY,wheelR,0,Math.PI*2);
    ctx.fillStyle='#111';ctx.fill();
    ctx.strokeStyle='#4a2a66';ctx.lineWidth=2.5;ctx.stroke();
    // 트레드
    for(var j=0;j<8;j++){
      var ta=wa+(j/8)*Math.PI*2;
      ctx.beginPath();ctx.arc(wx,wheelY,wheelR-1,ta,ta+0.22);
      ctx.strokeStyle='rgba(80,40,120,0.6)';ctx.lineWidth=3;ctx.stroke();
    }
    // 휠
    ctx.beginPath();ctx.arc(wx,wheelY,wheelR-4,0,Math.PI*2);
    var wg=ctx.createRadialGradient(wx,wheelY,0,wx,wheelY,wheelR-4);
    wg.addColorStop(0,'#7a5a99');wg.addColorStop(0.6,'#4a2a77');wg.addColorStop(1,'#2a1044');
    ctx.fillStyle=wg;ctx.fill();ctx.strokeStyle='#3a1a66';ctx.lineWidth=1;ctx.stroke();
    // 스포크
    for(var j=0;j<3;j++){
      var sa2=wa+(j/3)*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(wx+Math.cos(sa2)*2,wheelY+Math.sin(sa2)*2);
      ctx.lineTo(wx+Math.cos(sa2)*(wheelR-5),wheelY+Math.sin(sa2)*(wheelR-5));
      ctx.strokeStyle='#6a4a88';ctx.lineWidth=2;ctx.lineCap='round';ctx.stroke();
    }
    ctx.beginPath();ctx.arc(wx,wheelY,3,0,Math.PI*2);
    ctx.fillStyle='#aaa';ctx.fill();
  });

  // 차축 앞뒤
  ctx.beginPath();
  ctx.moveTo(cx-26,wheelY);ctx.lineTo(cx+26,wheelY);
  ctx.strokeStyle='#4a2a66';ctx.lineWidth=3;ctx.stroke();

  // ── 탱크 포신 (앞으로 튀어나옴) ──
  ctx.beginPath();
  ctx.moveTo(cx+28,by-8);ctx.lineTo(cx+48,by-8);
  ctx.lineTo(cx+48,by-2);ctx.lineTo(cx+28,by-2);ctx.closePath();
  var cannonG=ctx.createLinearGradient(cx+28,by-8,cx+28,by-2);
  cannonG.addColorStop(0,'#6a4a88');cannonG.addColorStop(1,'#3a1a55');
  ctx.fillStyle=cannonG;ctx.fill();
  ctx.strokeStyle='#2a0a44';ctx.lineWidth=1.2;ctx.stroke();
  // 포신 끝 링
  ctx.beginPath();ctx.rect(cx+45,by-10,5,8);
  ctx.fillStyle='#4a2a66';ctx.fill();ctx.strokeStyle='#2a0a44';ctx.lineWidth=1;ctx.stroke();

  // ── 탱크 본체 ──
  var tw=58,th=34;
  var tx=cx-tw/2,tby=by-th/2-2;

  // 본체 상단 돌출 (포탑)
  var turretW=28,turretH=14;
  var turretX=cx-turretW/2,turretY=tby-turretH+2;
  var tg2=ctx.createLinearGradient(turretX,turretY,turretX+turretW,turretY+turretH);
  tg2.addColorStop(0,'#6a4a88');tg2.addColorStop(0.5,'#8a6aaa');tg2.addColorStop(1,'#4a2a66');
  ctx.beginPath();
  ctx.moveTo(turretX+4,turretY);ctx.lineTo(turretX+turretW-4,turretY);
  ctx.quadraticCurveTo(turretX+turretW,turretY,turretX+turretW,turretY+4);
  ctx.lineTo(turretX+turretW,turretY+turretH);
  ctx.lineTo(turretX,turretY+turretH);
  ctx.lineTo(turretX,turretY+4);
  ctx.quadraticCurveTo(turretX,turretY,turretX+4,turretY);
  ctx.closePath();
  ctx.fillStyle=tg2;ctx.fill();ctx.strokeStyle='#2a0a44';ctx.lineWidth=1.5;ctx.stroke();

  // 본체
  var bg=ctx.createLinearGradient(tx,tby,tx+tw,tby+th);
  bg.addColorStop(0,'#7a5a99');bg.addColorStop(0.4,'#9a7abb');bg.addColorStop(1,'#4a2a77');
  ctx.beginPath();
  ctx.moveTo(tx+4,tby);ctx.lineTo(tx+tw-4,tby);
  ctx.quadraticCurveTo(tx+tw,tby,tx+tw,tby+4);
  ctx.lineTo(tx+tw,tby+th-4);ctx.quadraticCurveTo(tx+tw,tby+th,tx+tw-4,tby+th);
  ctx.lineTo(tx+4,tby+th);ctx.quadraticCurveTo(tx,tby+th,tx,tby+th-4);
  ctx.lineTo(tx,tby+4);ctx.quadraticCurveTo(tx,tby,tx+4,tby);
  ctx.closePath();
  ctx.fillStyle=bg;ctx.fill();ctx.strokeStyle='#2a0a44';ctx.lineWidth=2;ctx.stroke();

  // 본체 스크래치/디테일
  [[tx+8,tby+8,tx+18,tby+20],[tx+30,tby+6,tx+44,tby+22]].forEach(function(l){
    ctx.beginPath();ctx.moveTo(l[0],l[1]);ctx.lineTo(l[2],l[3]);
    ctx.strokeStyle='rgba(20,0,40,0.4)';ctx.lineWidth=1.2;ctx.stroke();
  });
  // 경고 줄무늬
  ctx.beginPath();ctx.rect(tx,tby+th-7,tw,4);
  var yg=ctx.createLinearGradient(tx,0,tx+tw,0);
  for(var i=0;i<7;i++){
    yg.addColorStop(i/7,i%2===0?'rgba(180,100,255,0.4)':'rgba(0,0,0,0.3)');
    yg.addColorStop((i+1)/7,i%2===0?'rgba(180,100,255,0.4)':'rgba(0,0,0,0.3)');
  }
  ctx.fillStyle=yg;ctx.fill();
  // 볼트
  [[tx+6,tby+6],[tx+tw-6,tby+6],[tx+6,tby+th-6],[tx+tw-6,tby+th-6]].forEach(function(b){
    ctx.beginPath();ctx.arc(b[0],b[1],3,0,Math.PI*2);
    ctx.fillStyle='#555';ctx.fill();ctx.strokeStyle='#333';ctx.lineWidth=0.8;ctx.stroke();
  });

  // ── 배기구 ──
  ctx.beginPath();ctx.rect(cx+20,tby-4,8,6);
  ctx.fillStyle='#3a1a55';ctx.fill();ctx.strokeStyle='#1a0033';ctx.lineWidth=1;ctx.stroke();
  ctx.beginPath();ctx.arc(cx+24,tby-1,2.5,0,Math.PI*2);ctx.fillStyle='#111';ctx.fill();

  // ── 깨진 고글 ──
  var goggleY=tby+th*0.38;
  // 스트랩
  ctx.beginPath();ctx.moveTo(tx,goggleY);ctx.lineTo(tx+tw,goggleY);
  ctx.strokeStyle='rgba(80,40,100,0.6)';ctx.lineWidth=5;ctx.lineCap='round';ctx.stroke();

  [-10,10].forEach(function(ox,gi){
    var gx2=cx+ox,gy2=goggleY;
    // 테두리
    ctx.beginPath();ctx.arc(gx2,gy2,10,0,Math.PI*2);
    ctx.fillStyle='#2a0a44';ctx.fill();ctx.strokeStyle='#4a2a66';ctx.lineWidth=2;ctx.stroke();
    // 렌즈
    ctx.beginPath();ctx.arc(gx2,gy2,8,0,Math.PI*2);
    var lg=ctx.createRadialGradient(gx2-2,gy2-2,0,gx2,gy2,8);
    lg.addColorStop(0,'rgba(140,80,200,0.85)');
    lg.addColorStop(0.5,'rgba(80,30,140,0.9)');
    lg.addColorStop(1,'rgba(30,0,60,0.95)');
    ctx.fillStyle=lg;ctx.fill();

    // 렌즈 반사
    ctx.beginPath();ctx.ellipse(gx2-2,gy2-3,3,2,0,0,Math.PI*2);
    ctx.fillStyle='rgba(200,150,255,0.2)';ctx.fill();

    // 깨진 금 (크랙)
    ctx.save();ctx.beginPath();ctx.arc(gx2,gy2,8,0,Math.PI*2);ctx.clip();
    // 메인 크랙
    ctx.beginPath();
    ctx.moveTo(gx2-3,gy2-8);
    ctx.lineTo(gx2+1,gy2-2);
    ctx.lineTo(gx2+5,gy2+3);
    ctx.lineTo(gx2+2,gy2+8);
    ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=1.2;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
    // 보조 크랙
    ctx.beginPath();
    ctx.moveTo(gx2+1,gy2-2);ctx.lineTo(gx2-4,gy2+2);
    ctx.strokeStyle='rgba(255,255,255,0.45)';ctx.lineWidth=0.8;ctx.stroke();
    if(gi===1){
      ctx.beginPath();
      ctx.moveTo(gx2-5,gy2-3);ctx.lineTo(gx2-1,gy2+1);ctx.lineTo(gx2-6,gy2+5);
      ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=0.8;ctx.stroke();
    }
    ctx.restore();

    ctx.beginPath();ctx.arc(gx2,gy2,10,0,Math.PI*2);
    ctx.strokeStyle='rgba(120,60,180,0.7)';ctx.lineWidth=1.5;ctx.stroke();
  });
  // 고글 중앙 연결
  ctx.beginPath();ctx.moveTo(cx-2,goggleY);ctx.lineTo(cx+2,goggleY);
  ctx.strokeStyle='#4a2a66';ctx.lineWidth=4;ctx.lineCap='round';ctx.stroke();

  // 글로우
  var g=ctx.createRadialGradient(cx,by,10,cx,by,56);
  g.addColorStop(0,'transparent');g.addColorStop(1,'rgba(100,40,180,0.06)');
  ctx.beginPath();ctx.arc(cx,by,56,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
}

function drawWHEEL(ctx, t) {
  var cx=60, cy=64;
  ctx.clearRect(0,0,120,120);

  var bob = Math.sin(t*1.5)*2;
  var by = cy + bob;
  var wheelR = 28;

  // ── 파편 조각들 (룰렛이 부서진) ──
  var fragments = [
    {angle:0.3,  dist:36, rot:t*1.1,  w:14, h:8,  col:'#111'},
    {angle:1.1,  dist:38, rot:-t*0.9, w:10, h:7,  col:'#cccccc'},
    {angle:1.9,  dist:34, rot:t*1.3,  w:12, h:6,  col:'#555'},
    {angle:2.7,  dist:40, rot:-t*1.0, w:9,  h:8,  col:'#fff'},
    {angle:3.6,  dist:35, rot:t*0.8,  w:11, h:7,  col:'#333'},
    {angle:4.4,  dist:38, rot:-t*1.2, w:10, h:6,  col:'#aaa'},
    {angle:5.2,  dist:36, rot:t*1.4,  w:8,  h:9,  col:'#222'},
    {angle:6.0,  dist:37, rot:-t*0.7, w:13, h:6,  col:'#ddd'},
  ];

  fragments.forEach(function(f){
    var fx = cx + Math.cos(f.angle + t*0.3)*f.dist;
    var fy = by + Math.sin(f.angle + t*0.3)*f.dist*0.85;
    ctx.save();
    ctx.translate(fx, fy);
    ctx.rotate(f.rot);
    // 파편 모양 (불규칙한 사각형)
    ctx.beginPath();
    ctx.moveTo(-f.w/2, -f.h/2);
    ctx.lineTo(f.w/2+2, -f.h/2+1);
    ctx.lineTo(f.w/2, f.h/2);
    ctx.lineTo(-f.w/2-1, f.h/2-1);
    ctx.closePath();
    ctx.fillStyle=f.col;ctx.fill();
    ctx.strokeStyle='rgba(80,0,120,0.5)';ctx.lineWidth=1;ctx.stroke();
    // 파편 번호 점
    ctx.beginPath();ctx.arc(0,0,1.5,0,Math.PI*2);
    ctx.fillStyle=f.col==='#fff'||f.col==='#ddd'||f.col==='#cccccc'?'#333':'#ccc';
    ctx.fill();
    ctx.restore();
  });

  // ── 중심 링 (부서진 바퀴 중심부) ──
  ctx.beginPath();ctx.arc(cx,by,wheelR,0,Math.PI*2);
  ctx.strokeStyle='rgba(120,0,200,0.3)';ctx.lineWidth=2;ctx.stroke();

  // 중심 금속판 (남아있는 부분)
  ctx.beginPath();ctx.arc(cx,by,16,0,Math.PI*2);
  var cg=ctx.createRadialGradient(cx,by,0,cx,by,16);
  cg.addColorStop(0,'#2a0044');cg.addColorStop(0.6,'#1a0033');cg.addColorStop(1,'#0a0018');
  ctx.fillStyle=cg;ctx.fill();
  ctx.strokeStyle='rgba(150,50,255,0.6)';ctx.lineWidth=2;ctx.stroke();

  // 부서진 테두리 조각들
  for(var i=0;i<8;i++){
    var a1=(i/8)*Math.PI*2;
    var a2=a1+0.25;
    var skip = (i===2||i===5); // 일부 구간 없음 (파편으로 날아감)
    if(!skip){
      ctx.beginPath();ctx.arc(cx,by,wheelR,a1,a2);
      ctx.strokeStyle='rgba(100,0,180,0.7)';ctx.lineWidth=3;ctx.stroke();
    }
  }

  // ── 거대 화살표 (보라, 천천히 회전) ──
  var arrowAngle = t * 1.8;
  ctx.save();
  ctx.translate(cx, by);
  ctx.rotate(arrowAngle);

  // 화살표 몸통 (굵고 김)
  var arrowLen = wheelR - 4;
  ctx.beginPath();
  ctx.moveTo(0, -arrowLen);
  ctx.lineTo(7, 2);
  ctx.lineTo(3, 0);
  ctx.lineTo(3, arrowLen*0.5);
  ctx.lineTo(-3, arrowLen*0.5);
  ctx.lineTo(-3, 0);
  ctx.lineTo(-7, 2);
  ctx.closePath();
  var ag=ctx.createLinearGradient(0,-arrowLen,0,arrowLen*0.5);
  ag.addColorStop(0,'#cc44ff');
  ag.addColorStop(0.4,'#9900dd');
  ag.addColorStop(1,'#5500aa');
  ctx.fillStyle=ag;ctx.fill();
  ctx.strokeStyle='#330066';ctx.lineWidth=1.5;ctx.stroke();

  // 화살표 글로우
  ctx.save();ctx.globalAlpha=0.3;
  ctx.beginPath();
  ctx.moveTo(0,-arrowLen);ctx.lineTo(10,4);ctx.lineTo(-10,4);ctx.closePath();
  ctx.fillStyle='#cc44ff';ctx.fill();
  ctx.restore();

  // 반대쪽 꼬리
  ctx.beginPath();
  ctx.moveTo(0,arrowLen*0.5);
  ctx.lineTo(4,arrowLen*0.8);
  ctx.lineTo(0,arrowLen*0.7);
  ctx.lineTo(-4,arrowLen*0.8);
  ctx.closePath();
  ctx.fillStyle='#6600aa';ctx.fill();

  ctx.restore();

  // 중심 핀
  ctx.beginPath();ctx.arc(cx,by,6,0,Math.PI*2);
  var pg=ctx.createRadialGradient(cx,by,0,cx,by,6);
  pg.addColorStop(0,'#dd88ff');pg.addColorStop(1,'#6600aa');
  ctx.fillStyle=pg;ctx.fill();
  ctx.strokeStyle='#330066';ctx.lineWidth=1.5;ctx.stroke();

  // 눈알 (중심 위)
  var eyeY=by-wheelR-14;
  ctx.beginPath();ctx.moveTo(cx,by-wheelR);ctx.lineTo(cx,eyeY+10);
  ctx.strokeStyle='#4a0088';ctx.lineWidth=3;ctx.lineCap='round';ctx.stroke();

  ctx.beginPath();ctx.arc(cx,eyeY,11,0,Math.PI*2);
  ctx.fillStyle='#f0e8ff';ctx.fill();ctx.strokeStyle='rgba(120,0,200,0.5)';ctx.lineWidth=1.5;ctx.stroke();

  var pupilX=cx+Math.sin(t*1.2)*3;
  var pupilY=eyeY+Math.cos(t*0.8)*2;
  ctx.beginPath();ctx.arc(pupilX,pupilY,6.5,0,Math.PI*2);
  var ig=ctx.createRadialGradient(pupilX,pupilY,0,pupilX,pupilY,6.5);
  ig.addColorStop(0,'#cc44ff');ig.addColorStop(0.4,'#8800cc');ig.addColorStop(1,'#330055');
  ctx.fillStyle=ig;ctx.fill();
  ctx.beginPath();ctx.arc(pupilX,pupilY,3,0,Math.PI*2);ctx.fillStyle='#050005';ctx.fill();
  ctx.beginPath();ctx.arc(pupilX+2,pupilY-2,1.5,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fill();

  // 보라 글로우
  var g=ctx.createRadialGradient(cx,by,8,cx,by,55);
  g.addColorStop(0,'rgba(120,0,200,0.1)');g.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(cx,by,55,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();

  // 파편 글로우 파티클
  for(var i=0;i<3;i++){
    var pa=(t*2.5+i*2.1)%(Math.PI*2);
    var pr=wheelR+8;
    ctx.beginPath();ctx.arc(cx+Math.cos(pa)*pr,by+Math.sin(pa)*pr,2,0,Math.PI*2);
    ctx.fillStyle='rgba(180,60,255,'+(0.3+Math.sin(t*5+i)*0.25)+')';ctx.fill();
  }
}

function drawTOYBOX(ctx, t) {
  var cx=60, cy=72;
  ctx.clearRect(0,0,120,120);

  var bob=Math.sin(t*1.4)*1.5;
  var by=cy+bob;

  // 스프링 튀어나오기 사이클 (3초)
  var cycle=(t*0.38)%1;
  var op=cycle<0.12?cycle/0.12:cycle<0.35?1:1-(cycle-0.35)/0.65;
  op=op*op*(3-2*op);

  // 스프링 높이 (튀어나온 정도)
  var springH=op*26;

  // ── 상자 본체 ──
  var bw=52, bh=32;
  var bx=cx-bw/2;
  var bby=by-bh/2;

  // 상자 그라데이션
  var bg=ctx.createLinearGradient(bx,bby,bx+bw,bby+bh);
  bg.addColorStop(0,'#7a3aaa');bg.addColorStop(0.5,'#9a55cc');bg.addColorStop(1,'#5a1a88');
  ctx.beginPath();
  ctx.moveTo(bx+5,bby);ctx.lineTo(bx+bw-5,bby);
  ctx.quadraticCurveTo(bx+bw,bby,bx+bw,bby+5);
  ctx.lineTo(bx+bw,bby+bh-5);ctx.quadraticCurveTo(bx+bw,bby+bh,bx+bw-5,bby+bh);
  ctx.lineTo(bx+5,bby+bh);ctx.quadraticCurveTo(bx,bby+bh,bx,bby+bh-5);
  ctx.lineTo(bx,bby+5);ctx.quadraticCurveTo(bx,bby,bx+5,bby);
  ctx.closePath();
  ctx.fillStyle=bg;ctx.fill();
  ctx.strokeStyle='#2a0a44';ctx.lineWidth=2;ctx.stroke();

  // 상자 별 장식
  ctx.save();ctx.translate(cx,bby+bh/2);
  ctx.beginPath();
  for(var j=0;j<5;j++){
    var a=(j/5)*Math.PI*2-Math.PI/2,a2=a+Math.PI/5;
    j===0?ctx.moveTo(Math.cos(a)*7,Math.sin(a)*7):ctx.lineTo(Math.cos(a)*7,Math.sin(a)*7);
    ctx.lineTo(Math.cos(a2)*3.5,Math.sin(a2)*3.5);
  }
  ctx.closePath();ctx.fillStyle='rgba(255,215,255,0.5)';ctx.fill();
  ctx.restore();

  // 상자 볼트
  [[bx+7,bby+7],[bx+bw-7,bby+7],[bx+7,bby+bh-7],[bx+bw-7,bby+bh-7]].forEach(function(b){
    ctx.beginPath();ctx.arc(b[0],b[1],3,0,Math.PI*2);
    ctx.fillStyle='#bb88ee';ctx.fill();ctx.strokeStyle='#2a0a44';ctx.lineWidth=1;ctx.stroke();
  });

  // 상자 구멍 (스프링 나오는 곳)
  ctx.beginPath();ctx.arc(cx,bby,10,Math.PI,0);
  ctx.fillStyle='#1a0033';ctx.fill();
  ctx.strokeStyle='#2a0a44';ctx.lineWidth=1.5;ctx.stroke();

  // ── 스프링 ──
  if(op>0.02){
    var springX=cx;
    var springTop=bby-springH;
    var springBot=bby;
    var coils=6;
    var coilW=12;

    // 스프링 코일
    ctx.beginPath();
    var steps=coils*8;
    for(var i=0;i<=steps;i++){
      var p=i/steps;
      var sy=springBot+(springTop-springBot)*p;
      var sx=springX+Math.sin(p*coils*Math.PI*2)*coilW*(1-p*0.3);
      i===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);
    }
    // 스프링 압축 느낌 (튀어나올수록 코일 간격 넓어짐)
    var springG=ctx.createLinearGradient(springX-coilW,springTop,springX+coilW,springBot);
    springG.addColorStop(0,'#ddbbff');springG.addColorStop(0.5,'#aa77ee');springG.addColorStop(1,'#7744bb');
    ctx.strokeStyle=springG;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();

    // ── 하얀 몸통 (스프링 위에) ──
    var tw=30,th=28;
    var tx=cx-tw/2;
    var ty=springTop-th;

    // 몸통 흔들림 (스프링 끝에서 살짝 진동)
    var wobble=op>0.8?Math.sin(t*18)*2*(1-op)*3:0;
    tx+=wobble;

    var wg=ctx.createLinearGradient(tx,ty,tx+tw,ty+th);
    wg.addColorStop(0,'#ffffff');wg.addColorStop(0.5,'#f4eeff');wg.addColorStop(1,'#e0d0ff');
    ctx.beginPath();
    ctx.moveTo(tx+4,ty);ctx.lineTo(tx+tw-4,ty);
    ctx.quadraticCurveTo(tx+tw,ty,tx+tw,ty+4);
    ctx.lineTo(tx+tw,ty+th-4);ctx.quadraticCurveTo(tx+tw,ty+th,tx+tw-4,ty+th);
    ctx.lineTo(tx+4,ty+th);ctx.quadraticCurveTo(tx,ty+th,tx,ty+th-4);
    ctx.lineTo(tx,ty+4);ctx.quadraticCurveTo(tx,ty,tx+4,ty);
    ctx.closePath();
    ctx.fillStyle=wg;ctx.fill();
    ctx.strokeStyle='rgba(180,140,255,0.5)';ctx.lineWidth=1.5;ctx.stroke();

    // 몸통 가로선
    [0.35,0.65].forEach(function(r){
      ctx.beginPath();
      ctx.moveTo(tx+5,ty+th*r);ctx.lineTo(tx+tw-5,ty+th*r);
      ctx.strokeStyle='rgba(160,120,240,0.25)';ctx.lineWidth=1;ctx.stroke();
    });

    // 검은 눈
    var ey=ty+th*0.32;
    ctx.globalAlpha=Math.min(1,op*3);
    [-6,6].forEach(function(ox){
      ctx.beginPath();ctx.arc(cx+ox+wobble,ey,4.5,0,Math.PI*2);
      ctx.fillStyle='#080808';ctx.fill();
      ctx.beginPath();ctx.ellipse(cx+ox+wobble,ey,1.3,3.2,0,0,Math.PI*2);
      ctx.fillStyle='#000';ctx.fill();
      ctx.beginPath();ctx.arc(cx+ox+wobble+1.2,ey-1.2,0.9,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.35)';ctx.fill();
    });
    ctx.globalAlpha=1;

    // 팔
    var aOut=Math.max(0,(op-0.4)/0.6);aOut=aOut*aOut*(3-2*aOut);
    var aLen=aOut*20;
    var aY=ty+th*0.5;
    ctx.save();
    ctx.globalAlpha=Math.min(1,aOut*2);
    // 왼팔
    ctx.beginPath();ctx.moveTo(tx,aY);ctx.lineTo(tx-aLen,aY+3);
    ctx.strokeStyle='#ffffff';ctx.lineWidth=6;ctx.lineCap='round';ctx.stroke();
    ctx.beginPath();ctx.arc(tx-aLen,aY+3,5,0,Math.PI*2);
    ctx.fillStyle='#ffffff';ctx.fill();
    // 오른팔
    ctx.beginPath();ctx.moveTo(tx+tw,aY);ctx.lineTo(tx+tw+aLen,aY+3);
    ctx.strokeStyle='#ffffff';ctx.lineWidth=6;ctx.lineCap='round';ctx.stroke();
    ctx.beginPath();ctx.arc(tx+tw+aLen,aY+3,5,0,Math.PI*2);
    ctx.fillStyle='#ffffff';ctx.fill();
    ctx.globalAlpha=1;
    ctx.restore();

    // 튀어나올 때 파티클
    if(op>0.7&&op<0.92){
      for(var j=0;j<4;j++){
        var pa=(j/4)*Math.PI*2,pr=(op-0.7)*40;
        ctx.beginPath();ctx.arc(cx+Math.cos(pa)*pr,bby-springH*0.5+Math.sin(pa)*pr*0.4,2,0,Math.PI*2);
        ctx.fillStyle='rgba(200,130,255,'+(0.6*(1-(op-0.7)/0.22))+')';ctx.fill();
      }
    }
  }

  // 보라 글로우
  var g=ctx.createRadialGradient(cx,by,10,cx,by,52);
  g.addColorStop(0,'rgba(120,40,200,0.07)');g.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(cx,by,52,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
}

function drawSHAME(ctx, t) {
  var cx=60, cy=58;
  ctx.clearRect(0,0,120,120);

  // 글리치 사이클 — 4초마다 폭발적 글리치
  var gCycle=(t*0.28)%1;
  var bigGlitch=gCycle<0.18;
  var glitchIntensity=bigGlitch?Math.sin(gCycle/0.18*Math.PI):0;

  // 떠있는 bob (글리치 중엔 흔들림)
  var bob=Math.sin(t*1.6)*3 + (bigGlitch?(Math.random()-0.5)*6*glitchIntensity:0);
  var by=cy+bob;

  // ── 글리치 배경 레이어 ──
  if(bigGlitch && glitchIntensity>0.1){
    for(var g=0;g<8;g++){
      var gy=Math.random()*120;
      var gh=2+Math.random()*8;
      var gx=(Math.random()-0.5)*30*glitchIntensity;
      ctx.save();
      ctx.globalAlpha=0.3*glitchIntensity;
      ctx.fillStyle=g%2===0?'#cc00ff':'#4400aa';
      ctx.fillRect(gx,gy,120,gh);
      ctx.restore();
    }
    // RGB 분리 효과
    ctx.save();
    ctx.globalAlpha=0.15*glitchIntensity;
    ctx.fillStyle='#ff00ff';
    ctx.fillRect(-4+Math.random()*8,0,120,120);
    ctx.fillStyle='#00ffff';
    ctx.fillRect(4-Math.random()*8,0,120,120);
    ctx.restore();
  }

  // ── 컴퓨터 모니터 본체 ──
  var mw=72, mh=52;
  var mx=cx-mw/2, my=by-mh/2;

  // 글리치 중 위치 흔들림
  var gShiftX=bigGlitch?(Math.random()-0.5)*4*glitchIntensity:0;
  var gShiftY=bigGlitch?(Math.random()-0.5)*3*glitchIntensity:0;

  // 모니터 베젤 (검정)
  var bezelG=ctx.createLinearGradient(mx,my,mx+mw,my+mh);
  bezelG.addColorStop(0,'#1a1a1a');bezelG.addColorStop(0.5,'#0d0d0d');bezelG.addColorStop(1,'#050505');
  ctx.beginPath();
  ctx.moveTo(mx+gShiftX+5,my+gShiftY);ctx.lineTo(mx+mw+gShiftX-5,my+gShiftY);
  ctx.quadraticCurveTo(mx+mw+gShiftX,my+gShiftY,mx+mw+gShiftX,my+gShiftY+5);
  ctx.lineTo(mx+mw+gShiftX,my+mh+gShiftY-5);
  ctx.quadraticCurveTo(mx+mw+gShiftX,my+mh+gShiftY,mx+mw+gShiftX-5,my+mh+gShiftY);
  ctx.lineTo(mx+gShiftX+5,my+mh+gShiftY);
  ctx.quadraticCurveTo(mx+gShiftX,my+mh+gShiftY,mx+gShiftX,my+mh+gShiftY-5);
  ctx.lineTo(mx+gShiftX,my+gShiftY+5);
  ctx.quadraticCurveTo(mx+gShiftX,my+gShiftY,mx+gShiftX+5,my+gShiftY);
  ctx.closePath();
  ctx.fillStyle=bezelG;ctx.fill();
  ctx.strokeStyle=bigGlitch?'rgba(180,0,255,'+(0.4+glitchIntensity*0.6)+')':'rgba(40,0,60,0.8)';
  ctx.lineWidth=1.8;ctx.stroke();

  // 스크린 영역
  var sp=4;
  var sx=mx+sp+gShiftX, sy=my+sp+gShiftY, sw=mw-sp*2, sh=mh-sp*2;
  ctx.beginPath();ctx.rect(sx,sy,sw,sh);
  ctx.fillStyle='#030008';ctx.fill();

  // 스크린 스캔라인
  for(var i=0;i<sh;i+=3){
    ctx.beginPath();ctx.moveTo(sx,sy+i);ctx.lineTo(sx+sw,sy+i);
    ctx.strokeStyle='rgba(60,0,80,0.15)';ctx.lineWidth=1;ctx.stroke();
  }

  // ── 보라색 사악한 웃음 ──
  var faceCX=sx+sw/2, faceCY=sy+sh/2;

  // 글리치 중 얼굴도 흔들림
  var fgx=bigGlitch?(Math.random()-0.5)*5*glitchIntensity:0;
  var fgy=bigGlitch?(Math.random()-0.5)*4*glitchIntensity:0;

  // 눈 두 개 (사악하게 가늘게 뜬)
  var eyeY=faceCY-8+fgy;
  var eyePulse=0.7+Math.sin(t*3)*0.3;
  [-10,10].forEach(function(ox,i){
    var ex=faceCX+ox+fgx;
    // 눈 글로우
    var eg=ctx.createRadialGradient(ex,eyeY,0,ex,eyeY,10);
    eg.addColorStop(0,'rgba(180,0,255,0.3)');eg.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(ex,eyeY,10,0,Math.PI*2);ctx.fillStyle=eg;ctx.fill();

    // 눈 (가늘고 사악한 — 세모 형태)
    ctx.beginPath();
    if(i===0){
      // 왼쪽 눈 — 안쪽이 치켜올라감
      ctx.moveTo(ex-7,eyeY+3);ctx.lineTo(ex,eyeY-4);ctx.lineTo(ex+7,eyeY+3);
    } else {
      // 오른쪽 눈
      ctx.moveTo(ex-7,eyeY+3);ctx.lineTo(ex,eyeY-4);ctx.lineTo(ex+7,eyeY+3);
    }
    ctx.closePath();
    var eyeG=ctx.createLinearGradient(ex-7,eyeY-4,ex+7,eyeY+3);
    eyeG.addColorStop(0,'#ee00ff');eyeG.addColorStop(1,'#8800cc');
    ctx.fillStyle=eyeG;ctx.fill();

    // 눈 반짝임
    ctx.beginPath();ctx.arc(ex+(i===0?-2:2),eyeY-1,1.5,0,Math.PI*2);
    ctx.fillStyle='rgba(255,200,255,0.7)';ctx.fill();
  });

  // 사악한 웃음 (크고 휜 입)
  var mouthY=faceCY+6+fgy;
  var mouthW=18+Math.sin(t*2)*2;

  // 입 글로우
  var mg=ctx.createRadialGradient(faceCX+fgx,mouthY,0,faceCX+fgx,mouthY,22);
  mg.addColorStop(0,'rgba(160,0,255,0.2)');mg.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(faceCX+fgx,mouthY,22,0,Math.PI*2);ctx.fillStyle=mg;ctx.fill();

  // 입 (크게 벌린 사악한 미소)
  ctx.beginPath();
  ctx.moveTo(faceCX+fgx-mouthW,mouthY-4);
  ctx.quadraticCurveTo(faceCX+fgx-mouthW+4,mouthY+2,faceCX+fgx-mouthW+6,mouthY);
  ctx.quadraticCurveTo(faceCX+fgx,mouthY+14,faceCX+fgx+mouthW-6,mouthY);
  ctx.quadraticCurveTo(faceCX+fgx+mouthW-4,mouthY+2,faceCX+fgx+mouthW,mouthY-4);
  ctx.strokeStyle='#cc00ff';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();

  // 이빨 (위 아래)
  var teethColors=['#dd88ff','#ffffff','#dd88ff'];
  for(var i=0;i<3;i++){
    var tx2=faceCX+fgx-8+i*8;
    // 위 이빨
    ctx.beginPath();ctx.moveTo(tx2-3,mouthY-1);ctx.lineTo(tx2,mouthY+5);ctx.lineTo(tx2+3,mouthY-1);
    ctx.closePath();ctx.fillStyle=teethColors[i];ctx.fill();
    // 아래 이빨
    ctx.beginPath();ctx.moveTo(tx2-2.5,mouthY+9);ctx.lineTo(tx2,mouthY+4);ctx.lineTo(tx2+2.5,mouthY+9);
    ctx.closePath();ctx.fillStyle=teethColors[i];ctx.fill();
  }

  // ── 소형 글리치 라인 (상시) ──
  for(var i=0;i<2;i++){
    var ly=sy+Math.random()*sh;
    var la=0.05+Math.random()*0.1;
    ctx.beginPath();ctx.moveTo(sx,ly);ctx.lineTo(sx+sw,ly);
    ctx.strokeStyle='rgba(180,0,255,'+la+')';ctx.lineWidth=1;ctx.stroke();
  }

  // ── 대형 글리치 (주기적) ──
  if(bigGlitch && glitchIntensity>0.3){
    // 화면 조각 글리치 (색 블록으로 대체)
    for(var i=0;i<4;i++){
      var sliceY=sy+Math.random()*sh;
      var sliceH=2+Math.random()*6;
      var sliceX=sx+(Math.random()-0.5)*16*glitchIntensity;
      ctx.save();
      ctx.globalAlpha=0.25*glitchIntensity;
      ctx.fillStyle=i%2===0?'#cc00ff':'#220044';
      ctx.fillRect(sliceX,sliceY,sw,sliceH);
      ctx.restore();
    }
    // 보라 플래시
    ctx.save();
    ctx.globalAlpha=0.15*glitchIntensity;
    ctx.fillStyle='#aa00ff';
    ctx.fillRect(sx,sy,sw,sh);
    ctx.restore();
    // 외부 글리치 바
    for(var i=0;i<4;i++){
      var gy2=Math.random()*120;
      ctx.save();ctx.globalAlpha=0.25*glitchIntensity;
      ctx.fillStyle='#cc00ff';
      ctx.fillRect(0,gy2,120,1+Math.random()*4);
      ctx.restore();
    }
  }

  // 스크린 반사
  ctx.beginPath();ctx.rect(sx,sy,sw*0.4,8);
  ctx.fillStyle='rgba(255,255,255,0.03)';ctx.fill();

  // ── 스탠드 ──
  ctx.beginPath();
  ctx.moveTo(cx+gShiftX-3,my+mh+gShiftY);ctx.lineTo(cx+gShiftX-3,my+mh+gShiftY+8);
  ctx.lineTo(cx+gShiftX+3,my+mh+gShiftY+8);ctx.lineTo(cx+gShiftX+3,my+mh+gShiftY);
  ctx.fillStyle='#111';ctx.fill();
  ctx.beginPath();
  ctx.moveTo(cx+gShiftX-14,my+mh+gShiftY+8);ctx.lineTo(cx+gShiftX+14,my+mh+gShiftY+8);
  ctx.lineTo(cx+gShiftX+10,my+mh+gShiftY+12);ctx.lineTo(cx+gShiftX-10,my+mh+gShiftY+12);
  ctx.closePath();ctx.fillStyle='#0d0d0d';ctx.fill();

  // 전원 LED (글리치 중 깜빡)
  var ledAlpha=bigGlitch?Math.random():0.6+Math.sin(t*3)*0.3;
  ctx.beginPath();ctx.arc(mx+mw+gShiftX-8,my+mh+gShiftY-6,2.5,0,Math.PI*2);
  ctx.fillStyle='rgba(180,0,255,'+ledAlpha+')';ctx.fill();
  ctx.shadowColor='#cc00ff';ctx.shadowBlur=6;ctx.fill();ctx.shadowBlur=0;

  // 전체 보라 글로우
  var glowR=bigGlitch?55+glitchIntensity*15:48;
  var glowA=bigGlitch?0.06+glitchIntensity*0.12:0.04;
  var gg=ctx.createRadialGradient(cx,by,8,cx,by,glowR);
  gg.addColorStop(0,'rgba(140,0,255,'+glowA*2+')');
  gg.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(cx,by,glowR,0,Math.PI*2);ctx.fillStyle=gg;ctx.fill();

  // 글리치 중 외곽 보라 테두리 플래시
  if(bigGlitch && glitchIntensity>0.5){
    ctx.beginPath();ctx.rect(0,0,120,120);
    ctx.strokeStyle='rgba(180,0,255,'+(glitchIntensity*0.4)+')';
    ctx.lineWidth=3;ctx.stroke();
  }
}

var currentTab='wifi';
function switchTab(tab){
  currentTab=tab;
  document.getElementById('tab_wifi').style.opacity  =tab==='wifi' ?'1':'0.4';
  document.getElementById('tab_enemy').style.opacity =tab==='enemy'?'1':'0.4';
  document.getElementById('tab_wifi').style.borderColor  =tab==='wifi' ?'#00ff88':'#0d3a1a';
  document.getElementById('tab_enemy').style.borderColor =tab==='enemy'?'#ff4444':'#1a0a0a';
  document.getElementById('panel_wifi').style.display  =tab==='wifi' ?'flex':'none';
  document.getElementById('panel_enemy').style.display =tab==='enemy'?'flex':'none';
}

var wCtxs={};
function buildWifi(){
  var grid=document.getElementById('panel_wifi');
  MONSTER_LIST.forEach(function(m){
    skinIndex[m.id]=0;
    var hasSkin=SKINS[m.id].length>1;
    var div=document.createElement('div');
    div.className='mcard';
    if(m.hidden) div.style.display='none';
    div.id='wcard_'+m.id;
    var nav=hasSkin?
      '<div class="snav">'+
        '<button class="sarr" data-id="'+m.id+'" data-dir="-1" onclick="chSkinBtn(this)">◀</button>'+
        '<span class="slabel" id="sl_'+m.id+'">기본</span>'+
        '<button class="sarr" data-id="'+m.id+'" data-dir="1" onclick="chSkinBtn(this)">▶</button>'+
      '</div>':
      '<div class="snav"><span class="slabel">기본</span></div>';
    div.innerHTML=
      '<div class="badge">'+m.num+'</div>'+
      '<canvas id="wc_'+m.id+'" style="width:120px;height:120px;"></canvas>'+
      '<div class="mname">'+m.name+'</div>'+
      '<div class="mssid">'+m.ssid+'</div>'+nav;
    grid.appendChild(div);
    var c=document.getElementById('wc_'+m.id);
    var dpr=window.devicePixelRatio||1;
    c.width=120*dpr;c.height=120*dpr;c.style.width='120px';c.style.height='120px';
    var ctx=c.getContext('2d');ctx.scale(dpr,dpr);
    wCtxs[m.id]=ctx;
  });
}

function chSkin(el,id,dir){
  var n=SKINS[id].length;
  skinIndex[id]=((skinIndex[id]||0)+dir+n)%n;
  var sl=document.getElementById('sl_'+id);
  if(sl) sl.textContent=SKIN_LABELS[id][skinIndex[id]];
}
function chSkinBtn(btn){
  var id=btn.getAttribute('data-id');
  var dir=parseInt(btn.getAttribute('data-dir'));
  chSkin(btn,id,dir);
}

var eCtxs={},shameOn=false;
function buildEnemy(){
  var grid=document.getElementById('panel_enemy');
  ENEMIES.forEach(function(e,idx){
    var div=document.createElement('div');
    div.className='ecard';
    div.innerHTML=
      '<div class="badge">'+e.num+'</div>'+
      '<canvas id="ec_'+e.id+'" style="width:120px;height:120px;"></canvas>'+
      '<div class="ename">'+e.name+'</div>'+
      '<div class="etype">// '+e.type+' //</div>'+
      '<div class="edesc">'+e.desc+'</div>'+
      '';
    div.onclick=function(){
      document.querySelectorAll('.ecard').forEach(function(c){c.style.borderColor='';});
      div.style.borderColor='#ff4444';
    };
    grid.appendChild(div);
    var c=document.getElementById('ec_'+e.id);
    var dpr=window.devicePixelRatio||1;
    c.width=120*dpr;c.height=120*dpr;c.style.width='120px';c.style.height='120px';
    var ctx=c.getContext('2d');ctx.scale(dpr,dpr);
    eCtxs[e.id]=ctx;
    setTimeout(function(){ e.fn(eCtxs[e.id],0); },idx*40);
  });
  var sc=document.createElement('div');
  sc.className='ecard';sc.id='shame_card';sc.style.display='none';
  sc.innerHTML=
    '<div class="badge">E???</div>'+
    '<canvas id="ec_shame" style="width:120px;height:120px;"></canvas>'+
    '<div class="ename" style="color:#cc44ff;">SHAME</div>'+
    '<div class="etype">// ??? HIDDEN //</div>'+
    '<div class="edesc">검은 컴퓨터 속 사악한 존재.<br>글리치가 현실을 침범한다.</div>';
  grid.appendChild(sc);
}

function revealHuawei(){
  var card=document.getElementById('wcard_huawei');
  if(card&&card.style.display==='none'){
    card.style.display='flex';
    card.style.opacity='0';card.style.transform='scale(0.7)';
    card.style.transition='opacity 0.5s,transform 0.5s';
    setTimeout(function(){card.style.opacity='1';card.style.transform='scale(1)';},50);
  }
}

function revealShame(){
  if(shameOn)return;
  revealHuawei();
  shameOn=true;
  switchTab('enemy');
  var card=document.getElementById('shame_card');
  card.style.cssText+='display:flex;opacity:0;transform:scale(0.5);transition:opacity .5s,transform .5s;border-color:#cc44ff;';
  setTimeout(function(){card.style.opacity='1';card.style.transform='scale(1)';},50);
  var c=document.getElementById('ec_shame');
  var dpr=window.devicePixelRatio||1;
  c.width=120*dpr;c.height=120*dpr;c.style.width='120px';c.style.height='120px';
  var ctx=c.getContext('2d');ctx.scale(dpr,dpr);
  eCtxs['shame']=ctx;
}

var lastTS=0,T=0;
function loop(ts){
  if(!lastTS)lastTS=ts;
  T+=Math.min((ts-lastTS)/1000,0.05);
  lastTS=ts;
  MONSTER_LIST.forEach(function(m){
    if(!wCtxs[m.id])return;
    var fn=SKINS[m.id][skinIndex[m.id]||0];
    if(fn)fn(wCtxs[m.id],T);
  });
  ENEMIES.forEach(function(e){
    if(eCtxs[e.id]) e.fn(eCtxs[e.id],T);
  });
  if(shameOn&&eCtxs['shame'])drawSHAME(eCtxs['shame'],T);
  requestAnimationFrame(loop);
}

window.onload=function(){
  buildWifi();
  buildEnemy();
  switchTab('wifi');
  requestAnimationFrame(loop);
};

</script>
