<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GLITCH_KNIGHT</title>
<style>
  :root{
    --bg:#05060a;
    --grid:#0d1420;
    --fg:#39ff9e;
    --fg2:#16f0ff;
    --warn:#ff3b6b;
    --gold:#ffd24a;
    --dim:#1a2233;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:var(--bg);overflow:hidden;font-family:"Courier New",ui-monospace,monospace;color:var(--fg);}
  body{display:flex;align-items:center;justify-content:center;touch-action:none;user-select:none;-webkit-user-select:none;}
  #wrap{
    position:relative;width:100%;height:100%;max-width:960px;max-height:600px;
    background:#000;overflow:hidden;
  }
  canvas{display:block;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;}

  /* scanlines + vignette overlay */
  #scan{
    position:absolute;inset:0;pointer-events:none;z-index:5;
    background:repeating-linear-gradient(to bottom,rgba(0,0,0,0) 0px,rgba(0,0,0,0) 2px,rgba(0,0,0,.22) 3px,rgba(0,0,0,0) 4px);
    mix-blend-mode:multiply;
  }
  #vig{position:absolute;inset:0;pointer-events:none;z-index:6;
    box-shadow:inset 0 0 140px 30px rgba(0,0,0,.85);}

  /* glitch shake on container */
  #wrap.shake{animation:shk .18s steps(2) infinite;}
  @keyframes shk{0%{transform:translate(0,0)}25%{transform:translate(-2px,1px)}50%{transform:translate(2px,-1px)}75%{transform:translate(-1px,2px)}100%{transform:translate(1px,-2px)}}
  #wrap.corrupt{animation:hue 1.2s linear infinite;}
  @keyframes hue{0%{filter:none}50%{filter:hue-rotate(25deg) saturate(1.3)}100%{filter:none}}

  /* HUD */
  #hud{position:absolute;top:0;left:0;right:0;z-index:7;padding:8px 10px;pointer-events:none;
    display:flex;justify-content:space-between;align-items:flex-start;font-size:12px;letter-spacing:1px;text-shadow:0 0 6px var(--fg);}
  #hud .bar{height:10px;width:140px;border:1px solid var(--fg);background:#000;position:relative;margin-top:3px;}
  #hud .bar i{position:absolute;left:0;top:0;bottom:0;display:block;}
  #hpfill{background:var(--fg);box-shadow:0 0 8px var(--fg);}
  #corfill{background:var(--warn);box-shadow:0 0 8px var(--warn);}
  #instfill{background:var(--gold);box-shadow:0 0 8px var(--gold);}
  .lbl{opacity:.8;font-size:10px;}
  #right{text-align:right;color:var(--fg2);text-shadow:0 0 6px var(--fg2);}

  /* glitch inventory slots */
  #slots{position:absolute;left:10px;bottom:96px;z-index:7;display:flex;gap:6px;pointer-events:none;}
  .slot{width:44px;height:44px;border:1px solid var(--dim);background:rgba(10,16,26,.8);
    display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:8px;line-height:1.1;
    color:#5b6b82;text-align:center;border-radius:3px;}
  .slot.has{color:#fff;}
  .slot.on{border-color:currentColor;box-shadow:0 0 12px currentColor;animation:pulse 1s infinite;}
  @keyframes pulse{50%{opacity:.55}}
  .slot .k{font-size:13px;font-weight:bold;}

  /* mobile controls */
  #pad{position:absolute;inset:0;z-index:8;pointer-events:none;}
  .btn{position:absolute;pointer-events:auto;border:1px solid var(--fg);color:var(--fg);
    background:rgba(8,14,22,.55);border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:18px;backdrop-filter:blur(2px);text-shadow:0 0 6px var(--fg);transition:background .05s;}
  .btn:active,.btn.down{background:rgba(57,255,158,.3);}
  #bL{left:14px;bottom:18px;width:58px;height:58px;}
  #bR{left:80px;bottom:18px;width:58px;height:58px;}
  #bJump{right:18px;bottom:60px;width:64px;height:64px;}
  #bAtk{right:90px;bottom:18px;width:58px;height:58px;border-color:var(--fg2);color:var(--fg2);text-shadow:0 0 6px var(--fg2);}
  #bAtk:active,#bAtk.down{background:rgba(22,240,255,.3);}
  .gbtn{position:absolute;pointer-events:auto;width:46px;height:46px;border:1px solid var(--gold);color:var(--gold);
    background:rgba(8,14,22,.55);border-radius:6px;font-size:14px;display:flex;align-items:center;justify-content:center;
    text-shadow:0 0 6px var(--gold);}
  .gbtn:active,.gbtn.down{background:rgba(255,210,74,.3);}
  #g1{right:18px;top:120px;} #g2{right:18px;top:172px;} #g3{right:18px;top:224px;} #g4{right:18px;top:276px;}

  /* overlay screens */
  #screen{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 40%,rgba(8,16,26,.9),rgba(0,0,0,.97));text-align:center;padding:20px;}
  #screen.hide{display:none;}
  #screen h1{font-size:clamp(28px,8vw,64px);letter-spacing:6px;color:var(--fg);
    text-shadow:3px 0 var(--warn),-3px 0 var(--fg2),0 0 18px var(--fg);animation:tg 2.5s infinite;}
  @keyframes tg{2%,8%{transform:translate(-3px,0) skewX(4deg)}4%,10%{transform:translate(3px,0) skewX(-4deg)}0%,12%,100%{transform:none}}
  #screen p{margin-top:14px;font-size:13px;line-height:1.7;color:#9fb3c8;max-width:560px;}
  #screen .key{color:var(--fg2);}
  #screen button{margin-top:26px;pointer-events:auto;font-family:inherit;font-size:16px;letter-spacing:3px;
    padding:14px 34px;background:#000;color:var(--fg);border:1px solid var(--fg);cursor:pointer;
    box-shadow:0 0 14px var(--fg);transition:.15s;}
  #screen button:hover{background:var(--fg);color:#000;}
  .end-stat{color:var(--gold);font-size:18px;margin-top:8px;letter-spacing:2px;}
  #toast{position:absolute;left:50%;top:54px;transform:translateX(-50%);z-index:9;
    color:#fff;font-size:13px;letter-spacing:1px;text-shadow:0 0 8px var(--fg2);opacity:0;transition:opacity .25s;white-space:nowrap;}
  #toast.show{opacity:1;}
  @media (min-width:860px){ #pad{display:none;} }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv"></canvas>
  <div id="scan"></div>
  <div id="vig"></div>

  <div id="hud">
    <div>
      <div class="lbl">INTEGRITY</div>
      <div class="bar"><i id="hpfill"></i></div>
      <div class="lbl" style="margin-top:6px;color:var(--warn)">CORRUPTION <span id="corpct">0%</span></div>
      <div class="bar"><i id="corfill"></i></div>
      <div class="lbl" style="margin-top:6px;color:var(--gold)">INSTABILITY</div>
      <div class="bar"><i id="instfill"></i></div>
    </div>
    <div id="right">
      <div>FRAGMENTS: <span id="frag">0</span></div>
      <div>KILLS: <span id="kills">0</span></div>
      <div id="depth">DEPTH 0m</div>
    </div>
  </div>

  <div id="slots"></div>

  <div id="toast"></div>

  <div id="pad">
    <div class="btn" id="bL">◀</div>
    <div class="btn" id="bR">▶</div>
    <div class="btn" id="bJump">▲</div>
    <div class="btn" id="bAtk">⚔</div>
    <div class="gbtn" id="g1">1</div>
    <div class="gbtn" id="g2">2</div>
    <div class="gbtn" id="g3">3</div>
    <div class="gbtn" id="g4">4</div>
  </div>

  <div id="screen">
    <h1>GLITCH_KNIGHT</h1>
    <p>
      이 게임은 <span class="key">고장날 수록</span> 깊어진다.<br>
      적을 처치하면 <span class="key">코드 조각</span>이 떨어진다. 주워서 장착하면 게임의 물리가 망가진다.<br><br>
      이동 <span class="key">← →</span> / 점프 <span class="key">SPACE·↑</span> / 공격 <span class="key">X·Z</span><br>
      글리치 토글 <span class="key">1 2 3 4</span><br><br>
      정상 출구로 나가면 그냥 클리어. 하지만 게임을 충분히 <span class="key">CORRUPT</span> 시키면<br>
      숨겨진 출구가 열린다. 끝엔 너의 글리치를 지우러 오는 <span class="key">ANTIVIRUS</span>가 있다.
    </p>
    <button id="startBtn">EXECUTE</button>
  </div>
</div>

<script>
"use strict";
(function(){
  // ---------- canvas ----------
  var cv = document.getElementById("cv");
  var ctx = cv.getContext("2d");
  var W = 960, H = 600;          // internal resolution
  cv.width = W; cv.height = H;

  var wrap = document.getElementById("wrap");

  // ---------- PHYSICS (everything is a variable — glitches overwrite these) ----------
  var BASE = {
    gravity: 0.62,
    friction: 0.80,
    airFriction: 0.92,
    collisionOn: true,
    timeScale: 1,
    jumpPower: -13.2,
    moveAccel: 1.1,
    maxSpeed: 4.6,
    gravDir: 1,          // 1 = down, -1 = up
    enemyGravity: 0.62
  };
  var PHYS = {};
  function resetPhys(){ for(var k in BASE) PHYS[k]=BASE[k]; }
  resetPhys();

  // ---------- GLITCH DEFINITIONS ----------
  // each is a runtime patch on PHYS / behaviour. corruption = how broken it makes the world.
  var GLITCHES = [
    {
      id:"GRAVITY_FLIP", name:"GRAV_FLIP", color:"#16f0ff", corrupt:22,
      desc:"중력 반전",
      apply:function(){ PHYS.gravDir = -1; },
      unapply:function(){ PHYS.gravDir = 1; }
    },
    {
      id:"NOCLIP", name:"NOCLIP", color:"#ff3b6b", corrupt:30,
      desc:"벽 통과(바닥밖=즉사)",
      apply:function(){ PHYS.collisionOn = false; },
      unapply:function(){ PHYS.collisionOn = true; }
    },
    {
      id:"TIME_X2", name:"TIME x2", color:"#ffd24a", corrupt:18,
      desc:"전체 2배속",
      apply:function(){ PHYS.timeScale = 2; },
      unapply:function(){ PHYS.timeScale = 1; }
    },
    {
      id:"MEM_LEAK", name:"MEM_LEAK", color:"#c46bff", corrupt:26,
      desc:"처치할수록 데미지+, 화면붕괴",
      apply:function(){ player.leak = true; },
      unapply:function(){ player.leak = false; }
    }
  ];
  // DUPLICATE is a passive world rule toggled by corruption threshold (enemies split)
  function dupActive(){ return corruption > 55; }

  // ---------- WORLD ----------
  var LEVEL_W = 5200;
  var GROUND_Y = 500;
  var platforms = [];
  var enemies = [];
  var fragments = [];
  var particles = [];
  var floaters = [];  // damage / text popups

  function buildLevel(){
    platforms = [];
    // ground segments (with a couple gaps for noclip danger)
    platforms.push({x:0,y:GROUND_Y,w:1400,h:120,solid:true});
    platforms.push({x:1520,y:GROUND_Y,w:1500,h:120,solid:true});
    platforms.push({x:3160,y:GROUND_Y,w:2040,h:120,solid:true});
    // ceiling (for gravity flip walking)
    platforms.push({x:0,y:0,w:LEVEL_W,h:40,solid:true});
    // floating platforms
    platforms.push({x:420,y:380,w:180,h:24,solid:true});
    platforms.push({x:760,y:300,w:160,h:24,solid:true});
    platforms.push({x:1180,y:340,w:170,h:24,solid:true});
    platforms.push({x:1700,y:360,w:200,h:24,solid:true});
    platforms.push({x:2050,y:260,w:160,h:24,solid:true});
    platforms.push({x:2400,y:340,w:180,h:24,solid:true});
    platforms.push({x:2750,y:280,w:160,h:24,solid:true});
    platforms.push({x:3300,y:360,w:200,h:24,solid:true});
    platforms.push({x:3700,y:300,w:180,h:24,solid:true});
    platforms.push({x:4100,y:360,w:200,h:24,solid:true});
    // hidden upper ledge — only reachable with NOCLIP+GRAV_FLIP, leads to corrupted exit
    platforms.push({x:4550,y:120,w:260,h:22,solid:true,hidden:true});
  }

  // exits
  var normalExit = {x:4980,y:GROUND_Y-90,w:50,h:90};
  var corruptExit = {x:4640,y:60,w:50,h:60};

  // ---------- PLAYER ----------
  var player = {
    x:80,y:GROUND_Y-60,w:26,h:46,vx:0,vy:0,facing:1,onGround:false,
    hp:100,maxhp:100,attacking:0,atkCd:0,invuln:0,leak:false,leakStack:0,dead:false
  };

  // ---------- STATE ----------
  var STATE = "TITLE"; // TITLE, PLAY, BOSS, WIN, OVER
  var corruption = 0;     // 0..100
  var instability = 0;    // 0..100, crash risk
  var fragCount = 0;
  var killCount = 0;
  var camX = 0;
  var owned = {};         // glitch id -> true once a fragment collected
  var activeIds = {};     // glitch id -> true when toggled on
  var glitchTime = 0;     // frames glitch fx active
  var crashTimer = 0;     // when instability maxes
  var boss = null;
  var bossSpawned = false;
  var tick = 0;
  var endKind = "";

  // ---------- INPUT ----------
  var keys = {};
  function setKey(code,val){ keys[code]=val; }
  window.addEventListener("keydown",function(e){
    var c=e.code;
    if(["ArrowLeft","ArrowRight","ArrowUp","Space","KeyZ","KeyX","Digit1","Digit2","Digit3","Digit4"].indexOf(c)>=0) e.preventDefault();
    if(STATE==="TITLE") return;
    if(c==="ArrowLeft") setKey("L",1);
    else if(c==="ArrowRight") setKey("R",1);
    else if(c==="Space"||c==="ArrowUp"||c==="KeyW") tryJump();
    else if(c==="KeyZ"||c==="KeyX") tryAttack();
    else if(c==="Digit1") toggleGlitch(0);
    else if(c==="Digit2") toggleGlitch(1);
    else if(c==="Digit3") toggleGlitch(2);
    else if(c==="Digit4") toggleGlitch(3);
  });
  window.addEventListener("keyup",function(e){
    if(e.code==="ArrowLeft") setKey("L",0);
    else if(e.code==="ArrowRight") setKey("R",0);
  });

  // touch / pointer buttons (Samsung-safe: addEventListener, no inline onclick)
  function bindHold(id,onDown,onUp){
    var el=document.getElementById(id);
    function dn(e){ e.preventDefault(); el.classList.add("down"); onDown&&onDown(); }
    function up(e){ e.preventDefault(); el.classList.remove("down"); onUp&&onUp(); }
    el.addEventListener("touchstart",dn,{passive:false});
    el.addEventListener("touchend",up,{passive:false});
    el.addEventListener("touchcancel",up,{passive:false});
    el.addEventListener("mousedown",dn);
    el.addEventListener("mouseup",up);
    el.addEventListener("mouseleave",up);
  }
  bindHold("bL",function(){setKey("L",1);},function(){setKey("L",0);});
  bindHold("bR",function(){setKey("R",1);},function(){setKey("R",0);});
  bindHold("bJump",function(){tryJump();});
  bindHold("bAtk",function(){tryAttack();});
  function bindTap(id,fn){
    var el=document.getElementById(id);
    function h(e){ e.preventDefault(); el.classList.add("down"); fn(); setTimeout(function(){el.classList.remove("down");},90); }
    el.addEventListener("touchstart",h,{passive:false});
    el.addEventListener("click",h);
  }
  bindTap("g1",function(){toggleGlitch(0);});
  bindTap("g2",function(){toggleGlitch(1);});
  bindTap("g3",function(){toggleGlitch(2);});
  bindTap("g4",function(){toggleGlitch(3);});

  document.getElementById("startBtn").addEventListener("click",startGame);

  // ---------- ACTIONS ----------
  function tryJump(){
    if(STATE==="TITLE"||player.dead) return;
    if(player.onGround){
      player.vy = -Math.abs(PHYS.jumpPower) * PHYS.gravDir; // jump opposes gravity
      player.onGround=false;
      spawnParticles(player.x+player.w/2, player.y+(PHYS.gravDir>0?player.h:0), 6, "#39ff9e");
    }
  }
  function tryAttack(){
    if(STATE==="TITLE"||player.dead) return;
    if(player.atkCd>0) return;
    player.attacking=10; player.atkCd=18;
    var hb = attackBox();
    spawnParticles(hb.x+hb.w/2, hb.y+hb.h/2, 4, "#16f0ff");
  }
  function attackBox(){
    var w=42,h=40;
    var x = player.facing>0 ? player.x+player.w : player.x-w;
    return {x:x,y:player.y+3,w:w,h:h};
  }

  function toggleGlitch(i){
    var g=GLITCHES[i];
    if(!g||!owned[g.id]){ toast("// 조각 없음: "+ (g?g.name:"?")); return; }
    if(activeIds[g.id]){
      activeIds[g.id]=false; g.unapply();
      toast("// "+g.name+" :: OFF");
    } else {
      activeIds[g.id]=true; g.apply();
      toast("// "+g.name+" :: ON  ("+g.desc+")");
      glitchTime = 26;
    }
    recalcCorruption();
  }

  function recalcCorruption(){
    var c=0,n=0;
    for(var i=0;i<GLITCHES.length;i++){
      if(activeIds[GLITCHES[i].id]){ c+=GLITCHES[i].corrupt; n++; }
    }
    // stacking multiple glitches is exponentially more corrupt
    if(n>=2) c += (n-1)*10;
    corruption = Math.min(100, c);
    document.getElementById("corpct").textContent = Math.round(corruption)+"%";
    wrap.classList.toggle("corrupt", corruption>40);
  }

  // ---------- helpers ----------
  function aabb(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }
  function rnd(a,b){ return a+Math.random()*(b-a); }
  function clamp(v,a,b){ return v<a?a:(v>b?b:v); }

  var toastEl=document.getElementById("toast");
  var toastT=0;
  function toast(msg){ toastEl.textContent=msg; toastEl.classList.add("show"); toastT=120; }

  function spawnParticles(x,y,n,col){
    for(var i=0;i<n;i++) particles.push({x:x,y:y,vx:rnd(-3,3),vy:rnd(-4,1),life:rnd(18,34),col:col,sz:rnd(2,4)});
  }
  function floatText(x,y,txt,col){ floaters.push({x:x,y:y,txt:txt,col:col,life:42}); }

  // ---------- enemies ----------
  function spawnEnemy(x,y,type){
    var e={x:x,y:y,w:30,h:38,vx:0,vy:0,hp:3,type:type||"crawler",facing:-1,
      hurt:0,onGround:false,fireCd:rnd(40,120),split:0};
    if(type==="turret"){ e.w=34;e.h=34;e.hp=4; }
    if(type==="splitter"){ e.hp=2; e.split=2; }
    enemies.push(e);
  }
  function populate(){
    enemies=[]; fragments=[];
    spawnEnemy(560,GROUND_Y-38,"crawler");
    spawnEnemy(900,GROUND_Y-38,"crawler");
    spawnEnemy(1250,GROUND_Y-38,"splitter");
    spawnEnemy(1750,GROUND_Y-38,"crawler");
    spawnEnemy(2050,222,"turret");
    spawnEnemy(2300,GROUND_Y-38,"splitter");
    spawnEnemy(2780,242,"turret");
    spawnEnemy(3000,GROUND_Y-38,"crawler");
    spawnEnemy(3400,GROUND_Y-38,"splitter");
    spawnEnemy(3760,262,"turret");
    spawnEnemy(3950,GROUND_Y-38,"crawler");
    spawnEnemy(4250,GROUND_Y-38,"crawler");
  }

  function killEnemy(e,idx){
    killCount++;
    document.getElementById("kills").textContent=killCount;
    spawnParticles(e.x+e.w/2,e.y+e.h/2,12,e.type==="turret"?"#ffd24a":"#ff3b6b");
    // drop a fragment — biased toward glitches not yet owned
    var pool=[];
    for(var i=0;i<GLITCHES.length;i++){ if(!owned[GLITCHES[i].id]) pool.push(i); }
    if(pool.length===0){ for(i=0;i<GLITCHES.length;i++) pool.push(i); }
    var gi = pool[Math.floor(Math.random()*pool.length)];
    fragments.push({x:e.x+e.w/2,y:e.y,vy:-3,gi:gi,life:600,t:0});
    // DUPLICATE rule: splitter or high corruption spawns weak copies
    if((e.type==="splitter" && e.split>0) || (dupActive() && Math.random()<0.4 && e.split>=0)){
      var n=2;
      for(var s=0;s<n;s++){
        var c={x:e.x+rnd(-10,10),y:e.y,w:20,h:26,vx:rnd(-2,2),vy:-2,hp:1,type:"crawler",
          facing:Math.random()<.5?-1:1,hurt:0,onGround:false,fireCd:999,split:0,mini:true};
        enemies.push(c);
      }
      floatText(e.x,e.y-10,"FORK()","#c46bff");
    }
    enemies.splice(idx,1);
  }

  // ---------- BOSS: ANTIVIRUS ----------
  function spawnBoss(){
    boss={x:4400,y:120,w:90,h:90,vx:0,vy:0,hp:60,maxhp:60,phase:0,atkCd:90,
      mode:"scan",t:0,patchCd:240,beam:0,facing:-1};
    bossSpawned=true; STATE="BOSS";
    toast("// PROCESS: ANTIVIRUS.exe STARTED");
    // boss arena floor extends; remove far exit logic
  }

  function bossPatch(){
    // antivirus deletes one of your active glitches
    var act=[];
    for(var i=0;i<GLITCHES.length;i++) if(activeIds[GLITCHES[i].id]) act.push(i);
    if(act.length===0) return;
    var gi=act[Math.floor(Math.random()*act.length)];
    var g=GLITCHES[gi];
    activeIds[g.id]=false; g.unapply();
    owned[g.id]=false; // it's deleted entirely — re-collect by killing? no enemies in boss -> permanent
    recalcCorruption();
    floatText(player.x,player.y-20,"PATCHED: "+g.name,"#ff3b6b");
    toast("// ANTIVIRUS deleted "+g.name);
    glitchTime=24; shake(10);
  }

  // ---------- screen shake ----------
  var shakeT=0;
  function shake(n){ shakeT=Math.max(shakeT,n); }

  // ---------- start / reset ----------
  function startGame(){
    document.getElementById("screen").classList.add("hide");
    STATE="PLAY";
    resetPhys();
    corruption=0; instability=0; fragCount=0; killCount=0; camX=0;
    owned={}; activeIds={}; glitchTime=0; crashTimer=0; boss=null; bossSpawned=false; endKind="";
    player.x=80; player.y=GROUND_Y-60; player.vx=0; player.vy=0; player.hp=100; player.facing=1;
    player.attacking=0; player.atkCd=0; player.invuln=0; player.leak=false; player.leakStack=0; player.dead=false;
    buildLevel(); populate();
    recalcCorruption(); buildSlots();
    document.getElementById("frag").textContent=0;
    document.getElementById("kills").textContent=0;
  }

  function endGame(kind){
    endKind=kind; STATE=(kind==="over")?"OVER":"WIN";
    var s=document.getElementById("screen");
    s.classList.remove("hide");
    var h=s.querySelector("h1"), p=s.querySelector("p"), b=s.querySelector("button");
    if(kind==="over"){
      h.textContent="SEGFAULT";
      h.style.color="#ff3b6b";
      p.innerHTML="프로세스가 종료됐다.<div class='end-stat'>KILLS "+killCount+" · CORRUPT "+Math.round(corruption)+"%</div>";
      b.textContent="RETRY";
    } else if(kind==="normal"){
      h.textContent="EXIT()";
      h.style.color="#39ff9e";
      p.innerHTML="너는 게임을 멀쩡히 빠져나왔다. 안전하지만... 아무것도 깨지 않았다.<div class='end-stat'>CLEAN CLEAR · "+killCount+" KILLS</div>그 위층 어딘가에 다른 문이 있었던 것 같은데.";
      b.textContent="RUN AGAIN";
    } else if(kind==="corrupt"){
      h.textContent="//ROOT_ACCESS";
      h.style.color="#c46bff";
      p.innerHTML="숨겨진 출구로 빠져나왔다. 게임의 경계 너머로.<div class='end-stat'>TRUE ENDING · CORRUPT "+Math.round(corruption)+"%</div>이게 진짜 엔딩이다.";
      b.textContent="RUN AGAIN";
    } else if(kind==="boss"){
      h.textContent="ANTIVIRUS_KILLED";
      h.style.color="#ffd24a";
      p.innerHTML="백신을 역으로 박살냈다. 이 게임은 이제 너의 것이다.<div class='end-stat'>★ SYSTEM OWNED ★ · "+killCount+" KILLS</div>";
      b.textContent="RUN AGAIN";
    }
  }

  // ---------- HUD slots ----------
  function buildSlots(){
    var c=document.getElementById("slots"); c.innerHTML="";
    for(var i=0;i<GLITCHES.length;i++){
      var g=GLITCHES[i];
      var d=document.createElement("div");
      d.className="slot"; d.id="slot"+i;
      d.innerHTML="<div class='k'>"+(i+1)+"</div><div>"+g.name+"</div>";
      c.appendChild(d);
    }
  }
  function updateSlots(){
    for(var i=0;i<GLITCHES.length;i++){
      var g=GLITCHES[i]; var d=document.getElementById("slot"+i);
      if(!d) continue;
      d.classList.toggle("has", !!owned[g.id]);
      d.classList.toggle("on", !!activeIds[g.id]);
      d.style.color = owned[g.id] ? g.color : "";
    }
  }

  // ---------- UPDATE ----------
  function update(){
    tick++;
    if(STATE!=="PLAY" && STATE!=="BOSS") return;
    var ts = PHYS.timeScale;
    // run physics ts times (time scale glitch)
    for(var step=0; step<ts; step++){
      stepWorld();
      if(STATE!=="PLAY" && STATE!=="BOSS") break;
    }
    // instability rises with active glitches & out-of-bounds
    var actN=0; for(var i=0;i<GLITCHES.length;i++) if(activeIds[GLITCHES[i].id]) actN++;
    if(actN>0) instability = clamp(instability + actN*0.10, 0, 100);
    else instability = clamp(instability - 0.5, 0, 100);
    if(instability>=100){
      crashTimer++;
      if(crashTimer===1) toast("// KERNEL PANIC — 글리치 꺼서 안정화해!");
      shake(8);
      if(crashTimer>150){ // sustained crash = death OR reward if corrupt exit near
        damage(4);
        crashTimer=120;
      }
    } else crashTimer=0;

    if(glitchTime>0) glitchTime--;
    if(toastT>0){ toastT--; if(toastT===0) toastEl.classList.remove("show"); }
    if(shakeT>0) shakeT--;
    wrap.classList.toggle("shake", shakeT>0 || (corruption>70&&tick%6<3));
  }

  function stepWorld(){
    // ---- player ----
    var p=player;
    if(!p.dead){
      if(keys.L){ p.vx-=PHYS.moveAccel; p.facing=-1; }
      if(keys.R){ p.vx+=PHYS.moveAccel; p.facing=1; }
      p.vx = clamp(p.vx,-PHYS.maxSpeed,PHYS.maxSpeed);
      p.vx *= (p.onGround?PHYS.friction:PHYS.airFriction);
      if(Math.abs(p.vx)<0.05) p.vx=0;
      p.vy += PHYS.gravity * PHYS.gravDir;
      p.vy = clamp(p.vy,-16,16);

      p.x += p.vx; collideAxis(p,"x");
      p.y += p.vy; collideAxis(p,"y");

      // world bounds X
      p.x = clamp(p.x, 0, LEVEL_W-p.w);

      // fall out of bounds (no floor / noclip)
      if(p.y > H+200 || p.y < -260){
        if(activeIds.NOCLIP){ damage(999); floatText(p.x,p.y,"OUT_OF_BOUNDS","#ff3b6b"); }
        else { p.y=clamp(p.y,-40,GROUND_Y-p.h); p.vy=0; }
      }

      if(p.attacking>0) p.attacking--;
      if(p.atkCd>0) p.atkCd--;
      if(p.invuln>0) p.invuln--;
    }

    // depth readout
    var depth=Math.round(p.x/10);
    document.getElementById("depth").textContent="DEPTH "+depth+"m";

    // ---- attack hits ----
    if(p.attacking>6){
      var hb=attackBox();
      for(var i=enemies.length-1;i>=0;i--){
        var e=enemies[i];
        if(aabb(hb,e)){
          var dmg = 1 + (p.leak?p.leakStack:0)*0.5;
          e.hp-=dmg; e.hurt=8;
          floatText(e.x,e.y-8,"-"+dmg.toFixed(p.leak?1:0),"#16f0ff");
          spawnParticles(e.x+e.w/2,e.y+e.h/2,4,"#16f0ff");
          if(e.hp<=0){
            if(p.leak){ p.leakStack++; floatText(p.x,p.y-26,"LEAK+"+p.leakStack,"#c46bff"); }
            killEnemy(e,i);
          }
        }
      }
      if(boss && STATE==="BOSS" && aabb(hb,boss)){
        boss.hp--; floatText(boss.x+boss.w/2,boss.y-8,"-1","#16f0ff");
        spawnParticles(boss.x+boss.w/2,boss.y+boss.h/2,5,"#ffd24a");
        if(boss.hp<=0){ spawnParticles(boss.x+45,boss.y+45,40,"#ffd24a"); shake(20); endGame("boss"); return; }
      }
    }

    // ---- enemies ----
    for(var j=enemies.length-1;j>=0;j--){
      var en=enemies[j];
      if(en.hurt>0) en.hurt--;
      if(en.type==="crawler"||en.type==="splitter"){
        en.vx = en.facing*1.1*(en.mini?1.4:1);
        en.vy += PHYS.enemyGravity * PHYS.gravDir;
        en.x+=en.vx; collideAxis(en,"x"); 
        // turn at edges/walls
        if(en._hitX){ en.facing*=-1; en._hitX=false; }
        en.y+=en.vy; collideAxis(en,"y");
        if(en.y>H+300){ enemies.splice(j,1); continue; }
        // chase bias toward player when close
        if(Math.abs(en.x-p.x)<220){ en.facing = (p.x>en.x)?1:-1; }
      } else if(en.type==="turret"){
        en.vy += PHYS.enemyGravity*PHYS.gravDir*0.4;
        en.y+=en.vy; collideAxis(en,"y");
        en.fireCd--;
        if(en.fireCd<=0 && Math.abs(en.x-p.x)<520){
          en.fireCd=rnd(70,130);
          var ang=Math.atan2((p.y+p.h/2)-(en.y+en.h/2),(p.x+p.w/2)-(en.x+en.w/2));
          particles.push({bullet:true,x:en.x+en.w/2,y:en.y+en.h/2,
            vx:Math.cos(ang)*3.4,vy:Math.sin(ang)*3.4,life:160,col:"#ff3b6b",sz:5});
        }
      }
      // contact damage
      if(!p.dead && p.invuln<=0 && aabb(p,en)){ damage(en.mini?6:12); knockback(p,en); }
    }

    // ---- bullets (stored in particles w/ .bullet) ----
    for(var b=particles.length-1;b>=0;b--){
      var pa=particles[b];
      if(pa.bullet){
        pa.x+=pa.vx; pa.y+=pa.vy; pa.life--;
        if(!p.dead && p.invuln<=0 && aabb(p,{x:pa.x-4,y:pa.y-4,w:8,h:8})){ damage(8); particles.splice(b,1); continue; }
        if(pa.life<=0){ particles.splice(b,1); }
      }
    }

    // ---- fragments ----
    for(var f=fragments.length-1;f>=0;f--){
      var fr=fragments[f]; fr.t++;
      fr.vy += 0.18*PHYS.gravDir; fr.y += fr.vy;
      // settle on nearest ground-ish
      if(PHYS.gravDir>0 && fr.y>GROUND_Y-14){ fr.y=GROUND_Y-14; fr.vy=0; }
      if(PHYS.gravDir<0 && fr.y<54){ fr.y=54; fr.vy=0; }
      fr.life--;
      if(aabb(p,{x:fr.x-12,y:fr.y-12,w:24,h:24})){
        var g=GLITCHES[fr.gi];
        fragCount++; document.getElementById("frag").textContent=fragCount;
        if(!owned[g.id]){ owned[g.id]=true; toast("// ACQUIRED ["+g.name+"]  키 "+(fr.gi+1)+"로 토글"); floatText(p.x,p.y-26,"NEW: "+g.name,g.color); }
        else { floatText(p.x,p.y-26,"+frag",g.color); }
        fragments.splice(f,1); continue;
      }
      if(fr.life<=0) fragments.splice(f,1);
    }

    // ---- exits ----
    if(STATE==="PLAY"){
      if(aabb(p,normalExit)){
        // if enough corruption, the normal door is "rejected" -> hint, else clean clear
        if(corruption>=60){ toast("// 정상 출구가 너를 거부한다 (CORRUPT 60%+) — 위층을 찾아라"); knockback(p,{x:normalExit.x,y:p.y}); }
        else endGame("normal");
      }
      if(corruption>=60 && aabb(p,corruptExit)){
        // reaching corrupt exit triggers boss instead of instant win — antivirus intercepts
        spawnBoss();
      }
    }

    // ---- boss ----
    if(STATE==="BOSS" && boss){ stepBoss(); }

    // ---- generic particles ----
    for(var q=particles.length-1;q>=0;q--){
      var pp=particles[q];
      if(pp.bullet) continue;
      pp.x+=pp.vx; pp.y+=pp.vy; pp.vy+=0.12; pp.life--;
      if(pp.life<=0) particles.splice(q,1);
    }
    for(var ff=floaters.length-1;ff>=0;ff--){ floaters[ff].y-=0.6; floaters[ff].life--; if(floaters[ff].life<=0) floaters.splice(ff,1); }

    // camera
    var target = clamp(p.x - W/2 + p.w/2, 0, LEVEL_W - W);
    camX += (target-camX)*0.12;

    updateSlots();
  }

  function stepBoss(){
    var p=player, B=boss; B.t++;
    // hover toward player, bob
    var tx = clamp(p.x - 30, 4200, LEVEL_W-B.w-10);
    B.x += (tx - B.x)*0.02;
    B.y = 120 + Math.sin(B.t*0.04)*60;
    B.facing = (p.x>B.x)?1:-1;
    // contact
    if(p.invuln<=0 && aabb(p,B)){ damage(14); knockback(p,B); }
    // patch attack — deletes a glitch
    B.patchCd--;
    if(B.patchCd<=0){ B.patchCd=rnd(260,360); bossPatch(); }
    // bullet ring
    B.atkCd--;
    if(B.atkCd<=0){
      B.atkCd=rnd(60,100);
      var n=8;
      for(var i=0;i<n;i++){
        var ang=(Math.PI*2/n)*i + B.t*0.05;
        particles.push({bullet:true,x:B.x+B.w/2,y:B.y+B.h/2,
          vx:Math.cos(ang)*2.8,vy:Math.sin(ang)*2.8,life:200,col:"#ff3b6b",sz:5});
      }
    }
  }

  function damage(d){
    var p=player;
    if(p.dead) return;
    p.hp-=d; p.invuln=40; shake(8);
    spawnParticles(p.x+p.w/2,p.y+p.h/2,8,"#ff3b6b");
    if(p.hp<=0){ p.hp=0; p.dead=true; setTimeout(function(){ endGame("over"); },500); }
  }
  function knockback(p,src){
    var dir = (p.x < src.x)?-1:1;
    p.vx = dir*6; p.vy = -5*PHYS.gravDir;
  }

  // axis collision against platforms (respects PHYS.collisionOn)
  function collideAxis(o,axis){
    if(!PHYS.collisionOn) return;
    for(var i=0;i<platforms.length;i++){
      var pl=platforms[i];
      if(pl.hidden && !revealHidden()) continue;
      if(!aabb(o,pl)) continue;
      if(axis==="x"){
        if(o.vx>0){ o.x=pl.x-o.w; } else if(o.vx<0){ o.x=pl.x+pl.w; }
        o.vx=0; o._hitX=true;
      } else {
        if(PHYS.gravDir>0){
          if(o.vy>0){ o.y=pl.y-o.h; o.onGround=true; o.vy=0; }
          else if(o.vy<0){ o.y=pl.y+pl.h; o.vy=0; }
        } else {
          if(o.vy<0){ o.y=pl.y+pl.h; o.onGround=true; o.vy=0; }
          else if(o.vy>0){ o.y=pl.y-o.h; o.vy=0; }
        }
      }
    }
    // ground-state reset when airborne
    if(axis==="y"){
      var grounded=false;
      for(var k=0;k<platforms.length;k++){
        var g=platforms[k]; if(g.hidden && !revealHidden()) continue;
        var foot = (PHYS.gravDir>0)? {x:o.x,y:o.y+o.h,w:o.w,h:3} : {x:o.x,y:o.y-3,w:o.w,h:3};
        if(aabb(foot,g)) grounded=true;
      }
      if(!grounded) o.onGround=false;
    }
  }
  function revealHidden(){ return corruption>=60; }

  // ---------- RENDER ----------
  function drawRect(x,y,w,h,col){ ctx.fillStyle=col; ctx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h)); }

  function render(){
    var ox = -camX + (shakeT>0?rnd(-shakeT,shakeT):0);
    var oy = (shakeT>0?rnd(-shakeT,shakeT):0);

    // bg
    ctx.fillStyle="#05060a"; ctx.fillRect(0,0,W,H);
    // parallax grid
    ctx.strokeStyle="rgba(20,40,60,.5)"; ctx.lineWidth=1;
    var gx = (camX*0.4)%80;
    ctx.beginPath();
    for(var x=-gx;x<W;x+=80){ ctx.moveTo(x,0); ctx.lineTo(x,H); }
    for(var y=0;y<H;y+=80){ ctx.moveTo(0,y); ctx.lineTo(W,y); }
    ctx.stroke();
    // distant data streams
    ctx.fillStyle="rgba(57,255,158,.05)";
    for(var s=0;s<20;s++){ var sx=((s*260 - camX*0.6)%(LEVEL_W))-100; ctx.fillRect(sx,0,2,H); }

    ctx.save();
    ctx.translate(ox,oy);

    // platforms
    for(var i=0;i<platforms.length;i++){
      var pl=platforms[i];
      if(pl.hidden){
        if(!revealHidden()) continue;
        ctx.fillStyle="rgba(196,107,255,.85)";
        ctx.fillRect(pl.x,pl.y,pl.w,pl.h);
        ctx.fillStyle="rgba(196,107,255,.18)"; ctx.fillRect(pl.x,pl.y-40,pl.w,40);
      } else {
        ctx.fillStyle="#0e1a26";
        ctx.fillRect(pl.x,pl.y,pl.w,pl.h);
        ctx.fillStyle="#16384a"; ctx.fillRect(pl.x,pl.y,pl.w,3);
        // edge glow
        ctx.fillStyle="rgba(57,255,158,.5)"; ctx.fillRect(pl.x,pl.y,pl.w,1);
      }
    }

    // exits
    drawExit(normalExit,"#39ff9e","EXIT", corruption<60);
    if(corruption>=60) drawExit(corruptExit,"#c46bff","//ROOT", true);

    // fragments
    for(var f=0;f<fragments.length;f++){
      var fr=fragments[f]; var g=GLITCHES[fr.gi];
      var fy=fr.y + Math.sin(fr.t*0.12)*3;
      ctx.save(); ctx.translate(fr.x,fy); ctx.rotate(fr.t*0.05);
      ctx.fillStyle=g.color; ctx.shadowColor=g.color; ctx.shadowBlur=12;
      ctx.fillRect(-7,-7,14,14);
      ctx.fillStyle="#000"; ctx.fillRect(-3,-3,6,6);
      ctx.restore();
    }

    // enemies
    for(var e=0;e<enemies.length;e++) drawEnemy(enemies[e]);

    // boss
    if(boss && STATE==="BOSS") drawBoss();

    // particles & bullets
    for(var q=0;q<particles.length;q++){
      var pp=particles[q];
      ctx.fillStyle=pp.col; ctx.globalAlpha=pp.bullet?1:clamp(pp.life/30,0,1);
      if(pp.bullet){ ctx.shadowColor=pp.col; ctx.shadowBlur=8; }
      ctx.fillRect(pp.x-pp.sz/2,pp.y-pp.sz/2,pp.sz,pp.sz);
      ctx.shadowBlur=0;
    }
    ctx.globalAlpha=1;

    // player
    if(!(player.dead && tick%6<3)) drawPlayer();

    // floaters
    ctx.font="bold 13px 'Courier New',monospace"; ctx.textAlign="center";
    for(var ftx=0;ftx<floaters.length;ftx++){
      var fl=floaters[ftx]; ctx.globalAlpha=clamp(fl.life/42,0,1);
      ctx.fillStyle=fl.col; ctx.fillText(fl.txt,fl.x,fl.y);
    }
    ctx.globalAlpha=1; ctx.textAlign="left";

    ctx.restore();

    // ---- glitch FX: RGB split slices when active ----
    if(glitchTime>0 || corruption>50){
      var intensity = glitchTime>0?glitchTime:(corruption-50)/10;
      var slices = Math.min(8, Math.floor(intensity/2)+2);
      for(var sl=0;sl<slices;sl++){
        var sy=Math.floor(rnd(0,H)), sh=Math.floor(rnd(6,26)), dx=Math.floor(rnd(-14,14));
        try{
          var img=ctx.getImageData(0,sy,W,sh);
          ctx.putImageData(img,dx,sy);
        }catch(err){}
      }
      // chromatic edge tint
      ctx.globalAlpha=0.06; ctx.fillStyle="#ff0040"; ctx.fillRect(0,0,W,H);
      ctx.fillStyle="#00ffe0"; ctx.fillRect(2,0,W,H); ctx.globalAlpha=1;
    }

    // crash warning text
    if(instability>=100){
      ctx.fillStyle="rgba(255,59,107,"+(0.5+Math.sin(tick*0.4)*0.3)+")";
      ctx.font="bold 26px 'Courier New',monospace"; ctx.textAlign="center";
      ctx.fillText("⚠ KERNEL PANIC ⚠", W/2, 120);
      ctx.font="12px 'Courier New',monospace";
      ctx.fillText("글리치를 꺼서 안정화하라", W/2, 144);
      ctx.textAlign="left";
    }
  }

  function drawExit(ex,col,label,active){
    ctx.save();
    ctx.globalAlpha = active?1:0.25;
    ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=active?18:4;
    ctx.fillRect(ex.x,ex.y,ex.w,ex.h);
    ctx.fillStyle="#000"; ctx.fillRect(ex.x+6,ex.y+6,ex.w-12,ex.h-12);
    ctx.shadowBlur=0; ctx.fillStyle=col;
    ctx.font="bold 11px 'Courier New',monospace"; ctx.textAlign="center";
    ctx.fillText(label,ex.x+ex.w/2,ex.y-8);
    ctx.textAlign="left"; ctx.restore();
  }

  function drawPlayer(){
    var p=player;
    ctx.save();
    if(p.invuln>0 && tick%4<2) ctx.globalAlpha=0.4;
    // body
    var bodyCol = p.leak?"#c46bff":"#39ff9e";
    ctx.fillStyle="#0a1018"; ctx.fillRect(p.x-2,p.y-2,p.w+4,p.h+4);
    ctx.fillStyle=bodyCol; ctx.shadowColor=bodyCol; ctx.shadowBlur=10;
    ctx.fillRect(p.x,p.y,p.w,p.h);
    ctx.shadowBlur=0;
    // visor
    ctx.fillStyle="#031018"; ctx.fillRect(p.x+(p.facing>0?12:4),p.y+8,10,6);
    ctx.fillStyle="#16f0ff"; ctx.fillRect(p.x+(p.facing>0?13:5),p.y+9,8,2);
    // sword on attack
    if(p.attacking>0){
      var hb=attackBox();
      ctx.fillStyle="rgba(22,240,255,"+(p.attacking/10)+")";
      ctx.shadowColor="#16f0ff"; ctx.shadowBlur=14;
      ctx.fillRect(hb.x,hb.y,hb.w,hb.h);
      ctx.shadowBlur=0;
    }
    ctx.restore();
  }

  function drawEnemy(e){
    ctx.save();
    var col = e.type==="turret"?"#ffd24a":(e.type==="splitter"?"#c46bff":"#ff3b6b");
    if(e.hurt>0){ ctx.globalAlpha=0.7; col="#fff"; }
    ctx.fillStyle="#0a0810"; ctx.fillRect(e.x-2,e.y-2,e.w+4,e.h+4);
    ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=8;
    ctx.fillRect(e.x,e.y,e.w,e.h);
    ctx.shadowBlur=0;
    // eye
    ctx.fillStyle="#000"; ctx.fillRect(e.x+(e.facing>0?e.w-12:6),e.y+8,6,6);
    if(e.type==="turret"){ ctx.fillStyle="#fff"; ctx.fillRect(e.x+e.w/2-2,e.y-4,4,6); }
    ctx.restore();
  }

  function drawBoss(){
    var B=boss;
    ctx.save();
    ctx.fillStyle="#1a0a14"; ctx.fillRect(B.x-4,B.y-4,B.w+8,B.h+8);
    ctx.fillStyle="#ff3b6b"; ctx.shadowColor="#ff3b6b"; ctx.shadowBlur=20;
    ctx.fillRect(B.x,B.y,B.w,B.h);
    // inner shield ring
    ctx.shadowBlur=0; ctx.strokeStyle="#ffd24a"; ctx.lineWidth=3;
    ctx.strokeRect(B.x+10,B.y+10,B.w-20,B.h-20);
    // eye
    ctx.fillStyle="#000"; ctx.fillRect(B.x+B.w/2-14,B.y+30,28,16);
    ctx.fillStyle="#ff3b6b"; ctx.fillRect(B.x+B.w/2-10+(B.facing>0?6:-6),B.y+34,10,8);
    // label
    ctx.fillStyle="#ffd24a"; ctx.font="bold 11px 'Courier New',monospace"; ctx.textAlign="center";
    ctx.fillText("ANTIVIRUS.exe",B.x+B.w/2,B.y-12);
    ctx.textAlign="left";
    ctx.restore();
    // boss hp bar (screen space, drawn after restore in render? keep here using fixed coords minus cam)
  }

  // ---------- HUD bars ----------
  function drawHUDbars(){
    document.getElementById("hpfill").style.width = (player.hp/player.maxhp*100)+"%";
    document.getElementById("corfill").style.width = corruption+"%";
    document.getElementById("instfill").style.width = instability+"%";
  }

  // boss hp overlay (DOM-free, draw on canvas top layer each frame in screen space)
  function drawBossHP(){
    if(!(boss && STATE==="BOSS")) return;
    var bw=360, bx=W/2-bw/2, by=60;
    ctx.fillStyle="rgba(0,0,0,.6)"; ctx.fillRect(bx-2,by-2,bw+4,16);
    ctx.fillStyle="#ff3b6b"; ctx.shadowColor="#ff3b6b"; ctx.shadowBlur=10;
    ctx.fillRect(bx,by,bw*(boss.hp/boss.maxhp),12); ctx.shadowBlur=0;
    ctx.strokeStyle="#ffd24a"; ctx.strokeRect(bx,by,bw,12);
    ctx.fillStyle="#ffd24a"; ctx.font="11px 'Courier New',monospace"; ctx.textAlign="center";
    ctx.fillText("ANTIVIRUS.exe — 백신을 박살내고 시스템을 장악하라",W/2,by-6);
    ctx.textAlign="left";
  }

  // ---------- LOOP ----------
  function loop(){
    update();
    render();
    drawBossHP();
    drawHUDbars();
    requestAnimationFrame(loop);
  }
  loop();

})();
</script>
</body>
</html>
