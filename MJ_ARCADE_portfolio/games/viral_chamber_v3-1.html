<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>VIRAL CHAMBER v3</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=VT323&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#020810;--border:#0d3d2e;--glow:#00ff88;--glow2:#00d4ff;--glow3:#ff2d6b;
  --text:#8fffc8;--dim:#1e4035;--dim2:#2a5545;
  --rare:#ffd000;--void:#b44dff;--mutant:#ff6200;--chimera:#ff2d6b;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Share Tech Mono',monospace;color:var(--text);}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,136,0.007) 3px,rgba(0,255,136,0.007) 4px);pointer-events:none;z-index:9000;}

/* HEADER */
#header{position:fixed;top:0;left:0;right:0;height:48px;z-index:100;background:rgba(2,8,16,0.97);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;backdrop-filter:blur(12px);}
#logo{font-family:'Orbitron',monospace;font-size:14px;font-weight:900;color:var(--glow);text-shadow:0 0 12px var(--glow);letter-spacing:3px;}
#logo em{color:var(--glow3);font-style:normal;}
#hdr-right{margin-left:auto;font-size:9px;color:var(--dim2);letter-spacing:1px;}

/* SHELF AREA */
#shelf-area{position:fixed;top:48px;left:0;right:0;bottom:0;overflow-y:auto;overflow-x:hidden;padding:16px 10px 20px;-webkit-overflow-scrolling:touch;}
#shelf-area::-webkit-scrollbar{display:none;}

/* SHELF */
.shelf{margin-bottom:20px;}
.shelf-label{font-size:8px;color:var(--dim2);letter-spacing:3px;margin-bottom:8px;padding-left:4px;}
.shelf-row{display:flex;gap:8px;padding:8px 6px 16px;background:linear-gradient(180deg,rgba(0,20,10,0.3),rgba(0,10,5,0.5));border-radius:6px;border:1px solid rgba(0,255,136,0.06);position:relative;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:wrap;}
.shelf-row::-webkit-scrollbar{display:none;}
.shelf-row::after{content:'';position:absolute;bottom:0;left:0;right:0;height:6px;background:linear-gradient(180deg,rgba(0,60,30,0.4),rgba(0,30,15,0.8));border-radius:0 0 6px 6px;pointer-events:none;}

/* VIAL */
.vial-wrap{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:transform .15s;}
.vial-wrap:active{transform:scale(0.93);}
.vial-canvas{display:block;border-radius:4px;}
.vial-label{font-size:7px;text-align:center;white-space:nowrap;letter-spacing:0.5px;max-width:60px;overflow:hidden;text-overflow:ellipsis;}

/* DETAIL OVERLAY */
#detail-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0);pointer-events:none;transition:background .3s;display:flex;align-items:center;justify-content:center;}
#detail-overlay.open{background:rgba(0,0,0,0.88);pointer-events:all;}
#detail-box{position:relative;width:min(340px,92vw);background:rgba(4,14,24,0.98);border:1px solid var(--border);border-radius:16px;overflow:hidden;transform:scale(0.7) translateY(40px);opacity:0;transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;box-shadow:0 0 60px rgba(0,255,136,0.1);}
#detail-overlay.open #detail-box{transform:scale(1) translateY(0);opacity:1;}
#detail-close{position:absolute;top:12px;right:12px;background:none;border:1px solid var(--border);color:var(--dim2);font-size:16px;width:28px;height:28px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;}
#detail-close:active{background:rgba(255,45,107,0.2);border-color:var(--glow3);color:var(--glow3);}
#detail-canvas-wrap{display:flex;justify-content:center;padding:20px 20px 10px;}
#detail-canvas{display:block;border-radius:8px;}
#detail-info{padding:0 18px 18px;}
#detail-name{font-family:'Orbitron',monospace;font-size:15px;font-weight:700;margin-bottom:3px;}
#detail-rarity{font-size:8px;letter-spacing:3px;margin-bottom:10px;}
#detail-dna{font-size:8px;color:var(--dim2);margin-bottom:10px;word-break:break-all;line-height:1.6;}
#detail-desc{font-size:10px;color:var(--text);line-height:1.7;padding:10px;background:rgba(0,255,136,0.04);border:1px solid var(--border);border-radius:6px;margin-bottom:12px;}
.d-stat-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.d-stat-lbl{font-size:8px;color:var(--dim2);width:46px;}
.d-stat-bar{flex:1;height:5px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden;}
.d-stat-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.34,1.56,.64,1);}
.sf-g{background:linear-gradient(90deg,#003322,#00ff88);box-shadow:0 0 4px #00ff88;}
.sf-b{background:linear-gradient(90deg,#002244,#00d4ff);box-shadow:0 0 4px #00d4ff;}
.sf-r{background:linear-gradient(90deg,#440011,#ff2d6b);box-shadow:0 0 4px #ff2d6b;}
.d-stat-val{font-family:'VT323',monospace;font-size:16px;color:var(--glow2);width:30px;text-align:right;}
#detail-behavior{font-size:9px;color:var(--dim2);margin-top:10px;text-align:center;letter-spacing:1px;}

/* IDIOT */
#idiot-overlay{position:fixed;inset:0;z-index:9999;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center;font-family:'Orbitron',monospace;}
.idiot-t{font-size:clamp(22px,6vw,52px);font-weight:900;animation:ifl .3s infinite;}
@keyframes ifl{0%,100%{color:#ff0;}50%{color:#f00;}}
#idiot-btn{margin-top:40px;padding:14px 32px;background:none;border:2px solid #ff0;color:#ff0;font-family:'Orbitron',monospace;font-size:12px;cursor:pointer;letter-spacing:2px;animation:ifl 1s infinite;}

/* Rarity colors */
.r-COMMON{color:#44ff88;}.r-RARE{color:var(--rare);}.r-MUTANT{color:var(--mutant);}.r-CHIMERA{color:var(--chimera);}.r-VOID{color:var(--void);}.r-FUSION{color:#ffcc44;}.r-LEGEND{color:#fff;}
</style>
</head>
<body>

<div id="header">
  <div id="logo">VIRAL<em>CHAMBER</em> <span style="font-size:10px;color:var(--dim2)">v3</span></div>
  <div id="hdr-right">51 SPECIMENS</div>

<div id="shelf-area" id="shelf-area"></div>

      <div id="detail-behavior"></div>
    </div>
  </div>
</div>

<div id="idiot-overlay">

// ── VIAL DRAWING ──
const VIAL_W=64,VIAL_H=100;

function drawVial(canvas,virus,t){
  const ctx=canvas.getContext('2d');
  const w=canvas.width,h=canvas.height;
  ctx.clearRect(0,0,w,h);

  const cx=w/2;
  const vTop=8,vBot=h-8,vLeft=cx-18,vRight=cx+18,vW=36;
  const capH=10,bodyTop=vTop+capH,bodyBot=vBot-capH;
  const liquidTop=bodyTop+8,liquidBot=bodyBot-2;

  const rc=RARITY_C[virus.rarity];
  const lc=LIQUID_C[virus.rarity];

  // === BODY — 3D 원통 효과 ===
  // 측면 그라디언트 (원통 느낌)
  const grad=ctx.createLinearGradient(vLeft,0,vRight,0);
  grad.addColorStop(0,'rgba(0,0,0,0.55)');
  grad.addColorStop(0.12,'rgba(0,40,20,0.25)');
  grad.addColorStop(0.35,'rgba(0,80,40,0.05)');
  grad.addColorStop(0.65,'rgba(0,80,40,0.05)');
  grad.addColorStop(0.88,'rgba(0,40,20,0.25)');
  grad.addColorStop(1,'rgba(0,0,0,0.55)');
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.rect(vLeft,bodyTop,vW,bodyBot-bodyTop);ctx.fill();

  // 바닥 반사
  const bottomGrad=ctx.createLinearGradient(vLeft,bodyBot-8,vRight,bodyBot);
  bottomGrad.addColorStop(0,'transparent');bottomGrad.addColorStop(1,'rgba(0,0,0,0.4)');
  ctx.fillStyle=bottomGrad;ctx.fillRect(vLeft,bodyBot-8,vW,8);

  // Liquid fill
  if(!virus.invisible){
    if(virus.behavior==='frozen'){
      // Ice blue
      ctx.fillStyle='rgba(150,220,255,0.35)';
      ctx.fillRect(vLeft+1,liquidTop,vW-2,liquidBot-liquidTop);
      // Ice crystals
      ctx.strokeStyle='rgba(200,240,255,0.6)';ctx.lineWidth=0.8;
      for(let i=0;i<6;i++){
        const ix=vLeft+4+Math.random()*28,iy=liquidTop+4+Math.random()*(liquidBot-liquidTop-8);
        ctx.beginPath();ctx.moveTo(ix,iy-4);ctx.lineTo(ix,iy+4);ctx.moveTo(ix-4,iy);ctx.lineTo(ix+4,iy);ctx.stroke();
      }
    } else if(virus.behavior==='blackhole'){
      const bg=ctx.createRadialGradient(cx,liquidTop+(liquidBot-liquidTop)/2,0,cx,liquidTop+(liquidBot-liquidTop)/2,20);
      bg.addColorStop(0,'rgba(0,0,0,0.95)');bg.addColorStop(0.5,rc+'44');bg.addColorStop(1,'rgba(0,0,0,0.2)');
      ctx.fillStyle=bg;ctx.fillRect(vLeft+1,liquidTop,vW-2,liquidBot-liquidTop);
    } else {
      ctx.fillStyle=lc;ctx.fillRect(vLeft+1,liquidTop,vW-2,liquidBot-liquidTop);
    }
  }

  // Glass edge
  ctx.strokeStyle='rgba(0,255,136,0.15)';ctx.lineWidth=0.8;
  ctx.strokeRect(vLeft,bodyTop,vW,bodyBot-bodyTop);
  // 왼쪽 하이라이트 (rim light)
  const hl=ctx.createLinearGradient(vLeft,0,vLeft+7,0);
  hl.addColorStop(0,'rgba(255,255,255,0.12)');hl.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=hl;ctx.fillRect(vLeft,bodyTop,7,bodyBot-bodyTop);
  // 오른쪽 림라이트
  const rl=ctx.createLinearGradient(vRight-5,0,vRight,0);
  rl.addColorStop(0,'rgba(255,255,255,0)');rl.addColorStop(1,'rgba(0,200,255,0.06)');
  ctx.fillStyle=rl;ctx.fillRect(vRight-5,bodyTop,5,bodyBot-bodyTop);

  // === CAPS ===
  // Top cap
  const topCapG=ctx.createLinearGradient(vLeft-2,vTop,vRight+2,vTop+capH);
  topCapG.addColorStop(0,rc+'cc');topCapG.addColorStop(0.4,rc+'66');topCapG.addColorStop(1,rc+'33');
  ctx.fillStyle=topCapG;
  ctx.beginPath();
  ctx.roundRect(vLeft-3,vTop,vW+6,capH,3);ctx.fill();
  ctx.strokeStyle=rc;ctx.lineWidth=1;ctx.stroke();
  // Cap screws
  [vLeft+2,cx,vRight-2].forEach(x=>{
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.beginPath();ctx.arc(x,vTop+capH/2,1.5,0,Math.PI*2);ctx.fill();
  });

  // Bottom cap
  const botCapG=ctx.createLinearGradient(vLeft-2,bodyBot,vRight+2,bodyBot+capH);
  botCapG.addColorStop(0,rc+'44');botCapG.addColorStop(1,rc+'cc');
  ctx.fillStyle=botCapG;
  ctx.beginPath();ctx.roundRect(vLeft-3,bodyBot,vW+6,capH,3);ctx.fill();
  ctx.strokeStyle=rc;ctx.lineWidth=1;ctx.stroke();

  // === VIRUS inside ===
  drawVirusInVial(ctx,virus,t,vLeft+1,liquidTop,vW-2,liquidBot-liquidTop,cx);

  // === GLASS SHEEN ===
  const sheen=ctx.createLinearGradient(vLeft,0,vRight,0);
  sheen.addColorStop(0,'rgba(255,255,255,0)');
  sheen.addColorStop(0.12,'rgba(255,255,255,0.08)');
  sheen.addColorStop(0.2,'rgba(255,255,255,0)');
  ctx.fillStyle=sheen;ctx.fillRect(vLeft,bodyTop,vW,bodyBot-bodyTop);

  // === GLOW ===
  if(virus.rarity==='VOID'||virus.rarity==='CHIMERA'){
    ctx.shadowColor=rc;ctx.shadowBlur=12;
    ctx.strokeStyle=rc+'44';ctx.lineWidth=1;
    ctx.strokeRect(vLeft,bodyTop,vW,bodyBot-bodyTop);
    ctx.shadowBlur=0;
  }

  // Freeze frost overlay
  if(virus.behavior==='frozen'){
    ctx.fillStyle='rgba(180,230,255,0.08)';
    ctx.fillRect(vLeft,bodyTop,vW,bodyBot-bodyTop);
    ctx.strokeStyle='rgba(200,240,255,0.15)';ctx.lineWidth=0.5;
    for(let y=bodyTop;y<bodyBot;y+=8){ctx.beginPath();ctx.moveTo(vLeft,y+Math.random()*4);ctx.lineTo(vRight,y+Math.random()*4);ctx.stroke();}
  }
}

function drawVirusInVial(ctx,virus,t,x,y,w,h,cx){
  if(virus.invisible) return;
  const b=virus.behavior;
  const c=virus.color;
  const r=5+{COMMON:0,RARE:1,MUTANT:2,CHIMERA:3,VOID:4,FUSION:2,LEGEND:2}[virus.rarity];
  const p=VPARAMS[virus.id]||VPARAMS['default'];
  const ts=t*p.spd; // time scaled by speed
  const amp=p.amp;

  let vx=w/2,vy=h/2;
  let vr=r;

  if(b==='swim'){
    vx=w/2+Math.sin(ts*1.2)*w*amp;vy=h/2+Math.cos(ts*0.8)*h*(amp*0.8);
  } else if(b==='swim_fast'){
    vx=w/2+Math.sin(ts*1.5)*w*amp+Math.cos(ts*2.3)*w*0.08;
    vy=h/2+Math.cos(ts*1.1)*h*(amp*0.8)+Math.sin(ts*1.8)*h*0.06;
  } else if(b==='drift'){
    vx=w/2+Math.sin(ts*0.7)*w*amp;vy=h/2+Math.cos(ts*0.5)*h*(amp*0.6);
  } else if(b==='pulse'){
    vx=w/2;vy=h/2;vr=r*(0.82+Math.sin(ts*2)*0.28);
  } else if(b==='bounce'){
    vx=w*0.12+Math.abs(Math.sin(ts*1.8))*(w*0.76);
    vy=h*0.12+Math.abs(Math.sin(ts*1.4+1.2))*(h*0.76);
  } else if(b==='wall'){
    vx=w*0.82+Math.sin(ts*0.6)*w*0.06;vy=h*0.38+Math.cos(ts*0.4)*h*0.18;
    ctx.strokeStyle=c+'28';ctx.lineWidth=0.5;ctx.setLineDash([2,3]);
    for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(x+w*0.97,y+h*(0.18+i*0.28));ctx.lineTo(x+vx,y+vy);ctx.stroke();}
    ctx.setLineDash([]);
  } else if(b==='pulse_slow'){
    vx=w/2;vy=h/2;vr=r*(0.75+Math.sin(ts*0.5)*0.38);
  } else if(b==='blackhole'){
    vx=w/2;vy=h/2;
    for(let i=0;i<10;i++){
      const a=ts*1.2+i/10*Math.PI*2;const pr=9-i*0.6;
      ctx.beginPath();ctx.arc(x+vx+Math.cos(a)*pr,y+vy+Math.sin(a)*pr,1.2,0,Math.PI*2);
      ctx.fillStyle=c+Math.floor((1-i/10)*140).toString(16).padStart(2,'0');ctx.fill();
    }
  } else if(b==='shake'){
    vx=w/2+(Math.random()-0.5)*5;vy=h/2+(Math.random()-0.5)*5;
  } else if(b==='frozen'){
    vx=w/2;vy=h/2;
    ctx.fillStyle='rgba(180,230,255,0.18)';ctx.beginPath();ctx.arc(x+vx,y+vy,vr+5,0,Math.PI*2);ctx.fill();
  } else if(b==='idiot'){
    vx=w*0.15+Math.random()*(w*0.7);vy=h*0.15+Math.random()*(h*0.7);
  }

  ctx.save();ctx.translate(x+vx,y+vy);
  drawMicroVirus(ctx,virus,vr,t*p.rot);
  ctx.restore();
}

function drawMicroVirus(ctx,virus,r,t){
  const c=virus.color;
  const rot=virus.behavior==='frozen'?0:t*0.6;
  ctx.shadowColor=c;ctx.shadowBlur=r*1.6;
  const fn=MICRO_DRAW[virus.id]||MICRO_DRAW['_'+virus.rarity]||MICRO_DRAW['_COMMON'];
  fn(ctx,c,r,rot,t);
  ctx.shadowBlur=0;
}

  // ─ MUTANT ─

  // ─ CHIMERA ─
  'abyss-c1':(ctx,c,r,rot)=>{

  'neo-gen':(ctx,c,r,rot)=>{

  // ─ FUSION ─
  'alpha-omega':(ctx,c,r,rot)=>{

  'neo-hydra':(ctx,c,r,rot)=>{

  'void-kraken':(ctx,c,r,rot)=>{

  'xylitol':(ctx,c,r,rot)=>{

  'depth':(ctx,c,r,rot)=>{

  'iloveyou':(ctx,c,r,rot)=>{// Heart

// Helper draw functions
function mCore(ctx,c,r,f){ctx.beginPath();ctx.arc(0,0,r*f,0,Math.PI*2);ctx.fillStyle=c+'44';ctx.fill();ctx.strokeStyle=c;ctx.lineWidth=1.2;ctx.stroke();}
function mCore2(ctx,c,x,y,r){ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=c+'55';ctx.fill();ctx.strokeStyle=c;ctx.lineWidth=1;ctx.stroke();}
function mDot(ctx,c,r,f,x=0,y=0){ctx.beginPath();ctx.arc(x,y,r*f,0,Math.PI*2);ctx.fillStyle=c;ctx.fill();}
function mDot2(ctx,c,r,f,x=0,y=0){ctx.beginPath();ctx.arc(x,y,r*f,0,Math.PI*2);ctx.fillStyle=c;ctx.fill();}
function mRing(ctx,c,r,f,lw=1){ctx.beginPath();ctx.arc(0,0,r*f,0,Math.PI*2);ctx.strokeStyle=c;ctx.lineWidth=lw;ctx.stroke();}
function mRing2(ctx,c,x,y,r,lw=1){ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.strokeStyle=c;ctx.lineWidth=lw;ctx.stroke();}
function mSpike(ctx,c,r,a,f1,f2){ctx.beginPath();ctx.moveTo(Math.cos(a)*r*f1,Math.sin(a)*r*f1);ctx.lineTo(Math.cos(a)*r*f2,Math.sin(a)*r*f2);ctx.strokeStyle=c;ctx.lineWidth=1;ctx.stroke();mDot(ctx,c,r*f2,0.09,Math.cos(a)*r*f2,Math.sin(a)*r*f2);}

// ── DETAIL VIAL ──
function drawDetailVial(canvas,virus,t){
  const ctx=canvas.getContext('2d');
  const w=canvas.width,h=canvas.height;
  ctx.clearRect(0,0,w,h);

  const cx=w/2;
  const vW=90,vLeft=cx-vW/2,vRight=cx+vW/2;
  const capH=22,vTop=10,vBot=h-10;
  const bodyTop=vTop+capH,bodyBot=vBot-capH;
  const liqTop=bodyTop+12,liqBot=bodyBot-4;
  const rc=RARITY_C[virus.rarity];
  const lc=LIQUID_C[virus.rarity];

  // BG glow
  const bg=ctx.createRadialGradient(cx,h/2,0,cx,h/2,80);
  bg.addColorStop(0,rc+'11');bg.addColorStop(1,'transparent');
  ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);

  // Body glass
  const grad=ctx.createLinearGradient(vLeft,0,vRight,0);
  grad.addColorStop(0,'rgba(0,30,15,0.8)');grad.addColorStop(0.12,'rgba(0,60,30,0.4)');
  grad.addColorStop(0.5,'rgba(0,80,40,0.15)');grad.addColorStop(0.88,'rgba(0,60,30,0.4)');grad.addColorStop(1,'rgba(0,30,15,0.8)');
  ctx.fillStyle=grad;ctx.fillRect(vLeft,bodyTop,vW,bodyBot-bodyTop);

  // Liquid
  if(virus.behavior==='frozen'){
    ctx.fillStyle='rgba(140,210,255,0.4)';ctx.fillRect(vLeft+2,liqTop,vW-4,liqBot-liqTop);
    // Frost lines
    ctx.strokeStyle='rgba(200,240,255,0.5)';ctx.lineWidth=0.8;ctx.setLineDash([3,6]);
    for(let y=liqTop+8;y<liqBot;y+=14){ctx.beginPath();ctx.moveTo(vLeft+4,y);ctx.lineTo(vRight-4,y);ctx.stroke();}
    ctx.setLineDash([]);
    // Ice crystals
    ctx.strokeStyle='rgba(200,240,255,0.7)';ctx.lineWidth=1;ctx.setLineDash([]);
    for(let i=0;i<12;i++){
      const ix=vLeft+8+Math.random()*(vW-16),iy=liqTop+8+Math.random()*(liqBot-liqTop-16);
      const s=4+Math.random()*4;
      ctx.beginPath();ctx.moveTo(ix,iy-s);ctx.lineTo(ix,iy+s);ctx.moveTo(ix-s,iy);ctx.lineTo(ix+s,iy);
      ctx.moveTo(ix-s*.7,iy-s*.7);ctx.lineTo(ix+s*.7,iy+s*.7);ctx.moveTo(ix+s*.7,iy-s*.7);ctx.lineTo(ix-s*.7,iy+s*.7);
      ctx.stroke();
    }
  } else if(virus.behavior==='blackhole'){
    const bg2=ctx.createRadialGradient(cx,liqTop+(liqBot-liqTop)/2,0,cx,liqTop+(liqBot-liqTop)/2,50);
    bg2.addColorStop(0,'rgba(0,0,0,1)');bg2.addColorStop(0.4,rc+'66');bg2.addColorStop(1,'rgba(0,0,0,0.2)');
    ctx.fillStyle=bg2;ctx.fillRect(vLeft+2,liqTop,vW-4,liqBot-liqTop);
    // Swirl
    for(let i=0;i<24;i++){
      const a=t*1.8+i/24*Math.PI*2;const sr=20-i*0.4;
      ctx.beginPath();ctx.arc(cx+Math.cos(a)*sr,liqTop+(liqBot-liqTop)/2+Math.sin(a)*sr*0.5,2,0,Math.PI*2);
      ctx.fillStyle=rc+Math.floor((1-i/24)*180).toString(16).padStart(2,'0');ctx.fill();
    }
  } else if(!virus.invisible){
    ctx.fillStyle=lc;ctx.fillRect(vLeft+2,liqTop,vW-4,liqBot-liqTop);
    // Bubble particles
    for(let i=0;i<4;i++){
      const bx=vLeft+10+((i*37+t*15)%(vW-20));
      const by=liqBot-10-(((t*20+i*30)%(liqBot-liqTop-20)));
      ctx.beginPath();ctx.arc(bx,by,2,0,Math.PI*2);
      ctx.strokeStyle=rc+'44';ctx.lineWidth=0.8;ctx.stroke();
    }
  }

  // Glass border
  ctx.strokeStyle='rgba(0,255,136,0.22)';ctx.lineWidth=1.2;ctx.strokeRect(vLeft,bodyTop,vW,bodyBot-bodyTop);
  // Highlight
  ctx.fillStyle='rgba(255,255,255,0.07)';ctx.fillRect(vLeft+3,bodyTop+4,12,bodyBot-bodyTop-8);

  // Caps
  [
    {y:vTop,h:capH,flip:false},
    {y:bodyBot,h:capH,flip:true}
  ].forEach(cap=>{
    const cg=ctx.createLinearGradient(vLeft-4,cap.y,vRight+4,cap.y+cap.h);
    if(!cap.flip){cg.addColorStop(0,rc+'ee');cg.addColorStop(0.5,rc+'88');cg.addColorStop(1,rc+'44');}
    else{cg.addColorStop(0,rc+'44');cg.addColorStop(0.5,rc+'88');cg.addColorStop(1,rc+'ee');}
    ctx.fillStyle=cg;
    ctx.beginPath();ctx.roundRect(vLeft-5,cap.y,vW+10,cap.h,5);ctx.fill();
    ctx.strokeStyle=rc;ctx.lineWidth=1.5;ctx.stroke();
    // Screws
    [vLeft+4,cx-12,cx+12,vRight-4].forEach(sx=>{
      ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.arc(sx,cap.y+cap.h/2,2.5,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=rc+'66';ctx.lineWidth=0.5;ctx.stroke();
    });
  });

  // Virus inside
  const vr=18;
  let bvx=cx,bvy=liqTop+(liqBot-liqTop)/2;
  const b=virus.behavior;
  if(b==='swim'){bvx=cx+Math.sin(t*1.2)*(vW*0.25);bvy=liqTop+(liqBot-liqTop)/2+Math.cos(t*0.8)*(liqBot-liqTop)*0.2;}
  else if(b==='swim_fast'){bvx=cx+Math.sin(t*2.8)*(vW*0.28);bvy=liqTop+(liqBot-liqTop)/2+Math.cos(t*2.2)*(liqBot-liqTop)*0.22;}
  else if(b==='drift'){bvx=cx+Math.sin(t*0.4)*(vW*0.18);bvy=liqTop+(liqBot-liqTop)/2+Math.cos(t*0.3)*(liqBot-liqTop)*0.12;}
  else if(b==='pulse'||b==='pulse_slow'){bvx=cx;bvy=liqTop+(liqBot-liqTop)/2;}
  else if(b==='bounce'){bvx=vLeft+12+Math.abs(Math.sin(t*3.5))*(vW-24);bvy=liqTop+12+Math.abs(Math.sin(t*2.8+1))*(liqBot-liqTop-24);}
  else if(b==='wall'){bvx=vRight-20+Math.sin(t*0.5)*8;bvy=liqTop+(liqBot-liqTop)*0.4+Math.cos(t*0.3)*(liqBot-liqTop)*0.12;
    ctx.strokeStyle=rc+'22';ctx.lineWidth=0.8;ctx.setLineDash([2,4]);
    for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(vRight,liqTop+(liqBot-liqTop)*(0.15+i*0.2));ctx.lineTo(bvx,bvy);ctx.stroke();}ctx.setLineDash([]);}
  else if(b==='shake'){bvx=cx+(Math.random()-0.5)*8;bvy=liqTop+(liqBot-liqTop)/2+(Math.random()-0.5)*8;}
  else if(b==='frozen'){bvx=cx;bvy=liqTop+(liqBot-liqTop)/2;}
  else if(b==='idiot'){bvx=vLeft+16+Math.random()*(vW-32);bvy=liqTop+16+Math.random()*(liqBot-liqTop-32);}

  // Clip to liquid area and draw virus
  if(!virus.invisible){
    ctx.save();
    ctx.beginPath();ctx.rect(vLeft+2,liqTop,vW-4,liqBot-liqTop);ctx.clip();
    ctx.translate(bvx,bvy);
    const dvr=b==='pulse'?vr*(0.8+Math.sin(t*2)*0.28):b==='pulse_slow'?vr*(0.75+Math.sin(t*0.7)*0.35):vr;
    drawMicroVirus(ctx,virus,dvr,t);
    ctx.restore();
  }

  // Glass sheen
  const sheen=ctx.createLinearGradient(vLeft,0,vRight,0);
  sheen.addColorStop(0,'rgba(255,255,255,0)');sheen.addColorStop(0.1,'rgba(255,255,255,0.08)');sheen.addColorStop(0.22,'rgba(255,255,255,0)');
  ctx.fillStyle=sheen;ctx.fillRect(vLeft,bodyTop,vW,bodyBot-bodyTop);

  // Void glow
  if(virus.rarity==='VOID'||virus.rarity==='CHIMERA'){
    ctx.shadowColor=rc;ctx.shadowBlur=20;ctx.strokeStyle=rc+'33';ctx.lineWidth=1;
    ctx.strokeRect(vLeft,bodyTop,vW,bodyBot-bodyTop);ctx.shadowBlur=0;
  }
}

const vialAnimations={}; // id -> {canvas, virus}
let animRunning=false;

function buildShelves(){
  const area=document.getElementById('shelf-area');
  area.innerHTML='';
  SHELF_GROUPS.forEach(group=>{
    const viruses=DB.filter(v=>group.rarities.includes(v.rarity));
    if(!viruses.length)return;
    const shelf=document.createElement('div');shelf.className='shelf';
    const lbl=document.createElement('div');lbl.className='shelf-label';
    lbl.style.color=RARITY_C[group.rarities[0]];lbl.textContent=group.label;
    shelf.appendChild(lbl);
    const row=document.createElement('div');row.className='shelf-row';
    viruses.forEach(v=>{
      const wrap=document.createElement('div');wrap.className='vial-wrap';
      const c=document.createElement('canvas');c.width=VIAL_W;c.height=VIAL_H;c.className='vial-canvas';
      const lbl2=document.createElement('div');lbl2.className='vial-label r-'+v.rarity;
      lbl2.textContent=v.invisible?'???':v.name;
      wrap.appendChild(c);wrap.appendChild(lbl2);
      wrap.addEventListener('click',()=>openDetail(v));
      wrap.addEventListener('touchend',e=>{e.preventDefault();openDetail(v);});
      row.appendChild(wrap);
      vialAnimations[v.id]={canvas:c,virus:v};
    });
    shelf.appendChild(row);
    area.appendChild(shelf);
  });
  if(!animRunning){animRunning=true;animateVials();}
}

let animT=0;
function animateVials(){
  animT+=0.016;
  Object.values(vialAnimations).forEach(({canvas,virus})=>{
    drawVial(canvas,virus,animT);
  });
  requestAnimationFrame(animateVials);
}

let detailEventTimer=null;
let detailAnim=null,detailVirus=null;

function openDetail(virus){
  if(virus.idiot){showIdiot();return;}
  detailVirus=virus;specialFired=false;
  // Special event timer
  if(detailEventTimer)clearTimeout(detailEventTimer);
  const ev=SPECIAL_EVENTS[virus.id];
  if(ev){
    detailEventTimer=setTimeout(()=>{if(detailVirus&&detailVirus.id===virus.id&&!specialFired){specialFired=true;ev.fn();}},ev.delay);
  }
  const rc=RARITY_C[virus.rarity];
  document.getElementById('detail-name').textContent=virus.invisible?'???':virus.name;
  document.getElementById('detail-name').className='r-'+virus.rarity;
  document.getElementById('detail-rarity').textContent=virus.rarity+(virus.invisible?' — 존재 여부 불명':'');
  document.getElementById('detail-rarity').className='r-'+virus.rarity;
  document.getElementById('detail-dna').innerHTML='DNA CODE: <span style="color:var(--glow2)">'+(virus.invisible?'???':virus.dna)+'</span>';
  document.getElementById('detail-desc').textContent=virus.desc;
  document.getElementById('detail-behavior').textContent='[ '+( BEHAVIOR_DESC[virus.behavior]||'행동 패턴 불명')+' ]';
  setTimeout(()=>{
    const v=virus.inf;
    document.getElementById('ds-inf').style.width=v+'%';document.getElementById('dv-inf').textContent=v===99?'∞':v;
    document.getElementById('ds-mut').style.width=virus.mut+'%';document.getElementById('dv-mut').textContent=virus.mut===99?'∞':virus.mut;
    document.getElementById('ds-dan').style.width=virus.dan+'%';document.getElementById('dv-dan').textContent=virus.dan===99?'∞':virus.dan;
  },200);
  document.getElementById('detail-overlay').classList.add('open');
  // Animate detail vial
  const dc=document.getElementById('detail-canvas');
  let dt=animT;
  function animDetail(){
    if(!detailVirus){return;}
    drawDetailVial(dc,virus,dt);dt+=0.016;
    detailAnim=requestAnimationFrame(animDetail);
  }
  if(detailAnim)cancelAnimationFrame(detailAnim);
  animDetail();
}

function closeDetail(e){
  if(e&&e.target!==document.getElementById('detail-overlay'))return;
  closeDetailBtn();
}
function closeDetailBtn(){
  detailVirus=null;
  if(detailEventTimer){clearTimeout(detailEventTimer);detailEventTimer=null;}
  cancelAnimationFrame(detailAnim);
  document.getElementById('detail-overlay').classList.remove('open');
}
window.closeDetailBtn=closeDetailBtn;

// IDIOT
function showIdiot(){
  document.getElementById('idiot-overlay').style.display='flex';
  try{if('speechSynthesis' in window){const u=new SpeechSynthesisUtterance('YOU ARE AN IDIOT HA HA HA HA');u.rate=1.2;u.pitch=1.5;speechSynthesis.speak(u);}}catch(e){}
}
function closeIdiot(){document.getElementById('idiot-overlay').style.display='none';}
window.closeIdiot=closeIdiot;

// BOOT
buildShelves();
</script>
