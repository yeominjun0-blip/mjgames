<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>VIRAL CONTAINMENT v3</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=VT323&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Share Tech Mono',monospace;}
:root{--glow:#00ff88;--glow2:#00d4ff;--glow3:#ff2d6b;--dim:#0d2a1a;--dim2:#1a4030;--text:#8fffc8;--rare:#ffd000;--void:#b44dff;--mutant:#ff6200;--chimera:#ff2d6b;--border:#0d3d2e;--warn:#ff8800;}
.screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;}
.screen.active{display:flex;}

/* MAIN MENU */
#s-menu{background:radial-gradient(ellipse at center,#020c14 0%,#000 100%);}
#s-menu::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,136,0.007) 3px,rgba(0,255,136,0.007) 4px);}
.menu-logo{font-family:'Orbitron',monospace;font-size:clamp(22px,6vw,44px);font-weight:900;color:var(--glow);text-shadow:0 0 30px var(--glow);letter-spacing:4px;text-align:center;z-index:1;margin-bottom:6px;}
.menu-logo em{color:var(--glow3);font-style:normal;}
.menu-sub{font-size:10px;color:var(--dim2);letter-spacing:4px;margin-bottom:48px;z-index:1;}
.menu-btns{display:flex;flex-direction:column;gap:14px;width:min(280px,82vw);z-index:1;}
.menu-btn{padding:16px 24px;background:rgba(0,255,136,0.06);border:1px solid var(--glow);color:var(--glow);font-family:'Orbitron',monospace;font-size:13px;letter-spacing:3px;cursor:pointer;border-radius:6px;transition:all .2s;text-align:center;}
.menu-btn:active{background:rgba(0,255,136,0.18);transform:scale(0.96);}
.menu-btn.sec{border-color:var(--glow2);color:var(--glow2);background:rgba(0,212,255,0.04);}

/* CODEX */
#s-codex{background:#020810;flex-direction:column;}
#codex-hdr{width:100%;padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;background:rgba(2,8,16,0.98);}
#codex-hdr h2{font-family:'Orbitron',monospace;font-size:14px;color:var(--glow);flex:1;}
.back-btn{background:none;border:1px solid var(--border);color:var(--dim2);padding:6px 14px;border-radius:4px;font-size:10px;cursor:pointer;font-family:'Share Tech Mono',monospace;letter-spacing:1px;}
.back-btn:active{border-color:var(--glow);color:var(--glow);}
#codex-scroll{flex:1;overflow-y:auto;padding:12px 10px;-webkit-overflow-scrolling:touch;width:100%;}
#codex-scroll::-webkit-scrollbar{display:none;}
.cx-shelf{margin-bottom:18px;}
.cx-shelf-lbl{font-size:8px;letter-spacing:3px;margin-bottom:7px;padding-left:4px;}
.cx-row{display:flex;gap:7px;flex-wrap:wrap;padding:8px 6px 14px;background:rgba(0,20,10,0.3);border-radius:6px;border:1px solid rgba(0,255,136,0.06);}
.cx-vial{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
.cx-vial:active{transform:scale(0.9);}
.cx-lbl{font-size:6px;text-align:center;max-width:62px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cx-special{background:linear-gradient(135deg,rgba(30,0,50,0.8),rgba(10,0,20,0.9));border:1px solid #b44dff;border-radius:8px;padding:12px 8px 16px;margin-bottom:4px;box-shadow:0 0 20px rgba(180,77,255,0.1);}
.cx-special-lbl{font-size:8px;color:#b44dff;letter-spacing:3px;font-family:'Orbitron',monospace;margin-bottom:8px;}
.cx-sub-row{display:flex;gap:7px;flex-wrap:wrap;padding:8px;background:rgba(0,0,0,0.4);border-radius:6px;margin-bottom:8px;}
#cx-popup{position:fixed;inset:0;z-index:800;background:rgba(0,0,0,0.88);display:none;align-items:center;justify-content:center;}
#cx-popup.open{display:flex;}
#cx-box{width:min(320px,92vw);background:rgba(4,12,22,0.99);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
#cx-canvas-wrap{display:flex;justify-content:center;padding:20px 20px 8px;}
#cx-pinfo{padding:0 16px 16px;}
.cx-pname{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;margin-bottom:2px;}
.cx-prar{font-size:8px;letter-spacing:3px;margin-bottom:8px;}
.cx-pdesc{font-size:9px;color:var(--text);line-height:1.7;padding:8px;background:rgba(0,255,136,0.03);border:1px solid var(--border);border-radius:4px;margin-bottom:10px;}
.cx-stat{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.cx-slbl{font-size:8px;color:var(--dim2);width:44px;}
.cx-sbar{flex:1;height:4px;background:rgba(255,255,255,0.04);border-radius:2px;overflow:hidden;}
.cx-sfill{height:100%;border-radius:2px;transition:width .6s;}
.sfg{background:linear-gradient(90deg,#003322,#00ff88);}
.sfb{background:linear-gradient(90deg,#002244,#00d4ff);}
.sfr{background:linear-gradient(90deg,#440011,#ff2d6b);}
.cx-sval{font-family:'VT323',monospace;font-size:16px;color:var(--glow2);width:28px;text-align:right;}
#cx-close{width:100%;margin-top:10px;padding:12px;background:rgba(0,255,136,0.06);border:1px solid var(--border);color:var(--text);font-size:11px;border-radius:8px;cursor:pointer;}

/* GAME */
#s-game{background:#000;overflow:hidden;}
#room-canvas{position:absolute;inset:0;width:100%;height:100%;}
#hud{position:absolute;inset:0;pointer-events:none;z-index:10;}
#hud-night{position:absolute;top:12px;left:50%;transform:translateX(-50%);font-family:'Orbitron',monospace;font-size:9px;color:var(--dim2);letter-spacing:3px;}
#hud-timer{position:absolute;top:8px;left:12px;font-family:'VT323',monospace;font-size:38px;color:var(--glow);text-shadow:0 0 12px var(--glow);}
#hud-timer.danger{color:var(--glow3);animation:blink .5s infinite;}
#hud-power{position:absolute;top:10px;right:12px;display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
#hud-pval{font-family:'VT323',monospace;font-size:28px;color:var(--glow2);}
#hud-pbar{width:72px;height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;}
#hud-pfill{height:100%;background:linear-gradient(90deg,#ff2d6b,#ffd000,#00ff88);border-radius:3px;transition:width .5s;}
#hud-alert{position:absolute;top:54px;left:0;right:0;text-align:center;font-size:10px;color:var(--glow3);letter-spacing:2px;opacity:0;transition:opacity .3s;}
#hud-alert.show{opacity:1;}
#hud-loc{position:absolute;bottom:76px;left:50%;transform:translateX(-50%);font-size:8px;color:rgba(0,255,136,0.35);letter-spacing:3px;}

/* NAV */
#nav-wrap{position:absolute;bottom:14px;left:0;right:0;display:flex;justify-content:center;gap:10px;z-index:20;}
.nav-btn{background:rgba(0,0,0,0.72);border:1px solid rgba(0,255,136,0.28);color:var(--glow);font-size:20px;width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(4px);flex-direction:column;gap:1px;font-family:'Share Tech Mono',monospace;}
.nav-btn span.lbl{font-size:5px;letter-spacing:1px;color:rgba(0,255,136,0.4);}
.nav-btn:active{background:rgba(0,255,136,0.15);transform:scale(0.9);}
.nav-btn.hid{opacity:0;pointer-events:none;}

/* INTERACT */
#act-btns{position:absolute;bottom:82px;left:0;right:0;display:flex;justify-content:center;gap:10px;z-index:20;flex-wrap:wrap;padding:0 12px;}
.act-btn{background:rgba(0,0,0,0.8);border:1px solid rgba(0,255,136,0.35);color:var(--glow);font-size:9px;padding:8px 14px;border-radius:20px;cursor:pointer;letter-spacing:1px;backdrop-filter:blur(4px);}
.act-btn:active{background:rgba(0,255,136,0.15);}
.act-btn.red{border-color:var(--glow3);color:var(--glow3);}
.act-btn.red:active{background:rgba(255,45,107,0.15);}

/* CTRL PANEL */
#ctrl-panel{position:absolute;inset:0;z-index:50;background:rgba(2,8,16,0.96);display:none;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 12px;}
#ctrl-panel.open{display:flex;}
.cp-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-shrink:0;}
.cp-title{font-family:'Orbitron',monospace;font-size:12px;color:var(--glow);letter-spacing:3px;}
.cp-sec{font-family:'Orbitron',monospace;font-size:8px;color:var(--dim2);letter-spacing:2px;margin:10px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.cg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:8px;}
.cb{background:rgba(0,255,136,0.04);border:1px solid var(--border);border-radius:10px;padding:13px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;transition:all .15s;}
.cb:active{transform:scale(0.95);}
.cb.on{border-color:var(--glow);background:rgba(0,255,136,0.1);box-shadow:0 0 10px rgba(0,255,136,0.1);}
.cb.wn{border-color:var(--warn);}
.cb.wn.on{background:rgba(255,136,0,0.1);}
.cb.dg{border-color:var(--glow3);}
.cb.dg.on{background:rgba(255,45,107,0.1);}
.cb .ci{font-size:24px;line-height:1;}
.cb .cl{font-size:8px;letter-spacing:1px;color:var(--dim2);}
.cb.on .cl{color:var(--glow);}
.cb .cs{font-size:7px;color:var(--dim2);}
.cb .cc{position:absolute;top:4px;right:6px;font-size:6px;color:var(--dim2);}
.pw-sec{background:rgba(0,255,136,0.03);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px;}
.pw-track{height:10px;background:rgba(255,255,255,0.04);border-radius:5px;overflow:hidden;margin:6px 0;}
.pw-fill{height:100%;border-radius:5px;transition:width .5s;background:linear-gradient(90deg,#ff2d6b 0%,#ffd000 40%,#00ff88 80%);}

/* VIAL POPUP */
#vp-popup{position:absolute;inset:0;z-index:60;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;}
#vp-popup.open{display:flex;}
#vp-box{width:min(300px,90vw);background:rgba(4,12,22,0.99);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
#vp-cwrap{display:flex;justify-content:center;padding:16px 16px 8px;}
#vp-info{padding:0 14px 14px;}
.vp-name{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;margin-bottom:2px;}
.vp-rar{font-size:8px;letter-spacing:2px;margin-bottom:6px;}
.vp-desc{font-size:9px;color:var(--text);line-height:1.65;padding:8px;background:rgba(0,255,136,0.03);border:1px solid var(--border);border-radius:4px;margin-bottom:8px;}
.vp-hint{font-size:9px;color:var(--warn);margin-bottom:10px;}
#vp-close{width:100%;padding:10px;background:rgba(0,255,136,0.06);border:1px solid var(--border);color:var(--text);font-size:10px;border-radius:6px;cursor:pointer;}

/* INC POPUP */
#inc-popup{position:absolute;inset:0;z-index:70;background:rgba(0,0,0,0.88);display:none;align-items:center;justify-content:center;}
#inc-popup.open{display:flex;}
#inc-box{width:min(320px,92vw);background:rgba(4,12,22,0.99);border:1px solid var(--glow3);border-radius:12px;overflow:hidden;}
.inc-hdr{background:rgba(255,45,107,0.1);padding:12px 14px;border-bottom:1px solid rgba(255,45,107,0.25);display:flex;align-items:center;gap:8px;}
.inc-ico{font-size:24px;}
.inc-ttl{font-family:'Orbitron',monospace;font-size:11px;color:var(--glow3);letter-spacing:1px;}
.inc-body{padding:14px;}
.inc-vn{font-size:13px;margin-bottom:5px;font-family:'Orbitron',monospace;}
.inc-dt{font-size:9px;color:var(--text);line-height:1.65;margin-bottom:10px;}
.inc-ht{font-size:9px;color:var(--warn);padding:7px 10px;background:rgba(255,136,0,0.06);border:1px solid rgba(255,136,0,0.2);border-radius:4px;margin-bottom:12px;}
#inc-ok{width:100%;padding:11px;background:rgba(255,45,107,0.1);border:1px solid var(--glow3);color:var(--glow3);font-size:10px;border-radius:6px;cursor:pointer;letter-spacing:2px;}

/* END */
#endscreen{position:absolute;inset:0;z-index:900;display:none;flex-direction:column;align-items:center;justify-content:center;background:#000;}
#endscreen.show{display:flex;}
.end-t{font-family:'Orbitron',monospace;font-size:clamp(18px,5vw,38px);font-weight:900;text-align:center;margin-bottom:10px;}
.salary{background:rgba(255,215,0,0.06);border:1px solid var(--rare);border-radius:10px;padding:18px;margin-bottom:18px;width:min(300px,90vw);text-align:center;display:none;}
.ss-t{font-family:'Orbitron',monospace;font-size:9px;color:var(--rare);letter-spacing:3px;margin-bottom:12px;}
.ss-a{font-family:'VT323',monospace;font-size:52px;color:var(--rare);text-shadow:0 0 20px var(--rare);line-height:1;}
.ss-u{font-size:9px;color:var(--dim2);margin-top:3px;}
.ss-n{font-size:8px;color:var(--dim2);margin-top:10px;line-height:1.9;text-align:left;}
.end-s{font-size:11px;color:var(--dim2);text-align:center;margin-bottom:22px;line-height:1.8;padding:0 20px;}
.end-btn{padding:14px 34px;background:none;border:2px solid var(--glow);color:var(--glow);font-family:'Orbitron',monospace;font-size:11px;cursor:pointer;letter-spacing:3px;border-radius:6px;}

/* TOAST */
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);z-index:999;background:rgba(4,14,24,0.97);border:1px solid var(--border);border-radius:8px;padding:9px 15px;font-size:10px;max-width:85vw;text-align:center;animation:tin .3s ease;pointer-events:none;}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

/* Rarity */
.r-COMMON{color:#44ff88;}.r-RARE{color:var(--rare);}.r-MUTANT{color:var(--mutant);}.r-CHIMERA{color:var(--chimera);}.r-VOID{color:var(--void);}.r-FUSION{color:#ffcc44;}.r-LEGEND{color:#fff;}
</style>
</head>
<body>

<!-- MAIN MENU -->
<div class="screen active" id="s-menu">
  <div class="menu-logo">VIRAL<em>CONTAINMENT</em></div>
  <div class="menu-sub">BIOCONTAINMENT FACILITY SIM</div>
  <div class="menu-btns">
    <button class="menu-btn" onclick="startGame()">▶ PLAY</button>
    <button class="menu-btn sec" onclick="openCodex()">◈ 도감 보기</button>
  </div>
</div>

<!-- CODEX -->
<div class="screen" id="s-codex">
  <div id="codex-hdr">
    <h2>VIRAL CODEX</h2>
    <button class="back-btn" onclick="showScreen('s-menu')">← 뒤로</button>
  </div>
  <div id="codex-scroll"></div>
</div>
<div id="cx-popup">
  <div id="cx-box">
    <div id="cx-canvas-wrap"><canvas id="cx-canvas" width="200" height="200"></canvas></div>
    <div id="cx-pinfo">
      <div class="cx-pname r-COMMON" id="cx-pname"></div>
      <div class="cx-prar" id="cx-prar"></div>
      <div class="cx-pdesc" id="cx-pdesc"></div>
      <div class="cx-stat"><span class="cx-slbl">감염력</span><div class="cx-sbar"><div class="cx-sfill sfg" id="cx-inf" style="width:0%"></div></div><span class="cx-sval" id="cxv-inf">0</span></div>
      <div class="cx-stat"><span class="cx-slbl">변이율</span><div class="cx-sbar"><div class="cx-sfill sfb" id="cx-mut" style="width:0%"></div></div><span class="cx-sval" id="cxv-mut">0</span></div>
      <div class="cx-stat"><span class="cx-slbl">위험도</span><div class="cx-sbar"><div class="cx-sfill sfr" id="cx-dan" style="width:0%"></div></div><span class="cx-sval" id="cxv-dan">0</span></div>
      <button id="cx-close" onclick="closeCxPopup()">닫기</button>
    </div>
  </div>
</div>

<!-- GAME -->
<div class="screen" id="s-game">
  <canvas id="room-canvas"></canvas>
  <div id="hud">
    <div id="hud-night">NIGHT <span id="hud-nn">1</span>/4</div>
    <div id="hud-timer">06:00</div>
    <div id="hud-power"><div id="hud-pval">800</div><div id="hud-pbar"><div id="hud-pfill" style="width:100%"></div></div></div>
    <div id="hud-alert"></div>
    <div id="hud-loc"></div>
  </div>
  <div id="nav-wrap">
    <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
      <button class="nav-btn hid" id="nav-L" onclick="navigate('L')"><span>◀</span><span class="lbl" id="lbl-L"></span></button>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
      <button class="nav-btn hid" id="nav-U" onclick="navigate('U')"><span>▲</span><span class="lbl" id="lbl-U"></span></button>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
      <button class="nav-btn hid" id="nav-R" onclick="navigate('R')"><span>▶</span><span class="lbl" id="lbl-R"></span></button>
    </div>
  </div>
  <div id="act-btns"></div>

  <!-- CONTROL PANEL -->
  <div id="ctrl-panel">
    <div class="cp-hdr">
      <div class="cp-title">CONTROL PANEL</div>
      <button class="back-btn" onclick="closeCtrl()">✕</button>
    </div>
    <div class="cp-sec">FACILITY SYSTEMS</div>
    <div class="cg">
      <button class="cb on" id="cb-lights" onclick="toggleCtrl('lights')"><span class="ci">💡</span><span class="cl">LIGHTS</span><span class="cs" id="cs-lights">ON</span><span class="cc">OFF시 -2/s</span></button>
      <button class="cb" id="cb-ac" onclick="toggleCtrl('ac')"><span class="ci">❄️</span><span class="cl">AIR-CON</span><span class="cs" id="cs-ac">OFF</span><span class="cc">-5/s</span></button>
      <button class="cb" id="cb-heat" onclick="toggleCtrl('heat')"><span class="ci">🔥</span><span class="cl">HEATER</span><span class="cs" id="cs-heat">OFF</span><span class="cc">-5/s</span></button>
      <button class="cb wn" id="cb-seal" onclick="toggleCtrl('seal')"><span class="ci">🔒</span><span class="cl">SEAL ALL</span><span class="cs" id="cs-seal">OFF</span><span class="cc">-15/s</span></button>
      <button class="cb dg" id="cb-alarm" onclick="toggleCtrl('alarm')"><span class="ci">🚨</span><span class="cl">ALARM</span><span class="cs" id="cs-alarm">OFF</span><span class="cc">-3/s</span></button>
      <button class="cb" id="cb-uv" onclick="toggleCtrl('uv')"><span class="ci">🔵</span><span class="cl">UV 살균</span><span class="cs" id="cs-uv">OFF</span><span class="cc">-8/s</span></button>
      <button class="cb wn" id="cb-freeze" onclick="toggleCtrl('freeze')"><span class="ci">🧊</span><span class="cl">급속냉각</span><span class="cs" id="cs-freeze">OFF</span><span class="cc">-10/s</span></button>
      <button class="cb" id="cb-static" onclick="toggleCtrl('static')"><span class="ci">⚡</span><span class="cl">정전기차폐</span><span class="cs" id="cs-static">OFF</span><span class="cc">-6/s</span></button>
    </div>
    <div class="cp-sec">EMERGENCY</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px;">
      <button class="cb dg" onclick="doReset()" style="padding:10px 4px;"><span class="ci" style="font-size:18px;">🔄</span><span class="cl" style="font-size:7px;">RESET</span><span class="cs" style="font-size:6px;">-270</span></button>
      <button class="cb" onclick="doInject()" style="padding:10px 4px;"><span class="ci" style="font-size:18px;">💉</span><span class="cl" style="font-size:7px;">SEDATE</span><span class="cs" style="font-size:6px;">-90</span></button>
      <button class="cb dg" onclick="doVent()" style="padding:10px 4px;"><span class="ci" style="font-size:18px;">💨</span><span class="cl" style="font-size:7px;">GAS VENT</span><span class="cs" style="font-size:6px;">-180</span></button>
      <button class="cb dg" onclick="doPurge()" style="padding:10px 4px;"><span class="ci" style="font-size:18px;">🔥</span><span class="cl" style="font-size:7px;">PURGE</span><span class="cs" style="font-size:6px;">-360</span></button>
    </div>
    <div class="cp-sec">POWER</div>
    <div class="pw-sec">
      <div style="font-size:8px;color:var(--dim2);letter-spacing:2px;">FACILITY POWER</div>
      <div class="pw-track"><div class="pw-fill" id="cp-pfill" style="width:100%"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:8px;color:var(--dim2);"><span>소모: <span id="cp-drain">1</span>/s</span><span id="cp-pval">800/800</span></div>

  grad.addColorStop(0.65,'rgba(0,80,40,0.05)');
  grad.addColorStop(0.88,'rgba(0,40,20,0.25)');
  grad.addColorStop(1,'rgba(0,0,0,0.55)');
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.rect(vLeft,bodyTop,vW,bodyBot-bodyTop);ctx.fill();

  // 바닥 반사
  const bottomGrad=ctx.createLinearGradient(vLeft,bodyBot-8,vRight,bodyBot);
  bottomGrad.addColorStop(0,'transparent');bottomGrad.addColorStop(1,'rgba(0,0,0,0.4)');
  ctx.fillStyle=bottomGrad;ctx.fillRect(vLeft,bodyBot-8,vW,8);

  // Liquid fill
  if(!virus.invisible){
    if(virus.behavior==='frozen'){
      // Ice blue
      ctx.fillStyle='rgba(150,220,255,0.35)';
      ctx.fillRect(vLeft+1,liquidTop,vW-2,liquidBot-liquidTop);
      // Ice crystals
      ctx.strokeStyle='rgba(200,240,255,0.6)';ctx.lineWidth=0.8;
      for(let i=0;i<6;i++){
        const ix=vLeft+4+Math.random()*28,iy=liquidTop+4+Math.random()*(liquidBot-liquidTop-8);
        ctx.beginPath();ctx.moveTo(ix,iy-4);ctx.lineTo(ix,iy+4);ctx.moveTo(ix-4,iy);ctx.lineTo(ix+4,iy);ctx.stroke();
      }
    } else if(virus.behavior==='blackhole'){
      const bg=ctx.createRadialGradient(cx,liquidTop+(liquidBot-liquidTop)/2,0,cx,liquidTop+(liquidBot-liquidTop)/2,20);
      bg.addColorStop(0,'rgba(0,0,0,0.95)');bg.addColorStop(0.5,rc+'44');bg.addColorStop(1,'rgba(0,0,0,0.2)');
      ctx.fillStyle=bg;ctx.fillRect(vLeft+1,liquidTop,vW-2,liquidBot-liquidTop);
    } else {
      ctx.fillStyle=lc;ctx.fillRect(vLeft+1,liquidTop,vW-2,liquidBot-liquidTop);
    }
  }

  // Glass edge
  ctx.strokeStyle='rgba(0,255,136,0.15)';ctx.lineWidth=0.8;
  ctx.strokeRect(vLeft,bodyTop,vW,bodyBot-bodyTop);
  // 왼쪽 하이라이트 (rim light)
  const hl=ctx.createLinearGradient(vLeft,0,vLeft+7,0);
  hl.addColorStop(0,'rgba(255,255,255,0.12)');hl.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=hl;ctx.fillRect(vLeft,bodyTop,7,bodyBot-bodyTop);
  // 오른쪽 림라이트
  const rl=ctx.createLinearGradient(vRight-5,0,vRight,0);
  rl.addColorStop(0,'rgba(255,255,255,0)');rl.addColorStop(1,'rgba(0,200,255,0.06)');
  ctx.fillStyle=rl;ctx.fillRect(vRight-5,bodyTop,5,bodyBot-bodyTop);

  // === CAPS ===
  // Top cap
  const topCapG=ctx.createLinearGradient(vLeft-2,vTop,vRight+2,vTop+capH);
  topCapG.addColorStop(0,rc+'cc');topCapG.addColorStop(0.4,rc+'66');topCapG.addColorStop(1,rc+'33');
  ctx.fillStyle=topCapG;
  ctx.beginPath();
  ctx.roundRect(vLeft-3,vTop,vW+6,capH,3);ctx.fill();
  ctx.strokeStyle=rc;ctx.lineWidth=1;ctx.stroke();
  // Cap screws
  [vLeft+2,cx,vRight-2].forEach(x=>{
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.beginPath();ctx.arc(x,vTop+capH/2,1.5,0,Math.PI*2);ctx.fill();
  });

  // Bottom cap
  const botCapG=ctx.createLinearGradient(vLeft-2,bodyBot,vRight+2,bodyBot+capH);
  botCapG.addColorStop(0,rc+'44');botCapG.addColorStop(1,rc+'cc');
  ctx.fillStyle=botCapG;
  ctx.beginPath();ctx.roundRect(vLeft-3,bodyBot,vW+6,capH,3);ctx.fill();
  ctx.strokeStyle=rc;ctx.lineWidth=1;ctx.stroke();

  // === VIRUS inside ===
  drawVirusInVial(ctx,virus,t,vLeft+1,liquidTop,vW-2,liquidBot-liquidTop,cx);

  // === GLASS SHEEN ===
  const sheen=ctx.createLinearGradient(vLeft,0,vRight,0);
  sheen.addColorStop(0,'rgba(255,255,255,0)');
  sheen.addColorStop(0.12,'rgba(255,255,255,0.08)');
  sheen.addColorStop(0.2,'rgba(255,255,255,0)');
  ctx.fillStyle=sheen;ctx.fillRect(vLeft,bodyTop,vW,bodyBot-bodyTop);

  // === GLOW ===
  if(virus.rarity==='VOID'||virus.rarity==='CHIMERA'){
    ctx.shadowColor=rc;ctx.shadowBlur=12;
    ctx.strokeStyle=rc+'44';ctx.lineWidth=1;
    ctx.strokeRect(vLeft,bodyTop,vW,bodyBot-bodyTop);
    ctx.shadowBlur=0;
  }

  // Freeze frost overlay
  if(virus.behavior==='frozen'){
    ctx.fillStyle='rgba(180,230,255,0.08)';
    ctx.fillRect(vLeft,bodyTop,vW,bodyBot-bodyTop);
    ctx.strokeStyle='rgba(200,240,255,0.15)';ctx.lineWidth=0.5;
    for(let y=bodyTop;y<bodyBot;y+=8){ctx.beginPath();ctx.moveTo(vLeft,y+Math.random()*4);ctx.lineTo(vRight,y+Math.random()*4);ctx.stroke();}
  }
}

function drawVirusInVial(ctx,virus,t,x,y,w,h,cx){
  if(virus.invisible) return;
  const b=virus.behavior;
  const c=virus.color;
  const r=5+{COMMON:0,RARE:1,MUTANT:2,CHIMERA:3,VOID:4,FUSION:2,LEGEND:2}[virus.rarity];
  const p=VPARAMS[virus.id]||VPARAMS['default'];
  const ts=t*p.spd; // time scaled by speed
  const amp=p.amp;

  let vx=w/2,vy=h/2;
  let vr=r;

  if(b==='swim'){
    vx=w/2+Math.sin(ts*1.2)*w*amp;vy=h/2+Math.cos(ts*0.8)*h*(amp*0.8);
  } else if(b==='swim_fast'){
    vx=w/2+Math.sin(ts*1.5)*w*amp+Math.cos(ts*2.3)*w*0.08;
    vy=h/2+Math.cos(ts*1.1)*h*(amp*0.8)+Math.sin(ts*1.8)*h*0.06;
  } else if(b==='drift'){
    vx=w/2+Math.sin(ts*0.7)*w*amp;vy=h/2+Math.cos(ts*0.5)*h*(amp*0.6);
  } else if(b==='pulse'){
    vx=w/2;vy=h/2;vr=r*(0.82+Math.sin(ts*2)*0.28);
  } else if(b==='bounce'){
    vx=w*0.12+Math.abs(Math.sin(ts*1.8))*(w*0.76);
    vy=h*0.12+Math.abs(Math.sin(ts*1.4+1.2))*(h*0.76);
  } else if(b==='wall'){
    vx=w*0.82+Math.sin(ts*0.6)*w*0.06;vy=h*0.38+Math.cos(ts*0.4)*h*0.18;
    ctx.strokeStyle=c+'28';ctx.lineWidth=0.5;ctx.setLineDash([2,3]);
    for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(x+w*0.97,y+h*(0.18+i*0.28));ctx.lineTo(x+vx,y+vy);ctx.stroke();}
    ctx.setLineDash([]);
  } else if(b==='pulse_slow'){
    vx=w/2;vy=h/2;vr=r*(0.75+Math.sin(ts*0.5)*0.38);
  } else if(b==='blackhole'){
    vx=w/2;vy=h/2;
    for(let i=0;i<10;i++){
      const a=ts*1.2+i/10*Math.PI*2;const pr=9-i*0.6;
      ctx.beginPath();ctx.arc(x+vx+Math.cos(a)*pr,y+vy+Math.sin(a)*pr,1.2,0,Math.PI*2);
      ctx.fillStyle=c+Math.floor((1-i/10)*140).toString(16).padStart(2,'0');ctx.fill();
    }
  } else if(b==='shake'){
    vx=w/2+(Math.random()-0.5)*5;vy=h/2+(Math.random()-0.5)*5;
  } else if(b==='frozen'){
    vx=w/2;vy=h/2;
    ctx.fillStyle='rgba(180,230,255,0.18)';ctx.beginPath();ctx.arc(x+vx,y+vy,vr+5,0,Math.PI*2);ctx.fill();
  } else if(b==='idiot'){
    vx=w*0.15+Math.random()*(w*0.7);vy=h*0.15+Math.random()*(h*0.7);
  }

  ctx.save();ctx.translate(x+vx,y+vy);
  drawMicroVirus(ctx,virus,vr,t*p.rot);
  ctx.restore();
}

function drawMicroVirus(ctx,virus,r,t){
  const c=virus.color;
  const rot=virus.behavior==='frozen'?0:t*0.6;
  ctx.shadowColor=c;ctx.shadowBlur=r*1.6;
  const fn=MICRO_DRAW[virus.id]||MICRO_DRAW['_'+virus.rarity]||MICRO_DRAW['_COMMON'];
  fn(ctx,c,r,rot,t);
  ctx.shadowBlur=0;
}

      if(Math.floor(t2*2)%3===0){ctx.beginPath();ctx.moveTo(x1,y);ctx.lineTo(x2,y);ctx.strokeStyle=c+'44';ctx.lineWidth=0.7;ctx.stroke();}
    }
  },
  'leviathan':(ctx,c,r,rot)=>{
    mCore(ctx,c,r,0.44);
    for(let i=0;i<12;i++){const a=i/12*Math.PI*2+rot;mSpike(ctx,c,r,a,0.44,0.9);}
    // Wave overlay
    ctx.beginPath();
    for(let x=-r*0.85;x<=r*0.85;x+=2){ctx.lineTo(x,Math.sin(x/r*Math.PI*2+rot)*r*0.18);}
    ctx.strokeStyle=c+'99';ctx.lineWidth=1.2;ctx.stroke();
  },
  'cerberus':(ctx,c,r,rot)=>{
    [[-r*0.38,-r*0.14],[r*0.38,-r*0.14],[0,r*0.36]].forEach(([px,py])=>{
      mRing2(ctx,c,px,py,r*0.3,1.5);mDot(ctx,c,r*0.3,0.2,px,py);
      mDot(ctx,c,r*0.3,0.1,px-r*0.1,py+r*0.06);mDot(ctx,c,r*0.3,0.1,px+r*0.1,py+r*0.06);
    });
  },
  // ─ VOID ─
  'null-void':(ctx,c,r,rot)=>{
    const g=ctx.createRadialGradient(0,0,0,0,0,r*0.9);
    g.addColorStop(0,'#000');g.addColorStop(0.5,c+'44');g.addColorStop(1,c+'00');
    ctx.beginPath();ctx.arc(0,0,r*0.9,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    mRing(ctx,c,r,0.9,2);mRing(ctx,c,r,0.55,1);mRing(ctx,c,r,0.28,0.8);
    for(let i=0;i<14;i++){const a=i/14*Math.PI*2+rot;mSpike(ctx,c,r,a,0.9,0.98);}
  },
  'singular':(ctx,c,r,rot)=>{
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,0,r*0.12,0,Math.PI*2);ctx.fill();
    for(let i=0;i<8;i++){
      const a=i/8*Math.PI*2+rot;
      ctx.beginPath();ctx.moveTo(Math.cos(a)*r*0.12,Math.sin(a)*r*0.12);ctx.lineTo(Math.cos(a)*r*0.88,Math.sin(a)*r*0.88);
      const lg=ctx.createLinearGradient(0,0,Math.cos(a)*r*0.88,Math.sin(a)*r*0.88);
      lg.addColorStop(0,'#fff');lg.addColorStop(1,c+'00');ctx.strokeStyle=lg;ctx.lineWidth=1.2;ctx.stroke();
    }
    [0.5,0.72,0.9].forEach((rr,i)=>mRing2(ctx,c+'88',0,0,r*rr,0.8+i*0.1));
  },
  'oblivion':(ctx,c,r,rot)=>{
    ctx.save();ctx.rotate(rot*0.1);
    ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(0,0,r*0.28,r*0.82,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=c;ctx.lineWidth=1.8;ctx.stroke();
    for(let i=0;i<6;i++){
      const a=i/6*Math.PI*2;
      ctx.beginPath();ctx.moveTo(Math.cos(a)*r*0.14,Math.sin(a)*r*0.82*0.5);
      ctx.bezierCurveTo(Math.cos(a+0.5)*r*0.6,Math.sin(a+0.5)*r*0.6,Math.cos(a-0.3)*r*0.85,Math.sin(a-0.3)*r*0.85,Math.cos(a)*r*0.9,Math.sin(a)*r*0.9);
      ctx.strokeStyle=c+'77';ctx.lineWidth=0.9;ctx.stroke();
    }ctx.restore();
  },
  // ─ FUSION ─
  'alpha-omega':(ctx,c,r,rot)=>{
    ['#ff2d6b','#ff8800','#ffd000','#00ff88','#00d4ff','#b44dff'].forEach((col,i)=>{
      mRing2(ctx,col,0,0,r*(0.25+i*0.13),1,col,rot+i*0.2);
    });mDot(ctx,'#fff',r,0.08);
  },
  'neo-hydra':(ctx,c,r,rot)=>{
    mDot(ctx,c,r,0.18);
    for(let i=0;i<5;i++){
      const a=i/5*Math.PI*2+rot-Math.PI/2;
      const hx=Math.cos(a)*r*0.58,hy=Math.sin(a)*r*0.58;
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(hx,hy);ctx.strokeStyle=c;ctx.lineWidth=1.2;ctx.stroke();
      mCore2(ctx,c,hx,hy,r*0.2);
    }
  },
  'void-kraken':(ctx,c,r,rot)=>{
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(0,0,r*0.3,0,Math.PI*2);ctx.fill();
    mRing(ctx,c,r,0.35,2);
    for(let i=0;i<12;i++){
      const base=i/12*Math.PI*2+rot;
      ctx.beginPath();ctx.moveTo(Math.cos(base)*r*0.35,Math.sin(base)*r*0.35);
      ctx.bezierCurveTo(Math.cos(base+0.5)*r*0.65,Math.sin(base+0.5)*r*0.65,Math.cos(base-0.5)*r*0.82,Math.sin(base-0.5)*r*0.82,Math.cos(base)*r*0.95,Math.sin(base)*r*0.95);
      ctx.strokeStyle=c;ctx.lineWidth=1;ctx.stroke();
    }
  },
  'xylitol':(ctx,c,r,rot)=>{
    ctx.save();ctx.rotate(rot*0.1);
    ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(0,0,r*0.28,r*0.65,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=c;ctx.lineWidth=1.2;ctx.stroke();
    ctx.strokeStyle=c;ctx.lineWidth=1.8;
    ctx.beginPath();ctx.moveTo(-r*0.4,-r*0.4);ctx.lineTo(r*0.4,r*0.4);ctx.stroke();
    ctx.beginPath();ctx.moveTo(r*0.4,-r*0.4);ctx.lineTo(-r*0.4,r*0.4);ctx.stroke();
    for(let i=0;i<6;i++){const a=i/6*Math.PI*2;mDot(ctx,'#fff',r*0.65,0.05,Math.cos(a)*r*0.68,Math.sin(a)*r*0.68);}
    ctx.restore();
  },
  'depth':(ctx,c,r,rot)=>{
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(0,0,r*0.14,0,Math.PI*2);ctx.fill();
    [0.3,0.5,0.7,0.88].forEach((rr,i)=>{
      const opacity=Math.floor((1-i*0.18)*255).toString(16).padStart(2,'0');
      mRing2(ctx,'#00aaff'+opacity,0,0,r*rr,1.2);
      if(i>0){const ang=rot+i*0.3;ctx.save();ctx.rotate(ang);mRing2(ctx,'#00aaff33',0,0,r*rr,0.5);ctx.restore();}
    });
  },
  'freccho':(ctx,c,r,rot)=>{
    // Snowflake
    for(let i=0;i<6;i++){
      const a=i/6*Math.PI*2;
      ctx.strokeStyle=c;ctx.lineWidth=1.2;
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*r*0.85,Math.sin(a)*r*0.85);ctx.stroke();
      [0.35,0.6].forEach(d=>{
        const bx=Math.cos(a)*r*d,by=Math.sin(a)*r*d;
        ctx.beginPath();ctx.moveTo(bx+Math.cos(a+Math.PI/3)*r*0.18,by+Math.sin(a+Math.PI/3)*r*0.18);
        ctx.lineTo(bx+Math.cos(a-Math.PI/3)*r*0.18,by+Math.sin(a-Math.PI/3)*r*0.18);ctx.stroke();
      });
    }
    mDot(ctx,c,r,0.14);
  },
  // ─ LEGEND (고유 형태) ─
  'morris':(ctx,c,r,rot)=>{// Worm: segmented chain
    for(let i=0;i<5;i++){const a=rot+i*0.6;const px=Math.cos(a)*r*(0.2*i)*0.4,py=Math.sin(a*1.3)*r*0.5;mCore2(ctx,c,px,py,r*(0.28-i*0.02));}
  },
  'creeper':(ctx,c,r,rot)=>{// Simple old-school cursor shape
    ctx.save();ctx.rotate(rot*0.05);
    ctx.strokeStyle=c;ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(0,-r*0.85);ctx.lineTo(-r*0.5,r*0.5);ctx.lineTo(0,r*0.1);ctx.lineTo(r*0.5,r*0.5);ctx.closePath();ctx.stroke();ctx.fillStyle=c+'22';ctx.fill();
    ctx.restore();
  },
  'melissa':(ctx,c,r,rot)=>{// Email envelope shape
    ctx.save();ctx.rotate(rot*0.05);ctx.strokeStyle=c;ctx.lineWidth=1.2;
    ctx.beginPath();ctx.rect(-r*0.75,-r*0.45,r*1.5,r*0.9);ctx.stroke();ctx.fillStyle=c+'15';ctx.fill();
    ctx.beginPath();ctx.moveTo(-r*0.75,-r*0.45);ctx.lineTo(0,r*0.15);ctx.lineTo(r*0.75,-r*0.45);ctx.stroke();
    ctx.restore();
  },
  'iloveyou':(ctx,c,r,rot)=>{// Heart
    ctx.save();ctx.rotate(rot*0.06);ctx.fillStyle=c+'55';ctx.strokeStyle=c;ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(0,r*0.65);
    ctx.bezierCurveTo(-r*1.0,-r*0.1,-r*1.0,-r*0.8,0,-r*0.15);
    ctx.bezierCurveTo(r*1.0,-r*0.8,r*1.0,-r*0.1,0,r*0.65);
    ctx.closePath();ctx.fill();ctx.stroke();ctx.restore();
  },
  'chernobyl':(ctx,c,r,rot)=>{// Radiation symbol
    ctx.save();ctx.rotate(rot*0.04);ctx.strokeStyle=c;ctx.lineWidth=1;
    mDot(ctx,c,r,0.15);
    for(let i=0;i<3;i++){
      const a=i/3*Math.PI*2;
      ctx.beginPath();ctx.moveTo(Math.cos(a)*r*0.22,Math.sin(a)*r*0.22);
      ctx.arc(0,0,r*0.7,a-0.45,a+0.45);
      ctx.lineTo(Math.cos(a+0.45)*r*0.22,Math.sin(a+0.45)*r*0.22);
      ctx.closePath();ctx.fillStyle=c+'44';ctx.fill();ctx.stroke();
    }
    ctx.restore();
  },
  'mydoom':(ctx,c,r,rot)=>{// Spiral worm
    ctx.beginPath();
    for(let t2=0;t2<Math.PI*5;t2+=0.15){const sr=r*0.05+r*0.8*(t2/(Math.PI*5));ctx.lineTo(Math.cos(t2+rot)*sr,Math.sin(t2+rot)*sr);}
    ctx.strokeStyle=c;ctx.lineWidth=1.4;ctx.stroke();mDot(ctx,c,r,0.1);
  },
  'blaster':(ctx,c,r,rot)=>{// Blast/explosion
    for(let i=0;i<8;i++){
      const a=i/8*Math.PI*2+rot;const len=r*(0.55+Math.sin(i*1.3)*0.3);
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*len,Math.sin(a)*len);
      ctx.strokeStyle=c;ctx.lineWidth=1.5;ctx.stroke();
    }
    mCore(ctx,c,r,0.3);
  },
  'slammer':(ctx,c,r,rot)=>{// SQL: cylinder stack
    ctx.save();ctx.rotate(rot*0.04);
    for(let i=0;i<3;i++){
      const y=-r*0.45+i*r*0.38;
      ctx.beginPath();ctx.ellipse(0,y,r*0.55,r*0.12,0,0,Math.PI*2);
      ctx.strokeStyle=c;ctx.lineWidth=1;ctx.stroke();ctx.fillStyle=c+(i===0?'44':'22');ctx.fill();
      if(i<2){ctx.strokeStyle=c+'66';ctx.beginPath();ctx.moveTo(-r*0.55,y);ctx.lineTo(-r*0.55,y+r*0.38);ctx.moveTo(r*0.55,y);ctx.lineTo(r*0.55,y+r*0.38);ctx.stroke();}
    }
    ctx.restore();
  },
  'conficker':(ctx,c,r,rot)=>{// Shifting shape
    const sides=3+Math.floor((Math.sin(rot*0.5)+1)*2.5);
    ctx.beginPath();
    for(let i=0;i<sides;i++){const a=i/sides*Math.PI*2+rot;ctx.lineTo(Math.cos(a)*r*0.82,Math.sin(a)*r*0.82);}
    ctx.closePath();ctx.strokeStyle=c;ctx.lineWidth=1.5;ctx.stroke();ctx.fillStyle=c+'20';ctx.fill();
    mDot(ctx,c,r,0.15);
  },
  'zeus':(ctx,c,r,rot)=>{// Lightning bolt
    ctx.save();ctx.rotate(rot*0.04);ctx.strokeStyle=c;ctx.lineWidth=1.8;ctx.fillStyle=c+'33';
    ctx.beginPath();ctx.moveTo(r*0.2,-r*0.88);ctx.lineTo(-r*0.15,-r*0.05);ctx.lineTo(r*0.25,-r*0.05);ctx.lineTo(-r*0.2,r*0.88);ctx.lineTo(r*0.1,r*0.1);ctx.lineTo(-r*0.2,r*0.1);ctx.lineTo(r*0.2,-r*0.88);
    ctx.fill();ctx.stroke();ctx.restore();
  },
  'stuxnet':(ctx,c,r,rot)=>{// Gear
    const teeth=8;ctx.save();ctx.rotate(rot*0.1);
    ctx.beginPath();
    for(let i=0;i<teeth*2;i++){const a=i/teeth/2*Math.PI*2;const tr=i%2===0?r*0.88:r*0.62;ctx.lineTo(Math.cos(a)*tr,Math.sin(a)*tr);}
    ctx.closePath();ctx.fillStyle=c+'33';ctx.fill();ctx.strokeStyle=c;ctx.lineWidth=1.2;ctx.stroke();
    mDot(ctx,'#000',r,0.25);mRing(ctx,c,r,0.24,1.5);ctx.restore();
  },
  'wannacry':(ctx,c,r,rot)=>{// Padlock
    ctx.save();ctx.rotate(rot*0.04);ctx.strokeStyle=c;ctx.lineWidth=1.2;
    ctx.beginPath();ctx.arc(0,-r*0.22,r*0.38,Math.PI,0);ctx.stroke();
    ctx.beginPath();ctx.roundRect(-r*0.45,-r*0.1,r*0.9,r*0.72,r*0.1);ctx.stroke();ctx.fillStyle=c+'22';ctx.fill();
    mDot(ctx,c,r,0.12,0,r*0.22);ctx.restore();
  },
  'mirai':(ctx,c,r,rot)=>{// Connected nodes IoT
    const nodes=[[-r*0.5,-r*0.4],[r*0.5,-r*0.4],[0,r*0.5],[0,0]];
    ctx.strokeStyle=c+'66';ctx.lineWidth=0.8;
    nodes.forEach(([x1,y1])=>nodes.forEach(([x2,y2])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}));
    nodes.forEach(([x,y])=>mCore2(ctx,c,x,y,r*0.16));
  },
  'youareanidiot':(ctx,c,r,rot)=>{// Smiley face
    mCore(ctx,c,r,0.82);
    mDot(ctx,'#000',r*0.82,0.16,-r*0.28,-r*0.14);mDot(ctx,'#000',r*0.82,0.16,r*0.28,-r*0.14);
    ctx.beginPath();ctx.arc(0,r*0.06,r*0.3,0.1,Math.PI-0.1);ctx.strokeStyle='#000';ctx.lineWidth=1.5;ctx.stroke();
  },
  'invisible':(ctx,c,r,rot)=>{/* empty — invisible */},
  // Fallbacks
  '_COMMON':(ctx,c,r,rot)=>{mCore(ctx,c,r,0.5);for(let i=0;i<5;i++)mSpike(ctx,c,r,i/5*Math.PI*2+rot,0.5,0.9);mDot(ctx,c,r,0.14);},
  '_RARE':  (ctx,c,r,rot)=>{mCore(ctx,c,r,0.48);for(let i=0;i<7;i++)mSpike(ctx,c,r,i/7*Math.PI*2+rot,0.48,0.92);mDot(ctx,c,r,0.16);},
  '_MUTANT':(ctx,c,r,rot)=>{mCore(ctx,c,r,0.45);for(let i=0;i<9;i++)mSpike(ctx,c,r,i/9*Math.PI*2+rot,0.45,0.92);mDot(ctx,c,r,0.17);},
  '_CHIMERA':(ctx,c,r,rot)=>{mCore(ctx,c,r,0.42);for(let i=0;i<11;i++)mSpike(ctx,c,r,i/11*Math.PI*2+rot,0.42,0.94);mDot(ctx,c,r,0.18);},
  '_VOID':  (ctx,c,r,rot)=>{const g=ctx.createRadialGradient(0,0,0,0,0,r*0.88);g.addColorStop(0,'#000');g.addColorStop(0.5,c+'44');g.addColorStop(1,c+'00');ctx.beginPath();ctx.arc(0,0,r*0.88,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();mRing(ctx,c,r,0.88,2);for(let i=0;i<14;i++)mSpike(ctx,c,r,i/14*Math.PI*2+rot,0.88,0.97);},
  '_FUSION':(ctx,c,r,rot)=>{ctx.beginPath();for(let i=0;i<5;i++){const a=i/5*Math.PI*2+rot;ctx.lineTo(Math.cos(a)*r*0.88,Math.sin(a)*r*0.88);}ctx.closePath();ctx.strokeStyle=c;ctx.lineWidth=1.2;ctx.stroke();ctx.fillStyle=c+'20';ctx.fill();mDot(ctx,c,r,0.15);},
  '_LEGEND':(ctx,c,r,rot)=>{for(let i=0;i<10;i++)mSpike(ctx,c,r,i/10*Math.PI*2+rot,0.44,0.88);mCore(ctx,c,r,0.44);ctx.fillStyle='#fff8';ctx.beginPath();ctx.arc(0,0,r*0.14,0,Math.PI*2);ctx.fill();},
};

// Helper draw functions
function mCore(ctx,c,r,f){ctx.beginPath();ctx.arc(0,0,r*f,0,Math.PI*2);ctx.fillStyle=c+'44';ctx.fill();ctx.strokeStyle=c;ctx.lineWidth=1.2;ctx.stroke();}
function mCore2(ctx,c,x,y,r){ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=c+'55';ctx.fill();ctx.strokeStyle=c;ctx.lineWidth=1;ctx.stroke();}
function mDot(ctx,c,r,f,x=0,y=0){ctx.beginPath();ctx.arc(x,y,r*f,0,Math.PI*2);ctx.fillStyle=c;ctx.fill();}
function mDot2(ctx,c,r,f,x=0,y=0){ctx.beginPath();ctx.arc(x,y,r*f,0,Math.PI*2);ctx.fillStyle=c;ctx.fill();}
function mRing(ctx,c,r,f,lw=1){ctx.beginPath();ctx.arc(0,0,r*f,0,Math.PI*2);ctx.strokeStyle=c;ctx.lineWidth=lw;ctx.stroke();}
function mRing2(ctx,c,x,y,r,lw=1){ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.strokeStyle=c;ctx.lineWidth=lw;ctx.stroke();}
function mSpike(ctx,c,r,a,f1,f2){ctx.beginPath();ctx.moveTo(Math.cos(a)*r*f1,Math.sin(a)*r*f1);ctx.lineTo(Math.cos(a)*r*f2,Math.sin(a)*r*f2);ctx.strokeStyle=c;ctx.lineWidth=1;ctx.stroke();mDot(ctx,c,r*f2,0.09,Math.cos(a)*r*f2,Math.sin(a)*r*f2);}

// ── DETAIL VIAL ──
function drawDetailVial(canvas,virus,t){
  const ctx=canvas.getContext('2d');
  const w=canvas.width,h=canvas.height;
  ctx.clearRect(0,0,w,h);

  const cx=w/2;
  const vW=90,vLeft=cx-vW/2,vRight=cx+vW/2;
  const capH=22,vTop=10,vBot=h-10;
  const bodyTop=vTop+capH,bodyBot=vBot-capH;
  const liqTop=bodyTop+12,liqBot=bodyBot-4;
  const rc=RARITY_C[virus.rarity];
  const lc=LIQUID_C[virus.rarity];

  // BG glow
  const bg=ctx.createRadialGradient(cx,h/2,0,cx,h/2,80);
  bg.addColorStop(0,rc+'11');bg.addColorStop(1,'transparent');
  ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);

  // Body glass
  const grad=ctx.createLinearGradient(vLeft,0,vRight,0);
  grad.addColorStop(0,'rgba(0,30,15,0.8)');grad.addColorStop(0.12,'rgba(0,60,30,0.4)');
  grad.addColorStop(0.5,'rgba(0,80,40,0.15)');grad.addColorStop(0.88,'rgba(0,60,30,0.4)');grad.addColorStop(1,'rgba(0,30,15,0.8)');
  ctx.fillStyle=grad;ctx.fillRect(vLeft,bodyTop,vW,bodyBot-bodyTop);

  // Liquid
  if(virus.behavior==='frozen'){
    ctx.fillStyle='rgba(140,210,255,0.4)';ctx.fillRect(vLeft+2,liqTop,vW-4,liqBot-liqTop);
    // Frost lines
    ctx.strokeStyle='rgba(200,240,255,0.5)';ctx.lineWidth=0.8;ctx.setLineDash([3,6]);
    for(let y=liqTop+8;y<liqBot;y+=14){ctx.beginPath();ctx.moveTo(vLeft+4,y);ctx.lineTo(vRight-4,y);ctx.stroke();}
    ctx.setLineDash([]);
    // Ice crystals
    ctx.strokeStyle='rgba(200,240,255,0.7)';ctx.lineWidth=1;ctx.setLineDash([]);
    for(let i=0;i<12;i++){
      const ix=vLeft+8+Math.random()*(vW-16),iy=liqTop+8+Math.random()*(liqBot-liqTop-16);
      const s=4+Math.random()*4;
      ctx.beginPath();ctx.moveTo(ix,iy-s);ctx.lineTo(ix,iy+s);ctx.moveTo(ix-s,iy);ctx.lineTo(ix+s,iy);
      ctx.moveTo(ix-s*.7,iy-s*.7);ctx.lineTo(ix+s*.7,iy+s*.7);ctx.moveTo(ix+s*.7,iy-s*.7);ctx.lineTo(ix-s*.7,iy+s*.7);
      ctx.stroke();
    }
  } else if(virus.behavior==='blackhole'){
    const bg2=ctx.createRadialGradient(cx,liqTop+(liqBot-liqTop)/2,0,cx,liqTop+(liqBot-liqTop)/2,50);
    bg2.addColorStop(0,'rgba(0,0,0,1)');bg2.addColorStop(0.4,rc+'66');bg2.addColorStop(1,'rgba(0,0,0,0.2)');
    ctx.fillStyle=bg2;ctx.fillRect(vLeft+2,liqTop,vW-4,liqBot-liqTop);
    // Swirl
    for(let i=0;i<24;i++){
      const a=t*1.8+i/24*Math.PI*2;const sr=20-i*0.4;
      ctx.beginPath();ctx.arc(cx+Math.cos(a)*sr,liqTop+(liqBot-liqTop)/2+Math.sin(a)*sr*0.5,2,0,Math.PI*2);
      ctx.fillStyle=rc+Math.floor((1-i/24)*180).toString(16).padStart(2,'0');ctx.fill();
    }
  } else if(!virus.invisible){
    ctx.fillStyle=lc;ctx.fillRect(vLeft+2,liqTop,vW-4,liqBot-liqTop);
    // Bubble particles
    for(let i=0;i<4;i++){
      const bx=vLeft+10+((i*37+t*15)%(vW-20));
      const by=liqBot-10-(((t*20+i*30)%(liqBot-liqTop-20)));
      ctx.beginPath();ctx.arc(bx,by,2,0,Math.PI*2);

  ctx.fillStyle='rgba(255,255,255,0.07)';ctx.fillRect(vLeft+3,bodyTop+4,12,bodyBot-bodyTop-8);

  // Caps
  [
    {y:vTop,h:capH,flip:false},
    {y:bodyBot,h:capH,flip:true}
  ].forEach(cap=>{
    const cg=ctx.createLinearGradient(vLeft-4,cap.y,vRight+4,cap.y+cap.h);
    if(!cap.flip){cg.addColorStop(0,rc+'ee');cg.addColorStop(0.5,rc+'88');cg.addColorStop(1,rc+'44');}
    else{cg.addColorStop(0,rc+'44');cg.addColorStop(0.5,rc+'88');cg.addColorStop(1,rc+'ee');}
    ctx.fillStyle=cg;
    ctx.beginPath();ctx.roundRect(vLeft-5,cap.y,vW+10,cap.h,5);ctx.fill();
    ctx.strokeStyle=rc;ctx.lineWidth=1.5;ctx.stroke();
    // Screws
    [vLeft+4,cx-12,cx+12,vRight-4].forEach(sx=>{
      ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.arc(sx,cap.y+cap.h/2,2.5,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=rc+'66';ctx.lineWidth=0.5;ctx.stroke();
    });
  });

  // Virus inside
  const vr=18;
  let bvx=cx,bvy=liqTop+(liqBot-liqTop)/2;
  const b=virus.behavior;
  if(b==='swim'){bvx=cx+Math.sin(t*1.2)*(vW*0.25);bvy=liqTop+(liqBot-liqTop)/2+Math.cos(t*0.8)*(liqBot-liqTop)*0.2;}
  else if(b==='swim_fast'){bvx=cx+Math.sin(t*2.8)*(vW*0.28);bvy=liqTop+(liqBot-liqTop)/2+Math.cos(t*2.2)*(liqBot-liqTop)*0.22;}
  else if(b==='drift'){bvx=cx+Math.sin(t*0.4)*(vW*0.18);bvy=liqTop+(liqBot-liqTop)/2+Math.cos(t*0.3)*(liqBot-liqTop)*0.12;}
  else if(b==='pulse'||b==='pulse_slow'){bvx=cx;bvy=liqTop+(liqBot-liqTop)/2;}
  else if(b==='bounce'){bvx=vLeft+12+Math.abs(Math.sin(t*3.5))*(vW-24);bvy=liqTop+12+Math.abs(Math.sin(t*2.8+1))*(liqBot-liqTop-24);}
  else if(b==='wall'){bvx=vRight-20+Math.sin(t*0.5)*8;bvy=liqTop+(liqBot-liqTop)*0.4+Math.cos(t*0.3)*(liqBot-liqTop)*0.12;
    ctx.strokeStyle=rc+'22';ctx.lineWidth=0.8;ctx.setLineDash([2,4]);
    for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(vRight,liqTop+(liqBot-liqTop)*(0.15+i*0.2));ctx.lineTo(bvx,bvy);ctx.stroke();}ctx.setLineDash([]);}
  else if(b==='shake'){bvx=cx+(Math.random()-0.5)*8;bvy=liqTop+(liqBot-liqTop)/2+(Math.random()-0.5)*8;}
  else if(b==='frozen'){bvx=cx;bvy=liqTop+(liqBot-liqTop)/2;}
  else if(b==='idiot'){bvx=vLeft+16+Math.random()*(vW-32);bvy=liqTop+16+Math.random()*(liqBot-liqTop-32);}

  // Clip to liquid area and draw virus
  if(!virus.invisible){
    ctx.save();
    ctx.beginPath();ctx.rect(vLeft+2,liqTop,vW-4,liqBot-liqTop);ctx.clip();
    ctx.translate(bvx,bvy);
    const dvr=b==='pulse'?vr*(0.8+Math.sin(t*2)*0.28):b==='pulse_slow'?vr*(0.75+Math.sin(t*0.7)*0.35):vr;

  const sheen=ctx.createLinearGradient(vLeft,0,vRight,0);
  sheen.addColorStop(0,'rgba(255,255,255,0)');sheen.addColorStop(0.1,'rgba(255,255,255,0.08)');sheen.addColorStop(0.22,'rgba(255,255,255,0)');
  ctx.fillStyle=sheen;ctx.fillRect(vLeft,bodyTop,vW,bodyBot-bodyTop);

  // Void glow
  if(virus.rarity==='VOID'||virus.rarity==='CHIMERA'){

    ctx.strokeRect(vLeft,bodyTop,vW,bodyBot-bodyTop);ctx.shadowBlur=0;
  }
}

// ── SCREEN ──
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='s-game'){resizeRC();if(!gameLoopRAF)gameLoopRAF=requestAnimationFrame(gameLoop);}
}

// ── CODEX ──
function openCodex(){showScreen('s-codex');buildCodex();}

function buildCodex(){
  const scroll=document.getElementById('codex-scroll');
  if(scroll.dataset.built)return;
  scroll.dataset.built='1';
  const GROUPS=[
    {label:'COMMON',rar:'COMMON',c:'#44ff88'},
    {label:'RARE',rar:'RARE',c:'#ffd000'},
    {label:'MUTANT',rar:'MUTANT',c:'#ff6200'},
    {label:'CHIMERA',rar:'CHIMERA',c:'#ff2d6b'},
    {label:'FUSION',rar:'FUSION',c:'#ffcc44'},
  ];
  GROUPS.forEach(grp=>{
    const vs=DB.filter(v=>v.rarity===grp.rar);
    const shelf=document.createElement('div');shelf.className='cx-shelf';
    const lbl=document.createElement('div');lbl.className='cx-shelf-lbl';
    lbl.style.color=grp.c;lbl.textContent='◈ '+grp.label;
    shelf.appendChild(lbl);
    const row=document.createElement('div');row.className='cx-row';
    vs.forEach(v=>{row.appendChild(makeCxVial(v));});
    shelf.appendChild(row);scroll.appendChild(shelf);
  });
  // Special
  const sp=document.createElement('div');sp.className='cx-special';
  const spL=document.createElement('div');spL.className='cx-special-lbl';
  spL.textContent='◈ 특별 감금실 SECTOR-0';sp.appendChild(spL);
  ['VOID','LEGEND'].forEach(rar=>{
    const sl=document.createElement('div');
    sl.style.cssText='font-size:7px;color:'+(rar==='VOID'?'#b44dff':'#fff')+'88;letter-spacing:2px;margin-bottom:5px;';
    sl.textContent=rar+' CLASS';sp.appendChild(sl);
    const row=document.createElement('div');row.className='cx-sub-row';
    DB.filter(v=>v.rarity===rar).forEach(v=>{
      const w=makeCxVial(v);
      w.querySelector('canvas').style.filter=rar==='VOID'?'drop-shadow(0 0 5px #b44dff)':'drop-shadow(0 0 3px #fff5)';
      row.appendChild(w);
    });
    sp.appendChild(row);
  });
  scroll.appendChild(sp);
  animCxVials();
}

function makeCxVial(v){
  const wrap=document.createElement('div');wrap.className='cx-vial';
  const c=document.createElement('canvas');c.width=62;c.height=98;
  const lbl=document.createElement('div');lbl.className='cx-lbl r-'+v.rarity;
  lbl.textContent=v.invisible?'???':v.name;
  wrap.appendChild(c);wrap.appendChild(lbl);
  wrap.addEventListener('click',()=>openCxPopup(v));
  wrap.addEventListener('touchend',e=>{e.preventDefault();openCxPopup(v);});
  vialAnimMap[v.id]={canvas:c,virus:v};
  return wrap;
}

let cxT=0;
function animCxVials(){
  cxT+=0.016;
  Object.values(vialAnimMap).forEach(({canvas,virus})=>drawVial(canvas,virus,cxT));
  if(document.getElementById('s-codex').classList.contains('active')||
     document.getElementById('s-game').classList.contains('active'))
    requestAnimationFrame(animCxVials);
}

function openCxPopup(v){
  document.getElementById('cx-pname').textContent=v.invisible?'???':v.name;
  document.getElementById('cx-pname').className='cx-pname r-'+v.rarity;
  document.getElementById('cx-prar').textContent=v.rarity;
  document.getElementById('cx-prar').style.color=RARITY_C[v.rarity];
  document.getElementById('cx-pdesc').textContent=v.desc;
  setTimeout(()=>{
    ['inf','mut','dan'].forEach(k=>{
      document.getElementById('cx-'+k).style.width=v[k]+'%';
      document.getElementById('cxv-'+k).textContent=v[k]>=99?'INF':v[k];
    });
  },100);
  document.getElementById('cx-popup').classList.add('open');
  const canvas=document.getElementById('cx-canvas');
  let dt=cxT;
  if(cxAnim)cancelAnimationFrame(cxAnim);
  (function a(){drawDetailVial(canvas,v,dt);dt+=0.016;cxAnim=requestAnimationFrame(a);})();
}
function closeCxPopup(){
  if(cxAnim)cancelAnimationFrame(cxAnim);
  document.getElementById('cx-popup').classList.remove('open');
}

// ── CANVAS ──
function resizeRC(){
  RC=document.getElementById('room-canvas');
  RC.width=window.innerWidth;RC.height=window.innerHeight;
  RX=RC.getContext('2d');
}
window.addEventListener('resize',()=>{if(RC)resizeRC();});

function gameLoop(){
  animT+=0.016;
  if(document.getElementById('s-game').classList.contains('active')){
    drawRoom();gameLoopRAF=requestAnimationFrame(gameLoop);
  } else {gameLoopRAF=null;}
}

function drawRoom(){
  if(!RX)return;
  const W=RC.width,H=RC.height;
  RX.clearRect(0,0,W,H);
  if(curRoom==='office') drawOffice(W,H);
  else if(curRoom==='door') drawDoor(W,H);
  else if(curRoom==='ctrl') drawCtrlRoom(W,H);
  else if(curRoom==='storage') drawStorage(W,H);
  else if(curRoom==='cold') drawCold(W,H);
  updateNav();
}

// 공통 원근 유틸
function drawPerspRoom(ctx,W,H,opts){
  const {wallC,floorC,ceilC,fogC}=opts;
  // 천장
  const ceilG=ctx.createLinearGradient(0,0,0,H*0.42);
  ceilG.addColorStop(0,ceilC||'#080f18');ceilG.addColorStop(1,ceilC+'88'||'#080f1888');
  ctx.fillStyle=ceilG;ctx.fillRect(0,0,W,H*0.42);
  // 바닥
  const floorG=ctx.createLinearGradient(0,H*0.58,0,H);
  floorG.addColorStop(0,floorC+'88'||'#06100888');floorG.addColorStop(1,floorC||'#061008');
  ctx.fillStyle=floorG;ctx.fillRect(0,H*0.58,W,H*0.42);
  // 정면 벽 (소실점 원근 사다리꼴)
  const vp={x:W/2,y:H*0.5}; // vanishing point
  const wallL=W*0.08,wallR=W*0.92,wallT=H*0.12,wallB=H*0.88;
  ctx.fillStyle=wallC||'#050d10';
  ctx.beginPath();ctx.moveTo(wallL,wallT);ctx.lineTo(wallR,wallT);
  ctx.lineTo(wallR,wallB);ctx.lineTo(wallL,wallB);ctx.closePath();ctx.fill();
  // 좌측 벽 (원근)
  const lwL=0,lwT=0,lwR=wallL,lwTi=wallT,lwBi=wallB,lwB=H;
  ctx.fillStyle=(wallC||'#050d10')+'cc';
  ctx.beginPath();ctx.moveTo(lwL,lwT);ctx.lineTo(lwR,lwTi);
  ctx.lineTo(lwR,lwBi);ctx.lineTo(lwL,lwB);ctx.closePath();ctx.fill();
  // 우측 벽
  ctx.fillStyle=(wallC||'#050d10')+'cc';
  ctx.beginPath();ctx.moveTo(W,0);ctx.lineTo(wallR,wallT);
  ctx.lineTo(wallR,wallB);ctx.lineTo(W,H);ctx.closePath();ctx.fill();
  // 벽 경계선
  ctx.strokeStyle='rgba(0,255,136,0.08)';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(wallL,wallT);ctx.lineTo(wallR,wallT);ctx.stroke();
  ctx.beginPath();ctx.moveTo(wallL,wallB);ctx.lineTo(wallR,wallB);ctx.stroke();
  ctx.beginPath();ctx.moveTo(wallL,wallT);ctx.lineTo(wallL,wallB);ctx.stroke();
  ctx.beginPath();ctx.moveTo(wallR,wallT);ctx.lineTo(wallR,wallB);ctx.stroke();
  // 소실점 라인 (원근감)
  ctx.strokeStyle='rgba(0,255,136,0.04)';ctx.lineWidth=0.5;
  [[0,0],[W,0],[0,H],[W,H]].forEach(([x,y])=>{
    ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(vp.x,vp.y);ctx.stroke();
  });
  // 천장 타일
  ctx.strokeStyle='rgba(0,255,136,0.05)';ctx.lineWidth=0.5;
  for(let i=1;i<4;i++){
    const ty=wallT+(H*0.5-wallT)*i/4;
    ctx.beginPath();ctx.moveTo(wallL+(W*0.08)*i/4,ty);ctx.lineTo(wallR-(W*0.08)*i/4,ty);ctx.stroke();
  }
  // 바닥 타일
  for(let i=1;i<4;i++){
    const by=wallB+(H*0.12)*i/4;
    ctx.beginPath();ctx.moveTo(wallL+(W*0.08)*i/4,by);ctx.lineTo(wallR-(W*0.08)*i/4,by);ctx.stroke();
  }
  // 안개 오버레이 (깊이감)
  if(fogC){
    const fog=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.6);
    fog.addColorStop(0,'transparent');fog.addColorStop(1,fogC);
    ctx.fillStyle=fog;ctx.fillRect(0,0,W,H);
  }
  return {vp,wallL,wallR,wallT,wallB};
}

// 형광등 그리기
function drawCeilingLight(ctx,W,H,wt,on,t){
  const lx=W/2,ly=wt+4,lw=W*0.18,lh=8;
  if(on){
    ctx.shadowColor='#ffffff';ctx.shadowBlur=30+Math.sin(t*60)*2;
    ctx.fillStyle='#fffff0';ctx.fillRect(lx-lw/2,ly,lw,lh);
    // 빛 원뿔
    ctx.shadowBlur=0;
    const lg=ctx.createLinearGradient(0,ly,0,H*0.88);
    lg.addColorStop(0,'rgba(255,255,220,0.12)');lg.addColorStop(1,'transparent');
    ctx.fillStyle=lg;
    ctx.beginPath();ctx.moveTo(lx-lw/2,ly+lh);ctx.lineTo(lx-W*0.45,H*0.88);
    ctx.lineTo(lx+W*0.45,H*0.88);ctx.lineTo(lx+lw/2,ly+lh);ctx.closePath();ctx.fill();
  } else {
    ctx.fillStyle='#222';ctx.fillRect(lx-lw/2,ly,lw,lh);
  }
  ctx.shadowBlur=0;
}

// 정면 문 그리기
function drawFrontDoor(ctx,W,H,wl,wr,wt,wb,opts={}){
  const {color='#1a1510',glowC='rgba(255,136,0,0.5)',locked=true,label=''}=opts;
  const dw=(wr-wl)*0.42,dh=(wb-wt)*0.85;
  const dx=W/2-dw/2,dy=wt+(wb-wt)*0.075;
  // 문틀
  ctx.fillStyle='#0a0806';ctx.fillRect(dx-6,dy-6,dw+12,dh+12);
  ctx.strokeStyle=glowC;ctx.lineWidth=2;ctx.strokeRect(dx-6,dy-6,dw+12,dh+12);
  // 문
  ctx.fillStyle=color;ctx.fillRect(dx,dy,dw,dh);
  ctx.strokeStyle=glowC+'88';ctx.lineWidth=1;ctx.strokeRect(dx,dy,dw,dh);
  // 패널
  const pw=dw*0.42,ph=dh*0.32;
  [[dx+dw*0.05,dy+dh*0.04],[dx+dw*0.53,dy+dh*0.04],
   [dx+dw*0.05,dy+dh*0.54],[dx+dw*0.53,dy+dh*0.54]].forEach(([px,py])=>{
    ctx.fillStyle='rgba(255,255,255,0.02)';ctx.fillRect(px,py,pw,ph);
    ctx.strokeStyle=glowC+'33';ctx.lineWidth=0.7;ctx.strokeRect(px,py,pw,ph);
  });
  // 손잡이
  ctx.fillStyle=glowC+'88';ctx.beginPath();
  ctx.arc(dx+dw*0.88,dy+dh*0.5,5,0,Math.PI*2);ctx.fill();
  if(label){
    ctx.fillStyle=locked?'#ff2d6b':'#00ff88';
    ctx.font='bold 9px Orbitron,monospace';ctx.textAlign='center';
    ctx.fillText(label,W/2,dy+dh+18);ctx.textAlign='left';
  }
  return {dx,dy,dw,dh};
}

// 측면 복도 그리기
function drawSideCorridorL(ctx,W,H,wl,wt,wb,color){
  // 왼쪽 측면 — 복도가 좌측으로 이어지는 느낌
  const g=ctx.createLinearGradient(0,0,wl,0);
  g.addColorStop(0,'#000');g.addColorStop(1,color+'44');
  ctx.fillStyle=g;ctx.beginPath();
  ctx.moveTo(0,0);ctx.lineTo(wl,wt);ctx.lineTo(wl,wb);ctx.lineTo(0,H);ctx.closePath();ctx.fill();
  // 원근선
  ctx.strokeStyle=color+'22';ctx.lineWidth=0.7;
  for(let i=1;i<3;i++){
    ctx.beginPath();ctx.moveTo(0,H*i/3);ctx.lineTo(wl,wt+(wb-wt)*i/3);ctx.stroke();
  }
  // 깊이 안개
  const fog=ctx.createLinearGradient(0,0,wl,0);
  fog.addColorStop(0,'rgba(0,0,0,0.7)');fog.addColorStop(1,'transparent');
  ctx.fillStyle=fog;ctx.beginPath();
  ctx.moveTo(0,0);ctx.lineTo(wl,wt);ctx.lineTo(wl,wb);ctx.lineTo(0,H);ctx.closePath();ctx.fill();
}

function drawSideCorridorR(ctx,W,H,wr,wt,wb,color){
  const g=ctx.createLinearGradient(wr,0,W,0);
  g.addColorStop(0,color+'44');g.addColorStop(1,'#000');
  ctx.fillStyle=g;ctx.beginPath();
  ctx.moveTo(wr,wt);ctx.lineTo(W,0);ctx.lineTo(W,H);ctx.lineTo(wr,wb);ctx.closePath();ctx.fill();
  ctx.strokeStyle=color+'22';ctx.lineWidth=0.7;
  for(let i=1;i<3;i++){
    ctx.beginPath();ctx.moveTo(W,H*i/3);ctx.lineTo(wr,wt+(wb-wt)*i/3);ctx.stroke();
  }
  const fog=ctx.createLinearGradient(wr,0,W,0);
  fog.addColorStop(0,'transparent');fog.addColorStop(1,'rgba(0,0,0,0.7)');
  ctx.fillStyle=fog;ctx.beginPath();
  ctx.moveTo(wr,wt);ctx.lineTo(W,0);ctx.lineTo(W,H);ctx.lineTo(wr,wb);ctx.closePath();ctx.fill();
}

// 스캔라인
function drawScanlines(ctx,W,H){
  ctx.fillStyle='rgba(0,0,0,0.1)';
  for(let y=0;y<H;y+=4)ctx.fillRect(0,y,W,1);
}

// ── OFFICE (사무실) ──
function drawCCTV(ctx,x,y,w,h,t){
  ctx.fillStyle='#06100a';ctx.fillRect(x-3,y-3,w+6,h+18);
  ctx.strokeStyle='rgba(0,255,136,0.3)';ctx.lineWidth=1;ctx.strokeRect(x-3,y-3,w+6,h+18);
  ctx.fillStyle='rgba(0,255,136,0.07)';ctx.fillRect(x-3,y+h,w+6,16);
  ctx.fillStyle='rgba(0,255,136,0.4)';ctx.font='6px Share Tech Mono,monospace';
  ctx.textAlign='center';ctx.fillText('CCTV',x+w/2,y+h+11);ctx.textAlign='left';
  const fw=(w-2)/2,fh=(h-2)/2;
  [['storage',x,y],['door',x+fw+1,y],['cold',x,y+fh+1],['ctrl',x+fw+1,y+fh+1]].forEach(([rm,fx,fy])=>{
    drawMiniCam(ctx,rm,fx,fy,fw,fh,t);
  });
}

function drawMiniCam(ctx,rm,x,y,w,h,t){
  ctx.save();ctx.beginPath();ctx.rect(x,y,w,h);ctx.clip();
  const bgc={storage:'#050e05',cold:'#050508',door:'#0c0603',ctrl:'#050810'};
  ctx.fillStyle=bgc[rm]||'#050505';ctx.fillRect(x,y,w,h);
  const sc=(t*18)%h;ctx.fillStyle='rgba(0,255,136,0.05)';ctx.fillRect(x,y+sc,w,1.5);
  const vs=rm==='cold'?DB.filter(v=>['VOID','LEGEND','FUSION'].includes(v.rarity)).slice(0,4)
    :rm==='storage'?DB.filter(v=>['COMMON','RARE','MUTANT','CHIMERA'].includes(v.rarity)).slice(0,4):[];
  vs.forEach((v,i)=>{
    const vx=x+2+(i%2)*(w/2-1),vy=y+2+Math.floor(i/2)*(h/2-1);
    ctx.save();ctx.translate(vx+w/4,vy+h/4);
    const fn=MICRO_DRAW[v.id]||MICRO_DRAW['_'+v.rarity]||MICRO_DRAW['_COMMON'];
    const p=VPARAMS[v.id]||VPARAMS.default;
    ctx.shadowColor=v.color;ctx.shadowBlur=3;
    fn(ctx,v.color,4,t*p.rot,t);ctx.shadowBlur=0;ctx.restore();
  });
  ctx.fillStyle='rgba(0,255,136,0.35)';ctx.font='5px Share Tech Mono,monospace';
  ctx.textAlign='left';ctx.fillText(rm.toUpperCase(),x+1,y+h-2);
  const hasA=Object.values(G.activeIncidents).some(inc=>{
    const v=DB.find(d=>d.id===inc.virus);if(!v)return false;
    if(rm==='cold')return ['VOID','LEGEND','FUSION'].includes(v.rarity);
    if(rm==='storage')return ['COMMON','RARE','MUTANT','CHIMERA'].includes(v.rarity);
    return false;
  });
  if(hasA){
    const blink=Math.floor(Date.now()/500)%2===0;
    ctx.fillStyle='rgba(255,45,107,0.15)';ctx.fillRect(x,y,w,h);
    if(blink){
      ctx.fillStyle='rgba(255,45,107,0.95)';
      ctx.font=`bold ${Math.floor(h*0.18)}px Orbitron,monospace`;
      ctx.textAlign='center';ctx.fillText('문제 발생',x+w/2,y+h/2+2);ctx.textAlign='left';
    }
  }
  ctx.restore();
}

function drawOffice(W,H){
  const ctx=RX,t=animT;
  const lightsOn=G.ctrl.lights;

  const r=drawPerspRoom(ctx,W,H,{
    wallC:'#06101a',floorC:'#060e0a',ceilC:'#081218',
    fogC:lightsOn?null:'rgba(0,0,0,0.5)',
  });
  const {wallL:wl,wallR:wr,wallT:wt,wallB:wb}=r;

  drawCeilingLight(ctx,W,H,wt,lightsOn,t);
  if(!lightsOn){
    ctx.shadowColor='#ff0000';ctx.shadowBlur=20+Math.sin(t*2)*8;
    ctx.fillStyle='rgba(80,0,0,0.25)';ctx.fillRect(0,0,W,H);
    ctx.shadowBlur=0;
  }

  // 좌측 복도 → 출입구
  drawSideCorridorL(ctx,W,H,wl,wt,wb,'#ff8800');
  ctx.fillStyle='rgba(255,136,0,0.35)';ctx.font='bold 8px Share Tech Mono,monospace';
  ctx.save();ctx.translate(wl*0.45,H*0.5);ctx.rotate(-Math.PI/2);
  ctx.textAlign='center';ctx.fillText('출입구',0,0);ctx.restore();

  // 우측 복도 → 제어실
  drawSideCorridorR(ctx,W,H,wr,wt,wb,'#00d4ff');
  ctx.fillStyle='rgba(0,212,255,0.35)';ctx.font='bold 8px Share Tech Mono,monospace';
  ctx.save();ctx.translate(wr+(W-wr)*0.55,H*0.5);ctx.rotate(Math.PI/2);
  ctx.textAlign='center';ctx.fillText('제어실',0,0);ctx.restore();

  // 정면 벽 — 보관실 문 (작게 중앙)
  const storeDoorW=(wr-wl)*0.28, storeDoorH=(wb-wt)*0.55;
  const sdx=W/2-storeDoorW/2, sdy=wt+(wb-wt)*0.1;
  ctx.fillStyle='#081408';ctx.fillRect(sdx,sdy,storeDoorW,storeDoorH);
  ctx.strokeStyle='rgba(0,255,136,0.35)';ctx.lineWidth=1;ctx.strokeRect(sdx,sdy,storeDoorW,storeDoorH);
  ctx.fillStyle='rgba(0,255,136,0.25)';ctx.font='bold 8px Orbitron,monospace';
  ctx.textAlign='center';ctx.fillText('▲ 보관실',W/2,sdy+storeDoorH+14);ctx.textAlign='left';
  // 문 손잡이
  ctx.fillStyle='rgba(0,255,136,0.4)';ctx.beginPath();ctx.arc(sdx+storeDoorW*0.85,sdy+storeDoorH*0.5,3,0,Math.PI*2);ctx.fill();

  // ── CCTV TV (우측 벽 메인) ──
  const tvW=Math.min(160,W*0.38), tvH=tvW*0.72;
  const tvX=wr-(tvW+W*0.015), tvY=wt+H*0.04;
  drawCCTV(ctx,tvX+10,tvY+8,tvW-20,tvH-20,t);
  // TV 외형 (CCTV 함수 밖에서 큰 베젤)
  ctx.fillStyle='#111';ctx.beginPath();
  if(ctx.roundRect)ctx.roundRect(tvX,tvY,tvW,tvH,8);
  else ctx.rect(tvX,tvY,tvW,tvH);
  // 그리지 않고 테두리만
  ctx.strokeStyle='#2a2a2a';ctx.lineWidth=3;ctx.stroke();

  // 비상버튼 (좌측 벽)
  const bx=wl+W*0.07,by=H*0.48,br=Math.min(W,H)*0.042;
  ctx.shadowColor='#ff2d6b';ctx.shadowBlur=12+Math.sin(t*3)*6;
  ctx.beginPath();ctx.arc(bx,by,br*1.4,0,Math.PI*2);ctx.fillStyle='#1a0008';ctx.fill();
  ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fillStyle='#cc0022';ctx.fill();
  ctx.strokeStyle='#ff2d6b';ctx.lineWidth=2;ctx.stroke();ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,45,107,0.7)';ctx.font='bold 7px Orbitron,monospace';
  ctx.textAlign='center';ctx.fillText('비상',bx,by+br+12);ctx.textAlign='left';

  // 책상
  const deskY=wb-H*0.04, deskH=H*0.2;
  const deskL=wl+W*0.04, deskR=wr-W*0.04;
  ctx.fillStyle='#1a1208';ctx.fillRect(deskL,deskY,deskR-deskL,deskH);
  ctx.strokeStyle='rgba(255,136,0,0.2)';ctx.lineWidth=1;ctx.strokeRect(deskL,deskY,deskR-deskL,deskH);

  // 디지털 시계
  const clkW=W*0.24,clkH=H*0.088;
  const clkX=W/2-clkW/2,clkY=deskY+5;
  ctx.fillStyle='#020e02';ctx.fillRect(clkX,clkY,clkW,clkH);
  ctx.strokeStyle='rgba(0,255,136,0.5)';ctx.lineWidth=1;ctx.strokeRect(clkX,clkY,clkW,clkH);
  ctx.fillStyle='rgba(0,20,0,0.9)';ctx.fillRect(clkX+2,clkY+2,clkW-4,clkH-4);
  const cm=Math.floor(G.timeLeft/60),cs=G.timeLeft%60;
  ctx.shadowColor='#00ff88';ctx.shadowBlur=10;
  ctx.fillStyle=G.timeLeft<60?'#ff2d6b':'#00ff88';
  ctx.font='bold '+Math.floor(clkH*0.62)+'px VT323,monospace';
  ctx.textAlign='center';ctx.fillText(String(cm).padStart(2,'0')+':'+String(cs).padStart(2,'0'),clkX+clkW/2,clkY+clkH*0.76);
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(0,255,136,0.28)';ctx.font='5px Share Tech Mono,monospace';
  ctx.fillText('REMAIN',clkX+clkW/2,clkY+clkH-2);ctx.textAlign='left';

  // 숙련일지 책 (책상 좌측)
  const bookW=W*0.08,bookH=H*0.065;
  const bookX=deskL+W*0.03,bookY=deskY+5;
  ctx.fillStyle='#0a1a0a';ctx.fillRect(bookX,bookY,bookW,bookH);
  ctx.strokeStyle='rgba(0,255,136,0.55)';ctx.lineWidth=1;ctx.strokeRect(bookX,bookY,bookW,bookH);
  ctx.fillStyle='rgba(0,255,136,0.5)';ctx.font='bold 6px Orbitron,monospace';
  ctx.textAlign='center';ctx.fillText('LOG',bookX+bookW/2,bookY+bookH*0.6);ctx.textAlign='left';
  window._deskBookArea={x:bookX,y:bookY,w:bookW,h:bookH};

  // 전력 게이지 (책상 우측)
  const pgW=W*0.06,pgH=H*0.065;
  const pgX=deskR-W*0.09,pgY=deskY+5;
  ctx.fillStyle='#040a04';ctx.fillRect(pgX,pgY,pgW,pgH);
  ctx.strokeStyle='rgba(0,255,136,0.3)';ctx.lineWidth=1;ctx.strokeRect(pgX,pgY,pgW,pgH);
  const pct=G.power/900;
  const pfG=ctx.createLinearGradient(0,pgY+pgH,0,pgY);
  pfG.addColorStop(0,'#ff2d6b');pfG.addColorStop(0.4,'#ffd000');pfG.addColorStop(0.8,'#00ff88');
  ctx.fillStyle=pfG;ctx.fillRect(pgX+2,pgY+pgH*(1-pct),pgW-4,pgH*pct-2);
  ctx.fillStyle='rgba(0,255,136,0.4)';ctx.font='5px Share Tech Mono,monospace';
  ctx.textAlign='center';ctx.fillText('PWR',pgX+pgW/2,pgY+pgH+8);ctx.textAlign='left';

  // 이상징후 카운트
  const incCount=Object.keys(G.activeIncidents).length;
  if(incCount>0){
    ctx.shadowColor='#ff2d6b';ctx.shadowBlur=10;
    ctx.fillStyle='#ff2d6b';ctx.font='bold 10px Orbitron,monospace';
    ctx.textAlign='center';
    ctx.fillText('⚠ ALERT x'+incCount,W/2,wt-6);
    ctx.shadowBlur=0;ctx.textAlign='left';
  }

  drawDarknessOverlay(ctx,W,H,animT);
  drawScanlines(ctx,W,H);
}

// ── DOOR ROOM ──
function drawDoor(W,H){
  const ctx=RX,t=animT;
  const r=drawPerspRoom(ctx,W,H,{wallC:'#100806',floorC:'#0a0604',ceilC:'#0e0704'});
  const {wallL:wl,wallR:wr,wallT:wt,wallB:wb}=r;
  drawCeilingLight(ctx,W,H,wt,G.ctrl.lights,t);
  drawSideCorridorR(ctx,W,H,wr,wt,wb,'#00ff88');
  // 큰 금속 보안문
  const canExit=G.timeLeft<=0;
  drawFrontDoor(ctx,W,H,wl,wr,wt,wb,{
    color:'#18100c',
    glowC:canExit?'rgba(0,255,136,0.6)':'rgba(255,45,107,0.5)',
    locked:!canExit,
    label:canExit?'[ UNLOCKED — TAP TO EXIT ]':'LOCKED'
  });
  // 경고 줄무늬 (하단)
  ctx.save();ctx.beginPath();ctx.rect(wl,wb-16,wr-wl,16);ctx.clip();
  for(let i=0;i<wr-wl;i+=20){
    ctx.fillStyle=i%40<20?'rgba(255,136,0,0.2)':'rgba(0,0,0,0.2)';
    ctx.fillRect(wl+i,wb-16,20,16);
  }
  ctx.restore();
  // 잠금 패널 (우측 벽)
  const px=wr+W*0.02,py=H*0.38,pw=W*0.05,ph=H*0.22;
  ctx.fillStyle='#0a1a0a';ctx.fillRect(px,py,pw,ph);
  ctx.strokeStyle=canExit?'rgba(0,255,136,0.5)':'rgba(255,45,107,0.4)';
  ctx.lineWidth=1;ctx.strokeRect(px,py,pw,ph);
  ctx.beginPath();ctx.arc(px+pw/2,py+ph*0.35,6,0,Math.PI*2);
  ctx.fillStyle=canExit?'#00ff88':'#ff2d6b';ctx.fill();
  // 시간 표시
  if(!canExit){
    const m=Math.floor(G.timeLeft/60),s=G.timeLeft%60;
    ctx.fillStyle='rgba(255,136,0,0.5)';ctx.font='8px VT323,monospace';
    ctx.textAlign='center';ctx.fillText(String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'),px+pw/2,py+ph*0.7);
    ctx.textAlign='left';
  }
  drawDarknessOverlay(ctx,W,H,animT);
  drawScanlines(ctx,W,H);
}

// ── CTRL ROOM ──
function drawCtrlRoom(W,H){
  const ctx=RX,t=animT;
  const r=drawPerspRoom(ctx,W,H,{wallC:'#040c18',floorC:'#030810',ceilC:'#050e1a'});
  const {wallL:wl,wallR:wr,wallT:wt,wallB:wb}=r;
  drawCeilingLight(ctx,W,H,wt,G.ctrl.lights,t);
  drawSideCorridorL(ctx,W,H,wl,wt,wb,'#00ff88');

  // 제어판 (정면 벽 전체)
  const cpW=(wr-wl)*0.9,cpH=(wb-wt)*0.75;
  const cpX=W/2-cpW/2,cpY=wt+(wb-wt)*0.1;
  ctx.fillStyle='#06101e';ctx.fillRect(cpX,cpY,cpW,cpH);
  ctx.strokeStyle='rgba(0,212,255,0.3)';ctx.lineWidth=1.5;ctx.strokeRect(cpX,cpY,cpW,cpH);
  // 패널 내 버튼들 시각화
  const cols=4,rows=2,btnW=cpW/cols*0.8,btnH=cpH/rows*0.6;
  const ctrlKeys=['lights','ac','heat','seal','alarm','uv','freeze','static'];
  const ctrlEmoji={'lights':'💡','ac':'❄️','heat':'🔥','seal':'🔒','alarm':'🚨','uv':'🔵','freeze':'🧊','static':'⚡'};
  ctrlKeys.forEach((key,i)=>{
    const col=i%cols,row=Math.floor(i/cols);
    const bx=cpX+cpW*0.06+col*(cpW*0.23),by=cpY+cpH*0.1+row*(cpH*0.46);
    const on=G.ctrl[key];
    ctx.fillStyle=on?'rgba(0,255,136,0.15)':'rgba(0,0,0,0.3)';
    ctx.fillRect(bx,by,btnW,btnH);
    ctx.strokeStyle=on?'rgba(0,255,136,0.5)':'rgba(0,100,50,0.2)';
    ctx.lineWidth=1;ctx.strokeRect(bx,by,btnW,btnH);
    // LED
    ctx.beginPath();ctx.arc(bx+btnW*0.8,by+btnH*0.2,3,0,Math.PI*2);
    ctx.fillStyle=on?'#00ff88':'#001500';ctx.fill();
    ctx.font='9px serif';ctx.textAlign='center';
    ctx.fillText(ctrlEmoji[key]||'',bx+btnW/2,by+btnH*0.65);
    ctx.textAlign='left';
  });
  // 제어판 라벨
  ctx.fillStyle='rgba(0,212,255,0.5)';ctx.font='bold 8px Orbitron,monospace';
  ctx.textAlign='center';ctx.fillText('CONTROL PANEL — TAP TO OPERATE',W/2,cpY-8);ctx.textAlign='left';

  // 전력 바 (우측)
  const pbX=cpX+cpW+W*0.01,pbY=cpY,pbW=W*0.04,pbH=cpH;
  ctx.fillStyle='#060e06';ctx.fillRect(pbX,pbY,pbW,pbH);
  ctx.strokeStyle='rgba(0,255,136,0.2)';ctx.lineWidth=0.8;ctx.strokeRect(pbX,pbY,pbW,pbH);
  const pct=G.power/800;
  const pfH=pbH*pct;
  const pfG=ctx.createLinearGradient(0,pbY+pbH,0,pbY);
  pfG.addColorStop(0,'#ff2d6b');pfG.addColorStop(0.4,'#ffd000');pfG.addColorStop(0.8,'#00ff88');
  ctx.fillStyle=pfG;ctx.fillRect(pbX,pbY+pbH-pfH,pbW,pfH);

  drawDarknessOverlay(ctx,W,H,animT);
  drawScanlines(ctx,W,H);
}

// ── 전조증상 함수들 (확연히 다름) ──
function drawP_shake(ctx,vx,vy,vw,vh,t,ph){
  const s=Math.sin(t*25)*ph*6;
  ctx.save();ctx.translate(s,0);
  ctx.strokeStyle=`rgba(255,200,0,${ph*0.9})`;ctx.lineWidth=2;ctx.strokeRect(vx,vy,vw,vh);
  ctx.restore();
  ctx.fillStyle=`rgba(255,200,0,${ph*0.12})`;ctx.fillRect(vx,vy,vw,vh);
}
function drawP_invisible(ctx,vx,vy,vw,vh,t,ph){
  // 통이 점점 안 보임 - 흰 깜빡이다 사라짐
  ctx.fillStyle=`rgba(255,255,255,${ph*0.85})`;ctx.fillRect(vx,vy,vw,vh);
  ctx.strokeStyle=`rgba(255,255,255,${ph})`;ctx.lineWidth=2;ctx.strokeRect(vx,vy,vw,vh);
}
function drawP_freeze(ctx,vx,vy,vw,vh,t,ph){
  // 파란 얼음 결정이 통 전체를 덮음
  ctx.fillStyle=`rgba(150,220,255,${ph*0.6})`;ctx.fillRect(vx,vy,vw,vh);
  ctx.strokeStyle=`rgba(100,200,255,${ph})`;ctx.lineWidth=1.5;ctx.strokeRect(vx,vy,vw,vh);
  // 결정
  for(let i=0;i<6;i++){
    const cx=vx+vw*(0.15+i*0.15),cy=vy+vh*0.5,len=vh*0.3*ph;
    ctx.strokeStyle=`rgba(200,240,255,${ph*0.9})`;ctx.lineWidth=1;
    for(let d=0;d<6;d++){
      const a=d/6*Math.PI*2;
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*len,cy+Math.sin(a)*len);ctx.stroke();
    }
  }
}
function drawP_blackhole(ctx,vx,vy,vw,vh,t,ph){
  const cx=vx+vw/2,cy=vy+vh/2,r=vw*0.4*ph;
  // 빨려드는 나선
  ctx.save();
  for(let i=0;i<3;i++){
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r*(1.2+i*0.3));
    g.addColorStop(0,'rgba(0,0,0,0.9)');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r*(1.2+i*0.3),0,Math.PI*2);ctx.fill();
  }
  ctx.strokeStyle=`rgba(100,0,180,${ph*0.8})`;ctx.lineWidth=1.5;
  for(let i=0;i<3;i++){
    ctx.beginPath();ctx.arc(cx,cy,r*(0.4+i*0.3),t*2+i,t*2+i+Math.PI*1.5);ctx.stroke();
  }
  ctx.restore();
}
function drawP_flash(ctx,vx,vy,vw,vh,t,ph){
  // 강한 흰 플래시 - 눈부심
  const fl=Math.abs(Math.sin(t*12));
  ctx.fillStyle=`rgba(255,255,255,${ph*fl*0.95})`;ctx.fillRect(vx-4,vy-4,vw+8,vh+8);
  if(fl>0.7){
    ctx.strokeStyle=`rgba(255,255,0,${ph})`;ctx.lineWidth=3;ctx.strokeRect(vx,vy,vw,vh);
  }
}
function drawP_disintegrate(ctx,vx,vy,vw,vh,t,ph){
  // 보라 균열 + 조각이 흩어짐
  ctx.fillStyle=`rgba(80,0,120,${ph*0.5})`;ctx.fillRect(vx,vy,vw,vh);
  ctx.strokeStyle=`rgba(200,50,255,${ph*0.9})`;ctx.lineWidth=1.5;
  const cracks=[[0.5,0,0.2,0.4],[0.5,0,0.8,0.3],[0.5,0.4,0.1,0.9],[0.5,0.4,0.9,0.8]];
  cracks.forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath();ctx.moveTo(vx+x1*vw,vy+y1*vh);ctx.lineTo(vx+x2*vw,vy+y2*vh);ctx.stroke();
  });
  // 흩어지는 파편
  for(let i=0;i<6;i++){
    const px=vx+vw/2+Math.cos(i/6*Math.PI*2+t)*vw*0.5*ph;
    const py=vy+vh/2+Math.sin(i/6*Math.PI*2+t)*vh*0.5*ph;
    ctx.fillStyle=`rgba(180,0,255,${ph*0.7})`;
    ctx.fillRect(px-2,py-2,4,4);
  }
}
function drawP_tentacle(ctx,vx,vy,vw,vh,t,ph){
  // 보라 촉수가 통 밖으로 뻗어나옴
  ctx.strokeStyle=`rgba(150,0,200,${ph*0.9})`;ctx.lineWidth=2;
  for(let i=0;i<5;i++){
    const base=vx+vw*(0.1+i*0.2);
    ctx.beginPath();ctx.moveTo(base,vy);
    for(let y=0;y<vh*0.9;y+=5){
      ctx.lineTo(base+Math.sin((y/8+t*3+i))*vw*0.2*ph,vy+y);
    }
    ctx.lineTo(base+Math.sin(t*3+i)*vw*0.3*ph,vy-vh*0.15*ph);
    ctx.stroke();
  }
  ctx.fillStyle=`rgba(100,0,150,${ph*0.3})`;ctx.fillRect(vx,vy,vw,vh);
}
function drawP_tsunami(ctx,vx,vy,vw,vh,t,ph){
  // 파란 파도가 통을 휩쓸음
  ctx.strokeStyle=`rgba(0,150,255,${ph*0.9})`;ctx.lineWidth=2;
  for(let w=0;w<3;w++){
    ctx.beginPath();
    for(let x=0;x<=vw;x+=3){
      const y=vh*(0.3+w*0.2)+Math.sin((x/vw*4+t*3+w)*Math.PI)*vh*0.15*ph;
      x===0?ctx.moveTo(vx,vy+y):ctx.lineTo(vx+x,vy+y);
    }
    ctx.stroke();
  }
  ctx.fillStyle=`rgba(0,100,200,${ph*0.3})`;ctx.fillRect(vx,vy,vw,vh);
}
function drawP_hearts(ctx,vx,vy,vw,vh,t,ph){
  ctx.fillStyle=`rgba(255,50,120,${ph*0.4})`;ctx.fillRect(vx,vy,vw,vh);
  const hearts=['❤','♥','💕'];
  for(let i=0;i<3;i++){
    const hx=vx+vw*(0.2+i*0.3),hy=vy+vh*0.4+Math.sin(t*3+i)*vh*0.15;
    ctx.font=`${Math.floor(vw*0.28)}px serif`;ctx.textAlign='center';
    ctx.globalAlpha=ph*(0.7+Math.sin(t*4+i)*0.3);
    ctx.fillStyle='#ff2d6b';ctx.fillText(hearts[i%3],hx,hy);
    ctx.globalAlpha=1;
  }
  ctx.textAlign='left';
  ctx.strokeStyle=`rgba(255,100,150,${ph*0.8})`;ctx.lineWidth=2;ctx.strokeRect(vx,vy,vw,vh);
}
function drawP_binary(ctx,vx,vy,vw,vh,t,ph){
  ctx.fillStyle='rgba(0,20,20,0.6)';ctx.fillRect(vx,vy,vw,vh);
  ctx.fillStyle=`rgba(0,255,180,${ph*0.9})`;
  ctx.font=`${Math.floor(vw*0.22)}px monospace`;
  const cols=Math.floor(vw/8);
  for(let c=0;c<cols;c++){
    const y=((t*60+c*23)%(vh+10))-5;
    ctx.fillText(Math.random()>0.5?'1':'0',vx+c*8,vy+y);
  }
  ctx.strokeStyle=`rgba(0,255,180,${ph*0.7})`;ctx.lineWidth=1.5;ctx.strokeRect(vx,vy,vw,vh);
}
function drawP_radiation(ctx,vx,vy,vw,vh,t,ph){
  const cx=vx+vw/2,cy=vy+vh/2,r=vw*0.38;
  ctx.fillStyle=`rgba(60,30,0,${ph*0.5})`;ctx.fillRect(vx,vy,vw,vh);
  // 방사능 마크
  ctx.save();ctx.translate(cx,cy);ctx.rotate(t*0.8);
  for(let i=0;i<3;i++){
    ctx.save();ctx.rotate(i/3*Math.PI*2);
    ctx.fillStyle=`rgba(255,180,0,${ph*0.9})`;
    ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r,0.4,Math.PI/3-0.4);ctx.closePath();ctx.fill();
    ctx.restore();
  }
  ctx.fillStyle=`rgba(60,30,0,${ph*0.9})`;
  ctx.beginPath();ctx.arc(0,0,r*0.3,0,Math.PI*2);ctx.fill();
  ctx.restore();
  ctx.strokeStyle=`rgba(255,200,0,${ph*0.8})`;ctx.lineWidth=2;ctx.strokeRect(vx,vy,vw,vh);
}
function drawP_ransom(ctx,vx,vy,vw,vh,t,ph){
  ctx.fillStyle=`rgba(0,0,60,${ph*0.6})`;ctx.fillRect(vx,vy,vw,vh);
  ctx.fillStyle=`rgba(80,80,255,${ph*0.9})`;
  ctx.font=`${Math.floor(vw*0.35)}px serif`;ctx.textAlign='center';
  ctx.fillText('🔐',vx+vw/2,vy+vh*0.52);
  ctx.font=`bold ${Math.floor(vw*0.16)}px monospace`;
  ctx.fillStyle=`rgba(255,100,100,${ph*(0.5+Math.sin(t*4)*0.4)})`;
  ctx.fillText('PAY NOW',vx+vw/2,vy+vh*0.82);ctx.textAlign='left';
  ctx.strokeStyle=`rgba(80,80,255,${ph*0.9})`;ctx.lineWidth=2;ctx.strokeRect(vx,vy,vw,vh);
}
function drawP_network(ctx,vx,vy,vw,vh,t,ph){
  const nodes=[[0.5,0.2],[0.2,0.5],[0.8,0.5],[0.35,0.8],[0.65,0.8]];
  ctx.fillStyle=`rgba(0,20,60,${ph*0.4})`;ctx.fillRect(vx,vy,vw,vh);
  ctx.strokeStyle=`rgba(100,150,255,${ph*0.7})`;ctx.lineWidth=0.8;
  nodes.forEach(([nx,ny],i)=>{
    nodes.forEach(([nx2,ny2],j)=>{
      if(i>=j)return;
      ctx.beginPath();ctx.moveTo(vx+nx*vw,vy+ny*vh);ctx.lineTo(vx+nx2*vw,vy+ny2*vh);ctx.stroke();
    });
    const pulse=0.5+Math.sin(t*4+i)*0.5;
    ctx.fillStyle=`rgba(100,200,255,${ph*pulse})`;
    ctx.beginPath();ctx.arc(vx+nx*vw,vy+ny*vh,3+pulse*2,0,Math.PI*2);ctx.fill();
  });
  ctx.strokeStyle=`rgba(100,150,255,${ph*0.8})`;ctx.lineWidth=2;ctx.strokeRect(vx,vy,vw,vh);
}
function drawP_worm(ctx,vx,vy,vw,vh,t,ph){
  ctx.fillStyle=`rgba(0,40,0,${ph*0.4})`;ctx.fillRect(vx,vy,vw,vh);
  // 웜이 통 안을 기어다님
  ctx.strokeStyle=`rgba(100,255,100,${ph*0.9})`;ctx.lineWidth=2.5;
  ctx.beginPath();
  for(let i=0;i<24;i++){
    const px=vx+vw*0.5+Math.sin(i*0.6+t*2)*vw*0.38*ph;
    const py=vy+4+i/24*vh*0.92;
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  }
  ctx.stroke();
  // 웜 머리
  const hx=vx+vw*0.5+Math.sin(t*2)*vw*0.38*ph,hy=vy+4;
  ctx.fillStyle=`rgba(200,255,100,${ph*0.9})`;
  ctx.beginPath();ctx.arc(hx,hy,4,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=`rgba(100,255,100,${ph*0.7})`;ctx.lineWidth=2;ctx.strokeRect(vx,vy,vw,vh);
}
function drawP_creeper(ctx,vx,vy,vw,vh,t,ph){
  ctx.fillStyle=`rgba(0,60,0,${ph*0.5})`;ctx.fillRect(vx,vy,vw,vh);
  ctx.fillStyle=`rgba(0,200,0,${ph*0.9})`;
  ctx.font=`bold ${Math.floor(vw*0.22)}px monospace`;ctx.textAlign='center';
  ctx.fillText('I AM THE',vx+vw/2,vy+vh*0.38);
  ctx.fillText('CREEPER',vx+vw/2,vy+vh*0.6);
  ctx.font=`${Math.floor(vw*0.18)}px monospace`;
  ctx.fillStyle=`rgba(100,255,100,${ph*(0.5+Math.sin(t*5)*0.4)})`;
  ctx.fillText('CATCH ME',vx+vw/2,vy+vh*0.82);ctx.textAlign='left';
  ctx.strokeStyle=`rgba(0,255,0,${ph*0.8})`;ctx.lineWidth=2;ctx.strokeRect(vx,vy,vw,vh);
}
function drawP_spam(ctx,vx,vy,vw,vh,t,ph){
  ctx.fillStyle=`rgba(60,0,0,${ph*0.4})`;ctx.fillRect(vx,vy,vw,vh);
  for(let i=0;i<4;i++){
    const ey=vy+vh*(0.15+i*0.2)+Math.sin(t*3+i)*5;
    ctx.font=`${Math.floor(vw*0.25)}px serif`;ctx.textAlign='center';
    ctx.globalAlpha=ph*(0.5+i*0.1);ctx.fillStyle='#ff4444';
    ctx.fillText('📧',vx+vw*0.5,ey+8);ctx.globalAlpha=1;
  }ctx.textAlign='left';
  ctx.strokeStyle=`rgba(255,100,100,${ph*0.8})`;ctx.lineWidth=2;ctx.strokeRect(vx,vy,vw,vh);
}
function drawP_doom(ctx,vx,vy,vw,vh,t,ph){
  ctx.fillStyle=`rgba(0,0,0,${ph*0.7})`;ctx.fillRect(vx,vy,vw,vh);
  ctx.fillStyle=`rgba(255,0,0,${ph*0.9})`;
  ctx.font=`bold ${Math.floor(vw*0.2)}px Orbitron,monospace`;ctx.textAlign='center';
  ctx.fillText('DOOM',vx+vw/2,vy+vh*0.5+2);ctx.textAlign='left';
  // 카운트다운 느낌
  ctx.strokeStyle=`rgba(255,0,0,${ph*(0.5+Math.sin(t*6)*0.4)})`;ctx.lineWidth=2.5;ctx.strokeRect(vx,vy,vw,vh);
}
function drawP_explosion(ctx,vx,vy,vw,vh,t,ph){
  const cx=vx+vw/2,cy=vy+vh/2;
  for(let i=0;i<8;i++){
    const a=i/8*Math.PI*2+t*0.5,len=vw*0.45*ph*(0.7+Math.sin(t*8+i)*0.3);
    const g=ctx.createLinearGradient(cx,cy,cx+Math.cos(a)*len,cy+Math.sin(a)*len);
    g.addColorStop(0,'rgba(255,200,0,0.9)');g.addColorStop(1,'rgba(255,50,0,0)');
    ctx.strokeStyle=g;ctx.lineWidth=2+Math.sin(t*8+i);
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*len,cy+Math.sin(a)*len);ctx.stroke();
  }
  ctx.fillStyle=`rgba(255,180,0,${ph*0.3})`;ctx.fillRect(vx,vy,vw,vh);
}
function drawP_slowmo(ctx,vx,vy,vw,vh,t,ph){
  // 검은 끈적한 느낌
  ctx.fillStyle=`rgba(0,0,0,${ph*0.65})`;ctx.fillRect(vx,vy,vw,vh);
  ctx.fillStyle=`rgba(255,255,0,${ph*0.9})`;
  ctx.font=`bold ${Math.floor(vw*0.18)}px monospace`;ctx.textAlign='center';
  ctx.fillText('SLOW...',vx+vw/2,vy+vh*0.5);ctx.textAlign='left';
  ctx.strokeStyle=`rgba(200,200,0,${ph*0.8})`;ctx.lineWidth=2;ctx.strokeRect(vx,vy,vw,vh);
}
function drawP_rainbow(ctx,vx,vy,vw,vh,t,ph){
  // 색이 빠르게 바뀜
  const h=Math.floor(t*90)%360;
  ctx.fillStyle=`hsla(${h},100%,50%,${ph*0.55})`;ctx.fillRect(vx,vy,vw,vh);
  ctx.strokeStyle=`hsla(${(h+120)%360},100%,60%,${ph*0.9})`;ctx.lineWidth=3;ctx.strokeRect(vx,vy,vw,vh);
}
function drawP_lightning(ctx,vx,vy,vw,vh,t,ph){
  if(Math.floor(t*7)%3===0){
    // 번쩍이는 번개
    ctx.fillStyle=`rgba(200,200,255,${ph*0.5})`;ctx.fillRect(vx,vy,vw,vh);
    ctx.strokeStyle=`rgba(180,180,255,${ph})`;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(vx+vw*0.55,vy+2);
    [[0.35,0.3],[0.6,0.5],[0.4,0.7],[0.55,1.0]].forEach(([rx,ry])=>ctx.lineTo(vx+rx*vw,vy+ry*vh));
    ctx.stroke();
    ctx.strokeStyle=`rgba(255,255,255,${ph*0.8})`;ctx.lineWidth=3;ctx.strokeRect(vx,vy,vw,vh);
  }
}
function drawP_idiot(ctx,vx,vy,vw,vh,t,ph){
  ctx.fillStyle=`rgba(255,255,0,${ph*0.5})`;ctx.fillRect(vx,vy,vw,vh);
  const ha=['HA','HA','HA'];
  ha.forEach((txt,i)=>{
    ctx.fillStyle=`rgba(255,0,0,${ph*0.9})`;
    ctx.font=`bold ${Math.floor(vw*0.22)}px Impact,monospace`;ctx.textAlign='center';
    ctx.fillText(txt,vx+vw/2,vy+vh*(0.3+i*0.25)+Math.sin(t*6+i)*4);
  });ctx.textAlign='left';
  ctx.strokeStyle=`rgba(255,0,0,${ph})`;ctx.lineWidth=3;ctx.strokeRect(vx,vy,vw,vh);
}
function drawP_triple(ctx,vx,vy,vw,vh,t,ph){
  // 3개 빨간 구역으로 분리되며 진동
  for(let i=0;i<3;i++){
    const s=Math.sin(t*15+i*2.1)*ph*5;
    ctx.strokeStyle=`rgba(255,${50+i*50},0,${ph*0.8})`;ctx.lineWidth=2;
    ctx.strokeRect(vx+i*(vw/3)+s/2,vy,vw/3,vh);
  }
  ctx.fillStyle=`rgba(255,50,0,${ph*0.25})`;ctx.fillRect(vx,vy,vw,vh);
