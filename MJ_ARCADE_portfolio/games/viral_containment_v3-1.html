// 전조증상 phase 계산 (0~1, 시간이 지날수록 강해짐)
function getPrecursorPhase(inc){
  if(!inc||!inc._spawnTime)return 0;
  const elapsed=(Date.now()-inc._spawnTime)/1000;
  if(elapsed>65)return 0;
  // 0~10초: 서서히 등장, 10~20초: 강해짐, 20초~: 최대
  return Math.min(1, elapsed/10);
}

// 전조증상 그리기 (drawShelfVials에서 통 위에 오버레이)
function drawPrecursor(ctx,v,vx,vy,vw,vh,t){
  const inc=G.activeIncidents[v.id];
  if(!inc)return;
  const ph=getPrecursorPhase(inc);
  if(ph<=0)return;
  ctx.save();ctx.beginPath();ctx.rect(vx,vy,vw,vh);ctx.clip();
  // 바이러스별 전조증상
  const fn=PRECURSORS[v.id]||
    (v.rarity==='VOID'?PRECURSORS['_void']:null)||
    (v.rarity==='CHIMERA'?PRECURSORS['_chimera']:null)||
    (inc.severity==='danger'?PRECURSORS['_danger']:PRECURSORS['_warn']);
  if(fn)fn(ctx,vx,vy,vw,vh,t,ph);
  ctx.restore();
  // 테두리 경고색
  if(ph>0.3){
    ctx.strokeStyle=inc.severity==='danger'
      ?`rgba(255,45,107,${ph*0.8})`:`rgba(255,136,0,${ph*0.7})`;
    ctx.lineWidth=1.5;ctx.strokeRect(vx,vy,vw,vh);
  }
}

function drawShelfVials(ctx,viruses,sy,sh,shelfX,sw,room,t){
  if(!viruses.length)return;
  const n=viruses.length;
  // 한 줄에 최대 몇 개 들어가는지 계산
  const maxPerRow=Math.floor((sw-8)/18); // 최소 통 너비 18px
  const rows=n>maxPerRow?2:1;
  const perRow=Math.ceil(n/rows);
  const vw=Math.max(16,Math.min(34,Math.floor((sw-8-perRow*2)/perRow)));
  const rowH=Math.floor((sh-6)/rows);
  const vh=Math.min(rowH-4,Math.floor(vw*1.5));

  for(let i=0;i<n;i++){
    const v=viruses[i];
    const rowIdx=Math.floor(i/perRow);
    const colIdx=i%perRow;
    // 이 줄의 바이러스 수
    const thisRowN=rowIdx<rows-1?perRow:n-(rows-1)*perRow;
    const rowW=thisRowN*(vw+2)-2;
    const rx=shelfX+4+Math.floor((sw-8-rowW)/2)+colIdx*(vw+2);
    const ry=sy+3+rowIdx*rowH;
    if(rx<shelfX||rx+vw>shelfX+sw||ry+vh>sy+sh-2)continue;
    // 클리핑해서 그리기
    ctx.save();ctx.beginPath();ctx.rect(rx,ry,vw,vh);ctx.clip();
    const tmp=document.createElement('canvas');tmp.width=vw;tmp.height=vh;
    drawVial(tmp,v,t);
    if(v.rarity==='VOID'){ctx.shadowColor='#b44dff';ctx.shadowBlur=5;}
    if(v.rarity==='LEGEND'){ctx.shadowColor='#ffffff';ctx.shadowBlur=3;}
    ctx.drawImage(tmp,rx,ry);ctx.shadowBlur=0;
    ctx.restore();
    // 전조증상 오버레이
    drawPrecursor(ctx,v,rx,ry,vw,vh,t);
    // 탭 영역
    if(!v._tapArea)v._tapArea={};
    v._tapArea[room]={x:rx,y:ry,w:vw,h:vh};
    // 이상징후 배지
    if(G.activeIncidents[v.id]){
      const ac=G.activeIncidents[v.id];
      ctx.fillStyle=ac.severity==='danger'?'#ff2d6b':'#ff8800';
      ctx.beginPath();ctx.arc(rx+vw-2,ry+3,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.font='bold 5px sans-serif';ctx.textAlign='center';
      ctx.fillText('!',rx+vw-2,ry+6);ctx.textAlign='left';
    }
  }
}

// 불 꺼짐 어둠 오버레이
function drawDarknessOverlay(ctx,W,H,t){
  if(G.ctrl.lights)return;
  // 전체 어둠
  ctx.fillStyle='rgba(0,0,0,0.78)';ctx.fillRect(0,0,W,H);
  // 빨간 비상등 깜빡임
  const pulse=0.5+Math.sin(t*3)*0.3;
  ctx.fillStyle=`rgba(80,0,0,${pulse*0.2})`;ctx.fillRect(0,0,W,H);
  // 구석 어두운 비네팅
  const vg=ctx.createRadialGradient(W/2,H/2,H*0.1,W/2,H/2,H*0.85);
  vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,0,0.6)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
}

function drawStorage(W,H){
  const ctx=RX,t=animT;
  const r=drawPerspRoom(ctx,W,H,{wallC:'#050e07',floorC:'#030a04',ceilC:'#060f08'});
  const {wallL:wl,wallR:wr,wallT:wt,wallB:wb}=r;
  drawCeilingLight(ctx,W,H,wt,G.ctrl.lights,t);

  // 좌측 → 냉동실
  drawSideCorridorL(ctx,W,H,wl,wt,wb,'#b44dff');
  ctx.fillStyle='rgba(180,77,255,0.35)';ctx.font='6px Share Tech Mono,monospace';
  ctx.save();ctx.translate(wl*0.38,H*0.5);ctx.rotate(-Math.PI/2);
  ctx.textAlign='center';ctx.fillText('COLD STORAGE',0,0);ctx.restore();

  // 천장 쪽 → 사무실 복귀 힌트
  ctx.fillStyle='rgba(0,255,136,0.25)';ctx.font='7px Orbitron,monospace';
  ctx.textAlign='center';ctx.fillText('▲ 사무실',W/2,wt+14);ctx.textAlign='left';

  // 보관실 - COMMON(10), RARE(8)+MUTANT(5)=13, CHIMERA(4) 전부 표시
  const shelves=[
    {y:wt+H*0.05, h:H*0.22, viruses:DB.filter(v=>v.rarity==='COMMON'), scale:0.94, rows:2},
    {y:wt+H*0.30, h:H*0.20, viruses:DB.filter(v=>['RARE','MUTANT'].includes(v.rarity)), scale:0.92, rows:2},
    {y:wt+H*0.53, h:H*0.14, viruses:DB.filter(v=>v.rarity==='CHIMERA'), scale:0.84, rows:1},
  ];

  shelves.forEach((shelf)=>{
    const sw=(wr-wl)*shelf.scale, shelfX=wl+(wr-wl)*(1-shelf.scale)/2;
    const shelfBot=shelf.y+shelf.h;

// ── COLD ROOM (냉동 보관실) ──
function drawCold(W,H){
  const ctx=RX,t=animT;
  const r=drawPerspRoom(ctx,W,H,{wallC:'#04050f',floorC:'#030408',ceilC:'#050610',fogC:'rgba(100,150,255,0.04)'});
  const {wallL:wl,wallR:wr,wallT:wt,wallB:wb}=r;
  // 파란 냉동 조명
  if(G.ctrl.lights){
    ctx.fillStyle='rgba(80,100,200,0.08)';ctx.fillRect(0,0,W,H);
    ctx.shadowColor='#aaccff';ctx.shadowBlur=20;
    const cl_w=W*0.14,cl_h=6;
    ctx.fillStyle='#c8deff';ctx.fillRect(W/2-cl_w/2,wt+4,cl_w,cl_h);
    ctx.shadowBlur=0;
  }
  // 우측 → 보관실
  drawSideCorridorR(ctx,W,H,wr,wt,wb,'#00ff88');
  // 서리 효과
  ctx.fillStyle='rgba(140,180,255,0.04)';
  for(let i=0;i<8;i++){
    ctx.beginPath();ctx.arc(Math.random()*W,Math.random()*H,Math.random()*30+10,0,Math.PI*2);
    ctx.fill();
  }
  // 선반 (보라빛)
  // 냉동실 - VOID(3), LEGEND(14), FUSION(7) 전부 표시
  const shelves3=[
    {y:wt+H*0.05, h:H*0.16, viruses:DB.filter(v=>v.rarity==='VOID'), scale:0.88, rows:1},
    {y:wt+H*0.23, h:H*0.24, viruses:DB.filter(v=>v.rarity==='LEGEND'), scale:0.94, rows:2},
    {y:wt+H*0.50, h:H*0.18, viruses:DB.filter(v=>v.rarity==='FUSION'), scale:0.88, rows:1},
  ];

  shelves3.forEach((shelf)=>{
    const sw=(wr-wl)*shelf.scale,shelfX=wl+(wr-wl)*(1-shelf.scale)/2;
    const shelfBot=shelf.y+shelf.h;
    ctx.fillStyle='rgba(30,0,50,0.7)';ctx.fillRect(shelfX,shelfBot-4,sw,4);
    ctx.strokeStyle='rgba(180,77,255,0.28)';ctx.lineWidth=1;ctx.strokeRect(shelfX,shelfBot-4,sw,4);
    ctx.fillStyle='rgba(8,0,16,0.5)';ctx.fillRect(shelfX,shelf.y,sw,shelf.h-4);
    ctx.strokeStyle='rgba(180,77,255,0.08)';ctx.lineWidth=0.5;ctx.strokeRect(shelfX,shelf.y,sw,shelf.h-4);

    drawShelfVials(ctx,shelf.viruses,shelf.y,shelf.h,shelfX,sw,'cold',t);
  });
  shelves3.forEach((shelf)=>{
    const sw=(wr-wl)*shelf.scale,shelfX=wl+(wr-wl)*(1-shelf.scale)/2;
    const shelfBot=shelf.y+shelf.h;
    ctx.fillStyle='rgba(30,0,50,0.7)';ctx.fillRect(shelfX,shelfBot-4,sw,4);
    ctx.strokeStyle='rgba(180,77,255,0.28)';ctx.lineWidth=1;ctx.strokeRect(shelfX,shelfBot-4,sw,4);
    ctx.fillStyle='rgba(8,0,16,0.5)';ctx.fillRect(shelfX,shelf.y,sw,shelf.h-4);
    ctx.strokeStyle='rgba(180,77,255,0.08)';ctx.lineWidth=0.5;ctx.strokeRect(shelfX,shelf.y,sw,shelf.h-4);
    const n=shelf.viruses.length;
    const vw=Math.max(18,Math.min(34,(sw-8)/n-3));
    const vh=Math.min(shelf.h-8, vw*1.55);
    const totalW=n*(vw+3)-3;
    const startVX=shelfX+4+(sw-8-totalW)/2;
    shelf.viruses.forEach((v,i)=>{
      const vx=startVX+i*(vw+3),vy=shelf.y+2;
      if(vx<shelfX||vx+vw>shelfX+sw)return;
      ctx.save();ctx.beginPath();ctx.rect(vx,vy,vw,vh);ctx.clip();
      const tmp=document.createElement('canvas');tmp.width=vw;tmp.height=vh;
      drawVial(tmp,v,t);
      if(v.rarity==='VOID'){ctx.shadowColor='#b44dff';ctx.shadowBlur=6;}
      ctx.drawImage(tmp,vx,vy);ctx.shadowBlur=0;
      ctx.restore();
      if(!v._tapArea)v._tapArea={};
      v._tapArea.cold={x:vx,y:vy,w:vw,h:vh};
      if(G.activeIncidents[v.id]){
        ctx.fillStyle='#ff2d6b';ctx.beginPath();ctx.arc(vx+vw-2,vy+3,3.5,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#fff';ctx.font='bold 5px sans-serif';ctx.textAlign='center';
        ctx.fillText('!',vx+vw-2,vy+6);ctx.textAlign='left';
      }
    });
  });
  // SECTOR 라벨
  ctx.fillStyle='rgba(180,77,255,0.4)';ctx.font='bold 9px Orbitron,monospace';
  ctx.textAlign='center';ctx.fillText('SECTOR-0 COLD STORAGE',W/2,wt-6);ctx.textAlign='left';
  drawScanlines(ctx,W,H);
}

// Canvas tap for vials
document.getElementById('room-canvas').addEventListener('click',handleCanvasTap);
document.getElementById('room-canvas').addEventListener('touchend',e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  handleCanvasTap({clientX:t.clientX,clientY:t.clientY});
});

function handleCanvasTap(e){
  const rect=RC.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const W=RC.width,H=RC.height;
  // Check room-specific taps
  if(curRoom==='office'){
    // Emergency btn
    const ex=W/2,ey=H*0.68,er=Math.min(W,H)*0.055;
    if(Math.hypot(mx-ex,my-ey)<er+10){toggleCtrl('alarm');toast('비상 알람 '+(G.ctrl.alarm?'ON':'OFF'));return;}
    // Manual book on desk
    const bk=window._deskBookArea;
    if(bk&&mx>=bk.x&&mx<=bk.x+bk.w&&my>=bk.y&&my<=bk.y+bk.h){openManualPopup();return;}
    // Storage hint
    if(mx>W*0.32&&mx<W*0.68&&my>H*0.16&&my<H*0.44){navigate('U');return;}
    // Door hint
    if(mx<W*0.18&&my>H*0.22&&my<H*0.64){navigate('L');return;}
    // Ctrl hint
    if(mx>W*0.82&&my>H*0.22&&my<H*0.64){navigate('R');return;}
  }
  if(curRoom==='ctrl'){openCtrl();return;}
  if(curRoom==='storage'||curRoom==='cold'){
    // Find tapped vial
    const vs=curRoom==='cold'
      ?DB.filter(v=>['VOID','LEGEND','FUSION'].includes(v.rarity))
      :DB.filter(v=>['COMMON','RARE','MUTANT','CHIMERA'].includes(v.rarity));
    for(const v of vs){
      if(v._tapArea&&v._tapArea[curRoom]){
        const ta=v._tapArea[curRoom];
        if(mx>=ta.x&&mx<=ta.x+ta.w&&my>=ta.y&&my<=ta.y+ta.h){openVP(v);return;}
      }
    }
    if(curRoom==='storage'){
      // Cold door tap
      if(mx<RC.width*0.14&&my>RC.height*0.18&&my<RC.height*0.53){navigate('L');return;}
    }
  }
  if(curRoom==='door'){
    if(G.timeLeft<=0){nightComplete();return;}
  }
}

// ── INCIDENTS ──
function maybeSpawn(){
  if(Math.random()>0.4+G.night*0.05)return;
  const av=INCIDENTS.filter(i=>!G.activeIncidents[i.virus]);
  if(!av.length)return;
  spawnInc(av[Math.floor(Math.random()*av.length)]);
}
function spawnInc(inc){
  G.activeIncidents[inc.virus]=inc;G.incidentCount++;
  inc._spawnTime=Date.now();
  inc._warned=false;
  updateAlerts();updateActBtns();
  // 10초 방치 → 전력 빠르게 소모 시작, 30초 방치 → 게임오버
  inc._drainTimer=setTimeout(()=>{
    if(G.activeIncidents[inc.virus]){
      inc._draining=true;
    }
  },10000);
  inc._deathTimer=setTimeout(()=>{
    if(G.activeIncidents[inc.virus]){
      gameOver('대응 실패: '+inc.title);
    }
  },30000);
  if(inc.solution&&inc.solution.type==='wait')
    setTimeout(()=>{if(G.activeIncidents[inc.virus])resolveInc(inc.virus,true);},inc.solution.duration||5000);
}
function dismissInc(){document.getElementById('inc-popup').classList.remove('open');}
function checkRes(action){
  Object.values(G.activeIncidents).forEach(inc=>{
    const s=inc.solution;let ok=false;
    if(s.type==='ctrl_on'&&action.type==='ctrl_on'&&action.ctrl===s.ctrl)ok=true;
    if(s.type==='ctrl_off'&&action.type==='ctrl_off'&&action.ctrl===s.ctrl)ok=true;
    if(s.type==='ctrl_toggle'&&(action.type==='ctrl_on'||action.type==='ctrl_off')&&action.ctrl===s.ctrl)ok=true;
    if(s.type==='action'&&action.type==='action'&&action.action===s.action&&(!s.target||s.target===action.target))ok=true;
    if(ok)resolveInc(inc.virus,true);
  });
}
function resolveInc(virusId,success){
  const inc=G.activeIncidents[virusId];if(!inc)return;
  // 타이머 취소
  if(inc._drainTimer)clearTimeout(inc._drainTimer);
  if(inc._deathTimer)clearTimeout(inc._deathTimer);
  inc._draining=false;inc._resolved=true;
  delete G.activeIncidents[virusId];
  if(success){G.resolved++;G.unlockedManual.add(virusId);}
  else{G.failed++;G.power=Math.max(0,G.power-60);updatePowerUI();toast('대응 실패 -120',true);if(G.power<=0)gameOver('전력 고갈');}
  updateAlerts();updateActBtns();
}
function updateAlerts(){
  const el=document.getElementById('cp-alerts');if(!el)return;
  const ac=Object.values(G.activeIncidents);
  if(!ac.length){el.textContent='이상 없음';el.style.color='var(--dim2)';return;}
  el.innerHTML=ac.map(i=>`<div style="color:${i.severity==='danger'?'#ff2d6b':'#ff8800'};margin-bottom:4px;">${i.icon} ${i.title}</div>`).join('');
}

// ── VIAL POPUP ──
function openVP(v){
  document.getElementById('vp-name').textContent=v.invisible?'???':v.name;
  document.getElementById('vp-name').className='vp-name r-'+v.rarity;
  document.getElementById('vp-rar').textContent=v.rarity+' — '+v.behavior.toUpperCase();
  document.getElementById('vp-rar').style.color=RARITY_C[v.rarity];
  document.getElementById('vp-desc').textContent=v.desc;

  // 전조증상/이상 징후 표시
  const inc=G.activeIncidents[v.id];
  const banner=document.getElementById('vp-alert-banner');
  const alertTitle=document.getElementById('vp-alert-title');
  const alertHint=document.getElementById('vp-alert-hint');
  if(inc){
    const ph=getPrecursorPhase(inc);
    const pct=Math.round(ph*100);
    const me=MANUAL_ENTRIES.find(e=>e.virusId===v.id);
    banner.style.display='block';
    banner.style.borderColor=inc.severity==='danger'?'var(--glow3)':'var(--warn)';
    alertTitle.style.color=inc.severity==='danger'?'var(--glow3)':'var(--warn)';
    alertTitle.textContent=(inc.severity==='danger'?'🚨':'⚠') + ' ' + inc.title + ' ['+pct+'%]';
    alertHint.textContent=me?'🔧 해결법: '+me.solution:'[해결법 불명]';
    alertHint.style.color=inc.severity==='danger'?'#ff8888':'var(--warn)';
  } else {
    banner.style.display='none';
  }

  document.getElementById('vp-popup').classList.add('open');
  const canvas=document.getElementById('vp-canvas');
  let dt=animT;
  if(vpAnim)cancelAnimationFrame(vpAnim);
  (function a(){
    drawDetailVial(canvas,v,dt);
    // 전조증상 오버레이도 detail canvas에
    if(G.activeIncidents[v.id]){
      const ctx=canvas.getContext('2d');
      const ph=getPrecursorPhase(G.activeIncidents[v.id]);
      if(ph>0){
        const fn=PRECURSORS[v.id]||PRECURSORS['_danger'];
        if(fn){
          ctx.save();
          fn(ctx,0,0,canvas.width,canvas.height,dt,Math.min(ph*1.5,1));
          ctx.restore();
        }
      }
    }
    dt+=0.016;vpAnim=requestAnimationFrame(a);
  })();
}
function closeVP(){if(vpAnim)cancelAnimationFrame(vpAnim);document.getElementById('vp-popup').classList.remove('open');}

// ── TIMER ──
let timerInt=null,powerInt=null;
function startTimer(){
  G.timeLeft=360;
  timerInt=setInterval(()=>{
    if(!G.running)return;
    G.timeLeft--;
    const m=Math.floor(G.timeLeft/60),s=G.timeLeft%60;
    document.getElementById('hud-timer').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    document.getElementById('hud-timer').classList.toggle('danger',G.timeLeft<60);
    if(G.timeLeft===0){updateActBtns();toast('6시간 완료! 출입구에서 탈출하세요.');}
    if(G.timeLeft%30===0&&G.timeLeft>0)maybeSpawn();
    if(G.timeLeft%15===0&&G.night>=5)maybeSpawn();
  },1000);
  powerInt=setInterval(()=>{
    if(!G.running)return;
    let d=1+(!G.ctrl.lights?2:0);Object.keys(PDRAIN).forEach(k=>{if(G.ctrl[k])d+=PDRAIN[k];});
    Object.values(G.activeIncidents).forEach(inc=>{if(inc._draining)d+=8;});
    G.power=Math.max(0,G.power-d*0.07);
    updatePowerUI();
    if(G.power<=0)gameOver('전력 고갈');
  },100);
}

// ── NIGHT ──
function nightComplete(){
  if(!G.running)return;
  G.running=false;clearInterval(timerInt);clearInterval(powerInt);
  Object.keys(G.activeIncidents).forEach(v=>resolveInc(v,false));
  if(G.night>=G.maxNight)showWin();
  else{
    G.night++;
    document.getElementById('hud-nn').textContent=G.night;
    toast('NIGHT '+(G.night-1)+' 완료! 다음 밤...');
    setTimeout(()=>{
      G.ctrl={lights:true,ac:false,heat:false,seal:false,alarm:false,uv:false,freeze:false,static:false};
      updateCtrlUI();startNight();
    },3000);
  }
}
function startNight(){
  G.running=true;G.power=900;G.activeIncidents={};
  updatePowerUI();updateCtrlUI();updateAlerts();
  document.getElementById('hud-nn').textContent=G.night;
  curRoom='office';updateNav();
  setTimeout(maybeSpawn,8000+Math.random()*10000);
  startTimer();
}
function gameOver(reason){
  if(!G.running)return;
  G.running=false;clearInterval(timerInt);clearInterval(powerInt);
  const es=document.getElementById('endscreen');
  document.getElementById('end-t').textContent='CONTAINMENT FAILED';
  document.getElementById('end-t').style.color='var(--glow3)';
  document.getElementById('salary').style.display='none';
  document.getElementById('end-s').textContent='사유: '+reason+' | NIGHT '+G.night+' | 해결 '+G.resolved+' / 실패 '+G.failed;
  es.classList.add('show');
}
function showWin(){
  const sal=2400000+G.resolved*50000-G.failed*100000;

  document.getElementById('end-t').style.color='var(--glow)';

  document.getElementById('ss-a').textContent='₩'+sal.toLocaleString();

  document.getElementById('end-s').textContent='';
  es.classList.add('show');
}

function openManualPopup(){
  const popup=document.getElementById('manual-popup');
  popup.style.display='flex';
  const list=document.getElementById('manual-list');
  if(list.dataset.built)return;
  list.dataset.built='1';
  MANUAL_ENTRIES.forEach(entry=>{
    const v=DB.find(x=>x.id===entry.virusId);
    if(!v)return;
    const unlocked=G.unlockedManual.has(entry.virusId);
    const el=document.createElement('div');
    el.style.cssText='background:rgba(0,255,136,0.03);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;';
    if(unlocked){
      const c=document.createElement('canvas');c.width=28;c.height=28;
      c.style.cssText='float:left;margin-right:10px;border-radius:50%;';
      el.appendChild(c);
      const nameDiv=document.createElement('div');
      nameDiv.style.cssText='font-family:Orbitron,monospace;font-size:11px;margin-bottom:3px;';
      nameDiv.className='r-'+v.rarity;nameDiv.textContent=v.name;
      const rarDiv=document.createElement('div');
      rarDiv.style.cssText='font-size:7px;color:var(--dim2);letter-spacing:2px;margin-bottom:6px;';
      rarDiv.textContent=v.rarity;
      const trigDiv=document.createElement('div');
      trigDiv.style.cssText='font-size:9px;color:var(--warn);margin-bottom:3px;';
      trigDiv.textContent='⚠ 이상 징후: '+entry.trigger;
      const precDiv=document.createElement('div');
      precDiv.style.cssText='font-size:9px;color:rgba(0,200,255,0.85);margin-bottom:4px;line-height:1.5;padding:4px 6px;background:rgba(0,100,100,0.08);border-left:2px solid rgba(0,200,255,0.3);border-radius:2px;';
      const pdesc=PRECURSOR_DESC[entry.virusId];
      precDiv.textContent='👁 전조증상: '+(pdesc||'통에서 이상 반응이 관찰됨.');
      const solDiv=document.createElement('div');
      solDiv.style.cssText='font-size:9px;color:var(--text);line-height:1.6;padding:6px 8px;background:rgba(0,255,136,0.05);border-radius:4px;';
      solDiv.textContent='🔧 해결법: '+entry.solution;
      el.appendChild(nameDiv);el.appendChild(rarDiv);el.appendChild(trigDiv);el.appendChild(precDiv);el.appendChild(solDiv);
      // Draw mini virus
      const ctx2=c.getContext('2d');ctx2.save();ctx2.translate(14,14);
      ctx2.shadowColor=v.color;ctx2.shadowBlur=6;
      const fn2=MICRO_DRAW[v.id]||MICRO_DRAW['_'+v.rarity]||MICRO_DRAW['_COMMON'];
      fn2(ctx2,v.color,11,0,0);ctx2.shadowBlur=0;ctx2.restore();
    } else {
      el.style.opacity='0.35';
      el.innerHTML='<div style="display:flex;align-items:center;gap:8px;"><div style="width:28px;height:28px;border-radius:50%;background:var(--dim);flex-shrink:0;"></div><div><div style="font-size:10px;color:var(--dim2);">???</div><div style="font-size:7px;color:var(--dim2);letter-spacing:1px;">'+v.rarity+'</div></div></div><div style="font-size:8px;color:var(--dim2);margin-top:6px;text-align:center;">🔒 이상 징후를 성공적으로 해결하면 해금됩니다</div>';
    }
    list.appendChild(el);
  });
}

// Refresh manual when unlocked
const _origResolve=resolveInc;
resolveInc=function(virusId,success){
  _origResolve(virusId,success);
  // Reset manual so it rebuilds
  const list=document.getElementById('manual-list');
  if(list)delete list.dataset.built;
};
let toastT=null;
function toast(msg,danger=false,dur=2500){
  document.querySelectorAll('.toast').forEach(e=>e.remove());
  const el=document.createElement('div');el.className='toast';
  el.style.borderColor=danger?'var(--glow3)':'var(--border)';
  el.style.color=danger?'var(--glow3)':'var(--text)';
  el.textContent=msg;document.body.appendChild(el);
  clearTimeout(toastT);
  toastT=setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .4s';setTimeout(()=>el.remove(),400);},dur);
}

function startGame(){showScreen('s-game');resizeRC();startNight();requestAnimationFrame(gameLoop);}
