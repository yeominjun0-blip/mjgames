<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>VIRAL CRASH 3D</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=VT323&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a12;font-family:'Share Tech Mono',monospace;}

/* ── GARAGE ── */
#garage{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
  background:radial-gradient(ellipse at 50% 0%,#081a28 0%,#06080a 60%);
  padding:8px 10px 6px;gap:5px;z-index:10;}
.g-logo h1{font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(18px,5.5vw,36px);
  color:#fff;letter-spacing:3px;text-shadow:0 0 30px #00ffcc;}
.g-logo h1 span{color:#ff0055;} .g-logo h1 .sp3d{color:#ffcc00;font-size:60%;}
.g-logo p{font-family:'VT323',monospace;font-size:clamp(10px,3vw,14px);color:#ffcc00;letter-spacing:4px;}
.slot-row{display:flex;gap:6px;width:100%;max-width:400px;}
.vslot{flex:1;height:46px;border-radius:8px;border:1.5px dashed rgba(0,255,204,0.2);
  background:rgba(0,0,0,0.4);display:flex;align-items:center;gap:5px;padding:0 6px;
  cursor:pointer;position:relative;}
.vslot.filled{border-style:solid;border-color:rgba(0,255,204,0.4);background:rgba(0,20,14,0.5);}
.vslot canvas{flex-shrink:0;border-radius:50%;}
.vslot .snum{font-size:6px;color:rgba(255,255,255,0.2);letter-spacing:1px;}
.vslot .sname{font-size:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:52px;}
.vslot .sclr{position:absolute;top:2px;right:4px;font-size:9px;color:rgba(255,0,80,0.5);cursor:pointer;}
.vgl{font-size:8px;letter-spacing:3px;color:rgba(0,255,204,0.35);}
.vgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;width:100%;max-width:400px;}
.vc{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 2px;
  border-radius:7px;border:1px solid rgba(0,255,204,0.06);background:rgba(0,0,0,0.3);cursor:pointer;transition:all .12s;}
.vc:active{transform:scale(.9);} .vc.eq{border-color:rgba(0,255,204,0.45);background:rgba(0,30,20,0.5);}
.vc canvas{border-radius:50%;} .vc .vn{font-size:6px;letter-spacing:.5px;text-align:center;white-space:nowrap;overflow:hidden;width:100%;}
.vc .vr{font-size:5px;opacity:.5;} .vc .ve{font-size:5.5px;color:rgba(255,255,255,0.3);text-align:center;line-height:1.3;}
.start-btn{width:100%;max-width:400px;padding:12px 0;border:2px solid #00ffcc;border-radius:12px;
  background:rgba(0,255,204,0.08);color:#00ffcc;font-family:'Orbitron',monospace;font-weight:900;
  font-size:clamp(12px,4vw,16px);letter-spacing:5px;cursor:pointer;animation:sp 2s ease-in-out infinite;}
@keyframes sp{0%,100%{box-shadow:0 0 16px rgba(0,255,204,0.15)}50%{box-shadow:0 0 40px rgba(0,255,204,0.45)}}
.start-btn:active{transform:scale(.96);}

/* ── GAME ── */
#screen-game{position:fixed;inset:0;display:none;}
#c3d{position:fixed;inset:0;display:block;width:100%;height:100%;}

/* HUD */
#hud-tl{position:fixed;top:10px;left:12px;pointer-events:none;z-index:100;}
#hud-score{font-family:'VT323',monospace;font-size:38px;color:#ffcc00;line-height:1;text-shadow:0 0 12px #ffcc00;}
#hud-combo{font-size:9px;letter-spacing:2px;color:#ff0055;margin-top:1px;}
#hud-kills{font-size:8px;letter-spacing:2px;color:rgba(255,0,80,0.7);}
#hud-tr{position:fixed;top:10px;right:12px;text-align:right;pointer-events:none;z-index:100;}
#hud-timer{font-family:'Orbitron',monospace;font-size:24px;font-weight:900;color:#fff;text-shadow:0 0 10px #00ffcc;}
#hud-tlbl{font-size:8px;letter-spacing:3px;color:rgba(0,255,204,0.3);}
#hud-zone{position:fixed;top:50px;left:50%;transform:translateX(-50%);font-family:'Orbitron',monospace;
  font-size:11px;font-weight:700;letter-spacing:3px;color:#ffcc00;text-shadow:0 0 10px #ffcc00;
  pointer-events:none;z-index:100;opacity:0;transition:opacity .5s;}
#eff{position:fixed;top:62px;left:50%;transform:translateX(-50%);font-family:'Orbitron',monospace;
  font-size:11px;font-weight:900;letter-spacing:2px;opacity:0;transition:opacity .3s;white-space:nowrap;z-index:100;pointer-events:none;}
#hf{position:fixed;inset:0;pointer-events:none;z-index:200;opacity:0;
  background:radial-gradient(circle,rgba(255,0,80,.4) 0%,transparent 60%);transition:opacity .1s;}

/* WARP OVERLAY */
#warp-overlay{position:fixed;inset:0;z-index:500;background:#000;display:none;
  flex-direction:column;align-items:center;justify-content:center;gap:16px;}
#warp-canvas{border-radius:8px;}
.warp-txt{font-family:'Orbitron',monospace;font-size:clamp(16px,5vw,32px);font-weight:900;
  color:#00ffcc;letter-spacing:4px;text-shadow:0 0 20px #00ffcc;text-align:center;}

/* virus bar */
#vbar{position:fixed;bottom:138px;left:50%;transform:translateX(-50%);display:flex;gap:8px;pointer-events:all;z-index:100;}
.vbs{width:48px;height:48px;border-radius:50%;border:2px solid rgba(0,255,204,0.2);background:rgba(0,0,0,0.6);
  display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;}
.vbs.va{box-shadow:0 0 16px var(--vc);} .vbs.vcd{opacity:.35;}
.vbr{position:absolute;inset:0;border-radius:50%;background:conic-gradient(rgba(0,0,0,.75) var(--p),transparent var(--p));}
.vbk{position:absolute;bottom:1px;right:3px;font-size:6px;color:rgba(255,255,255,0.35);}

/* controls */
#controls{position:fixed;bottom:0;left:0;right:0;height:130px;
  display:flex;justify-content:space-between;align-items:center;
  padding:0 14px 18px;pointer-events:none;z-index:100;}
.cs{display:flex;gap:7px;pointer-events:all;}
.cb{width:60px;height:60px;border-radius:50%;border:2px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;-webkit-tap-highlight-color:transparent;backdrop-filter:blur(3px);}
.cb:active,.cb.pr{background:rgba(0,255,204,.18);border-color:#00ffcc;box-shadow:0 0 16px rgba(0,255,204,.4);transform:scale(.93);}
.cba{width:74px;height:74px;border-color:rgba(0,255,204,.3);background:rgba(0,255,204,.04);}
.cba:active,.cba.pr{background:rgba(0,255,204,.22);}
.cbb{border-color:rgba(255,0,80,.3);background:rgba(255,0,80,.04);}
.cbb:active,.cbb.pr{background:rgba(255,0,80,.18);border-color:#ff0055;}

/* gameover */
#gameover{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.92);
  display:none;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(10px);}
.got{font-family:'Orbitron',monospace;font-size:clamp(22px,6vw,44px);font-weight:900;
  color:#ff0055;letter-spacing:4px;text-shadow:0 0 30px #ff0055;animation:gf 1s ease-in-out infinite;}
@keyframes gf{0%,100%{opacity:1}50%{opacity:.6}}
.gos{font-family:'VT323',monospace;font-size:clamp(58px,16vw,95px);color:#ffcc00;line-height:1;text-shadow:0 0 28px #ffcc00;margin:4px 0 10px;}
.gob{width:min(300px,86vw);background:rgba(4,12,20,.95);border:1px solid rgba(0,255,204,.18);border-radius:12px;padding:14px 18px;}
.gor{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(0,255,204,.05);font-size:11px;color:rgba(255,255,255,.6);}
.gor:last-child{border:none;} .gov{font-family:'VT323',monospace;font-size:20px;color:#00ffcc;}
.gobts{display:flex;gap:10px;margin-top:14px;}
.gobt{padding:12px 24px;border-radius:9px;cursor:pointer;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:2px;}
.gobtp{border:2px solid #00ffcc;background:rgba(0,255,204,.08);color:#00ffcc;}
.gobts2{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.04);color:rgba(255,255,255,.6);}
.gobt:active{transform:scale(.95);}
.spop{position:fixed;pointer-events:none;z-index:300;font-family:'Orbitron',monospace;
  font-size:13px;font-weight:900;animation:spa .85s ease-out forwards;}
@keyframes spa{0%{transform:translateY(0) scale(1.1);opacity:1}100%{transform:translateY(-65px) scale(.7);opacity:0}}
</style>
</head>
<body>

<!-- GARAGE -->
<div id="garage">
  <div class="g-logo">
    <h1>VIRAL<span>CRASH</span> <span class="sp3d">3D</span></h1>
    <p>// OFFICE → CITY → SPACE //</p>
  </div>
  <div class="slot-row">
    <div class="vslot" id="vs0"><canvas id="sc0" width="32" height="32"></canvas><div><div class="snum">SLOT 1</div><div class="sname" id="sn0" style="color:rgba(255,255,255,0.2)">EMPTY</div></div></div>
    <div class="vslot" id="vs1"><canvas id="sc1" width="32" height="32"></canvas><div><div class="snum">SLOT 2</div><div class="sname" id="sn1" style="color:rgba(255,255,255,0.2)">EMPTY</div></div></div>
    <div class="vslot" id="vs2"><canvas id="sc2" width="32" height="32"></canvas><div><div class="snum">SLOT 3</div><div class="sname" id="sn2" style="color:rgba(255,255,255,0.2)">EMPTY</div></div></div>
  </div>
  <div class="vgl">— VIRUS 장착 (최대 3) —</div>
  <div class="vgrid" id="vgrid"></div>
  <button class="start-btn" onclick="startGame()">▶ INFECT &amp; CRASH</button>
</div>

<!-- GAME -->
<div id="screen-game">
  <canvas id="c3d"></canvas>
  <div id="hud-tl">
    <div id="hud-score">0</div>
    <div id="hud-combo">x1 COMBO</div>
    <div id="hud-kills">0 WRECKED</div>
  </div>
  <div id="hud-tr">
    <div id="hud-timer">90</div>
    <div id="hud-tlbl">SEC</div>
  </div>
  <div id="hud-zone">🏢 OFFICE 1F</div>
  <div id="eff"></div>
  <div id="hf"></div>
  <div id="vbar"></div>
  <div id="controls">
    <div class="cs">
      <div class="cb" id="btnL" ontouchstart="kd('L')" ontouchend="ku('L')">◀</div>
      <div class="cb" id="btnR" ontouchstart="kd('R')" ontouchend="ku('R')">▶</div>
    </div>
    <div class="cs">
      <div class="cb cbb" id="btnB" ontouchstart="kd('B')" ontouchend="ku('B')">⬇</div>
      <div class="cb cba" id="btnA" ontouchstart="kd('A')" ontouchend="ku('A')">⚡</div>
    </div>
  </div>
</div>

<!-- WARP OVERLAY -->
<div id="warp-overlay">
  <canvas id="warp-canvas" width="300" height="200"></canvas>
  <div class="warp-txt" id="warp-txt">🚀 LAUNCHING TO SPACE...</div>
</div>

<!-- GAMEOVER -->
<div id="gameover">
  <div class="got">TIME'S UP</div>
  <div class="gos" id="go-score">0</div>
  <div class="gob">
    <div class="gor"><span>WRECKED</span><span class="gov" id="go-kills">0</span></div>
    <div class="gor"><span>MAX COMBO</span><span class="gov" id="go-combo">x1</span></div>
    <div class="gor"><span>BEST HIT</span><span class="gov" id="go-best">+0</span></div>
    <div class="gor"><span>ZONE</span><span class="gov" id="go-zone">OFFICE</span></div>
  </div>
  <div class="gobts">
    <button class="gobt gobtp" onclick="restartGame()">↺ RETRY</button>
    <button class="gobt gobts2" onclick="goGarage()">⚗ GARAGE</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ══════════════════════════════════════════════════
// VIRUS DB (10종)
// ══════════════════════════════════════════════════
const RC={COMMON:'#44ff88',RARE:'#ffd000',MUTANT:'#ff6200',CHIMERA:'#ff2d6b',VOID:'#b44dff',LEGEND:'#ffffff'};
const VDB=[
  {id:'alpha',  n:'ALPHA-1',    r:'COMMON', c:'#44ff88', ef:'SPEED ×2',      dur:6,  cd:12, fn:p=>{p.sm=2;p.am=1.8;}},
  {id:'levia',  n:'LEVIATHAN',  r:'CHIMERA',c:'#ff0066', ef:'GIANT ×3',      dur:7,  cd:18, fn:p=>{p.scm=3;}},
  {id:'corona', n:'CORONA-V2',  r:'RARE',   c:'#ffaa00', ef:'SPIKE ×3',      dur:8,  cd:15, fn:p=>{p.dm=3;p.sp=true;}},
  {id:'nvoid',  n:'NULL-VOID',  r:'VOID',   c:'#b44dff', ef:'PHASE',         dur:5,  cd:20, fn:p=>{p.inv=true;p.ph=true;}},
  {id:'stuxnet',n:'STUXNET',    r:'LEGEND', c:'#88ffff', ef:'EMP BLAST',     dur:4,  cd:18, fn:p=>{p.emp=true;}},
  {id:'mirai',  n:'MIRAI',      r:'LEGEND', c:'#aaaaff', ef:'SWARM ×5',      dur:8,  cd:20, fn:p=>{p.sw=true;}},
  {id:'xeno',   n:'XENO-M1',   r:'MUTANT', c:'#ff6200', ef:'EXPLODE',       dur:7,  cd:14, fn:p=>{p.ex=true;}},
  {id:'zeus',   n:'ZEUS',       r:'LEGEND', c:'#aaffaa', ef:'LIGHTNING',     dur:6,  cd:16, fn:p=>{p.lt=true;}},
  {id:'wannacry',n:'WANNACRY',  r:'LEGEND', c:'#ff88aa', ef:'MAGNET',        dur:6,  cd:16, fn:p=>{p.mag=true;}},
  {id:'singul', n:'SINGULARITY',r:'VOID',   c:'#9900ff', ef:'SUPERNOVA ×5',  dur:4,  cd:22, fn:p=>{p.emp=true;p.dm=5;p.ex=true;}},
];

// ══ VIRUS DRAW ══
function mC(x,c,r,f){x.beginPath();x.arc(0,0,r*f,0,Math.PI*2);x.fillStyle=c+'44';x.fill();x.strokeStyle=c;x.lineWidth=1;x.stroke();}
function mD(x,c,r,f,px=0,py=0){x.beginPath();x.arc(px,py,r*f,0,Math.PI*2);x.fillStyle=c;x.fill();}
function mR(x,c,r,f,lw=1){x.beginPath();x.arc(0,0,r*f,0,Math.PI*2);x.strokeStyle=c;x.lineWidth=lw;x.stroke();}
function mSp(x,c,r,a,f1,f2){x.beginPath();x.moveTo(Math.cos(a)*r*f1,Math.sin(a)*r*f1);x.lineTo(Math.cos(a)*r*f2,Math.sin(a)*r*f2);x.strokeStyle=c;x.lineWidth=1;x.stroke();}
const VFN={
  alpha:(x,c,r,t)=>{mC(x,c,r,.5);for(let i=0;i<5;i++)mSp(x,c,r,i/5*Math.PI*2+t,.5,.9);mD(x,c,r,.15);},
  levia:(x,c,r,t)=>{mC(x,c,r,.44);for(let i=0;i<12;i++)mSp(x,c,r,i/12*Math.PI*2+t,.44,.9);},
  corona:(x,c,r,t)=>{mC(x,c,r,.42);for(let i=0;i<10;i++){const a=i/10*Math.PI*2+t;x.beginPath();x.moveTo(Math.cos(a)*r*.42,Math.sin(a)*r*.42);x.lineTo(Math.cos(a)*r*.78,Math.sin(a)*r*.78);x.strokeStyle=c;x.lineWidth=1;x.stroke();}},
  nvoid:(x,c,r,t)=>{const g=x.createRadialGradient(0,0,0,0,0,r*.9);g.addColorStop(0,'#000');g.addColorStop(.5,c+'44');g.addColorStop(1,c+'00');x.beginPath();x.arc(0,0,r*.9,0,Math.PI*2);x.fillStyle=g;x.fill();mR(x,c,r,.9,2);for(let i=0;i<12;i++)mSp(x,c,r,i/12*Math.PI*2+t,.9,.97);},
  stuxnet:(x,c,r,t)=>{x.save();x.rotate(t*.1);x.beginPath();for(let i=0;i<16;i++){const a=i/16*Math.PI*2,tr=i%2===0?r*.88:r*.62;x.lineTo(Math.cos(a)*tr,Math.sin(a)*tr);}x.closePath();x.fillStyle=c+'33';x.fill();x.strokeStyle=c;x.lineWidth=1.2;x.stroke();x.restore();},
  mirai:(x,c,r,t)=>{const nd=[[-r*.5,-r*.4],[r*.5,-r*.4],[0,r*.5],[0,0]];x.strokeStyle=c+'66';x.lineWidth=.8;nd.forEach(([x1,y1])=>nd.forEach(([x2,y2])=>{x.beginPath();x.moveTo(x1,y1);x.lineTo(x2,y2);x.stroke();}));nd.forEach(([px,py])=>{x.beginPath();x.arc(px,py,r*.16,0,Math.PI*2);x.strokeStyle=c;x.lineWidth=1;x.stroke();});},
  xeno:(x,c,r,t)=>{mR(x,c,r,.65,1.8);mC(x,c,r,.38);x.strokeStyle=c;x.lineWidth=2;x.beginPath();x.moveTo(-r*.45,-r*.45);x.lineTo(r*.45,r*.45);x.stroke();x.beginPath();x.moveTo(r*.45,-r*.45);x.lineTo(-r*.45,r*.45);x.stroke();},
  zeus:(x,c,r,t)=>{x.save();x.rotate(t*.04);x.strokeStyle=c;x.lineWidth=1.8;x.fillStyle=c+'33';x.beginPath();x.moveTo(r*.2,-r*.88);x.lineTo(-r*.15,-r*.05);x.lineTo(r*.25,-r*.05);x.lineTo(-r*.2,r*.88);x.lineTo(r*.1,r*.1);x.lineTo(-r*.2,r*.1);x.lineTo(r*.2,-r*.88);x.fill();x.stroke();x.restore();},
  wannacry:(x,c,r,t)=>{x.save();x.rotate(t*.04);x.strokeStyle=c;x.lineWidth=1.2;x.beginPath();x.arc(0,-r*.22,r*.38,Math.PI,0);x.stroke();x.beginPath();x.rect(-r*.45,-r*.1,r*.9,r*.72);x.stroke();x.fillStyle=c+'22';x.fill();mD(x,c,r,.12,0,r*.22);x.restore();},
  singul:(x,c,r,t)=>{x.fillStyle='#fff';x.beginPath();x.arc(0,0,r*.12,0,Math.PI*2);x.fill();for(let i=0;i<8;i++){const a=i/8*Math.PI*2+t;x.beginPath();x.moveTo(Math.cos(a)*r*.12,Math.sin(a)*r*.12);x.lineTo(Math.cos(a)*r*.88,Math.sin(a)*r*.88);x.strokeStyle=c;x.lineWidth=1.2;x.stroke();}},
};
function dV(ctx,id,col,r,t){const fn=VFN[id]||VFN['alpha'];ctx.save();ctx.shadowColor=col;ctx.shadowBlur=r*1.2;fn(ctx,col,r,t);ctx.shadowBlur=0;ctx.restore();}

// ══ GARAGE ══
let equipped=[null,null,null], gAnim=null;
function buildGarage(){
  const grid=document.getElementById('vgrid');grid.innerHTML='';
  VDB.forEach((v,i)=>{
    const card=document.createElement('div');card.className='vc';card.id='vc-'+v.id;card.onclick=()=>equip(v.id);
    const cv=document.createElement('canvas');cv.width=40;cv.height=40;
    const c2=cv.getContext('2d');
    c2.fillStyle='rgba(0,0,0,.7)';c2.beginPath();c2.arc(20,20,20,0,Math.PI*2);c2.fill();
    c2.save();c2.translate(20,20);dV(c2,v.id,v.c,14,0);c2.restore();
    c2.strokeStyle=RC[v.r];c2.lineWidth=1.2;c2.beginPath();c2.arc(20,20,19,0,Math.PI*2);c2.stroke();
    const nm=document.createElement('div');nm.className='vn';nm.textContent=v.n;nm.style.color=v.c;
    const rr=document.createElement('div');rr.className='vr';rr.textContent=v.r;rr.style.color=RC[v.r];
    const ef=document.createElement('div');ef.className='ve';ef.textContent=v.ef;
    card.appendChild(cv);card.appendChild(nm);card.appendChild(rr);card.appendChild(ef);
    grid.appendChild(card);
  });
  updateSlots();
  gAnim=requestAnimationFrame(animGarage);
}
function equip(id){let t=equipped.indexOf(null);if(t===-1)t=0;equipped=equipped.map(s=>s===id?null:s);equipped[t]=id;updateSlots();}
function clearSlot(i,e){e.stopPropagation();equipped[i]=null;updateSlots();}
function updateSlots(){
  equipped.forEach((id,i)=>{
    const slot=document.getElementById('vs'+i),cv=document.getElementById('sc'+i),nm=document.getElementById('sn'+i);
    const c2=cv.getContext('2d');c2.clearRect(0,0,32,32);slot.querySelector('.sclr')?.remove();
    if(id){const v=VDB.find(v=>v.id===id);slot.classList.add('filled');slot.style.borderColor=v.c+'88';
      c2.fillStyle='rgba(0,0,0,.6)';c2.beginPath();c2.arc(16,16,16,0,Math.PI*2);c2.fill();
      c2.save();c2.translate(16,16);dV(c2,v.id,v.c,11,0);c2.restore();
      c2.strokeStyle=RC[v.r];c2.lineWidth=1.2;c2.beginPath();c2.arc(16,16,15,0,Math.PI*2);c2.stroke();
      nm.textContent=v.ef;nm.style.color=v.c;
      const clr=document.createElement('span');clr.className='sclr';clr.textContent='✕';clr.onclick=e=>clearSlot(i,e);slot.appendChild(clr);
    } else {slot.classList.remove('filled');slot.style.borderColor='';nm.textContent='EMPTY';nm.style.color='rgba(255,255,255,0.2)';}
  });

function buildScene(){

  // Clear
  while(scene.children.length>0)scene.remove(scene.children[0]);

    fin.position.set(Math.cos(a)*1.4,.5,Math.sin(a)*1.4);fin.rotation.y=a;group.add(fin);

  const eglow=new THREE.Mesh(new THREE.CylinderGeometry(.8,.5,.5,8),matB(0xff6600));

function buildFloor(cx,cz,W,D,baseCol,tiles){

  if(tiles){
    const tileSize=2;
    for(let i=-(W/2-1);i<W/2;i+=tileSize)for(let j=-(D/2-1);j<D/2;j+=tileSize){
      const col=(Math.floor((i+W)/(tileSize*2))+Math.floor((j+D)/(tileSize*2)))%2===0?0x2d2d42:0x252535;
      const tm=new THREE.Mesh(new THREE.PlaneGeometry(tileSize-.05,tileSize-.05),mat(col,15));
      tm.rotation.x=-Math.PI/2;tm.position.set(cx+i+1,0.005,cz+j+1);tm.receiveShadow=true;scene.add(tm);
    }

    const techMat=mat(0x1a2030,20);
    for(let i=-(W/2-2);i<W/2;i+=3)for(let j=-(D/2-2);j<D/2;j+=3){

  function makeDoor(x,z,ry,dtag){

    const panel=new THREE.Mesh(new THREE.BoxGeometry(4.5,h*.8,.12),dM);panel.position.y=h*.4;g.add(panel);
    const glWin=new THREE.Mesh(new THREE.BoxGeometry(2,h*.3,.07),glM);glWin.position.set(0,h*.6,.06);g.add(glWin);
    const tf=new THREE.Mesh(new THREE.BoxGeometry(5.2,.2,.2),fM);tf.position.y=h*.8+.1;g.add(tf);
    const lf=new THREE.Mesh(new THREE.BoxGeometry(.2,h*.8,.2),fM);lf.position.set(-2.5,h*.4,0);g.add(lf);
    const rf=new THREE.Mesh(new THREE.BoxGeometry(.2,h*.8,.2),fM);rf.position.set(2.5,h*.4,0);g.add(rf);
    const handle=new THREE.Mesh(new THREE.SphereGeometry(.12,6,6),mat(0xddaa00,100));handle.position.set(1.7,h*.35,.12);g.add(handle);
    g.position.set(x,0,z);g.rotation.y=ry;scene.add(g);
    doorObjects.push({mesh:g,x,z,w:5,d:.5,ry,tag:dtag,hp:3,maxHp:3,dead:false,vx:0,vy:.0,vz:0});
  }

  const hw=W/2,hd=D/2;
  // South wall
  wallSeg(cx-hw/2+4.5,h/2,cz-hd, W/2-9.5, h,0);
  wallSeg(cx+hw/2-4.5,h/2,cz-hd, W/2-9.5, h,0);
  wallSeg(cx,h*.85,cz-hd,5,.3*h,0);
  // North wall
  wallSeg(cx-5,h/2,cz+hd, W-10,h,0);
  wallSeg(cx+hw-2,h/2,cz+hd,4,h,0);
  wallSeg(cx+4.5,h*.85,cz+hd,5,.3*h,0);
  // East wall (solid)
  wallSeg(cx+hw,h/2,cz, D,h,Math.PI/2);
  for(let i=-hd+6;i<hd-4;i+=10) winPane(cx+hw,h/2,cz+i,Math.PI/2);
  // West wall
  wallSeg(cx-hw,h/2,cz-5, D-10,h,Math.PI/2);
  wallSeg(cx-hw,h/2,cz+hd-2, 4,h,Math.PI/2);
  wallSeg(cx-hw,h*.85,cz+3,5,.3*h,Math.PI/2);
  // Doors
  makeDoor(cx,cz-hd,0,tag+'-south');
  makeDoor(cx+3,cz+hd,0,tag+'-north');
  makeDoor(cx-hw,cz+3,Math.PI/2,tag+'-west');
  // Windows
  for(let i=-hw+6;i<-5;i+=9) winPane(cx+i,h/2,cz-hd,0);
  for(let i=6;i<hw-4;i+=9)   winPane(cx+i,h/2,cz-hd,0);
  for(let i=-hd+5;i<-2;i+=9) winPane(cx-hw,h/2,cz+i,Math.PI/2);
}

// ══ PARTICLE ══
function spawnPart(x,y,z,col,n,spd=.12){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,el=Math.random()*Math.PI;
    const s=spd+Math.random()*spd;
    const geo=new THREE.SphereGeometry(.05+Math.random()*.06,4,4);
    const m=new THREE.Mesh(geo,matB(col));m.position.set(x,y,z);scene.add(m);
    particles3d.push({mesh:m,vx:Math.cos(a)*Math.sin(el)*s,vy:Math.cos(el)*s+.05,vz:Math.sin(a)*Math.sin(el)*s,life:1.4});
  }
}
function updateParts(dt){
  for(let i=particles3d.length-1;i>=0;i--){
    const p=particles3d[i];
    p.mesh.position.x+=p.vx;p.mesh.position.y+=p.vy;p.mesh.position.z+=p.vz;
    p.vy-=.008;p.vx*=.97;p.vz*=.97;p.life-=dt;
    p.mesh.material.opacity=Math.max(0,p.life);p.mesh.material.transparent=true;
    if(p.life<=0){scene.remove(p.mesh);particles3d.splice(i,1);}
  }
}

// ══ PLAYER ══
function initPlayer(){
  if(currentZone==='space'){
    P={x:0,y:0,z:5,angle:0,angleY:0,spd:0,spdY:0,dA:0,dP:0,topS:.18,acc:.01,hd:.05,sm:1,am:1,scm:1,dm:1,sp:false,inv:false,ph:false,sh:0,mag:false,ex:false,lt:false,emp:false,sw:false,skid:[]};
  } else {
    P={x:0,y:0,z:-10,angle:0,spd:0,dA:0,dP:0,topS:.25,acc:.012,hd:.055,sm:1,am:1,scm:1,dm:1,sp:false,inv:false,ph:false,sh:0,mag:false,ex:false,lt:false,emp:false,sw:false,skid:[]};
  }
  vslots=equipped.filter(Boolean).map((id,i)=>{const v=VDB.find(v=>v.id===id);return {id,v,timer:0,cd:0,active:false};});
  buildVBar();
}

function buildVBar(){
  const bar=document.getElementById('vbar');bar.innerHTML='';
  vslots.forEach((s,i)=>{
    const d=document.createElement('div');d.className='vbs';d.id='vbs'+i;
    d.style.setProperty('--vc',s.v.c);d.style.borderColor=s.v.c+'55';
    const cv=document.createElement('canvas');cv.width=32;cv.height=32;d.appendChild(cv);
    const ring=document.createElement('div');ring.className='vbr';ring.id='vbr'+i;ring.style.setProperty('--p','0deg');d.appendChild(ring);
    const key=document.createElement('div');key.className='vbk';key.textContent=i+1;d.appendChild(key);
    d.ontouchstart=()=>actVirus(i);d.onclick=()=>actVirus(i);
    bar.appendChild(d);
  });
}
function actVirus(i){
  const s=vslots[i];if(!s||s.active||s.cd>0)return;
  s.active=true;s.timer=s.v.dur;s.v.fn(P);
  if(P.emp){doEMP();P.emp=false;}if(P.sw){doSwarm();P.sw=false;}
  showEff(s.v.ef,s.v.c);
  const sl=document.getElementById('vbs'+i);if(sl){sl.classList.add('va');sl.style.boxShadow=`0 0 16px ${s.v.c}`;}
  if(carGroup)carGroup.traverse(m=>{if(m.isMesh&&m.material&&m.material.color){const h=m.material.color.getHex();if(h===0x00ffcc||h===0x003322)m.material.color.setStyle(s.v.c);}});
}
function doEMP(){
  const allE=[...allObjects,...doorObjects,...spaceObjects];
  allE.forEach(o=>{if(!o.dead&&dist3D(o.x,o.y||0,o.z)<20)smash(o,new THREE.Vector3((o.x-P.x)*2,3,(o.z-P.z)*2),true);});
  spawnPart(P.x,1,P.z,'#88ffff',60,.2);
}
function doSwarm(){
  for(let i=0;i<5;i++){const a=i/5*Math.PI*2;spawnPart(P.x+Math.cos(a)*3,1,P.z+Math.sin(a)*3,'#aaaaff',10,.08);}
}
function resetP(){P.sm=1;P.am=1;P.scm=1;P.dm=1;P.sp=false;P.inv=false;P.ph=false;P.mag=false;P.ex=false;P.lt=false;P.sw=false;}
function updateVSlots(dt){
  vslots.forEach((s,i)=>{
    const sl=document.getElementById('vbs'+i);const ring=document.getElementById('vbr'+i);const cv=sl?.querySelector('canvas');
    if(cv){const c2=cv.getContext('2d');c2.clearRect(0,0,32,32);c2.fillStyle='rgba(0,0,0,.5)';c2.beginPath();c2.arc(16,16,16,0,Math.PI*2);c2.fill();c2.save();c2.translate(16,16);dV(c2,s.id,s.v.c,11,Date.now()*.001*(s.active?2:.5)+i);c2.restore();}
    if(s.active){s.timer-=dt;if(s.timer<=0){s.active=false;s.cd=s.v.cd;resetP();sl?.classList.remove('va');if(sl)sl.style.boxShadow='';sl?.classList.add('vcd');document.getElementById('eff').style.opacity='0';if(carGroup)carGroup.traverse(m=>{if(m.isMesh&&m.material&&m.material.color){const h=m.material.color.getHex();if(h!==0x111111&&h!==0x222222&&h!==0x999999&&h!==0xff2200)m.material.color.setHex(0x00ffcc);}});}}
    else if(s.cd>0){s.cd-=dt;ring?.style.setProperty('--p',(s.cd/s.v.cd*360)+'deg');if(s.cd<=0){s.cd=0;sl?.classList.remove('vcd');ring?.style.setProperty('--p','0deg');}}
  });
}

// ══ PHYSICS ══
function dist3D(ax,ay,az){return Math.sqrt((ax-P.x)**2+(ay-(P.y||0))**2+(az-P.z)**2);}
function d2(ax,az,bx,bz){return Math.sqrt((ax-bx)**2+(az-bz)**2);}

function updatePlayer(dt){
  let acc=0,turn=0,brk=0;
  if(K.A)acc=1;if(K.B)brk=1;if(K.L)turn=-1;if(K.R)turn=1;
  const ts=P.topS*P.sm,ac=P.acc*P.am;
  if(acc)P.spd+=ac*(1-brk*.5);else P.spd*=.95;
  if(brk&&!acc)P.spd*=.88;
  P.spd=Math.min(P.spd,ts);P.spd=Math.max(P.spd,currentZone==='space'?-ts*.5:0);
  const sf=P.spd/Math.max(ts,.01);
  P.angle+=P.hd*turn*(P.spd>=0?1:-1)*Math.abs(sf);
  if(Math.abs(turn)>.3&&P.spd>ts*.3){P.dA+=turn*.05*sf;P.dP=Math.min(P.dP+.04,1);}
  else{P.dA*=.82;P.dP*=.88;}
  P.dA=Math.max(-.5,Math.min(.5,P.dA));
  const ma=P.angle+P.dA*.12;
  P.x+=Math.sin(ma)*P.spd;P.z+=Math.cos(ma)*P.spd;

  if(currentZone==='space'){
    // In space, also allow vertical with turning (simplified)
    P.y=P.y||0;
  } else {
    P.x=Math.max(-280,Math.min(280,P.x));
    P.z=Math.max(-380,Math.min(30,P.z));
    checkWalls();
  }

  if(carGroup){
    carGroup.position.set(P.x,currentZone==='space'?P.y:.28,P.z);
    carGroup.rotation.y=P.angle+P.dA*.2;
    carGroup.rotation.z=-P.dA*.15;
    const ts2=P.scm;
    carGroup.scale.setScalar(carGroup.scale.x+(ts2-carGroup.scale.x)*.08);
  }

  // Camera
  const camBack=currentZone==='space'?10:9;
  const camH=currentZone==='space'?3:4+P.scm*.5;
  const tx=P.x-Math.sin(P.angle)*camBack*P.scm*.6;
  const tz=P.z-Math.cos(P.angle)*camBack*P.scm*.6;
  const ty=(P.y||0)+camH;
  camera.position.x+=(tx-camera.position.x)*.1;
  camera.position.y+=(ty-camera.position.y)*.1;
  camera.position.z+=(tz-camera.position.z)*.1;
  camera.lookAt(P.x,(P.y||0)+.8,P.z);

  // Zone detection
  updateZone();
}

function updateZone(){
  let newLabel=zoneLabel;
  if(currentZone!=='space'){
    if(P.z>-60&&P.x>-20&&P.x<20) newLabel='🏢 OFFICE 1F';
    else if(P.z<-70&&P.z>-170) newLabel='🌆 CITY';
    else if(P.z<-250&&P.x>-30&&P.x<30) newLabel='🚀 ROCKET LAB';
    else newLabel='🚗 CITY OUTSKIRTS';
  } else newLabel='🌌 OUTER SPACE';
  if(newLabel!==zoneLabel){
    zoneLabel=newLabel;
    const el=document.getElementById('hud-zone');
    el.textContent=zoneLabel;el.style.opacity='1';
    clearTimeout(window._zt);window._zt=setTimeout(()=>el.style.opacity='0',2500);
  }
}

function checkWalls(){
  // office1 walls
  const in1=P.x>-20&&P.x<20&&P.z>-20&&P.z<20;
  if(in1){
    if(P.z<-17&&Math.abs(P.x)>4){P.z=Math.max(P.z,-17);P.spd*=-.3;spawnPart(P.x,1,P.z,'#ff8800',6);}
    if(P.z>17&&Math.abs(P.x-3)>4){P.z=Math.min(P.z,17);P.spd*=-.3;}
    if(P.x>17){P.x=Math.min(P.x,17);P.spd*=-.3;}
    if(P.x<-17&&Math.abs(P.z-3)>4){P.x=Math.max(P.x,-17);P.spd*=-.3;}
  }
  // office2 walls
  const in2=P.x>-28&&P.x<28&&P.z<-252&&P.z>-308;
  if(in2){
    if(P.z<-305&&Math.abs(P.x)>4){P.z=Math.max(P.z,-305);P.spd*=-.3;}
    if(P.z>-254&&Math.abs(P.x-3)>4){P.z=Math.min(P.z,-254);P.spd*=-.3;}
    if(P.x>27){P.x=Math.min(P.x,27);P.spd*=-.3;}
    if(P.x<-27&&Math.abs(P.z+280)>4){P.x=Math.max(P.x,-27);P.spd*=-.3;}
  }
}

function checkRocketButton(){
  if(!rocketButton||rocketButton.triggered||warpTriggered)return;
  if(d2(P.x,P.z,rocketButton.x,rocketButton.z)<rocketButton.w/2+1.5*P.scm){
    rocketButton.triggered=true;warpTriggered=true;
    triggerWarp();
  }
}

function triggerWarp(){
  running=false;
  const ov=document.getElementById('warp-overlay');
  ov.style.display='flex';
  // Warp animation
  const wc=document.getElementById('warp-canvas');
  const wctx=wc.getContext('2d');
  let warpFrame=0;
  const stars=Array.from({length:150},()=>({x:150,y:100,a:Math.random()*Math.PI*2,spd:0}));
  function animWarp(){
    warpFrame++;
    wctx.fillStyle=`rgba(0,0,0,${warpFrame<30?.15:.3})`;wctx.fillRect(0,0,300,200);
    stars.forEach(s=>{
      s.spd+=warpFrame*.04;
      s.x=150+Math.cos(s.a)*(s.spd*s.spd*.05);
      s.y=100+Math.sin(s.a)*(s.spd*s.spd*.05);
      const tail=Math.min(s.spd*.4,20);
      const grad=wctx.createLinearGradient(s.x-Math.cos(s.a)*tail,s.y-Math.sin(s.a)*tail,s.x,s.y);
      grad.addColorStop(0,'rgba(0,255,204,0)');grad.addColorStop(1,'rgba(255,255,255,1)');
      wctx.beginPath();wctx.moveTo(s.x-Math.cos(s.a)*tail,s.y-Math.sin(s.a)*tail);wctx.lineTo(s.x,s.y);
      wctx.strokeStyle=grad;wctx.lineWidth=1.5;wctx.stroke();
      if(s.x<0||s.x>300||s.y<0||s.y>200){s.x=150;s.y=100;s.spd=0;}
    });
    if(warpFrame<80){requestAnimationFrame(animWarp);}
    else{
      document.getElementById('warp-txt').textContent='🌌 WELCOME TO OUTER SPACE!';
      setTimeout(()=>{
        ov.style.display='none';
        currentZone='space';
        buildScene();
        P.x=0;P.y=0;P.z=5;P.angle=0;P.spd=0;P.dA=0;P.dP=0;
        zoneLabel='🌌 OUTER SPACE';
        const el=document.getElementById('hud-zone');el.textContent='🌌 OUTER SPACE';el.style.opacity='1';
        clearTimeout(window._zt);window._zt=setTimeout(()=>el.style.opacity='0',3000);
        running=true;lastT=performance.now();
      },1200);
    }
  }
  animWarp();
}

// ══ SMASH / COLLISION ══
function smash(obj,impulse,noSlow){
  if(obj.dead)return;
  obj.hp-=Math.max(1,P.dm);
  spawnPart(obj.x,obj.y||1,obj.z,'#ff8800',10);
  if(obj.hp<=0){
    obj.dead=true;obj.dt=3;
    const iv=impulse||new THREE.Vector3((obj.x-P.x)*.2,2,(obj.z-P.z)*.2);
    obj.vx=iv.x*.3+(Math.random()-.5)*.1;obj.vy=iv.y*.1+.15;obj.vz=iv.z*.3+(Math.random()-.5)*.1;
    addKill(obj.x,obj.y||1,obj.z,Math.floor(obj.pts*P.dm*combo));
    spawnPart(obj.x,obj.y||2,obj.z,'#ffaa44',20);spawnPart(obj.x,obj.y||2,obj.z,'#ff4400',12);
    if(P.ex){
      const nearby=[...allObjects,...doorObjects,...spaceObjects];
      nearby.forEach(o2=>{if(o2!==obj&&!o2.dead&&d2(o2.x,o2.z,obj.x,obj.z)<5)setTimeout(()=>smash(o2,null,true),100+Math.random()*200);});
    }
  } else {
    obj.mesh.traverse(m=>{if(m.isMesh&&m.material.color){const oc=m.material.color.clone();m.material.color.setHex(0xff2200);setTimeout(()=>{if(m.material)m.material.color.copy(oc);},100);}});
    if(!noSlow&&!P.inv)P.spd*=.55;
  }
}

function smashDoor(door,imp){
  if(door.dead)return;
  door.hp-=P.dm*2;
  spawnPart(door.x,1.5,door.z,'#aa7722',15);
  if(door.hp<=0){
    door.dead=true;door.vx=imp.x*.25;door.vy=.2+P.spd*.3;door.vz=imp.z*.25;
    door.mesh.rotation.x=(Math.random()-.5)*.3;
    addKill(door.x,2,door.z,Math.floor(300*P.dm*combo));
    spawnPart(door.x,1.5,door.z,'#ffffff',12);
  } else {
    door.mesh.traverse(m=>{if(m.isMesh&&m.material.color){const oc=m.material.color.clone();m.material.color.setHex(0xff2200);setTimeout(()=>{if(m.material)m.material.color.copy(oc);},80);}});
  }
}

function checkCollisions(){
  const pr=1.3*P.scm;
  const allO=currentZone==='space'?spaceObjects:[...allObjects,...doorObjects];

  allO.forEach(obj=>{
    if(obj.dead)return;
    const dx=obj.x-P.x, dz=obj.z-P.z;
    let dist;
    if(currentZone==='space'){
      const dy=(obj.y||0)-(P.y||0);
      dist=Math.sqrt(dx*dx+dy*dy+dz*dz);
    } else dist=Math.sqrt(dx*dx+dz*dz);
    const hitDist=pr+Math.max(obj.w,obj.d)*.42;
    if(dist<hitDist&&P.spd>0.02){
      const imp=new THREE.Vector3(Math.sin(P.angle)*2,2+P.spd*2,Math.cos(P.angle)*2);
      if(obj.type&&obj.type.endsWith('-south')||obj.type&&obj.type.endsWith('-north')||obj.type&&obj.type.endsWith('-west'))smashDoor(obj,imp);
      else smash(obj,imp);
    }
  });

  // Employees
  employees.forEach(e=>{
    if(e.dead)return;
    if(d2(e.x,e.z,P.x,P.z)<1.6*P.scm&&!P.ph){
      e.dead=true;e.dt=2;e.vx=(e.x-P.x)*.2+(Math.random()-.5)*.1;e.vy=.22;e.vz=(e.z-P.z)*.2+(Math.random()-.5)*.1;
      addKill(e.x,1,e.z,Math.floor(100*P.dm*combo));spawnPart(e.x,.5,e.z,'#ffcc88',10);
    }
  });

  // Rocket button
  checkRocketButton();
}

function updateObjects(dt){
  const allO=[...allObjects,...doorObjects,...spaceObjects];
  allO.forEach(obj=>{
    if(obj.rotY)obj.mesh.rotation.y+=obj.rotY;
    if(obj.rotX)obj.mesh.rotation.x+=obj.rotX;
    if(!obj.dead)return;
    obj.dt-=dt;
    if(obj.mesh.position.y>-.5||currentZone==='space'){
      obj.vx*=.9;obj.vz*=.9;
      if(currentZone!=='space')obj.vy-=.018;
      obj.mesh.position.x+=obj.vx;
      obj.mesh.position.y+=obj.vy;
      obj.mesh.position.z+=obj.vz;
      if(currentZone!=='space')obj.mesh.position.y=Math.max(-.5,obj.mesh.position.y);
      obj.mesh.rotation.x+=obj.vx*.15;obj.mesh.rotation.z+=obj.vz*.15;
      if(obj.topMesh){obj.topMesh.position.x+=obj.vx*.5;obj.topMesh.position.y+=obj.vy*.5;}
    }
  });

  employees.forEach(e=>{
    if(e.dead){
      e.dt-=dt;e.vy-=.015;e.x+=e.vx;e.z+=e.vz;
      e.mesh.position.set(e.x,Math.max(0,e.mesh.position.y+e.vy),e.z);
      e.mesh.rotation.x+=e.vx*.3;e.mesh.rotation.z+=e.vz*.3;
      return;
    }
    const pd=d2(e.x,e.z,P.x,P.z);
    if(pd<4){e.panic=3;e.angle=Math.atan2(e.x-P.x,e.z-P.z)+(Math.random()-.5)*.5;e.spd=.06;}
    if(e.panic>0)e.panic-=dt;else{e.spd=.012;if(Math.random()<.005)e.angle+=(Math.random()-.5)*1.2;}
    e.x+=Math.sin(e.angle)*e.spd;e.z+=Math.cos(e.angle)*e.spd;
    e.mesh.position.x=e.x;e.mesh.position.z=e.z;
    e.mesh.rotation.y=e.angle;
    e.mesh.position.y=Math.abs(Math.sin(frame*.1+e.x))*e.spd*.5;
    if(e.panic>0){e.mesh.rotation.y+=.25;}
  });

  // Magnet
  if(P.mag){
    allO.forEach(obj=>{if(!obj.dead){const dx=P.x-obj.x,dz=P.z-obj.z,d=Math.sqrt(dx*dx+dz*dz);if(d<15&&d>.5){obj.x+=dx/d*.06;obj.z+=dz/d*.06;obj.mesh.position.x=obj.x;obj.mesh.position.z=obj.z;}}});
  }
}

// ══ LIGHTNING ══
function doLightning(){
  lightningLines.forEach(l=>scene.remove(l));lightningLines=[];
  const allO=currentZone==='space'?spaceObjects:[...allObjects];
  let near=null,nd=Infinity;
  allO.forEach(o=>{if(!o.dead){const d=dist3D(o.x,o.y||0,o.z);if(d<nd&&d<25){nd=d;near=o;}}});
  if(!near)return;
  const pts=[];const steps=8;
  for(let i=0;i<=steps;i++){const t=i/steps;pts.push(new THREE.Vector3(P.x+(near.x-P.x)*t+(Math.random()-.5)*(1-t)*1.5,(P.y||0)+2+Math.random()*-.5,P.z+(near.z-P.z)*t+(Math.random()-.5)*(1-t)*1.5));}
  const line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:0xaaffaa,linewidth:2}));
  scene.add(line);lightningLines.push(line);
  setTimeout(()=>{lightningLines.forEach(l=>scene.remove(l));lightningLines=[];},200);
  if(!near.dead)smash(near,null,true);
}

// ══ SCORE ══
function addKill(wx,wy,wz,pts){
  kills++;score+=pts;if(pts>bestHit)bestHit=pts;
  combo=Math.min(combo+1,12);maxCombo=Math.max(maxCombo,combo);
  document.getElementById('hud-score').textContent=score.toLocaleString();
  document.getElementById('hud-combo').textContent='x'+combo+' COMBO';
  document.getElementById('hud-kills').textContent=kills+' WRECKED';
  const v=new THREE.Vector3(wx,wy,wz);v.project(camera);
  const sx=(v.x+1)/2*window.innerWidth,sy=(-v.y+1)/2*window.innerHeight;
  if(sx>0&&sx<window.innerWidth&&sy>0&&sy<window.innerHeight){
    const el=document.createElement('div');el.className='spop';el.textContent='+'+pts;
    el.style.left=sx+'px';el.style.top=sy+'px';el.style.transform='translate(-50%,-50%)';
    el.style.color=combo>=6?'#ffcc00':combo>=3?'#ff6200':'#ff0055';
    el.style.textShadow=`0 0 10px ${el.style.color}`;el.style.fontSize=(11+combo*1.5)+'px';
    document.getElementById('screen-game').appendChild(el);setTimeout(()=>el.remove(),900);
  }
  clearTimeout(window._ct);window._ct=setTimeout(()=>{combo=1;document.getElementById('hud-combo').textContent='x1 COMBO';},2400);
}
function showEff(txt,col){const b=document.getElementById('eff');b.textContent=txt;b.style.color=col;b.style.textShadow=`0 0 14px ${col}`;b.style.opacity='1';}
function flashHit(){const f=document.getElementById('hf');f.style.opacity='1';clearTimeout(window._hft);window._hft=setTimeout(()=>f.style.opacity='0',130);}

// ══ GAME LOOP ══
function gameLoop(ts){
  const dt=Math.min((ts-lastT)/1000,.05);lastT=ts;frame++;
  if(!running){gAnim2=requestAnimationFrame(gameLoop);return;}
  timer-=dt;
  if(timer<=0){timer=0;endGame();return;}
  document.getElementById('hud-timer').textContent=Math.ceil(timer);
  if(timer<=15)document.getElementById('hud-timer').style.color='#ff0055';
  updatePlayer(dt);updateObjects(dt);checkCollisions();updateParts(dt);updateVSlots(dt);
  if(P.lt&&frame%28===0)doLightning();
  renderer.render(scene,camera);
  gAnim2=requestAnimationFrame(gameLoop);
}

// ══ START / END ══
function startGame(){
  if(gAnim){cancelAnimationFrame(gAnim);gAnim=null;}
  document.getElementById('garage').style.display='none';
  document.getElementById('screen-game').style.display='block';
  document.getElementById('gameover').style.display='none';
  score=0;kills=0;combo=1;maxCombo=1;bestHit=0;timer=90;currentZone='office1';
  document.getElementById('hud-score').textContent='0';document.getElementById('hud-combo').textContent='x1 COMBO';
  document.getElementById('hud-kills').textContent='0 WRECKED';document.getElementById('hud-timer').textContent='90';
  document.getElementById('hud-timer').style.color='#fff';document.getElementById('eff').style.opacity='0';
  document.getElementById('hud-zone').style.opacity='0';
  buildScene();initPlayer();
  running=true;lastT=performance.now();
  if(gAnim2)cancelAnimationFrame(gAnim2);
  gAnim2=requestAnimationFrame(gameLoop);
  // Show zone
  setTimeout(()=>{const el=document.getElementById('hud-zone');el.textContent='🏢 OFFICE 1F';el.style.opacity='1';clearTimeout(window._zt);window._zt=setTimeout(()=>el.style.opacity='0',2500);},300);
}
function endGame(){
  running=false;
  document.getElementById('gameover').style.display='flex';
  document.getElementById('go-score').textContent=score.toLocaleString();
  document.getElementById('go-kills').textContent=kills;
  document.getElementById('go-combo').textContent='x'+maxCombo;
  document.getElementById('go-best').textContent='+'+bestHit;
  document.getElementById('go-zone').textContent=zoneLabel;
}
function restartGame(){document.getElementById('gameover').style.display='none';currentZone='office1';startGame();}
function goGarage(){
  running=false;if(gAnim2){cancelAnimationFrame(gAnim2);gAnim2=null;}
  document.getElementById('screen-game').style.display='none';
  document.getElementById('gameover').style.display='none';
  document.getElementById('garage').style.display='flex';
  gAnim=requestAnimationFrame(animGarage);
}

// ══ INIT ══
initThree();buildGarage();
</script>
