  // 코어 (진동, 가장 밝게)
  ctx.beginPath();
  ctx.arc(tipX, tipY, 2.5 + Math.sin(t*7)*0.8, 0, Math.PI*2);

  for(var f=0; f<6; f++){

    ctx.lineTo(fx2, fy2);

      var eyeGrad = ctx.createRadialGradient(ex,eyeY,0,ex,eyeY,8);

function drawNETGEAR_EVO1(ctx, t) {
  var cx=60, cy=62;
  ctx.clearRect(0,0,120,120);

  function drawGear(gx, gy, outerR, innerR, teeth, angle, col, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(gx, gy);
    ctx.rotate(angle);

    ctx.beginPath();
    var toothW = (Math.PI * 2 / teeth) * 0.4;
    for(var i=0; i<teeth; i++){
      var a0 = (i/teeth)*Math.PI*2;
      var a1 = a0 + toothW*0.5;
      var a2 = a0 + toothW;
      var a3 = a0 + (Math.PI*2/teeth) - toothW*0.5;
      ctx.lineTo(Math.cos(a0)*innerR, Math.sin(a0)*innerR);
      ctx.lineTo(Math.cos(a1)*outerR, Math.sin(a1)*outerR);
      ctx.lineTo(Math.cos(a2)*outerR, Math.sin(a2)*outerR);
      ctx.lineTo(Math.cos(a3)*innerR, Math.sin(a3)*innerR);
    }
    ctx.closePath();

    var gG = ctx.createRadialGradient(0,0,0,0,0,outerR);
    gG.addColorStop(0, '#dd6600');
    gG.addColorStop(0.6, '#bb4400');
    gG.addColorStop(1, '#882200');
    ctx.fillStyle = gG;
    ctx.fill();
    ctx.strokeStyle = col;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(0, 0, innerR*0.45, 0, Math.PI*2);
    ctx.fillStyle = '#0a0805';
    ctx.fill();
    ctx.strokeStyle = col;
    ctx.lineWidth = 1;
    ctx.stroke();

    var spokes = 4;
    for(var i=0; i<spokes; i++){
      var sa = (i/spokes)*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(sa)*innerR*0.5, Math.sin(sa)*innerR*0.5);
      ctx.lineTo(Math.cos(sa)*innerR*0.9, Math.sin(sa)*innerR*0.9);
      ctx.strokeStyle = 'rgba(255,160,20,0.5)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawEye(ex, ey, r, t2) {
    var blink = Math.sin(t2*1.3) > 0.9;
    if(!blink){
      ctx.beginPath();
      ctx.arc(ex, ey, r, 0, Math.PI*2);
      ctx.fillStyle = '#f5ece0';
      ctx.fill();
      var pd = Math.sin(t2*1.7)*1;
      ctx.beginPath();
      ctx.arc(ex+pd, ey, r*0.6, 0, Math.PI*2);
      var ig = ctx.createRadialGradient(ex+pd,ey,0,ex+pd,ey,r*0.6);
      ig.addColorStop(0,'#ff6600');
      ig.addColorStop(0.5,'#cc4400');
      ig.addColorStop(1,'#882200');
      ctx.fillStyle = ig;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ex+pd, ey, r*0.3, 0, Math.PI*2);
      ctx.fillStyle = '#0a0200';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ex+pd+r*0.2, ey-r*0.2, r*0.15, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,200,0.85)';
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.moveTo(ex-r, ey); ctx.lineTo(ex+r, ey);
      ctx.strokeStyle = 'rgba(255,150,30,0.7)';
      ctx.lineWidth = 1.8;
      ctx.lineCap = 'round';
      ctx.stroke();
    }
  }

  var col = 'rgba(255,140,0,0.8)';

  // 속도 빨라짐 (기본 1.5 → 3.5)
  var bigSpd = 3.5;
  var smallSpd = -bigSpd * 14/8; // 톱니 비율로 역회전

  var bigAngle = t * bigSpd;
  var smallAngle = t * smallSpd;

  // 큰 기어 (중심, 살짝 큼)
  var bigR = 19;
  var smallR = 11;

  // 작은 기어 5개 배치 (중심 큰 기어 둘레)
  // 각도들: 좌상, 우상, 좌, 우, 하단
  var meshDist = bigR + smallR - 1.5;
  var angles = [
    -Math.PI*0.75,  // 좌상
    -Math.PI*0.25,  // 우상
    Math.PI*0.95,   // 좌
    Math.PI*0.05,   // 우 (rightish)
    Math.PI*0.5     // 하단
  ];
  // 위 각도가 좀 어색해서 정리: 5개를 균등하게 배치
  var fixedAngles = [];
  for(var i=0; i<5; i++){
    fixedAngles.push(-Math.PI/2 + (i/5)*Math.PI*2);
  }
  // 큰 기어 톱니가 14개라 5등분이면 정확히 맞물리지는 않지만 시각적으로 OK

  // 연결 축 (메시 표시)
  fixedAngles.forEach(function(a){
    var sx = cx + Math.cos(a)*meshDist;
    var sy = cy + Math.sin(a)*meshDist;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(sx, sy);
    ctx.strokeStyle = 'rgba(255,100,0,0.18)';
    ctx.lineWidth = 2;
    ctx.stroke();
  });

  // 큰 기어
  drawGear(cx, cy, bigR, bigR*0.62, 14, bigAngle, col, 1);

  // 작은 기어 5개 + 눈 + 접점 스파크
  var smallGears = fixedAngles.map(function(a, idx){
    var sx = cx + Math.cos(a)*meshDist;
    var sy = cy + Math.sin(a)*meshDist;
    // 인접 작은 기어와 위상 차이 줘서 자연스럽게
    var phaseOff = idx % 2 === 0 ? 0.3 : -0.3;
    drawGear(sx, sy, smallR, smallR*0.58, 8, smallAngle + phaseOff, col, 1);
    return [sx, sy, a];
  });

  // 작은 기어 중 위쪽 두 개에만 눈
  // fixedAngles 인덱스: 0(맨 위), 1(우상), 2(우하), 3(좌하), 4(좌상)  — 실제로는 (i/5)*2pi이므로 시계방향으로 5등분 시작각 -pi/2
  // i=0 -> top, i=1 -> 우상, i=2 -> 우하, i=3 -> 좌하, i=4 -> 좌상
  // 눈은 좌상(4)과 우상(1)에 배치
  drawEye(smallGears[1][0], smallGears[1][1], smallR*0.48, t);
  drawEye(smallGears[4][0], smallGears[4][1], smallR*0.48, t+1.2);

  // ── 기어 접점에서 열/불꽃 튀김 ──
  // 큰 기어 - 각 작은 기어 접점마다 다중 스파크
  smallGears.forEach(function(g, gi){
    var contactX = cx + Math.cos(g[2])*(bigR - 1);
    var contactY = cy + Math.sin(g[2])*(bigR - 1);
    // 접점 자체 글로우 (열 발산)
    var heatGlow = ctx.createRadialGradient(contactX, contactY, 0, contactX, contactY, 8);
    heatGlow.addColorStop(0, 'rgba(255,220,80,'+(0.5+Math.sin(t*10+gi)*0.2)+')');
    heatGlow.addColorStop(0.5, 'rgba(255,120,30,0.25)');
    heatGlow.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(contactX, contactY, 8, 0, Math.PI*2);
    ctx.fillStyle = heatGlow;
    ctx.fill();
    // 접점 코어 (가장 밝은 점)
    ctx.beginPath();
    ctx.arc(contactX, contactY, 1.5 + Math.sin(t*15+gi)*0.5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,200,'+(0.8+Math.sin(t*12+gi)*0.2)+')';
    ctx.fill();

    // 스파크 입자 (접점에서 튀어나옴)
    for(var s=0; s<4; s++){
      // 각 스파크는 자기만의 페이즈
      var sphase = ((t*4 + gi*0.7 + s*0.25) % 1);
      // 튀는 방향: 접점에서 바깥 방향 (접선 방향으로 약간 비틈)
      var sparkAng = g[2] + (s%2===0 ? 0.7 : -0.7) + Math.sin(t*5+s+gi)*0.3;
      var sparkLen = sphase * (6 + Math.sin(t*3+s+gi)*2);
      var sx2 = contactX + Math.cos(sparkAng)*sparkLen;
      var sy2 = contactY + Math.sin(sparkAng)*sparkLen + sphase*sphase*4; // 중력
      var sparkA = (1 - sphase) * 0.9;
      // 스파크 선
      ctx.beginPath();
      ctx.moveTo(contactX, contactY);
      ctx.lineTo(sx2, sy2);
      ctx.strokeStyle = 'rgba(255,200,60,'+(sparkA*0.5)+')';
      ctx.lineWidth = 0.6;
      ctx.lineCap = 'round';
      ctx.stroke();
      // 끝점
      ctx.beginPath();
      ctx.arc(sx2, sy2, 1, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,240,140,'+sparkA+')';
      ctx.fill();
    }
  });

  // 큰 기어 위 표정 (입)
  var mouthY = cy + 6;
  ctx.beginPath();
  ctx.arc(cx, mouthY, 7, 0.15*Math.PI, 0.85*Math.PI);
  ctx.strokeStyle = 'rgba(255,160,40,0.75)';
  ctx.lineWidth = 2.2;
  ctx.lineCap = 'round';
  ctx.stroke();

  // 전체 글로우 (좀 더 진하게 — 더 뜨거워진 느낌)
  var gGrad2 = ctx.createRadialGradient(cx, cy, 10, cx, cy, 60);
  gGrad2.addColorStop(0, 'transparent');
  gGrad2.addColorStop(1, 'rgba(255,120,20,'+(0.08+Math.sin(t*2)*0.04)+')');
  ctx.beginPath();
  ctx.arc(cx, cy, 60, 0, Math.PI*2);
  ctx.fillStyle = gGrad2;
  ctx.fill();

  // 추가 배경 마찰 불꽃 (큰 기어 둘레 따라 도는 파티클)
  for(var i=0; i<6; i++){
    var sparkAngle = t*10 + i*1.05;
    var sparkR = bigR - 2;
    var sx2 = cx + Math.cos(sparkAngle)*sparkR;
    var sy2 = cy + Math.sin(sparkAngle)*sparkR;
    var sparkAlpha = 0.3 + Math.sin(t*14+i)*0.3;
    ctx.beginPath();
    ctx.arc(sx2, sy2, 1.5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,220,80,'+sparkAlpha+')';
    ctx.fill();
  }
}

function drawNETGEAR_EVO2(ctx, t) {
  var cx=60, cy=62;
  ctx.clearRect(0,0,120,120);

  // 과열 기어 그리기 (붉은 광채 + 발열)
  function drawHotGear(gx, gy, outerR, innerR, teeth, angle, alpha, heat) {
    // heat: 0~1 — 과열 정도
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(gx, gy);
    ctx.rotate(angle);

    ctx.beginPath();
    var toothW = (Math.PI * 2 / teeth) * 0.4;
    for(var i=0; i<teeth; i++){
      var a0 = (i/teeth)*Math.PI*2;
      var a1 = a0 + toothW*0.5;
      var a2 = a0 + toothW;
      var a3 = a0 + (Math.PI*2/teeth) - toothW*0.5;
      ctx.lineTo(Math.cos(a0)*innerR, Math.sin(a0)*innerR);
      ctx.lineTo(Math.cos(a1)*outerR, Math.sin(a1)*outerR);
      ctx.lineTo(Math.cos(a2)*outerR, Math.sin(a2)*outerR);
      ctx.lineTo(Math.cos(a3)*innerR, Math.sin(a3)*innerR);
    }
    ctx.closePath();

    // 과열 그라데이션: 중심이 흰-노랑, 가장자리가 진한 붉음
    var gG = ctx.createRadialGradient(0,0,0,0,0,outerR);
    if(heat > 0.5){
      // 매우 과열: 중심 흰빛
      gG.addColorStop(0, '#ffe0a0');
      gG.addColorStop(0.3, '#ff8030');
      gG.addColorStop(0.7, '#cc3010');
      gG.addColorStop(1, '#661800');
    } else {
      // 보통 과열
      gG.addColorStop(0, '#ff9040');
      gG.addColorStop(0.5, '#dd5020');
      gG.addColorStop(1, '#882200');
    }
    ctx.fillStyle = gG;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,200,80,'+(0.8+heat*0.2)+')';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // 중심 구멍
    ctx.beginPath();
    ctx.arc(0, 0, innerR*0.45, 0, Math.PI*2);
    ctx.fillStyle = '#1a0a04';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,180,60,'+(0.8+heat*0.2)+')';
    ctx.lineWidth = 1;
    ctx.stroke();

    // 스포크
    var spokes = 4;
    for(var i=0; i<spokes; i++){
      var sa = (i/spokes)*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(sa)*innerR*0.5, Math.sin(sa)*innerR*0.5);
      ctx.lineTo(Math.cos(sa)*innerR*0.9, Math.sin(sa)*innerR*0.9);
      ctx.strokeStyle = 'rgba(255,220,140,'+(0.6+heat*0.3)+')';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    ctx.restore();

    // 과열 발광 (기어 바깥)
    var heatGlow = ctx.createRadialGradient(gx, gy, outerR*0.8, gx, gy, outerR*2);
    heatGlow.addColorStop(0, 'rgba(255,140,40,'+(0.25*heat)+')');
    heatGlow.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(gx, gy, outerR*2, 0, Math.PI*2);
    ctx.fillStyle = heatGlow;
    ctx.fill();
  }

  function drawEye(ex, ey, r, t2) {
    var blink = Math.sin(t2*1.3) > 0.9;
    if(!blink){
      ctx.beginPath();
      ctx.arc(ex, ey, r, 0, Math.PI*2);
      ctx.fillStyle = '#fff0d8';
      ctx.fill();
      var pd = Math.sin(t2*1.7)*1;
      ctx.beginPath();
      ctx.arc(ex+pd, ey, r*0.6, 0, Math.PI*2);
      var ig = ctx.createRadialGradient(ex+pd,ey,0,ex+pd,ey,r*0.6);
      ig.addColorStop(0,'#ffaa30');
      ig.addColorStop(0.5,'#dd5500');
      ig.addColorStop(1,'#882200');
      ctx.fillStyle = ig;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ex+pd, ey, r*0.3, 0, Math.PI*2);
      ctx.fillStyle = '#0a0200';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ex+pd+r*0.2, ey-r*0.2, r*0.15, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,200,0.9)';
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.moveTo(ex-r, ey); ctx.lineTo(ex+r, ey);
      ctx.strokeStyle = 'rgba(255,180,60,0.85)';
      ctx.lineWidth = 1.8;
      ctx.lineCap = 'round';
      ctx.stroke();
    }
  }

  // 속도 더 빨라짐
  var bigSpd = 5.0;
  var smallSpd = -bigSpd * 14/8;
  var bigAngle = t * bigSpd;
  var smallAngle = t * smallSpd;

  // 김 (연기) — 본체 위로 올라감
  for(var s=0; s<8; s++){
    var sphase = ((t*0.4 + s*0.18) % 1);
    var sx = cx + (s-3.5)*5 + Math.sin(t*1.2 + s)*3;
    var sy = cy - 18 - sphase*36;
    var sR = 3 + sphase*7;
    var sA = (1 - sphase) * 0.18;
    ctx.beginPath();
    ctx.arc(sx, sy, sR, 0, Math.PI*2);
    var smG = ctx.createRadialGradient(sx, sy, 0, sx, sy, sR);
    smG.addColorStop(0, 'rgba(180,140,120,'+sA+')');
    smG.addColorStop(1, 'transparent');
    ctx.fillStyle = smG;
    ctx.fill();
  }

  // 공전 기어 (본체 둘레 — 큰 궤도)
  var orbitR = 44;
  var orbitGears = [
    { angSpd: 0.7,  phase: 0.0,         size: 6, teeth: 8,  spin: -4 },
    { angSpd: 0.55, phase: Math.PI*0.8, size: 5, teeth: 7,  spin: 5  },
    { angSpd: 0.85, phase: Math.PI*1.6, size: 4.5, teeth: 6, spin: -6 },
  ];

  // 공전 궤도 표시 (옅게)
  ctx.beginPath();
  ctx.arc(cx, cy, orbitR, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,140,40,0.12)';
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 4]);
  ctx.stroke();
  ctx.setLineDash([]);

  // 공전 기어 그리기 (뒤에)
  orbitGears.forEach(function(og){
    var oa = t*og.angSpd + og.phase;
    var ox = cx + Math.cos(oa)*orbitR;
    var oy = cy + Math.sin(oa)*orbitR;
    drawHotGear(ox, oy, og.size, og.size*0.55, og.teeth, t*og.spin, 1, 0.6);
    // 공전 기어 뒤로 잔상
    for(var tr=1; tr<=2; tr++){
      var traA = oa - tr*0.12;
      var tx = cx + Math.cos(traA)*orbitR;
      var ty = cy + Math.sin(traA)*orbitR;
      ctx.beginPath();
      ctx.arc(tx, ty, og.size*0.5, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,140,50,'+(0.15/tr)+')';
      ctx.fill();
    }
  });

  // 큰 기어 (중앙)
  var bigR = 19;
  var smallR = 10;

  // 작은 기어 7개 배치 (5개 → 7개)
  var gearCount = 7;
  var meshDist = bigR + smallR - 1.5;
  var fixedAngles = [];
  for(var i=0; i<gearCount; i++){
    fixedAngles.push(-Math.PI/2 + (i/gearCount)*Math.PI*2);
  }

  // 연결 축
  fixedAngles.forEach(function(a){
    var sx = cx + Math.cos(a)*meshDist;
    var sy = cy + Math.sin(a)*meshDist;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(sx, sy);
    ctx.strokeStyle = 'rgba(255,100,20,0.25)';
    ctx.lineWidth = 2;
    ctx.stroke();
  });

  // 큰 기어 (가장 과열)
  drawHotGear(cx, cy, bigR, bigR*0.62, 14, bigAngle, 1, 0.8);

  // 작은 기어들
  var smallGears = fixedAngles.map(function(a, idx){
    var sx = cx + Math.cos(a)*meshDist;
    var sy = cy + Math.sin(a)*meshDist;
    var phaseOff = idx % 2 === 0 ? 0.3 : -0.3;
    drawHotGear(sx, sy, smallR, smallR*0.58, 8, smallAngle + phaseOff, 1, 0.65);
    return [sx, sy, a];
  });

  // 눈 — 위쪽 두 작은 기어 (인덱스 0, 1 또는 적절히 선택)
  // 7등분: i=0 top, i=1 우상...우상, i=6 좌상
  drawEye(smallGears[0][0], smallGears[0][1], smallR*0.45, t);
  drawEye(smallGears[6][0], smallGears[6][1], smallR*0.45, t+1.2);

  // ── 접점 폭증 스파크 ──
  smallGears.forEach(function(g, gi){
    var contactX = cx + Math.cos(g[2])*(bigR - 1);
    var contactY = cy + Math.sin(g[2])*(bigR - 1);

    // 접점 큰 글로우 (더 강함)
    var heatGlow = ctx.createRadialGradient(contactX, contactY, 0, contactX, contactY, 12);
    heatGlow.addColorStop(0, 'rgba(255,240,160,'+(0.7+Math.sin(t*15+gi)*0.2)+')');
    heatGlow.addColorStop(0.4, 'rgba(255,140,40,0.4)');
    heatGlow.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(contactX, contactY, 12, 0, Math.PI*2);
    ctx.fillStyle = heatGlow;
    ctx.fill();
    // 코어
    ctx.beginPath();
    ctx.arc(contactX, contactY, 2 + Math.sin(t*18+gi)*0.6, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,220,'+(0.9+Math.sin(t*14+gi)*0.1)+')';
    ctx.fill();

    // 스파크 10개 — 폭증
    for(var s=0; s<10; s++){
      var sphase = ((t*5 + gi*0.4 + s*0.1) % 1);
      var sparkAng = g[2] + (s%2===0 ? 0.6 : -0.6) + Math.sin(t*7+s+gi*2)*0.5 + (s%3===0 ? Math.cos(t*4+s)*0.4 : 0);
      var sparkLen = sphase * (10 + Math.sin(t*3+s+gi)*4);
      var sx2 = contactX + Math.cos(sparkAng)*sparkLen;
      var sy2 = contactY + Math.sin(sparkAng)*sparkLen + sphase*sphase*8;
      var sparkA = (1 - sphase) * 0.95;
      // 스파크 선
      ctx.beginPath();
      ctx.moveTo(contactX, contactY);
      ctx.lineTo(sx2, sy2);
      ctx.strokeStyle = 'rgba(255,200,60,'+(sparkA*0.4)+')';
      ctx.lineWidth = 0.6;
      ctx.lineCap = 'round';
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(sx2, sy2, 1 + sparkA*0.6, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,240,140,'+sparkA+')';
      ctx.fill();
      // 잔상 점 (스파크 끝)
      if(sphase > 0.5){
        ctx.beginPath();
        ctx.arc(sx2, sy2, 0.4, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,180,60,'+(sparkA*0.5)+')';
        ctx.fill();
      }
    }
  });

  // 추가 자유 스파크 (기어 사이 빈 공간에서 무작위 튐)
  for(var f=0; f<8; f++){
    var fphase = ((t*3 + f*0.4) % 1);
    var baseA = (f/8)*Math.PI*2 + t*2;
    var baseR = 22 + Math.sin(t*4+f)*4;
    var startX = cx + Math.cos(baseA)*baseR;
    var startY = cy + Math.sin(baseA)*baseR;
    var endX = startX + Math.cos(baseA + Math.sin(t*5+f)*0.5)*fphase*12;
    var endY = startY + Math.sin(baseA + Math.sin(t*5+f)*0.5)*fphase*12 + fphase*fphase*6;
    var fA = (1 - fphase) * 0.7;
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(endX, endY);
    ctx.strokeStyle = 'rgba(255,200,80,'+(fA*0.5)+')';
    ctx.lineWidth = 0.6;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(endX, endY, 1, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,240,160,'+fA+')';
    ctx.fill();
  }

  // 큰 기어 위 입 (과열로 일그러진 느낌)
  var mouthY = cy + 6;
  ctx.beginPath();
  ctx.arc(cx, mouthY, 7, 0.2*Math.PI, 0.8*Math.PI);
  ctx.strokeStyle = 'rgba(255,180,60,0.85)';
  ctx.lineWidth = 2.2;
  ctx.lineCap = 'round';
  ctx.stroke();

  // 전체 외곽 글로우 (붉은+노란)
  var gGrad2 = ctx.createRadialGradient(cx, cy, 15, cx, cy, 65);
  gGrad2.addColorStop(0, 'transparent');
  gGrad2.addColorStop(0.6, 'rgba(255,140,40,0.08)');
  gGrad2.addColorStop(1, 'rgba(255,80,20,'+(0.12+Math.sin(t*2)*0.04)+')');
  ctx.beginPath();
  ctx.arc(cx, cy, 65, 0, Math.PI*2);
  ctx.fillStyle = gGrad2;
  ctx.fill();

  // 큰 기어 둘레 도는 마찰 입자 (더 많이)
  for(var i=0; i<10; i++){
    var sparkAngle = t*12 + i*0.63;
    var sparkR = bigR - 2;
    var sx2 = cx + Math.cos(sparkAngle)*sparkR;
    var sy2 = cy + Math.sin(sparkAngle)*sparkR;
    var sparkAlpha = 0.4 + Math.sin(t*16+i)*0.3;
    ctx.beginPath();
    ctx.arc(sx2, sy2, 1.6, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,240,140,'+sparkAlpha+')';
    ctx.fill();
  }
}

function drawNETGEAR_EVO3(ctx, t) {
  var cx=60, cy=62;
  ctx.clearRect(0,0,120,120);

  // 최대 과열 기어 (heat 0~1, 1이 흰빛)
  function drawMeltGear(gx, gy, outerR, innerR, teeth, angle, alpha, heat) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(gx, gy);
    ctx.rotate(angle);

    ctx.beginPath();
    var toothW = (Math.PI * 2 / teeth) * 0.4;
    for(var i=0; i<teeth; i++){
      var a0 = (i/teeth)*Math.PI*2;
      var a1 = a0 + toothW*0.5;
      var a2 = a0 + toothW;
      var a3 = a0 + (Math.PI*2/teeth) - toothW*0.5;
      ctx.lineTo(Math.cos(a0)*innerR, Math.sin(a0)*innerR);
      ctx.lineTo(Math.cos(a1)*outerR, Math.sin(a1)*outerR);
      ctx.lineTo(Math.cos(a2)*outerR, Math.sin(a2)*outerR);
      ctx.lineTo(Math.cos(a3)*innerR, Math.sin(a3)*innerR);
    }
    ctx.closePath();

    var gG = ctx.createRadialGradient(0,0,0,0,0,outerR);
    if(heat >= 0.9){
      // 백열 (녹기 직전)
      gG.addColorStop(0, '#ffffff');
      gG.addColorStop(0.25, '#fff0a0');
      gG.addColorStop(0.6, '#ff8030');
      gG.addColorStop(1, '#aa2000');
    } else if(heat >= 0.7){
      gG.addColorStop(0, '#fff0a0');
      gG.addColorStop(0.4, '#ffa040');
      gG.addColorStop(1, '#882200');
    } else {
      gG.addColorStop(0, '#ff9040');
      gG.addColorStop(0.5, '#dd5020');
      gG.addColorStop(1, '#882200');
    }
    ctx.fillStyle = gG;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,240,180,'+(0.8+heat*0.2)+')';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // 중심 구멍
    ctx.beginPath();
    ctx.arc(0, 0, innerR*0.45, 0, Math.PI*2);
    ctx.fillStyle = '#220a04';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,220,140,'+(0.9+heat*0.1)+')';
    ctx.lineWidth = 1;
    ctx.stroke();

    // 스포크 (밝게)
    var spokes = 4;
    for(var i=0; i<spokes; i++){
      var sa = (i/spokes)*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(sa)*innerR*0.5, Math.sin(sa)*innerR*0.5);
      ctx.lineTo(Math.cos(sa)*innerR*0.9, Math.sin(sa)*innerR*0.9);
      ctx.strokeStyle = 'rgba(255,255,220,'+(0.7+heat*0.3)+')';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    ctx.restore();

    // 백열 글로우 (강력)
    var heatGlow = ctx.createRadialGradient(gx, gy, outerR*0.6, gx, gy, outerR*2.5);
    heatGlow.addColorStop(0, 'rgba(255,200,80,'+(0.45*heat)+')');
    heatGlow.addColorStop(0.5, 'rgba(255,120,30,'+(0.2*heat)+')');
    heatGlow.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(gx, gy, outerR*2.5, 0, Math.PI*2);
    ctx.fillStyle = heatGlow;
    ctx.fill();
  }

  function drawEye(ex, ey, r, t2) {
    var blink = Math.sin(t2*1.3) > 0.9;
    if(!blink){
      ctx.beginPath();
      ctx.arc(ex, ey, r, 0, Math.PI*2);
      ctx.fillStyle = '#fff5e0';
      ctx.fill();
      var pd = Math.sin(t2*1.7)*1;
      ctx.beginPath();
      ctx.arc(ex+pd, ey, r*0.6, 0, Math.PI*2);
      var ig = ctx.createRadialGradient(ex+pd,ey,0,ex+pd,ey,r*0.6);
      ig.addColorStop(0,'#ffcc40');
      ig.addColorStop(0.5,'#ff6020');
      ig.addColorStop(1,'#882200');
      ctx.fillStyle = ig;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ex+pd, ey, r*0.3, 0, Math.PI*2);
      ctx.fillStyle = '#0a0200';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ex+pd+r*0.2, ey-r*0.2, r*0.15, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,220,0.95)';
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.moveTo(ex-r, ey); ctx.lineTo(ex+r, ey);
      ctx.strokeStyle = 'rgba(255,200,80,0.9)';
      ctx.lineWidth = 1.8;
      ctx.lineCap = 'round';
      ctx.stroke();
    }
  }

  // 속도 (더 빠르게)
  var bigSpd = 6.5;
  var smallSpd = -bigSpd * 14/8;
  var bigAngle = t * bigSpd;
  var smallAngle = t * smallSpd;

  // 진한 김/연기 (더 많이)
  for(var s=0; s<12; s++){
    var sphase = ((t*0.45 + s*0.13) % 1);
    var sx = cx + (s-5.5)*4 + Math.sin(t*1.4 + s)*4;
    var sy = cy - 18 - sphase*42;
    var sR = 3 + sphase*9;
    var sA = (1 - sphase) * 0.2;
    ctx.beginPath();
    ctx.arc(sx, sy, sR, 0, Math.PI*2);
    var smG = ctx.createRadialGradient(sx, sy, 0, sx, sy, sR);
    smG.addColorStop(0, 'rgba(200,160,140,'+sA+')');
    smG.addColorStop(1, 'transparent');
    ctx.fillStyle = smG;
    ctx.fill();
  }

  // ── 멀리 큰 궤도 공전 기어 (5개, 다양한 속도) ──
  var orbit1R = 48;
  var orbit1Gears = [
    { angSpd: 0.6,  phase: 0.0,         size: 6.5, teeth: 8,  spin: -5, heat: 0.85 },
    { angSpd: 0.5,  phase: Math.PI*0.5, size: 5,   teeth: 7,  spin: 6,  heat: 0.75 },
    { angSpd: 0.75, phase: Math.PI,     size: 5.5, teeth: 8,  spin: -7, heat: 0.8 },
    { angSpd: 0.45, phase: Math.PI*1.5, size: 4.5, teeth: 6,  spin: 5,  heat: 0.7 },
    { angSpd: 0.9,  phase: Math.PI*0.25,size: 4,   teeth: 6,  spin: -6, heat: 0.65 },
  ];

  // 가까운 작은 궤도 공전 기어 (3개)
  var orbit2R = 34;

  // 궤도 점선
  ctx.setLineDash([3, 5]);
  ctx.beginPath();
  ctx.arc(cx, cy, orbit1R, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,140,40,0.13)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.setLineDash([]);

  // 멀리 공전 기어
  orbit1Gears.forEach(function(og){
    var oa = t*og.angSpd + og.phase;
    var ox = cx + Math.cos(oa)*orbit1R;
    var oy = cy + Math.sin(oa)*orbit1R;
    drawMeltGear(ox, oy, og.size, og.size*0.55, og.teeth, t*og.spin, 1, og.heat);
    // 잔상
    for(var tr=1; tr<=2; tr++){
      var traA = oa - tr*0.1;
      var tx = cx + Math.cos(traA)*orbit1R;
      var ty = cy + Math.sin(traA)*orbit1R;
      ctx.beginPath();
      ctx.arc(tx, ty, og.size*0.5, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,160,60,'+(0.18/tr)+')';
      ctx.fill();
    }
  });

  // ── 떠다니는 기어 (궤도에 묶이지 않음, 자유 부유) ──
  // 각 기어는 자기만의 베지에 같은 경로로 떠다님 — 단순화: sin 합성으로 위치
  var floatGears = [
    { baseX: 18,  baseY: 22,  ampX: 6, ampY: 4, spdX: 0.5, spdY: 0.7, size: 3.5, teeth: 6, spin: 4,  heat: 0.6 },
    { baseX: 102, baseY: 30,  ampX: 5, ampY: 5, spdX: 0.6, spdY: 0.4, size: 4,   teeth: 7, spin: -5, heat: 0.7 },
    { baseX: 22,  baseY: 96,  ampX: 5, ampY: 4, spdX: 0.4, spdY: 0.8, size: 3,   teeth: 6, spin: 6,  heat: 0.55 },
    { baseX: 100, baseY: 92,  ampX: 6, ampY: 4, spdX: 0.7, spdY: 0.5, size: 3.5, teeth: 7, spin: -4, heat: 0.65 },
    { baseX: 60,  baseY: 12,  ampX: 8, ampY: 3, spdX: 0.6, spdY: 1.0, size: 3,   teeth: 6, spin: 5,  heat: 0.6 },
    { baseX: 60,  baseY: 110, ampX: 8, ampY: 3, spdX: 0.5, spdY: 0.9, size: 3,   teeth: 6, spin: -5, heat: 0.55 },
  ];
  floatGears.forEach(function(fg, fi){
    var fx = fg.baseX + Math.sin(t*fg.spdX + fi)*fg.ampX;
    var fy = fg.baseY + Math.cos(t*fg.spdY + fi*1.3)*fg.ampY;
    drawMeltGear(fx, fy, fg.size, fg.size*0.55, fg.teeth, t*fg.spin, 0.9, fg.heat);
    // 떠다니는 기어 뒤로 연기 흔적
    for(var tr=1; tr<=2; tr++){
      var tx = fx - Math.sin(t*fg.spdX + fi)*fg.ampX*0.15*tr;
      var ty = fy - Math.cos(t*fg.spdY + fi*1.3)*fg.ampY*0.15*tr;
      ctx.beginPath();
      ctx.arc(tx, ty, fg.size*0.4, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(180,140,120,'+(0.1/tr)+')';
      ctx.fill();
    }
  });

  // ── 중심 큰 기어 + 작은 기어 8개 (5→7→8 증가) ──
  var bigR = 19;
  var smallR = 9.5;
  var gearCount = 8;
  var meshDist = bigR + smallR - 1.5;
  var fixedAngles = [];
  for(var i=0; i<gearCount; i++){
    fixedAngles.push(-Math.PI/2 + (i/gearCount)*Math.PI*2);
  }

  // 연결 축
  fixedAngles.forEach(function(a){
    var sx = cx + Math.cos(a)*meshDist;
    var sy = cy + Math.sin(a)*meshDist;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(sx, sy);
    ctx.strokeStyle = 'rgba(255,140,40,0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();
  });

  // 큰 기어 (백열)
  drawMeltGear(cx, cy, bigR, bigR*0.62, 14, bigAngle, 1, 0.95);

  // 작은 기어들 (높은 과열)
  var smallGears = fixedAngles.map(function(a, idx){
    var sx = cx + Math.cos(a)*meshDist;
    var sy = cy + Math.sin(a)*meshDist;
    var phaseOff = idx % 2 === 0 ? 0.3 : -0.3;
    drawMeltGear(sx, sy, smallR, smallR*0.58, 8, smallAngle + phaseOff, 1, 0.8);
    return [sx, sy, a];
  });

  // ── 눈알 다수 (4개 → 6개) ──
  // 작은 기어 중 일부 + 큰 기어 위에도 추가
  // 8개 기어니까 0(top), 1(우상), 2(우), 3(우하), 4(bot), 5(좌하), 6(좌), 7(좌상)
  // 눈은 0, 2, 6, 7 (top, 우, 좌, 좌상) — 4개
  var eyeGearIdx = [0, 2, 4, 6, 7];
  eyeGearIdx.forEach(function(idx, ei){
    drawEye(smallGears[idx][0], smallGears[idx][1], smallR*0.42, t + ei*0.7);
  });
  // 큰 기어 위 + 위쪽 추가 눈 1개 (자유롭게 떠다니는 눈)
  var fEyeX = cx + Math.sin(t*0.8)*5;
  var fEyeY = cy - 18 + Math.cos(t*1.1)*2;
  drawEye(fEyeX, fEyeY, 4, t + 2.5);

  // ── 접점 폭발적 스파크 ──
  smallGears.forEach(function(g, gi){
    var contactX = cx + Math.cos(g[2])*(bigR - 1);
    var contactY = cy + Math.sin(g[2])*(bigR - 1);

    // 강력 글로우
    var heatGlow = ctx.createRadialGradient(contactX, contactY, 0, contactX, contactY, 16);
    heatGlow.addColorStop(0, 'rgba(255,255,200,'+(0.85+Math.sin(t*18+gi)*0.15)+')');
    heatGlow.addColorStop(0.3, 'rgba(255,180,60,0.5)');
    heatGlow.addColorStop(0.7, 'rgba(255,80,20,0.2)');
    heatGlow.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(contactX, contactY, 16, 0, Math.PI*2);
    ctx.fillStyle = heatGlow;
    ctx.fill();

    // 코어 점
    ctx.beginPath();
    ctx.arc(contactX, contactY, 2.5 + Math.sin(t*20+gi)*0.8, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,'+(0.95+Math.sin(t*16+gi)*0.05)+')';
    ctx.fill();

    // 스파크 14개 (폭발적)
    for(var s=0; s<14; s++){
      var sphase = ((t*6 + gi*0.35 + s*0.08) % 1);
      var sparkAng = g[2] + (s%2===0 ? 0.7 : -0.7) + Math.sin(t*9+s+gi*2)*0.6 + (s%3===0 ? Math.cos(t*5+s)*0.5 : 0);
      var sparkLen = sphase * (14 + Math.sin(t*4+s+gi)*5);
      var sx2 = contactX + Math.cos(sparkAng)*sparkLen;
      var sy2 = contactY + Math.sin(sparkAng)*sparkLen + sphase*sphase*10;
      var sparkA = (1 - sphase);
      ctx.beginPath();
      ctx.moveTo(contactX, contactY);
      ctx.lineTo(sx2, sy2);
      ctx.strokeStyle = 'rgba(255,220,100,'+(sparkA*0.45)+')';
      ctx.lineWidth = 0.7;
      ctx.lineCap = 'round';
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(sx2, sy2, 1.2 + sparkA*0.7, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,250,180,'+sparkA+')';
      ctx.fill();
      // 잔상
      if(sphase > 0.3){
        ctx.beginPath();
        ctx.arc(sx2, sy2, 0.5, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,180,80,'+(sparkA*0.6)+')';
        ctx.fill();
      }
    }
  });

  // 자유 스파크 (전 영역) — 14개
  for(var f=0; f<14; f++){
    var fphase = ((t*3.5 + f*0.25) % 1);
    var baseA = (f/14)*Math.PI*2 + t*2.5;
    var baseR = 20 + Math.sin(t*4+f)*8;
    var startX = cx + Math.cos(baseA)*baseR;
    var startY = cy + Math.sin(baseA)*baseR;
    var dir = baseA + Math.sin(t*5+f)*0.7;
    var endX = startX + Math.cos(dir)*fphase*15;
    var endY = startY + Math.sin(dir)*fphase*15 + fphase*fphase*8;
    var fA = (1 - fphase) * 0.8;
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(endX, endY);
    ctx.strokeStyle = 'rgba(255,200,80,'+(fA*0.5)+')';
    ctx.lineWidth = 0.7;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(endX, endY, 1.2, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,250,180,'+fA+')';
    ctx.fill();
  }

  // 큰 기어 위 입 (벌어진 느낌)
  var mouthY = cy + 6;
  ctx.beginPath();
  ctx.arc(cx, mouthY, 6, 0.25*Math.PI, 0.75*Math.PI);
  ctx.strokeStyle = 'rgba(255,220,100,0.9)';
  ctx.lineWidth = 2.4;
  ctx.lineCap = 'round';
  ctx.stroke();

  // 외곽 전체 글로우 (백열 발열)
  var outerGlow = ctx.createRadialGradient(cx, cy, 18, cx, cy, 72);
  outerGlow.addColorStop(0, 'transparent');
  outerGlow.addColorStop(0.4, 'rgba(255,180,60,0.1)');
  outerGlow.addColorStop(0.8, 'rgba(255,100,30,0.12)');
  outerGlow.addColorStop(1, 'rgba(255,60,20,'+(0.15+Math.sin(t*2)*0.05)+')');
  ctx.beginPath();
  ctx.arc(cx, cy, 72, 0, Math.PI*2);
  ctx.fillStyle = outerGlow;
  ctx.fill();

  // 큰 기어 둘레 마찰 입자 (14개)
  for(var i=0; i<14; i++){
    var sparkAngle = t*14 + i*0.45;
    var sparkR = bigR - 2;
    var sx2 = cx + Math.cos(sparkAngle)*sparkR;
    var sy2 = cy + Math.sin(sparkAngle)*sparkR;
    var sparkAlpha = 0.5 + Math.sin(t*18+i)*0.3;
    ctx.beginPath();
    ctx.arc(sx2, sy2, 1.7, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,250,180,'+sparkAlpha+')';
    ctx.fill();
  }
}

function drawMERCUSYS_EVO1(ctx, t) {
  var cx=60, cy=52;
  ctx.clearRect(0,0,120,120);

  var bob = Math.sin(t*1.9)*3;
  var padW=54, padH=68, padR=8;
  var px = cx;
  var py = cy + bob;

  // ── 강화된 바닥 그림자 ──
  var floorY = py + padH/2 + 11;
  var shadowScaleX = 1.25 + Math.sin(t*1.9)*0.07; // 더 큼
  var shadowAlpha = 0.78 - Math.abs(Math.sin(t*1.9))*0.08; // 더 진함

  // 외곽 추가 그림자 링 (더 퍼진 느낌)
  ctx.save();
  ctx.translate(cx, floorY);
  ctx.scale(shadowScaleX*1.3, 0.32);
  ctx.beginPath();
  ctx.arc(0, 0, padW*0.62, 0, Math.PI*2);
  var outerShadow = ctx.createRadialGradient(0,0,0, 0,0, padW*0.62);
  outerShadow.addColorStop(0, 'rgba(0,200,170,0.3)');
  outerShadow.addColorStop(0.6, 'rgba(0,150,130,0.15)');
  outerShadow.addColorStop(1, 'rgba(0,120,100,0)');
  ctx.fillStyle = outerShadow;
  ctx.fill();
  ctx.restore();

  // 메인 그림자 (더 진하게 + 크게)
  ctx.save();
  ctx.translate(cx, floorY);
  ctx.scale(shadowScaleX, 0.32);
  ctx.beginPath();
  ctx.arc(0, 0, padW*0.58, 0, Math.PI*2);
  var shadowGrad = ctx.createRadialGradient(0,0,0, 0,0, padW*0.58);
  shadowGrad.addColorStop(0, 'rgba(0,240,210,'+(shadowAlpha)+')');
  shadowGrad.addColorStop(0.5, 'rgba(0,200,180,'+(shadowAlpha*0.85)+')');
  shadowGrad.addColorStop(1, 'rgba(0,160,140,0)');
  ctx.fillStyle = shadowGrad;
  ctx.fill();
  ctx.restore();

  // 그림자 가장자리 라인 (윤곽 뚜렷)
  ctx.save();
  ctx.translate(cx, floorY);
  ctx.scale(shadowScaleX, 0.32);
  ctx.beginPath();
  ctx.arc(0, 0, padW*0.55, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(0,255,220,0.4)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();

  // ── 그림자 안 웃는 얼굴 (더 진하게) ──
  var faceX = cx;
  var faceY = floorY;
  var blinkShadow = Math.sin(t*1.5) > 0.88;
  if(!blinkShadow){
    [-10, 10].forEach(function(ox){
      ctx.save();
      ctx.translate(faceX+ox, faceY);
      ctx.scale(1, 0.45);
      ctx.beginPath();
      ctx.arc(0, 0, 5.5, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(0,40,36,0.95)';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(0.5, -0.5, 2.8, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(180,255,240,0.98)';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(1.5, -1.5, 1.1, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.fill();
      ctx.restore();
    });
  } else {
    [-10,10].forEach(function(ox){
      ctx.beginPath();
      ctx.moveTo(faceX+ox-5.5, faceY);
      ctx.lineTo(faceX+ox+5.5, faceY);
      ctx.strokeStyle = 'rgba(180,255,240,0.9)';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.stroke();
    });
  }
  // 웃는 입 (더 분명)
  ctx.save();
  ctx.translate(faceX, faceY+3);
  ctx.scale(1, 0.4);
  ctx.beginPath();
  ctx.arc(0, 0, 10, 0.15*Math.PI, 0.85*Math.PI);
  ctx.strokeStyle = 'rgba(0,40,36,0.95)';
  ctx.lineWidth = 3.2;
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.restore();

  // ── 아이패드 본체 ──
  var bezelGrad = ctx.createLinearGradient(px-padW/2, py-padH/2, px+padW/2, py+padH/2);
  bezelGrad.addColorStop(0, '#2a2e32');
  bezelGrad.addColorStop(1, '#181c20');
  ctx.beginPath();
  rr(ctx, px - padW/2, py - padH/2, padW, padH, padR);
  ctx.fillStyle = bezelGrad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(80,90,100,0.8)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // 화면
  var screenPad = 4;
  var sx = px - padW/2 + screenPad;
  var sy = py - padH/2 + screenPad;
  var sw = padW - screenPad*2;
  var sh = padH - screenPad*2;

  ctx.beginPath();
  rr(ctx, sx, sy, sw, sh, padR-2);
  ctx.fillStyle = '#0d1518';
  ctx.fill();

  // ── 화면 클리핑 (글리치를 화면 안에만) ──
  ctx.save();
  ctx.beginPath();
  rr(ctx, sx, sy, sw, sh, padR-2);
  ctx.clip();

  // 화면 청록 베이스 글로우 (전체적으로 옅게)
  var screenBase = ctx.createRadialGradient(px, py, 5, px, py, 30);
  screenBase.addColorStop(0, 'rgba(0,200,180,0.1)');
  screenBase.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.rect(sx, sy, sw, sh);
  ctx.fillStyle = screenBase;
  ctx.fill();

  // ── 청록 글리치 가로 라인들 ──
  // 라인 6~10개, 무작위 y 위치, 시간에 따라 깜빡/이동
  for(var i=0; i<8; i++){
    var lineSeed = i*1.7;
    // 라인이 표시될 시점만 (페이즈로 깜빡)
    var phase = (t*1.5 + lineSeed) % 3.0;
    if(phase < 1.5){
      var visibility = Math.sin((phase/1.5)*Math.PI);
      // y는 페이즈에 따라 살짝 변동
      var ly = sy + ((Math.sin(lineSeed*7.3) + 1)*0.5)*sh + Math.sin(t*4+i)*1;
      var lh = 1 + Math.floor(Math.sin(t*8+i*3)*1+1); // 1~3 픽셀
      // 라인 길이/오프셋 (가로로 부분만 나오기도)
      var lOff = Math.sin(t*3+i)*sw*0.15;
      var lW = sw * (0.6 + Math.sin(t*2+i)*0.3);
      ctx.beginPath();
      ctx.rect(sx + lOff + (sw-lW)*0.3, ly, lW, lh);
      ctx.fillStyle = 'rgba(0,255,220,'+(visibility*0.65)+')';
      ctx.fill();
    }
  }

  // ── 짧은 글리치 블록 (직사각형 노이즈) ──
  for(var i=0; i<5; i++){
    var seed = i*2.3;
    var phase = (t*2 + seed) % 4;
    if(phase < 0.4){ // 짧은 깜빡
      var visibility = 1 - phase/0.4;
      var bx = sx + ((Math.sin(seed*5.1) + 1)*0.5)*sw*0.8;
      var by = sy + ((Math.cos(seed*4.7) + 1)*0.5)*sh*0.85;
      var bw = 6 + Math.sin(seed*2)*4;
      var bh = 2 + Math.sin(seed*3)*1;
      ctx.beginPath();
      ctx.rect(bx, by, bw, bh);
      ctx.fillStyle = 'rgba(80,255,210,'+(visibility*0.8)+')';
      ctx.fill();
    }
  }

  // ── RGB 분리 효과 (가끔) ──
  var rgbPhase = (t*0.7) % 4;
  if(rgbPhase < 0.5){
    var rgbViz = 1 - rgbPhase/0.5;
    // 청록 시프트
    ctx.fillStyle = 'rgba(0,255,220,'+(rgbViz*0.15)+')';
    ctx.fillRect(sx + 2, sy, sw, sh);
    ctx.fillStyle = 'rgba(255,80,180,'+(rgbViz*0.12)+')';
    ctx.fillRect(sx - 2, sy, sw, sh);
  }

  // ── 픽셀 노이즈 (작은 점들) ──
  for(var i=0; i<14; i++){
    var np = (t*3 + i*0.3) % 1;
    if(np < 0.3){
      var nx = sx + Math.sin(i*9.3 + Math.floor(t*4))*sw*0.45 + sw*0.5;
      var ny = sy + Math.cos(i*7.7 + Math.floor(t*4))*sh*0.45 + sh*0.5;
      ctx.beginPath();
      ctx.arc(nx, ny, 0.8, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(160,255,230,'+(1-np/0.3)*0.7+')';
      ctx.fill();
    }
  }

  // 스캔라인 (전체 가로 어두운 줄)
  var scanY = sy + ((t*15) % (sh+10)) - 5;
  if(scanY > sy && scanY < sy+sh){
    var scanGrad = ctx.createLinearGradient(sx, scanY-3, sx, scanY+3);
    scanGrad.addColorStop(0, 'transparent');
    scanGrad.addColorStop(0.5, 'rgba(0,255,220,0.2)');
    scanGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = scanGrad;
    ctx.fillRect(sx, scanY-3, sw, 6);
  }

  ctx.restore(); // 클리핑 해제

  // 화면 반사광
  ctx.beginPath();
  rr(ctx, sx+2, sy+2, sw*0.45, 10, 3);
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  ctx.fill();

  // 홈 버튼
  ctx.beginPath();
  ctx.arc(px, py+padH/2-8, 4, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(80,90,100,0.6)';
  ctx.lineWidth = 1;
  ctx.stroke();
  // 홈 버튼 가끔 글리치 (청록 깜빡)
  if((t*2.5) % 5 < 0.3){
    ctx.beginPath();
    ctx.arc(px, py+padH/2-8, 3, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,255,220,0.4)';
    ctx.fill();
  }

  // 카메라
  ctx.beginPath();
  ctx.arc(px, py-padH/2+6, 2, 0, Math.PI*2);
  ctx.fillStyle = '#0a0e12';
  ctx.fill();
  ctx.strokeStyle = 'rgba(80,90,100,0.5)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // 베젤 하이라이트
  ctx.beginPath();
  ctx.moveTo(px-padW/2+padR, py-padH/2);
  ctx.lineTo(px+padW/2-padR, py-padH/2);
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // 전체 청록 글로우 (더 진하게)
  var glowGrad = ctx.createRadialGradient(cx, cy, 10, cx, cy, 65);
  glowGrad.addColorStop(0, 'transparent');
  glowGrad.addColorStop(1, 'rgba(0,220,190,'+(0.08+Math.sin(t*2)*0.04)+')');
  ctx.beginPath();
  ctx.arc(cx, cy, 65, 0, Math.PI*2);
  ctx.fillStyle = glowGrad;
  ctx.fill();
}

function drawMERCUSYS_EVO2(ctx, t) {
  var cx=60, cy=50;
  ctx.clearRect(0,0,120,120);

  var bob = Math.sin(t*1.9)*3;
  var padW=50, padH=64, padR=8;
  var px = cx;
  var py = cy + bob;

  // ── 홀로그램 아이패드 (왼쪽 위, 별도 bob) ──
  var hBob = Math.sin(t*2.5 + 1.2)*4;
  var hpx = cx - 28;
  var hpy = cy - 18 + hBob;
  var hW=26, hH=33, hR=5;
  var hAlpha = 0.32 + Math.sin(t*3)*0.08;

  ctx.save();
  ctx.globalAlpha = hAlpha;
  // 홀로그램 베젤
  ctx.beginPath();
  rr(ctx, hpx - hW/2, hpy - hH/2, hW, hH, hR);
  ctx.fillStyle = 'rgba(0,220,200,0.18)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,255,220,0.7)';
  ctx.lineWidth = 1.2;
  ctx.stroke();
  // 홀로그램 화면
  ctx.beginPath();
  rr(ctx, hpx-hW/2+2, hpy-hH/2+2, hW-4, hH-4, hR-2);
  ctx.fillStyle = 'rgba(0,180,160,0.12)';
  ctx.fill();
  // 홀로그램 화면 에러 라인들
  ctx.globalAlpha = hAlpha * 1.5;
  for(var i=0; i<4; i++){
    var lp = (t*2.1 + i*0.9) % 3;
    if(lp < 1.4){
      var lv = Math.sin((lp/1.4)*Math.PI);
      var ly = hpy - hH/2 + 3 + ((i/4)*0.9 + Math.sin(t*3+i)*0.05)*(hH-6);
      ctx.beginPath();
      ctx.rect(hpx-hW/2+3, ly, (hW-6)*(0.5+Math.sin(t*4+i)*0.4), 1);
      ctx.fillStyle = 'rgba(0,255,220,'+(lv*0.9)+')';
      ctx.fill();
    }
  }
  // 홀로그램 카메라 점
  ctx.globalAlpha = hAlpha;
  ctx.beginPath();
  ctx.arc(hpx, hpy-hH/2+3, 1, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,255,220,0.8)';
  ctx.fill();
  // 홀로그램 연결선 (본체 방향으로 가는 점선)
  ctx.setLineDash([2,3]);
  ctx.beginPath();
  ctx.moveTo(hpx+hW/2, hpy+4);
  ctx.lineTo(px-padW/2, py-8);
  ctx.strokeStyle = 'rgba(0,255,210,0.35)';
  ctx.lineWidth = 0.8;
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // ── 강화된 바닥 그림자 (더 크고 선명) ──
  var floorY = py + padH/2 + 14;
  var shadowScaleX = 1.55 + Math.sin(t*1.9)*0.06;
  var shadowAlpha = 0.92 - Math.abs(Math.sin(t*1.9))*0.06;

  // 외곽 후광 링
  ctx.save();
  ctx.translate(cx, floorY);
  ctx.scale(shadowScaleX*1.4, 0.30);
  ctx.beginPath();
  ctx.arc(0, 0, padW*0.72, 0, Math.PI*2);
  var outerRing = ctx.createRadialGradient(0,0,0,0,0,padW*0.72);
  outerRing.addColorStop(0, 'rgba(0,200,170,0.18)');
  outerRing.addColorStop(0.7, 'rgba(0,180,150,0.08)');
  outerRing.addColorStop(1, 'rgba(0,160,130,0)');
  ctx.fillStyle = outerRing;
  ctx.fill();
  ctx.restore();

  // 메인 그림자 (매우 진하고 뚜렷)
  ctx.save();
  ctx.translate(cx, floorY);
  ctx.scale(shadowScaleX, 0.30);
  ctx.beginPath();
  ctx.arc(0, 0, padW*0.64, 0, Math.PI*2);
  var shadowGrad = ctx.createRadialGradient(0,0,0, 0,0, padW*0.64);
  shadowGrad.addColorStop(0, 'rgba(0,255,220,'+(shadowAlpha)+')');
  shadowGrad.addColorStop(0.45, 'rgba(0,220,195,'+(shadowAlpha*0.9)+')');
  shadowGrad.addColorStop(1, 'rgba(0,180,160,0)');
  ctx.fillStyle = shadowGrad;
  ctx.fill();
  ctx.restore();

  // 그림자 윤곽선 (선명한 테두리 + 가끔 글리치)
  ctx.save();
  ctx.translate(cx, floorY);
  ctx.scale(shadowScaleX, 0.30);
  ctx.beginPath();
  ctx.arc(0, 0, padW*0.60, 0, Math.PI*2);
  var edgeA = 0.65 + Math.sin(t*6)*0.2;
  ctx.strokeStyle = 'rgba(0,255,220,'+edgeA+')';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();

  // 그림자 글리치 (가끔 선이 튐)
  var sGlitchPhase = (t*1.8) % 5;
  if(sGlitchPhase < 0.35){
    var gv = 1 - sGlitchPhase/0.35;
    ctx.save();
    ctx.translate(cx, floorY);
    ctx.scale(shadowScaleX*1.08, 0.30);
    ctx.beginPath();
    ctx.arc(0, 0, padW*0.60, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(80,255,230,'+(gv*0.5)+')';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.restore();
  }

  // ── 그림자 안 얼굴 (더 크고 진하게) ──
  var faceX = cx;
  var faceY = floorY;
  var blinkShadow = Math.sin(t*1.5) > 0.88;
  if(!blinkShadow){
    [-11, 11].forEach(function(ox){
      ctx.save();
      ctx.translate(faceX+ox, faceY);
      ctx.scale(1, 0.42);
      ctx.beginPath();
      ctx.arc(0, 0, 6.5, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(0,30,28,0.98)';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(0.6, -0.6, 3.2, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(200,255,245,1.0)';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(1.8, -1.8, 1.2, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,1.0)';
      ctx.fill();
      ctx.restore();
    });
  } else {
    [-11,11].forEach(function(ox){
      ctx.beginPath();
      ctx.moveTo(faceX+ox-6.5, faceY);
      ctx.lineTo(faceX+ox+6.5, faceY);
      ctx.strokeStyle = 'rgba(200,255,245,0.95)';
      ctx.lineWidth = 2.2;
      ctx.lineCap = 'round';
      ctx.stroke();
    });
  }
  ctx.save();
  ctx.translate(faceX, faceY+3);
  ctx.scale(1, 0.38);
  ctx.beginPath();
  ctx.arc(0, 0, 11, 0.15*Math.PI, 0.85*Math.PI);
  ctx.strokeStyle = 'rgba(0,30,28,0.98)';
  ctx.lineWidth = 3.5;
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.restore();

  // ── 아이패드 본체 ──
  var bezelGrad = ctx.createLinearGradient(px-padW/2, py-padH/2, px+padW/2, py+padH/2);
  bezelGrad.addColorStop(0, '#252a2e');
  bezelGrad.addColorStop(1, '#141820');
  ctx.beginPath();
  rr(ctx, px - padW/2, py - padH/2, padW, padH, padR);
  ctx.fillStyle = bezelGrad;
  ctx.fill();
  // 베젤 테두리 — 청록 틴트 (에너지 넘침)
  ctx.strokeStyle = 'rgba(0,220,200,0.55)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // 화면
  var screenPad = 4;
  var sx = px - padW/2 + screenPad;
  var sy = py - padH/2 + screenPad;
  var sw = padW - screenPad*2;
  var sh = padH - screenPad*2;

  ctx.beginPath();
  rr(ctx, sx, sy, sw, sh, padR-2);
  ctx.fillStyle = '#080f12';
  ctx.fill();

  // 화면 클립
  ctx.save();
  ctx.beginPath();
  rr(ctx, sx, sy, sw, sh, padR-2);
  ctx.clip();

  // 화면 청록 베이스 (더 밝게)
  var screenBase = ctx.createRadialGradient(px, py, 5, px, py, 30);
  screenBase.addColorStop(0, 'rgba(0,220,195,0.14)');
  screenBase.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.rect(sx, sy, sw, sh);
  ctx.fillStyle = screenBase;
  ctx.fill();

  // ── 에러 텍스트 표시 (화면 위쪽) ──
  var errMsgs = ['ERR','NULL','0x??','FAIL','>>>','###'];
  for(var i=0; i<4; i++){
    var ep = (t*1.1 + i*1.4) % 5;
    if(ep < 1.8){
      var ev = ep < 0.2 ? ep/0.2 : ep > 1.5 ? (1.8-ep)/0.3 : 1;
      var ex = sx + 3 + ((i%3)/2)*sw*0.6;
      var ey = sy + 5 + Math.floor(i/3)*10 + Math.sin(t*2+i)*1.5;
      ctx.globalAlpha = ev * (0.7 + Math.sin(t*8+i)*0.2);
      ctx.font = 'bold 7px monospace';
      ctx.fillStyle = 'rgba(0,255,220,1)';
      ctx.fillText(errMsgs[i % errMsgs.length], ex, ey);
      ctx.globalAlpha = 1;
    }
  }

  // ── 강화된 글리치 가로 라인 (더 많고 강함) ──
  for(var i=0; i<14; i++){
    var seed = i*1.3;
    var phase = (t*2.0 + seed) % 2.8;
    if(phase < 1.6){
      var visibility = Math.sin((phase/1.6)*Math.PI);
      var ly = sy + ((Math.sin(seed*6.1)+1)*0.5)*sh + Math.sin(t*5+i)*1.5;
      var lh = 1 + Math.floor(Math.sin(t*9+i*2)*1+1);
      var lOff = Math.sin(t*4+i)*sw*0.2;
      var lW = sw*(0.55 + Math.sin(t*2.5+i)*0.35);
      ctx.beginPath();
      ctx.rect(sx + lOff + (sw-lW)*0.2, ly, lW, lh);
      ctx.fillStyle = 'rgba(0,255,220,'+(visibility*0.85)+')';
      ctx.fill();
    }
  }

  // ── 글리치 블록 (더 많고 자주) ──
  for(var i=0; i<9; i++){
    var seed = i*1.8;
    var phase = (t*2.8 + seed) % 3.5;
    if(phase < 0.5){
      var visibility = 1 - phase/0.5;
      var bx = sx + ((Math.sin(seed*4.3)+1)*0.5)*sw*0.85;
      var by = sy + ((Math.cos(seed*3.9)+1)*0.5)*sh*0.9;
      var bw = 7 + Math.sin(seed*2.1)*5;
      var bh = 2 + Math.sin(seed*3.1)*1.5;
      ctx.beginPath();
      ctx.rect(bx, by, bw, bh);
      ctx.fillStyle = 'rgba(80,255,210,'+(visibility*0.9)+')';
      ctx.fill();
    }
  }

  // ── RGB 분리 (더 자주) ──
  var rgbPhase = (t*1.1) % 3;
  if(rgbPhase < 0.6){
    var rv = 1 - rgbPhase/0.6;
    ctx.fillStyle = 'rgba(0,255,220,'+(rv*0.18)+')';
    ctx.fillRect(sx+3, sy, sw, sh);
    ctx.fillStyle = 'rgba(255,60,180,'+(rv*0.14)+')';
    ctx.fillRect(sx-3, sy, sw, sh);
  }

  // ── 픽셀 노이즈 (많이) ──
  for(var i=0; i<22; i++){
    var np = (t*3.5 + i*0.28) % 1;
    if(np < 0.3){
      var nx = sx + Math.sin(i*8.7+Math.floor(t*5))*sw*0.44 + sw*0.5;
      var ny = sy + Math.cos(i*6.9+Math.floor(t*5))*sh*0.44 + sh*0.5;
      ctx.beginPath();
      ctx.arc(nx, ny, 0.9, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(160,255,230,'+(1-np/0.3)*0.75+')';
      ctx.fill();
    }
  }

  // 스캔라인 (빠름)
  var scanY = sy + ((t*20) % (sh+10)) - 5;
  if(scanY > sy && scanY < sy+sh){
    var sG = ctx.createLinearGradient(sx, scanY-3, sx, scanY+3);
    sG.addColorStop(0,'transparent');
    sG.addColorStop(0.5,'rgba(0,255,220,0.25)');
    sG.addColorStop(1,'transparent');
    ctx.fillStyle = sG;
    ctx.fillRect(sx, scanY-3, sw, 6);
  }

  ctx.restore(); // 클립 해제

  // 화면 반사광
  ctx.beginPath();
  rr(ctx, sx+2, sy+2, sw*0.45, 10, 3);
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.fill();

  // 홈 버튼 (가끔 에러 깜빡)
  ctx.beginPath();
  ctx.arc(px, py+padH/2-7, 4, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(0,200,180,0.5)';
  ctx.lineWidth = 1;
  ctx.stroke();
  if((t*3) % 4 < 0.3){
    ctx.beginPath();
    ctx.arc(px, py+padH/2-7, 3, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,255,220,0.5)';
    ctx.fill();
  }

  // 카메라
  ctx.beginPath();
  ctx.arc(px, py-padH/2+5, 2, 0, Math.PI*2);
  ctx.fillStyle = '#080c10';
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,200,180,0.5)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // 베젤 하이라이트
  ctx.beginPath();
  ctx.moveTo(px-padW/2+padR, py-padH/2);
  ctx.lineTo(px+padW/2-padR, py-padH/2);
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // 전체 청록 글로우 (강해짐)
  var glowGrad = ctx.createRadialGradient(cx, cy, 10, cx, cy, 65);
  glowGrad.addColorStop(0, 'transparent');
  glowGrad.addColorStop(1, 'rgba(0,220,195,'+(0.12+Math.sin(t*2)*0.05)+')');
  ctx.beginPath();
  ctx.arc(cx, cy, 65, 0, Math.PI*2);
  ctx.fillStyle = glowGrad;
  ctx.fill();
}

function drawMERCUSYS_EVO3(ctx, t) {
  var cx=60, cy=52;
  ctx.clearRect(0,0,120,120);

  var bob = Math.sin(t*1.9)*2.5;
  var padW=50, padH=64, padR=8;
  var px = cx;
  var py = cy + bob;
  var screenPad = 4;
  var sx = px - padW/2 + screenPad;
  var sy = py - padH/2 + screenPad;
  var sw = padW - screenPad*2;
  var sh = padH - screenPad*2;

  // ══════════════════════════════════════
  // ── 글리치 손 (오른쪽, 가끔 왼쪽도) ──
  // ══════════════════════════════════════
  function drawGlitchHand(hx, hy, facing, alpha, t, seed) {
    ctx.save();
    ctx.globalAlpha = alpha;
    // 손목 ~ 손바닥 베이스
    var palmW = 13, palmH = 15;
    var wristX = hx + (facing > 0 ? -palmW/2 : palmW/2);

    // 손바닥 (픽셀 깨진 실루엣 — 여러 rect 쌓기)
    var palmColor = 'rgba(0,255,210,';
    // 손바닥 블록
    var blocks = [
      [hx - palmW/2,        hy - palmH/2,      palmW,    palmH],
      [hx - palmW/2 + 2,    hy - palmH/2 - 3,  palmW-4,  4],
    ];
    blocks.forEach(function(b) {
      // 글리치 오프셋
      var gx = Math.floor(Math.sin(t*7+seed+b[0])*2);
      var gy = Math.floor(Math.cos(t*6+seed+b[1])*1);
      ctx.beginPath();
      ctx.rect(b[0]+gx, b[1]+gy, b[2], b[3]);
      ctx.fillStyle = palmColor+'0.22)';
      ctx.fill();
      ctx.strokeStyle = palmColor+'0.7)';
      ctx.lineWidth = 0.8;
      ctx.stroke();
    });

    // 손가락 4개 (위로 뻗음)
    var fingers = [
      [-5, -9, 3, 10],
      [-1, -11, 3, 12],
      [ 3, -10, 3, 11],
      [ 7, -7,  3, 8],
    ];
    fingers.forEach(function(f, fi) {
      var fgx = Math.floor(Math.sin(t*9+seed+fi*2.3)*2.5);
      var fgy = Math.floor(Math.cos(t*7+seed+fi*1.7)*1.5);
      ctx.beginPath();
      ctx.rect(hx + f[0] + fgx, hy + f[1] + fgy, f[2], f[3]);
      // 깜빡임 — 손가락마다 개별
      var fingerAlpha = 0.15 + Math.sin(t*11+fi*3.1+seed)*0.12;
      ctx.fillStyle = 'rgba(0,255,210,'+fingerAlpha+')';
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,255,210,'+(0.5+Math.sin(t*9+fi)*0.3)+')';
      ctx.lineWidth = 0.7;
      ctx.stroke();
    });

    // 손목 연결 (아래로 흐릿)
    var wristGrad = ctx.createLinearGradient(hx, hy+palmH/2, hx, hy+palmH/2+12);
    wristGrad.addColorStop(0, 'rgba(0,255,210,0.35)');
    wristGrad.addColorStop(1, 'rgba(0,255,210,0)');
    ctx.beginPath();
    ctx.rect(hx - 5, hy + palmH/2 - 2, 10, 12);
    ctx.fillStyle = wristGrad;
    ctx.fill();

    // 손 전체 글리치 슬라이스 — 가끔 가로로 어긋남
    for(var i=0; i<4; i++){
      var sp = (t*4 + seed + i*0.7) % 3;
      if(sp < 0.25){
        var sv = 1 - sp/0.25;
        var sliceY = hy - palmH/2 + (i/4)*(palmH+15);
        var sliceOff = Math.sin(t*12+seed+i)*5;
        ctx.save();
        ctx.beginPath();
        ctx.rect(hx-palmW/2+sliceOff, sliceY, palmW, 2);
        ctx.fillStyle = 'rgba(0,255,210,'+(sv*0.6)+')';
        ctx.fill();
        ctx.restore();
      }
    }

    // 손 주변 픽셀 파편
    for(var i=0; i<8; i++){
      var pp = (t*5 + seed + i*0.4) % 1;
      if(pp < 0.4){
        var px2 = hx + Math.sin(i*7.3+t*3+seed)*16;
        var py2 = hy + Math.cos(i*5.7+t*2+seed)*14;
        ctx.beginPath();
        ctx.rect(px2, py2, 1+Math.sin(i)*1, 1);
        ctx.fillStyle = 'rgba(0,255,210,'+(1-pp/0.4)*0.7+')';
        ctx.fill();
      }
    }

    ctx.restore();
  }

  // 오른쪽 손 (항상 보임, 강도 변동)
  var rHandX = px + padW/2 + 10;
  var rHandY = py - 5 + Math.sin(t*2.3)*4;
  var rHandAlpha = 0.55 + Math.sin(t*3.1)*0.2;
  drawGlitchHand(rHandX, rHandY, 1, rHandAlpha, t, 0);

  // 왼쪽 손 (가끔만 나타남)
  var lHandPhase = (t*0.7) % 6;
  if(lHandPhase < 2.5){
    var lv = lHandPhase < 0.3 ? lHandPhase/0.3 : lHandPhase > 2.2 ? (2.5-lHandPhase)/0.3 : 1;
    var lHandX = px - padW/2 - 10;
    var lHandY = py + 5 + Math.sin(t*1.8+2)*5;
    ctx.save();
    ctx.scale(-1, 1);
    drawGlitchHand(-lHandX, lHandY, -1, lv*0.4, t, 5.5);
    ctx.restore();
  }

  // ══════════════════════════════════════
  // ── 홀로그램 아이패드 4개 ──
  // ══════════════════════════════════════
  var holos = [
    { ox:-30, oy:-22, bobS:2.7, bobP:1.1, size:0.48, alpha:0.38, seed:0   },
    { ox: 28, oy:-28, bobS:2.1, bobP:0.4, size:0.42, alpha:0.30, seed:2.3 },
    { ox:-22, oy: 20, bobS:3.1, bobP:2.0, size:0.36, alpha:0.25, seed:4.1 },
    { ox: 32, oy: 14, bobS:2.4, bobP:3.2, size:0.40, alpha:0.32, seed:6.7 },
  ];

  holos.forEach(function(h) {
    var hBob = Math.sin(t*h.bobS + h.bobP)*5;
    var hpx = cx + h.ox;
    var hpy = cy + h.oy + hBob;
    var hW = padW * h.size;
    var hH = padH * h.size;
    var hR = 4;
    var ha = h.alpha + Math.sin(t*2.2+h.seed)*0.07;

    ctx.save();
    ctx.globalAlpha = ha;
    ctx.beginPath();
    rr(ctx, hpx-hW/2, hpy-hH/2, hW, hH, hR);
    ctx.fillStyle = 'rgba(0,200,180,0.15)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,255,215,0.75)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // 홀로그램 화면 내부
    ctx.beginPath();
    rr(ctx, hpx-hW/2+2, hpy-hH/2+2, hW-4, hH-4, hR-1);
    ctx.fillStyle = 'rgba(0,160,145,0.1)';
    ctx.fill();

    // 내부 에러 라인
    ctx.globalAlpha = ha*1.8;
    for(var i=0; i<3; i++){
      var lp = (t*2.5 + h.seed + i*0.8) % 2.5;
      if(lp < 1.2){
        var lv = Math.sin((lp/1.2)*Math.PI);
        var ly = hpy - hH/2 + 2 + (i/3 + Math.sin(t*3+h.seed+i)*0.05)*(hH-4);
        ctx.beginPath();
        ctx.rect(hpx-hW/2+2, ly, (hW-4)*(0.4+Math.sin(t*5+h.seed+i)*0.5), 1);
        ctx.fillStyle = 'rgba(0,255,215,'+(lv*0.95)+')';
        ctx.fill();
      }
    }
    // 에러 텍스트 (큰 홀로그램에만)
    if(h.size >= 0.42){
      ctx.globalAlpha = ha * 1.4;
      var ep2 = (t*1.3 + h.seed) % 4;
      if(ep2 < 2){
        var ev2 = ep2 < 0.3 ? ep2/0.3 : ep2 > 1.6 ? (2-ep2)/0.4 : 1;
        ctx.globalAlpha = ha * ev2 * 1.6;
        ctx.font = 'bold 5px monospace';
        ctx.fillStyle = 'rgba(0,255,215,1)';
        var msgs = ['ERR','0xFF','NULL'];
        ctx.fillText(msgs[Math.floor(h.seed) % msgs.length], hpx-hW/2+2, hpy-hH/2+7);
      }
    }

    // 홀로그램 카메라 점
    ctx.globalAlpha = ha;
    ctx.beginPath();
    ctx.arc(hpx, hpy-hH/2+2, 0.8, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,255,215,0.9)';
    ctx.fill();
    ctx.restore();
  });

  // ══════════════════════════════════════
  // ── 바닥 그림자 (크고 선명, 에러 빛) ──
  // ══════════════════════════════════════
  var floorY = py + padH/2 + 15;
  var shadowScaleX = 1.75 + Math.sin(t*1.9)*0.05;
  var shadowAlpha = 0.97 - Math.abs(Math.sin(t*1.9))*0.04;

  ctx.save();
  ctx.translate(cx, floorY);
  ctx.scale(shadowScaleX*1.5, 0.28);
  ctx.beginPath();
  ctx.arc(0, 0, padW*0.78, 0, Math.PI*2);
  var outerRing = ctx.createRadialGradient(0,0,0,0,0,padW*0.78);
  outerRing.addColorStop(0, 'rgba(0,200,175,0.12)');
  outerRing.addColorStop(1, 'rgba(0,170,150,0)');
  ctx.fillStyle = outerRing;
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.translate(cx, floorY);
  ctx.scale(shadowScaleX, 0.28);
  ctx.beginPath();
  ctx.arc(0, 0, padW*0.68, 0, Math.PI*2);
  var shadowGrad = ctx.createRadialGradient(0,0,0, 0,0, padW*0.68);
  shadowGrad.addColorStop(0, 'rgba(0,255,220,'+shadowAlpha+')');
  shadowGrad.addColorStop(0.4, 'rgba(0,230,200,'+(shadowAlpha*0.92)+')');
  shadowGrad.addColorStop(1, 'rgba(0,180,160,0)');
  ctx.fillStyle = shadowGrad;
  ctx.fill();
  ctx.restore();

  // 윤곽선 (글리치로 이중)
  ctx.save();
  ctx.translate(cx, floorY);
  ctx.scale(shadowScaleX, 0.28);
  ctx.beginPath();
  ctx.arc(0, 0, padW*0.64, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(0,255,220,'+(0.75+Math.sin(t*7)*0.2)+')';
  ctx.lineWidth = 2.2;
  ctx.stroke();
  ctx.restore();

  // 바닥 그림자 얼굴
  var faceX = cx;
  var faceY = floorY;
  var blinkShadow = Math.sin(t*1.5) > 0.88;
  if(!blinkShadow){
    [-12,12].forEach(function(ox){
      ctx.save();
      ctx.translate(faceX+ox, faceY);
      ctx.scale(1, 0.40);
      ctx.beginPath();
      ctx.arc(0, 0, 7, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(0,20,18,0.99)';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(0.7,-0.7,3.6,0,Math.PI*2);
      ctx.fillStyle = 'rgba(220,255,248,1.0)';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(2,-2,1.4,0,Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,1.0)';
      ctx.fill();
      ctx.restore();
    });
  } else {
    [-12,12].forEach(function(ox){
      ctx.beginPath();
      ctx.moveTo(faceX+ox-7, faceY);
      ctx.lineTo(faceX+ox+7, faceY);
      ctx.strokeStyle = 'rgba(220,255,248,0.98)';
      ctx.lineWidth = 2.4;
      ctx.lineCap='round';
      ctx.stroke();
    });
  }
  ctx.save();
  ctx.translate(faceX, faceY+3);
  ctx.scale(1, 0.36);
  ctx.beginPath();
  ctx.arc(0,0,12,0.15*Math.PI,0.85*Math.PI);
  ctx.strokeStyle='rgba(0,20,18,0.99)';
  ctx.lineWidth=3.8;
  ctx.lineCap='round';
  ctx.stroke();
  ctx.restore();

  // ══════════════════════════════════════
  // ── 아이패드 본체 ──
  // ══════════════════════════════════════
  var bezelGrad = ctx.createLinearGradient(px-padW/2, py-padH/2, px+padW/2, py+padH/2);
  bezelGrad.addColorStop(0, '#202428');
  bezelGrad.addColorStop(1, '#0e1218');
  ctx.beginPath();
  rr(ctx, px-padW/2, py-padH/2, padW, padH, padR);
  ctx.fillStyle = bezelGrad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,255,200,0.7)';
  ctx.lineWidth = 1.8;
  ctx.stroke();

  // 화면
  ctx.beginPath();
  rr(ctx, sx, sy, sw, sh, padR-2);
  ctx.fillStyle = '#050c10';
  ctx.fill();

  // ── 화면 클립 시작 ──
  ctx.save();
  ctx.beginPath();
  rr(ctx, sx, sy, sw, sh, padR-2);
  ctx.clip();

  // ── 그림자 얼굴이 화면 안으로 스밈 ──
  // 화면 중심에 그림자 타원이 반쯤 올라와 있는 느낌
  var shadowInY = sy + sh * 0.72; // 화면 아래쪽에서 올라옴
  var shadowInAlpha = 0.55 + Math.sin(t*2.1)*0.12;

  ctx.save();
  ctx.translate(cx, shadowInY);
  ctx.scale(0.80, 0.38);
  ctx.beginPath();
  ctx.arc(0, 0, padW*0.55, 0, Math.PI*2);
  var inShadowGrad = ctx.createRadialGradient(0,0,0,0,0,padW*0.55);
  inShadowGrad.addColorStop(0, 'rgba(0,255,220,'+shadowInAlpha+')');
  inShadowGrad.addColorStop(0.5, 'rgba(0,220,195,'+(shadowInAlpha*0.7)+')');
  inShadowGrad.addColorStop(1, 'rgba(0,180,160,0)');
  ctx.fillStyle = inShadowGrad;
  ctx.fill();
  ctx.restore();

  // 화면 안 그림자 눈 (살짝 작게)
  var inFaceY = shadowInY - 3;
  var blinkIn = Math.sin(t*1.5+0.5) > 0.88;
  if(!blinkIn){
    [-8,8].forEach(function(ox){
      ctx.save();
      ctx.translate(cx+ox, inFaceY);
      ctx.scale(1, 0.40);
      ctx.beginPath();
      ctx.arc(0,0,5,0,Math.PI*2);
      ctx.fillStyle='rgba(0,20,16,0.98)';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(0.5,-0.5,2.5,0,Math.PI*2);
      ctx.fillStyle='rgba(200,255,245,1.0)';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(1.4,-1.4,1,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,1.0)';
      ctx.fill();
      ctx.restore();
    });
  } else {
    [-8,8].forEach(function(ox){
      ctx.beginPath();
      ctx.moveTo(cx+ox-5, inFaceY);
      ctx.lineTo(cx+ox+5, inFaceY);
      ctx.strokeStyle='rgba(200,255,245,0.9)';
      ctx.lineWidth=1.8;
      ctx.lineCap='round';
      ctx.stroke();
    });
  }
  ctx.save();
  ctx.translate(cx, inFaceY+2);
  ctx.scale(1, 0.35);
  ctx.beginPath();
  ctx.arc(0,0,8,0.15*Math.PI,0.85*Math.PI);
  ctx.strokeStyle='rgba(0,20,16,0.98)';
  ctx.lineWidth=3;
  ctx.lineCap='round';
  ctx.stroke();
  ctx.restore();

  // ── 화면 베이스 글로우 ──
  var screenBase = ctx.createRadialGradient(px, py, 5, px, py, 30);
  screenBase.addColorStop(0, 'rgba(0,230,205,0.16)');
  screenBase.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.rect(sx, sy, sw, sh);
  ctx.fillStyle = screenBase;
  ctx.fill();

  // ── 에러 텍스트 폭증 ──
  var errMsgs2 = ['ERR','NULL','0xFF','FAIL','>>>','###','BRK','???','!!!','---'];
  for(var i=0; i<8; i++){
    var ep = (t*1.3 + i*1.1) % 4.5;
    if(ep < 2.0){
      var ev = ep < 0.2 ? ep/0.2 : ep > 1.7 ? (2.0-ep)/0.3 : 1;
      var col = i % 3;
      var row = Math.floor(i / 3);
      var ex = sx + 2 + col*(sw/3) + Math.sin(t*3+i)*2;
      var ey = sy + 7 + row*10 + Math.sin(t*2+i*0.7)*1.5;
      ctx.globalAlpha = ev * (0.75 + Math.sin(t*9+i)*0.18);
      ctx.font = 'bold 6px monospace';
      ctx.fillStyle = i % 2 === 0 ? 'rgba(0,255,210,1)' : 'rgba(120,255,220,1)';
      ctx.fillText(errMsgs2[i % errMsgs2.length], ex, ey);
      ctx.globalAlpha = 1;
    }
  }

  // ── 글리치 라인 (매우 많음) ──
  for(var i=0; i<20; i++){
    var seed = i*1.1;
    var phase = (t*2.4 + seed) % 2.4;
    if(phase < 1.5){
      var visibility = Math.sin((phase/1.5)*Math.PI);
      var ly = sy + ((Math.sin(seed*5.3)+1)*0.5)*sh + Math.sin(t*6+i)*2;
      var lh = 1 + (i % 3 === 0 ? 2 : 1);
      var lOff = Math.sin(t*5+i)*sw*0.22;
      var lW = sw*(0.4 + Math.sin(t*3+i)*0.45);
      ctx.beginPath();
      ctx.rect(sx + lOff + (sw-lW)*0.15, ly, lW, lh);
      ctx.fillStyle = 'rgba(0,255,215,'+(visibility*0.9)+')';
      ctx.fill();
    }
  }

  // ── 글리치 블록 (많고 자주) ──
  for(var i=0; i<14; i++){
    var seed = i*1.5;
    var phase = (t*3.2 + seed) % 3;
    if(phase < 0.5){
      var visibility = 1 - phase/0.5;
      var bx = sx + ((Math.sin(seed*3.7)+1)*0.5)*sw*0.88;
      var by = sy + ((Math.cos(seed*3.1)+1)*0.5)*sh*0.92;
      var bw = 8 + Math.sin(seed*1.9)*6;
      var bh = 2 + Math.sin(seed*2.7)*2;
      ctx.beginPath();
      ctx.rect(bx, by, bw, bh);
      ctx.fillStyle = 'rgba(80,255,215,'+(visibility*0.95)+')';
      ctx.fill();
    }
  }

  // ── RGB 분리 (잦고 강함) ──
  var rgbPhase = (t*1.4) % 2.5;
  if(rgbPhase < 0.6){
    var rv = 1 - rgbPhase/0.6;
    ctx.fillStyle = 'rgba(0,255,215,'+(rv*0.22)+')';
    ctx.fillRect(sx+4, sy, sw, sh);
    ctx.fillStyle = 'rgba(255,50,180,'+(rv*0.16)+')';
    ctx.fillRect(sx-4, sy, sw, sh);
  }

  // ── 픽셀 노이즈 ──
  for(var i=0; i<30; i++){
    var np = (t*4 + i*0.22) % 1;
    if(np < 0.28){
      var nx = sx + Math.sin(i*7.9+Math.floor(t*6))*sw*0.46 + sw*0.5;
      var ny = sy + Math.cos(i*6.1+Math.floor(t*6))*sh*0.46 + sh*0.5;
      ctx.beginPath();
      ctx.arc(nx, ny, 0.9, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(160,255,230,'+(1-np/0.28)*0.8+')';
      ctx.fill();
    }
  }

  // 스캔라인 (빠름)
  var scanY = sy + ((t*25) % (sh+10)) - 5;
  if(scanY > sy && scanY < sy+sh){
    var sG = ctx.createLinearGradient(sx, scanY-3, sx, scanY+3);
    sG.addColorStop(0,'transparent');
    sG.addColorStop(0.5,'rgba(0,255,215,0.3)');
    sG.addColorStop(1,'transparent');
    ctx.fillStyle = sG;
    ctx.fillRect(sx, scanY-3, sw, 6);
  }

  ctx.restore(); // 클립 해제

  // 화면 반사광
  ctx.beginPath();
  rr(ctx, sx+2, sy+2, sw*0.42, 10, 3);
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.fill();

  // 홈 버튼 (에러 깜빡)
  ctx.beginPath();
  ctx.arc(px, py+padH/2-7, 4, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(0,255,200,0.6)';
  ctx.lineWidth = 1;
  ctx.stroke();
  if((t*4) % 3 < 0.25){
    ctx.beginPath();
    ctx.arc(px, py+padH/2-7, 3, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,255,200,0.55)';
    ctx.fill();
  }

  // 카메라
  ctx.beginPath();
  ctx.arc(px, py-padH/2+5, 2, 0, Math.PI*2);
  ctx.fillStyle = '#060a0e';
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,255,200,0.55)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // 베젤 하이라이트
  ctx.beginPath();
  ctx.moveTo(px-padW/2+padR, py-padH/2);
  ctx.lineTo(px+padW/2-padR, py-padH/2);
  ctx.strokeStyle = 'rgba(255,255,255,0.09)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // 전체 글로우 (강함)
  var glowGrad = ctx.createRadialGradient(cx, cy, 10, cx, cy, 68);
  glowGrad.addColorStop(0, 'transparent');
  glowGrad.addColorStop(0.7, 'rgba(0,220,195,0.1)');
  glowGrad.addColorStop(1, 'rgba(0,255,200,'+(0.16+Math.sin(t*2)*0.06)+')');
  ctx.beginPath();
  ctx.arc(cx, cy, 68, 0, Math.PI*2);
  ctx.fillStyle = glowGrad;
  ctx.fill();

  // 화면 밖으로 새어나오는 에러 텍스트 (패드 위아래)
  var leakMsgs = ['ERR','NULL','>>>','0xFF'];
  for(var i=0; i<4; i++){
    var lp = (t*0.9 + i*1.6) % 6;
    if(lp < 1.8){
      var lv = lp < 0.3 ? lp/0.3 : lp > 1.5 ? (1.8-lp)/0.3 : 1;
      var lx = px - padW/2 + 4 + (i%2)*(padW*0.55);
      // 위로 새어남
      var ly2 = py - padH/2 - 4 - (i>1 ? 7 : 0);
      ctx.globalAlpha = lv * 0.55;
      ctx.font = 'bold 5px monospace';
      ctx.fillStyle = 'rgba(0,255,210,1)';
      ctx.fillText(leakMsgs[i], lx, ly2);
      ctx.globalAlpha = 1;
    }
  }
}

function drawEFM_EVO1(ctx, t) {
  var cx=60, cy=58;
  ctx.clearRect(0,0,120,120);
  var bob = Math.sin(t*2.1)*2.5;
  var by = cy + bob;
  var pinAngle = Math.sin(t*3.2)*0.15;
  var pinOut = 3 + Math.sin(t*2.8)*2.5;
  var bodyTop=by-28, bodyBot=by+30, bodyW=26;

  // ── 공전 구슬 (3개, 각도 120도씩) ──
  var orbCount = 3;
  var orbRadius = 36;
  var orbSize = 5.5;
  for(var i=0; i<orbCount; i++){
    var oa = t*1.8 + (i/orbCount)*Math.PI*2;
    var ox = cx + Math.cos(oa)*orbRadius;
    var oy = by + Math.sin(oa)*orbRadius*0.55; // 살짝 납작한 타원궤도

    // 잔상 (2개)
    for(var tr2=1; tr2<=2; tr2++){
      var ta = oa - tr2*0.18;
      var tx2 = cx + Math.cos(ta)*orbRadius;
      var ty2 = by + Math.sin(ta)*orbRadius*0.55;
      ctx.beginPath();
      ctx.arc(tx2, ty2, orbSize*(1-tr2*0.25), 0, Math.PI*2);
      ctx.fillStyle='rgba(180,60,255,'+(0.15-tr2*0.05)+')';
      ctx.fill();
    }

    // 구슬 본체
    var orbGrad = ctx.createRadialGradient(ox-1,oy-1,0,ox,oy,orbSize);
    orbGrad.addColorStop(0,'#f0ccff');
    orbGrad.addColorStop(0.35,'#cc55ff');
    orbGrad.addColorStop(0.7,'#8811cc');
    orbGrad.addColorStop(1,'#44007a');
    ctx.beginPath();
    ctx.arc(ox,oy,orbSize,0,Math.PI*2);
    ctx.fillStyle=orbGrad;
    ctx.fill();

    // 구슬 글로우
    var orbGlow=ctx.createRadialGradient(ox,oy,0,ox,oy,orbSize*2.5);
    orbGlow.addColorStop(0,'rgba(200,80,255,0.35)');
    orbGlow.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(ox,oy,orbSize*2.5,0,Math.PI*2);
    ctx.fillStyle=orbGlow;ctx.fill();

    // 구슬 하이라이트
    ctx.beginPath();ctx.arc(ox-1.5,oy-1.5,1.5,0,Math.PI*2);
    ctx.fillStyle='rgba(255,240,255,0.75)';ctx.fill();
  }

  // ── 빛 방사 버스트 (수시로 "삥") ──
  // 버스트는 약 3초 주기, 0.3초간 퍼짐
  var burstCycle = t % 2.8;
  var burstActive = burstCycle < 0.35;
  var burstV = burstActive ? Math.sin((burstCycle/0.35)*Math.PI) : 0;

  if(burstV > 0.01){
    var burstR = burstV * 52;
    // 방사 라인들 (16개)
    for(var bi=0; bi<16; bi++){
      var ba = (bi/16)*Math.PI*2 + t*0.3;
      var bLen = burstR*(0.6 + Math.sin(bi*2.3)*0.3);
      var bx1 = cx + Math.cos(ba)*8;
      var by1 = by + Math.sin(ba)*8;
      var bx2 = cx + Math.cos(ba)*bLen;
      var by2 = by + Math.sin(ba)*bLen;
      ctx.beginPath();
      ctx.moveTo(bx1,by1);ctx.lineTo(bx2,by2);
      ctx.strokeStyle='rgba(220,130,255,'+(burstV*(0.5+Math.sin(bi)*0.2))+')';
      ctx.lineWidth=1+burstV*0.8;
      ctx.lineCap='round';ctx.stroke();
    }
    // 버스트 코어 링
    var ringGrad=ctx.createRadialGradient(cx,by,burstR*0.3,cx,by,burstR*0.9);
    ringGrad.addColorStop(0,'transparent');
    ringGrad.addColorStop(0.7,'rgba(200,80,255,'+(burstV*0.18)+')');
    ringGrad.addColorStop(1,'rgba(240,180,255,'+(burstV*0.08)+')');
    ctx.beginPath();ctx.arc(cx,by,burstR*0.9,0,Math.PI*2);
    ctx.fillStyle=ringGrad;ctx.fill();
    // 플래시 코어 (중앙 번쩍)
    var coreGrad=ctx.createRadialGradient(cx,by,0,cx,by,14);
    coreGrad.addColorStop(0,'rgba(255,240,255,'+(burstV*0.9)+')');
    coreGrad.addColorStop(0.4,'rgba(220,120,255,'+(burstV*0.5)+')');
    coreGrad.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(cx,by,14,0,Math.PI*2);
    ctx.fillStyle=coreGrad;ctx.fill();
  }

  // 소형 버스트 (작은 것, 다른 타이밍)
  var burst2Cycle = (t+1.4) % 2.8;
  var burst2V = burst2Cycle < 0.25 ? Math.sin((burst2Cycle/0.25)*Math.PI) : 0;
  if(burst2V > 0.01){
    for(var bi2=0; bi2<10; bi2++){
      var ba2=(bi2/10)*Math.PI*2+t*0.5;
      var bLen2=burst2V*30*(0.5+Math.sin(bi2*1.7)*0.4);
      ctx.beginPath();
      ctx.moveTo(cx+Math.cos(ba2)*6, by+Math.sin(ba2)*6);
      ctx.lineTo(cx+Math.cos(ba2)*bLen2, by+Math.sin(ba2)*bLen2);
      ctx.strokeStyle='rgba(240,180,255,'+(burst2V*0.55)+')';
      ctx.lineWidth=0.8;ctx.lineCap='round';ctx.stroke();
    }
  }

  // ── 레버 ──
  ctx.beginPath();
  ctx.moveTo(cx-12,by-34);ctx.lineTo(cx-19,by-27+Math.sin(t*2.8)*1.5);ctx.lineTo(cx-17,by-21);
  ctx.strokeStyle='rgba(210,150,255,0.9)';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();

  // ── 상단 캡 ──
  var capGrad=ctx.createLinearGradient(cx-13,by-38,cx+13,by-30);
  capGrad.addColorStop(0,'#aa55dd');capGrad.addColorStop(1,'#6611bb');
  ctx.beginPath();rr(ctx,cx-13,by-38,26,10,[5,5,0,0]);
  ctx.fillStyle=capGrad;ctx.fill();
  ctx.strokeStyle='rgba(200,100,255,0.7)';ctx.lineWidth=1.5;ctx.stroke();

  // ── 핀 + 스파크 ──
  ctx.save();
  ctx.translate(cx+4, by-38);
  ctx.rotate(pinAngle);
  // 핀 고리
  ctx.beginPath();
  ctx.arc(0,-pinOut-7,5,0,Math.PI*2);
  ctx.strokeStyle='rgba(230,190,255,0.98)';ctx.lineWidth=2.8;ctx.stroke();
  // 핀 코어 글로우
  var pinGlow=ctx.createRadialGradient(0,-pinOut-7,0,0,-pinOut-7,10);
  pinGlow.addColorStop(0,'rgba(220,140,255,0.25)');
  pinGlow.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(0,-pinOut-7,10,0,Math.PI*2);ctx.fillStyle=pinGlow;ctx.fill();
  // 핀 막대
  ctx.beginPath();
  ctx.moveTo(0,-pinOut);ctx.lineTo(0,3);
  ctx.strokeStyle='rgba(240,200,255,0.98)';ctx.lineWidth=2.2;ctx.lineCap='round';ctx.stroke();

  // 핀 스파크 (6개, 핀 고리 주변에서 튐)
  for(var si=0; si<6; si++){
    var sp=(t*6+si*0.55)%1;
    var sa=(si/6)*Math.PI*2+t*2.1;
    var sLen=sp*(5+Math.sin(si*2.3)*3);
    var sx2=Math.cos(sa)*sLen;
    var sy2=-pinOut-7+Math.sin(sa)*sLen;
    var sAlpha=(1-sp)*0.9;
    ctx.beginPath();
    ctx.moveTo(0,-pinOut-7);ctx.lineTo(sx2,sy2);
    ctx.strokeStyle='rgba(230,150,255,'+sAlpha+')';
    ctx.lineWidth=0.9+sp*0.5;ctx.lineCap='round';ctx.stroke();
    // 스파크 끝 점
    ctx.beginPath();ctx.arc(sx2,sy2,0.8+sAlpha*0.6,0,Math.PI*2);
    ctx.fillStyle='rgba(255,220,255,'+sAlpha+')';ctx.fill();
  }
  // 전기 지직 (핀 막대 따라)
  for(var zi=0; zi<4; zi++){
    var zp=(t*8+zi*0.3)%1;
    var zy=-pinOut+zp*pinOut*0.8;
    var zx=Math.sin(t*15+zi*3)*3*(1-zp);
    ctx.beginPath();ctx.arc(zx,zy,0.7,0,Math.PI*2);
    ctx.fillStyle='rgba(200,100,255,'+(1-zp)*0.8+')';ctx.fill();
  }
  ctx.restore();

  // ── 몸체 ──
  var bodyGrad=ctx.createLinearGradient(cx-bodyW/2,0,cx+bodyW/2,0);
  bodyGrad.addColorStop(0,'#8822dd');bodyGrad.addColorStop(0.25,'#bb55ff');
  bodyGrad.addColorStop(0.6,'#9933dd');bodyGrad.addColorStop(1,'#5511bb');
  ctx.beginPath();rr(ctx,cx-bodyW/2,bodyTop,bodyW,bodyBot-bodyTop,4);
  ctx.fillStyle=bodyGrad;ctx.fill();
  ctx.strokeStyle='rgba(200,100,255,'+(0.6+Math.sin(t*3)*0.2)+')';ctx.lineWidth=1.8;ctx.stroke();

  // 몸체 하이라이트
  ctx.beginPath();rr(ctx,cx-bodyW/2+2,bodyTop+3,6,bodyBot-bodyTop-6,2);
  ctx.fillStyle='rgba(240,200,255,0.12)';ctx.fill();

  // 구멍들 (빛 새나옴 강화)
  [{y:by-16,cols:[-7,0,7]},{y:by-4,cols:[-7,0,7]},{y:by+8,cols:[-7,0,7]}].forEach(function(row){
    row.cols.forEach(function(hox){
      ctx.beginPath();ctx.arc(cx+hox,row.y,3.2,0,Math.PI*2);ctx.fillStyle='#12002a';ctx.fill();
      ctx.strokeStyle='rgba(160,50,240,0.6)';ctx.lineWidth=1;ctx.stroke();
      var hGlow=ctx.createRadialGradient(cx+hox,row.y,0,cx+hox,row.y,5);
      hGlow.addColorStop(0,'rgba(220,120,255,'+(0.3+Math.sin(t*6+hox)*0.18)+')');
      hGlow.addColorStop(1,'transparent');
      ctx.beginPath();ctx.arc(cx+hox,row.y,5,0,Math.PI*2);ctx.fillStyle=hGlow;ctx.fill();
    });
  });

  // 구분 띠
  [by-20,by+0,by+18].forEach(function(ry){
    ctx.beginPath();rr(ctx,cx-bodyW/2-1,ry,bodyW+2,3,1);
    ctx.fillStyle='rgba(110,20,200,0.8)';ctx.fill();
    ctx.strokeStyle='rgba(180,70,255,0.5)';ctx.lineWidth=0.6;ctx.stroke();
  });

  // ── 하단 캡 ──
  ctx.beginPath();rr(ctx,cx-bodyW/2,bodyBot,bodyW,8,[0,0,4,4]);
  ctx.fillStyle='#5511bb';ctx.fill();
  ctx.strokeStyle='rgba(160,50,240,0.6)';ctx.lineWidth=1.2;ctx.stroke();

  // ── 눈 ──
  var blink=Math.sin(t*1.6)>0.9;
  var eyeY=by-4;
  [-6,6].forEach(function(ox,i){
    if(!blink){
      ctx.beginPath();ctx.arc(cx+ox,eyeY,5.8,0,Math.PI*2);ctx.fillStyle='#f4eaff';ctx.fill();
      var pd=Math.sin(t*1.8+i)*0.8;
      ctx.beginPath();ctx.arc(cx+ox+pd,eyeY,3.4,0,Math.PI*2);
      var ig=ctx.createRadialGradient(cx+ox+pd,eyeY,0,cx+ox+pd,eyeY,3.4);
      ig.addColorStop(0,'#ff99ff');ig.addColorStop(0.4,'#cc33ff');ig.addColorStop(1,'#7700bb');
      ctx.fillStyle=ig;ctx.fill();
      ctx.beginPath();ctx.arc(cx+ox+pd,eyeY,1.5,0,Math.PI*2);ctx.fillStyle='#060008';ctx.fill();
      ctx.beginPath();ctx.arc(cx+ox+pd+1.5,eyeY-1.5,1.1,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fill();
      // 눈 주변 미세 스파크
      if(Math.sin(t*9+i*3)>0.7){
        ctx.beginPath();ctx.arc(cx+ox+Math.cos(t*8+i)*7,eyeY+Math.sin(t*7+i)*5,0.8,0,Math.PI*2);
        ctx.fillStyle='rgba(220,150,255,0.7)';ctx.fill();
      }
    } else {
      ctx.beginPath();ctx.moveTo(cx+ox-5.5,eyeY);ctx.lineTo(cx+ox+5.5,eyeY);
      ctx.strokeStyle='rgba(230,170,255,0.9)';ctx.lineWidth=2.4;ctx.lineCap='round';ctx.stroke();
    }
  });

  // ── 이빨 ──
  [{x:cx-9,w:5,h:9},{x:cx-2,w:6,h:12},{x:cx+5,w:5,h:9}].forEach(function(tooth){
    ctx.beginPath();ctx.moveTo(tooth.x,bodyBot+8);ctx.lineTo(tooth.x+tooth.w/2,bodyBot+8+tooth.h);
    ctx.lineTo(tooth.x+tooth.w,bodyBot+8);ctx.closePath();
    ctx.fillStyle='#f4eaff';ctx.fill();
    ctx.strokeStyle='rgba(180,70,240,0.4)';ctx.lineWidth=0.8;ctx.stroke();
  });

  // ── 전체 글로우 (강해짐) ──
  var glowGrad=ctx.createRadialGradient(cx,by,10,cx,by,58);
  glowGrad.addColorStop(0,'rgba(180,60,255,0.1)');
  glowGrad.addColorStop(0.5,'rgba(160,40,240,0.06)');
  glowGrad.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(cx,by,58,0,Math.PI*2);ctx.fillStyle=glowGrad;ctx.fill();
}

function drawEFM_EVO2(ctx, t) {
  var cx=60, cy=57;
  ctx.clearRect(0,0,120,120);
  var bob = Math.sin(t*2.1)*2;
  var by = cy + bob;
  var bodyTop=by-29, bodyBot=by+31, bodyW=26;

  // ── 원자형 구슬 궤도 3축 ──
  // 축 0: 수평에 가까운 타원 (기본)
  // 축 1: 45도 기울어진 궤도
  // 축 2: -45도 기울어진 궤도
  var orbSpeed = 3.8; // 빠르게
  var orbDefs = [
    { tilt:0,         rx:38, ry:20, speed: orbSpeed,      ballR:5.0, seed:0   },
    { tilt: Math.PI/3, rx:36, ry:19, speed: orbSpeed*1.15, ballR:4.5, seed:2.1 },
    { tilt:-Math.PI/3, rx:36, ry:19, speed: orbSpeed*0.9,  ballR:4.5, seed:4.3 },
  ];

  orbDefs.forEach(function(od, oi) {
    var angle = t*od.speed + od.seed;

    // 궤도 링 (희미하게)
    ctx.save();
    ctx.translate(cx, by);
    ctx.rotate(od.tilt);
    ctx.scale(1, od.ry/od.rx);
    ctx.beginPath();
    ctx.arc(0, 0, od.rx, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(140,60,220,'+(0.08+oi*0.03)+')';
    ctx.lineWidth = 0.8;
    ctx.setLineDash([3,4]);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // 구슬 위치 계산 (기울어진 궤도 위)
    var rawX = Math.cos(angle)*od.rx;
    var rawY = Math.sin(angle)*od.ry;
    // tilt 적용
    var ox = cx + rawX*Math.cos(od.tilt) - rawY*Math.sin(od.tilt);
    var oy = by + rawX*Math.sin(od.tilt) + rawY*Math.cos(od.tilt);

    // 잔상 3개
    for(var tr2=1; tr2<=3; tr2++){
      var ta = angle - tr2*0.12;
      var trx = Math.cos(ta)*od.rx;
      var try2 = Math.sin(ta)*od.ry;
      var tx2 = cx + trx*Math.cos(od.tilt) - try2*Math.sin(od.tilt);
      var ty2 = by + trx*Math.sin(od.tilt) + try2*Math.cos(od.tilt);
      ctx.beginPath();
      ctx.arc(tx2, ty2, od.ballR*(1-tr2*0.22), 0, Math.PI*2);
      // 잔상도 보라→초록 그라데이션
      var trGreen = oi === 0 ? 0.1 : 0.3;
      ctx.fillStyle='rgba('+(160-oi*20)+','+(80+oi*60)+','+(255-oi*40)+','+(0.18-tr2*0.05)+')';
      ctx.fill();
    }

    // 구슬 본체 — 보라+초록 그라데이션 (궤도마다 색 조금씩 다름)
    var orbGrad = ctx.createRadialGradient(ox-1,oy-1,0, ox,oy,od.ballR);
    if(oi === 0){
      // 첫 번째: 보라 주
      orbGrad.addColorStop(0,'#f0d0ff');
      orbGrad.addColorStop(0.3,'#cc55ff');
      orbGrad.addColorStop(0.7,'#7711cc');
      orbGrad.addColorStop(1,'#330077');
    } else if(oi === 1){
      // 두 번째: 보라+초록 믹스
      orbGrad.addColorStop(0,'#d8ffee');
      orbGrad.addColorStop(0.3,'#88ddaa');
      orbGrad.addColorStop(0.65,'#5588dd');
      orbGrad.addColorStop(1,'#221166');
    } else {
      // 세 번째: 초록 틴트
      orbGrad.addColorStop(0,'#ccffdd');
      orbGrad.addColorStop(0.3,'#44ee88');
      orbGrad.addColorStop(0.65,'#2299aa');
      orbGrad.addColorStop(1,'#004433');
    }
    ctx.beginPath();
    ctx.arc(ox,oy,od.ballR,0,Math.PI*2);
    ctx.fillStyle=orbGrad;
    ctx.fill();

    // 구슬 글로우
    var gCol = oi===0 ? '180,60,255' : oi===1 ? '80,180,200' : '40,200,100';
    var orbGlow=ctx.createRadialGradient(ox,oy,0,ox,oy,od.ballR*3);
    orbGlow.addColorStop(0,'rgba('+gCol+',0.4)');
    orbGlow.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(ox,oy,od.ballR*3,0,Math.PI*2);
    ctx.fillStyle=orbGlow;ctx.fill();

    // 하이라이트
    ctx.beginPath();ctx.arc(ox-1.2,oy-1.2,1.4,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.8)';ctx.fill();
  });

  // ── 버스트 플래시 (더 강하고 넓음, 2주기) ──
  // 메인 버스트
  var burstCycle = t % 2.2;
  var burstV = burstCycle < 0.38 ? Math.sin((burstCycle/0.38)*Math.PI) : 0;
  if(burstV > 0.01){
    var burstR = burstV*62;
    // 방사 라인 22개
    for(var bi=0; bi<22; bi++){
      var ba=(bi/22)*Math.PI*2+t*0.4;
      // 보라↔초록 번갈아
      var isGreen = bi%3===0;
      var lCol = isGreen ? '80,220,130' : '210,100,255';
      var bLen=burstR*(0.55+Math.sin(bi*1.9)*0.35);
      ctx.beginPath();
      ctx.moveTo(cx+Math.cos(ba)*9, by+Math.sin(ba)*9);
      ctx.lineTo(cx+Math.cos(ba)*bLen, by+Math.sin(ba)*bLen);
      ctx.strokeStyle='rgba('+lCol+','+(burstV*(0.55+Math.sin(bi)*0.2))+')';
      ctx.lineWidth=1.2+burstV*1.2;
      ctx.lineCap='round';ctx.stroke();
    }
    // 외곽 링 2개
    [0.75, 0.95].forEach(function(rf, ri){
      var ringGrad=ctx.createRadialGradient(cx,by,burstR*rf*0.6,cx,by,burstR*rf);
      ringGrad.addColorStop(0,'transparent');
      ringGrad.addColorStop(0.6,'rgba(160,80,255,'+(burstV*(0.22-ri*0.06))+')');
      ringGrad.addColorStop(0.85,'rgba(60,200,100,'+(burstV*(0.12-ri*0.04))+')');
      ringGrad.addColorStop(1,'transparent');
      ctx.beginPath();ctx.arc(cx,by,burstR*rf,0,Math.PI*2);
      ctx.fillStyle=ringGrad;ctx.fill();
    });
    // 코어 플래시
    var coreGrad=ctx.createRadialGradient(cx,by,0,cx,by,18);
    coreGrad.addColorStop(0,'rgba(255,250,255,'+(burstV*0.95)+')');
    coreGrad.addColorStop(0.3,'rgba(180,100,255,'+(burstV*0.7)+')');
    coreGrad.addColorStop(0.7,'rgba(60,200,100,'+(burstV*0.3)+')');
    coreGrad.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(cx,by,18,0,Math.PI*2);ctx.fillStyle=coreGrad;ctx.fill();
  }

  // 보조 버스트 (다른 타이밍, 약간 작음)
  var burst2Cycle=(t+1.1)%2.2;
  var burst2V=burst2Cycle<0.28?Math.sin((burst2Cycle/0.28)*Math.PI):0;
  if(burst2V>0.01){
    for(var bi2=0;bi2<14;bi2++){
      var ba2=(bi2/14)*Math.PI*2+t*0.6;
      var isG2=bi2%2===0;
      var lc2=isG2?'60,210,110':'200,90,255';
      ctx.beginPath();
      ctx.moveTo(cx+Math.cos(ba2)*7,by+Math.sin(ba2)*7);
      ctx.lineTo(cx+Math.cos(ba2)*burst2V*42,by+Math.sin(ba2)*burst2V*42);
      ctx.strokeStyle='rgba('+lc2+','+(burst2V*0.5)+')';
      ctx.lineWidth=0.9;ctx.lineCap='round';ctx.stroke();
    }
    var c2g=ctx.createRadialGradient(cx,by,0,cx,by,13);
    c2g.addColorStop(0,'rgba(255,255,255,'+(burst2V*0.8)+')');
    c2g.addColorStop(0.5,'rgba(100,220,150,'+(burst2V*0.4)+')');
    c2g.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(cx,by,13,0,Math.PI*2);ctx.fillStyle=c2g;ctx.fill();
  }

  // ── 레버 ──
  ctx.beginPath();
  ctx.moveTo(cx-12,by-34);ctx.lineTo(cx-19,by-27+Math.sin(t*2.8)*1.5);ctx.lineTo(cx-17,by-21);
  ctx.strokeStyle='rgba(180,220,160,0.85)';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();

  // ── 상단 캡 (보라+초록 그라데이션) ──
  var capGrad=ctx.createLinearGradient(cx-13,by-38,cx+13,by-30);
  capGrad.addColorStop(0,'#9944cc');
  capGrad.addColorStop(0.5,'#557744');
  capGrad.addColorStop(1,'#336622');
  ctx.beginPath();rr(ctx,cx-13,by-38,26,10,[5,5,0,0]);
  ctx.fillStyle=capGrad;ctx.fill();
  ctx.strokeStyle='rgba(140,220,120,0.6)';ctx.lineWidth=1.5;ctx.stroke();

  // ── 핀 + 스파크 ──
  var pinOut=3+Math.sin(t*2.8)*2.5;
  var pinAngle=Math.sin(t*3.2)*0.15;
  ctx.save();
  ctx.translate(cx+4,by-38);
  ctx.rotate(pinAngle);
  ctx.beginPath();
  ctx.arc(0,-pinOut-7,5,0,Math.PI*2);
  ctx.strokeStyle='rgba(200,255,180,0.98)';ctx.lineWidth=2.8;ctx.stroke();
  var pinGlow=ctx.createRadialGradient(0,-pinOut-7,0,0,-pinOut-7,12);
  pinGlow.addColorStop(0,'rgba(140,255,120,0.3)');
  pinGlow.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(0,-pinOut-7,12,0,Math.PI*2);ctx.fillStyle=pinGlow;ctx.fill();
  ctx.beginPath();
  ctx.moveTo(0,-pinOut);ctx.lineTo(0,3);
  ctx.strokeStyle='rgba(210,255,190,0.98)';ctx.lineWidth=2.2;ctx.lineCap='round';ctx.stroke();
  // 스파크 (초록+보라 번갈아)
  for(var si=0;si<8;si++){
    var sp=(t*7+si*0.45)%1;
    var sa=(si/8)*Math.PI*2+t*2.5;
    var sLen=sp*(6+Math.sin(si*1.9)*3);
    var sCol=si%2===0?'180,255,140':'220,140,255';

    var sy2=-pinOut-7+Math.sin(sa)*sLen;

  }
  for(var zi=0;zi<4;zi++){

  }
  ctx.restore();
