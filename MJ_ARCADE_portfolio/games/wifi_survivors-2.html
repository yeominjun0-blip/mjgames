// ══════════ ENEMY UPDATE ══════════
function updateEnemies(dt){
  var playerDead=false;
  G.enemies.forEach(function(e){
    if(e.hp<=0)return;
    if(e.stun>0){e.stun=Math.max(0,e.stun-1);return;}
    // 이동
    var dx=G.x-e.wx,dy=G.y-e.wy,d=Math.sqrt(dx*dx+dy*dy);
    var spd=e.spd*(e.spdMul||1);
    if(d>e.size+8){e.wx+=dx/d*spd*dt;e.wy+=dy/d*spd*dt;}
    else{
      // 공격
      e.atkTimer=(e.atkTimer||0)-dt;
      if(e.atkTimer<=0){
        e.atkTimer=e.boss?1.8:1.2;
        var dmg=Math.floor(e.atk*(0.85+Math.random()*0.3));
        G.hp=Math.max(0,G.hp-dmg);G.hitFlash=0.8;
        if(G.char.id==='linksys')G.atkMul=Math.min(3.0,G.atkMul+0.05);
        spawnDmgNum(G.x-20+Math.random()*40,G.y-20,'#f43f5e',dmg,false);
        if(G.hp<=0){playerDead=true;}
      }
    }
    // 도트
    if(e.dot>0&&e.dotTimer>0){e.hp-=e.dot*dt;e.dotTimer-=1;if(e.dotTimer<=0)e.dot=0;}
    // 기어 오브 충돌
    G.gearOrbs.forEach(function(orb){
      var ox=G.x+Math.cos(orb.angle)*orb.radius,oy=G.y+Math.sin(orb.angle)*orb.radius;
      var dx2=e.wx-ox,dy2=e.wy-oy,d2=Math.sqrt(dx2*dx2+dy2*dy2);
      if(d2<=orb.size+e.size){orb.lastHit=orb.lastHit||{};if(!orb.lastHit[e.id]||G.t-orb.lastHit[e.id]>0.5){orb.lastHit[e.id]=G.t;dealDmg(e,orb.dmg,orb.col);}}
    });
    e.t=(e.t||0)+dt;
    if(e.hitFlash>0)e.hitFlash=Math.max(0,e.hitFlash-dt*4);
  });
  // 죽은 적 처리
  G.enemies=G.enemies.filter(function(e){
    if(e.hp<=0&&!e._dead){e._dead=true;G.kills++;if(G.drainActive)G.hp=Math.min(G.maxHp,G.hp+Math.floor(5*(G.drainLv||1)));addXp(e.xp);spawnDeathParticles(e.wx,e.wy,e.col);return false;}
    return e.hp>0;
  });
  // 기어 오브 업데이트
  G.gearOrbs=G.gearOrbs.filter(function(orb){
    orb.life-=dt;orb.angle+=orb.rotSpd*dt;
    return orb.life>0;
  });
  if(playerDead)onGameOver();
}

// ══════════ SPAWN ══════════
function updateSpawn(dt){
  G.spawnTimer-=dt;
  if(G.spawnTimer>0)return;
  var waveN=G.wave;
  var count=1+Math.floor(waveN/3);
  for(var i=0;i<count;i++)spawnOneEnemy(waveN);
  G.spawnTimer=Math.max(0.4,G.spawnInterval-waveN*0.03);
  // 보스 웨이브
  if(!G.bossSpawned&&G.elapsed>=180*(Math.floor(G.elapsed/180))){
    if(G.elapsed>0&&G.elapsed%180<dt+0.1){spawnBoss();}
  }
}
function spawnOneEnemy(waveN){
  var maxType=Math.min(ETYPES.length-1,2+Math.floor(waveN/2));
  var pool=ETYPES.slice(0,maxType).filter(function(e){return !e.boss;});
  var type=pool[Math.floor(Math.random()*pool.length)];
  var angle=Math.random()*Math.PI*2;
  var dist=Math.max(W,H)*0.55+60;
  var wx=G.x+Math.cos(angle)*dist,wy=G.y+Math.sin(angle)*dist;
  var lvMul=1+waveN*0.07;
  G.enemies.push({
    id:type.id+'_'+Date.now()+'_'+Math.random(),
    draw:type.draw,col:type.col,
    wx:wx,wy:wy,spd:type.spd,size:type.size,
    hp:Math.floor(type.hp*lvMul),maxHp:Math.floor(type.hp*lvMul),
    atk:Math.floor(type.atk*lvMul),xp:type.xp,
    stun:0,dot:0,dotTimer:0,spdMul:1,boss:false,
    t:Math.random()*10,atkTimer:1.2,_dead:false,hitFlash:0,
  });
}
function spawnBoss(){
  var type=ETYPES[ETYPES.length-1];
  var angle=Math.random()*Math.PI*2;
  var dist=Math.max(W,H)*0.7+120;
  var lvMul=1+G.wave*0.15;
  G.enemies.push({
    id:'boss_'+Date.now(),draw:type.draw,col:type.col,
    wx:G.x+Math.cos(angle)*dist,wy:G.y+Math.sin(angle)*dist,
    spd:type.spd,size:type.size,
    hp:Math.floor(type.hp*lvMul),maxHp:Math.floor(type.hp*lvMul),
    atk:Math.floor(type.atk*lvMul),xp:type.xp,
    stun:0,dot:0,dotTimer:0,spdMul:1,boss:true,
    t:0,atkTimer:1.8,_dead:false,
  });
  showBossWarning();
}
function showBossWarning(){
  var bw=document.getElementById('boss-warning');
  bw.style.opacity='1';
  setTimeout(function(){bw.style.opacity='0';},2500);
}

// ══════════ TIMER / WAVE ══════════
function updateTimer(dt){
  if(G.phase!=='play')return;
  G.elapsed+=dt;
  G.wave=1+Math.floor(G.elapsed/45);
  G.spawnInterval=Math.max(0.4,2.2-G.wave*0.06);
  // 시간 표시
  var rem=Math.max(0,G.totalSec-G.elapsed);
  var mm=Math.floor(rem/60),ss=Math.floor(rem%60);
  document.getElementById('timer-val').textContent=(mm<10?'0':'')+mm+':'+(ss<10?'0':'')+ss;
  document.getElementById('wave-val').textContent='WAVE '+G.wave;
  document.getElementById('kill-val').textContent='☠ '+G.kills;
  // 클리어
  if(G.elapsed>=G.totalSec){onClear();}
}

// ══════════ XP / LEVEL UP ══════════
function addXp(amount){
  G.xp+=amount;
  if(G.xp>=G.xpNext)levelUp();
}
function levelUp(){
  G.lv++;G.xp-=G.xpNext;G.xpNext=Math.floor(G.xpNext*1.28);
  G.maxHp=Math.floor(G.maxHp*1.05);G.hp=Math.min(G.maxHp,G.hp+Math.floor(G.maxHp*0.2));
  G.atk=Math.floor(G.atk*1.04);
  showLevelUpPanel();
}
function checkLevelUp(){
  if(G.xp>=G.xpNext&&!G.paused&&G.phase==='play')levelUp();
}

function showLevelUpPanel(){
  G.paused=true;
  document.getElementById('lvup-lv').textContent='LV. '+G.lv;
  document.getElementById('lvup-panel').style.display='flex';
  var choices=generateLvupChoices();
  var cards=document.getElementById('lvup-cards');cards.innerHTML='';
  choices.forEach(function(ch){
    var card=document.createElement('div');
    card.className='lvup-card'+(ch.evo?' evo-card':'');
    var badgeCol=ch.evo?'background:rgba(251,191,36,0.15);color:#fbbf24;':'background:rgba(0,229,255,0.1);color:rgba(0,229,255,0.7);';
    card.innerHTML=
      '<div class="lvup-icon">'+ch.icon+'</div>'+
      '<div class="lvup-info">'+
        '<div class="lvup-name">'+ch.name+'</div>'+
        '<div class="lvup-desc">'+ch.desc+'</div>'+
        '<div class="lvup-badge" style="'+badgeCol+'">'+ch.badge+'</div>'+
      '</div>';
    card.onclick=(function(ch2){return function(){applyLvupChoice(ch2);};})(ch);
    cards.appendChild(card);
  });
}

function generateLvupChoices(){
  var choices=[];
  // EVO 진화 가능 스킬 체크
  for(var i=0;i<3;i++){
    var sk=G.skills[i];
    if(sk&&sk.lv>=3&&!sk.id.endsWith('_evo')){
      var evoId=sk.id+'_evo';
      if(SKILL_DEFS[evoId]){
        choices.push({
          icon:SKILL_DEFS[evoId].icon,name:SKILL_DEFS[evoId].name,
          desc:SKILL_DEFS[evoId].desc,badge:'✦ EVOLUTION',evo:true,
          apply:function(idx2,eid){return function(){evolveSkill(idx2,eid);};}(i,evoId),
        });
      }
    }
  }
  // 기본 스킬 옵션
  var allSkills=['wave','chain','bomb','burst','laser','gear','snipe','drain'];
  var shuffled=allSkills.slice().sort(function(){return Math.random()-0.5;});
  shuffled.forEach(function(sid){
    if(choices.length>=4)return;
    var def=SKILL_DEFS[sid];
    // 이미 있는 스킬이면 업그레이드, 없으면 새로 추가
    var existing=null,existIdx=-1;
    for(var i=0;i<3;i++){if(G.skills[i]&&G.skills[i].id===sid){existing=G.skills[i];existIdx=i;break;}}
    if(existing&&existing.lv>=def.maxLv)return; // 이미 맥스
    var emptySlot=G.skills.indexOf(null);
    if(!existing&&emptySlot===-1)return; // 슬롯 없음
    if(existing){
      choices.push({
        icon:def.icon,name:def.name+' Lv'+(existing.lv+1),
        desc:def.desc,badge:'업그레이드 ▲',evo:false,
        apply:function(idx2){return function(){upgradeSkill(idx2);};}(existIdx),
      });
    } else {
      choices.push({
        icon:def.icon,name:def.name,desc:def.desc,badge:'신규 스킬',evo:false,
        apply:function(sid2,slotIdx){return function(){addSkill(sid2,slotIdx);};}(sid,emptySlot),
      });
    }
  });
  // 3개로 제한, 섞기
  return choices.slice(0,3).sort(function(){return Math.random()-0.5;});
}

function applyLvupChoice(ch){
  ch.apply();
  document.getElementById('lvup-panel').style.display='none';
  G.paused=false;
  buildSkillSlots();
  updateSkillSlotUI();
}
function addSkill(sid,slotIdx){
  var def=SKILL_DEFS[sid];
  G.skills[slotIdx]={id:sid,lv:1,cd:0,maxCd:def.cdBase};
}
function upgradeSkill(idx){
  var sk=G.skills[idx];if(!sk)return;
  sk.lv=Math.min(sk.lv+1,SKILL_DEFS[sk.id].maxLv);
  sk.maxCd=SKILL_DEFS[sk.id].cdBase*(1-sk.lv*0.08);
}
function evolveSkill(idx,evoId){
  var def=SKILL_DEFS[evoId];
  G.skills[idx]={id:evoId,lv:1,cd:0,maxCd:def.cdBase};
  flashScreen('rgba(251,191,36,0.25)');
  addEffectParticles(G.x,G.y,50,'#fbbf24');
}

// ══════════ SKILL COOLDOWNS ══════════
function updateSkillCDs(dt){
  for(var i=0;i<3;i++){
    var sk=G.skills[i];
    if(sk&&sk.cd>0){sk.cd=Math.max(0,sk.cd-dt);}
  }
  updateSkillSlotUI();
}

}

function spawnRingEffect(wx,wy,r,col,dur){_effects.push({type:'ring',wx:wx,wy:wy,r:r,col:col,life:dur,maxLife:dur});}

// 파티클 (월드 좌표)
var _wParticles=[];
function addEffectParticles(wx,wy,n,col){
  for(var i=0;i<n;i++){
    var a=Math.random()*Math.PI*2,sp=40+Math.random()*140;
    _wParticles.push({wx:wx,wy:wy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.8+Math.random()*0.5,decay:1.2+Math.random(),sz:2+Math.random()*5,col:col});
  }
}
function spawnDeathParticles(wx,wy,col){addEffectParticles(wx,wy,12,col);}

function updateBullets(dt){
  _wParticles=_wParticles.filter(function(p){
    p.wx+=p.vx*dt;p.wy+=p.vy*dt;p.vy+=80*dt;p.vx*=0.95;p.life-=p.decay*dt;
    return p.life>0;
  });
}

// ══════════ HUD UPDATE ══════════
function updateHUD(){
  if(!G)return;
  var hpPct=Math.max(0,G.hp/G.maxHp*100);
  document.getElementById('hp-bar').style.width=hpPct+'%';
  var xpPct=Math.min(100,G.xp/G.xpNext*100);
  document.getElementById('xp-bar').style.width=xpPct+'%';
}


// ══════════ OFFSCREEN CANVAS POOL ══════════
var _offscreens={};
// renderSz: 실제 오프스크린 해상도(px), drawFn은 120x120 기준
function getOffscreen(id,renderSz,drawFn,t){
  var dpr=window.devicePixelRatio||1;
  var key=id+'_'+renderSz;
  if(!_offscreens[key]){
    var oc=document.createElement('canvas');
    oc.width=renderSz*dpr; oc.height=renderSz*dpr;
    _offscreens[key]={c:oc, ctx:oc.getContext('2d'), dpr:dpr};
  }
  var obj=_offscreens[key];
  var ctx=obj.ctx;
  ctx.clearRect(0,0,renderSz*dpr,renderSz*dpr);
  ctx.save();
  var sc=renderSz/120*dpr;
  ctx.scale(sc,sc);
  try{drawFn(ctx,t);}catch(e){}
  ctx.restore();
  return obj.c;
}

// ══════════ RENDER ══════════
function render(){
  CTX.clearRect(0,0,W,H);

  // 배경 그리드 (월드 좌표계)
  var ox=W/2-G.camX,oy=H/2-G.camY;
  var gsize=80;
  CTX.strokeStyle='rgba(0,229,255,0.04)';CTX.lineWidth=1;
  var startX=Math.floor((-G.camX-W/2)/gsize)*gsize;
  var startY=Math.floor((-G.camY-H/2)/gsize)*gsize;
  for(var gx=startX;gx<G.camX+W;gx+=gsize){CTX.beginPath();CTX.moveTo(ox+gx,0);CTX.lineTo(ox+gx,H);CTX.stroke();}
  for(var gy=startY;gy<G.camY+H;gy+=gsize){CTX.beginPath();CTX.moveTo(0,oy+gy);CTX.lineTo(W,oy+gy);CTX.stroke();}

  // 효과 렌더 (월드→화면)
  renderEffects(ox,oy);

  // 파티클
  _wParticles.forEach(function(p){
    if(p.life<=0)return;
    CTX.globalAlpha=Math.max(0,p.life);CTX.fillStyle=p.col;
    CTX.beginPath();CTX.arc(ox+p.wx,oy+p.wy,p.sz,0,Math.PI*2);CTX.fill();
  });CTX.globalAlpha=1;

  // 기어 오브
  G.gearOrbs.forEach(function(orb){
    var sx=ox+G.x+Math.cos(orb.angle)*orb.radius;
    var sy=oy+G.y+Math.sin(orb.angle)*orb.radius;
    var alpha=Math.min(1,orb.life/orb.maxLife*2);
    CTX.save();CTX.translate(sx,sy);
    // 기어 모양
    CTX.globalAlpha=alpha;
    CTX.beginPath();
    for(var ti=0;ti<8;ti++){
      var ta=ti*Math.PI/4+orb.angle*2,ta2=ta+Math.PI/8;
      var r1=orb.size,r2=orb.size*0.65;
      if(ti===0)CTX.moveTo(Math.cos(ta)*r1,Math.sin(ta)*r1);
      else CTX.lineTo(Math.cos(ta)*r1,Math.sin(ta)*r1);
      CTX.lineTo(Math.cos(ta2)*r2,Math.sin(ta2)*r2);
    }
    CTX.closePath();CTX.fillStyle=orb.col;CTX.fill();
    if(orb.evo){CTX.strokeStyle='#fbbf24';CTX.lineWidth=2;CTX.stroke();}
    CTX.globalAlpha=1;CTX.restore();
    // 글로우
    var rg=CTX.createRadialGradient(sx,sy,0,sx,sy,orb.size*2);
    rg.addColorStop(0,orb.col.replace(')',' ,'+alpha*0.3+')').replace('rgb(','rgba('));
    rg.addColorStop(1,'transparent');
    CTX.beginPath();CTX.arc(sx,sy,orb.size*2,0,Math.PI*2);CTX.fillStyle=rg;CTX.fill();
  });

  // 적
  var dpr=window.devicePixelRatio||1;
  G.enemies.forEach(function(e){
    if(e.hp<=0)return;
    var sx=ox+e.wx,sy=oy+e.wy;
    // 화면 밖이면 스킵
    if(sx<-80||sx>W+80||sy<-80||sy>H+80)return;
    CTX.save();CTX.translate(sx,sy);
    // HP 바 (보스만 크게)
    if(e.boss){
      CTX.fillStyle='rgba(0,0,0,0.7)';CTX.fillRect(-45,-e.size-14,90,6);
      var hpPct2=e.hp/e.maxHp;
      var hcol=hpPct2>0.5?'#f43f5e':hpPct2>0.25?'#fb923c':'#fbbf24';
      CTX.fillStyle=hcol;CTX.fillRect(-45,-e.size-14,90*hpPct2,6);
      CTX.strokeStyle='rgba(244,63,94,0.4)';CTX.lineWidth=1;CTX.strokeRect(-45,-e.size-14,90,6);
    } else {
      CTX.fillStyle='rgba(0,0,0,0.5)';CTX.fillRect(-e.size,-e.size-7,e.size*2,3);
      CTX.fillStyle=e.col;CTX.fillRect(-e.size,-e.size-7,e.size*2*(e.hp/e.maxHp),3);
    }
    // 적 캐릭터 그리기 (offscreen, 크기 1.5배 + 이펙트)
    var esz=Math.round(e.size*2.0); // 더 크게
    var eoc=getOffscreen(e.id+'_'+e.size,esz,e.draw,e.t);
    // 보스: 레드 글로우
    if(e.boss){CTX.shadowColor='rgba(244,63,94,0.7)';CTX.shadowBlur=24;}
    // 데미지 플래시
    if(e.hitFlash&&e.hitFlash>0){CTX.globalAlpha=0.5+e.hitFlash*0.5;}
    CTX.drawImage(eoc,-esz/2*dpr,-esz/2*dpr,esz*dpr,esz*dpr);
    CTX.shadowBlur=0;CTX.globalAlpha=1;
    if(e.stun>0){
      CTX.font='bold '+(16*dpr)+'px monospace';CTX.textAlign='center';
      CTX.fillStyle='rgba(255,255,255,0.9)';
      CTX.fillText('★',0,(-esz/2-6)*dpr);
    }
    CTX.globalAlpha=1;
    CTX.restore();
    // 도트 파티클
    if(e.dot>0&&Math.random()<0.2)addEffectParticles(e.wx+Math.random()*10-5,e.wy,'#f43f5e',1);
    // 보스 방향 화살표 (화면 밖일 때)
    if(e.boss){
      var bsx=ox+e.wx,bsy=oy+e.wy;
      if(bsx<-40||bsx>W+40||bsy<-40||bsy>H+40){
        var da=Math.atan2(e.wy-G.y,e.wx-G.x);
        var arx=W/2+Math.cos(da)*Math.min(W,H)*0.38;
        var ary=H/2+Math.sin(da)*Math.min(W,H)*0.38;
        CTX.save();CTX.translate(arx,ary);CTX.rotate(da);
        CTX.fillStyle='rgba(244,63,94,0.8)';
        CTX.beginPath();CTX.moveTo(14,0);CTX.lineTo(-8,8);CTX.lineTo(-8,-8);CTX.closePath();CTX.fill();
        CTX.restore();
      }
    }
  });

  // 플레이어
  var px=W/2,py=H/2;
  CTX.save();CTX.translate(px,py);
  // 선택 링
  var grad=CTX.createRadialGradient(0,0,20,0,0,45);
  grad.addColorStop(0,'transparent');
  grad.addColorStop(1,'rgba(0,229,255,0.1)');
  CTX.beginPath();CTX.arc(0,0,45,0,Math.PI*2);CTX.fillStyle=grad;CTX.fill();
  CTX.beginPath();CTX.arc(0,0,36,0,Math.PI*2);
  CTX.strokeStyle='rgba(0,229,255,'+(0.25+Math.sin(G.t*3)*0.12)+')';CTX.lineWidth=1.5;CTX.stroke();
  // 피격 플래시
  if(G.hitFlash>0){
    CTX.beginPath();CTX.arc(0,0,40,0,Math.PI*2);
    CTX.fillStyle='rgba(244,63,94,'+G.hitFlash*0.3+')';CTX.fill();
  }
  // 플레이어 캐릭터 (96px, 이동방향 틸트 + 글로우)
  var ch=G.char;
  var pfn=EVO_DRAWS[ch.id]?EVO_DRAWS[ch.id][0]:null;
  if(pfn){
    var psz=64;
    var poc=getOffscreen('_player',psz,pfn,G.t);
    // 이동방향으로 살짝 기울임
    var tilt=Math.sin(G.moveAngle)*0.12;
    CTX.save();
    CTX.rotate(tilt);
    // 그림자 글로우
    CTX.shadowColor='rgba(0,229,255,0.5)';
    CTX.shadowBlur=18;
    CTX.drawImage(poc,-psz/2*dpr,-psz/2*dpr,psz*dpr,psz*dpr);
    CTX.shadowBlur=0;
    CTX.restore();
  }
  CTX.globalAlpha=1;CTX.restore();
}

function renderEffects(ox,oy){
  _effects.forEach(function(e){
    var t=1-e.life/e.maxLife,alpha=Math.max(0,e.life/e.maxLife);
    var sx=ox+e.wx,sy=oy+e.wy;
    CTX.save();
    if(e.type==='ring'){
      var r=e.r*(0.3+t*0.7);
      CTX.globalAlpha=alpha*0.7;CTX.strokeStyle=e.col;CTX.lineWidth=3-t*2;
      CTX.beginPath();CTX.arc(sx,sy,r,0,Math.PI*2);CTX.stroke();
      // 내부 글로우
      var rg2=CTX.createRadialGradient(sx,sy,r*0.6,sx,sy,r);
      rg2.addColorStop(0,e.col.replace('rgb','rgba').replace(')',',0.15)'));
      rg2.addColorStop(1,'transparent');
      CTX.globalAlpha=alpha*0.5;CTX.fillStyle=rg2;CTX.beginPath();CTX.arc(sx,sy,r,0,Math.PI*2);CTX.fill();
    } else if(e.type==='burst'){
      var r2=e.r*(0.5+t*0.5);
      var bg=CTX.createRadialGradient(sx,sy,0,sx,sy,r2);
      bg.addColorStop(0,e.col.replace('rgb','rgba').replace(')',','+alpha*0.4+')'));
      bg.addColorStop(1,'transparent');
      CTX.globalAlpha=1;CTX.fillStyle=bg;CTX.beginPath();CTX.arc(sx,sy,r2,0,Math.PI*2);CTX.fill();
      CTX.strokeStyle=e.col;CTX.lineWidth=2;CTX.globalAlpha=alpha;CTX.beginPath();CTX.arc(sx,sy,r2,0,Math.PI*2);CTX.stroke();
    } else if(e.type==='lightning'){
      CTX.globalAlpha=alpha;CTX.strokeStyle=e.col;CTX.lineWidth=2.5;
      CTX.shadowColor=e.col;CTX.shadowBlur=8;
      CTX.beginPath();
      var steps=6,x1=ox+e.x1,y1=oy+e.y1,x2=ox+e.x2,y2=oy+e.y2;
      CTX.moveTo(x1,y1);
      for(var li=1;li<steps;li++){
        var lt=li/steps;
        CTX.lineTo(x1+(x2-x1)*lt+(Math.random()-0.5)*18,y1+(y2-y1)*lt+(Math.random()-0.5)*18);
      }
      CTX.lineTo(x2,y2);CTX.stroke();CTX.shadowBlur=0;
    } else if(e.type==='beam'){
      CTX.globalAlpha=alpha;CTX.strokeStyle=e.col;CTX.lineWidth=3-t*2;
      CTX.shadowColor=e.col;CTX.shadowBlur=10;
      CTX.beginPath();CTX.moveTo(ox+e.x1,oy+e.y1);CTX.lineTo(ox+e.x2,oy+e.y2);CTX.stroke();
      CTX.lineWidth=1;CTX.globalAlpha=alpha*0.4;CTX.stroke();CTX.shadowBlur=0;
    } else if(e.type==='press'){
      CTX.globalAlpha=alpha*0.6;
      var px2=ox+e.wx,py2=oy+e.wy;
      CTX.save();CTX.translate(px2,py2);CTX.rotate(e.angle);
      var pg=CTX.createLinearGradient(0,0,e.len,0);
      pg.addColorStop(0,e.col.replace('rgb','rgba').replace(')',',0.7)'));
      pg.addColorStop(1,'transparent');
      CTX.fillStyle=pg;CTX.fillRect(0,-e.width/2,e.len,e.width);CTX.restore();
    } else if(e.type==='laser'){
      var lx1=ox+e.x1,ly1=oy+e.y1,lx2=ox+e.x2,ly2=oy+e.y2;
      var lg=CTX.createLinearGradient(lx1,ly1,lx2,ly2);
      lg.addColorStop(0,e.col.replace('rgb','rgba').replace(')',','+alpha+')'));
      lg.addColorStop(1,'transparent');
      CTX.globalAlpha=1;CTX.strokeStyle=lg;CTX.lineWidth=e.width*alpha;
      CTX.shadowColor=e.col;CTX.shadowBlur=e.width*2;
      CTX.beginPath();CTX.moveTo(lx1,ly1);CTX.lineTo(lx2,ly2);CTX.stroke();
      CTX.lineWidth=e.width*0.3;CTX.strokeStyle='rgba(255,255,255,'+alpha*0.8+')';CTX.stroke();
      CTX.shadowBlur=0;
    } else if(e.type==='spin'){
      var sc2=ox+e.wx,sc3=oy+e.wy;
      CTX.globalAlpha=alpha*0.5;CTX.strokeStyle=e.col;CTX.lineWidth=2;
      CTX.beginPath();CTX.arc(sc2,sc3,e.r,0,Math.PI*2);CTX.stroke();
    } else if(e.type==='explosion'){
      var er=e.r*(0.6+t*0.6);
      var eg=CTX.createRadialGradient(sx,sy,0,sx,sy,er);
      eg.addColorStop(0,'rgba(255,255,200,'+alpha*0.8+')');
      eg.addColorStop(0.3,e.col.replace('rgb','rgba').replace(')',','+alpha*0.5+')'));
      eg.addColorStop(1,'transparent');
      CTX.globalAlpha=1;CTX.fillStyle=eg;CTX.beginPath();CTX.arc(sx,sy,er,0,Math.PI*2);CTX.fill();
    } else if(e.type==='warningRing'){
      CTX.globalAlpha=0.4+Math.sin(G.t*8)*0.2;CTX.strokeStyle=e.col;CTX.lineWidth=2;CTX.setLineDash([8,8]);
      CTX.beginPath();CTX.arc(sx,sy,e.r,0,Math.PI*2);CTX.stroke();CTX.setLineDash([]);
    }
    CTX.globalAlpha=1;CTX.restore();
  });
}

// ══════════ HELPERS ══════════
function closest(arr,x,y){var b=null,bd=Infinity;arr.forEach(function(e){var dx=e.wx-x,dy=e.wy-y,d=dx*dx+dy*dy;if(d<bd){bd=d;b=e;}});return b;}
function closestExcept(arr,x,y,exc){var b=null,bd=Infinity;arr.forEach(function(e){if(exc.indexOf(e)!==-1||e.hp<=0)return;var dx=e.wx-x,dy=e.wy-y,d=dx*dx+dy*dy;if(d<bd){bd=d;b=e;}});return b;}
function densestPoint(arr){if(!arr.length)return{x:G.x,y:G.y};var bx=G.x,by=G.y,best=-1;arr.forEach(function(e){var cnt=0;arr.forEach(function(e2){var dx=e2.wx-e.wx,dy=e2.wy-e.wy;if(Math.sqrt(dx*dx+dy*dy)<100)cnt++;});if(cnt>best){best=cnt;bx=e.wx;by=e.wy;}});return{x:bx,y:by};}
function normalizeAngle(a){while(a>Math.PI)a-=Math.PI*2;while(a<-Math.PI)a+=Math.PI*2;return a;}
function ptLineSegDist(px,py,x1,y1,x2,y2){var dx=x2-x1,dy=y2-y1,len2=dx*dx+dy*dy;if(len2===0)return Math.sqrt((px-x1)*(px-x1)+(py-y1)*(py-y1));var t=Math.max(0,Math.min(1,((px-x1)*dx+(py-y1)*dy)/len2));return Math.sqrt((px-(x1+t*dx))*(px-(x1+t*dx))+(py-(y1+t*dy))*(py-(y1+t*dy)));}
function dealDmg(e,dmg,col){if(e.hp<=0)return;e.hp-=dmg;e.hitFlash=0.5;spawnDmgNum(e.wx+(Math.random()-0.5)*20,e.wy-e.size,col||'#fff',dmg,false);}

function spawnDmgNum(wx,wy,col,dmg,crit){
  var ox=W/2-G.camX,oy2=H/2-G.camY;
  var sx=ox+wx,sy=oy2+wy;
  var el=document.createElement('div');el.className='dmg-num';
  el.style.cssText='left:'+sx+'px;top:'+sy+'px;font-size:'+(crit?'17':'12')+'px;color:'+col+';text-shadow:0 0 6px '+col+';transform:translateX(-50%);pointer-events:none;z-index:25;font-family:Orbitron,monospace;font-weight:700;';
  el.textContent=(crit?'★':'')+dmg;
  document.body.appendChild(el);
  setTimeout(function(){el.style.top=(sy-45)+'px';el.style.opacity='0';},20);
  setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},800);
}

function flashScreen(col){
  var el=document.getElementById('flash');el.style.background=col||'rgba(0,229,255,0.1)';el.style.transition='none';el.style.opacity='1';
  setTimeout(function(){el.style.transition='opacity .35s';el.style.opacity='0';},50);
}

// ══════════ GAME OVER / CLEAR ══════════
function onGameOver(){G.phase='gameover';showResult(false);}
function onClear(){G.phase='gameover';showResult(true);}
function showResult(win){
  var rs=document.getElementById('result-screen');rs.classList.add('show');
  document.getElementById('res-title').textContent=win?'SURVIVED!':'DEFEATED';
  document.getElementById('res-title').style.color=win?'#00e5ff':'#f43f5e';
  var m=Math.floor(G.elapsed/60),s=Math.floor(G.elapsed%60);
  document.getElementById('res-time').textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  document.getElementById('res-kill').textContent=G.kills;
  document.getElementById('res-wave').textContent=G.wave;
  if(win)flashScreen('rgba(0,229,255,0.25)');
}

// ══════════ INIT ══════════
window.addEventListener('resize',function(){setupCanvas();});
showTitle();
// 타이틀에서도 캐릭터 애니메이션
(function titleAnim(ts){
  Object.keys(charCanvases).forEach(function(id){
    var obj=charCanvases[id];if(!obj)return;
    var t=ts/1000;
    if(obj.fn){
      var csz2=obj.csz||72;
      var oc2=getOffscreen('title_'+id,csz2,obj.fn,t);
      var dpr4=obj.dpr||1;
      obj.ctx.clearRect(0,0,csz2*dpr4,csz2*dpr4);
      obj.ctx.drawImage(oc2,0,0,csz2*dpr4,csz2*dpr4);
    }
  });
  if(document.getElementById('title-screen').style.display!=='none')requestAnimationFrame(titleAnim);
})(0);
</script>
