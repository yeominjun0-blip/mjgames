<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>WIFI SURVIVORS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none;}
:root{
  --bg:#060810;--neon:#00e5ff;--neon2:#ff0080;--gold:#fbbf24;
  --green:#10b981;--red:#f43f5e;--purple:#8b5cf6;
}
html,body{background:var(--bg);width:100%;height:100%;overflow:hidden;font-family:'Share Tech Mono',monospace;}

/* ── 게임 캔버스 ── */
#gc{position:fixed;inset:0;display:block;}

/* ── HUD ── */
#hud{position:fixed;inset:0;pointer-events:none;z-index:10;}

/* 상단 바 */
#top-hud{position:absolute;top:0;left:0;right:0;padding:10px 12px 8px;display:flex;align-items:center;gap:8px;background:linear-gradient(to bottom,rgba(6,8,16,0.9),transparent);}
#char-icon{width:40px;height:40px;border-radius:50%;border:2px solid var(--neon);overflow:hidden;flex-shrink:0;}
#hp-section{flex:1;}
#hp-label{font-size:7px;letter-spacing:2px;color:rgba(0,229,255,0.5);margin-bottom:3px;}
#hp-bar-bg{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;}
#hp-bar{height:100%;background:linear-gradient(90deg,#f43f5e,#fb923c,#10b981);border-radius:3px;transition:width .2s;}
#xp-bar-bg{height:3px;background:rgba(255,255,255,0.04);border-radius:2px;overflow:hidden;margin-top:3px;}
#xp-bar{height:100%;background:linear-gradient(90deg,var(--purple),var(--neon));border-radius:2px;transition:width .3s;}
#stats-mini{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
#timer-val{font-family:'Orbitron',monospace;font-size:16px;color:var(--neon);text-shadow:0 0 10px rgba(0,229,255,0.5);}
#wave-val{font-size:8px;letter-spacing:2px;color:rgba(0,229,255,0.4);}
#kill-val{font-size:8px;color:rgba(251,191,36,0.7);}

/* 스킬 슬롯 (하단) */
#skill-hud{position:absolute;bottom:0;left:0;right:0;padding:8px 10px 12px;background:linear-gradient(to top,rgba(6,8,16,0.95),transparent);pointer-events:all;}
#skill-slots{display:flex;gap:8px;justify-content:center;}
.sk-slot{width:68px;height:68px;border-radius:14px;border:1.5px solid rgba(0,229,255,0.15);background:rgba(6,8,16,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:border-color .15s;}
.sk-slot:active{transform:scale(0.94);}
.sk-slot.ready{border-color:var(--neon);box-shadow:0 0 14px rgba(0,229,255,0.3);}
.sk-slot.evo{border-color:var(--gold);box-shadow:0 0 14px rgba(251,191,36,0.3);}
.sk-slot.empty{border-color:rgba(255,255,255,0.06);border-style:dashed;}
.sk-icon{font-size:24px;line-height:1;}
.sk-name{font-size:7px;letter-spacing:0.5px;margin-top:2px;color:rgba(224,255,248,0.6);text-align:center;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 3px;}
.sk-cd{position:absolute;bottom:3px;right:4px;font-size:7px;color:rgba(0,229,255,0.7);font-family:'Orbitron',monospace;}
.sk-cd-overlay{position:absolute;inset:0;background:rgba(6,8,16,0.65);border-radius:12px;display:flex;align-items:center;justify-content:center;}
.sk-cd-overlay span{font-family:'Orbitron',monospace;font-size:18px;color:rgba(255,255,255,0.7);}
.sk-lv{position:absolute;top:3px;left:4px;font-size:6px;color:var(--gold);font-family:'Orbitron',monospace;}

/* 레벨업 선택 패널 */
#lvup-panel{position:fixed;inset:0;z-index:50;background:rgba(6,8,16,0.96);backdrop-filter:blur(16px);display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;}
.lvup-title{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;letter-spacing:6px;color:var(--neon);text-shadow:0 0 24px rgba(0,229,255,0.5);}
.lvup-sub{font-size:8px;letter-spacing:3px;color:rgba(0,229,255,0.35);}
.lvup-cards{display:flex;flex-direction:column;gap:10px;width:100%;max-width:380px;}
.lvup-card{background:rgba(0,229,255,0.04);border:1px solid rgba(0,229,255,0.2);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.lvup-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,229,255,0.07),transparent);opacity:0;transition:opacity .2s;}
.lvup-card:active{transform:scale(0.98);}
.lvup-card:active::before{opacity:1;}
.lvup-card.evo-card{border-color:rgba(251,191,36,0.5);background:rgba(251,191,36,0.04);}
.lvup-card.evo-card::before{background:linear-gradient(135deg,rgba(251,191,36,0.1),transparent);}
.lvup-icon{font-size:32px;flex-shrink:0;width:48px;text-align:center;}
.lvup-info{flex:1;}
.lvup-name{font-size:13px;color:#e0fff8;letter-spacing:1px;margin-bottom:3px;}
.lvup-desc{font-size:9px;color:rgba(148,163,184,0.6);letter-spacing:0.5px;line-height:1.5;}
.lvup-badge{font-size:7px;padding:2px 7px;border-radius:6px;margin-top:4px;display:inline-block;}

/* 보스 경고 */
#boss-warning{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:30;pointer-events:none;opacity:0;transition:opacity .3s;}
.boss-warn-text{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;letter-spacing:6px;color:var(--red);text-shadow:0 0 30px rgba(244,63,94,0.8),0 0 60px rgba(244,63,94,0.4);text-align:center;}

/* 결과 화면 */
#result-screen{position:fixed;inset:0;z-index:60;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:rgba(6,8,16,0.97);backdrop-filter:blur(20px);}
#result-screen.show{display:flex;}
.res-title{font-family:'Orbitron',monospace;font-size:32px;font-weight:900;letter-spacing:8px;}
.res-stat{font-size:10px;letter-spacing:2px;color:rgba(148,163,184,0.7);}
.res-stat span{color:var(--neon);}
.res-btn{padding:13px 36px;border:1px solid var(--neon);border-radius:12px;background:rgba(0,229,255,0.06);color:var(--neon);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;cursor:pointer;transition:all .2s;}
.res-btn:hover{background:rgba(0,229,255,0.12);}

/* 타이틀 */
#title-screen{position:fixed;inset:0;z-index:70;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:var(--bg);}
.tl-logo{font-family:'Orbitron',monospace;font-size:36px;font-weight:900;letter-spacing:10px;color:var(--neon);text-shadow:0 0 40px rgba(0,229,255,0.5);}
.tl-sub{font-size:10px;letter-spacing:4px;color:rgba(0,229,255,0.3);}
.char-select-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.char-btn{width:86px;padding:10px 6px 8px;border-radius:14px;border:1.5px solid rgba(0,229,255,0.15);background:rgba(0,229,255,0.04);cursor:pointer;text-align:center;transition:all .2s;}
.char-btn.selected{border-color:var(--neon);box-shadow:0 0 16px rgba(0,229,255,0.25);background:rgba(0,229,255,0.08);}
.char-btn:active{transform:scale(0.96);}
.char-btn canvas{display:block;margin:0 auto 4px;}
.char-rarity{font-size:7px;letter-spacing:1px;}
.start-btn{padding:15px 52px;border:1.5px solid var(--neon);border-radius:14px;background:rgba(0,229,255,0.06);color:var(--neon);font-family:'Orbitron',monospace;font-size:13px;letter-spacing:5px;cursor:pointer;transition:all .2s;text-shadow:0 0 10px rgba(0,229,255,0.4);}
.start-btn:hover{background:rgba(0,229,255,0.14);box-shadow:0 0 24px rgba(0,229,255,0.2);}
.start-btn:active{transform:scale(0.97);}

/* 플래시 */
#flash{position:fixed;inset:0;z-index:80;pointer-events:none;opacity:0;}

/* 데미지 숫자 */
.dmg-num{position:fixed;pointer-events:none;z-index:25;font-family:'Orbitron',monospace;font-weight:700;transition:top .7s ease-out,opacity .7s;}
</style>
</head>
<body>
<canvas id="gc"></canvas>

<div id="hud">
  <!-- 상단 -->
  <div id="top-hud">
    <canvas id="char-icon" width="80" height="80"></canvas>
    <div id="hp-section">
      <div id="hp-label">HP</div>
      <div id="hp-bar-bg"><div id="hp-bar" style="width:100%;"></div></div>
      <div id="xp-bar-bg"><div id="xp-bar" style="width:0%;"></div></div>
    </div>
    <div id="stats-mini">
      <div id="timer-val">10:00</div>
      <div id="wave-val">WAVE 1</div>
      <div id="kill-val">☠ 0</div>
    </div>
  </div>
  <!-- 하단 스킬 -->
  <div id="skill-hud">
    <div id="skill-slots"></div>
  </div>
</div>

<!-- 레벨업 패널 -->
<div id="lvup-panel">
  <div class="lvup-title">LEVEL UP!</div>
  <div class="lvup-sub" id="lvup-lv">LV. 2</div>
  <div class="lvup-cards" id="lvup-cards"></div>
</div>

<!-- 보스 경고 -->
<div id="boss-warning">
  <div class="boss-warn-text">⚠ BOSS INCOMING ⚠</div>
</div>

<!-- 결과 -->
<div id="result-screen">
  <div class="res-title" id="res-title" style="color:var(--neon);">SURVIVED</div>
  <div class="res-stat">생존 시간 <span id="res-time">0:00</span></div>
  <div class="res-stat">처치 수 <span id="res-kill">0</span></div>
  <div class="res-stat">최고 웨이브 <span id="res-wave">1</span></div>
  <button class="res-btn" onclick="showTitle()">↺ 다시 하기</button>
</div>

<!-- 타이틀 -->
<div id="title-screen">
  <div class="tl-logo">WIFI<br>SURVIVORS</div>
  <div class="tl-sub">자동 이동 · 스킬 수동 · 10분 생존</div>
  <div style="font-size:8px;letter-spacing:2px;color:rgba(0,229,255,0.25);">캐릭터 선택</div>
  <div class="char-select-row" id="char-select-row"></div>
  <button class="start-btn" onclick="startGame()">▶ START</button>
</div>

<div id="flash"></div>

<script>
// ══════════ DRAW FUNCTIONS ══════════
function rr(ctx,x,y,w,h,r){
  var tl,tr,br,bl;
  if(Array.isArray(r)){tl=r[0]||0;tr=r[1]!=null?r[1]:r[0]||0;br=r[2]!=null?r[2]:r[0]||0;bl=r[3]!=null?r[3]:r[0]||0;}
  else{tl=tr=br=bl=r||0;}
  ctx.moveTo(x+tl,y);
  ctx.lineTo(x+w-tr,y);ctx.quadraticCurveTo(x+w,y,x+w,y+tr);
  ctx.lineTo(x+w,y+h-br);ctx.quadraticCurveTo(x+w,y+h,x+w-br,y+h);
  ctx.lineTo(x+bl,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-bl);
  ctx.lineTo(x,y+tl);ctx.quadraticCurveTo(x,y,x+tl,y);
  ctx.closePath();
}

function drawASUS(ctx, t) {
  var cx=60, cy=58;
  ctx.clearRect(0,0,120,120);

  var bob = Math.sin(t*1.8)*2;
  var bodyY = cy + bob;

  // 터미널 외부 케이스
  var termGrad = ctx.createLinearGradient(cx-38, bodyY-34, cx+38, bodyY+36);
  termGrad.addColorStop(0, '#0d1a0d');
  termGrad.addColorStop(0.5, '#081408');
  termGrad.addColorStop(1, '#040c04');
  ctx.beginPath();
  rr(ctx,cx-38, bodyY-34, 76, 68, 8);
  ctx.fillStyle = termGrad;
  ctx.fill();
  ctx.strokeStyle = '#00cc44';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 상단 바 (타이틀바)
  ctx.beginPath();
  rr(ctx,cx-38, bodyY-34, 76, 16, [8,8,0,0]);
  ctx.fillStyle = '#0a2010';
  ctx.fill();
  ctx.strokeStyle = '#00cc44';
  ctx.lineWidth = 1;
  ctx.stroke();

  // 타이틀바 버튼들
  var btns = ['#ff5f57','#febc2e','#28c840'];
  btns.forEach(function(c,i){
    ctx.beginPath();
    ctx.arc(cx-28+i*11, bodyY-26, 3.5, 0, Math.PI*2);
    ctx.fillStyle = c;
    ctx.fill();
  });

  // 타이틀 텍스트
  ctx.font = '7px Share Tech Mono, monospace';
  ctx.fillStyle = '#00aa33';
  ctx.textAlign = 'center';
  ctx.fillText('ASUS_TERMINAL', cx+8, bodyY-23);

  // 화면 영역
  ctx.beginPath();
  ctx.rect(cx-32, bodyY-16, 64, 42);
  ctx.fillStyle = '#020a02';
  ctx.fill();

  // 스캔라인
  for(var i=0;i<6;i++){
    ctx.beginPath();
    ctx.rect(cx-32, bodyY-16+i*7, 64, 3);
    ctx.fillStyle = 'rgba(0,255,80,0.03)';
    ctx.fill();
  }

  // 코드 텍스트 라인들 (흘러내리는 효과)
  ctx.font = '6px Share Tech Mono, monospace';
  ctx.textAlign = 'left';
  var codeLines = [
    '> SCAN_INIT...',
    '> PKT_INJECT 0xff',
    '> while(true){',
    '  hunt();',
    '> EXECUTE_▮',
  ];
  var scrollOffset = (t*20) % 7;
  codeLines.forEach(function(line, i){
    var lineY = bodyY - 10 + i*7 - scrollOffset;
    if(lineY < bodyY-16 || lineY > bodyY+26) return;
    var alpha = i === codeLines.length-1 ? 0.9 + Math.sin(t*8)*0.1 : 0.5+Math.random()*0.1;
    ctx.fillStyle = 'rgba(0,255,80,'+(alpha)+')';
    ctx.fillText(line, cx-30, lineY);
  });

  // 커서 깜빡임
  var cursorVisible = Math.sin(t*5) > 0;
  if(cursorVisible){
    ctx.fillStyle = '#00ff50';
    ctx.fillRect(cx-8, bodyY+18, 5, 7);
  }

  // 얼굴 (화면 위에 반투명 오버레이)
  // 눈 두 개 (터미널 스타일 — 사각형)
  var eyeY2 = bodyY + 2;
  var blinkT = Math.sin(t*1.1);
  var eyeH = blinkT > 0.9 ? 1 : 5;

  ctx.fillStyle = '#00ff66';
  ctx.shadowColor = '#00ff66';
  ctx.shadowBlur = 8;
  // 왼쪽 눈
  ctx.beginPath();
  ctx.rect(cx-14, eyeY2-eyeH/2, 10, eyeH);
  ctx.fill();
  // 오른쪽 눈
  ctx.beginPath();
  ctx.rect(cx+4, eyeY2-eyeH/2, 10, eyeH);
  ctx.fill();
  ctx.shadowBlur = 0;

  // 입 (꺾쇠 스타일 "> <")
  ctx.font = 'bold 11px Share Tech Mono';
  ctx.fillStyle = '#00ee55';
  ctx.textAlign = 'center';
  var mouthShapes = ['> . <', '> _ <', '> ^ <'];
  var mouthIdx = Math.floor(t*0.8) % mouthShapes.length;
  ctx.fillText(mouthShapes[mouthIdx], cx, eyeY2+14);

  // 외부 케이스 하단 로고
  ctx.font = 'bold 8px Share Tech Mono';
  ctx.fillStyle = '#004422';
  ctx.textAlign = 'center';
  ctx.fillText('ASUS', cx, bodyY+40);

  // 측면 LED 스트립
  for(var i=0;i<4;i++){
    var ledY = bodyY-20+i*14;
    var ledAlpha = 0.3 + Math.sin(t*3+i*0.8)*0.3;
    ctx.beginPath();
    ctx.rect(cx-40, ledY, 3, 8);
    ctx.fillStyle = 'rgba(0,255,80,'+(ledAlpha)+')';
    ctx.fill();
  }

  // 글로우 효과
  var glowSize = 44 + Math.sin(t*2)*3;
  var glowGrad = ctx.createRadialGradient(cx, bodyY, 20, cx, bodyY, glowSize);
  glowGrad.addColorStop(0, 'transparent');
  glowGrad.addColorStop(1, 'rgba(0,255,80,'+(0.04+Math.sin(t*2)*0.02)+')');
  ctx.beginPath();
  ctx.arc(cx, bodyY, glowSize, 0, Math.PI*2);
  ctx.fillStyle = glowGrad;
  ctx.fill();
}

function drawIPTIME(ctx, t) {
  var cx=60, cy=60;
  ctx.clearRect(0,0,120,120);

  var bob = Math.sin(t*2)*3;
  var blink = (Math.sin(t*1.3) > 0.92);

  // TV 본체 (청색 계열)
  var bodyY = cy + bob;

  // 바깥 케이스 그라데이션
  var grad = ctx.createLinearGradient(cx-36, bodyY-30, cx+36, bodyY+30);
  grad.addColorStop(0, '#7ec8f8');
  grad.addColorStop(0.5, '#4a9de0');
  grad.addColorStop(1, '#2a6aaa');
  ctx.beginPath();
  rr(ctx,cx-36, bodyY-30, 72, 60, 10);
  ctx.fillStyle = grad;
  ctx.fill();

  // TV 테두리 하이라이트
  ctx.beginPath();
  rr(ctx,cx-36, bodyY-30, 72, 60, 10);
  ctx.strokeStyle = '#a8deff';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 화면 (어두운 청색)
  ctx.beginPath();
  rr(ctx,cx-26, bodyY-22, 52, 40, 6);
  ctx.fillStyle = '#0a1830';
  ctx.fill();
  ctx.strokeStyle = '#2a5080';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // 화면 반사광
  ctx.beginPath();
  rr(ctx,cx-24, bodyY-20, 22, 10, 3);
  ctx.fillStyle = 'rgba(168,222,255,0.08)';
  ctx.fill();

  // 눈 두 개
  var eyeY = bodyY - 6;
  if (!blink) {
    // 왼쪽 눈
    ctx.beginPath();
    ctx.arc(cx-10, eyeY, 6, 0, Math.PI*2);
    ctx.fillStyle = '#c8eeff';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx-10, eyeY, 3.5, 0, Math.PI*2);
    ctx.fillStyle = '#1a3a60';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx-9, eyeY-1.5, 1.2, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fill();

    // 오른쪽 눈
    ctx.beginPath();
    ctx.arc(cx+10, eyeY, 6, 0, Math.PI*2);
    ctx.fillStyle = '#c8eeff';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx+10, eyeY, 3.5, 0, Math.PI*2);
    ctx.fillStyle = '#1a3a60';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx+11, eyeY-1.5, 1.2, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fill();
  } else {
    // 눈 깜빡임
    ctx.beginPath();
    ctx.moveTo(cx-16, eyeY); ctx.lineTo(cx-4, eyeY);
    ctx.moveTo(cx+4, eyeY); ctx.lineTo(cx+16, eyeY);
    ctx.strokeStyle = '#c8eeff';
    ctx.lineWidth = 2.5;
    ctx.stroke();
  }

  // 웃는 입
  var smileAmt = 0.5 + Math.sin(t*1.8)*0.1;
  ctx.beginPath();
  ctx.arc(cx, eyeY+10, 8, 0.2*Math.PI, 0.8*Math.PI);
  ctx.strokeStyle = '#6ab8f0';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.stroke();

  // TV 다리
  ctx.beginPath();
  rr(ctx,cx-20, bodyY+30, 12, 8, 3);
  rr(ctx,cx+8, bodyY+30, 12, 8, 3);
  ctx.fillStyle = '#3a80c0';
  ctx.fill();

  // 안테나 두 개
  ctx.beginPath();
  ctx.moveTo(cx-12, bodyY-30);
  ctx.lineTo(cx-20, bodyY-50+Math.sin(t*3)*2);
  ctx.moveTo(cx+12, bodyY-30);
  ctx.lineTo(cx+20, bodyY-50+Math.sin(t*3+1)*2);
  ctx.strokeStyle = '#7ec8f8';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.stroke();

  // 안테나 끝 점
  ctx.beginPath();
  ctx.arc(cx-20, bodyY-50+Math.sin(t*3)*2, 3, 0, Math.PI*2);
  ctx.arc(cx+20, bodyY-50+Math.sin(t*3+1)*2, 3, 0, Math.PI*2);
  ctx.fillStyle = '#a8deff';
  ctx.fill();

  // 전파 신호 (안테나 주변)
  for(var i=1;i<=2;i++){
    var r = i*7 + Math.sin(t*4)*1;
    var alpha = (0.4 - i*0.1) * (0.5 + Math.sin(t*2+i)*0.5);
    ctx.beginPath();
    ctx.arc(cx+20, bodyY-50+Math.sin(t*3+1)*2, r, -0.8*Math.PI, 0.2*Math.PI);
    ctx.strokeStyle = 'rgba(106,176,255,'+(alpha)+')';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // LED 표시등
  var ledPulse = 0.5 + Math.sin(t*4)*0.5;
  ctx.beginPath();
  ctx.arc(cx+28, bodyY+10, 3, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,255,136,'+(ledPulse)+')';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx+28, bodyY+10, 5, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,255,136,'+(ledPulse*0.2)+')';
  ctx.fill();
}

function drawHOTSPOT(ctx, t) {
  var cx=60, cy=60;
  ctx.clearRect(0,0,120,120);

  var pulse = Math.sin(t*3);
  var bob = Math.sin(t*2.3)*2;

  // 전기 신호 (배경, 몸체 뒤에)
  for(var i=0; i<6; i++){
    var angle = (i/6)*Math.PI*2 + t*1.5;
    var dist = 28 + Math.sin(t*4+i)*4;
    var ex = cx + Math.cos(angle)*dist;
    var ey = cy + bob + Math.sin(angle)*dist;
    var size = 3 + Math.sin(t*5+i*1.3)*2;

    // 전기 선 (몸체에서 뻗어나감)
    ctx.beginPath();
    ctx.moveTo(cx, cy+bob);
    // 지그재그
    var mid1x = cx + Math.cos(angle)*dist*0.4 + Math.sin(t*8+i)*6;
    var mid1y = cy + bob + Math.sin(angle)*dist*0.4 + Math.cos(t*8+i)*6;
    var mid2x = cx + Math.cos(angle)*dist*0.7 - Math.sin(t*8+i)*4;
    var mid2y = cy + bob + Math.sin(angle)*dist*0.7 - Math.cos(t*8+i)*4;
    ctx.lineTo(mid1x, mid1y);
    ctx.lineTo(mid2x, mid2y);
    ctx.lineTo(ex, ey);
    var alpha = 0.3 + Math.sin(t*6+i)*0.3;
    ctx.strokeStyle = 'rgba(255,60,80,'+(alpha)+')';
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();

    // 전기 끝 불꽃
    ctx.beginPath();
    ctx.arc(ex, ey, size, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,80,100,'+(alpha+0.2)+')';
    ctx.fill();
    // 밝은 중심
    ctx.beginPath();
    ctx.arc(ex, ey, size*0.4, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,200,200,'+(alpha+0.3)+')';
    ctx.fill();
  }

  // 몸체 (불규칙한 원형 — 아메바같은)
  ctx.beginPath();
  var pts = 12;
  for(var i=0;i<pts;i++){
    var a = (i/pts)*Math.PI*2;
    var r = 22 + Math.sin(t*2+i*0.8)*4 + Math.sin(t*3.5+i*1.3)*2;
    var x = cx + Math.cos(a)*r;
    var y = cy + bob + Math.sin(a)*r;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.closePath();
  var bodyGrad = ctx.createRadialGradient(cx, cy+bob, 0, cx, cy+bob, 24);
  bodyGrad.addColorStop(0, '#3a0818');
  bodyGrad.addColorStop(0.6, '#200510');
  bodyGrad.addColorStop(1, '#100208');
  ctx.fillStyle = bodyGrad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,60,80,'+(0.4+pulse*0.2)+')';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 눈알 (가운데 하나)
  var eyeR = 14;
  // 흰자
  ctx.beginPath();
  ctx.arc(cx, cy+bob, eyeR, 0, Math.PI*2);
  ctx.fillStyle = '#f0e8e8';
  ctx.fill();

  // 홍채
  var pupilOff = Math.sin(t*1.5)*2;
  ctx.beginPath();
  ctx.arc(cx+pupilOff, cy+bob, 9, 0, Math.PI*2);
  var irisGrad = ctx.createRadialGradient(cx+pupilOff, cy+bob, 0, cx+pupilOff, cy+bob, 9);
  irisGrad.addColorStop(0, '#cc0020');
  irisGrad.addColorStop(0.5, '#880010');
  irisGrad.addColorStop(1, '#440008');
  ctx.fillStyle = irisGrad;
  ctx.fill();

  // 동공
  ctx.beginPath();
  ctx.arc(cx+pupilOff, cy+bob, 5, 0, Math.PI*2);
  ctx.fillStyle = '#080008';
  ctx.fill();

  // 눈 반짝임
  ctx.beginPath();
  ctx.arc(cx+pupilOff+3, cy+bob-4, 2.5, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx+pupilOff-2, cy+bob+3, 1.2, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fill();

  // 눈 테두리 혈관 느낌
  ctx.beginPath();
  ctx.arc(cx, cy+bob, eyeR, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(200,50,70,0.5)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // 전기 글로우 오버레이
  var glow = ctx.createRadialGradient(cx, cy+bob, 15, cx, cy+bob, 40);
  glow.addColorStop(0, 'transparent');
  glow.addColorStop(1, 'rgba(255,40,60,'+(0.05+pulse*0.05)+')');
  ctx.beginPath();
  ctx.arc(cx, cy+bob, 40, 0, Math.PI*2);
  ctx.fillStyle = glow;
  ctx.fill();
}

function drawTPLINK(ctx, t) {
  var cx=60, cy=64;
  ctx.clearRect(0,0,120,120);

  var bob = Math.sin(t*2.2)*2.5;
  var bodyY = cy + bob;

  // ── 번개 방전 (공유기 위) ──
  function zigzag(startX, startY, endX, endY, seed, alpha) {
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    var steps = 6;
    for(var i=1; i<steps; i++){
      var p = i/steps;
      var mx = startX + (endX-startX)*p + Math.sin(t*12+seed+i*2.3)*5*(1-p);
      var my = startY + (endY-startY)*p + Math.cos(t*10+seed+i*1.7)*4*(1-p);
      ctx.lineTo(mx, my);
    }
    ctx.lineTo(endX, endY);
    ctx.strokeStyle = 'rgba(255,230,40,'+(alpha)+')';
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();
    // 밝은 코어
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    for(var i=1; i<steps; i++){
      var p = i/steps;
      var mx = startX + (endX-startX)*p + Math.sin(t*12+seed+i*2.3)*5*(1-p);
      var my = startY + (endY-startY)*p + Math.cos(t*10+seed+i*1.7)*4*(1-p);
      ctx.lineTo(mx, my);
    }
    ctx.lineTo(endX, endY);
    ctx.strokeStyle = 'rgba(255,255,180,'+(alpha*0.6)+')';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // 번개 여러 갈래
  var flashCycle = Math.sin(t*7);
  var flashAlpha = 0.5 + flashCycle*0.4;
  zigzag(cx-8, bodyY-34, cx-14, bodyY-58, 0, flashAlpha);
  zigzag(cx+8, bodyY-34, cx+14, bodyY-58, 3, flashAlpha*0.85);
  zigzag(cx, bodyY-34, cx+4, bodyY-62, 6, flashAlpha*0.7);

  // 번개 끝 발광점
  [[cx-14, bodyY-58],[cx+14, bodyY-58],[cx+4, bodyY-62]].forEach(function([ex,ey],i){
    var r = 3 + Math.sin(t*8+i)*1.5;
    ctx.beginPath();
    ctx.arc(ex, ey, r, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,240,80,'+(flashAlpha)+')';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(ex, ey, r+4, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,220,0,'+(flashAlpha*0.15)+')';
    ctx.fill();
  });

  // ── 공유기 본체 (검정) ──
  // 바디 그라데이션
  var bodyGrad = ctx.createLinearGradient(cx-36, bodyY-28, cx+36, bodyY+28);
  bodyGrad.addColorStop(0, '#1a1a1a');
  bodyGrad.addColorStop(0.4, '#111111');
  bodyGrad.addColorStop(1, '#080808');
  ctx.beginPath();
  rr(ctx,cx-36, bodyY-28, 72, 52, 8);
  ctx.fillStyle = bodyGrad;
  ctx.fill();

  // 테두리 — 노란 미세 글로우
  ctx.beginPath();
  rr(ctx,cx-36, bodyY-28, 72, 52, 8);
  ctx.strokeStyle = 'rgba(255,210,30,'+(0.35+Math.sin(t*3)*0.15)+')';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // 상단 하이라이트 선
  ctx.beginPath();
  rr(ctx,cx-34, bodyY-27, 68, 10, [6,6,0,0]);
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  ctx.fill();

  // ── 안테나 3개 ──
  var antX = [cx-22, cx, cx+22];
  antX.forEach(function(ax, i){
    var sway = Math.sin(t*1.5+i*1.1)*2;
    ctx.beginPath();
    ctx.moveTo(ax, bodyY-28);
    ctx.lineTo(ax+sway, bodyY-50);
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.stroke();
    // 안테나 테두리
    ctx.beginPath();
    ctx.moveTo(ax, bodyY-28);
    ctx.lineTo(ax+sway, bodyY-50);
    ctx.strokeStyle = 'rgba(80,80,80,0.8)';
    ctx.lineWidth = 2;
    ctx.stroke();
    // 안테나 끝 캡
    ctx.beginPath();
    ctx.arc(ax+sway, bodyY-50, 3, 0, Math.PI*2);
    ctx.fillStyle = '#333';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,210,30,'+(0.2+Math.sin(t*4+i)*0.15)+')';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // ── 눈 두 개 ──
  var eyeY = bodyY - 6;
  var blink = Math.sin(t*1.4) > 0.88;

  [-13, 13].forEach(function(ox, i){
    var ex = cx+ox;
    if(!blink){
      // 눈 외곽 (노란 링)
      ctx.beginPath();
      ctx.arc(ex, eyeY, 9, 0, Math.PI*2);
      ctx.fillStyle = '#0a0a0a';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,210,30,'+(0.6+Math.sin(t*2+i)*0.2)+')';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // 홍채
      var pupilOff = Math.sin(t*1.8+i)*1.5;
      ctx.beginPath();
      ctx.arc(ex+pupilOff, eyeY, 5.5, 0, Math.PI*2);
      var iGrad = ctx.createRadialGradient(ex+pupilOff,eyeY,0,ex+pupilOff,eyeY,5.5);
      iGrad.addColorStop(0,'#cc9900');
      iGrad.addColorStop(0.5,'#886600');
      iGrad.addColorStop(1,'#443300');
      ctx.fillStyle = iGrad;
      ctx.fill();

      // 동공
      ctx.beginPath();
      ctx.arc(ex+pupilOff, eyeY, 3, 0, Math.PI*2);
      ctx.fillStyle = '#050505';
      ctx.fill();

      // 반짝임
      ctx.beginPath();
      ctx.arc(ex+pupilOff+2, eyeY-2, 1.5, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,200,0.8)';
      ctx.fill();
    } else {
      // 깜빡임
      ctx.beginPath();
      ctx.moveTo(ex-9, eyeY);
      ctx.lineTo(ex+9, eyeY);
      ctx.strokeStyle = 'rgba(255,210,30,0.7)';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.stroke();
    }
  });

  // ── LED 표시등 (하단) ──
  var leds = ['#ffe033','#ffe033','#ff4444','#00ff88'];
  leds.forEach(function(col,i){
    var lx = cx - 20 + i*14;
    var ly = bodyY + 16;
    var pulse = 0.4 + Math.sin(t*3+i*1.5)*0.4;
    ctx.beginPath();
    ctx.arc(lx, ly, 3, 0, Math.PI*2);
    ctx.fillStyle = col.replace(')', ','+(pulse)+')').replace('rgb','rgba').replace('#','rgba(').replace('rgba(','rgba(').replace(/^rgba\(([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2}),/, (_,r,g,b)=>'rgba('+(parseInt(r,16))+','+(parseInt(g,16))+','+(parseInt(b,16))+',');
    // 간단하게 처리
    ctx.fillStyle = col;
    ctx.globalAlpha = pulse;
    ctx.fill();
    ctx.globalAlpha = 1;
    // 글로우
    ctx.beginPath();
    ctx.arc(lx, ly, 6, 0, Math.PI*2);
    var lg = ctx.createRadialGradient(lx,ly,0,lx,ly,6);
    lg.addColorStop(0,col+'88');
    lg.addColorStop(1,'transparent');
    ctx.fillStyle = lg;
    ctx.fill();
  });

  // ── TP-LINK 로고 텍스트 ──
  ctx.font = 'bold 8px Share Tech Mono, monospace';
  ctx.fillStyle = 'rgba(255,210,30,0.4)';
  ctx.textAlign = 'center';
  ctx.fillText('TP-LINK', cx, bodyY+24);

  // ── 전체 노란 글로우 ──
  var gGrad = ctx.createRadialGradient(cx, bodyY-40, 5, cx, bodyY, 55);
  gGrad.addColorStop(0, 'rgba(255,220,30,'+(0.06+flashCycle*0.04)+')');
  gGrad.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(cx, bodyY-10, 65, 0, Math.PI*2);
  ctx.fillStyle = gGrad;
  ctx.fill();
}

function drawNETGEAR(ctx, t) {
  var cx=60, cy=62;
  ctx.clearRect(0,0,120,120);

  // 기어 그리기 함수
  function drawGear(gx, gy, outerR, innerR, teeth, angle, col, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(gx, gy);
    ctx.rotate(angle);

    // 톱니 경로
    ctx.beginPath();
    var toothH = outerR - innerR;
    var toothW = (Math.PI * 2 / teeth) * 0.4;
    for(var i=0; i<teeth; i++){
      var a0 = (i/teeth)*Math.PI*2;
      var a1 = a0 + toothW*0.5;
      var a2 = a0 + toothW;
      var a3 = a0 + (Math.PI*2/teeth) - toothW*0.5;
      // 이너 -> 아우터 -> 이너
      ctx.lineTo(Math.cos(a0)*innerR, Math.sin(a0)*innerR);
      ctx.lineTo(Math.cos(a1)*outerR, Math.sin(a1)*outerR);
      ctx.lineTo(Math.cos(a2)*outerR, Math.sin(a2)*outerR);
      ctx.lineTo(Math.cos(a3)*innerR, Math.sin(a3)*innerR);
    }
    ctx.closePath();

    // 기어 채우기
    var gGrad = ctx.createRadialGradient(0,0,0,0,0,outerR);
    gGrad.addColorStop(0, '#cc5500');
    gGrad.addColorStop(0.6, '#aa4400');
    gGrad.addColorStop(1, '#883300');
    ctx.fillStyle = gGrad;
    ctx.fill();
    ctx.strokeStyle = col;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // 기어 중심 구멍
    ctx.beginPath();
    ctx.arc(0, 0, innerR*0.45, 0, Math.PI*2);
    ctx.fillStyle = '#0a0805';
    ctx.fill();
    ctx.strokeStyle = col;
    ctx.lineWidth = 1;
    ctx.stroke();

    // 기어 내부 살 (스포크)
    var spokes = 4;
    for(var i=0; i<spokes; i++){
      var sa = (i/spokes)*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(sa)*innerR*0.5, Math.sin(sa)*innerR*0.5);
      ctx.lineTo(Math.cos(sa)*innerR*0.9, Math.sin(sa)*innerR*0.9);
      ctx.strokeStyle = 'rgba(255,140,0,0.4)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    ctx.restore();
  }

  // 눈 그리기 함수 (작은 기어 위에)
  function drawEye(ex, ey, r, t2) {
    var blink = Math.sin(t2*1.3) > 0.9;
    if(!blink){
      // 흰자
      ctx.beginPath();
      ctx.arc(ex, ey, r, 0, Math.PI*2);
      ctx.fillStyle = '#f5ece0';
      ctx.fill();
      // 홍채
      var pd = Math.sin(t2*1.7)*1;
      ctx.beginPath();
      ctx.arc(ex+pd, ey, r*0.6, 0, Math.PI*2);
      var ig = ctx.createRadialGradient(ex+pd,ey,0,ex+pd,ey,r*0.6);
      ig.addColorStop(0,'#ff6600');
      ig.addColorStop(0.5,'#cc4400');
      ig.addColorStop(1,'#882200');
      ctx.fillStyle = ig;
      ctx.fill();
      // 동공
      ctx.beginPath();
      ctx.arc(ex+pd, ey, r*0.28, 0, Math.PI*2);
      ctx.fillStyle = '#050303';
      ctx.fill();
      // 반짝임
      ctx.beginPath();
      ctx.arc(ex+pd+r*0.18, ey-r*0.22, r*0.14, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,220,0.85)';
      ctx.fill();
      // 눈 테두리
      ctx.beginPath();
      ctx.arc(ex, ey, r, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(255,120,0,0.5)';
      ctx.lineWidth = 1;
      ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.moveTo(ex-r, ey);
      ctx.lineTo(ex+r, ey);
      ctx.strokeStyle = 'rgba(255,140,0,0.8)';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.stroke();
    }
  }

  var col = '#ff8c00';

  // 큰 기어 회전 (천천히)
  var bigAngle = t * 0.6;
  // 작은 기어들은 반대방향으로 더 빠르게 (기어비)
  var bigR = 32;
  var smallR = 16;
  var gearRatio = bigR / smallR;
  var smallAngle = -t * 0.6 * gearRatio;

  // 작은 기어 위치 (큰 기어 맞물림 거리)
  var meshDist = bigR + smallR - 1;
  var sg1x = cx - meshDist * 0.72;
  var sg1y = cy - meshDist * 0.55;
  var sg2x = cx + meshDist * 0.72;
  var sg2y = cy - meshDist * 0.55;

  // 기어 연결 축 선 (메시 표시)
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(sg1x, sg1y);
  ctx.moveTo(cx, cy);
  ctx.lineTo(sg2x, sg2y);
  ctx.strokeStyle = 'rgba(255,100,0,0.15)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 큰 기어 (뒤에 그려서 작은 기어가 앞에)
  drawGear(cx, cy, bigR, bigR*0.62, 14, bigAngle, col, 1);

  // 작은 기어 1 (왼쪽 위)
  drawGear(sg1x, sg1y, smallR, smallR*0.58, 8, smallAngle + 0.3, col, 1);

  // 작은 기어 2 (오른쪽 위)
  drawGear(sg2x, sg2y, smallR, smallR*0.58, 8, smallAngle - 0.3, col, 1);

  // 눈 (작은 기어 중심에)
  drawEye(sg1x, sg1y, smallR*0.48, t);
  drawEye(sg2x, sg2y, smallR*0.48, t + 1.2);

  // 큰 기어 위 표정 (입 — 주황 호)
  var mouthY = cy + 6;
  ctx.beginPath();
  ctx.arc(cx, mouthY, 8, 0.15*Math.PI, 0.85*Math.PI);
  ctx.strokeStyle = 'rgba(255,160,40,0.7)';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.stroke();

  // 전체 글로우
  var gGrad = ctx.createRadialGradient(cx, cy, 10, cx, cy, 58);
  gGrad.addColorStop(0, 'transparent');
  gGrad.addColorStop(1, 'rgba(255,100,0,'+(0.04+Math.sin(t*2)*0.02)+')');
  ctx.beginPath();
  ctx.arc(cx, cy, 58, 0, Math.PI*2);
  ctx.fillStyle = gGrad;
  ctx.fill();

  // 파티클 (기어 마찰 불꽃)
  for(var i=0; i<3; i++){
    var sparkAngle = t*8 + i*2.1;
    var sparkR = bigR - 2;
    var sx = cx + Math.cos(sparkAngle)*sparkR;
    var sy = cy + Math.sin(sparkAngle)*sparkR;
    var sparkAlpha = 0.3 + Math.sin(t*12+i)*0.3;
    ctx.beginPath();
    ctx.arc(sx, sy, 1.5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,200,50,'+(sparkAlpha)+')';
    ctx.fill();
  }
}

function drawMERCUSYS(ctx, t) {
  var cx=60, cy=52;
  ctx.clearRect(0,0,120,120);

  var bob = Math.sin(t*1.9)*3;
  var padW=54, padH=68, padR=8;

  // ── 아이패드 본체 위치 ──
  var px = cx;
  var py = cy + bob;

  // ── 바닥 그림자 (아이패드 아래 타원형) ──
  var floorY = py + padH/2 + 10;
  var shadowScaleX = 1 + Math.sin(t*1.9)*0.05; // 뜰수록 퍼짐
  var shadowAlpha = 0.55 - Math.abs(Math.sin(t*1.9))*0.1;

  // 그림자 타원
  ctx.save();
  ctx.translate(cx, floorY);
  ctx.scale(shadowScaleX, 0.28);
  ctx.beginPath();
  ctx.arc(0, 0, padW*0.52, 0, Math.PI*2);
  var shadowGrad = ctx.createRadialGradient(0,0,0, 0,0, padW*0.52);
  shadowGrad.addColorStop(0, 'rgba(0,220,190,'+(shadowAlpha)+')');
  shadowGrad.addColorStop(0.5, 'rgba(0,180,160,'+(shadowAlpha*0.7)+')');
  shadowGrad.addColorStop(1, 'rgba(0,150,130,0)');
  ctx.fillStyle = shadowGrad;
  ctx.fill();
  ctx.restore();

  // ── 그림자 안 웃는 얼굴 ──
  var faceX = cx;
  var faceY = floorY;

  // 눈 두 개 (타원에 맞게 납작하게)
  var blinkShadow = Math.sin(t*1.5) > 0.88;
  if(!blinkShadow){
    [-9, 9].forEach(function(ox){
      ctx.save();
      ctx.translate(faceX+ox, faceY);
      ctx.scale(1, 0.45);
      ctx.beginPath();
      ctx.arc(0, 0, 5, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(0,50,44,0.9)';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(0.5, -0.5, 2.5, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(160,255,235,0.95)';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(1.5, -1.5, 1, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.fill();
      ctx.restore();
    });
  } else {
    [-9,9].forEach(function(ox){
      ctx.beginPath();
      ctx.moveTo(faceX+ox-5, faceY);
      ctx.lineTo(faceX+ox+5, faceY);
      ctx.strokeStyle = 'rgba(160,255,235,0.85)';
      ctx.lineWidth = 1.8;
      ctx.lineCap = 'round';
      ctx.stroke();
    });
  }

  // 웃는 입 (납작하게)
  ctx.save();
  ctx.translate(faceX, faceY+3);
  ctx.scale(1, 0.4);
  ctx.beginPath();
  ctx.arc(0, 0, 9, 0.15*Math.PI, 0.85*Math.PI);
  ctx.strokeStyle = 'rgba(0,50,44,0.9)';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.restore();

  // ── 아이패드 본체 (앞) ──

  // 베젤
  var bezelGrad = ctx.createLinearGradient(px-padW/2, py-padH/2, px+padW/2, py+padH/2);
  bezelGrad.addColorStop(0, '#2a2e32');
  bezelGrad.addColorStop(1, '#181c20');
  ctx.beginPath();
  rr(ctx, px - padW/2, py - padH/2, padW, padH, padR);
  ctx.fillStyle = bezelGrad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(80,90,100,0.8)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // 화면
  var screenPad = 4;
  ctx.beginPath();
  rr(ctx, px-padW/2+screenPad, py-padH/2+screenPad, padW-screenPad*2, padH-screenPad*2, padR-2);
  ctx.fillStyle = '#0d1518';
  ctx.fill();

  // 화면 반사광
  ctx.beginPath();
  rr(ctx, px-padW/2+screenPad+2, py-padH/2+screenPad+2, (padW-screenPad*2)*0.45, 10, 3);
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  ctx.fill();

  // 화면 안 — 청록 틴트 (그림자 비치는 느낌)
  var screenGlow = ctx.createRadialGradient(px, py, 5, px, py, 30);
  screenGlow.addColorStop(0, 'rgba(0,200,180,0.06)');
  screenGlow.addColorStop(1, 'transparent');
  ctx.beginPath();
  rr(ctx, px-padW/2+screenPad, py-padH/2+screenPad, padW-screenPad*2, padH-screenPad*2, padR-2);
  ctx.fillStyle = screenGlow;
  ctx.fill();

  // 홈 버튼 (하단)
  ctx.beginPath();
  ctx.arc(px, py+padH/2-8, 4, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(80,90,100,0.6)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // 카메라 (상단)
  ctx.beginPath();
  ctx.arc(px, py-padH/2+6, 2, 0, Math.PI*2);
  ctx.fillStyle = '#0a0e12';
  ctx.fill();
  ctx.strokeStyle = 'rgba(80,90,100,0.5)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // 베젤 하이라이트
  ctx.beginPath();
  ctx.moveTo(px-padW/2+padR, py-padH/2);
  ctx.lineTo(px+padW/2-padR, py-padH/2);
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // 전체 청록 글로우
  var glowGrad = ctx.createRadialGradient(cx, cy, 10, cx, cy, 62);
  glowGrad.addColorStop(0, 'transparent');
  glowGrad.addColorStop(1, 'rgba(0,200,180,'+(0.04+Math.sin(t*2)*0.02)+')');
  ctx.beginPath();
  ctx.arc(cx, cy, 62, 0, Math.PI*2);
  ctx.fillStyle = glowGrad;
  ctx.fill();
}

function drawEFM(ctx, t) {
  var cx=60, cy=60;
  ctx.clearRect(0,0,120,120);

  var bob = Math.sin(t*2.1)*2.5;
  var by = cy + bob;

  // ── 핀 + 레버 (상단) ──
  var pinWobble = Math.sin(t*2.8);
  var pinOut = 3 + pinWobble*2.5;
  var pinAngle = Math.sin(t*3.2)*0.15;

  ctx.save();
  ctx.translate(cx+4, by-38);
  ctx.rotate(pinAngle);
  // 핀 고리
  ctx.beginPath();
  ctx.arc(0, -pinOut-7, 5, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(210,170,255,0.95)';
  ctx.lineWidth = 2.5;
  ctx.stroke();
  // 핀 막대
  ctx.beginPath();
  ctx.moveTo(0, -pinOut);
  ctx.lineTo(0, 3);
  ctx.strokeStyle = 'rgba(230,190,255,0.95)';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.restore();

  // 레버 (옆으로 튀어나온 금속 클립)
  ctx.beginPath();
  ctx.moveTo(cx-12, by-34);
  ctx.lineTo(cx-18, by-28+Math.sin(t*2.8)*1.5);
  ctx.lineTo(cx-16, by-22);
  ctx.strokeStyle = 'rgba(190,130,255,0.85)';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();

  // ── 상단 캡 ──
  var capGrad = ctx.createLinearGradient(cx-13, by-38, cx+13, by-30);
  capGrad.addColorStop(0, '#9944cc');
  capGrad.addColorStop(1, '#5500aa');
  ctx.beginPath();
  rr(ctx, cx-13, by-38, 26, 10, [5,5,0,0]);
  ctx.fillStyle = capGrad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(180,80,255,0.6)';
  ctx.lineWidth = 1.2;
  ctx.stroke();

  // ── 몸체 (길쭉한 원통) ──
  var bodyTop = by-28;
  var bodyBot = by+30;
  var bodyW = 24;

  var bodyGrad = ctx.createLinearGradient(cx-bodyW/2, 0, cx+bodyW/2, 0);
  bodyGrad.addColorStop(0, '#7a22cc');
  bodyGrad.addColorStop(0.3, '#aa44ee');
  bodyGrad.addColorStop(0.6, '#8822cc');
  bodyGrad.addColorStop(1, '#4400aa');
  ctx.beginPath();
  rr(ctx, cx-bodyW/2, bodyTop, bodyW, bodyBot-bodyTop, 4);
  ctx.fillStyle = bodyGrad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(180,80,255,'+(0.5+Math.sin(t*3)*0.15)+')';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // 몸체 하이라이트
  ctx.beginPath();
  rr(ctx, cx-bodyW/2+2, bodyTop+3, 5, bodyBot-bodyTop-6, 2);
  ctx.fillStyle = 'rgba(220,160,255,0.1)';
  ctx.fill();

  // ── 구멍들 (M84 특징 — 옆면 구멍) ──
  var holeRows = [
    { y: by-16, cols: [-7, 0, 7] },
    { y: by-4,  cols: [-7, 0, 7] },
    { y: by+8,  cols: [-7, 0, 7] },
  ];
  holeRows.forEach(function(row){
    row.cols.forEach(function(ox){
      // 구멍 (어두운 원)
      ctx.beginPath();
      ctx.arc(cx+ox, row.y, 3, 0, Math.PI*2);
      ctx.fillStyle = '#1a0033';
      ctx.fill();
      ctx.strokeStyle = 'rgba(140,40,220,0.5)';
      ctx.lineWidth = 0.8;
      ctx.stroke();
      // 구멍 안 빛 (섬광 새나오는 느낌)
      var glowAlpha = 0.15 + Math.sin(t*5+ox)*0.1;
      ctx.beginPath();
      ctx.arc(cx+ox, row.y, 2, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(200,100,255,'+(glowAlpha)+')';
      ctx.fill();
    });
  });

  // 구분 띠 (섹션 나누는 링)
  [by-20, by+0, by+18].forEach(function(ry){
    ctx.beginPath();
    rr(ctx, cx-bodyW/2-1, ry, bodyW+2, 3, 1);
    ctx.fillStyle = 'rgba(100,20,180,0.7)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(160,60,255,0.4)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  });

  // ── 하단 캡 ──
  ctx.beginPath();
  rr(ctx, cx-bodyW/2, bodyBot, bodyW, 8, [0,0,4,4]);
  ctx.fillStyle = '#4400aa';
  ctx.fill();
  ctx.strokeStyle = 'rgba(140,40,220,0.5)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // ── 눈 두 개 (몸체 중간) ──
  var blink = Math.sin(t*1.6) > 0.9;
  var eyeY = by - 4;
  [-6, 6].forEach(function(ox, i){
    if(!blink){
      ctx.beginPath();
      ctx.arc(cx+ox, eyeY, 5.5, 0, Math.PI*2);
      ctx.fillStyle = '#f0e8ff';
      ctx.fill();
      var pd = Math.sin(t*1.8+i)*0.8;
      ctx.beginPath();
      ctx.arc(cx+ox+pd, eyeY, 3.2, 0, Math.PI*2);
      var ig = ctx.createRadialGradient(cx+ox+pd,eyeY,0,cx+ox+pd,eyeY,3.2);
      ig.addColorStop(0,'#ee77ff');
      ig.addColorStop(0.5,'#aa22dd');
      ig.addColorStop(1,'#660099');
      ctx.fillStyle = ig;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx+ox+pd, eyeY, 1.5, 0, Math.PI*2);
      ctx.fillStyle = '#080010';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx+ox+pd+1.5, eyeY-1.5, 1, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.moveTo(cx+ox-5, eyeY);
      ctx.lineTo(cx+ox+5, eyeY);
      ctx.strokeStyle = 'rgba(220,160,255,0.85)';
      ctx.lineWidth = 2.2;
      ctx.lineCap = 'round';
      ctx.stroke();
    }
  });

  // ── 뾰족한 이빨 (하단 캡 아래) ──
  var teethY = bodyBot + 8;
  [
    { x: cx-8, w: 5, h: 8 },
    { x: cx-2, w: 6, h: 11 },
    { x: cx+4, w: 5, h: 8 },
  ].forEach(function(tooth){
    ctx.beginPath();
    ctx.moveTo(tooth.x, teethY);
    ctx.lineTo(tooth.x + tooth.w/2, teethY + tooth.h);
    ctx.lineTo(tooth.x + tooth.w, teethY);
    ctx.closePath();
    ctx.fillStyle = '#f0e8ff';
    ctx.fill();
    ctx.strokeStyle = 'rgba(160,60,220,0.3)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
  });

  // ── 보라 글로우 ──
  var dangerGlow = (pinOut - 1) / 5;
  var glowGrad = ctx.createRadialGradient(cx, by, 8, cx, by, 55);
  glowGrad.addColorStop(0, 'rgba(160,50,255,'+(0.07+dangerGlow*0.1)+')');
  glowGrad.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(cx, by, 55, 0, Math.PI*2);
  ctx.fillStyle = glowGrad;
  ctx.fill();

  // 핀 많이 빠지면 섬광 파티클
  if(pinOut > 4){
    for(var i=0;i<5;i++){
      var pa = t*7+i*1.26;
      var pr = 28+i*5;
      var ppx = cx + Math.cos(pa)*pr;
      var ppy = by + Math.sin(pa)*pr*0.7;
      ctx.beginPath();
      ctx.arc(ppx, ppy, 1.5, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(230,150,255,'+(0.4+Math.sin(t*10+i)*0.3)+')';
      ctx.fill();
    }
  }
}

function drawDLINK(ctx, t) {
  var cx=60, cy=60;
  ctx.clearRect(0,0,120,120);

  // 쿵쾅 사이클 — 빠르게 내려갔다 천천히 올라옴
  var cycle = (t * 1.4) % 1;
  // 0~0.15: 빠르게 내려감, 0.15~0.35: 바닥 충격, 0.35~1.0: 천천히 올라옴
  var pressY;
  if(cycle < 0.15){
    pressY = cycle / 0.15; // 0→1
  } else if(cycle < 0.35){
    pressY = 1;
  } else {
    pressY = 1 - (cycle - 0.35) / 0.65; // 1→0
  }
  // easing
  pressY = pressY * pressY * (3 - 2*pressY);

  var pressTravel = 28; // 최대 이동거리
  var pressOffset = pressY * pressTravel;
  var isImpact = cycle > 0.12 && cycle < 0.38;
  var impactShake = isImpact ? (Math.random()-0.5)*2.5 : 0;
  var shakeX = isImpact ? (Math.random()-0.5)*2 : 0;

  // ── 바닥 플레이트 (충격판) ──
  var plateY = 85;
  var plateH = 10;

  // 충격시 바닥 찌그러짐 효과
  var squish = isImpact ? pressY*3 : 0;

  ctx.beginPath();
  rr(ctx, cx-34+shakeX, plateY+squish, 68, plateH, 3);
  var plateGrad = ctx.createLinearGradient(cx-34, plateY, cx+34, plateY+plateH);
  plateGrad.addColorStop(0, '#606870');
  plateGrad.addColorStop(0.5, '#909aa0');
  plateGrad.addColorStop(1, '#505860');
  ctx.fillStyle = plateGrad;
  ctx.fill();
  ctx.strokeStyle = isImpact ? 'rgba(255,255,255,0.3)' : 'rgba(150,160,170,0.5)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // 바닥 플레이트 볼트
  [-24, 24].forEach(function(ox){
    ctx.beginPath();
    ctx.arc(cx+ox+shakeX, plateY+plateH/2+squish, 3, 0, Math.PI*2);
    ctx.fillStyle = '#404850';
    ctx.fill();
    ctx.strokeStyle = '#707880';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // 충격시 바닥 충격파 링
  if(isImpact && pressY > 0.8){
    var shockR = (pressY-0.8)*5 * 60;
    var shockAlpha = (1-(pressY-0.8)*5) * 0.4;
    ctx.beginPath();
    ctx.ellipse(cx+shakeX, plateY+plateH+squish, shockR, shockR*0.25, 0, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(180,190,200,'+(shockAlpha)+')';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // ── 기둥 두 개 (좌우 가이드) ──
  [-28, 28].forEach(function(ox){
    var colGrad = ctx.createLinearGradient(cx+ox-5, 0, cx+ox+5, 0);
    colGrad.addColorStop(0, '#505860');
    colGrad.addColorStop(0.4, '#808890');
    colGrad.addColorStop(1, '#404850');
    ctx.beginPath();
    rr(ctx, cx+ox-5, 18, 10, plateY-18, 2);
    ctx.fillStyle = colGrad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(120,130,140,0.5)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // 기둥 홈 (디테일)
    for(var i=0; i<4; i++){
      ctx.beginPath();
      ctx.rect(cx+ox-4, 24+i*14, 8, 2);
      ctx.fillStyle = 'rgba(40,48,56,0.6)';
      ctx.fill();
    }
  });

  // ── 유압 실린더 (가운데 위) ──
  // 실린더 바깥 케이스
  ctx.beginPath();
  rr(ctx, cx-10, 8, 20, 30, 4);
  var cylGrad = ctx.createLinearGradient(cx-10,0,cx+10,0);
  cylGrad.addColorStop(0,'#505860');
  cylGrad.addColorStop(0.4,'#909aa4');
  cylGrad.addColorStop(1,'#404850');
  ctx.fillStyle = cylGrad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(140,150,160,0.6)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // 실린더 피스톤 로드 (움직이는 부분)
  var rodTop = 38;
  var rodBot = rodTop + 16 + pressOffset;
  ctx.beginPath();
  rr(ctx, cx-5, rodTop, 10, rodBot-rodTop, 2);
  var rodGrad = ctx.createLinearGradient(cx-5,0,cx+5,0);
  rodGrad.addColorStop(0,'#707880');
  rodGrad.addColorStop(0.5,'#c0c8d0');
  rodGrad.addColorStop(1,'#606870');
  ctx.fillStyle = rodGrad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(160,170,180,0.5)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // ── 프레스 헤드 (내려오는 본체) ──
  var headY = 52 + pressOffset + impactShake;
  var headH = 22;

  // 헤드 그림자
  if(!isImpact){
    ctx.beginPath();
    ctx.ellipse(cx, plateY+2, 30*(1-pressY*0.3), 4, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,'+(0.15+pressY*0.2)+')';
    ctx.fill();
  }

  var headGrad = ctx.createLinearGradient(cx-32, headY, cx+32, headY+headH);
  headGrad.addColorStop(0, '#707880');
  headGrad.addColorStop(0.3, '#a0a8b0');
  headGrad.addColorStop(0.7, '#808890');
  headGrad.addColorStop(1, '#505860');
  ctx.beginPath();
  rr(ctx, cx-32+shakeX, headY, 64, headH, 5);
  ctx.fillStyle = headGrad;
  ctx.fill();
  ctx.strokeStyle = isImpact
    ? 'rgba(220,230,240,0.7)'
    : 'rgba(150,160,170,0.6)';
  ctx.lineWidth = 1.8;
  ctx.stroke();

  // 헤드 볼트 4개
  [[-22,headH/2],[22,headH/2]].forEach(function([ox,oy]){
    ctx.beginPath();
    ctx.arc(cx+ox+shakeX, headY+oy, 4, 0, Math.PI*2);
    ctx.fillStyle = '#404850';
    ctx.fill();
    ctx.strokeStyle = '#909aa0';
    ctx.lineWidth = 1;
    ctx.stroke();
    // 볼트 십자
    ctx.beginPath();
    ctx.moveTo(cx+ox+shakeX-2, headY+oy);
    ctx.lineTo(cx+ox+shakeX+2, headY+oy);
    ctx.moveTo(cx+ox+shakeX, headY+oy-2);
    ctx.lineTo(cx+ox+shakeX, headY+oy+2);
    ctx.strokeStyle = '#606870';
    ctx.lineWidth = 0.8;
    ctx.stroke();
  });

  // 헤드 하단 압착면 (줄무늬)
  for(var i=0;i<6;i++){
    ctx.beginPath();
    ctx.moveTo(cx-30+shakeX+i*11, headY+headH);
    ctx.lineTo(cx-24+shakeX+i*11, headY+headH);
    ctx.strokeStyle = 'rgba(60,70,80,0.7)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // ── 반쯤 뜬 눈 두 개 (헤드 위에 붙음) ──
  var eyeY = headY - 9 + impactShake;
  // 반쯤 감긴 정도 — 프레스 내려올수록 더 감김
  var drowsiness = 0.55 + pressY * 0.15;

  [-13, 13].forEach(function(ox, i){
    var ex = cx + ox + shakeX;
    var er = 7;

    // 눈 흰자
    ctx.beginPath();
    ctx.ellipse(ex, eyeY, er, er*0.9, 0, 0, Math.PI*2);
    ctx.fillStyle = '#dde4ec';
    ctx.fill();
    ctx.strokeStyle = 'rgba(100,110,120,0.5)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // 홍채
    var pd = Math.sin(t*0.8+i)*1;
    ctx.beginPath();
    ctx.arc(ex+pd, eyeY+1, 4.5, 0, Math.PI*2);
    var ig = ctx.createRadialGradient(ex+pd,eyeY+1,0,ex+pd,eyeY+1,4.5);
    ig.addColorStop(0,'#8899aa');
    ig.addColorStop(0.5,'#556677');
    ig.addColorStop(1,'#334455');
    ctx.fillStyle = ig;
    ctx.fill();

    // 동공
    ctx.beginPath();
    ctx.arc(ex+pd, eyeY+1, 2.2, 0, Math.PI*2);
    ctx.fillStyle = '#0a0e12';
    ctx.fill();

    // 반짝임
    ctx.beginPath();
    ctx.arc(ex+pd+1.5, eyeY-0.5, 1, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fill();

    // 반쯤 감긴 눈꺼풀 (위에서 내려옴)
    ctx.beginPath();
    ctx.ellipse(ex, eyeY, er+1, (er+1)*0.95, 0, Math.PI, 0, true); // 위쪽 반원
    ctx.lineTo(ex+er+1, eyeY);
    ctx.fillStyle = '#808890';
    // drowsiness 만큼 내려온 눈꺼풀
    ctx.save();
    ctx.beginPath();
    ctx.rect(ex-er-2, eyeY-er-2, (er+2)*2, (er+2)*drowsiness + 2);
    ctx.clip();
    ctx.beginPath();
    ctx.ellipse(ex, eyeY, er+1, er+1, 0, 0, Math.PI*2);
    ctx.fillStyle = '#757e88';
    ctx.fill();
    ctx.restore();


  });

  // ── 상단 프레임 ──
  ctx.beginPath();
  rr(ctx, cx-36, 6, 72, 14, [5,5,0,0]);
  var frameGrad = ctx.createLinearGradient(cx-36,6,cx+36,20);
  frameGrad.addColorStop(0,'#606870');
  frameGrad.addColorStop(0.5,'#909aa4');
  frameGrad.addColorStop(1,'#505860');
  ctx.fillStyle = frameGrad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(140,150,160,0.6)';
  ctx.lineWidth = 1.2;
  ctx.stroke();

  // D-LINK 텍스트 (프레임에)
  ctx.font = 'bold 7px Share Tech Mono';
  ctx.fillStyle = 'rgba(180,190,200,0.7)';
  ctx.textAlign = 'center';
  ctx.fillText('D-LINK', cx, 16);

  // 충격시 먼지/파편 파티클
  if(isImpact && pressY > 0.85){
    for(var i=0;i<6;i++){
      var pa = (i/6)*Math.PI + Math.PI;
      var pr = (pressY-0.85)*7 * 30;
      var ppx = cx + Math.cos(pa)*pr + shakeX;
      var ppy = plateY + Math.sin(pa)*pr*0.4;
      ctx.beginPath();
      ctx.arc(ppx, ppy, 1.5+Math.random()*1.5, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(160,170,180,'+((1-(pressY-0.85)*7)*0.6)+')';
      ctx.fill();
    }
  }

  // 전체 회색 글로우
  var gGrad = ctx.createRadialGradient(cx, cy, 10, cx, cy, 58);
  gGrad.addColorStop(0, 'transparent');
  gGrad.addColorStop(1, 'rgba(140,150,160,'+(0.04+pressY*0.04)+')');
  ctx.beginPath();
  ctx.arc(cx, cy, 58, 0, Math.PI*2);
  ctx.fillStyle = gGrad;
  ctx.fill();
}

function drawLINKSYS(ctx, t) {
  var cx=60, cy=60;
  ctx.clearRect(0,0,120,120);

  var bob = Math.sin(t*1.6)*2;

  var clapCycle = (t * 0.9) % 1;
  var clapAngle;
  if(clapCycle < 0.08){
    clapAngle = 1 - clapCycle/0.08;
  } else if(clapCycle < 0.18){
    clapAngle = 0;
  } else {
    clapAngle = (clapCycle - 0.18) / 0.82;
  }
  var isClap = clapCycle < 0.18;
  var maxOpenAngle = 0.38;
  var topAngle = clapAngle * maxOpenAngle;

  var shake = isClap && clapCycle < 0.1 ? (0.1-clapCycle)/0.1 * 2.5 : 0;
  var shakeX = shake * (Math.random()-0.5)*2;
  var shakeY = shake * (Math.random()-0.5)*2;
  var baseY = cy + bob + shakeY;

  // ── 슬레이트 본체 (아래) ──
  var bodyW = 72, bodyH = 50;
  var bodyX = cx - bodyW/2 + shakeX;
  var bodyY = baseY - 4;

  var bodyGrad = ctx.createLinearGradient(bodyX, bodyY, bodyX+bodyW, bodyY+bodyH);
  bodyGrad.addColorStop(0, '#1c1c1c');
  bodyGrad.addColorStop(0.4, '#2a2a2a');
  bodyGrad.addColorStop(1, '#111111');
  ctx.beginPath();
  rr(ctx, bodyX, bodyY, bodyW, bodyH, [0,0,6,6]);
  ctx.fillStyle = bodyGrad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // ── 스크린 ──
  var scrPad = 6;
  var scrX = bodyX+scrPad;
  var scrY = bodyY+scrPad;
  var scrW = bodyW-scrPad*2;
  var scrH = bodyH-scrPad*2;

  ctx.beginPath();
  rr(ctx, scrX, scrY, scrW, scrH, 3);
  ctx.fillStyle = '#f5f0e8';
  ctx.fill();

  // 스크린 세로선
  ctx.beginPath();
  ctx.moveTo(scrX+8, scrY); ctx.lineTo(scrX+8, scrY+scrH);
  ctx.moveTo(scrX+scrW-8, scrY); ctx.lineTo(scrX+scrW-8, scrY+scrH);
  ctx.strokeStyle = 'rgba(0,0,0,0.06)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // ── 눈알 두 개 (스크린 안) ──
  var eyeCY = scrY + scrH*0.5;
  var blinkEye = Math.sin(t*1.4) > 0.9;
  [-13, 13].forEach(function(ox, i){
    var ex = cx+ox+shakeX;
    if(!blinkEye){
      ctx.beginPath();
      ctx.arc(ex, eyeCY, 7, 0, Math.PI*2);
      ctx.fillStyle = '#fff8f0';
      ctx.fill();
      var pd = Math.sin(t*1.5+i)*1.2;
      ctx.beginPath();
      ctx.arc(ex+pd, eyeCY, 4.2, 0, Math.PI*2);
      var ig = ctx.createRadialGradient(ex+pd,eyeCY,0,ex+pd,eyeCY,4.2);
      ig.addColorStop(0,'#444'); ig.addColorStop(0.5,'#222'); ig.addColorStop(1,'#111');
      ctx.fillStyle = ig; ctx.fill();
      ctx.beginPath();
      ctx.arc(ex+pd, eyeCY, 2, 0, Math.PI*2);
      ctx.fillStyle = '#000'; ctx.fill();
      ctx.beginPath();
      ctx.arc(ex+pd+2, eyeCY-2, 1.2, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.95)'; ctx.fill();
      ctx.beginPath();
      ctx.arc(ex, eyeCY, 7, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 1; ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.moveTo(ex-7, eyeCY); ctx.lineTo(ex+7, eyeCY);
      ctx.strokeStyle = 'rgba(0,0,0,0.5)';
      ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.stroke();
    }
  });

  // ── 본체 윗면 이빨 (아래 턱) ──
  var jawY = bodyY; // 본체 맨 위 = 아래 턱 위치
  var btCount = 8;
  var btW = bodyW / btCount;
  for(var i=0; i<btCount; i++){
    var tx = bodyX + i*btW;
    var th = 4 + (i%2)*4;
    ctx.beginPath();
    ctx.moveTo(tx+1, jawY);
    ctx.lineTo(tx + btW/2, jawY - th); // 위쪽으로 뾰족
    ctx.lineTo(tx + btW-1, jawY);
    ctx.closePath();
    ctx.fillStyle = '#f5f0e8';
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
    ctx.lineWidth = 0.5; ctx.stroke();
  }

  // ── 위 클래퍼 ──
  ctx.save();
  ctx.translate(bodyX + shakeX, bodyY + shakeY);
  ctx.rotate(-topAngle);

  var clipH = 18;

  var clipGrad = ctx.createLinearGradient(0,-clipH,bodyW,0);
  clipGrad.addColorStop(0,'#1a1a1a');
  clipGrad.addColorStop(0.5,'#2e2e2e');
  clipGrad.addColorStop(1,'#111');
  ctx.beginPath();
  rr(ctx, 0, -clipH, bodyW, clipH, [4,4,0,0]);
  ctx.fillStyle = clipGrad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1.5; ctx.stroke();

  // 흑백 줄무늬
  ctx.save();
  ctx.beginPath();
  rr(ctx, 0, -clipH, bodyW, clipH, [4,4,0,0]);
  ctx.clip();
  var stripeW = 10;
  for(var i=-2; i<10; i++){
    ctx.beginPath();
    ctx.moveTo(i*stripeW*2, -clipH);
    ctx.lineTo(i*stripeW*2+stripeW, -clipH);
    ctx.lineTo(i*stripeW*2+stripeW+clipH, 0);
    ctx.lineTo(i*stripeW*2+clipH, 0);
    ctx.closePath();
    ctx.fillStyle = i%2===0 ? 'rgba(255,255,255,0.85)' : 'rgba(0,0,0,0)';
    ctx.fill();
  }
  ctx.restore();

  ctx.font = 'bold 7px Share Tech Mono';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.textAlign = 'center';
  ctx.fillText('LINKSYS', bodyW/2, -5);

  // ── 위 클래퍼 아랫면 이빨 (위 턱) ──
  var ttCount = 8;
  var ttW = bodyW / ttCount;
  for(var i=0; i<ttCount; i++){
    var tx = i*ttW;
    var th = 4 + (i%2)*4;
    ctx.beginPath();
    ctx.moveTo(tx+1, 0);
    ctx.lineTo(tx + ttW/2, th); // 아래로 뾰족
    ctx.lineTo(tx + ttW-1, 0);
    ctx.closePath();
    ctx.fillStyle = '#f5f0e8';
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
    ctx.lineWidth = 0.5; ctx.stroke();
  }

  // 힌지
  ctx.beginPath();
  ctx.arc(0, 0, 5, 0, Math.PI*2);
  ctx.fillStyle = '#333'; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1.2; ctx.stroke();

  ctx.restore();

  // ── 탁! + 키득 이펙트 ──
  if(isClap && clapCycle < 0.15){
    var popAlpha = (0.15-clapCycle)/0.15;
    // 파티클
    for(var i=0;i<5;i++){
      var pa = (i/5)*Math.PI*2;
      var pr = (1-popAlpha) * 20;
      ctx.beginPath();
      ctx.arc(cx+shakeX + Math.cos(pa)*pr, bodyY+shakeY + Math.sin(pa)*pr*0.4, 2, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,'+(popAlpha*0.5)+')';
      ctx.fill();
    }
    // 탁!
    ctx.font = 'bold '+(9+popAlpha*3)+'px Share Tech Mono';
    ctx.fillStyle = 'rgba(255,255,255,'+(popAlpha*0.9)+')';
    ctx.textAlign = 'center';
    ctx.fillText('탁!', cx+26+shakeX, bodyY-6+shakeY);
    // 키득
    var giggleAlpha = popAlpha * 0.75;
    ctx.font = (8+popAlpha*2)+'px Share Tech Mono';
    ctx.fillStyle = 'rgba(200,255,200,'+(giggleAlpha)+')';
    ctx.fillText('키득ㅋ', cx-20+shakeX, bodyY-14+shakeY);
  }

  // 글로우
  var gGrad = ctx.createRadialGradient(cx,cy,10,cx,cy,58);
  gGrad.addColorStop(0,'transparent');
  gGrad.addColorStop(1,'rgba(255,255,255,0.03)');
  ctx.beginPath();
  ctx.arc(cx,cy,58,0,Math.PI*2);
  ctx.fillStyle = gGrad; ctx.fill();
}

function drawUBIQUITI(ctx, t) {
  var cx=60, cy=62;
  ctx.clearRect(0,0,120,120);

  var bob = Math.sin(t*1.7)*2.5;
  var by  = cy + bob;

  // ── 안경 브릿지 + 프레임 색
  var col = '#88ff44';
  var colD = '#44bb00';
  var colG = 'rgba(136,255,68,';

  // 안경 중심 브릿지
  var lCX = cx - 22;  // 왼쪽 렌즈 중심 (눈쪽)
  var rCX = cx + 22;  // 오른쪽 렌즈 중심 (표적쪽)
  var lensR = 18;

  // 글로우
  [lCX, rCX].forEach(function(lx) {
    var gr = ctx.createRadialGradient(lx, by, 4, lx, by, lensR+8);
    gr.addColorStop(0, colG+'0.12)');
    gr.addColorStop(1, colG+'0)');
    ctx.beginPath();
    ctx.arc(lx, by, lensR+8, 0, Math.PI*2);
    ctx.fillStyle = gr;
    ctx.fill();
  });

  // ── 렌즈 프레임 두 개 ──
  [lCX, rCX].forEach(function(lx) {
    // 렌즈 배경
    ctx.beginPath();
    ctx.arc(lx, by, lensR, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(8,20,8,0.92)';
    ctx.fill();
    // 프레임
    ctx.beginPath();
    ctx.arc(lx, by, lensR, 0, Math.PI*2);
    ctx.strokeStyle = col;
    ctx.lineWidth = 2.5;
    ctx.stroke();
    // 프레임 안쪽 얇은 선
    ctx.beginPath();
    ctx.arc(lx, by, lensR-4, 0, Math.PI*2);
    ctx.strokeStyle = colG+'0.2)';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // ── 브릿지 (코 부분) ──
  ctx.beginPath();
  ctx.moveTo(lCX + lensR, by - 2);
  ctx.quadraticCurveTo(cx, by - 8, rCX - lensR, by - 2);
  ctx.strokeStyle = col;
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.stroke();

  // ── 안경 다리 ──
  // 왼쪽 다리
  ctx.beginPath();
  ctx.moveTo(lCX - lensR, by);
  ctx.quadraticCurveTo(lCX - lensR - 8, by - 2, lCX - lensR - 18, by + 4);
  ctx.strokeStyle = col;
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.stroke();
  // 오른쪽 다리
  ctx.beginPath();
  ctx.moveTo(rCX + lensR, by);
  ctx.quadraticCurveTo(rCX + lensR + 8, by - 2, rCX + lensR + 18, by + 4);
  ctx.strokeStyle = col;
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.stroke();

  // ── 왼쪽 렌즈: 눈알 ──
  var blink = Math.sin(t*1.5) > 0.9;
  if (!blink) {
    // 흰자
    ctx.beginPath();
    ctx.arc(lCX, by, 11, 0, Math.PI*2);
    ctx.fillStyle = '#e8ffe0';
    ctx.fill();
    // 홍채
    var pd = Math.sin(t*1.8) * 1.5;
    ctx.beginPath();
    ctx.arc(lCX+pd, by, 6.5, 0, Math.PI*2);
    var ig = ctx.createRadialGradient(lCX+pd,by,0,lCX+pd,by,6.5);
    ig.addColorStop(0, '#aaffaa');
    ig.addColorStop(0.4, '#44cc44');
    ig.addColorStop(1, '#116611');
    ctx.fillStyle = ig;
    ctx.fill();
    // 동공
    ctx.beginPath();
    ctx.arc(lCX+pd, by, 3, 0, Math.PI*2);
    ctx.fillStyle = '#050a05';
    ctx.fill();
    // 반짝임
    ctx.beginPath();
    ctx.arc(lCX+pd+2, by-2, 1.5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.fill();
  } else {
    // 깜빡임
    ctx.beginPath();
    ctx.moveTo(lCX-10, by);
    ctx.lineTo(lCX+10, by);
    ctx.strokeStyle = colG+'0.8)';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  // ── 오른쪽 렌즈: 총 표적 ──
  // 표적 회전 (천천히)
  var tgtRot = t * 0.4;
  var pulse  = 0.5 + Math.sin(t*3)*0.3;

  // 원형 표적 3개
  [10, 6.5, 3].forEach(function(r, i) {
    ctx.beginPath();
    ctx.arc(rCX, by, r, 0, Math.PI*2);
    ctx.strokeStyle = colG+(0.35 + i*0.2 + pulse*0.1)+')';
    ctx.lineWidth = i===2 ? 1.5 : 1;
    ctx.stroke();
  });

  // 십자선 (회전)
  ctx.save();
  ctx.translate(rCX, by);
  ctx.rotate(tgtRot);
  var lineAlpha = 0.6 + pulse*0.2;
  // 십자 4방향
  [0, Math.PI/2].forEach(function(a) {
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*4, Math.sin(a)*4);
    ctx.lineTo(Math.cos(a)*13, Math.sin(a)*13);
    ctx.moveTo(-Math.cos(a)*4, -Math.sin(a)*4);
    ctx.lineTo(-Math.cos(a)*13, -Math.sin(a)*13);
    ctx.strokeStyle = colG+lineAlpha+')';
    ctx.lineWidth = 1.2;
    ctx.lineCap = 'round';
    ctx.stroke();
  });
  // 중심점
  ctx.beginPath();
  ctx.arc(0, 0, 1.8, 0, Math.PI*2);
  ctx.fillStyle = col;
  ctx.fill();
  ctx.restore();

  // 표적 스캔 라인 (회전하는 섹터)
  ctx.save();
  ctx.translate(rCX, by);
  ctx.rotate(t*1.2);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.arc(0, 0, lensR-3, -0.15, 0.15);
  ctx.closePath();
  ctx.fillStyle = colG+'0.08)';
  ctx.fill();
  ctx.restore();

  // ── 전체 연두 글로우 ──
  var gGrad = ctx.createRadialGradient(cx, by, 10, cx, by, 58);
  gGrad.addColorStop(0, 'transparent');
  gGrad.addColorStop(1, colG+(0.03+Math.sin(t*2)*0.02)+')');
  ctx.beginPath();
  ctx.arc(cx, by, 58, 0, Math.PI*2);
  ctx.fillStyle = gGrad;
  ctx.fill();
}

function drawHUAWEI(ctx, t) {
  if(!ctx) return;
  var cx=60, cy=60;
  ctx.clearRect(0,0,120,120);

  var bob = Math.sin(t*1.5)*1.5;
  var by  = cy + bob;

  var FW = 62, FH = 94;
  var fx = cx - FW/2;
  var fy = by - FH/2;
  var divY = fy + FH*0.42;
  var topH = divY - fy;
  var botH = fy + FH - divY;

  // 문 열림 사이클 — 위칸 (5초 주기, 많이 열림)
  var tc = (t * 0.2) % 1;
  var topOpen;
  if(tc < 0.25) topOpen = tc/0.25;
  else if(tc < 0.55) topOpen = 1;
  else topOpen = 1-(tc-0.55)/0.45;
  topOpen = topOpen*topOpen*(3-2*topOpen);

  // 아래칸 (다른 타이밍)
  var bc = ((t+2.5) * 0.16) % 1;
  var botOpen;
  if(bc < 0.25) botOpen = bc/0.25;
  else if(bc < 0.55) botOpen = 1;
  else botOpen = 1-(bc-0.55)/0.45;
  botOpen = botOpen*botOpen*(3-2*botOpen);

  // ── 그림자 ──
  ctx.beginPath();
  ctx.ellipse(cx, fy+FH+5, 22*(1-bob*0.02), 4, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fill();

  // ── 냉장고 본체 배경 ──
  function drawBox(x,y,w,h,r,fill,stroke){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
    if(fill){ctx.fillStyle=fill;ctx.fill();}
    if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=1.8;ctx.stroke();}
  }

  drawBox(fx, fy, FW, FH, 6, '#f2f2f2', 'rgba(160,160,160,0.7)');

  // 구분선
  ctx.beginPath();
  ctx.moveTo(fx+3, divY);
  ctx.lineTo(fx+FW-3, divY);
  ctx.strokeStyle = 'rgba(150,150,150,0.6)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 힌지
  [fy+8, fy+FH-8].forEach(function(hy){
    ctx.beginPath();
    ctx.arc(fx+FW-4, hy, 3, 0, Math.PI*2);
    ctx.fillStyle = '#bbb'; ctx.fill();
  });

  // ── 위칸 내부 (문 뒤) ──
  ctx.save();
  ctx.beginPath();
  ctx.rect(fx+2, fy+2, FW-4, topH-2);
  ctx.clip();

  // 내부 배경
  ctx.fillStyle = '#e8f0ff';
  ctx.fillRect(fx+2, fy+2, FW-4, topH-2);
  // 냉기 줄
  for(var i=0;i<3;i++){
    ctx.beginPath();
    ctx.moveTo(fx+6, fy+16+i*10);
    ctx.lineTo(fx+FW-6, fy+16+i*10);
    ctx.strokeStyle = 'rgba(180,200,240,0.5)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // ── 눈 두 개 (노란색, topOpen 따라 나타남) ──
  var eyeAlpha = Math.max(0, (topOpen-0.3)/0.7);
  if(eyeAlpha > 0){
    ctx.save();
    ctx.globalAlpha = eyeAlpha;
    var eyeY2 = fy + topH*0.32;
    var blink = Math.sin(t*1.6) > 0.88;
    [-9,9].forEach(function(ox){
      var ex = cx+ox;
      if(!blink){
        ctx.beginPath(); ctx.arc(ex,eyeY2,6,0,Math.PI*2);
        ctx.fillStyle='#fffde0'; ctx.fill();
        var pd = Math.sin(t*1.5)*1;
        ctx.beginPath(); ctx.arc(ex+pd,eyeY2,3.5,0,Math.PI*2);
        var ig=ctx.createRadialGradient(ex+pd,eyeY2,0,ex+pd,eyeY2,3.5);
        ig.addColorStop(0,'#ffe066'); ig.addColorStop(0.5,'#ffcc00'); ig.addColorStop(1,'#cc8800');
        ctx.fillStyle=ig; ctx.fill();
        ctx.beginPath(); ctx.arc(ex+pd,eyeY2,1.5,0,Math.PI*2);
        ctx.fillStyle='#1a0a00'; ctx.fill();
        ctx.beginPath(); ctx.arc(ex+pd+1.5,eyeY2-1.5,1,0,Math.PI*2);
        ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.fill();
      } else {
        ctx.beginPath();
        ctx.moveTo(ex-6,eyeY2); ctx.lineTo(ex+6,eyeY2);
        ctx.strokeStyle='rgba(255,200,0,0.8)';
        ctx.lineWidth=2.2; ctx.lineCap='round'; ctx.stroke();
      }
    });
    ctx.restore();
  }

  // ── 팔 (노란색, topOpen 따라 슉 튀어나옴) ──
  // 팔이 냉장고 양옆으로 슈욱 나오는 효과
  var armOut = Math.max(0, (topOpen-0.1)/0.9); // 0→1
  armOut = armOut*armOut*(3-2*armOut); // ease
  if(armOut > 0){
    ctx.save();
    ctx.globalAlpha = Math.min(1, armOut*1.5);
    var armY3 = fy + topH*0.6;
    var armLen = armOut * 28; // 최대 28px 뻗음

    // 왼쪽 팔
    var lArmX = fx - armLen + 4;
    // 위팔
    ctx.beginPath();
    ctx.moveTo(fx+4, armY3);
    ctx.lineTo(lArmX+8, armY3-6);
    ctx.strokeStyle='#ffdd00'; ctx.lineWidth=7; ctx.lineCap='round'; ctx.stroke();
    // 아래팔
    ctx.beginPath();
    ctx.moveTo(lArmX+8, armY3-6);
    ctx.lineTo(lArmX, armY3+4);
    ctx.strokeStyle='#ffcc00'; ctx.lineWidth=6; ctx.lineCap='round'; ctx.stroke();
    // 주먹
    ctx.beginPath();
    ctx.arc(lArmX, armY3+4, 5.5, 0, Math.PI*2);
    ctx.fillStyle='#ffdd00'; ctx.fill();
    ctx.strokeStyle='#cc9900'; ctx.lineWidth=1; ctx.stroke();
    // 손가락 3개
    [[-3,-2],[0,-4],[3,-2]].forEach(function(d){
      ctx.beginPath();
      ctx.arc(lArmX+d[0], armY3+4+d[1], 2.5, 0, Math.PI*2);
      ctx.fillStyle='#ffcc00'; ctx.fill();
    });

    // 오른쪽 팔
    var rArmX = fx + FW + armLen - 4;
    // 위팔
    ctx.beginPath();
    ctx.moveTo(fx+FW-4, armY3);
    ctx.lineTo(rArmX-8, armY3-6);
    ctx.strokeStyle='#ffdd00'; ctx.lineWidth=7; ctx.lineCap='round'; ctx.stroke();
    // 아래팔
    ctx.beginPath();
    ctx.moveTo(rArmX-8, armY3-6);
    ctx.lineTo(rArmX, armY3+4);
    ctx.strokeStyle='#ffcc00'; ctx.lineWidth=6; ctx.lineCap='round'; ctx.stroke();
    // 주먹
    ctx.beginPath();
    ctx.arc(rArmX, armY3+4, 5.5, 0, Math.PI*2);
    ctx.fillStyle='#ffdd00'; ctx.fill();
    ctx.strokeStyle='#cc9900'; ctx.lineWidth=1; ctx.stroke();
    [[-3,-2],[0,-4],[3,-2]].forEach(function(d){
      ctx.beginPath();
      ctx.arc(rArmX+d[0], armY3+4+d[1], 2.5, 0, Math.PI*2);
      ctx.fillStyle='#ffcc00'; ctx.fill();
    });

    ctx.restore();
  }
  ctx.restore(); // 위칸 clip 해제

  // ── 아래칸 내부 (무지개 소용돌이) ──
  ctx.save();
  ctx.beginPath();
  ctx.rect(fx+2, divY+2, FW-4, botH-4);
  ctx.clip();

  ctx.fillStyle = 'rgba(10,5,20,'+botOpen+')';
  ctx.fillRect(fx+2, divY+2, FW-4, botH-4);

  if(botOpen > 0.05){
    var swX = cx, swY = divY + botH/2;
    var swR2 = Math.min(FW/2-6, botH/2-4);
    var swA = t*2.0;
    var cols = [
      [255,0,0],[255,120,0],[255,220,0],
      [0,220,60],[0,120,255],[100,0,255],[255,0,200]
    ];
    var segs2 = 24;
    for(var ring2=0; ring2<7; ring2++){
      var r1b = swR2*(ring2/7);
      var r2b = swR2*((ring2+1.05)/7);
      for(var s2=0;s2<segs2;s2++){
        var a1b = swA + (s2/segs2)*Math.PI*2 + ring2*0.5;
        var a2b = swA + ((s2+1)/segs2)*Math.PI*2 + ring2*0.5;
        var ci2 = (ring2*3+s2) % cols.length;
        var c2  = cols[ci2];
        ctx.beginPath();
        ctx.moveTo(swX+Math.cos(a1b)*r1b, swY+Math.sin(a1b)*r1b);
        ctx.arc(swX, swY, r2b, a1b, a2b);
        ctx.arc(swX, swY, r1b, a2b, a1b, true);
        ctx.closePath();
        ctx.fillStyle='rgba('+c2[0]+','+c2[1]+','+c2[2]+','+botOpen+')';
        ctx.fill();
      }
    }
    // 중심 글로우
    var cg2=ctx.createRadialGradient(swX,swY,0,swX,swY,swR2*0.35);
    cg2.addColorStop(0,'rgba(255,255,255,'+botOpen+')');
    cg2.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath(); ctx.arc(swX,swY,swR2*0.35,0,Math.PI*2);
    ctx.fillStyle=cg2; ctx.fill();
  }
  ctx.restore();

  // ── 위칸 문 (위로 젖혀짐) ──
  // 문이 위로 들려올라가는 효과 — ctx.transform으로 위쪽 힌지 기준 회전
  ctx.save();
  // 힌지 기준: 문 위쪽 가장자리
  ctx.translate(fx+2, fy+2);
  // scaleY로 눌러서 위로 열리는 효과 (1 = 닫힘, 0 = 완전히 열림)
  var doorScale = 1 - topOpen*0.92;
  ctx.scale(1, doorScale);
  drawBox(0, 0, FW-4, topH-2, 4, null, null);
  var tdg = ctx.createLinearGradient(0,0,FW-4,0);
  tdg.addColorStop(0,'#e8e8e8');
  tdg.addColorStop(0.3,'#ffffff');
  tdg.addColorStop(1,'#eeeeee');
  ctx.fillStyle=tdg; ctx.fill();
  ctx.strokeStyle='rgba(150,150,150,0.5)'; ctx.lineWidth=1; ctx.stroke();
  // 손잡이
  ctx.beginPath();
  ctx.moveTo(FW-14, topH*0.3);
  ctx.lineTo(FW-14, topH*0.7);
  ctx.strokeStyle='#aaa'; ctx.lineWidth=4; ctx.lineCap='round'; ctx.stroke();
  ctx.restore();

  // ── 아래칸 문 (아래로 젖혀짐) ──
  ctx.save();
  ctx.translate(fx+2, divY+2+botH-4);
  var botDoorScale = 1 - botOpen*0.92;
  ctx.scale(1, botDoorScale);
  ctx.translate(0, -(botH-4));
  drawBox(0, 0, FW-4, botH-4, 4, null, null);
  var bdg = ctx.createLinearGradient(0,0,FW-4,0);
  bdg.addColorStop(0,'#e8e8e8');
  bdg.addColorStop(0.3,'#ffffff');
  bdg.addColorStop(1,'#eeeeee');
  ctx.fillStyle=bdg; ctx.fill();
  ctx.strokeStyle='rgba(150,150,150,0.5)'; ctx.lineWidth=1; ctx.stroke();
  // 손잡이
  ctx.beginPath();
  ctx.moveTo(FW-14, botH*0.3);
  ctx.lineTo(FW-14, botH*0.7);
  ctx.strokeStyle='#aaa'; ctx.lineWidth=4; ctx.lineCap='round'; ctx.stroke();
  ctx.restore();

  // 냉장고 외곽선 다시 (맨 위에)
  drawBox(fx, fy, FW, FH, 6, null, 'rgba(140,140,140,0.6)');
}

function drawIPTIME_FLAT(ctx, t) {
  var cx=60, cy=60;
  ctx.clearRect(0,0,120,120);
  var bob=Math.sin(t*2)*2;
  var by=cy+bob;
  var blink=Math.sin(t*1.3)>0.92;
  // 스탠드
  ctx.beginPath();ctx.moveTo(cx-2,by+28);ctx.lineTo(cx-2,by+36);
  ctx.moveTo(cx+2,by+28);ctx.lineTo(cx+2,by+36);
  ctx.strokeStyle='#222';ctx.lineWidth=5;ctx.lineCap='round';ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-16,by+36);ctx.lineTo(cx+16,by+36);
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=3;ctx.lineCap='round';ctx.stroke();
  // 본체 (얇은 베젤)
  var tw=80,th=46,tx=cx-tw/2,ty=by-th/2-4;
  var bg=ctx.createLinearGradient(tx,ty,tx,ty+th);
  bg.addColorStop(0,'#1c1c1c');bg.addColorStop(1,'#090909');
  ctx.beginPath();
  ctx.moveTo(tx+4,ty);ctx.lineTo(tx+tw-4,ty);ctx.quadraticCurveTo(tx+tw,ty,tx+tw,ty+4);
  ctx.lineTo(tx+tw,ty+th-4);ctx.quadraticCurveTo(tx+tw,ty+th,tx+tw-4,ty+th);
  ctx.lineTo(tx+4,ty+th);ctx.quadraticCurveTo(tx,ty+th,tx,ty+th-4);
  ctx.lineTo(tx,ty+4);ctx.quadraticCurveTo(tx,ty,tx+4,ty);
  ctx.closePath();ctx.fillStyle=bg;ctx.fill();
  ctx.strokeStyle='#2a2a2a';ctx.lineWidth=1.5;ctx.stroke();
  // 화면 (베젤 2px)
  var sp=2;
  ctx.beginPath();ctx.rect(tx+sp,ty+sp,tw-sp*2,th-sp*2);
  ctx.fillStyle='#040412';ctx.fill();
  // 반사
  ctx.beginPath();ctx.rect(tx+sp,ty+sp,tw-sp*2,8);
  ctx.fillStyle='rgba(255,255,255,0.03)';ctx.fill();
  // 눈 — 화면 중앙 상단
  var ey=ty+sp+18;
  if(!blink){
    [-12,12].forEach(function(ox){
      ctx.beginPath();ctx.arc(cx+ox,ey,6,0,Math.PI*2);ctx.fillStyle='#c8eeff';ctx.fill();
      ctx.beginPath();ctx.arc(cx+ox,ey,3.5,0,Math.PI*2);ctx.fillStyle='#1a3a60';ctx.fill();
      ctx.beginPath();ctx.arc(cx+ox+1,ey-1.5,1.2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.8)';ctx.fill();
    });
  } else {
    [-12,12].forEach(function(ox){
      ctx.beginPath();ctx.moveTo(cx+ox-6,ey);ctx.lineTo(cx+ox+6,ey);
      ctx.strokeStyle='#c8eeff';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
    });
  }
  // 웃는 입 — 눈 아래
  ctx.beginPath();ctx.arc(cx,ey+12,7,0.18*Math.PI,0.82*Math.PI);
  ctx.strokeStyle='#6ab8f0';ctx.lineWidth=2.2;ctx.lineCap='round';ctx.stroke();
  // LED
  var lp=0.5+Math.sin(t*4)*0.5;
  ctx.beginPath();ctx.arc(tx+tw-6,ty+th-5,2,0,Math.PI*2);
  ctx.fillStyle='rgba(0,255,136,'+lp+')';ctx.fill();
}

function drawHOTSPOT_FLOWER(ctx, t) {
  var cx=60,cy=60;
  ctx.clearRect(0,0,120,120);
  var bob=Math.sin(t*2.3)*2,by=cy+bob;
  var pulse=Math.sin(t*3);

  // 꽃잎 6개 (주변으로 피어남)
  for(var i=0;i<6;i++){
    var angle=(i/6)*Math.PI*2+t*0.5;
    var dist=24+Math.sin(t*4+i)*3;
    var px=cx+Math.cos(angle)*dist,py2=by+Math.sin(angle)*dist;
    var pSize=9+Math.sin(t*3+i*1.1)*2;
    // 꽃잎 타원
    ctx.save();ctx.translate(px,py2);ctx.rotate(angle+Math.PI/2);
    ctx.beginPath();ctx.ellipse(0,0,pSize*0.55,pSize,0,0,Math.PI*2);
    var pg=ctx.createRadialGradient(0,-pSize*0.3,0,0,0,pSize);
    pg.addColorStop(0,'rgba(255,180,220,0.9)');
    pg.addColorStop(0.6,'rgba(255,100,180,0.7)');
    pg.addColorStop(1,'rgba(200,50,150,0.3)');
    ctx.fillStyle=pg;ctx.fill();
    ctx.strokeStyle='rgba(255,120,200,0.5)';ctx.lineWidth=0.8;ctx.stroke();
    ctx.restore();
    // 꽃잎 끝 빛
    ctx.beginPath();ctx.arc(px,py2,2.5,0,Math.PI*2);
    ctx.fillStyle='rgba(255,150,220,'+(0.5+Math.sin(t*6+i)*0.4)+')';ctx.fill();
  }

  // 몸체 (아메바)
  ctx.beginPath();
  var pts=12;
  for(var i=0;i<pts;i++){
    var a=(i/pts)*Math.PI*2;
    var r=20+Math.sin(t*2+i*0.8)*3+Math.sin(t*3.5+i*1.3)*2;
    i===0?ctx.moveTo(cx+Math.cos(a)*r,by+Math.sin(a)*r):ctx.lineTo(cx+Math.cos(a)*r,by+Math.sin(a)*r);
  }
  ctx.closePath();
  var bg=ctx.createRadialGradient(cx,by,0,cx,by,22);
  bg.addColorStop(0,'#3a0820');bg.addColorStop(0.6,'#220510');bg.addColorStop(1,'#100208');
  ctx.fillStyle=bg;ctx.fill();
  ctx.strokeStyle='rgba(255,100,180,'+(0.4+pulse*0.2)+')';ctx.lineWidth=2;ctx.stroke();

  // 눈알 (가운데)
  ctx.beginPath();ctx.arc(cx,by,12,0,Math.PI*2);ctx.fillStyle='#f0e0ec';ctx.fill();
  var pupilX=cx+Math.sin(t*1.5)*2;
  ctx.beginPath();ctx.arc(pupilX,by,7,0,Math.PI*2);
  var ig=ctx.createRadialGradient(pupilX,by,0,pupilX,by,7);
  ig.addColorStop(0,'#ff66cc');ig.addColorStop(0.5,'#cc2288');ig.addColorStop(1,'#660044');
  ctx.fillStyle=ig;ctx.fill();
  ctx.beginPath();ctx.arc(pupilX,by,3.5,0,Math.PI*2);ctx.fillStyle='#080008';ctx.fill();
  ctx.beginPath();ctx.arc(pupilX+2.5,by-3,1.5,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fill();
  ctx.beginPath();ctx.arc(cx,by,12,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,100,180,0.4)';ctx.lineWidth=1.2;ctx.stroke();

  // 꽃 향기 파티클
  for(var i=0;i<4;i++){
    var fa=(t*0.8+i*1.57)%(Math.PI*2);
    var fr=28+i*5;
    var fa2=0.3+Math.sin(t*4+i)*0.25;
    ctx.beginPath();ctx.arc(cx+Math.cos(fa)*fr,by+Math.sin(fa)*fr,2,0,Math.PI*2);
    ctx.fillStyle='rgba(255,180,230,'+fa2+')';ctx.fill();
  }

  // 핑크 글로우
  var g=ctx.createRadialGradient(cx,by,8,cx,by,50);
  g.addColorStop(0,'transparent');g.addColorStop(1,'rgba(255,80,160,0.06)');
  ctx.beginPath();ctx.arc(cx,by,50,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
}

function drawASUS_BSOD(ctx, t) {
  var cx=60,cy=58;
  ctx.clearRect(0,0,120,120);
  var bob=Math.sin(t*1.8)*2,by=cy+bob;
  var bw=76,bh=72,bx=cx-bw/2,bby=by-bh/2;
  // 배경
  ctx.beginPath();
  ctx.moveTo(bx+5,bby);ctx.lineTo(bx+bw-5,bby);ctx.quadraticCurveTo(bx+bw,bby,bx+bw,bby+5);
  ctx.lineTo(bx+bw,bby+bh-5);ctx.quadraticCurveTo(bx+bw,bby+bh,bx+bw-5,bby+bh);
  ctx.lineTo(bx+5,bby+bh);ctx.quadraticCurveTo(bx,bby+bh,bx,bby+bh-5);
  ctx.lineTo(bx,bby+5);ctx.quadraticCurveTo(bx,bby,bx+5,bby);
  ctx.closePath();
  ctx.fillStyle='#0a38cc';ctx.fill();
  ctx.strokeStyle='#1a50ee';ctx.lineWidth=1.5;ctx.stroke();
  // 상단 윈도우 로고
  ctx.font='bold 11px monospace';ctx.fillStyle='#ffffff';ctx.textAlign='center';
  ctx.fillText(':(', cx, bby+16);
  ctx.font='6px monospace';
  ctx.fillText('Your PC ran into a problem',cx,bby+26);
  // 눈 — 화면 중간
  var ey=bby+bh*0.52;
  var blink=Math.sin(t*1.3)>0.9;
  if(!blink){
    [-9,9].forEach(function(ox){
      ctx.beginPath();ctx.arc(cx+ox,ey,6,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();
      ctx.beginPath();ctx.arc(cx+ox,ey,3.5,0,Math.PI*2);ctx.fillStyle='#0a38cc';ctx.fill();
      ctx.beginPath();ctx.arc(cx+ox+1.5,ey-1.5,1.2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fill();
    });
  } else {
    [-9,9].forEach(function(ox){
      ctx.beginPath();ctx.moveTo(cx+ox-6,ey);ctx.lineTo(cx+ox+6,ey);
      ctx.strokeStyle='#ffffff';ctx.lineWidth=2.2;ctx.lineCap='round';ctx.stroke();
    });
  }
  // 하단 에러 코드
  ctx.font='5px monospace';ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.fillText('STOP: WIFI_FATAL_ERROR',cx,bby+bh-14);
  // 로딩 점
  var dotT=(t*2)%1;
  for(var i=0;i<3;i++){
    ctx.beginPath();ctx.arc(cx-8+i*8,bby+bh-6,2,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,'+(i<Math.floor(dotT*4)?0.9:0.3)+')';ctx.fill();
  }
  // 반사
  ctx.beginPath();ctx.rect(bx+2,bby+2,bw-4,8);ctx.fillStyle='rgba(255,255,255,0.04)';ctx.fill();
}

function drawTPLINK_RADIO(ctx, t) {
  var cx=60,cy=60;
  ctx.clearRect(0,0,120,120);
  var bob=Math.sin(t*1.8)*2,by=cy+bob;

  // 안테나
  ctx.beginPath();
  ctx.moveTo(cx-6,by-24);ctx.lineTo(cx-10,by-46+Math.sin(t*2)*2);
  ctx.moveTo(cx+6,by-24);ctx.lineTo(cx+10,by-46+Math.sin(t*2.3)*2);
  ctx.strokeStyle='#8B5E3C';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx-10,by-46+Math.sin(t*2)*2,3,0,Math.PI*2);
  ctx.arc(cx+10,by-46+Math.sin(t*2.3)*2,3,0,Math.PI*2);
  ctx.fillStyle='#A0522D';ctx.fill();

  // 전자파
  var fc=0.5+Math.sin(t*5)*0.4;
  for(var i=1;i<=3;i++){
    ctx.beginPath();ctx.arc(cx,by-46,i*7+Math.sin(t*4),-0.7*Math.PI,0.3*Math.PI);
    ctx.strokeStyle='rgba(255,220,80,'+(0.25+fc*0.15-i*0.06)+')';ctx.lineWidth=1.5;ctx.stroke();
  }

  // 라디오 본체
  var rw=68,rh=44,rx=cx-rw/2,ry=by-rh/2;
  var bg=ctx.createLinearGradient(rx,ry,rx+rw,ry+rh);
  bg.addColorStop(0,'#8B5E3C');bg.addColorStop(0.5,'#A0522D');bg.addColorStop(1,'#6B3A1F');
  ctx.beginPath();
  ctx.moveTo(rx+6,ry);ctx.lineTo(rx+rw-6,ry);ctx.quadraticCurveTo(rx+rw,ry,rx+rw,ry+6);
  ctx.lineTo(rx+rw,ry+rh-6);ctx.quadraticCurveTo(rx+rw,ry+rh,rx+rw-6,ry+rh);
  ctx.lineTo(rx+6,ry+rh);ctx.quadraticCurveTo(rx,ry+rh,rx,ry+rh-6);
  ctx.lineTo(rx,ry+6);ctx.quadraticCurveTo(rx,ry,rx+6,ry);
  ctx.closePath();ctx.fillStyle=bg;ctx.fill();
  ctx.strokeStyle='#5C3317';ctx.lineWidth=1.5;ctx.stroke();

  // 스피커 그릴 (왼쪽)
  for(var i=0;i<4;i++){
    ctx.beginPath();ctx.moveTo(rx+5,ry+8+i*7);ctx.lineTo(rx+22,ry+8+i*7);
    ctx.strokeStyle='rgba(60,30,10,0.5)';ctx.lineWidth=1.5;ctx.stroke();
  }
  ctx.beginPath();ctx.arc(rx+14,ry+rh/2,10,0,Math.PI*2);
  ctx.strokeStyle='rgba(60,30,10,0.3)';ctx.lineWidth=1;ctx.stroke();

  // 주파수 바 (상단 중앙)
  ctx.beginPath();ctx.rect(rx+28,ry+5,rw-52,7);
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fill();
  var freq=0.3+Math.sin(t*0.3)*0.5;
  ctx.beginPath();ctx.rect(rx+28,ry+5,(rw-52)*freq,7);
  ctx.fillStyle='rgba(255,220,80,0.8)';ctx.fill();

  // 눈 두 개 — 스피커 오른쪽 위 (다이얼/퍼센트바 안 겹침)
  var ey=ry+10;
  var blink=Math.sin(t*1.4)>0.9;
  if(!blink){
    [rx+30,rx+44].forEach(function(ex){
      ctx.beginPath();ctx.arc(ex,ey,6,0,Math.PI*2);ctx.fillStyle='#FFE4B5';ctx.fill();
      ctx.beginPath();ctx.arc(ex,ey,3.5,0,Math.PI*2);ctx.fillStyle='#8B4513';ctx.fill();
      ctx.beginPath();ctx.arc(ex+1.5,ey-1.5,1.2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.8)';ctx.fill();
    });
  } else {
    [rx+30,rx+44].forEach(function(ex){
      ctx.beginPath();ctx.moveTo(ex-6,ey);ctx.lineTo(ex+6,ey);
      ctx.strokeStyle='#FFE4B5';ctx.lineWidth=2.2;ctx.lineCap='round';ctx.stroke();
    });
  }

  // 튜닝 다이얼 — 오른쪽 하단
  ctx.beginPath();ctx.arc(rx+rw-10,ry+rh-10,7,0,Math.PI*2);
  ctx.fillStyle='#5C3317';ctx.fill();ctx.strokeStyle='#8B5E3C';ctx.lineWidth=1;ctx.stroke();
  var da=t*1.5;
  ctx.beginPath();ctx.moveTo(rx+rw-10,ry+rh-10);
  ctx.lineTo(rx+rw-10+Math.cos(da)*5,ry+rh-10+Math.sin(da)*5);
  ctx.strokeStyle='#FFE4B5';ctx.lineWidth=1.5;ctx.stroke();
}

function drawNETGEAR_STEAMPUNK(ctx, t) {
  var cx=60,cy=62;
  ctx.clearRect(0,0,120,120);
  function medievalGear(gx,gy,oR,iR,teeth,angle){
    ctx.save();ctx.translate(gx,gy);ctx.rotate(angle);
    var tw=(Math.PI*2/teeth)*0.38;
    ctx.beginPath();
    for(var i=0;i<teeth;i++){
      var a0=(i/teeth)*Math.PI*2,a1=a0+tw*0.4,a2=a0+tw,a3=a0+(Math.PI*2/teeth)-tw*0.4;
      ctx.lineTo(Math.cos(a0)*iR,Math.sin(a0)*iR);
      ctx.lineTo(Math.cos(a1)*oR,Math.sin(a1)*oR);
      ctx.lineTo(Math.cos(a2)*oR,Math.sin(a2)*oR);
      ctx.lineTo(Math.cos(a3)*iR,Math.sin(a3)*iR);
    }
    ctx.closePath();
    var g=ctx.createRadialGradient(0,0,0,0,0,oR);
    g.addColorStop(0,'#d4a800');g.addColorStop(0.6,'#8B6200');g.addColorStop(1,'#5C4000');
    ctx.fillStyle=g;ctx.fill();
    ctx.strokeStyle='rgba(255,200,50,0.6)';ctx.lineWidth=1.2;ctx.stroke();
    for(var i=0;i<6;i++){
      var ra=(i/6)*Math.PI*2;
      ctx.beginPath();ctx.arc(Math.cos(ra)*iR*0.7,Math.sin(ra)*iR*0.7,1.5,0,Math.PI*2);
      ctx.fillStyle='rgba(80,200,80,0.8)';ctx.fill();
    }
    ctx.beginPath();
    for(var i=0;i<6;i++){
      var ha=(i/6)*Math.PI*2;
      i===0?ctx.moveTo(Math.cos(ha)*iR*0.42,Math.sin(ha)*iR*0.42):ctx.lineTo(Math.cos(ha)*iR*0.42,Math.sin(ha)*iR*0.42);
    }
    ctx.closePath();ctx.fillStyle='#1a0a00';ctx.fill();ctx.strokeStyle='rgba(255,200,50,0.4)';ctx.lineWidth=1;ctx.stroke();
    ctx.restore();
  }
  var bigA=t*0.5,smA=-t*0.5*(32/16);
  var mDist=32+16-1;
  var sg1x=cx-mDist*0.72,sg1y=cy-mDist*0.55;
  var sg2x=cx+mDist*0.72,sg2y=cy-mDist*0.55;
  medievalGear(cx,cy,32,32*0.6,12,bigA);
  medievalGear(sg1x,sg1y,16,16*0.56,7,smA+0.3);
  medievalGear(sg2x,sg2y,16,16*0.56,7,smA-0.3);
  // 증기 파티클
  for(var i=0;i<3;i++){
    var sa=t*5+i*2.1,sr=30;
    ctx.beginPath();ctx.arc(cx+Math.cos(sa)*sr,cy+Math.sin(sa)*sr,1.5,0,Math.PI*2);
    ctx.fillStyle='rgba(80,200,80,'+(0.3+Math.sin(t*12+i)*0.3)+')';ctx.fill();
  }
  // 눈 — 작은 기어 중심
  var blink=Math.sin(t*1.1)>0.88;
  [[sg1x,sg1y],[sg2x,sg2y]].forEach(function(pos,i){
    var ex=pos[0],ey=pos[1];
    if(!blink){
      ctx.beginPath();ctx.arc(ex,ey,6.5,0,Math.PI*2);ctx.fillStyle='#FFF8DC';ctx.fill();
      ctx.beginPath();ctx.arc(ex,ey,3.8,0,Math.PI*2);
      var ig=ctx.createRadialGradient(ex,ey,0,ex,ey,3.8);
      ig.addColorStop(0,'#80ff80');ig.addColorStop(0.5,'#40cc40');ig.addColorStop(1,'#006600');
      ctx.fillStyle=ig;ctx.fill();
      ctx.beginPath();ctx.arc(ex,ey,1.8,0,Math.PI*2);ctx.fillStyle='#030a03';ctx.fill();
      ctx.beginPath();ctx.arc(ex+1.2,ey-1.2,0.9,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.8)';ctx.fill();
    } else {
      ctx.beginPath();ctx.moveTo(ex-6,ey);ctx.lineTo(ex+6,ey);
      ctx.strokeStyle='#FFF8DC';ctx.lineWidth=2;ctx.lineCap='round';ctx.stroke();
    }
  });
  // 큰 기어 중심 입
