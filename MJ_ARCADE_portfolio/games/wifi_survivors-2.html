function doGacha(){
  if(G.coins<300){ showMsg('gacha_msg','코인 부족!','#ff4444'); return; }
  G.coins-=300;
  document.getElementById('gacha_coins').textContent=G.coins;

  var r=Math.random(), rarity;
  if(r<RARITY_RATE.LEGENDARY) rarity='LEGENDARY';
  else if(r<RARITY_RATE.LEGENDARY+RARITY_RATE.EPIC) rarity='EPIC';
  else if(r<RARITY_RATE.LEGENDARY+RARITY_RATE.EPIC+RARITY_RATE.RARE) rarity='RARE';
  else rarity='COMMON';

  var pool=MONSTERS.filter(function(m){return m.rarity===rarity && !m.hidden;});
  var m=pool[Math.floor(Math.random()*pool.length)];
  if(!G.collection[m.id]) G.collection[m.id]={count:0,level:1};
  G.collection[m.id].count++;
  saveG();

  var area=document.getElementById('gacha_result');
  area.innerHTML='';
  var card=document.createElement('div');
  card.style.cssText='display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;transition:opacity .4s,transform .4s;transform:scale(0.6);';
  card.innerHTML=
    '<canvas id="gc_res" style="width:100px;height:100px;"></canvas>'+
    '<div style="font-size:14px;color:'+RARITY_COLOR[rarity]+';letter-spacing:3px;">'+m.name+'</div>'+
    '<div style="font-size:10px;color:'+RARITY_COLOR[rarity]+';opacity:.7;">'+rarity+'</div>'+
    '<div style="font-size:9px;color:#2a6a3a;">보유 '+G.collection[m.id].count+'개</div>';
  area.appendChild(card);
  setTimeout(function(){card.style.opacity='1';card.style.transform='scale(1)';},50);
  setTimeout(function(){
    var c=document.getElementById('gc_res'); if(!c) return;
    var dpr=window.devicePixelRatio||1;
    c.width=100*dpr;c.height=100*dpr;c.style.width='100px';c.style.height='100px';
    var ctx=c.getContext('2d');ctx.scale(dpr*(100/120),dpr*(100/120));
    m.draw(ctx,0);
  },80);

  var isNew=G.collection[m.id].count===1;
  showMsg('gacha_msg', isNew?'✦ 새 몬스터!':'획득!', isNew?'#ffcc00':'#00ff88');
}

function renderDeck(){
  var area=document.getElementById('deck_area');
  area.innerHTML='';
  document.getElementById('deck_count').textContent=G.deck.length+'/3';
  MONSTERS.forEach(function(m){
    if(m.hidden && !G.collection[m.id]) return;
    var owned=G.collection[m.id];
    var inDeck=G.deck.indexOf(m.id)!==-1;
    var card=document.createElement('div');
    card.className='deck-card'+(inDeck?' in-deck':'')+(owned?'':' locked');
    card.onclick=function(){ if(owned) toggleDeck(m.id); };
    card.innerHTML=
      '<canvas id="dc_'+m.id+'" style="width:72px;height:72px;display:block;margin:0 auto 4px;'+(owned?'':'filter:grayscale(1) brightness(0.3);')+'"></canvas>'+
      '<div style="font-size:9px;color:'+(owned?RARITY_COLOR[m.rarity]:'#1a3a2a')+';letter-spacing:1px;">'+m.name+'</div>'+
      '<div style="font-size:8px;color:#2a5a3a;">'+(owned?'보유 '+owned.count+'개':'미획득')+'</div>'+
      (inDeck?'<div style="font-size:9px;color:#00ff88;">▶ 덱</div>':'');
    area.appendChild(card);
    if(owned){
      setTimeout(function(){
        var c=document.getElementById('dc_'+m.id); if(!c) return;
        var dpr=window.devicePixelRatio||1;
        c.width=72*dpr;c.height=72*dpr;c.style.width='72px';c.style.height='72px';
        var ctx=c.getContext('2d');ctx.scale(dpr*(72/120),dpr*(72/120));
        m.draw(ctx,0);
      },30);
    }
  });
}

function toggleDeck(mid){
  var idx=G.deck.indexOf(mid);
  if(idx!==-1) G.deck.splice(idx,1);
  else{
    if(G.deck.length>=3){showMsg('deck_msg','덱은 최대 3마리!','#ff4444');return;}
    G.deck.push(mid);
  }
  saveG(); renderDeck();
}

function dexSkin(btn){
  var id=btn.getAttribute('data-id');
  var dir=parseInt(btn.getAttribute('data-dir'));
  var n=SKINS[id].length;
  var next=((skinIndex[id]||0)+dir+n)%n;
  // 스킨 0 (기본)은 항상 무료
  if(next>0){
    var priceStr=SKIN_PRICES[id];
    if(priceStr){
      var parts=priceStr.split(':');
      var skinName=parts[0], price=parseInt(parts[1]);
      var ownKey=id+'_'+next;
      if(!G.ownedSkins[ownKey]){
        // 구매 팝업
        showSkinBuy(id, next, skinName, price, btn);
        return;
      }
    }
  }
  skinIndex[id]=next;
  var sl=document.getElementById('dsl_'+id);
  if(sl) sl.textContent=SKIN_LABELS[id][skinIndex[id]];
  saveG();
}

    '<div style="font-size:14px;color:#aaffcc;letter-spacing:2px;margin-bottom:4px;">'+name+'</div>'+
    '<div style="font-size:20px;color:#ffcc00;margin:12px 0;">'+price+' ◈</div>'+

    '<div style="display:flex;gap:10px;justify-content:center;">'+

  var id=btn.getAttribute('data-id');
  var idx=parseInt(btn.getAttribute('data-idx'));
  var price=parseInt(btn.getAttribute('data-price'));

function buySkin(id, idx, price){
  if(G.coins<price){ alert('코인 부족!'); return; }
  G.coins-=price;
  var ownKey=id+'_'+idx;
  G.ownedSkins[ownKey]=true;
  skinIndex[id]=idx;
  var sl=document.getElementById('dsl_'+id);
  if(sl) sl.textContent=SKIN_LABELS[id][idx];
  saveG();
  closeSkinPopup();
  renderMain();
}

function startBattle(){
  if(!G.deck.length){showMsg('main_msg','덱에 몬스터를 넣어주세요!','#ff4444');return;}
  if(G.deck.length<1){showMsg('main_msg','최소 1마리 필요!','#ff4444');return;}

  var stageData = G.twisted ? TWISTED_STAGES[G.stage-1] : NORMAL_STAGES[G.stage-1];
  if(!stageData){showMsg('main_msg','모든 스테이지 클리어!','#ffcc00');return;}

  // 내 팀
  var myTeam = G.deck.map(function(id){
    var m=MONSTERS.find(function(x){return x.id===id;});
    var bonus = G.collection[id]?(G.collection[id].level||1)*5:0;
    return {
      id:m.id, name:m.name, draw:m.draw, skills:m.skills, special:m.special,
      hp: m.hp+bonus, maxHp: m.hp+bonus,
      atk: m.atk, spd: m.spd, rarity: m.rarity,
      status:{}, gauge:0, sfCount:0, dotDmg:0, dotTurns:0,
      reflectDmg:0, mirror:false, counter:false, timebombs:[],
      sealed:0, slow:0, bleed:0, taunt:false
    };
  });

  // 적 팀
  var enemyTeam = stageData.enemies.map(function(eid){
    var e=ENEMY_DATA[eid];
    var lvMul = 1 + (G.twisted?0.5:0) + (G.stage-1)*0.05;
    return {
      id:eid, name:e.name, draw:e.draw,
      hp: Math.floor(e.hp*lvMul), maxHp: Math.floor(e.hp*lvMul),
      atk: Math.floor(e.atk*lvMul), spd: e.spd,
      atkTimer:0, status:{}, bounty:false
    };
  });

  B = {
    myTeam: myTeam,
    enemyTeam: enemyTeam,
    myIdx: 0,       // 현재 내 행동 캐릭
    phase: 'select_char', // select_char / select_skill / timing / enemy_turn / result
    timingBar: {pos:0.5, dir:1, speed:2.0, active:false},
    pendingSkill: null,
    log: [],
    t: 0,
    reward: stageData.coinReward,
    animCtx: {my:null, enemy:null},
    shake: {my:0, enemy:0},
    selectedChar: -1,
    selectedEnemy: 0,
  };

  _pool = {}; // 캔버스 풀 리셋
  showScreen('battle');
  renderBattle();
  requestAnimationFrame(battleLoop);
}

function renderBattle(){
  if(!B) return;
  var my=B.myTeam[B.myIdx]||B.myTeam[0];
  var en=B.enemyTeam[B.selectedEnemy]||B.enemyTeam[0];

  // 내 팀 슬롯
  B.myTeam.forEach(function(m,i){
    var slot=document.getElementById('my_slot_'+i);
    if(!slot) return;
    var pct=Math.max(0,m.hp/m.maxHp*100);
    var hpBar=slot.querySelector('.hp-fill');
    var hpTxt=slot.querySelector('.hp-txt');
    if(hpBar) hpBar.style.width=pct+'%';
    if(hpTxt) hpTxt.textContent=Math.max(0,m.hp)+'/'+m.maxHp;
    slot.style.borderColor=i===B.selectedChar?RARITY_COLOR[m.rarity]:'#0d3a1a';
    slot.style.opacity=m.hp<=0?'0.3':'1';
  });

  // 적 슬롯
  B.enemyTeam.forEach(function(e,i){
    var slot=document.getElementById('en_slot_'+i);
    if(!slot) return;
    var pct=Math.max(0,e.hp/e.maxHp*100);
    var hpBar=slot.querySelector('.hp-fill');
    if(hpBar) hpBar.style.width=pct+'%';
    var isBounty=e.bounty&&e.hp>0;
    slot.style.borderColor=isBounty?'#ffcc00':i===B.selectedEnemy?'#ff4444':'#1a0a0a';
    slot.style.boxShadow=isBounty?'0 0 10px rgba(255,200,0,0.4)':'';
    slot.style.opacity=e.hp<=0?'0.3':'1';
    var bnm=slot.querySelector('.bounty-mark');
    if(isBounty&&!bnm){
      var bmark=document.createElement('div');
      bmark.className='bounty-mark';
      bmark.style.cssText='font-size:10px;color:#ffcc00;text-shadow:0 0 6px rgba(255,200,0,0.8);';
      bmark.textContent='⊕';
      slot.insertBefore(bmark,slot.firstChild);
    } else if(!isBounty&&bnm){ bnm.remove(); }
  });

  // 스킬 버튼
  if(B.selectedChar>=0){
    var cm=B.myTeam[B.selectedChar];
    for(var si=0;si<3;si++){
      var btn=document.getElementById('skill_btn_'+si);
      if(!btn) continue;
      var sk = si===2 ? cm.special : cm.skills[si];
      if(!sk){btn.style.display='none';continue;}
      btn.style.display='block';
      var isSpecial=(si===2);
      var canUse=true;
      if(isSpecial){
        if(cm.id==='efm') canUse=(cm.sfCount>=5);
        else canUse=(cm.gauge>=100);
      }
      if(cm.sealed>0) canUse=false;
      btn.textContent=sk.name+(isSpecial?' ('+(cm.id==='efm'?cm.sfCount+'/5':Math.floor(cm.gauge)+'%')+')':'');
      btn.style.opacity=canUse?'1':'0.4';
      btn.style.borderColor=isSpecial?'#cc44ff':'#0d3a1a';
    }
  } else {
    for(var si=0;si<3;si++){
      var btn=document.getElementById('skill_btn_'+si);
      if(btn) btn.style.display='none';
    }
  }

  // 타이밍 바
  var tb=document.getElementById('timing_fill');
  if(tb) tb.style.left=(B.timingBar.pos*100)+'%';

  var tw=document.getElementById('timing_wrap');
  if(tw) tw.style.display=B.phase==='timing'?'block':'none';

  // 페이즈 안내
  var ph=document.getElementById('phase_hint');
  if(ph){
    if(B.phase==='select_char') ph.textContent='캐릭터를 선택하세요';
    else if(B.phase==='select_skill') ph.textContent='스킬을 선택하세요';
    else if(B.phase==='timing') ph.textContent='타이밍!';
    else if(B.phase==='enemy_turn') ph.textContent='적의 턴...';
    else ph.textContent='';
  }

  // 게이지
  if(B.selectedChar>=0){
    var gm=B.myTeam[B.selectedChar];
    var gb=document.getElementById('gauge_bar');
    if(gb) gb.style.width=Math.min(100,gm.gauge)+'%';
  }

  // 로그
  var logEl=document.getElementById('battle_log');
  if(logEl) logEl.innerHTML=B.log.slice(0,4).map(function(l){return '<div>'+l+'</div>';}).join('');
}

function addLog(msg){ B.log.unshift(msg); if(B.log.length>8) B.log.pop(); }

function selectChar(i){
  if(!B||B.phase!=='select_char') return;
  var m=B.myTeam[i];
  if(!m||m.hp<=0) return;
  B.selectedChar=i;
  B.myIdx=i;
  B.phase='select_skill';
  renderBattle();
}

function selectEnemy(i){
  if(!B) return;
  var e=B.enemyTeam[i];
  if(!e||e.hp<=0) return;
  B.selectedEnemy=i;
  renderBattle();
}

function useSkill(si){
  if(!B||B.phase!=='select_skill') return;
  var cm=B.myTeam[B.selectedChar];
  var sk = si===2 ? cm.special : cm.skills[si];
  if(!sk) return;

  // 봉인 체크
  if(cm.sealed>0){addLog(cm.name+' 스킬 봉인!');return;}

  // 스페셜 게이지 체크
  if(si===2){
    if(cm.id==='efm' && cm.sfCount<5){addLog('섬광 '+(5-cm.sfCount)+'회 더 필요!');return;}
    if(cm.id!=='efm' && cm.gauge<100){addLog('게이지 부족!');return;}
  }

  B.pendingSkill={sk:sk, si:si, char:B.selectedChar};

  // 타이밍 바 시작
  B.phase='timing';
  B.timingBar={pos:0.5, dir:1, speed:1.8+G.stage*0.04, active:true};
  renderBattle();
}

function tapTiming(){
  if(!B||B.phase!=='timing') return;
  var pos=B.timingBar.pos;
  var grade, mult;
  if(pos>=0.38&&pos<=0.62){grade='PERFECT';mult=1.5;}
  else if(pos>=0.22&&pos<=0.78){grade='GOOD';mult=1.0;}
  else{grade='MISS';mult=0.2;}

  showHitGrade(grade);
  executeSkill(B.pendingSkill, mult, grade);
  B.phase='enemy_turn';
  B.timingBar.active=false;
  setTimeout(showEnemyTurnAndAttack, 400);
}

function executeSkill(pending, mult, grade){
  var sk=pending.sk, si=pending.si;
  var cm=B.myTeam[pending.char];
  var en=B.enemyTeam[B.selectedEnemy];

  // 게이지 충전
  cm.gauge=Math.min(100,cm.gauge+20);

  if(sk.type==='damage'){
    var dmg=Math.floor(cm.atk*sk.dmg*mult);
    dealDmgToEnemy(B.selectedEnemy, dmg);
    addLog(grade+' '+cm.name+' '+sk.name+'! -'+dmg);
    if(sk.effect==='bleed' && mult>0.2){
      en.bleed=(en.bleed||0)+Math.floor(cm.atk*0.3);
      en.bleedTurns=3;
      addLog('출혈!');
    }
  } else if(sk.type==='dot'){
    en.dotDmg=(en.dotDmg||0)+Math.floor(cm.atk*sk.dmg*mult);
    en.dotTurns=sk.turns;
    addLog(cm.name+' '+sk.name+'! 지속 데미지');
  } else if(sk.type==='stun'){
    if(mult>0.2){ en.stunTurns=sk.turns; addLog(cm.name+' 섬광! 기절 '+sk.turns+'턴'); }
    if(si===0) cm.sfCount=(cm.sfCount||0)+1;
  } else if(sk.type==='debuff'){
    if(mult>0.2){
      if(sk.effect==='atkDown'){ en.atkDown=sk.turns; addLog(cm.name+' 교란! 공격력 감소'); }
      if(sk.effect==='defDown'){ en.defDown=sk.turns; addLog(cm.name+' 해킹! 방어력 감소'); }
    }
  } else if(sk.type==='buff'){
    if(mult>0.2){
      if(sk.effect==='atkUp'){ B.myTeam.forEach(function(m){if(m.hp>0)m.atkBuff=Math.floor(m.atk*0.3);}); addLog(cm.name+' 버프! 공격력 증가'); }
      if(sk.effect==='allUp'){ B.myTeam.forEach(function(m){if(m.hp>0){m.atkBuff=Math.floor(m.atk*0.25);m.defBuff=true;}}); addLog(cm.name+' 차징! 팀 버프'); }
      if(sk.effect==='atkUpBig'){ cm.atkBuff=Math.floor(cm.atk*0.8); cm.atkBuffTurns=5; addLog(cm.name+' 시계태엽! 대폭 강화'); }
    }
  } else if(sk.type==='dispel'){
    B.enemyTeam.forEach(function(e){ e.atkBuff=0; e.buffTurns=0; });
    addLog(cm.name+' 접속 해제! 적 버프 제거');
  } else if(sk.type==='seal'){
    if(mult>0.2){ en.sealed=sk.turns; addLog(cm.name+' 회로 차단! 스킬 봉인'); }
  } else if(sk.type==='taunt'){
    if(mult>0.2){ cm.taunt=true; cm.tauntTurns=sk.turns; addLog(cm.name+' 도발!'); }
  } else if(sk.type==='timebomb'){
    en.bombs=en.bombs||[];
    en.bombs.push({turns:sk.turns, dmg:Math.floor(cm.atk*sk.dmg)});
    addLog(cm.name+' 태엽 심기! '+sk.turns+'턴 후 폭발');
  } else if(sk.type==='counter'){
    if(mult>0.2){ cm.counter=true; addLog(cm.name+' 매복 대기!'); }
  } else if(sk.type==='mark'){
    en.bounty=true;
    addLog(cm.name+' 바운티! '+en.name+' 처치 시 게이지 충전');
  } else if(sk.type==='execute'){
    if(en.hp/en.maxHp<=sk.threshold){
      en.hp=0; addLog(cm.name+' 흡수! 즉사');
      B.shake.enemy=0.4;
    } else { addLog('흡수 실패 (HP 30% 초과)'); }
  } else if(sk.type==='reflect'){
    cm.reflectDmg=Math.floor(cm.totalDmgTaken*0.8||cm.atk*1.5);
    dealDmgToEnemy(B.selectedEnemy, cm.reflectDmg);
    addLog(cm.name+' 공유! 반사 -'+cm.reflectDmg);
  } else if(sk.type==='mirror'){
    if(mult>0.2){ cm.mirror=true; cm.mirrorTurns=1; addLog(cm.name+' 무비! 반사 준비'); }
  } else if(sk.type==='copy'){
    var alive=B.myTeam.filter(function(m){return m.hp>0&&m.id!==cm.id;});
    if(alive.length){
      var target=alive[Math.floor(Math.random()*alive.length)];
      var pool2=target.skills.filter(function(s){return s&&s.type==='damage';});
      if(pool2.length){
        var sk2=pool2[0];
        var dmg2=Math.floor(cm.atk*sk2.dmg*mult);
        dealDmgToEnemy(B.selectedEnemy, dmg2);
        addLog(cm.name+' 빙의! '+target.name+'의 '+sk2.name+' -'+dmg2);
      }
    }
  }

  // 스페셜
  if(si===2 && cm.special){
    var sp=cm.special;
    if(sp.type==='damage'){
      var sdmg=Math.floor(cm.atk*sp.dmg*mult);
      dealDmgToEnemy(B.selectedEnemy,sdmg);
      addLog('★ '+cm.name+' '+sp.name+'! -'+sdmg);
      if(sp.effect==='stun'&&mult>0.2){ en.stunTurns=sp.turns; }
    } else if(sp.type==='gamble'){
      cm.sfCount=0;
      if(Math.random()<0.5){ en.hp=0; addLog('★ 대폭발! 적 즉사!'); }
      else { cm.hp=0; addLog('★ 대폭발! 자폭...'); }
    } else if(sp.type==='megaDebuff'){
      en.slow=3; en.sealed=2; en.defDown=3;
      addLog('★ '+cm.name+' 체킹! 복합 디버프');
    } else if(sp.type==='mirror'){
      cm.mirror=true; cm.mirrorTurns=1;
      addLog('★ '+cm.name+' 무비!');
    }
    if(cm.id!=='efm') cm.gauge=0;
  }

  checkEnemyDead();
}

function dealDmgToEnemy(idx, dmg){
  var en=B.enemyTeam[idx]; if(!en||en.hp<=0) return;
  var reduced = en.defDown?Math.floor(dmg*1.3):dmg;
  en.hp=Math.max(0,en.hp-reduced);
  B.shake.enemy=0.3;
}

function dealDmgToMy(idx, dmg){
  var m=B.myTeam[idx]; if(!m||m.hp<=0) return;
  // 미러 체크
  if(m.mirror&&m.mirrorTurns>0){
    dealDmgToEnemy(B.selectedEnemy, dmg);
    addLog(m.name+' 반사! -'+dmg);
    return;
  }
  // 카운터
  if(m.counter){
    m.counter=false;
    var cdmg=Math.floor(m.atk*1.2);
    dealDmgToEnemy(B.selectedEnemy, cdmg);
    addLog(m.name+' 매복 카운터! -'+cdmg);
  }
  var reduced=m.defBuff?Math.floor(dmg*0.7):dmg;
  m.hp=Math.max(0,m.hp-reduced);
  m.totalDmgTaken=(m.totalDmgTaken||0)+reduced;
  B.shake.my=0.3;
}

function doEnemyTurn(){
  if(!B) return;
  // 틱 데미지 / 상태이상 처리
  B.enemyTeam.forEach(function(en,ei){
    if(en.hp<=0) return;
    // 폭탄
    if(en.bombs) en.bombs=en.bombs.filter(function(bomb){
      bomb.turns--;
      if(bomb.turns<=0){ dealDmgToEnemy(ei,bomb.dmg); addLog('태엽 폭발! -'+bomb.dmg); return false; }
      return true;
    });
    if(en.dotDmg&&en.dotTurns>0){
      dealDmgToEnemy(ei,en.dotDmg);
      addLog('도트 -'+en.dotDmg);
      en.dotTurns--;
      if(en.dotTurns<=0){en.dotDmg=0;}
    }
    if(en.bleed&&en.bleedTurns>0){
      dealDmgToEnemy(ei,en.bleed);
      en.bleedTurns--;
    }
    if(en.sealed>0) en.sealed--;
    if(en.atkDown>0) en.atkDown--;
    if(en.defDown>0) en.defDown--;
    if(en.stunTurns>0){ en.stunTurns--; return; }
  });

  // 내 팀 버프 틱
  B.myTeam.forEach(function(m){
    if(m.tauntTurns>0){ m.tauntTurns--; if(m.tauntTurns<=0) m.taunt=false; }
    if(m.mirrorTurns>0){ m.mirrorTurns--; if(m.mirrorTurns<=0) m.mirror=false; }
    if(m.atkBuffTurns>0){ m.atkBuffTurns--; if(m.atkBuffTurns<=0){m.atkBuff=0;} }
  });

  // 적 공격 — 살아있는 적 중 랜덤 1마리
  var aliveEnemies=B.enemyTeam.map(function(e,i){return {e:e,i:i};}).filter(function(x){return x.e.hp>0&&!x.e.stunTurns;});
  if(aliveEnemies.length>0){
    var pick=aliveEnemies[Math.floor(Math.random()*aliveEnemies.length)];
    var en=pick.e, ei=pick.i;
    (function(en,ei){
    // 도발 타겟
    var taunter=B.myTeam.find(function(m){return m.hp>0&&m.taunt;});
    var target=taunter||B.myTeam.filter(function(m){return m.hp>0;})[0];
    if(!target) return;
    var tidx=B.myTeam.indexOf(target);
    var atkMul=en.atkDown>0?0.6:1.0;
    var ed=ENEMY_DATA[en.id];
    var useSkill=ed&&ed.skill&&Math.random()<ed.skill.prob;
    if(useSkill){
      var esk=ed.skill;
      addLog('⚡ '+en.name+' '+esk.msg);
      if(esk.type==='dot'){
        target.dotDmg=(target.dotDmg||0)+Math.floor(en.atk*esk.dmg*atkMul);
        target.dotTurns=esk.turns;
      } else if(esk.type==='double'){
        var d1=Math.floor(en.atk*atkMul*0.7); dealDmgToMy(tidx,d1);
        var d2=Math.floor(en.atk*atkMul*0.7); dealDmgToMy(tidx,d2);
        addLog(en.name+' 2연타 -'+(d1+d2));
      } else if(esk.type==='multi'){
        for(var mi=0;mi<esk.count;mi++){
          var md=Math.floor(en.atk*atkMul*esk.dmgMul); dealDmgToMy(tidx,md);
        }
        addLog(en.name+' '+esk.count+'연타!');
      } else if(esk.type==='aoe'){
        B.myTeam.forEach(function(tm,ti){
          if(tm.hp<=0) return;
          var ad=Math.floor(en.atk*atkMul*esk.dmgMul); dealDmgToMy(ti,ad);
        });
        addLog(en.name+' 전체 공격!');
      } else if(esk.type==='stun'){
        target.stunned=(target.stunned||0)+esk.turns;
        var sd=Math.floor(en.atk*atkMul*(0.85+Math.random()*0.3)); dealDmgToMy(tidx,sd);
        addLog(target.name+' 기절!');
      } else if(esk.type==='debuff'){
        if(esk.effect==='atkDown') target.atkDebuff=esk.turns;
        var dd=Math.floor(en.atk*atkMul*0.8); dealDmgToMy(tidx,dd);
      } else if(esk.type==='random'){
        var rr2=Math.random();
        if(rr2<0.33){ var rd=Math.floor(en.atk*atkMul*1.5); dealDmgToMy(tidx,rd); addLog('룰렛: 대타!'); }
        else if(rr2<0.66){ B.myTeam.forEach(function(tm,ti){ if(tm.hp>0){dealDmgToMy(ti,Math.floor(en.atk*0.5));} }); addLog('룰렛: 전체!'); }
        else { addLog('룰렛: 빗나감!'); }
      } else if(esk.type==='damage'){
        var skd=Math.floor(en.atk*atkMul*esk.dmgMul); dealDmgToMy(tidx,skd);
        addLog(en.name+' -'+skd);
      }
    } else {
      var dmg=Math.floor(en.atk*atkMul*(0.85+Math.random()*0.3));
      dealDmgToMy(tidx,dmg);
      addLog(en.name+' 공격! '+target.name+' -'+dmg);
    }
    })(en,ei);
  }

  checkMyDead();
  checkEnemyDead();

  if(B.phase!=='result'){
    B.phase='select_char';
    B.selectedChar=-1;
    renderBattle();
  }
}

function showEnemyTurnAndAttack(){
  if(!B||B.phase==='result') return;
  B.phase='enemy_turn';
  var ph=document.getElementById('phase_hint');
  if(ph){ ph.textContent='⚠ 적의 턴!'; ph.style.color='#ff4444'; }
  renderBattle();
  setTimeout(function(){
    if(!B||B.phase==='result') return;
    doEnemyTurn();
    var ph2=document.getElementById('phase_hint');
    if(ph2){ ph2.style.color='#1a5a2a'; }
  }, 900);
}

function checkEnemyDead(){
  // 바운티 처치 체크
  B.enemyTeam.forEach(function(en){
    if(en.hp<=0 && en.bounty && !en._bountyDone){
      en._bountyDone=true;
      // UBIQUITI 찾아서 게이지 충전
      B.myTeam.forEach(function(m){
        if(m.id==='ubiquiti'&&m.hp>0){
          m.gauge=100;
          addLog('★ 바운티 달성! 스페셜 게이지 충전!');
        }
      });
    }
  });
  var allDead=B.enemyTeam.every(function(e){return e.hp<=0;});
  if(allDead) endBattle(true);
}

function checkMyDead(){
  var allDead=B.myTeam.every(function(m){return m.hp<=0;});
  if(allDead) endBattle(false);
}

function endBattle(win){
  if(!B||B.phase==='result') return;
  B.phase='result';
  B.timingBar.active=false;
  if(win){
    G.coins+=B.reward;
    if(G.twisted){ G.stage++; if(G.stage>21) G.stage=21; }
    else{
      G.stage++;
      if(G.stage>40){ G.twisted=true; G.stage=1; }
    }
    saveG();
    setTimeout(function(){
      showResult(true, B.reward);
    },600);
  } else {
    setTimeout(function(){ showResult(false,30); },600);
  }
}

function showResult(win,coins){
  if(!win){ G.coins+=coins; saveG(); }
  var s=document.getElementById('s_result');
  document.getElementById('res_title').textContent=win?'✦ VICTORY ✦':'✦ DEFEAT ✦';
  document.getElementById('res_title').style.color=win?'#ffcc00':'#ff4444';
  document.getElementById('res_msg').textContent=win?
    (G.twisted?'뒤틀린 곳 '+G.stage+'스테이지로!':'STAGE '+G.stage+'로!')+' +'+coins+'◈':
    '패배... 위로 +'+coins+'◈';
  document.getElementById('res_coins').textContent=G.coins;
  showScreen('result');
}

function battleLoop(ts){
  if(!B||G.screen!=='battle') return;
  var dt=Math.min((ts-lastBT)/1000,0.05);
  lastBT=ts; B.t+=dt;

  if(B.timingBar.active){
    B.timingBar.pos+=B.timingBar.dir*B.timingBar.speed*dt;
    if(B.timingBar.pos>=1){B.timingBar.pos=1;B.timingBar.dir=-1;}
    if(B.timingBar.pos<=0){B.timingBar.pos=0;B.timingBar.dir=1;}
    renderBattle();
  }

  // 내 팀 그리기
  B.myTeam.forEach(function(m,i){
    var ctx=getCtxSize('b_my_'+i,60);
    if(!ctx||m.hp<=0) return;
    var shx=B.shake.my>0?(Math.random()-0.5)*5:0;
    ctx.save(); if(shx) ctx.translate(shx,0);
    ctx.clearRect(-10,-10,100,100);
    ctx.scale(60/120,60/120);
    var mfn=SKINS[m.id]&&SKINS[m.id][skinIndex[m.id]||0]||m.draw;
    mfn(ctx,B.t);
    ctx.scale(120/80,120/80);
    ctx.restore();
  });
  if(B.shake.my>0) B.shake.my-=dt;

  // 적 팀 그리기
  B.enemyTeam.forEach(function(e,i){
    var ctx=getCtxSize('b_en_'+i,60);
    if(!ctx||e.hp<=0) return;
    var shx=B.shake.enemy>0?(Math.random()-0.5)*5:0;
    ctx.save(); if(shx) ctx.translate(shx,0);
    ctx.clearRect(-10,-10,100,100);
    ctx.scale(60/120,60/120);
    e.draw(ctx,B.t);
    ctx.scale(120/80,120/80);
    ctx.restore();
  });
  if(B.shake.enemy>0) B.shake.enemy-=dt;

  requestAnimationFrame(battleLoop);
}

function showHitGrade(grade){

function dexLoop(ts){
  var dt=Math.min((ts-lastDT)/1000,0.05);
  lastDT=ts; dexT+=dt;
  if(G.screen==='dex'||true){
    if(G.screen==='dex'&&dexTab==='wifi'){
      MONSTERS.forEach(function(m){
        var ctx=dexCtxs['w_'+m.id]; if(!ctx) return;
        var fn=SKINS[m.id]&&SKINS[m.id][skinIndex[m.id]||0];
        if(fn) fn(ctx,dexT);
      });
    } else if(G.screen==='dex'&&dexTab==='enemy') {
      ENEMIES.forEach(function(e){
        var ctx=dexCtxs['e_'+e.id]; if(!ctx) return;
        e.fn(ctx,dexT);
      });
      if(_shameInDex&&dexCtxs['e_shame']) drawSHAME(dexCtxs['e_shame'],dexT);
    }
  }

  requestAnimationFrame(dexLoop);
}

function showMsg(id,msg,color){

function drawIPTIME_EVO1(ctx, t) {
  var cx=60, cy=62;
  ctx.clearRect(0,0,120,120);
  var bob = Math.sin(t*2)*2.5;
  var by = cy + bob;
  var blink = Math.sin(t*1.3) > 0.92;
  var glitch = Math.sin(t*7) > 0.75;
  var glitchIntense = Math.abs(Math.sin(t*7));

  // ── 글로우 (초록 도금)
  var gGrad = ctx.createRadialGradient(cx,by,8,cx,by,55);
  gGrad.addColorStop(0,'rgba(0,255,80,0.08)');
  gGrad.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(cx,by,55,0,Math.PI*2);ctx.fillStyle=gGrad;ctx.fill();

  // ── 안테나 3개 ──
  var antX = [cx-16, cx, cx+16];
  var antColors = ['#44ff88','#00ff44','#44ff88'];
  antX.forEach(function(ax, i){
    var sway = Math.sin(t*2+i*1.1)*2.5;
    ctx.beginPath();
    ctx.moveTo(ax, by-28);
    ctx.lineTo(ax+sway, by-52+Math.sin(t*3+i)*2);
    ctx.strokeStyle=antColors[i];ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
    // 안테나 끝 발광
    ctx.beginPath();ctx.arc(ax+sway, by-52+Math.sin(t*3+i)*2, 3.5, 0, Math.PI*2);
    ctx.fillStyle=antColors[i];ctx.fill();
    ctx.beginPath();ctx.arc(ax+sway, by-52+Math.sin(t*3+i)*2, 6, 0, Math.PI*2);
    ctx.fillStyle='rgba(0,255,80,0.2)';ctx.fill();
    // 전파
    for(var r=1;r<=2;r++){
      ctx.beginPath();ctx.arc(ax+sway, by-52+Math.sin(t*3+i)*2, r*8+Math.sin(t*4)*1, -0.7*Math.PI, 0.3*Math.PI);
      ctx.strokeStyle='rgba(0,255,100,'+(0.3-r*0.08)*(0.5+Math.sin(t*2+i)*0.4)+')';
      ctx.lineWidth=1;ctx.stroke();
    }
  });

  // ── TV 본체 (도금 초록) ──
  var tw=76, th=50, tx=cx-tw/2, ty=by-th/2;
  var bodyGrad = ctx.createLinearGradient(tx,ty,tx+tw,ty+th);
  bodyGrad.addColorStop(0,'#1a4a2a');
  bodyGrad.addColorStop(0.3,'#2a6a3a');
  bodyGrad.addColorStop(0.6,'#1a5a2a');
  bodyGrad.addColorStop(1,'#0d3018');
  ctx.beginPath();
  ctx.moveTo(tx+6,ty);ctx.lineTo(tx+tw-6,ty);ctx.quadraticCurveTo(tx+tw,ty,tx+tw,ty+6);
  ctx.lineTo(tx+tw,ty+th-6);ctx.quadraticCurveTo(tx+tw,ty+th,tx+tw-6,ty+th);
  ctx.lineTo(tx+6,ty+th);ctx.quadraticCurveTo(tx,ty+th,tx,ty+th-6);
  ctx.lineTo(tx,ty+6);ctx.quadraticCurveTo(tx,ty,tx+6,ty);
  ctx.closePath();
  ctx.fillStyle=bodyGrad;ctx.fill();
  ctx.strokeStyle='rgba(0,255,100,0.6)';ctx.lineWidth=2;ctx.stroke();

  // 도금 하이라이트
  ctx.beginPath();ctx.moveTo(tx+8,ty+2);ctx.lineTo(tx+tw-8,ty+2);
  ctx.strokeStyle='rgba(100,255,150,0.3)';ctx.lineWidth=1.5;ctx.stroke();

  // ── 화면 ──
  var sp=4;
  ctx.beginPath();ctx.rect(tx+sp,ty+sp,tw-sp*2,th-sp*2);
  ctx.fillStyle='#020a04';ctx.fill();
  ctx.strokeStyle='rgba(0,180,60,0.4)';ctx.lineWidth=1;ctx.stroke();

  // 화면 스캔라인
  for(var i=0;i<th-sp*2;i+=3){
    ctx.beginPath();ctx.moveTo(tx+sp,ty+sp+i);ctx.lineTo(tx+tw-sp,ty+sp+i);
    ctx.strokeStyle='rgba(0,255,80,0.04)';ctx.lineWidth=1;ctx.stroke();
  }

  // ── 왼쪽 눈 (일반) ──
  var eyeY = by - 5;
  if(!blink){
    ctx.beginPath();ctx.arc(cx-12,eyeY,6,0,Math.PI*2);
    ctx.fillStyle='#c8eeff';ctx.fill();
    ctx.beginPath();ctx.arc(cx-12,eyeY,3.5,0,Math.PI*2);
    ctx.fillStyle='#0a3a20';ctx.fill();
    ctx.beginPath();ctx.arc(cx-11,eyeY-1.5,1.2,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.8)';ctx.fill();
  } else {
    ctx.beginPath();ctx.moveTo(cx-18,eyeY);ctx.lineTo(cx-6,eyeY);
    ctx.strokeStyle='#c8eeff';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
  }

  // ── 오른쪽 눈 (글리치) ──
  ctx.save();
  // 글리치 오프셋
  var gox = glitch?(Math.random()-0.5)*6*glitchIntense:0;
  var goy = glitch?(Math.random()-0.5)*3*glitchIntense:0;
  if(!blink){
    // 눈 흰자 (글리치 색)
    ctx.beginPath();ctx.arc(cx+12+gox,eyeY+goy,6,0,Math.PI*2);
    ctx.fillStyle=glitch?'rgba(0,255,80,0.9)':'#c8ffda';ctx.fill();
    // 홍채
    ctx.beginPath();ctx.arc(cx+12+gox,eyeY+goy,3.5,0,Math.PI*2);
    var ig=ctx.createRadialGradient(cx+12+gox,eyeY+goy,0,cx+12+gox,eyeY+goy,3.5);
    ig.addColorStop(0,glitch?'#ffffff':'#00ff88');
    ig.addColorStop(1,glitch?'#00ff44':'#006622');
    ctx.fillStyle=ig;ctx.fill();
    // 글리치 라인
    if(glitch){
      for(var gi=0;gi<3;gi++){
        var gy=eyeY+goy-4+gi*3;
        ctx.beginPath();ctx.moveTo(cx+6+gox,gy);ctx.lineTo(cx+18+gox,gy);
        ctx.strokeStyle='rgba(0,255,80,'+(0.4+Math.random()*0.4)+')';
        ctx.lineWidth=0.8;ctx.stroke();
      }
    }
    // 반짝임
    ctx.beginPath();ctx.arc(cx+13+gox,eyeY-1.5+goy,1.2,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fill();
  } else {
    ctx.beginPath();ctx.moveTo(cx+6+gox,eyeY+goy);ctx.lineTo(cx+18+gox,eyeY+goy);
    ctx.strokeStyle='#00ff88';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
  }
  // 글리치 눈 테두리
  if(glitch){
    ctx.beginPath();ctx.arc(cx+12+gox,eyeY+goy,7,0,Math.PI*2);
    ctx.strokeStyle='rgba(0,255,80,'+(glitchIntense*0.7)+')';ctx.lineWidth=1.5;ctx.stroke();
  }
  ctx.restore();

  // ── 웃는 입 ──
  ctx.beginPath();ctx.arc(cx,by+8,7,0.18*Math.PI,0.82*Math.PI);
  ctx.strokeStyle='rgba(0,220,80,0.8)';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();

  // ── TV 다리 ──
  ctx.beginPath();
  ctx.moveTo(cx-18,by+th/2+2);ctx.lineTo(cx-22,by+th/2+10);
  ctx.moveTo(cx+18,by+th/2+2);ctx.lineTo(cx+22,by+th/2+10);
  ctx.strokeStyle='#1a5a2a';ctx.lineWidth=4;ctx.lineCap='round';ctx.stroke();

  // ── LED (초록 펄스) ──
  var lp=0.5+Math.sin(t*4)*0.5;
  ctx.beginPath();ctx.arc(tx+tw-7,ty+th-7,3,0,Math.PI*2);
  ctx.fillStyle='rgba(0,255,80,'+lp+')';ctx.fill();
  ctx.beginPath();ctx.arc(tx+tw-7,ty+th-7,5,0,Math.PI*2);
  ctx.fillStyle='rgba(0,255,80,'+(lp*0.3)+')';ctx.fill();

  // ── 도금 테두리 재강조 ──
  ctx.beginPath();
  ctx.moveTo(tx+6,ty);ctx.lineTo(tx+tw-6,ty);ctx.quadraticCurveTo(tx+tw,ty,tx+tw,ty+6);
  ctx.lineTo(tx+tw,ty+th-6);ctx.quadraticCurveTo(tx+tw,ty+th,tx+tw-6,ty+th);
  ctx.lineTo(tx+6,ty+th);ctx.quadraticCurveTo(tx,ty+th,tx,ty+th-6);
  ctx.lineTo(tx,ty+6);ctx.quadraticCurveTo(tx,ty,tx+6,ty);
  ctx.closePath();
  ctx.strokeStyle='rgba(0,255,100,'+(0.3+Math.sin(t*2)*0.2)+')';ctx.lineWidth=1.5;ctx.stroke();
}

function drawIPTIME_EVO2(ctx, t) {
  var cx=60, cy=62;
  ctx.clearRect(0,0,120,120);
  var bob = Math.sin(t*2)*2.5;
  var by = cy + bob;
  var blink = Math.sin(t*1.3) > 0.92;

  // ── 잔상 (3개, 뒤에 그림) ──
  for(var ghost=0;ghost<3;ghost++){
    var gDelay = (ghost+1)*0.08;
    var gBob = Math.sin((t-gDelay)*2)*2.5;
    var gBy = cy + gBob;
    var gAlpha = 0.12 - ghost*0.03;
    var tw2=76,th2=50,tx2=cx-tw2/2,ty2=gBy-th2/2;

    ctx.save();
    ctx.globalAlpha=gAlpha;
    // 잔상 본체
    ctx.beginPath();
    ctx.moveTo(tx2+6,ty2);ctx.lineTo(tx2+tw2-6,ty2);ctx.quadraticCurveTo(tx2+tw2,ty2,tx2+tw2,ty2+6);
    ctx.lineTo(tx2+tw2,ty2+th2-6);ctx.quadraticCurveTo(tx2+tw2,ty2+th2,tx2+tw2-6,ty2+th2);
    ctx.lineTo(tx2+6,ty2+th2);ctx.quadraticCurveTo(tx2,ty2+th2,tx2,ty2+th2-6);
    ctx.lineTo(tx2,ty2+6);ctx.quadraticCurveTo(tx2,ty2,tx2+6,ty2);
    ctx.closePath();
    ctx.fillStyle='rgba(0,220,200,0.6)';ctx.fill();
    ctx.restore();
  }

  // ── 청록 글로우 ──
  var gGrad=ctx.createRadialGradient(cx,by,8,cx,by,58);
  gGrad.addColorStop(0,'rgba(0,220,200,0.1)');gGrad.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(cx,by,58,0,Math.PI*2);ctx.fillStyle=gGrad;ctx.fill();

  // ── 안테나 3개 + 전기 신호 ──
  var antX=[cx-16,cx,cx+16];
  antX.forEach(function(ax,i){
    var sway=Math.sin(t*2+i*1.1)*2.5;
    var antTop=by-54+Math.sin(t*3+i)*2;

    // 안테나 기둥
    ctx.beginPath();ctx.moveTo(ax,by-28);ctx.lineTo(ax+sway,antTop);
    ctx.strokeStyle='#00ddcc';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();

    // 전기 신호 — 지그재그 흘러내림
    var elecSegs=6;
    ctx.beginPath();
    ctx.moveTo(ax+sway,antTop);
    for(var s=0;s<elecSegs;s++){
      var p=(s+1)/elecSegs;
      var ey2=antTop+(by-28-antTop)*p;
      var ex2=ax+sway*(1-p)+(Math.sin(t*8+i*2+s*1.5))*5*(1-p*0.5);
      s===0?ctx.moveTo(ax+sway,antTop):null;
      ctx.lineTo(ex2,ey2);
    }
    var elAlpha=0.4+Math.sin(t*6+i)*0.35;
    ctx.strokeStyle='rgba(0,255,220,'+elAlpha+')';ctx.lineWidth=1.5;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();

    // 전기 끝 발광
    ctx.beginPath();ctx.arc(ax+sway,antTop,4,0,Math.PI*2);
    ctx.fillStyle='rgba(0,255,220,0.8)';ctx.fill();
    ctx.beginPath();ctx.arc(ax+sway,antTop,8,0,Math.PI*2);
    ctx.fillStyle='rgba(0,255,220,0.15)';ctx.fill();

    // 전기 파티클
    for(var p2=0;p2<2;p2++){
      var pa=t*5+i*2.1+p2*3.14;
      var pr=5+p2*3;
      ctx.beginPath();ctx.arc(ax+sway+Math.cos(pa)*pr,antTop+Math.sin(pa)*pr*0.6,1.5,0,Math.PI*2);
      ctx.fillStyle='rgba(0,255,200,'+(0.3+Math.sin(t*8+p2)*0.3)+')';ctx.fill();
    }
  });

  // ── TV 본체 (청록) ──
  var tw=76,th=50,tx=cx-tw/2,ty=by-th/2;
  var bodyGrad=ctx.createLinearGradient(tx,ty,tx+tw,ty+th);
  bodyGrad.addColorStop(0,'#0a3a38');bodyGrad.addColorStop(0.3,'#0d5550');
  bodyGrad.addColorStop(0.7,'#0a4540');bodyGrad.addColorStop(1,'#062828');
  ctx.beginPath();
  ctx.moveTo(tx+6,ty);ctx.lineTo(tx+tw-6,ty);ctx.quadraticCurveTo(tx+tw,ty,tx+tw,ty+6);
  ctx.lineTo(tx+tw,ty+th-6);ctx.quadraticCurveTo(tx+tw,ty+th,tx+tw-6,ty+th);
  ctx.lineTo(tx+6,ty+th);ctx.quadraticCurveTo(tx,ty+th,tx,ty+th-6);
  ctx.lineTo(tx,ty+6);ctx.quadraticCurveTo(tx,ty,tx+6,ty);
  ctx.closePath();
  ctx.fillStyle=bodyGrad;ctx.fill();
  ctx.strokeStyle='rgba(0,220,200,0.7)';ctx.lineWidth=2;ctx.stroke();

  // 도금 하이라이트
  ctx.beginPath();ctx.moveTo(tx+8,ty+2);ctx.lineTo(tx+tw-8,ty+2);
  ctx.strokeStyle='rgba(100,255,240,0.3)';ctx.lineWidth=1.5;ctx.stroke();

  // ── 화면 ──
  var sp=4;
  ctx.beginPath();ctx.rect(tx+sp,ty+sp,tw-sp*2,th-sp*2);
  ctx.fillStyle='#020c0b';ctx.fill();
  ctx.strokeStyle='rgba(0,180,160,0.3)';ctx.lineWidth=1;ctx.stroke();

  // 화면 청록 글로우
  var scGlow=ctx.createRadialGradient(cx,by,5,cx,by,28);
  scGlow.addColorStop(0,'rgba(0,200,180,0.07)');scGlow.addColorStop(1,'transparent');
  ctx.beginPath();ctx.rect(tx+sp,ty+sp,tw-sp*2,th-sp*2);ctx.fillStyle=scGlow;ctx.fill();

  // ── 눈 두 개 (안광) ──
  var eyeY=by-5;
  var eyePulse=0.6+Math.sin(t*3)*0.4;

  [-12,12].forEach(function(ox,i){
    var ex=cx+ox;
    if(!blink){
      // 안광 글로우 (눈 뒤에)
      var eyeGlow=ctx.createRadialGradient(ex,eyeY,0,ex,eyeY,16);
      eyeGlow.addColorStop(0,'rgba(0,255,220,'+(eyePulse*0.4)+')');
      eyeGlow.addColorStop(1,'transparent');
      ctx.beginPath();ctx.arc(ex,eyeY,16,0,Math.PI*2);ctx.fillStyle=eyeGlow;ctx.fill();

      // 흰자
      ctx.beginPath();ctx.arc(ex,eyeY,6.5,0,Math.PI*2);
      ctx.fillStyle='rgba(200,255,250,0.95)';ctx.fill();

      // 홍채 (청록)
      var pd=Math.sin(t*1.8+i)*1.2;
      ctx.beginPath();ctx.arc(ex+pd,eyeY,4,0,Math.PI*2);
      var ig=ctx.createRadialGradient(ex+pd,eyeY,0,ex+pd,eyeY,4);
      ig.addColorStop(0,'#ffffff');ig.addColorStop(0.3,'#00ffee');ig.addColorStop(1,'#007788');
      ctx.fillStyle=ig;ctx.fill();

      // 동공
      ctx.beginPath();ctx.arc(ex+pd,eyeY,1.8,0,Math.PI*2);
      ctx.fillStyle='#001018';ctx.fill();

      // 안광 빔 (눈에서 앞으로 나오는 빛)
      var beamAlpha=eyePulse*0.15;
      ctx.save();
      ctx.globalAlpha=beamAlpha;
      ctx.beginPath();
      ctx.moveTo(ex,eyeY-6.5);
      ctx.lineTo(ex-8,eyeY-22);ctx.lineTo(ex+8,eyeY-22);
      ctx.closePath();
      ctx.fillStyle='rgba(0,255,220,1)';ctx.fill();
      ctx.restore();

      // 반짝임
      ctx.beginPath();ctx.arc(ex+pd+2,eyeY-2,1.3,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.95)';ctx.fill();

      // 눈 테두리 발광
      ctx.beginPath();ctx.arc(ex,eyeY,6.5,0,Math.PI*2);
      ctx.strokeStyle='rgba(0,255,220,'+(eyePulse*0.6)+')';ctx.lineWidth=1.2;ctx.stroke();
    } else {
      // 깜빡임 — 안광 라인
      ctx.beginPath();ctx.moveTo(ex-6,eyeY);ctx.lineTo(ex+6,eyeY);
      ctx.strokeStyle='rgba(0,255,220,0.9)';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
      // 깜빡일 때도 안광
      var blinkGlow=ctx.createRadialGradient(ex,eyeY,0,ex,eyeY,14);
      blinkGlow.addColorStop(0,'rgba(0,255,220,0.2)');blinkGlow.addColorStop(1,'transparent');
      ctx.beginPath();ctx.arc(ex,eyeY,14,0,Math.PI*2);ctx.fillStyle=blinkGlow;ctx.fill();
    }
  });

  // ── 웃는 입 ──
  ctx.beginPath();ctx.arc(cx,by+8,7,0.18*Math.PI,0.82*Math.PI);
  ctx.strokeStyle='rgba(0,200,180,0.8)';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();

  // ── TV 다리 ──
  ctx.beginPath();
  ctx.moveTo(cx-18,by+th/2+2);ctx.lineTo(cx-22,by+th/2+10);

function drawIPTIME_EVO3(ctx, t) {
  var cx=60, cy=62;
  ctx.clearRect(0,0,120,120);
  var bob = Math.sin(t*2)*2.5;
  var by = cy + bob;
  var blink = Math.sin(t*1.3) > 0.92;
  var glitch = Math.sin(t*9) > 0.7;
  var glitchI = Math.max(0, Math.sin(t*9));
  var errFlash = Math.sin(t*13) > 0.88;

  // ── 잔상 ──
  for(var gh=0;gh<3;gh++){
    var gd=(gh+1)*0.07;
    var gBy=cy+Math.sin((t-gd)*2)*2.5;

    ctx.lineTo(tx2+tw2,ty2+th2-6);ctx.quadraticCurveTo(tx2+tw2,ty2+th2,tx2+tw2-6,ty2+th2);
    ctx.lineTo(tx2+6,ty2+th2);ctx.quadraticCurveTo(tx2,ty2+th2,tx2,ty2+th2-6);
    ctx.lineTo(tx2,ty2+6);ctx.quadraticCurveTo(tx2,ty2,tx2+6,ty2);

  }

  // ── 보조 스크린 (양옆) ──
  var sideScreens=[{x:cx-52,y:by-14,w:20,h:28},{x:cx+32,y:by-14,w:20,h:28}];
  sideScreens.forEach(function(sc,si){
    var scGlitch=Math.sin(t*11+si*2.5)>0.65;

    ctx.lineTo(sc.x+sc.w,sc.y+sc.h-3);ctx.quadraticCurveTo(sc.x+sc.w,sc.y+sc.h,sc.x+sc.w-3,sc.y+sc.h);
    ctx.lineTo(sc.x+3,sc.y+sc.h);ctx.quadraticCurveTo(sc.x,sc.y+sc.h,sc.x,sc.y+sc.h-3);
    ctx.lineTo(sc.x,sc.y+3);ctx.quadraticCurveTo(sc.x,sc.y,sc.x+3,sc.y);
    ctx.closePath();
    ctx.fillStyle='#030e08';ctx.fill();
    ctx.strokeStyle=scGlitch?'rgba(255,40,0,0.8)':'rgba(0,200,100,0.5)';ctx.lineWidth=1.2;ctx.stroke();

    // 스크린 내용 (코드/에러)
    if(scGlitch){

      for(var r=0;r<6;r++){

        ctx.lineWidth=1;ctx.stroke();
      }

      ctx.font='bold 6px monospace';ctx.fillStyle='rgba(255,50,0,0.9)';ctx.textAlign='center';
      ctx.fillText('ERR',sc.x+sc.w/2,sc.y+sc.h/2+2);
    } else {
      // 정상 — 초록 코드
      for(var r=0;r<5;r++){
        var ry2=sc.y+4+r*4.5;
        var lw2=Math.random()*0.5+0.5;
        ctx.beginPath();ctx.moveTo(sc.x+2,ry2);ctx.lineTo(sc.x+2+sc.w*lw2-4,ry2);
        ctx.strokeStyle='rgba(0,200,80,0.5)';ctx.lineWidth=1;ctx.stroke();

    }
    ctx.restore();

    // 연결선

    if(si===0){ ctx.moveTo(sc.x+sc.w,by); ctx.lineTo(cx-38,by); }
    else { ctx.moveTo(sc.x,by); ctx.lineTo(cx+38,by); }
    ctx.strokeStyle='rgba(0,150,80,0.3)';ctx.lineWidth=1.5;ctx.stroke();
  });

  // ── 안테나 4개 ──
  var antX=[cx-22,cx-7,cx+7,cx+22];
  antX.forEach(function(ax,i){
    var sway=Math.sin(t*2+i*0.8)*2;
    var aTop=by-52+Math.sin(t*3+i)*2;
    ctx.beginPath();ctx.moveTo(ax,by-28);ctx.lineTo(ax+sway,aTop);
    ctx.strokeStyle=i%2===0?'#00cc66':'#0066ff';ctx.lineWidth=2;ctx.lineCap='round';ctx.stroke();
    // 전기 신호
    ctx.beginPath();
    var segs=5;
    for(var s=0;s<segs;s++){
      var p=(s+1)/segs;
      var ey2=aTop+(by-28-aTop)*p;
      var ex2=ax+sway*(1-p)+Math.sin(t*7+i*1.5+s*1.3)*4*(1-p*0.4);
      s===0?ctx.moveTo(ax+sway,aTop):null;
      ctx.lineTo(ex2,ey2);
    }
    var elCol=i%2===0?'rgba(0,255,100,':'rgba(0,150,255,';
    ctx.strokeStyle=elCol+(0.4+Math.sin(t*5+i)*0.3)+')';ctx.lineWidth=1.5;ctx.lineCap='round';ctx.stroke();
    // 끝 발광
    ctx.beginPath();ctx.arc(ax+sway,aTop,3.5,0,Math.PI*2);
    ctx.fillStyle=i%2===0?'rgba(0,255,100,0.8)':'rgba(0,150,255,0.8)';ctx.fill();
    ctx.beginPath();ctx.arc(ax+sway,aTop,7,0,Math.PI*2);
    ctx.fillStyle=i%2===0?'rgba(0,255,100,0.12)':'rgba(0,150,255,0.12)';ctx.fill();
  });

  // ── TV 본체 (초록+파랑) ──

  bodyGrad.addColorStop(0,'#0a2a1a');bodyGrad.addColorStop(0.3,'#0a3a50');
  bodyGrad.addColorStop(0.6,'#082a18');bodyGrad.addColorStop(1,'#041428');
  ctx.beginPath();
  ctx.moveTo(tx+6,ty);ctx.lineTo(tx+tw-6,ty);ctx.quadraticCurveTo(tx+tw,ty,tx+tw,ty+6);
  ctx.lineTo(tx+tw,ty+th-6);ctx.quadraticCurveTo(tx+tw,ty+th,tx+tw-6,ty+th);
  ctx.lineTo(tx+6,ty+th);ctx.quadraticCurveTo(tx,ty+th,tx,ty+th-6);
  ctx.lineTo(tx,ty+6);ctx.quadraticCurveTo(tx,ty,tx+6,ty);
  ctx.closePath();
  ctx.fillStyle=bodyGrad;ctx.fill();
  ctx.strokeStyle=errFlash?'rgba(255,50,0,0.8)':'rgba(0,180,100,0.6)';ctx.lineWidth=2;ctx.stroke();

  // ── 화면 ──
  var sp=4;
  ctx.beginPath();ctx.rect(tx+sp,ty+sp,tw-sp*2,th-sp*2);
  ctx.fillStyle='#020a05';ctx.fill();

  // 화면 스캔라인
  for(var i=0;i<th-sp*2;i+=3){
    ctx.beginPath();ctx.moveTo(tx+sp,ty+sp+i);ctx.lineTo(tx+tw-sp,ty+sp+i);
    ctx.strokeStyle='rgba(0,180,80,0.04)';ctx.lineWidth=1;ctx.stroke();
  }

  // ── 글리치 눈 두 개 ──
  var eyeY=by-5;
  [-12,12].forEach(function(ox,ei){
    var ex=cx+ox;
    var gox=glitch?(Math.random()-0.5)*7*glitchI:0;
    var goy=glitch?(Math.random()-0.5)*4*glitchI:0;
    ctx.save();

    if(!blink){
      // 안광 글로우
      var eg=ctx.createRadialGradient(ex+gox,eyeY+goy,0,ex+gox,eyeY+goy,16);
      eg.addColorStop(0,'rgba(0,255,80,0.35)');eg.addColorStop(0.5,'rgba(0,100,255,0.1)');eg.addColorStop(1,'transparent');
      ctx.beginPath();ctx.arc(ex+gox,eyeY+goy,16,0,Math.PI*2);ctx.fillStyle=eg;ctx.fill();

      // 흰자 (글리치색)
      ctx.beginPath();ctx.arc(ex+gox,eyeY+goy,6.5,0,Math.PI*2);
      ctx.fillStyle=glitch?'rgba(0,255,80,0.9)':'rgba(180,255,200,0.95)';ctx.fill();

      // 홍채
      var pd=Math.sin(t*1.8+ei)*1.2;
      ctx.beginPath();ctx.arc(ex+gox+pd,eyeY+goy,4,0,Math.PI*2);
      var ig=ctx.createRadialGradient(ex+gox+pd,eyeY+goy,0,ex+gox+pd,eyeY+goy,4);
      ig.addColorStop(0,'#ffffff');ig.addColorStop(0.3,ei===0?'#00ff44':'#0088ff');ig.addColorStop(1,ei===0?'#004422':'#002244');
      ctx.fillStyle=ig;ctx.fill();

      // 글리치 라인
      if(glitch){
        for(var gi=0;gi<4;gi++){
          var gly=eyeY+goy-5+gi*3;
          var glx=ex+gox+(Math.random()-0.5)*8;
          ctx.beginPath();ctx.moveTo(glx-6,gly);ctx.lineTo(glx+6,gly);
          ctx.strokeStyle=errFlash?'rgba(255,50,0,0.7)':'rgba(0,255,80,0.6)';ctx.lineWidth=0.8;ctx.stroke();
        }

      // 동공
      ctx.beginPath();ctx.arc(ex+gox+pd,eyeY+goy,2,0,Math.PI*2);ctx.fillStyle='#000a04';ctx.fill();

      // 안광 빔
      ctx.save();ctx.globalAlpha=0.15+glitchI*0.1;
      ctx.beginPath();
      ctx.moveTo(ex+gox,eyeY+goy-6.5);
      ctx.lineTo(ex+gox-8,eyeY+goy-22);ctx.lineTo(ex+gox+8,eyeY+goy-22);
      ctx.closePath();
      ctx.fillStyle=ei===0?'rgba(0,255,80,1)':'rgba(0,120,255,1)';ctx.fill();
      ctx.restore();

      // 반짝임
      ctx.beginPath();ctx.arc(ex+gox+pd+2,eyeY+goy-2,1.3,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.95)';ctx.fill();

      // 눈 테두리 에러색
      ctx.beginPath();ctx.arc(ex+gox,eyeY+goy,6.5,0,Math.PI*2);
      ctx.strokeStyle=errFlash?'rgba(255,50,0,0.8)':(ei===0?'rgba(0,255,80,0.5)':'rgba(0,120,255,0.5)');
      ctx.lineWidth=1.2;ctx.stroke();
    } else {
      ctx.beginPath();ctx.moveTo(ex+gox-6,eyeY+goy);ctx.lineTo(ex+gox+6,eyeY+goy);
      ctx.strokeStyle=ei===0?'rgba(0,255,80,0.9)':'rgba(0,150,255,0.9)';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
    }
    ctx.restore();
  });

  // ── 에러 코드 ──

    ctx.font='bold 7px monospace';ctx.fillStyle='#ff3300';ctx.textAlign='center';
    ctx.fillText('CRITICAL ERROR',cx,by+8);

    // 입
    ctx.beginPath();ctx.arc(cx,by+8,7,0.18*Math.PI,0.82*Math.PI);

  // ── TV 다리 ──

  ctx.strokeStyle='#0a3028';ctx.lineWidth=4;ctx.lineCap='round';ctx.stroke();

  // ── LED ──

  ctx.beginPath();ctx.arc(tx+tw-7,ty+th-7,3,0,Math.PI*2);
  ctx.fillStyle=errFlash?'rgba(255,50,0,'+lp+')':'rgba(0,200,80,'+lp+')';ctx.fill();

  // ── 테두리 펄스 ──
  ctx.beginPath();
  ctx.moveTo(tx+6,ty);ctx.lineTo(tx+tw-6,ty);ctx.quadraticCurveTo(tx+tw,ty,tx+tw,ty+6);
  ctx.lineTo(tx+tw,ty+th-6);ctx.quadraticCurveTo(tx+tw,ty+th,tx+tw-6,ty+th);
  ctx.lineTo(tx+6,ty+th);ctx.quadraticCurveTo(tx,ty+th,tx,ty+th-6);
  ctx.lineTo(tx,ty+6);ctx.quadraticCurveTo(tx,ty,tx+6,ty);ctx.closePath();
  ctx.strokeStyle=errFlash?'rgba(255,50,0,0.5)':'rgba(0,160,80,'+(0.2+Math.sin(t*2)*0.15)+')';
  ctx.lineWidth=1.5;ctx.stroke();
}

function drawHOTSPOT_EVO1(ctx, t) {
  var cx=60, cy=58;
  ctx.clearRect(0,0,120,120);
  var pulse = Math.sin(t*3.4);
  var bob = Math.sin(t*2.4)*2.2;

  for(var i=0; i<10; i++){
    var angle = (i/10)*Math.PI*2 + t*1.7;
    var dist = 36 + Math.sin(t*4.2+i)*6;
    var ex = cx + Math.cos(angle)*dist;
    var ey = cy + bob + Math.sin(angle)*dist;
    var size = 3.5 + Math.sin(t*5.5+i*1.3)*2;
    ctx.beginPath();
    ctx.moveTo(cx, cy+bob);
    var mid1x = cx + Math.cos(angle)*dist*0.35 + Math.sin(t*9+i)*8;
    var mid1y = cy + bob + Math.sin(angle)*dist*0.35 + Math.cos(t*9+i)*8;
    var mid2x = cx + Math.cos(angle)*dist*0.65 - Math.sin(t*9+i)*6;
    var mid2y = cy + bob + Math.sin(angle)*dist*0.65 - Math.cos(t*9+i)*6;
    var mid3x = cx + Math.cos(angle)*dist*0.85 + Math.sin(t*11+i)*4;
    var mid3y = cy + bob + Math.sin(angle)*dist*0.85 + Math.cos(t*11+i)*4;
    ctx.lineTo(mid1x, mid1y); ctx.lineTo(mid2x, mid2y); ctx.lineTo(mid3x, mid3y); ctx.lineTo(ex, ey);
    var alpha = 0.5 + Math.sin(t*7+i)*0.3;
    ctx.strokeStyle = 'rgba(255,30,50,'+alpha+')';
    ctx.lineWidth = 2.2; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
    if(i%2===0){
      var branchAng = angle + (Math.sin(t*3+i)>0?0.6:-0.6);
      var bex = mid2x + Math.cos(branchAng)*8;
      var bey = mid2y + Math.sin(branchAng)*8;
      ctx.beginPath();
      ctx.moveTo(mid2x, mid2y);
      ctx.lineTo(mid2x + Math.cos(branchAng)*4 + Math.sin(t*15+i)*2, mid2y + Math.sin(branchAng)*4);
      ctx.lineTo(bex, bey);
      ctx.strokeStyle = 'rgba(255,80,100,'+(alpha*0.7)+')';
      ctx.lineWidth = 1.2; ctx.stroke();
      ctx.beginPath(); ctx.arc(bex, bey, 1.5, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,200,180,'+alpha+')'; ctx.fill();
    }
    ctx.beginPath(); ctx.arc(ex, ey, size, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,50,70,'+(alpha+0.2)+')'; ctx.fill();
    ctx.beginPath(); ctx.arc(ex, ey, size*0.5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,220,210,'+(alpha+0.3)+')'; ctx.fill();
  }

  ctx.beginPath();
  var pts = 12;
  for(var i=0;i<pts;i++){
    var a = (i/pts)*Math.PI*2;
    var r = 23 + Math.sin(t*2.2+i*0.8)*4.5 + Math.sin(t*3.7+i*1.3)*2.2;
    var x = cx + Math.cos(a)*r;
    var y = cy + bob + Math.sin(a)*r;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.closePath();
  var bodyGrad = ctx.createRadialGradient(cx, cy+bob, 0, cx, cy+bob, 25);
  bodyGrad.addColorStop(0, '#5a0820'); bodyGrad.addColorStop(0.5, '#380612'); bodyGrad.addColorStop(1, '#1a0408');
  ctx.fillStyle = bodyGrad; ctx.fill();
  ctx.strokeStyle = 'rgba(255,40,60,'+(0.6+pulse*0.25)+')';
  ctx.lineWidth = 2.2; ctx.stroke();

  var mainEyeCy = cy + bob - 3;
  var eyeR = 12;
  ctx.beginPath(); ctx.arc(cx, mainEyeCy, eyeR, 0, Math.PI*2);
  ctx.fillStyle = '#f0e0e2'; ctx.fill();
  var pupilOff = Math.sin(t*1.5)*2;
  ctx.beginPath(); ctx.arc(cx+pupilOff, mainEyeCy, 8, 0, Math.PI*2);
  var irisGrad = ctx.createRadialGradient(cx+pupilOff, mainEyeCy, 0, cx+pupilOff, mainEyeCy, 8);
  irisGrad.addColorStop(0, '#ff1030'); irisGrad.addColorStop(0.5, '#aa0018'); irisGrad.addColorStop(1, '#550008');
  ctx.fillStyle = irisGrad; ctx.fill();
  ctx.beginPath(); ctx.arc(cx+pupilOff, mainEyeCy, 4.2, 0, Math.PI*2);
  ctx.fillStyle = '#080004'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx+pupilOff+3, mainEyeCy-3, 2.2, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx, mainEyeCy, eyeR, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(220,40,60,0.7)'; ctx.lineWidth = 1.5; ctx.stroke();

  var subEyeCy = cy + bob + 12;
  var subEyeCx = cx + Math.sin(t*1.2)*1.5;
  var subR = 5.5;
  ctx.beginPath(); ctx.arc(subEyeCx, subEyeCy, subR, 0, Math.PI*2);
  ctx.fillStyle = '#f0e0e2'; ctx.fill();
  var subPupilOff = -Math.sin(t*1.5)*1.5;
  ctx.beginPath(); ctx.arc(subEyeCx+subPupilOff, subEyeCy, 3.5, 0, Math.PI*2);
  var subIris = ctx.createRadialGradient(subEyeCx+subPupilOff, subEyeCy, 0, subEyeCx+subPupilOff, subEyeCy, 3.5);
  subIris.addColorStop(0, '#ff2040'); subIris.addColorStop(1, '#660010');
  ctx.fillStyle = subIris; ctx.fill();
  ctx.beginPath(); ctx.arc(subEyeCx+subPupilOff, subEyeCy, 1.8, 0, Math.PI*2);
  ctx.fillStyle = '#080004'; ctx.fill();
  ctx.beginPath(); ctx.arc(subEyeCx+subPupilOff+1, subEyeCy-1, 0.9, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.fill();
  ctx.beginPath(); ctx.arc(subEyeCx, subEyeCy, subR, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(220,40,60,0.65)'; ctx.lineWidth = 1; ctx.stroke();

  var glow = ctx.createRadialGradient(cx, cy+bob, 18, cx, cy+bob, 48);
  glow.addColorStop(0, 'transparent'); glow.addColorStop(1, 'rgba(255,20,40,'+(0.08+pulse*0.06)+')');
  ctx.beginPath(); ctx.arc(cx, cy+bob, 48, 0, Math.PI*2);
  ctx.fillStyle = glow; ctx.fill();
}

function drawHOTSPOT_EVO2(ctx, t) {
  var cx=60, cy=60;
  ctx.clearRect(0,0,120,120);
  var pulse = Math.sin(t*3.6);
  var surge = Math.max(0, Math.sin(t*1.3)); // 전기 폭발 주기
  var bob = Math.sin(t*2.5)*2.5;

  // ── 바깥 보라 글로우 오라 (큰 영역) ──
  var aura = ctx.createRadialGradient(cx, cy+bob, 10, cx, cy+bob, 60);
  aura.addColorStop(0, 'rgba(140,40,200,'+(0.12+surge*0.1)+')');
  aura.addColorStop(0.5, 'rgba(100,20,160,0.06)');
  aura.addColorStop(1, 'transparent');
  ctx.beginPath(); ctx.arc(cx, cy+bob, 60, 0, Math.PI*2);
  ctx.fillStyle = aura; ctx.fill();

  // ── 통제 불가능한 전기 (가닥 수↑, 마구잡이 방향, 폭발성) ──
  var boltCount = 14;
  for(var i=0; i<boltCount; i++){
    // 각도 자체가 흔들림 — 통제 불가
    var baseAng = (i/boltCount)*Math.PI*2;
    var jitter = Math.sin(t*7+i*2.1)*0.8 + Math.cos(t*11+i*1.7)*0.5;
    var angle = baseAng + jitter + t*0.6;
    var dist = 38 + Math.sin(t*5+i)*10 + surge*8;
    var ex = cx + Math.cos(angle)*dist;
    var ey = cy + bob + Math.sin(angle)*dist;
    var size = 3 + Math.sin(t*6+i*1.5)*2.5 + surge*2;

    // 5단 지그재그 (더 거칠게)
    ctx.beginPath();
    ctx.moveTo(cx, cy+bob);
    var segs = 5;
    for(var s=1; s<segs; s++){
      var p = s/segs;
      var wob = Math.sin(t*13+i*3+s)*10*(1-p*0.5);
      var wob2 = Math.cos(t*17+i*2+s)*8*(1-p*0.5);
      var mx = cx + Math.cos(angle)*dist*p + wob;
      var my = cy + bob + Math.sin(angle)*dist*p + wob2;
      ctx.lineTo(mx, my);
    }
    ctx.lineTo(ex, ey);
    var alpha = 0.6 + Math.sin(t*9+i)*0.3 + surge*0.2;
    // 보라-핑크 혼합 (인덱스에 따라)
    var hue = i%3===0 ? '180,40,220' : (i%3===1 ? '220,60,180' : '140,30,200');
    ctx.strokeStyle = 'rgba('+hue+','+Math.min(1,alpha)+')';
    ctx.lineWidth = 2.5 + surge*1.5;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();

    // 다중 분기 (마구잡이로 갈라짐)
    for(var br=0; br<2; br++){
      if((i+br)%2===0){
        var branchAng = angle + (br===0?1.0:-1.0) + Math.sin(t*4+i+br)*0.4;
        var branchDist = 6 + Math.sin(t*8+i+br)*4;
        var midP = 0.4 + br*0.3;
        var startX = cx + Math.cos(angle)*dist*midP;
        var startY = cy + bob + Math.sin(angle)*dist*midP;
        var bex = startX + Math.cos(branchAng)*branchDist;
        var bey = startY + Math.sin(branchAng)*branchDist;
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.lineTo(startX + Math.cos(branchAng)*branchDist*0.5 + Math.sin(t*20+i)*3, startY + Math.sin(branchAng)*branchDist*0.5);
        ctx.lineTo(bex, bey);
        ctx.strokeStyle = 'rgba(220,80,220,'+(alpha*0.6)+')';
        ctx.lineWidth = 1.2; ctx.stroke();
        ctx.beginPath(); ctx.arc(bex, bey, 1.6, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,200,255,'+alpha+')'; ctx.fill();
      }
    }

    // 끝 불꽃 (더 크고 화려)
    ctx.beginPath(); ctx.arc(ex, ey, size, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(180,50,220,'+Math.min(1,alpha+0.2)+')'; ctx.fill();
    ctx.beginPath(); ctx.arc(ex, ey, size*0.5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(240,200,255,'+Math.min(1,alpha+0.3)+')'; ctx.fill();
  }

  // ── 본체 (보라 그라데이션, 좀 더 작고 단단해 보임) ──
  ctx.beginPath();
  var pts = 14;
  for(var i=0;i<pts;i++){
    var a = (i/pts)*Math.PI*2;
    var r = 18 + Math.sin(t*2.5+i*0.9)*3 + Math.sin(t*4+i*1.4)*1.5;
    var x = cx + Math.cos(a)*r;
    var y = cy + bob + Math.sin(a)*r;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.closePath();
  var bodyGrad = ctx.createRadialGradient(cx, cy+bob, 0, cx, cy+bob, 20);
  bodyGrad.addColorStop(0, '#5a1080');
  bodyGrad.addColorStop(0.5, '#380560');
  bodyGrad.addColorStop(1, '#180030');
  ctx.fillStyle = bodyGrad; ctx.fill();
  ctx.strokeStyle = 'rgba(180,60,220,'+(0.7+pulse*0.3)+')';
  ctx.lineWidth = 2; ctx.stroke();

  // 본체 내부 무늬 (보라 회로 같은)
  ctx.beginPath();
  ctx.arc(cx, cy+bob, 10, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(220,140,255,'+(0.3+pulse*0.2)+')';
  ctx.lineWidth = 1; ctx.stroke();

  // ── 떠다니는 눈들 (4개, 본체와 분리) ──
  // 각 눈은 자기만의 궤도로 떠다님
  var eyes = [
    { rx: 26, ry: 16, sp: 0.7, ph: 0.0,         size: 7,   look: 1.2 },  // 메인 (큰 눈)
    { rx: 22, ry: 22, sp: 1.1, ph: 1.8,         size: 4.5, look: 1.8 },
    { rx: 30, ry: 14, sp: 0.9, ph: 3.4,         size: 4,   look: 0.9 },
    { rx: 18, ry: 26, sp: 1.3, ph: 5.1,         size: 3.5, look: 2.2 }
  ];

  for(var e=0; e<eyes.length; e++){
    var eye = eyes[e];
    var orbit = t*eye.sp + eye.ph;
    var ex = cx + Math.cos(orbit)*eye.rx + Math.sin(t*2+e)*2;
    var ey = cy + bob + Math.sin(orbit)*eye.ry + Math.cos(t*2.3+e)*1.5;
    var R = eye.size;

    // 눈으로 이어지는 보라 가닥 (떠다님을 강조)
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(orbit)*4, cy+bob + Math.sin(orbit)*4);
    var midX = cx + Math.cos(orbit)*eye.rx*0.5 + Math.sin(t*5+e)*2;
    var midY = cy + bob + Math.sin(orbit)*eye.ry*0.5 + Math.cos(t*5+e)*2;
    ctx.quadraticCurveTo(midX, midY, ex, ey);
    ctx.strokeStyle = 'rgba(180,80,220,'+(0.25+Math.sin(t*3+e)*0.1)+')';
    ctx.lineWidth = 0.8; ctx.stroke();

    // 흰자
    ctx.beginPath(); ctx.arc(ex, ey, R, 0, Math.PI*2);
    ctx.fillStyle = '#f0e0f0'; ctx.fill();
    // 홍채 (보라/마젠타)
    var pOff = Math.sin(t*eye.look + e*1.5)*1.5;
    var pOffY = Math.cos(t*eye.look + e*1.5)*1.0;
    ctx.beginPath(); ctx.arc(ex+pOff, ey+pOffY, R*0.65, 0, Math.PI*2);
    var ig = ctx.createRadialGradient(ex+pOff, ey+pOffY, 0, ex+pOff, ey+pOffY, R*0.65);
    ig.addColorStop(0, '#d040ff');
    ig.addColorStop(0.5, '#9020cc');
    ig.addColorStop(1, '#400060');
    ctx.fillStyle = ig; ctx.fill();
    // 동공
    ctx.beginPath(); ctx.arc(ex+pOff, ey+pOffY, R*0.32, 0, Math.PI*2);
    ctx.fillStyle = '#0a0010'; ctx.fill();
    // 반짝임
    ctx.beginPath(); ctx.arc(ex+pOff+R*0.18, ey+pOffY-R*0.22, R*0.18, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.fill();
    // 테두리
    ctx.beginPath(); ctx.arc(ex, ey, R, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(200,80,220,0.7)';
    ctx.lineWidth = 1; ctx.stroke();
  }

  // 최외곽 글로우
  var glow = ctx.createRadialGradient(cx, cy+bob, 20, cx, cy+bob, 55);
  glow.addColorStop(0, 'transparent');
  glow.addColorStop(1, 'rgba(160,40,220,'+(0.1+pulse*0.06+surge*0.08)+')');
  ctx.beginPath(); ctx.arc(cx, cy+bob, 55, 0, Math.PI*2);
  ctx.fillStyle = glow; ctx.fill();
}

function drawHOTSPOT_EVO3(ctx, t) {
  var cx=60, cy=60;
  ctx.clearRect(0,0,120,120);
  var pulse = Math.sin(t*3);
  var bob = Math.sin(t*2.2)*2;
  var slow = t*0.3; // 별자리 천천히 회전

  // ── 바깥 우주적 글로우 ──
  var aura = ctx.createRadialGradient(cx, cy+bob, 8, cx, cy+bob, 62);
  aura.addColorStop(0, 'rgba(40,120,255,0.18)');
  aura.addColorStop(0.5, 'rgba(20,60,200,0.08)');
  aura.addColorStop(1, 'transparent');
  ctx.beginPath(); ctx.arc(cx, cy+bob, 62, 0, Math.PI*2);
  ctx.fillStyle = aura; ctx.fill();

  // ── 미세한 배경 별먼지 ──
  for(var i=0;i<18;i++){
    var a = (i*2.399); // golden angle
    var r = 30 + (i%5)*5;
    var sx = cx + Math.cos(a+slow*0.5)*r;
    var sy = cy + bob + Math.sin(a+slow*0.5)*r;
    var tw = 0.3 + Math.abs(Math.sin(t*4+i))*0.5;
    ctx.beginPath();
    ctx.arc(sx, sy, 0.6, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(180,220,255,'+tw+')';
    ctx.fill();
  }

  // ── 별자리: 별 노드 정의 (본체 주위 궤도에 박힘) ──
  // 각 별: { ang, dist, size, links: [다른 별 index들] }
  var stars = [
    { ang: 0.0,         dist: 42, size: 2.8, links: [1, 6] },
    { ang: Math.PI*0.25, dist: 36, size: 2.2, links: [2] },
    { ang: Math.PI*0.5,  dist: 44, size: 3.2, links: [3] },
    { ang: Math.PI*0.78, dist: 34, size: 2.4, links: [4, 7] },
    { ang: Math.PI*1.05, dist: 42, size: 2.8, links: [5] },
    { ang: Math.PI*1.35, dist: 38, size: 2.2, links: [6] },
    { ang: Math.PI*1.6,  dist: 44, size: 3.0, links: [0] },
    { ang: Math.PI*1.85, dist: 36, size: 2.4, links: [0] },
  ];

  // 별 위치 계산 (천천히 회전 + 미세 진동)
  var sp = stars.map(function(s, i){
    var a = s.ang + slow;
    var wob = Math.sin(t*1.5 + i*1.7)*1.2;
    return {
      x: cx + Math.cos(a)*(s.dist + wob),
      y: cy + bob + Math.sin(a)*(s.dist + wob),
      size: s.size,
      twinkle: 0.7 + Math.sin(t*3 + i*1.3)*0.3,
      idx: i,
      links: s.links
    };
  });

  // ── 별자리 잇는 선 (전기) ──
  for(var i=0; i<sp.length; i++){
    var a = sp[i];
    for(var l=0; l<a.links.length; l++){
      var b = sp[a.links[l]];
      var alpha = 0.5 + Math.sin(t*2 + i)*0.3;
      // 지그재그 미세 (별자리 형태 유지하면서 전기 느낌)
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      var segs = 4;
      for(var s=1; s<segs; s++){
        var p = s/segs;
        var mx = a.x + (b.x-a.x)*p + Math.sin(t*10+i*2+s)*1.5;
        var my = a.y + (b.y-a.y)*p + Math.cos(t*9+i*1.5+s)*1.5;
        ctx.lineTo(mx, my);
      }
      ctx.lineTo(b.x, b.y);
      // 글로우 (두꺼운 바깥선)
      ctx.strokeStyle = 'rgba(80,180,255,'+(alpha*0.4)+')';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.stroke();
      // 중심선
      ctx.strokeStyle = 'rgba(180,230,255,'+alpha+')';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  // ── 본체에서 별로 가는 발산 전기 (더 강하게) ──
  for(var i=0; i<sp.length; i++){
    var s = sp[i];
    var alpha = 0.4 + Math.sin(t*3 + i*1.7)*0.25;
    ctx.beginPath();
    ctx.moveTo(cx + (s.x-cx)*0.15, cy+bob + (s.y-cy-bob)*0.15);
    var segs = 5;
    for(var k=1; k<segs; k++){
      var p = k/segs;
      var mx = cx + (s.x-cx)*p + Math.sin(t*12+i*2+k)*4*(1-p);
      var my = cy + bob + (s.y-cy-bob)*p + Math.cos(t*11+i+k)*4*(1-p);
      ctx.lineTo(mx, my);
    }
    ctx.lineTo(s.x, s.y);
    ctx.strokeStyle = 'rgba(60,160,255,'+alpha+')';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.stroke();
    // 중심 밝은 코어
    ctx.strokeStyle = 'rgba(220,240,255,'+(alpha*0.8)+')';
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }

  // ── 각 별 위에 파란 불꽃 ──
  for(var i=0; i<sp.length; i++){
    var s = sp[i];
    // 불꽃 (여러 갈래로 위로 솟음)
    for(var f=0; f<5; f++){
      var flameAng = -Math.PI/2 + (f-2)*0.3 + Math.sin(t*4+i*1.3+f)*0.2;
      var flameLen = 5 + Math.sin(t*6+i*1.7+f*2)*2.5 + (f===2?2:0); // 중앙이 더 김
      var fx = s.x + Math.cos(flameAng)*flameLen;
      var fy = s.y + Math.sin(flameAng)*flameLen;

      // 불꽃 본체 (그라데이션으로 끝이 흐려짐)
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      // 두 갈래 곡선
      var ctrlX = s.x + Math.cos(flameAng+0.3)*flameLen*0.5;
      var ctrlY = s.y + Math.sin(flameAng+0.3)*flameLen*0.5;
      ctx.quadraticCurveTo(ctrlX, ctrlY, fx, fy);
      var ctrlX2 = s.x + Math.cos(flameAng-0.3)*flameLen*0.5;
      var ctrlY2 = s.y + Math.sin(flameAng-0.3)*flameLen*0.5;
      ctx.quadraticCurveTo(ctrlX2, ctrlY2, s.x, s.y);
      ctx.closePath();
      var fAlpha = 0.4 + Math.sin(t*7+i+f)*0.2;
      ctx.fillStyle = 'rgba(80,180,255,'+fAlpha+')';
      ctx.fill();
      // 내부 더 밝은 불꽃
      if(f===2){
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        var cx2 = s.x + Math.cos(flameAng)*flameLen*0.4;
        var cy2 = s.y + Math.sin(flameAng)*flameLen*0.4;
        ctx.quadraticCurveTo(cx2, cy2, s.x+Math.cos(flameAng)*flameLen*0.7, s.y+Math.sin(flameAng)*flameLen*0.7);
        ctx.strokeStyle = 'rgba(220,240,255,'+(fAlpha+0.3)+')';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }

    // 별 자체 (밝게 반짝임, 십자 광채)
    var tw = s.twinkle;
    // 십자 광채
    ctx.beginPath();
    ctx.moveTo(s.x - s.size*2.2, s.y);
    ctx.lineTo(s.x + s.size*2.2, s.y);
    ctx.moveTo(s.x, s.y - s.size*2.2);
    ctx.lineTo(s.x, s.y + s.size*2.2);
    ctx.strokeStyle = 'rgba(220,240,255,'+(tw*0.7)+')';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    // 별 코어
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
    var starGrad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.size);
    starGrad.addColorStop(0, 'rgba(255,255,255,'+tw+')');
    starGrad.addColorStop(0.5, 'rgba(180,220,255,'+tw+')');
    starGrad.addColorStop(1, 'rgba(60,140,255,0)');
    ctx.fillStyle = starGrad;
    ctx.fill();
    // 별 중심점
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size*0.35, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,'+tw+')';
    ctx.fill();
  }

  // ── 본체 (짙은 파랑 + 코어 빛남) ──
  ctx.beginPath();
  var pts = 14;
  for(var i=0;i<pts;i++){
    var a = (i/pts)*Math.PI*2;
    var r = 17 + Math.sin(t*2.5+i*0.9)*2.5 + Math.sin(t*4+i*1.4)*1.3;
    var x = cx + Math.cos(a)*r;
    var y = cy + bob + Math.sin(a)*r;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.closePath();
  var bodyGrad = ctx.createRadialGradient(cx, cy+bob, 0, cx, cy+bob, 19);
  bodyGrad.addColorStop(0, '#1060d0');
  bodyGrad.addColorStop(0.5, '#0830a0');
  bodyGrad.addColorStop(1, '#020820');
  ctx.fillStyle = bodyGrad; ctx.fill();
  ctx.strokeStyle = 'rgba(80,180,255,'+(0.8+pulse*0.2)+')';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 본체 내부 회로/링
  ctx.beginPath();
  ctx.arc(cx, cy+bob, 9, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(140,210,255,'+(0.35+pulse*0.2)+')';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx, cy+bob, 5, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(200,230,255,'+(0.4+pulse*0.2)+')';
  ctx.lineWidth = 0.7;
  ctx.stroke();

  // ── 떠다니는 눈들 (7개, 다양한 궤도) ──
  var eyes = [
    { rx: 22, ry: 12, sp: 0.8,  ph: 0.0, size: 6.5, look: 1.2 }, // 메인
    { rx: 18, ry: 18, sp: 1.2,  ph: 1.5, size: 4,   look: 1.8 },
    { rx: 26, ry: 10, sp: 0.6,  ph: 2.9, size: 3.5, look: 0.9 },
    { rx: 14, ry: 22, sp: 1.5,  ph: 4.3, size: 3.2, look: 2.4 },
    { rx: 24, ry: 16, sp: -0.9, ph: 5.7, size: 3.8, look: 1.5 }, // 역회전
    { rx: 20, ry: 20, sp: 1.0,  ph: 0.7, size: 3,   look: 2.1 },
    { rx: 16, ry: 14, sp: -1.3, ph: 3.2, size: 2.8, look: 1.7 }  // 역회전 + 작음
  ];

  for(var e=0; e<eyes.length; e++){
    var eye = eyes[e];
    var orbit = t*eye.sp + eye.ph;
    var ex = cx + Math.cos(orbit)*eye.rx + Math.sin(t*2+e)*1.5;
    var ey = cy + bob + Math.sin(orbit)*eye.ry + Math.cos(t*2.3+e)*1.2;
    var R = eye.size;

    // 가닥 (옅게)
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(orbit)*3, cy+bob + Math.sin(orbit)*3);
    var midX = cx + Math.cos(orbit)*eye.rx*0.5 + Math.sin(t*5+e)*1.5;
    var midY = cy + bob + Math.sin(orbit)*eye.ry*0.5 + Math.cos(t*5+e)*1.5;
    ctx.quadraticCurveTo(midX, midY, ex, ey);
    ctx.strokeStyle = 'rgba(100,180,255,'+(0.2+Math.sin(t*3+e)*0.08)+')';
    ctx.lineWidth = 0.7;
    ctx.stroke();

    // 흰자
    ctx.beginPath(); ctx.arc(ex, ey, R, 0, Math.PI*2);
    ctx.fillStyle = '#e0eef8'; ctx.fill();
    // 홍채 (파랑/사이안)
    var pOff = Math.sin(t*eye.look + e*1.5)*1.4;
    var pOffY = Math.cos(t*eye.look + e*1.5)*1.0;
    ctx.beginPath(); ctx.arc(ex+pOff, ey+pOffY, R*0.65, 0, Math.PI*2);
    var ig = ctx.createRadialGradient(ex+pOff, ey+pOffY, 0, ex+pOff, ey+pOffY, R*0.65);
    ig.addColorStop(0, '#40c0ff');
    ig.addColorStop(0.5, '#1060d0');
    ig.addColorStop(1, '#001040');
    ctx.fillStyle = ig; ctx.fill();
    // 동공
    ctx.beginPath(); ctx.arc(ex+pOff, ey+pOffY, R*0.32, 0, Math.PI*2);
    ctx.fillStyle = '#000610'; ctx.fill();
    // 반짝임
    ctx.beginPath(); ctx.arc(ex+pOff+R*0.18, ey+pOffY-R*0.22, R*0.18, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.92)'; ctx.fill();
    // 테두리
    ctx.beginPath(); ctx.arc(ex, ey, R, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(120,200,255,0.75)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // 최외곽 글로우
  var finalGlow = ctx.createRadialGradient(cx, cy+bob, 22, cx, cy+bob, 60);
  finalGlow.addColorStop(0, 'transparent');
  finalGlow.addColorStop(1, 'rgba(40,140,255,'+(0.12+pulse*0.05)+')');
  ctx.beginPath(); ctx.arc(cx, cy+bob, 60, 0, Math.PI*2);
  ctx.fillStyle = finalGlow; ctx.fill();
}

function drawTPLINK_EVO1(ctx, t) {
  var cx=60, cy=66;
  ctx.clearRect(0,0,120,120);
  var bob = Math.sin(t*2.2)*2;
  var bodyY = cy + bob;

  // 위쪽 진한 전기 (5가닥, 굵게)

function drawTPLINK_EVO2(ctx, t) {
  var cx=60, cy=68;

  var bodyY = cy + bob;
  var pulse = Math.sin(t*3);

  // ── 주변 와이파이 신호 (페이드 인/아웃) ──
  function wifiArc(cxw, cyw, baseR, fade, dir) {
    var ang0 = dir>0 ? -Math.PI*0.35 : Math.PI*0.65;
    var ang1 = dir>0 ? Math.PI*0.35  : Math.PI*1.35;
    for(var r=0; r<3; r++){
      var rad = baseR + r*5;
      var alpha = fade * (0.7 - r*0.2);
      if(alpha <= 0) continue;
      ctx.beginPath();
      ctx.arc(cxw, cyw, rad, ang0, ang1);
      ctx.strokeStyle = 'rgba(255,160,40,'+alpha+')';
      ctx.lineWidth = 1.6;
      ctx.lineCap = 'round';
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(cxw, cyw, rad, ang0, ang1);
      ctx.strokeStyle = 'rgba(255,230,180,'+(alpha*0.5)+')';
      ctx.lineWidth = 0.6;
      ctx.stroke();
    }
    ctx.beginPath();
    ctx.arc(cxw, cyw, 1.6, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,200,80,'+fade+')';
    ctx.fill();
  }
  function fadeAt(off) {
    var p = (t*0.7 + off) % 2.5;
    return p < 1.5 ? Math.sin((p/1.5)*Math.PI) : 0;
  }
  var lF = fadeAt(0);
  if(lF>0) wifiArc(8, bodyY-4, 4, lF, -1);
  var rF = fadeAt(1.2);
  if(rF>0) wifiArc(112, bodyY+2, 4, rF, 1);
  var tF = fadeAt(2.0);
  if(tF>0){
    var tx2=100, ty2=bodyY-40;
    for(var r=0;r<2;r++){
      var alpha = tF * (0.6 - r*0.2);
      ctx.beginPath();
      ctx.arc(tx2, ty2, 3+r*4, Math.PI*0.9, Math.PI*1.6);
      ctx.strokeStyle = 'rgba(255,160,40,'+alpha+')';
      ctx.lineWidth = 1.2;
      ctx.stroke();
    }
    ctx.beginPath();
    ctx.arc(tx2, ty2, 1.2, 0, Math.PI*2);

    ctx.fill();

    ctx.moveTo(sx, sy);

      var p = i/steps;

    ctx.lineTo(ex, ey);
    ctx.strokeStyle = 'rgba(255,140,30,'+alpha+')';
    ctx.lineWidth = w;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    for(var i=1; i<steps; i++){
      var p = i/steps;
      var mx = sx + (ex-sx)*p + Math.sin(t*14+seed+i*2.5)*6*(1-p*0.4);
      var my = sy + (ey-sy)*p + Math.cos(t*12+seed+i*1.9)*5*(1-p*0.4);
      ctx.lineTo(mx, my);
    }
    ctx.lineTo(ex, ey);
    ctx.strokeStyle = 'rgba(255,230,180,'+(alpha*0.8)+')';
    ctx.lineWidth = w*0.4;
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(sx, sy);
    var segs = 4;
    for(var i=1; i<segs; i++){
      var p = i/segs;
      var mx = sx + (ex-sx)*p + Math.sin(t*15+seed+i*1.7)*2;
      var my = sy + (ey-sy)*p + Math.cos(t*13+seed+i*2.1)*1.5;
      ctx.lineTo(mx, my);
    }
    ctx.lineTo(ex, ey);
    ctx.strokeStyle = 'rgba(180,80,220,'+(flicker*0.7)+')';
    ctx.lineWidth = 1.2;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.stroke();
    // 밝은 코어
    ctx.strokeStyle = 'rgba(220,180,255,'+(flicker*0.6)+')';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    // 끝점
    ctx.beginPath();
    ctx.arc(ex, ey, 0.9, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(220,160,255,'+flicker+')';
    ctx.fill();
  });

  // ── 노란 균열 (금) ──
  var cracks = [
    [[-36, -10], [-28, -6], [-22, -12], [-18, -8]],
    [[36, 8], [28, 12], [22, 6], [16, 10]],
    [[-10, 24], [-6, 16], [0, 20], [6, 14]],
  ];
  cracks.forEach(function(crack, ci){
    // 작은 흔들림
    var ji = Math.sin(t*2 + ci)*0.5;
    ctx.beginPath();
    crack.forEach(function(pt, pi){
      var x = cx + pt[0] + ji*0.4;
      var y = bodyY + pt[1] + ji*0.3;
      if(pi===0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.strokeStyle = 'rgba(255,210,40,'+(0.55+Math.sin(t*4+ci)*0.2)+')';
    ctx.lineWidth = 0.9;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.stroke();
    // 글로우
    ctx.strokeStyle = 'rgba(255,230,80,'+(0.3+Math.sin(t*4+ci)*0.15)+')';
    ctx.lineWidth = 2.5;
    ctx.stroke();
  });

  // 상단 하이라이트
  ctx.beginPath();
  rr(ctx,cx-36, bodyY-27, 72, 10, [6,6,0,0]);
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  ctx.fill();

  // ── 양옆 더듬이 (작아짐, 거대 안테나에 굴복한 느낌) ──
  [cx-22, cx+22].forEach(function(ax, i){
    var sway = Math.sin(t*1.5+i*1.1)*1.5;
    ctx.beginPath();
    ctx.moveTo(ax, bodyY-28);
    ctx.lineTo(ax+sway, bodyY-40); // 짧음 (-50 → -40)
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(ax, bodyY-28);
    ctx.lineTo(ax+sway, bodyY-40);
    ctx.strokeStyle = 'rgba(80,60,60,0.7)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // 끝 캡 (시들시들)
    ctx.beginPath();
    ctx.arc(ax+sway, bodyY-40, 2.2, 0, Math.PI*2);

    ctx.strokeStyle = 'rgba(180,80,30,'+(0.3+Math.sin(t*3+i)*0.1)+')';
    ctx.lineWidth = 0.8;

  });

  // ── 가운데 거대 안테나 (매우 큼) ──
  // 봉체
  var giantSway = Math.sin(t*1.8)*1.2;
  // 봉 (두꺼움, 길이 길음)
  ctx.beginPath();
  ctx.moveTo(cx-3, bodyY-28);
  ctx.lineTo(cx-2+giantSway, bodyY-58);
  ctx.lineTo(cx+2+giantSway, bodyY-58);
  ctx.lineTo(cx+3, bodyY-28);
  ctx.closePath();
  var stemG = ctx.createLinearGradient(cx-3, bodyY-58, cx+3, bodyY-28);
  stemG.addColorStop(0, '#2a1a1a');
  stemG.addColorStop(1, '#0a0808');

  ctx.fill();
  ctx.strokeStyle = 'rgba(255,140,40,'+(0.7+pulse*0.2)+')';
  ctx.lineWidth = 1.2;
  ctx.stroke();
  // 봉 따라 흐르는 주황 에너지
  for(var s=0;s<4;s++){
    var sp = ((t*1.8 + s*0.25) % 1);
    var ey2 = bodyY - 28 - sp*30;
    ctx.beginPath();
    ctx.arc(cx + giantSway*sp, ey2, 1.2, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,200,80,'+(0.9 - sp*0.7)+')';
    ctx.fill();
  }
  // 거대 송신 디스크 (큼)
  var tipX = giantTipX;
  var tipY = giantTipY;
  ctx.beginPath();
  ctx.arc(tipX, tipY, 9, 0, Math.PI*2);
  var dG = ctx.createRadialGradient(tipX, tipY, 0, tipX, tipY, 9);
  dG.addColorStop(0, '#ffd070');
  dG.addColorStop(0.4, '#ff9020');
  dG.addColorStop(0.8, '#882200');
  dG.addColorStop(1, '#330800');
  ctx.fillStyle = dG;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,180,40,'+(0.9+pulse*0.1)+')';

  // 중앙 코어 (밝게 진동)
  ctx.beginPath();
  ctx.arc(tipX, tipY, 2 + Math.sin(t*6)*0.8, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,220,'+(0.8+Math.sin(t*7)*0.2)+')';
  ctx.fill();
  // 흡수 링 파동 (안으로 줄어듦)
  for(var r=0;r<3;r++){
    var ringP = ((t*1.0 + r*0.4) % 1.2) / 1.2; // 1->0
    var ringR = 18 - ringP*9; // 18 -> 9
    var ringA = ringP * 0.6;
    ctx.beginPath();
    ctx.arc(tipX, tipY, ringR, 0, Math.PI*2);

  // ── 헤드셋 ──
  var headsetY = bodyY - 26;

  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx-40, bodyY-8);
  ctx.bezierCurveTo(cx-40, headsetY-12, cx+40, headsetY-12, cx+40, bodyY-8);
  ctx.strokeStyle = 'rgba(255,140,40,0.6)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // 패딩 — 거대 안테나가 가운데를 차지하니까 두 조각으로 갈라짐
  ctx.beginPath();
  rr(ctx, cx-14, headsetY-12, 9, 4, 1.5);
  rr(ctx, cx+5, headsetY-12, 9, 4, 1.5);
  ctx.fillStyle = '#1a1010';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,140,40,0.4)';
  ctx.lineWidth = 0.8;
  ctx.stroke();
  // 이어컵
  [-44, 44].forEach(function(dx, i){
    var ecx = cx + dx;
    var ecy = bodyY - 4;
    ctx.beginPath();
    ctx.ellipse(ecx, ecy, 7, 9, 0, 0, Math.PI*2);
    var ecGrad = ctx.createRadialGradient(ecx, ecy, 0, ecx, ecy, 9);
    ecGrad.addColorStop(0, '#2a1a1a');
    ecGrad.addColorStop(1, '#0a0606');
    ctx.fillStyle = ecGrad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,140,40,0.65)';
    ctx.lineWidth = 1.2;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(ecx, ecy, 2.2, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,160,50,'+(0.55+Math.sin(t*3+i)*0.3)+')';
    ctx.fill();
  });
  // 마이크
  ctx.beginPath();
  ctx.moveTo(cx-44, bodyY+3);
  ctx.quadraticCurveTo(cx-30, bodyY+18, cx-18, bodyY+14);
  ctx.strokeStyle = '#1a1010';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx-44, bodyY+3);
  ctx.quadraticCurveTo(cx-30, bodyY+18, cx-18, bodyY+14);
  ctx.strokeStyle = 'rgba(255,140,40,0.5)';
  ctx.lineWidth = 0.8;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx-18, bodyY+14, 2.5, 0, Math.PI*2);
  ctx.fillStyle = '#1a0a0a';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,140,40,0.75)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx-18, bodyY+14, 1, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,100,40,'+(0.6+Math.sin(t*5)*0.4)+')';
  ctx.fill();

  // ── 눈 (한쪽에서 강렬한 전기 분출) ──
  var eyeY = bodyY - 7;
  // 왼쪽 눈 — 정상
  {
    var ex = cx - 13;
    ctx.beginPath();
    ctx.arc(ex, eyeY, 8, 0, Math.PI*2);
    ctx.fillStyle = '#0a0a0a';
    ctx.fill();
    ctx.strokeStyle = 'rgba(180,80,220,'+(0.6+Math.sin(t*2)*0.2)+')';

    ctx.beginPath();
    ctx.arc(ex+pOff, eyeY, 4.5, 0, Math.PI*2);

    iG.addColorStop(0,'#ff9920');
    iG.addColorStop(0.5,'#aa5500');
    iG.addColorStop(1,'#552200');
    ctx.fillStyle = iG;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(ex+pOff, eyeY, 2.5, 0, Math.PI*2);
    ctx.fillStyle = '#050000';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(ex+pOff+1.5, eyeY-1.5, 1.2, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,200,0.85)';

  // 오른쪽 눈 — 강렬한 전기 분출
  {
    var ex = cx + 13;
    // 눈 자체 (격렬하게 빛남)
    ctx.beginPath();
    ctx.arc(ex, eyeY, 8, 0, Math.PI*2);

    ctx.fill();
    // 눈에서 위쪽/대각선으로 전기가 뻗어나감 (5가닥)
    var eyeBoltCount = 5;
    for(var b=0; b<eyeBoltCount; b++){
      var baseAng = -Math.PI/2 + (b - 2)*0.45;
      var len = 14 + Math.sin(t*8+b*1.7)*4;
      var endX = ex + Math.cos(baseAng)*len + Math.sin(t*9+b)*2;
      var endY = eyeY + Math.sin(baseAng)*len + Math.cos(t*9+b)*2;
      ctx.beginPath();
      ctx.moveTo(ex, eyeY);
      var segs = 5;
      for(var s=1; s<segs; s++){
        var p = s/segs;
        var wob = Math.sin(t*18+b*3+s)*3*(1-p*0.3);
        var wob2 = Math.cos(t*16+b*2+s)*3*(1-p*0.3);
        var mx = ex + (endX-ex)*p + wob;
        var my = eyeY + (endY-eyeY)*p + wob2;
        ctx.lineTo(mx, my);
      }
      ctx.lineTo(endX, endY);
      var alpha = 0.7 + Math.sin(t*10+b)*0.25;
      ctx.strokeStyle = 'rgba(255,140,30,'+alpha+')';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.stroke();
      // 코어

      ctx.lineWidth = 0.6;
      ctx.stroke();
      // 끝점

      ctx.arc(endX, endY, 1.8, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,200,80,'+alpha+')';
      ctx.fill();
    }
    // 눈 코어 (흰 빛)
    ctx.beginPath();
    ctx.arc(ex, eyeY, 4.5, 0, Math.PI*2);
    var eG = ctx.createRadialGradient(ex,eyeY,0,ex,eyeY,4.5);
    eG.addColorStop(0,'#ffffff');
    eG.addColorStop(0.4,'#ffcc40');
    eG.addColorStop(1,'#ff5500');
    ctx.fillStyle = eG;

    // 동공 (작게)

    ctx.arc(ex, eyeY, 1.2, 0, Math.PI*2);

    ctx.fill();

    ctx.fillStyle = egl;

    ctx.arc(ex, eyeY, 8, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,180,60,'+(0.9+Math.sin(t*5)*0.1)+')';
    ctx.lineWidth = 1.5;
    ctx.stroke();

  // LED 6개 (주황 톤)
  var leds = ['#ff9020','#ff9020','#ff5520','#ff3030','#cc40ff','#a060ff'];

  dG2.addColorStop(1, '#0a060a');

  var dialAng = t*0.7;

  ctx.moveTo(dialX + Math.cos(dialAng)*1.5, dialY + Math.sin(dialAng)*1.5);

  // 토글 스위치 (왼쪽 위)

  ctx.font = 'bold 8px monospace';

  // 전체 외곽 글로우 (주황+보라 혼합)
  var finalGlow = ctx.createRadialGradient(cx, bodyY-30, 5, cx, bodyY, 65);
  finalGlow.addColorStop(0, 'rgba(255,140,30,'+(0.1+flashCycle*0.05)+')');
  finalGlow.addColorStop(0.6, 'rgba(150,60,200,0.05)');

  ctx.fill();
}

function drawTPLINK_EVO3(ctx, t) {
  var cx=60, cy=64;
  ctx.clearRect(0,0,120,120);
  var bob = Math.sin(t*2.2)*1.5;
  var bodyY = cy + bob;
  var pulse = Math.sin(t*3);
  var pulse2 = Math.sin(t*5);

  // ── 태양 코로나 (배경) ──
  // 본체 뒤에 거대한 노란 광휘
  var corona = ctx.createRadialGradient(cx, bodyY, 20, cx, bodyY, 70);
  corona.addColorStop(0, 'rgba(255,230,80,0.25)');
  corona.addColorStop(0.4, 'rgba(255,180,40,0.15)');
  corona.addColorStop(0.8, 'rgba(255,140,20,0.06)');
  corona.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(cx, bodyY, 70, 0, Math.PI*2);
  ctx.fillStyle = corona;
  ctx.fill();

  // 방사형 광선 (16가닥, 회전)
  var rayCount = 16;
  for(var i=0; i<rayCount; i++){
    var ang = (i/rayCount)*Math.PI*2 + t*0.3;
    var len = 38 + Math.sin(t*2 + i*1.3)*8;
    var x1 = cx + Math.cos(ang)*18;
    var y1 = bodyY + Math.sin(ang)*18;
    var x2 = cx + Math.cos(ang)*len;
    var y2 = bodyY + Math.sin(ang)*len;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    var grad = ctx.createLinearGradient(x1,y1,x2,y2);
    grad.addColorStop(0, 'rgba(255,240,120,'+(0.5+Math.sin(t*3+i)*0.2)+')');
    grad.addColorStop(1, 'transparent');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  // 짧은 광선 (8가닥, 반대 회전, 좀 더 두꺼움)
  for(var i=0; i<8; i++){
    var ang = (i/8)*Math.PI*2 - t*0.5 + 0.2;
    var len = 28 + Math.sin(t*3 + i)*5;
    var x1 = cx + Math.cos(ang)*16;
    var y1 = bodyY + Math.sin(ang)*16;
    var x2 = cx + Math.cos(ang)*len;
    var y2 = bodyY + Math.sin(ang)*len;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    var grad = ctx.createLinearGradient(x1,y1,x2,y2);
    grad.addColorStop(0, 'rgba(255,255,180,'+(0.6+Math.sin(t*4+i)*0.2)+')');
    grad.addColorStop(1, 'transparent');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  // ── 주변 와이파이 신호 (많이, 다중 위치, 페이드 인/아웃) ──
  function wifiSignal(cxw, cyw, fade, baseAng, spread) {
    if(fade <= 0) return;
    for(var r=0; r<3; r++){
      var rad = 3 + r*4.5;
      var alpha = fade * (0.75 - r*0.2);
      ctx.beginPath();
      ctx.arc(cxw, cyw, rad, baseAng - spread, baseAng + spread);
      ctx.strokeStyle = 'rgba(255,220,60,'+alpha+')';
      ctx.lineWidth = 1.5;
      ctx.lineCap = 'round';
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(cxw, cyw, rad, baseAng - spread, baseAng + spread);
      ctx.strokeStyle = 'rgba(255,255,200,'+(alpha*0.5)+')';
      ctx.lineWidth = 0.6;
      ctx.stroke();
    }
    ctx.beginPath();
    ctx.arc(cxw, cyw, 1.6, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,240,140,'+fade+')';
    ctx.fill();
  }
  function fadeAt(off, period) {
    var p = (t*0.6 + off) % period;
    return p < period*0.7 ? Math.sin((p/(period*0.7))*Math.PI) : 0;
  }
  // 6개의 와이파이 신호가 다양한 위치에서 페이드
  var signals = [
    [6,   bodyY-2,   0.0, Math.PI*0,    Math.PI*0.35],     // 좌
    [114, bodyY,     1.0, Math.PI,       Math.PI*0.35],     // 우
    [12,  bodyY-30,  2.0, Math.PI*0.2,  Math.PI*0.3],      // 좌상
    [108, bodyY-28,  0.7, Math.PI*0.8,  Math.PI*0.3],      // 우상
    [20,  bodyY+30,  1.6, -Math.PI*0.2, Math.PI*0.3],      // 좌하
    [100, bodyY+32,  2.4, Math.PI*1.2,  Math.PI*0.3],      // 우하
  ];
  signals.forEach(function(s){
    var f = fadeAt(s[2], 3.0);
    wifiSignal(s[0], s[1], f, s[3], s[4]);
  });

  // ── 위쪽 강렬한 노란 전기 ──
  function bolt(sx, sy, ex, ey, seed, alpha, w) {
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    var steps = 8;
    for(var i=1; i<steps; i++){
      var p = i/steps;
      var mx = sx + (ex-sx)*p + Math.sin(t*16+seed+i*2.5)*7*(1-p*0.3);
      var my = sy + (ey-sy)*p + Math.cos(t*14+seed+i*1.9)*6*(1-p*0.3);
      ctx.lineTo(mx, my);
    }
    ctx.lineTo(ex, ey);
    ctx.strokeStyle = 'rgba(255,210,40,'+alpha+')';
    ctx.lineWidth = w;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.stroke();
    // 흰 코어
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    for(var i=1; i<steps; i++){
      var p = i/steps;
      var mx = sx + (ex-sx)*p + Math.sin(t*16+seed+i*2.5)*7*(1-p*0.3);
      var my = sy + (ey-sy)*p + Math.cos(t*14+seed+i*1.9)*6*(1-p*0.3);
      ctx.lineTo(mx, my);
    }
    ctx.lineTo(ex, ey);
    ctx.strokeStyle = 'rgba(255,255,230,'+(alpha*0.95)+')';
    ctx.lineWidth = w*0.45;
    ctx.stroke();
  }
  var flashCycle = Math.sin(t*9);
  var fA = 0.85 + flashCycle*0.15;
  var giantTipX = cx + Math.sin(t*1.8)*1.2;
  var giantTipY = bodyY - 60;
  // 더 많은 가닥 (9개)

    [cx-34, bodyY-48, 0,   2.4],
    [cx-22, bodyY-72, 1.2, 2.2],
    [cx-8,  bodyY-80, 2.4, 2.6],
    [cx+8,  bodyY-82, 3.6, 2.4],
    [cx+22, bodyY-72, 4.8, 2.2],
    [cx+34, bodyY-48, 6.0, 2.4],
    [cx-30, bodyY-60, 7.2, 1.8],
    [cx+30, bodyY-60, 8.4, 1.8],
    [cx,    bodyY-86, 9.6, 2.8],

  inboundBolts.forEach(function(b, i){

    bolt(b[0], b[1], giantTipX, giantTipY, b[2], alpha, b[3]);
    ctx.beginPath();
    ctx.arc(b[0], b[1], 2 + Math.sin(t*7+i)*1, 0, Math.PI*2);

    // 글로우
    ctx.beginPath();
    ctx.arc(b[0], b[1], 5 + Math.sin(t*7+i)*1.5, 0, Math.PI*2);

  // ── 본체 (밝은 노란 발광체) ──

  ctx.beginPath();
  rr(ctx,cx-38, bodyY-28, 76, 54, 8);

  // 본체 발광 오버레이 (펄스)

  // 본체 테두리 (흰 노랑)

  // ── 가운데 거대 안테나 (태양 코어) ──

  // 봉체

  // 디스크 회전 링들
