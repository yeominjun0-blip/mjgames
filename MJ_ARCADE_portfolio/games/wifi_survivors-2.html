  var bodyGrad=ctx.createLinearGradient(cx-bodyW/2,bodyTop,cx+bodyW/2,bodyBot);
  bodyGrad.addColorStop(0,'#7722bb');
  bodyGrad.addColorStop(0.35,'#aa44ee');
  bodyGrad.addColorStop(0.65,'#448833');
  bodyGrad.addColorStop(1,'#225522');
  ctx.beginPath();rr(ctx,cx-bodyW/2,bodyTop,bodyW,bodyBot-bodyTop,4);
  ctx.fillStyle=bodyGrad;ctx.fill();
  // 테두리 (초록+보라 깜빡)
  var borderHue=Math.sin(t*2.5)>0?'rgba(140,255,100,':'rgba(200,80,255,';
  ctx.strokeStyle=borderHue+(0.6+Math.sin(t*3)*0.2)+')';
  ctx.lineWidth=1.8;ctx.stroke();

  // 몸체 하이라이트
  ctx.beginPath();rr(ctx,cx-bodyW/2+2,bodyTop+3,6,bodyBot-bodyTop-6,2);
  ctx.fillStyle='rgba(200,255,180,0.10)';ctx.fill();

  // 구멍 (초록 글로우)
  [{y:by-16,cols:[-7,0,7]},{y:by-4,cols:[-7,0,7]},{y:by+8,cols:[-7,0,7]}].forEach(function(row){
    row.cols.forEach(function(hox){
      ctx.beginPath();ctx.arc(cx+hox,row.y,3.2,0,Math.PI*2);ctx.fillStyle='#030d04';ctx.fill();
      ctx.strokeStyle='rgba(80,200,80,0.65)';ctx.lineWidth=1;ctx.stroke();
      var hGlow=ctx.createRadialGradient(cx+hox,row.y,0,cx+hox,row.y,6);
      // 보라↔초록 교대 글로우
      var hPhase=Math.sin(t*5+hox*0.5);
      var hCol=hPhase>0?'80,220,100':'180,60,255';
      hGlow.addColorStop(0,'rgba('+hCol+','+(0.35+Math.abs(hPhase)*0.2)+')');
      hGlow.addColorStop(1,'transparent');
      ctx.beginPath();ctx.arc(cx+hox,row.y,6,0,Math.PI*2);ctx.fillStyle=hGlow;ctx.fill();
    });
  });

  // 구분 띠
  [by-20,by+0,by+18].forEach(function(ry){
    var bGrad=ctx.createLinearGradient(cx-bodyW/2-1,ry,cx+bodyW/2+1,ry+3);
    bGrad.addColorStop(0,'rgba(80,20,160,0.85)');
    bGrad.addColorStop(1,'rgba(20,80,30,0.85)');
    ctx.beginPath();rr(ctx,cx-bodyW/2-1,ry,bodyW+2,3,1);
    ctx.fillStyle=bGrad;ctx.fill();
    ctx.strokeStyle='rgba(100,220,80,0.45)';ctx.lineWidth=0.6;ctx.stroke();
  });

  // ── 하단 캡 ──
  var capBot=ctx.createLinearGradient(cx-bodyW/2,bodyBot,cx+bodyW/2,bodyBot+8);
  capBot.addColorStop(0,'#334422');capBot.addColorStop(1,'#223311');
  ctx.beginPath();rr(ctx,cx-bodyW/2,bodyBot,bodyW,9,[0,0,5,5]);
  ctx.fillStyle=capBot;ctx.fill();
  ctx.strokeStyle='rgba(80,200,80,0.6)';ctx.lineWidth=1.2;ctx.stroke();

  // ── 눈 (초록 틴트) ──
  var blink=Math.sin(t*1.6)>0.9;
  var eyeY=by-4;
  [-6,6].forEach(function(ox,i){
    if(!blink){
      ctx.beginPath();ctx.arc(cx+ox,eyeY,5.8,0,Math.PI*2);
      ctx.fillStyle='#eafff0';ctx.fill();
      var pd=Math.sin(t*1.8+i)*0.8;
      ctx.beginPath();ctx.arc(cx+ox+pd,eyeY,3.4,0,Math.PI*2);
      var ig=ctx.createRadialGradient(cx+ox+pd,eyeY,0,cx+ox+pd,eyeY,3.4);
      ig.addColorStop(0,'#ccffaa');ig.addColorStop(0.35,'#44cc66');ig.addColorStop(0.7,'#88aaff');ig.addColorStop(1,'#3300aa');
      ctx.fillStyle=ig;ctx.fill();
      ctx.beginPath();ctx.arc(cx+ox+pd,eyeY,1.5,0,Math.PI*2);ctx.fillStyle='#020a04';ctx.fill();
      ctx.beginPath();ctx.arc(cx+ox+pd+1.5,eyeY-1.5,1.1,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fill();

        ctx.beginPath();ctx.arc(cx+ox+Math.cos(t*8+i)*7,eyeY+Math.sin(t*7+i)*5,0.9,0,Math.PI*2);

      }

      ctx.strokeStyle='rgba(160,255,160,0.9)';ctx.lineWidth=2.4;ctx.lineCap='round';ctx.stroke();
    }
  });

  // ── 이빨 (대형화 — 더 크고 날카롭게) ──
  var teethY=bodyBot+9;
  [
    {x:cx-13, w:7,  h:14},
    {x:cx-4,  w:8,  h:18},
    {x:cx+6,  w:7,  h:14},
  ].forEach(function(tooth){
    // 이빨 그라데이션 (보라→초록)
    var tGrad=ctx.createLinearGradient(tooth.x,teethY,tooth.x+tooth.w/2,teethY+tooth.h);

    tGrad.addColorStop(0.5,'#aaffbb');
    tGrad.addColorStop(1,'#66dd88');

    ctx.moveTo(tooth.x,teethY);
    ctx.lineTo(tooth.x+tooth.w/2,teethY+tooth.h);
    ctx.lineTo(tooth.x+tooth.w,teethY);
    ctx.closePath();
    ctx.fillStyle=tGrad;ctx.fill();
    ctx.strokeStyle='rgba(80,200,100,0.5)';ctx.lineWidth=0.9;ctx.stroke();
  });

  // ── 전체 글로우 (보라+초록) ──
  var glowGrad=ctx.createRadialGradient(cx,by,12,cx,by,62);
  glowGrad.addColorStop(0,'rgba(140,50,220,0.12)');
  glowGrad.addColorStop(0.4,'rgba(100,40,200,0.07)');
  glowGrad.addColorStop(0.7,'rgba(40,160,70,0.06)');
  glowGrad.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(cx,by,62,0,Math.PI*2);ctx.fillStyle=glowGrad;ctx.fill();
}

function drawEFM_EVO3(ctx, t) {
  var cx=60, cy=57;
  ctx.clearRect(0,0,120,120);

  // ── 색상 사이클 (보라↔초록, 약 2.5초 주기) ──
  // hue: 0=보라(270도), 1=초록(120도) 사이를 sin으로 왕복
  var huePhase = (Math.sin(t*1.3)+1)*0.5; // 0~1
  // 보라 RGB: 160,40,255 / 초록 RGB: 40,220,80
  var hR = Math.round(160*(1-huePhase) + 40*huePhase);
  var hG = Math.round(40*(1-huePhase) + 220*huePhase);
  var hB = Math.round(255*(1-huePhase) + 80*huePhase);
  var hCol = hR+','+hG+','+hB;
  // 보조 색 (반대 위상)
  var huePhase2 = (Math.sin(t*1.3+Math.PI)+1)*0.5;
  var h2R = Math.round(160*(1-huePhase2)+40*huePhase2);
  var h2G = Math.round(40*(1-huePhase2)+220*huePhase2);
  var h2B = Math.round(255*(1-huePhase2)+80*huePhase2);
  var hCol2 = h2R+','+h2G+','+h2B;

  // ── 흔들림 오프셋 ──
  // 주기적 흔들림 (불규칙하게 여러 주파수 합산)
  var shakeX = Math.sin(t*13.7)*1.8 + Math.sin(t*7.3)*1.2 + Math.sin(t*3.1)*0.8;
  var shakeY = Math.cos(t*11.3)*1.5 + Math.cos(t*5.9)*1.0 + Math.cos(t*2.7)*0.6;
  // 버스트 때 더 크게 흔들림
  var burstCycle = t % 1.8;
  var burstV = burstCycle < 0.40 ? Math.sin((burstCycle/0.40)*Math.PI) : 0;
  var shakeAmp = 1 + burstV*3.5;
  var bx = cx + shakeX*shakeAmp;
  var by2 = cy + Math.sin(t*2.1)*2 + shakeY*shakeAmp;

  var bodyTop=by2-29, bodyBot=by2+31, bodyW=27;

  // ── 5축 원자 궤도 ──
  var orbSpeed = 6.5; // 초고속
  var orbDefs = [
    { tilt:0,              rx:40, ry:21, speed:orbSpeed,        ballR:5.2, seed:0   },
    { tilt: Math.PI/4,     rx:38, ry:20, speed:orbSpeed*1.2,    ballR:4.8, seed:1.3 },
    { tilt:-Math.PI/4,     rx:38, ry:20, speed:orbSpeed*0.88,   ballR:4.8, seed:2.6 },
    { tilt: Math.PI/2,     rx:36, ry:19, speed:orbSpeed*1.35,   ballR:4.4, seed:3.9 },
    { tilt:-Math.PI*0.15,  rx:37, ry:20, speed:orbSpeed*0.75,   ballR:4.4, seed:5.1 },
  ];

  orbDefs.forEach(function(od, oi) {
    var angle = t*od.speed + od.seed;

    // 궤도 링
    ctx.save();
    ctx.translate(bx, by2);
    ctx.rotate(od.tilt);
    ctx.scale(1, od.ry/od.rx);
    ctx.beginPath();
    ctx.arc(0,0,od.rx,0,Math.PI*2);
    // 궤도 색도 사이클링
    var ringPhase=(Math.sin(t*1.3+oi*0.7)+1)*0.5;
    var rR=Math.round(120*(1-ringPhase)+30*ringPhase);
    var rG=Math.round(30*(1-ringPhase)+180*ringPhase);
    var rB=Math.round(200*(1-ringPhase)+60*ringPhase);
    ctx.strokeStyle='rgba('+rR+','+rG+','+rB+',0.14)';
    ctx.lineWidth=0.8;ctx.setLineDash([2,4]);ctx.stroke();ctx.setLineDash([]);
    ctx.restore();

    // 구슬 위치
    var rawX=Math.cos(angle)*od.rx;
    var rawY=Math.sin(angle)*od.ry;
    var ox=bx+rawX*Math.cos(od.tilt)-rawY*Math.sin(od.tilt);
    var oy=by2+rawX*Math.sin(od.tilt)+rawY*Math.cos(od.tilt);

    // 잔상 4개
    for(var tr2=1;tr2<=4;tr2++){
      var ta=angle-tr2*0.09;
      var trx=Math.cos(ta)*od.rx;
      var try3=Math.sin(ta)*od.ry;
      var tx2=bx+trx*Math.cos(od.tilt)-try3*Math.sin(od.tilt);
      var ty2=by2+trx*Math.sin(od.tilt)+try3*Math.cos(od.tilt);
      // 잔상도 색 사이클
      var trPhase=(Math.sin(t*1.3+oi*0.9+tr2*0.3)+1)*0.5;
      var tR=Math.round(160*(1-trPhase)+40*trPhase);
      var tG=Math.round(40*(1-trPhase)+200*trPhase);
      var tB=Math.round(255*(1-trPhase)+80*trPhase);
      ctx.beginPath();ctx.arc(tx2,ty2,od.ballR*(1-tr2*0.18),0,Math.PI*2);
      ctx.fillStyle='rgba('+tR+','+tG+','+tB+','+(0.2-tr2*0.04)+')';ctx.fill();
    }

    // 구슬 본체 — 색 사이클
    var bPhase=(Math.sin(t*1.3+oi*1.1)+1)*0.5;
    var bR=Math.round(240*(1-bPhase)+180*bPhase);
    var bG=Math.round(180*(1-bPhase)+255*bPhase);
    var bBl=Math.round(255*(1-bPhase)+180*bPhase);
    var orbGrad=ctx.createRadialGradient(ox-1,oy-1,0,ox,oy,od.ballR);
    orbGrad.addColorStop(0,'rgb('+bR+','+bG+','+bBl+')');
    orbGrad.addColorStop(0.4,'rgba('+hR+','+hG+','+hB+',0.9)');
    orbGrad.addColorStop(1,'rgba('+h2R+','+h2G+','+h2B+',0.7)');
    ctx.beginPath();ctx.arc(ox,oy,od.ballR,0,Math.PI*2);ctx.fillStyle=orbGrad;ctx.fill();

    // 구슬 글로우
    var orbGlow=ctx.createRadialGradient(ox,oy,0,ox,oy,od.ballR*3.2);
    orbGlow.addColorStop(0,'rgba('+hCol+',0.45)');
    orbGlow.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(ox,oy,od.ballR*3.2,0,Math.PI*2);ctx.fillStyle=orbGlow;ctx.fill();

    ctx.beginPath();ctx.arc(ox-1.2,oy-1.2,1.4,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.85)';ctx.fill();
  });

  // ── 극강 버스트 플래시 ──
  if(burstV>0.01){

    // 방사 라인 32개
    for(var bi=0;bi<32;bi++){
      var ba=(bi/32)*Math.PI*2+t*0.5;

      ctx.strokeStyle='rgba('+lR+','+lG+','+lB+','+(burstV*(0.6+Math.sin(bi)*0.2))+')';
      ctx.lineWidth=1.4+burstV*1.6;ctx.lineCap='round';ctx.stroke();
    }
    // 링 3겹
    [0.55,0.75,0.95].forEach(function(rf,ri){
      var rg=ctx.createRadialGradient(bx,by2,burstR*rf*0.5,bx,by2,burstR*rf);
      rg.addColorStop(0,'transparent');
      rg.addColorStop(0.6,'rgba('+hCol+','+(burstV*(0.25-ri*0.07))+')');
      rg.addColorStop(0.85,'rgba('+hCol2+','+(burstV*(0.14-ri*0.04))+')');
      rg.addColorStop(1,'transparent');
      ctx.beginPath();ctx.arc(bx,by2,burstR*rf,0,Math.PI*2);ctx.fillStyle=rg;ctx.fill();
    });
    // 코어 백열
    var cg=ctx.createRadialGradient(bx,by2,0,bx,by2,22);
    cg.addColorStop(0,'rgba(255,255,255,'+(burstV*0.98)+')');
    cg.addColorStop(0.25,'rgba('+hCol+','+(burstV*0.85)+')');
    cg.addColorStop(0.6,'rgba('+hCol2+','+(burstV*0.4)+')');
    cg.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(bx,by2,22,0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();
  }

  // 보조 버스트 (다른 타이밍)
  var b2c=(t+0.9)%1.8;
  var b2v=b2c<0.28?Math.sin((b2c/0.28)*Math.PI):0;
  if(b2v>0.01){
    for(var bi2=0;bi2<18;bi2++){
      var ba2=(bi2/18)*Math.PI*2+t*0.7;
      ctx.beginPath();
      ctx.moveTo(bx+Math.cos(ba2)*8,by2+Math.sin(ba2)*8);
      ctx.lineTo(bx+Math.cos(ba2)*b2v*48,by2+Math.sin(ba2)*b2v*48);
      ctx.strokeStyle='rgba('+hCol2+','+(b2v*0.55)+')';
      ctx.lineWidth=1;ctx.lineCap='round';ctx.stroke();
    }
    var c2g=ctx.createRadialGradient(bx,by2,0,bx,by2,15);
    c2g.addColorStop(0,'rgba(255,255,255,'+(b2v*0.88)+')');
    c2g.addColorStop(0.5,'rgba('+hCol2+','+(b2v*0.45)+')');
    c2g.addColorStop(1,'transparent');

  ctx.moveTo(bx-12,by2-34);
  ctx.lineTo(bx-20,by2-27+Math.sin(t*2.8)*2);
  ctx.lineTo(bx-18,by2-21);
  ctx.strokeStyle='rgba('+hCol+',0.9)';
  ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();

  // ── 상단 캡 (색 사이클) ──
  var capGrad=ctx.createLinearGradient(bx-13,by2-38,bx+13,by2-30);
  capGrad.addColorStop(0,'rgb('+Math.round(hR*0.7)+','+Math.round(hG*0.4)+','+Math.round(hB*0.7)+')');
  capGrad.addColorStop(1,'rgb('+Math.round(h2R*0.5)+','+Math.round(h2G*0.6)+','+Math.round(h2B*0.4)+')');
  ctx.beginPath();rr(ctx,bx-13,by2-38,26,10,[5,5,0,0]);
  ctx.fillStyle=capGrad;ctx.fill();
  ctx.strokeStyle='rgba('+hCol+',0.75)';ctx.lineWidth=1.6;ctx.stroke();

  // ── 핀 완전히 뽑힘 ──
  // 핀 고리가 본체에서 떨어져 위쪽에 따로 떠다님
  var pinFloatX = bx+4 + Math.sin(t*2.2)*6 + Math.cos(t*3.7)*3;
  var pinFloatY = by2-52 + Math.sin(t*1.8)*4 + Math.cos(t*2.9)*2;

  // 떠다니는 핀 고리

  ctx.arc(pinFloatX, pinFloatY, 5.5, 0, Math.PI*2);
  ctx.strokeStyle='rgba('+hCol+',0.95)';ctx.lineWidth=3;ctx.stroke();

  ctx.arc(bx+4,by2-38,4,0,Math.PI*2);
  ctx.fillStyle='#000006';ctx.fill();
  var holeGlow=ctx.createRadialGradient(bx+4,by2-38,0,bx+4,by2-38,16);
  holeGlow.addColorStop(0,'rgba('+hCol+','+(0.7+burstV*0.3)+')');
  holeGlow.addColorStop(0.4,'rgba('+hCol2+',0.35)');
  holeGlow.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(bx+4,by2-38,16,0,Math.PI*2);ctx.fillStyle=holeGlow;ctx.fill();

  // ── 몸체 (색 사이클 그라데이션) ──
  var bodyGrad=ctx.createLinearGradient(bx-bodyW/2,bodyTop,bx+bodyW/2,bodyBot);
  bodyGrad.addColorStop(0,'rgb('+Math.round(hR*0.55)+','+Math.round(hG*0.2)+','+Math.round(hB*0.55)+')');
  bodyGrad.addColorStop(0.3,'rgb('+Math.round(hR*0.75)+','+Math.round(hG*0.35)+','+Math.round(hB*0.75)+')');
  bodyGrad.addColorStop(0.65,'rgb('+Math.round(h2R*0.55)+','+Math.round(h2G*0.55)+','+Math.round(h2B*0.3)+')');

  ctx.strokeStyle='rgba('+hCol+','+(0.65+Math.sin(t*4)*0.25)+')';

  // 몸체 하이라이트

  // 구멍 (폭발적 글로우, 색 사이클)
  [{y:by2-16,cols:[-7,0,7]},{y:by2-4,cols:[-7,0,7]},{y:by2+8,cols:[-7,0,7]}].forEach(function(row,ri){
    row.cols.forEach(function(hox,ci){
      ctx.beginPath();ctx.arc(bx+hox,row.y,3.5,0,Math.PI*2);ctx.fillStyle='#000004';ctx.fill();

      var ghR=Math.round(hR*(1-hPhase2)+h2R*hPhase2);
      var ghG=Math.round(hG*(1-hPhase2)+h2G*hPhase2);
      var ghB=Math.round(hB*(1-hPhase2)+h2B*hPhase2);

      hGlow2.addColorStop(1,'transparent');
      ctx.beginPath();ctx.arc(bx+hox,row.y,10,0,Math.PI*2);ctx.fillStyle=hGlow2;ctx.fill();
      // 구멍 테두리
      ctx.beginPath();ctx.arc(bx+hox,row.y,3.5,0,Math.PI*2);
      ctx.strokeStyle='rgba('+ghR+','+ghG+','+ghB+',0.8)';ctx.lineWidth=1.1;ctx.stroke();
    });
  });

  // 구분 띠 (색 사이클)
  [by2-20,by2+0,by2+18].forEach(function(ry,ri){
    var bGrad2=ctx.createLinearGradient(bx-bodyW/2-1,ry,bx+bodyW/2+1,ry+3);

    bGrad2.addColorStop(1,'rgba('+Math.round(h2R*0.3)+','+h2G+','+Math.round(h2B*0.3)+',0.9)');
    ctx.beginPath();rr(ctx,bx-bodyW/2-1,ry,bodyW+2,3,1);
    ctx.fillStyle=bGrad2;ctx.fill();
    ctx.strokeStyle='rgba('+hCol+',0.5)';ctx.lineWidth=0.7;ctx.stroke();
  });

  // ── 하단 캡 ──
  var capBot=ctx.createLinearGradient(bx-bodyW/2,bodyBot,bx+bodyW/2,bodyBot+9);
  capBot.addColorStop(0,'rgb('+Math.round(h2R*0.35)+','+Math.round(h2G*0.45)+','+Math.round(h2B*0.25)+')');
  capBot.addColorStop(1,'rgb('+Math.round(h2R*0.2)+','+Math.round(h2G*0.3)+','+Math.round(h2B*0.15)+')');
  ctx.beginPath();rr(ctx,bx-bodyW/2,bodyBot,bodyW,9,[0,0,5,5]);
  ctx.fillStyle=capBot;ctx.fill();
  ctx.strokeStyle='rgba('+hCol2+',0.65)';ctx.lineWidth=1.2;ctx.stroke();

  // ── 눈 (색 사이클 + 더 강한 광채) ──
  var blink=Math.sin(t*1.6+shakeX*0.2)>0.88;
  var eyeY=by2-4;
  [-6,6].forEach(function(ox,i){
    if(!blink){
      ctx.beginPath();ctx.arc(bx+ox,eyeY,6,0,Math.PI*2);
      ctx.fillStyle='rgb('+Math.round(200+hR*0.2)+','+Math.round(200+hG*0.2)+','+Math.round(200+hB*0.2)+')';
      ctx.fill();
      var pd=Math.sin(t*1.8+i)*0.9;
      ctx.beginPath();ctx.arc(bx+ox+pd,eyeY,3.6,0,Math.PI*2);
      var ig=ctx.createRadialGradient(bx+ox+pd,eyeY,0,bx+ox+pd,eyeY,3.6);
      ig.addColorStop(0,'rgb('+Math.round(hR*0.9+100)+','+Math.round(hG*0.9+100)+','+Math.round(hB*0.9+100)+')');
      ig.addColorStop(0.4,'rgba('+hCol+',0.9)');
      ig.addColorStop(1,'rgba('+hCol2+',0.7)');
      ctx.fillStyle=ig;ctx.fill();
      ctx.beginPath();ctx.arc(bx+ox+pd,eyeY,1.5,0,Math.PI*2);ctx.fillStyle='#030005';ctx.fill();
      ctx.beginPath();ctx.arc(bx+ox+pd+1.5,eyeY-1.5,1.2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.92)';ctx.fill();
      // 눈 주변 스파크 (많이)
      for(var si2=0;si2<3;si2++){
        var spAngle=t*10+i*2+si2*2.1;
        var spR=6+Math.sin(t*8+si2)*2;
        if(Math.sin(t*9+i*3+si2*1.4)>0.5){
          ctx.beginPath();ctx.arc(bx+ox+Math.cos(spAngle)*spR,eyeY+Math.sin(spAngle)*spR,0.9,0,Math.PI*2);
          ctx.fillStyle='rgba('+hCol+',0.8)';ctx.fill();
        }
      }
    } else {
      ctx.beginPath();ctx.moveTo(bx+ox-6,eyeY);ctx.lineTo(bx+ox+6,eyeY);
      ctx.strokeStyle='rgba('+hCol+',0.95)';ctx.lineWidth=2.6;ctx.lineCap='round';ctx.stroke();
    }
  });

  // ── 이빨 (극대형 + 색 사이클) ──
  var teethY=bodyBot+9;
  [
    {x:bx-15, w:9,  h:17},
    {x:bx-4,  w:10, h:22},
    {x:bx+7,  w:9,  h:17},
  ].forEach(function(tooth,ti){
    var tPhase=(Math.sin(t*1.3+ti*0.8)+1)*0.5;
    var tR=Math.round(hR*(1-tPhase)+h2R*tPhase);
    var tG=Math.round(hG*(1-tPhase)+h2G*tPhase);
    var tB=Math.round(hB*(1-tPhase)+h2B*tPhase);
    var tGrad=ctx.createLinearGradient(tooth.x,teethY,tooth.x+tooth.w/2,teethY+tooth.h);
    tGrad.addColorStop(0,'rgb('+Math.min(255,tR+80)+','+Math.min(255,tG+80)+','+Math.min(255,tB+80)+')');
    tGrad.addColorStop(0.5,'rgb('+tR+','+tG+','+tB+')');
    tGrad.addColorStop(1,'rgb('+Math.round(tR*0.5)+','+Math.round(tG*0.5)+','+Math.round(tB*0.5)+')');
    ctx.beginPath();
    ctx.moveTo(tooth.x,teethY);
    ctx.lineTo(tooth.x+tooth.w/2,teethY+tooth.h);
    ctx.lineTo(tooth.x+tooth.w,teethY);
    ctx.closePath();
    ctx.fillStyle=tGrad;ctx.fill();
    ctx.strokeStyle='rgba('+tR+','+tG+','+tB+',0.6)';ctx.lineWidth=1;ctx.stroke();
    // 이빨 글로우
    var tGlow=ctx.createRadialGradient(tooth.x+tooth.w/2,teethY+tooth.h,0,tooth.x+tooth.w/2,teethY+tooth.h,8);
    tGlow.addColorStop(0,'rgba('+tR+','+tG+','+tB+',0.4)');
    tGlow.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(tooth.x+tooth.w/2,teethY+tooth.h,8,0,Math.PI*2);ctx.fillStyle=tGlow;ctx.fill();
  });

  // ── 전체 글로우 (색 사이클) ──
  var glowGrad=ctx.createRadialGradient(bx,by2,15,bx,by2,66);
  glowGrad.addColorStop(0,'rgba('+hCol+',0.14)');
  glowGrad.addColorStop(0.5,'rgba('+hCol2+',0.08)');
  glowGrad.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(bx,by2,66,0,Math.PI*2);ctx.fillStyle=glowGrad;ctx.fill();

  // 캔버스 전체 플래시 (버스트 최고조 때)
  if(burstV>0.7){
    ctx.fillStyle='rgba(255,255,255,'+(burstV-0.7)*0.15+')';
    ctx.fillRect(0,0,120,120);
  }
}

function drawDLINK_EVO1(ctx, t) {
  var cx=60, cy=60;
  ctx.clearRect(0,0,120,120);

  // 프레스 사이클 (기본보다 약간 빠름)
  var cycle=(t*1.6)%1;
  var pressY;
  if(cycle<0.14){ pressY=cycle/0.14; }
  else if(cycle<0.32){ pressY=1; }
  else { pressY=1-(cycle-0.32)/0.68; }
  pressY=pressY*pressY*(3-2*pressY);
  var pressOffset=pressY*26;
  var isImpact=cycle>0.11&&cycle<0.35;
  var impactShake=isImpact?(Math.random()-0.5)*2.8:0;
  var shakeX=isImpact?(Math.random()-0.5)*2.2:0;
  var plateY=86, plateH=11;
  var squish=isImpact?pressY*3.5:0;

  // ── 바닥 플레이트 (더 두껍고 정교) ──
  // 충격파
  if(isImpact&&pressY>0.78){
    var sR=(pressY-0.78)*4.5*65,sA=(1-(pressY-0.78)*4.5)*0.45;
    ctx.beginPath();ctx.ellipse(cx+shakeX,plateY+plateH+squish,sR,sR*0.22,0,0,Math.PI*2);
    ctx.strokeStyle='rgba(200,210,220,'+sA+')';ctx.lineWidth=2.2;ctx.stroke();
    // 2번째 충격파
    ctx.beginPath();ctx.ellipse(cx+shakeX,plateY+plateH+squish,sR*0.6,sR*0.13,0,0,Math.PI*2);
    ctx.strokeStyle='rgba(220,230,240,'+(sA*0.6)+')';ctx.lineWidth=1.4;ctx.stroke();
  }

  var pGrad=ctx.createLinearGradient(cx-36,plateY,cx+36,plateY+plateH);
  pGrad.addColorStop(0,'#585e68');pGrad.addColorStop(0.3,'#8a9299');pGrad.addColorStop(0.7,'#a0a8b0');pGrad.addColorStop(1,'#484e58');
  ctx.beginPath();rr(ctx,cx-36+shakeX,plateY+squish,72,plateH,3);
  ctx.fillStyle=pGrad;ctx.fill();
  ctx.strokeStyle=isImpact?'rgba(240,245,255,0.4)':'rgba(160,170,180,0.6)';ctx.lineWidth=1.6;ctx.stroke();
  // 플레이트 볼트 4개
  [-28,-10,10,28].forEach(function(ox){
    ctx.beginPath();ctx.arc(cx+ox+shakeX,plateY+plateH/2+squish,2.5,0,Math.PI*2);
    ctx.fillStyle='#383e48';ctx.fill();ctx.strokeStyle='#6a7280';ctx.lineWidth=0.8;ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx+ox+shakeX-1.5,plateY+plateH/2+squish);ctx.lineTo(cx+ox+shakeX+1.5,plateY+plateH/2+squish);
    ctx.moveTo(cx+ox+shakeX,plateY+plateH/2+squish-1.5);ctx.lineTo(cx+ox+shakeX,plateY+plateH/2+squish+1.5);
    ctx.strokeStyle='#505860';ctx.lineWidth=0.7;ctx.stroke();
  });

  // ── 기둥 (더 정교 — 홈 많고 가이드 레일 추가) ──
  [-29,29].forEach(function(ox){
    // 기둥 바깥
    var cGrad=ctx.createLinearGradient(cx+ox-6,0,cx+ox+6,0);
    cGrad.addColorStop(0,'#484e58');cGrad.addColorStop(0.35,'#7a8290');cGrad.addColorStop(0.65,'#8a9299');cGrad.addColorStop(1,'#383e48');
    ctx.beginPath();rr(ctx,cx+ox-6,16,12,plateY-16,2);ctx.fillStyle=cGrad;ctx.fill();
    ctx.strokeStyle='rgba(130,140,155,0.55)';ctx.lineWidth=1.1;ctx.stroke();
    // 홈 6개
    for(var i=0;i<6;i++){
      ctx.beginPath();ctx.rect(cx+ox-5,20+i*11,10,2);
      ctx.fillStyle='rgba(30,36,44,0.7)';ctx.fill();
    }
    // 가이드 레일 (기둥 안쪽 선)
    ctx.beginPath();
    ctx.moveTo(cx+ox+(ox>0?-2:2),18);ctx.lineTo(cx+ox+(ox>0?-2:2),plateY-2);
    ctx.strokeStyle='rgba(60,70,85,0.8)';ctx.lineWidth=1.5;ctx.stroke();
    // 기둥 상단 캡
    ctx.beginPath();rr(ctx,cx+ox-7,13,14,5,[3,3,0,0]);
    var capG=ctx.createLinearGradient(cx+ox-7,13,cx+ox+7,18);
    capG.addColorStop(0,'#8a9299');capG.addColorStop(1,'#585e68');
    ctx.fillStyle=capG;ctx.fill();ctx.strokeStyle='rgba(160,170,180,0.4)';ctx.lineWidth=0.8;ctx.stroke();
  });

  // ── 실린더 (더 정교) ──
  // 실린더 외부 링
  [12,20,28].forEach(function(ry){
    ctx.beginPath();rr(ctx,cx-12,ry,24,3,[2]);
    ctx.fillStyle='rgba(50,58,68,0.85)';ctx.fill();
    ctx.strokeStyle='rgba(100,110,125,0.45)';ctx.lineWidth=0.7;ctx.stroke();
  });
  ctx.beginPath();rr(ctx,cx-11,8,22,32,4);
  var cylG=ctx.createLinearGradient(cx-11,0,cx+11,0);
  cylG.addColorStop(0,'#484e58');cylG.addColorStop(0.3,'#8a9299');cylG.addColorStop(0.6,'#9aa2aa');cylG.addColorStop(1,'#383e48');
  ctx.fillStyle=cylG;ctx.fill();ctx.strokeStyle='rgba(150,160,170,0.65)';ctx.lineWidth=1.6;ctx.stroke();
  // 실린더 상단 캡
  ctx.beginPath();rr(ctx,cx-13,6,26,5,[3,3,0,0]);
  ctx.fillStyle='#585e6a';ctx.fill();ctx.strokeStyle='rgba(160,170,180,0.5)';ctx.lineWidth=1;ctx.stroke();

  // 피스톤 로드 (이중 구조)
  var rodTop=40,rodBot=rodTop+14+pressOffset;
  // 외부 슬리브
  ctx.beginPath();rr(ctx,cx-7,rodTop,14,rodBot-rodTop,2);
  ctx.fillStyle='rgba(50,58,68,0.6)';ctx.fill();

  rodG.addColorStop(0,'#686e78');rodG.addColorStop(0.5,'#d0d8e0');rodG.addColorStop(1,'#585e68');

  var headY=52+pressOffset+impactShake, headH=24;

  // 헤드 그림자
  if(!isImpact){
    ctx.beginPath();ctx.ellipse(cx,plateY+2,32*(1-pressY*0.28),4.5,0,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,'+(0.18+pressY*0.22)+')';ctx.fill();
  }

  // 헤드 본체 (더 두껍고 층이 있음)
  // 상단 연결부
  var connH=6;
  ctx.beginPath();rr(ctx,cx-14+shakeX,headY-connH,28,connH+3,[3,3,0,0]);
  var connG=ctx.createLinearGradient(cx-14,headY-connH,cx+14,headY);
  connG.addColorStop(0,'#686e78');connG.addColorStop(1,'#585e68');
  ctx.fillStyle=connG;ctx.fill();
  ctx.strokeStyle='rgba(130,140,155,0.5)';ctx.lineWidth=1;ctx.stroke();

  // 헤드 메인 바디
  var hGrad=ctx.createLinearGradient(cx-33,headY,cx+33,headY+headH);
  hGrad.addColorStop(0,'#686e78');hGrad.addColorStop(0.25,'#a8b0b8');hGrad.addColorStop(0.5,'#b0b8c0');hGrad.addColorStop(0.75,'#9098a0');hGrad.addColorStop(1,'#505860');
  ctx.beginPath();rr(ctx,cx-33+shakeX,headY,66,headH,5);
  ctx.fillStyle=hGrad;ctx.fill();
  ctx.strokeStyle=isImpact?'rgba(230,240,255,0.75)':'rgba(160,170,185,0.65)';ctx.lineWidth=2;ctx.stroke();

  // 헤드 볼트 4개 (더 정교)
  [[-24,headH/2],[-8,headH/2],[8,headH/2],[24,headH/2]].forEach(function(b){
    ctx.beginPath();ctx.arc(cx+b[0]+shakeX,headY+b[1],3.5,0,Math.PI*2);
    ctx.fillStyle='#383e48';ctx.fill();ctx.strokeStyle='#8a9299';ctx.lineWidth=1;ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx+b[0]+shakeX-2,headY+b[1]);ctx.lineTo(cx+b[0]+shakeX+2,headY+b[1]);
    ctx.moveTo(cx+b[0]+shakeX,headY+b[1]-2);ctx.lineTo(cx+b[0]+shakeX,headY+b[1]+2);
    ctx.strokeStyle='#505860';ctx.lineWidth=0.9;ctx.stroke();
  });

  // ── 경고 줄무늬 (노랑/검정) — 헤드 하단 ──
  var stripeY=headY+headH;
  var stripeH=7;
  var stripeW=66;
  // 클립을 헤드 하단 영역으로
  ctx.save();
  ctx.beginPath();rr(ctx,cx-33+shakeX,stripeY,stripeW,stripeH,[0,0,4,4]);ctx.clip();
  // 줄무늬 (45도 사선, 노랑/검정 번갈아)
  var stripeCount=14;
  var sw2=stripeW/stripeCount*2;
  for(var si=0;si<stripeCount+2;si++){
    ctx.beginPath();
    ctx.moveTo(cx-33+shakeX+si*sw2/2-stripeH,stripeY);
    ctx.lineTo(cx-33+shakeX+si*sw2/2,stripeY);
    ctx.lineTo(cx-33+shakeX+si*sw2/2-stripeH,stripeY+stripeH);

    warnGlow.addColorStop(1,'rgba(255,220,0,'+(pressY-0.7)*2*0.5+')');

    ctx.strokeStyle='#686e78';ctx.lineWidth=3;ctx.lineCap='round';ctx.stroke();
    // 손 (작은 집게)

    ctx.beginPath();ctx.moveTo(handX,handY);ctx.lineTo(handX+side*4,handY-3);
    ctx.strokeStyle='#8a9299';ctx.lineWidth=2;ctx.lineCap='round';ctx.stroke();
    // 집게 아래
    ctx.beginPath();ctx.moveTo(handX,handY);ctx.lineTo(handX+side*4,handY+3);
    ctx.strokeStyle='#8a9299';ctx.lineWidth=2;ctx.lineCap='round';ctx.stroke();
    // 집게 끝 볼트
    ctx.beginPath();ctx.arc(handX+side*4,handY,1.8,0,Math.PI*2);
    ctx.fillStyle='#b0b8c0';ctx.fill();
  });

  // ── 눈 3개 ──

    ctx.save();ctx.beginPath();ctx.rect(ex-er-2,eyeY-er-2,(er+2)*2,(er+2)*drowsiness+2);ctx.clip();
    ctx.beginPath();ctx.ellipse(ex,eyeY,er+1,er+1,0,0,Math.PI*2);ctx.fillStyle='#6a5808';ctx.fill();
    ctx.restore();
  });

  // ── 상단 프레임 (경고색) ──
  ctx.save();
  ctx.beginPath();rr(ctx,cx-39,2,78,14,[6,6,0,0]);ctx.clip();
  ctx.fillStyle='#141200';ctx.fillRect(cx-39,2,78,14);
  for(var fsi=0;fsi<14;fsi++){
    var fsw=78/14*2;
    ctx.beginPath();
    ctx.moveTo(cx-39+fsi*fsw/2-14,2);ctx.lineTo(cx-39+fsi*fsw/2,2);ctx.lineTo(cx-39+fsi*fsw/2-14,16);ctx.closePath();
    ctx.fillStyle=fsi%2===0?'rgba(200,160,0,0.4)':'rgba(0,0,0,0)';ctx.fill();
  }
  ctx.restore();
  ctx.beginPath();rr(ctx,cx-39,2,78,14,[6,6,0,0]);
  ctx.strokeStyle='rgba(190,152,12,0.75)';ctx.lineWidth=1.5;ctx.stroke();
  [-32,-18,18,32].forEach(function(ox){
    ctx.beginPath();ctx.arc(cx+ox,9,2.2,0,Math.PI*2);
    ctx.fillStyle=YLW;ctx.fill();ctx.strokeStyle='rgba(140,110,0,0.7)';ctx.lineWidth=0.7;ctx.stroke();
  });
  ctx.font='bold 7px monospace';ctx.fillStyle='rgba(240,195,15,0.88)';ctx.textAlign='center';ctx.fillText('D-LINK',cx,13);

  // 파편 + 노란 스파크
  if(isImpact&&pressY>0.78){
    for(var fi3=0;fi3<12;fi3++){
      var fa3=(fi3/12)*Math.PI+Math.PI,fr3=(pressY-0.78)*5*40;
      ctx.beginPath();ctx.arc(cx+Math.cos(fa3)*fr3+shakeX,plateY+Math.sin(fa3)*fr3*0.3,1.5+Math.random()*2,0,Math.PI*2);
      ctx.fillStyle='rgba(185,150,8,'+(1-(pressY-0.78)*5)*0.75+')';ctx.fill();
    }
    for(var fi4=0;fi4<6;fi4++){
      var fa4=(fi4/6)*Math.PI+Math.PI*0.7,fr4=(pressY-0.78)*4.5*32;
      ctx.beginPath();ctx.arc(cx+Math.cos(fa4)*fr4+shakeX,plateY+Math.sin(fa4)*fr4*0.35,1.5,0,Math.PI*2);
      ctx.fillStyle='rgba(255,222,20,'+(1-(pressY-0.78)*4.5)*0.9+')';ctx.fill();
    }
  }

  // 전체 경고 글로우
  var gG=ctx.createRadialGradient(cx,cy,15,cx,cy,65);
  gG.addColorStop(0,'transparent');
  gG.addColorStop(0.6,'rgba(180,145,10,'+(0.06+pressY*0.07)+')');
  gG.addColorStop(1,'rgba(220,175,0,'+(pressY*0.06)+')');
  ctx.beginPath();ctx.arc(cx,cy,65,0,Math.PI*2);ctx.fillStyle=gG;ctx.fill();

  // 임팩트 플래시
  if(isImpact&&pressY>0.85){
    ctx.fillStyle='rgba(255,220,0,'+(pressY-0.85)*0.5+')';
    ctx.fillRect(0,0,120,120);
  }
  ctx.restore(); // 축소 해제
}

function _lsClap(t, speed) {
  var cc=(t*speed)%1;
  var ang; if(cc<0.08){ang=1-cc/0.08;}else if(cc<0.18){ang=0;}else{ang=(cc-0.18)/0.82;}
  return {cc:cc,ang:ang,isClap:cc<0.18,topAngle:ang*0.38};
}

function _lsBody(ctx,cx,bodyY,bodyW,bodyH,col,shakeX){
  ctx.beginPath();rr(ctx,cx-bodyW/2+shakeX,bodyY,bodyW,bodyH,[0,0,6,6]);
  var bg=ctx.createLinearGradient(cx-bodyW/2,bodyY,cx+bodyW/2,bodyY+bodyH);
  bg.addColorStop(0,col[0]);bg.addColorStop(0.4,col[1]);bg.addColorStop(1,col[2]);
  ctx.fillStyle=bg;ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1.5;ctx.stroke();
}

function _lsTeeth(ctx,x,y,count,w,dir,col,maxH){
  // dir: 1=아래로, -1=위로
  var tw=w/count;
  for(var i=0;i<count;i++){
    var tx=x+i*tw;
    var th=maxH*(i%2===0?1:0.6);
    ctx.beginPath();
    ctx.moveTo(tx+1,y);
    ctx.lineTo(tx+tw/2,y+dir*th);
    ctx.lineTo(tx+tw-1,y);
    ctx.closePath();
    ctx.fillStyle=col;ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=0.5;ctx.stroke();
  }
}

function _lsEye(ctx,ex,ey,r,pd,redMode,blink){
  if(!blink){
    ctx.beginPath();ctx.arc(ex,ey,r,0,Math.PI*2);
    ctx.fillStyle=redMode?'#ffe0e0':'#fff8f0';ctx.fill();
    ctx.beginPath();ctx.arc(ex+pd,ey,r*0.60,0,Math.PI*2);
    var ig=ctx.createRadialGradient(ex+pd,ey,0,ex+pd,ey,r*0.60);
    if(redMode){ig.addColorStop(0,'#ff4422');ig.addColorStop(0.5,'#cc1100');ig.addColorStop(1,'#660000');}
    else{ig.addColorStop(0,'#444');ig.addColorStop(0.5,'#222');ig.addColorStop(1,'#111');}
    ctx.fillStyle=ig;ctx.fill();
    ctx.beginPath();ctx.arc(ex+pd,ey,r*0.28,0,Math.PI*2);ctx.fillStyle='#000';ctx.fill();
    ctx.beginPath();ctx.arc(ex+pd+r*0.28,ey-r*0.28,r*0.16,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fill();
    if(redMode){
      var eg=ctx.createRadialGradient(ex,ey,0,ex,ey,r*2);
      eg.addColorStop(0,'rgba(255,40,0,0.25)');eg.addColorStop(1,'transparent');
      ctx.beginPath();ctx.arc(ex,ey,r*2,0,Math.PI*2);ctx.fillStyle=eg;ctx.fill();
    }
  } else {
    ctx.beginPath();ctx.moveTo(ex-r,ey);ctx.lineTo(ex+r,ey);
    ctx.strokeStyle=redMode?'rgba(200,30,0,0.7)':'rgba(0,0,0,0.5)';
    ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
  }
}

function drawLINKSYS_EVO1(ctx, t) {
  var cx=60,cy=60;
  ctx.clearRect(0,0,120,120);
  var bob=Math.sin(t*1.7)*2.2;
  var cl=_lsClap(t,1.4); // 더 빠름
  // 추가 미세 떨림 (상시)
  var tremor=Math.sin(t*22)*1.2+Math.sin(t*17)*0.8;
  var shake=cl.isClap&&cl.cc<0.12?(0.12-cl.cc)/0.12*4:0;
  shake+=Math.abs(tremor)*0.4;
  var shakeX=(shake*(Math.random()-0.5)*2)+tremor*0.3;
  var shakeY=(shake*(Math.random()-0.5)*1.5)+Math.sin(t*19)*0.6;
  var baseY=cy+bob+shakeY;
  var bodyW=72,bodyH=50,bodyX=cx-bodyW/2+shakeX,bodyY=baseY-4;

  // 몸체 (빨간 틴트)
  ctx.beginPath();rr(ctx,bodyX,bodyY,bodyW,bodyH,[0,0,6,6]);
  var bg=ctx.createLinearGradient(bodyX,bodyY,bodyX+bodyW,bodyY+bodyH);
  bg.addColorStop(0,'#221008');bg.addColorStop(0.4,'#2e1a10');bg.addColorStop(1,'#180800');
  ctx.fillStyle=bg;ctx.fill();ctx.strokeStyle='rgba(255,80,40,0.2)';ctx.lineWidth=1.5;ctx.stroke();

  var scrPad=6,scrX=bodyX+scrPad,scrY=bodyY+scrPad,scrW=bodyW-scrPad*2,scrH=bodyH-scrPad*2;
  ctx.beginPath();rr(ctx,scrX,scrY,scrW,scrH,3);ctx.fillStyle='#fff0ec';ctx.fill();
  // 스크린 세로선 (살짝 빨간)
  ctx.beginPath();ctx.moveTo(scrX+8,scrY);ctx.lineTo(scrX+8,scrY+scrH);
  ctx.moveTo(scrX+scrW-8,scrY);ctx.lineTo(scrX+scrW-8,scrY+scrH);
  ctx.strokeStyle='rgba(200,50,20,0.08)';ctx.lineWidth=1;ctx.stroke();

  var eyeCY=scrY+scrH*0.5,blink=Math.sin(t*1.6+tremor*0.1)>0.88;
  [-13,13].forEach(function(ox,i){_lsEye(ctx,cx+ox+shakeX,eyeCY,7,Math.sin(t*1.5+i)*1.2,false,blink);});

  // 아래 이빨 (12개로 증가)
  _lsTeeth(ctx,bodyX,bodyY,12,bodyW,-1,'#fff0ec',9);

  // 위 클래퍼 (빨간 틴트)
  ctx.save();ctx.translate(bodyX,bodyY+shakeY);ctx.rotate(-cl.topAngle);
  ctx.beginPath();rr(ctx,0,-18,bodyW,18,[4,4,0,0]);
  var cg2=ctx.createLinearGradient(0,-18,bodyW,0);cg2.addColorStop(0,'#221008');cg2.addColorStop(0.5,'#2e1a10');cg2.addColorStop(1,'#180800');
  ctx.fillStyle=cg2;ctx.fill();ctx.strokeStyle='rgba(255,80,40,0.25)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.save();ctx.beginPath();rr(ctx,0,-18,bodyW,18,[4,4,0,0]);ctx.clip();
  for(var si2=0;si2<10;si2++){
    ctx.beginPath();ctx.moveTo(si2*20-40,-18);ctx.lineTo(si2*20-40+10,-18);ctx.lineTo(si2*20-40+28,0);ctx.lineTo(si2*20-40+18,0);ctx.closePath();
    ctx.fillStyle=si2%2===0?'rgba(255,200,180,0.7)':'rgba(0,0,0,0)';ctx.fill();
  }
  ctx.restore();
  ctx.font='bold 7px monospace';ctx.fillStyle='rgba(255,150,120,0.6)';ctx.textAlign='center';ctx.fillText('LINKSYS',bodyW/2,-5);
  // 위 이빨 (12개)
  _lsTeeth(ctx,0,0,12,bodyW,1,'#fff0ec',9);
  ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.fillStyle='#331510';ctx.fill();ctx.strokeStyle='rgba(255,100,60,0.4)';ctx.lineWidth=1.2;ctx.stroke();
  ctx.restore();

  // 킥킥 이펙트 (더 자주, 더 많음)
  if(cl.isClap&&cl.cc<0.18){
    var pa2=(0.18-cl.cc)/0.18;
    // 파티클 (빨간 틴트)
    for(var pi=0;pi<7;pi++){
      var pang=(pi/7)*Math.PI*2;
      var pr2=(1-pa2)*22;
      ctx.beginPath();ctx.arc(cx+shakeX+Math.cos(pang)*pr2,bodyY+shakeY+Math.sin(pang)*pr2*0.4,2,0,Math.PI*2);
      ctx.fillStyle='rgba(255,150,100,'+pa2*0.55+')';ctx.fill();
    }
    ctx.font='bold '+(9+pa2*4)+'px monospace';ctx.fillStyle='rgba(255,150,100,'+pa2*0.9+')';ctx.textAlign='center';
    ctx.fillText('탁!',cx+26+shakeX,bodyY-6+shakeY);
    ctx.font=(8+pa2*2)+'px monospace';ctx.fillStyle='rgba(255,180,160,'+pa2*0.8+')';
    ctx.fillText('키득ㅋㅋ',cx-22+shakeX,bodyY-14+shakeY);
    ctx.font=(7+pa2)+'px monospace';ctx.fillStyle='rgba(255,160,140,'+pa2*0.55+')';
    ctx.fillText('ㅋㅋ',cx+30+shakeX,bodyY-22+shakeY);
  }
  // 상시 미세 킥킥
  var microG=(Math.sin(t*14+1)+1)*0.5;
  if(microG>0.85){
    ctx.font='6px monospace';ctx.fillStyle='rgba(255,160,140,'+(microG-0.85)*4*0.4+')';ctx.textAlign='center';
    ctx.fillText('ㅋ',cx+(Math.random()-0.5)*40,bodyY-4+(Math.random()-0.5)*20);
  }
  // 글로우
  var gg=ctx.createRadialGradient(cx,cy,10,cx,cy,58);
  gg.addColorStop(0,'transparent');gg.addColorStop(1,'rgba(200,50,20,'+(0.04+Math.abs(tremor)*0.02)+')');
  ctx.beginPath();ctx.arc(cx,cy,58,0,Math.PI*2);ctx.fillStyle=gg;ctx.fill();
}

function drawLINKSYS_EVO2(ctx, t) {
  var cx=60,cy=60;

  var holoDefs=[
    {ox:-34,oy:-20,bobS:2.3,bobP:0,sz:0.5},
    {ox:36, oy:-16,bobS:1.9,bobP:1.4,sz:0.42},
  ];
  holoDefs.forEach(function(h){
    var hby=cy+h.oy+Math.sin(t*h.bobS+h.bobP)*5;
    var hbx=cx+h.ox+Math.cos(t*h.bobS*0.7+h.bobP)*3;
    var hs=h.sz;
    var ha=0.3+Math.sin(t*2.5+h.bobP)*0.12;
    ctx.save();ctx.globalAlpha=ha;ctx.translate(hbx,hby);ctx.scale(hs,hs);
    // 홀로그램 슬레이트 미니어처
    ctx.beginPath();rr(ctx,-20,-18,40,32,[0,0,4,4]);
    ctx.fillStyle='rgba(255,50,20,0.15)';ctx.fill();ctx.strokeStyle='rgba(255,80,40,0.8)';ctx.lineWidth=1.5;ctx.stroke();
    // 웃는 얼굴 스크린
    ctx.beginPath();rr(ctx,-16,-14,32,22,2);ctx.fillStyle='rgba(255,220,200,0.2)';ctx.fill();
    // 눈 2개 (웃는 눈 — 초승달)
    [-7,7].forEach(function(ex2){
      ctx.beginPath();ctx.arc(ex2,0,4,Math.PI,0);ctx.strokeStyle='rgba(255,80,40,0.9)';ctx.lineWidth=1.5;ctx.stroke();
    });
    // 웃는 입 (크게)
    ctx.beginPath();ctx.arc(0,4,8,0.1*Math.PI,0.9*Math.PI);ctx.strokeStyle='rgba(255,60,20,0.9)';ctx.lineWidth=2;ctx.lineCap='round';ctx.stroke();
    // 이빨 (작게)
    ctx.beginPath();ctx.rect(-6,4,12,4);ctx.fillStyle='rgba(255,240,230,0.7)';ctx.fill();
    // 위 클래퍼 미니
    ctx.beginPath();rr(ctx,-20,-18,40,6,[4,4,0,0]);ctx.fillStyle='rgba(200,40,10,0.5)';ctx.fill();
    ctx.restore();
  });

  // 몸체 (더 빨강)
  ctx.beginPath();rr(ctx,bodyX,bodyY,bodyW,bodyH,[0,0,6,6]);
  var bg2=ctx.createLinearGradient(bodyX,bodyY,bodyX+bodyW,bodyY+bodyH);
  bg2.addColorStop(0,'#2e0e06');bg2.addColorStop(0.4,'#3e1a0e');bg2.addColorStop(1,'#220800');
  ctx.fillStyle=bg2;ctx.fill();ctx.strokeStyle='rgba(255,60,20,0.3)';ctx.lineWidth=1.5;ctx.stroke();

  var scrPad=6,scrX=bodyX+scrPad,scrY=bodyY+scrPad,scrW=bodyW-scrPad*2,scrH=bodyH-scrPad*2;
  ctx.beginPath();rr(ctx,scrX,scrY,scrW,scrH,3);
  ctx.fillStyle='#ffe8e0';ctx.fill();

  var eyeCY=scrY+scrH*0.5,blink=Math.sin(t*1.7+tremor*0.1)>0.86;
  // 오른쪽 눈만 빨강
  _lsEye(ctx,cx-13+shakeX,eyeCY,7,Math.sin(t*1.5)*1.2,false,blink);
  _lsEye(ctx,cx+13+shakeX,eyeCY,7,Math.sin(t*1.5+1)*1.2,true,blink);

  // 아래 이빨 (14개)
  _lsTeeth(ctx,bodyX,bodyY,14,bodyW,-1,'#ffe8e0',10);

  // 위 클래퍼
  ctx.save();ctx.translate(bodyX,bodyY+shakeY);ctx.rotate(-cl.topAngle);
  ctx.beginPath();rr(ctx,0,-18,bodyW,18,[4,4,0,0]);
  var cg3=ctx.createLinearGradient(0,-18,bodyW,0);cg3.addColorStop(0,'#2e0e06');cg3.addColorStop(0.5,'#3e1a0e');cg3.addColorStop(1,'#220800');
  ctx.fillStyle=cg3;ctx.fill();ctx.strokeStyle='rgba(255,60,20,0.35)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.save();ctx.beginPath();rr(ctx,0,-18,bodyW,18,[4,4,0,0]);ctx.clip();
  for(var si3=0;si3<10;si3++){

    ctx.fillStyle=si3%2===0?'rgba(255,150,100,0.6)':'rgba(0,0,0,0)';ctx.fill();
  }
  ctx.restore();
  ctx.font='bold 7px monospace';ctx.fillStyle='rgba(255,120,80,0.7)';ctx.textAlign='center';ctx.fillText('LINKSYS',bodyW/2,-5);
  _lsTeeth(ctx,0,0,14,bodyW,1,'#ffe8e0',10);
  ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.fillStyle='#441008';ctx.fill();ctx.strokeStyle='rgba(255,80,40,0.5)';ctx.lineWidth=1.2;ctx.stroke();
  ctx.restore();

  // 킥킥 (더 많음)
  if(cl.isClap&&cl.cc<0.18){
    var pa3=(0.18-cl.cc)/0.18;
    for(var pi2=0;pi2<9;pi2++){
      var pang2=(pi2/9)*Math.PI*2,pr3=(1-pa3)*25;
      ctx.beginPath();ctx.arc(cx+shakeX+Math.cos(pang2)*pr3,bodyY+shakeY+Math.sin(pang2)*pr3*0.4,2,0,Math.PI*2);
      ctx.fillStyle='rgba(255,100,60,'+pa3*0.6+')';ctx.fill();
    }
    ctx.font='bold '+(10+pa3*4)+'px monospace';ctx.fillStyle='rgba(255,100,60,'+pa3*0.95+')';ctx.textAlign='center';
    ctx.fillText('탁!!',cx+28+shakeX,bodyY-6+shakeY);
    ctx.font=(9+pa3*2)+'px monospace';ctx.fillStyle='rgba(255,140,100,'+pa3*0.85+')';
    ctx.fillText('키득ㅋㅋㅋ',cx-24+shakeX,bodyY-14+shakeY);
    ctx.font=(7+pa3)+'px monospace';ctx.fillStyle='rgba(255,120,80,'+pa3*0.6+')';
    ctx.fillText('ㅋㅋㅋ',cx+32+shakeX,bodyY-22+shakeY);
    ctx.fillText('ㅋ',cx-35+shakeX,bodyY-20+shakeY);
  }
  // 상시 킥킥
  for(var mi=0;mi<2;mi++){
    var mg=(Math.sin(t*13+mi*2.1)+1)*0.5;
    if(mg>0.82){ctx.font='6px monospace';ctx.fillStyle='rgba(255,120,80,'+(mg-0.82)*5.5*0.5+')';ctx.textAlign='center';ctx.fillText('ㅋ',cx+(Math.random()-0.5)*50,bodyY+(Math.random()-0.5)*30);}
  }
  var gg2=ctx.createRadialGradient(cx,cy,10,cx,cy,60);
  gg2.addColorStop(0,'transparent');gg2.addColorStop(1,'rgba(220,40,10,'+(0.07+Math.abs(tremor)*0.02)+')');
  ctx.beginPath();ctx.arc(cx,cy,60,0,Math.PI*2);ctx.fillStyle=gg2;ctx.fill();
}

function drawLINKSYS_EVO3(ctx, t) {

    ctx.beginPath();rr(ctx,-16,-14,32,22,2);ctx.fillStyle='rgba(255,200,180,0.15)';ctx.fill();
    // 웃는 눈 (초승달 — 더 과장)
    [-7,7].forEach(function(ex3){
      ctx.beginPath();ctx.arc(ex3,-2,4.5,Math.PI,0);ctx.strokeStyle='rgba(255,50,20,1)';ctx.lineWidth=2;ctx.stroke();
    });
    // 혀도 있는 큰 웃음
    ctx.beginPath();ctx.arc(0,3,9,0.05*Math.PI,0.95*Math.PI);ctx.strokeStyle='rgba(255,30,0,1)';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
    ctx.beginPath();ctx.rect(-7,3,14,5);ctx.fillStyle='rgba(255,240,230,0.75)';ctx.fill();
    // 혀
    ctx.beginPath();ctx.ellipse(0,10,5,4,0,0,Math.PI*2);ctx.fillStyle='rgba(220,40,60,0.85)';ctx.fill();ctx.strokeStyle='rgba(180,20,40,0.6)';ctx.lineWidth=1;ctx.stroke();
    // 위 클래퍼
    ctx.beginPath();rr(ctx,-20,-18,40,6,[4,4,0,0]);ctx.fillStyle='rgba(200,20,0,0.55)';ctx.fill();
    ctx.restore();
  });

  // 몸체 (진한 빨강)
  ctx.beginPath();rr(ctx,bodyX,bodyY,bodyW,bodyH,[0,0,6,6]);
  var bg3=ctx.createLinearGradient(bodyX,bodyY,bodyX+bodyW,bodyY+bodyH);
  bg3.addColorStop(0,'#3e0800');bg3.addColorStop(0.4,'#521000');bg3.addColorStop(1,'#2e0400');
  ctx.fillStyle=bg3;ctx.fill();ctx.strokeStyle='rgba(255,40,10,0.45)';ctx.lineWidth=1.8;ctx.stroke();

  var scrPad=6,scrX=bodyX+scrPad,scrY=bodyY+scrPad,scrW=bodyW-scrPad*2,scrH=bodyH-scrPad*2;
  ctx.beginPath();rr(ctx,scrX,scrY,scrW,scrH,3);ctx.fillStyle='#ffd0c0';ctx.fill();

  var eyeCY=scrY+scrH*0.45,blink=Math.sin(t*1.9+tremor*0.1)>0.84;
  // 두 눈 다 빨강
  _lsEye(ctx,cx-13+shakeX,eyeCY,7.5,Math.sin(t*1.5)*1.4,true,blink);
  _lsEye(ctx,cx+13+shakeX,eyeCY,7.5,Math.sin(t*1.5+1)*1.4,true,blink);

  // 아래 이빨 (16개)
  _lsTeeth(ctx,bodyX,bodyY,16,bodyW,-1,'#ffd0c0',11);

  // 위 클래퍼 (진한 빨강)
  ctx.save();ctx.translate(bodyX,bodyY+shakeY);ctx.rotate(-cl.topAngle);
  ctx.beginPath();rr(ctx,0,-18,bodyW,18,[4,4,0,0]);
  var cg4=ctx.createLinearGradient(0,-18,bodyW,0);cg4.addColorStop(0,'#3e0800');cg4.addColorStop(0.5,'#521000');cg4.addColorStop(1,'#2e0400');
  ctx.fillStyle=cg4;ctx.fill();ctx.strokeStyle='rgba(255,40,10,0.5)';ctx.lineWidth=1.8;ctx.stroke();
  ctx.save();ctx.beginPath();rr(ctx,0,-18,bodyW,18,[4,4,0,0]);ctx.clip();
  for(var si4=0;si4<10;si4++){
    ctx.beginPath();ctx.moveTo(si4*20-40,-18);ctx.lineTo(si4*20-30,-18);ctx.lineTo(si4*20-12,0);ctx.lineTo(si4*20-22,0);ctx.closePath();
    ctx.fillStyle=si4%2===0?'rgba(255,100,60,0.55)':'rgba(0,0,0,0)';ctx.fill();
  }
  ctx.restore();
  ctx.font='bold 7px monospace';ctx.fillStyle='rgba(255,100,60,0.8)';ctx.textAlign='center';ctx.fillText('LINKSYS',bodyW/2,-5);
  _lsTeeth(ctx,0,0,16,bodyW,1,'#ffd0c0',11);
  // ── 혀 (입 벌릴 때 안에서 보임) ──
  // 클래퍼 좌표계 기준 — 입이 벌어질수록 혀가 드러남
  var tongueVis=cl.topAngle/0.38; // 0~1 (열릴수록 1)
  if(tongueVis>0.05){
    var tongueWag=Math.sin(t*3.5)*4;
    var tx=bodyW/2+tongueWag, ty=4+tongueVis*4;
    ctx.beginPath();ctx.ellipse(tx,ty,8*Math.min(1,tongueVis*2),10*tongueVis,Math.sin(t*3.5)*0.12,0,Math.PI*2);
    var tg=ctx.createRadialGradient(tx,ty-2,0,tx,ty,10);
    tg.addColorStop(0,'#ff6677');tg.addColorStop(0.5,'#ee2244');tg.addColorStop(1,'#aa0022');
    ctx.fillStyle=tg;ctx.fill();ctx.strokeStyle='rgba(180,0,30,0.55)';ctx.lineWidth=1;ctx.stroke();

      ctx.strokeStyle='rgba(160,0,30,0.35)';ctx.lineWidth=0.9;ctx.lineCap='round';ctx.stroke();
    }
  }
  ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.fillStyle='#551208';ctx.fill();ctx.strokeStyle='rgba(255,50,20,0.6)';ctx.lineWidth=1.2;ctx.stroke();
  ctx.restore();

  // 극강 킥킥
  if(cl.isClap&&cl.cc<0.2){
    var pa4=(0.2-cl.cc)/0.2;
    for(var pi3=0;pi3<12;pi3++){
      var pang3=(pi3/12)*Math.PI*2,pr4=(1-pa4)*28;
      ctx.beginPath();ctx.arc(cx+shakeX+Math.cos(pang3)*pr4,bodyY+shakeY+Math.sin(pang3)*pr4*0.4,2.2,0,Math.PI*2);
      ctx.fillStyle='rgba(255,80,40,'+pa4*0.65+')';ctx.fill();
    }
    ctx.font='bold '+(11+pa4*5)+'px monospace';ctx.fillStyle='rgba(255,60,20,'+pa4*0.98+')';ctx.textAlign='center';
    ctx.fillText('탁!!!',cx+30+shakeX,bodyY-6+shakeY);
    ctx.font=(10+pa4*3)+'px monospace';ctx.fillStyle='rgba(255,100,60,'+pa4*0.9+')';
    ctx.fillText('ㅋㅋㅋㅋ',cx-26+shakeX,bodyY-14+shakeY);
    ctx.font=(8+pa4*2)+'px monospace';ctx.fillStyle='rgba(255,80,40,'+pa4*0.7+')';
    ctx.fillText('ㅋㅋㅋ',cx+34+shakeX,bodyY-22+shakeY);
    ctx.fillText('ㅋㅋ',cx-36+shakeX,bodyY-20+shakeY);
    ctx.font='7px monospace';ctx.fillStyle='rgba(255,60,20,'+pa4*0.5+')';
    ctx.fillText('ㅋ',cx+(Math.random()-0.5)*60,bodyY-30+shakeY);
  }
  // 상시 킥킥 (사방에서)
  for(var mi2=0;mi2<4;mi2++){
    var mg2=(Math.sin(t*12+mi2*1.7)+1)*0.5;
    if(mg2>0.78){
      ctx.font='6px monospace';ctx.fillStyle='rgba(255,80,40,'+(mg2-0.78)*4.5*0.55+')';ctx.textAlign='center';
      ctx.fillText('ㅋ',cx+(Math.random()-0.5)*60,bodyY+(Math.random()-0.5)*50);
    }
  }

  // 글로우 (강함)
  var gg3=ctx.createRadialGradient(cx,cy,10,cx,cy,62);
  gg3.addColorStop(0,'transparent');gg3.addColorStop(0.6,'rgba(240,30,5,0.1)');gg3.addColorStop(1,'rgba(255,20,0,0.08)');
  ctx.beginPath();ctx.arc(cx,cy,62,0,Math.PI*2);ctx.fillStyle=gg3;ctx.fill();

  // 임팩트 플래시 (빨강)
  if(cl.isClap&&cl.cc<0.05){
    ctx.fillStyle='rgba(200,20,0,'+(0.05-cl.cc)/0.05*0.18+')';ctx.fillRect(0,0,120,120);
  }
}

function drawUBIQUITI_EVO1(ctx, t) {
  var cx=60,cy=62;
  ctx.clearRect(0,0,120,120);
  var bob=Math.sin(t*1.7)*2.5;
  var by=cy+bob;
  var col='#88ff44',colG='rgba(136,255,68,';
  var lCX=cx-22,rCX=cx+22,lensR=18;

  // ── 고스트 안경 (살짝 아래, 흐리게) ──
  var ghostOff=7; // 아래로 오프셋
  var ghostAlpha=0.18+Math.sin(t*2.1)*0.05;
  ctx.save();ctx.globalAlpha=ghostAlpha;
  // 고스트 렌즈
  [lCX,rCX].forEach(function(lx){
    ctx.beginPath();ctx.arc(lx,by+ghostOff,lensR,0,Math.PI*2);
    ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.stroke();
    ctx.beginPath();ctx.arc(lx,by+ghostOff,lensR-4,0,Math.PI*2);
    ctx.strokeStyle=colG+'0.4)';ctx.lineWidth=1;ctx.stroke();
  });
  // 고스트 브릿지
  ctx.beginPath();ctx.moveTo(lCX+lensR,by+ghostOff-2);ctx.quadraticCurveTo(cx,by+ghostOff-8,rCX-lensR,by+ghostOff-2);
  ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
  // 고스트 다리
  ctx.beginPath();ctx.moveTo(lCX-lensR,by+ghostOff);ctx.quadraticCurveTo(lCX-lensR-8,by+ghostOff-2,lCX-lensR-18,by+ghostOff+4);
  ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
  ctx.beginPath();ctx.moveTo(rCX+lensR,by+ghostOff);ctx.quadraticCurveTo(rCX+lensR+8,by+ghostOff-2,rCX+lensR+18,by+ghostOff+4);
  ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
  // 고스트 내부 — 왼쪽 흐린 눈
  ctx.beginPath();ctx.arc(lCX,by+ghostOff,10,0,Math.PI*2);ctx.fillStyle='rgba(200,255,180,0.15)';ctx.fill();
  // 고스트 오른쪽 타겟 흔적
  [10,6.5].forEach(function(r){
    ctx.beginPath();ctx.arc(rCX,by+ghostOff,r,0,Math.PI*2);
    ctx.strokeStyle=colG+'0.5)';ctx.lineWidth=1;ctx.stroke();
  });
  ctx.restore();

  // ── 메인 안경 글로우 ──
  [lCX,rCX].forEach(function(lx){
    var gr=ctx.createRadialGradient(lx,by,4,lx,by,lensR+8);
    gr.addColorStop(0,colG+'0.14)');gr.addColorStop(1,colG+'0)');
    ctx.beginPath();ctx.arc(lx,by,lensR+8,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
  });

  // ── 메인 렌즈 ──
  [lCX,rCX].forEach(function(lx){
    ctx.beginPath();ctx.arc(lx,by,lensR,0,Math.PI*2);ctx.fillStyle='rgba(8,20,8,0.92)';ctx.fill();
    ctx.beginPath();ctx.arc(lx,by,lensR,0,Math.PI*2);ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.stroke();
    ctx.beginPath();ctx.arc(lx,by,lensR-4,0,Math.PI*2);ctx.strokeStyle=colG+'0.2)';ctx.lineWidth=1;ctx.stroke();
  });

  // 브릿지 + 다리
  ctx.beginPath();ctx.moveTo(lCX+lensR,by-2);ctx.quadraticCurveTo(cx,by-8,rCX-lensR,by-2);
  ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
  ctx.beginPath();ctx.moveTo(lCX-lensR,by);ctx.quadraticCurveTo(lCX-lensR-8,by-2,lCX-lensR-18,by+4);
  ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
  ctx.beginPath();ctx.moveTo(rCX+lensR,by);ctx.quadraticCurveTo(rCX+lensR+8,by-2,rCX+lensR+18,by+4);
  ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();

  // ── 왼쪽 눈 — 글리치 ──
  var blink=Math.sin(t*1.5)>0.9;
  // 렌즈 클립
  ctx.save();
  ctx.beginPath();ctx.arc(lCX,by,lensR-1,0,Math.PI*2);ctx.clip();

  if(!blink){
    // 흰자 (RGB 분리 글리치)
    var glitchPhase=(t*1.3)%3;
    var glitchV=glitchPhase<0.4?Math.sin((glitchPhase/0.4)*Math.PI):0;
    // 레드 채널 오프셋
    ctx.globalAlpha=0.5+glitchV*0.3;
    ctx.beginPath();ctx.arc(lCX+glitchV*3,by,11,0,Math.PI*2);ctx.fillStyle='#ffeeee';ctx.fill();
    ctx.globalAlpha=1;
    // 흰자
    ctx.beginPath();ctx.arc(lCX,by,11,0,Math.PI*2);ctx.fillStyle='#e0ffe0';ctx.fill();
    // 홍채 (글리치로 색 번짐)
    var pd=Math.sin(t*1.8)*1.5;
    ctx.beginPath();ctx.arc(lCX+pd,by,6.5,0,Math.PI*2);
    var ig=ctx.createRadialGradient(lCX+pd,by,0,lCX+pd,by,6.5);
    ig.addColorStop(0,'#aaffaa');ig.addColorStop(0.4,'#44cc44');ig.addColorStop(1,'#116611');
    ctx.fillStyle=ig;ctx.fill();
    ctx.beginPath();ctx.arc(lCX+pd,by,3,0,Math.PI*2);ctx.fillStyle='#050a05';ctx.fill();
    ctx.beginPath();ctx.arc(lCX+pd+2,by-2,1.5,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fill();

    // ── 글리치 레이어들 ──
    // 수평 스캔 글리치 라인 (렌즈 내부)
    for(var gi=0;gi<8;gi++){
      var gp=(t*2.2+gi*0.55)%2.5;
      if(gp<1.2){
        var gvis=Math.sin((gp/1.2)*Math.PI);
        var gy=by-lensR+2+((Math.sin(gi*3.7)+1)*0.5)*(lensR*2-4);
        var goff=Math.sin(t*9+gi)*6*gvis;
        ctx.beginPath();ctx.rect(lCX-lensR+2+goff,gy,lensR*2-4+Math.abs(goff),1+(gi%3===0?1:0));
        ctx.fillStyle='rgba(100,255,80,'+(gvis*(0.4+gi%2*0.2))+')';ctx.fill();
      }
    }
    // 픽셀 블록 글리치 (가끔)
    for(var gi2=0;gi2<5;gi2++){
      var gp2=(t*3+gi2*0.9)%4;
      if(gp2<0.4){
        var gv2=1-gp2/0.4;
        var gbx=lCX-10+Math.sin(gi2*4.1+t)*16;
        var gby=by-8+Math.cos(gi2*3.3+t)*10;
        ctx.beginPath();ctx.rect(gbx,gby,8+gi2*2,3);
        ctx.fillStyle='rgba(80,255,60,'+(gv2*0.7)+')';ctx.fill();
        // RGB 분리
        ctx.beginPath();ctx.rect(gbx+3,gby,8+gi2*2,3);
        ctx.fillStyle='rgba(255,80,60,'+(gv2*0.3)+')';ctx.fill();
      }
    }
    // 렌즈 전체 글리치 플래시 (아주 가끔)
    var flashP=(t*0.9)%5;
    if(flashP<0.08){
      var fv=(0.08-flashP)/0.08;
      ctx.fillStyle='rgba(120,255,80,'+fv*0.35+')';
      ctx.fillRect(lCX-lensR,by-lensR,lensR*2,lensR*2);
      // 오프셋 레이어
      ctx.save();ctx.globalAlpha=fv*0.25;
      ctx.drawImage(ctx.canvas,3,0);
      ctx.restore();
    }
    // 프레임 글리치 (렌즈 테두리 어긋남)
    var frameGlitch=(t*1.8)%4;
    if(frameGlitch<0.25){
      var fgv=1-frameGlitch/0.25;
      ctx.beginPath();ctx.arc(lCX+fgv*4,by,lensR,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,80,60,'+fgv*0.6+')';ctx.lineWidth=1.5;ctx.stroke();
    }
  } else {
    ctx.beginPath();ctx.moveTo(lCX-10,by);ctx.lineTo(lCX+10,by);
    ctx.strokeStyle='rgba(100,255,80,0.6)';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
    // 깜빡임 때도 글리치 라인
    ctx.beginPath();ctx.moveTo(lCX-12,by-3);ctx.lineTo(lCX+8,by-3);
    ctx.strokeStyle='rgba(255,80,60,0.3)';ctx.lineWidth=1;ctx.stroke();
  }
  ctx.restore(); // 렌즈 클립 해제

  // ── 오른쪽 타겟 (더 빠르게) ──
  var tgtRot=t*1.1; // 0.4 → 1.1배 빠름
  var pulse=0.5+Math.sin(t*4)*0.35;
  [10,6.5,3].forEach(function(r,i){
    ctx.beginPath();ctx.arc(rCX,by,r,0,Math.PI*2);
    ctx.strokeStyle=colG+(0.38+i*0.22+pulse*0.1)+')';ctx.lineWidth=i===2?1.8:1.1;ctx.stroke();
  });
  // 추가 외곽 링 (1진화 전용)
  ctx.beginPath();ctx.arc(rCX,by,13.5,0,Math.PI*2);
  ctx.strokeStyle=colG+(0.15+Math.sin(t*3)*0.08)+')';ctx.lineWidth=0.8;ctx.setLineDash([3,4]);ctx.stroke();ctx.setLineDash([]);

  ctx.save();ctx.translate(rCX,by);ctx.rotate(tgtRot);
  [0,Math.PI/2].forEach(function(a){
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*4,Math.sin(a)*4);ctx.lineTo(Math.cos(a)*13,Math.sin(a)*13);
    ctx.moveTo(-Math.cos(a)*4,-Math.sin(a)*4);ctx.lineTo(-Math.cos(a)*13,-Math.sin(a)*13);
    ctx.strokeStyle=colG+(0.65+pulse*0.22)+')';ctx.lineWidth=1.3;ctx.lineCap='round';ctx.stroke();
  });
  // 45도 추가 십자선 (더 빠르게 역방향)
  ctx.rotate(-tgtRot*2.2);
  [Math.PI/4,Math.PI*3/4].forEach(function(a){
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*5,Math.sin(a)*5);ctx.lineTo(Math.cos(a)*11,Math.sin(a)*11);
    ctx.moveTo(-Math.cos(a)*5,-Math.sin(a)*5);ctx.lineTo(-Math.cos(a)*11,-Math.sin(a)*11);
    ctx.strokeStyle=colG+(0.3+pulse*0.15)+')';ctx.lineWidth=0.9;ctx.lineCap='round';ctx.stroke();
  });
  ctx.beginPath();ctx.arc(0,0,2,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
  ctx.restore();
  // 스캔 섹터 (더 빠름)
  ctx.save();ctx.translate(rCX,by);ctx.rotate(t*2.2);
  ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,lensR-3,-0.18,0.18);ctx.closePath();
  ctx.fillStyle=colG+'0.1)';ctx.fill();ctx.restore();

  // 전체 글로우
  var gGrad=ctx.createRadialGradient(cx,by,10,cx,by,58);
  gGrad.addColorStop(0,'transparent');gGrad.addColorStop(1,colG+(0.04+Math.sin(t*2)*0.02)+')');
  ctx.beginPath();ctx.arc(cx,by,58,0,Math.PI*2);ctx.fillStyle=gGrad;ctx.fill();
}

function drawUBIQUITI_EVO2(ctx, t) {
  var cx=60, cy=62;
  ctx.clearRect(0,0,120,120);
  var bob=Math.sin(t*1.7)*2.5;
  var by=cy+bob;
  var col='#88ff44', colG='rgba(136,255,68,';
  var lCX=cx-22, rCX=cx+22, lensR=18;

  // ── 고스트 안경 4겹 (다양한 오프셋, 흐리게) ──
  var ghosts=[
    {dy:5,  dx:0,   a:0.16, rot:0},
    {dy:10, dx:1,   a:0.10, rot:0.02},
    {dy:15, dx:-1,  a:0.07, rot:-0.015},
    {dy:20, dx:0.5, a:0.04, rot:0.01},
  ];
  ghosts.forEach(function(g){
    var ga=g.a+Math.sin(t*1.8+g.dy)*0.025;
    ctx.save();ctx.globalAlpha=ga;
    ctx.translate(g.dx,g.dy);
    if(g.rot!==0){ctx.translate(cx,by+g.dy);ctx.rotate(g.rot*Math.sin(t*0.5));ctx.translate(-cx,-by-g.dy);}
    // 렌즈
    [lCX,rCX].forEach(function(lx){
      ctx.beginPath();ctx.arc(lx,by,lensR,0,Math.PI*2);
      ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.stroke();
      ctx.beginPath();ctx.arc(lx,by,lensR-4,0,Math.PI*2);
      ctx.strokeStyle=colG+'0.35)';ctx.lineWidth=1;ctx.stroke();
    });
    // 브릿지
    ctx.beginPath();ctx.moveTo(lCX+lensR,by-2);ctx.quadraticCurveTo(cx,by-8,rCX-lensR,by-2);
    ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
    // 다리
    ctx.beginPath();ctx.moveTo(lCX-lensR,by);ctx.quadraticCurveTo(lCX-lensR-8,by-2,lCX-lensR-18,by+4);
    ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
    ctx.beginPath();ctx.moveTo(rCX+lensR,by);ctx.quadraticCurveTo(rCX+lensR+8,by-2,rCX+lensR+18,by+4);
    ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
    ctx.restore();
  });

  // ── 메인 렌즈 글로우 ──
  [lCX,rCX].forEach(function(lx){
    var gr=ctx.createRadialGradient(lx,by,4,lx,by,lensR+10);
    gr.addColorStop(0,colG+'0.16)');gr.addColorStop(1,colG+'0)');
    ctx.beginPath();ctx.arc(lx,by,lensR+10,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
  });

  // ── 메인 렌즈 배경 ──
  [lCX,rCX].forEach(function(lx){
    ctx.beginPath();ctx.arc(lx,by,lensR,0,Math.PI*2);ctx.fillStyle='rgba(8,20,8,0.92)';ctx.fill();
  });

  // ── 프레임 에러 (안경테에 빨간 글리치) ──

  var fErr1=(t*1.5)%4;

  [lCX,rCX].forEach(function(lx){
    ctx.beginPath();ctx.arc(lx,by,lensR,0,Math.PI*2);ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.stroke();

  });

  // 브릿지
  ctx.beginPath();ctx.moveTo(lCX+lensR,by-2);ctx.quadraticCurveTo(cx,by-8,rCX-lensR,by-2);

  // 다리 (가끔 오른쪽 다리 에러)
  ctx.beginPath();ctx.moveTo(lCX-lensR,by);ctx.quadraticCurveTo(lCX-lensR-8,by-2,lCX-lensR-18,by+4);
  ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
  var legErr=(t*1.3+2.2)%6;
  var legEV=legErr<0.25?Math.sin((legErr/0.25)*Math.PI):0;
  ctx.beginPath();ctx.moveTo(rCX+lensR,by+legEV*3);ctx.quadraticCurveTo(rCX+lensR+8,by-2+legEV*2,rCX+lensR+18,by+4+legEV*2);
  ctx.strokeStyle=legEV>0?'rgba(255,60,40,'+legEV*0.8+')':col;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();

  // ── 왼쪽 눈 — 빨간 에러 강화 글리치 ──
  var blink=Math.sin(t*1.5)>0.9;

      }

    for(var gi2=0;gi2<6;gi2++){
      var gp2=(t*2.2+gi2*0.7)%3;
      if(gp2<0.45){

        var gby2=by-10+Math.cos(gi2*2.7+t)*10;
        ctx.beginPath();ctx.rect(gbx,gby2,10+gi2*2,3+gi2%2);
        ctx.fillStyle='rgba(255,40,20,'+gv2*0.75+')';ctx.fill();
        ctx.beginPath();ctx.rect(gbx+3,gby2-1,10+gi2*2,1);
        ctx.fillStyle='rgba(255,200,60,'+gv2*0.4+')';ctx.fill();
      }
    }
    // 전체 빨간 오버레이 (주기적)
    var redFlash=(t*1.1)%3.5;
    var redV=redFlash<0.12?Math.sin((redFlash/0.12)*Math.PI):0;
    if(redV>0.01){
      ctx.fillStyle='rgba(255,30,10,'+redV*0.3+')';
      ctx.fillRect(lCX-lensR,by-lensR,lensR*2,lensR*2);
      // RGB 분리
      ctx.save();ctx.globalAlpha=redV*0.2;
      ctx.fillStyle='rgba(0,255,80,0.5)';
      ctx.fillRect(lCX-lensR+5,by-lensR,lensR*2,lensR*2);
      ctx.restore();
    }
    // 프레임 내부 빨간 에러 선
    for(var li=0;li<3;li++){
      var lp=(t*1.8+li*1.1)%5;
      if(lp<0.3){
        var lv=1-lp/0.3;
        ctx.beginPath();ctx.rect(lCX-lensR+1,by-lensR+4+li*8,lensR*2-2,1.5);
        ctx.fillStyle='rgba(255,30,10,'+lv*0.6+')';ctx.fill();
      }
    }

    ctx.beginPath();ctx.moveTo(lCX-10,by);ctx.lineTo(lCX+10,by);

    ctx.beginPath();ctx.moveTo(lCX-12,by-4);ctx.lineTo(lCX+6,by-4);

  }
  ctx.restore();

  // ── 오른쪽 타겟 — 극초고속 ──
  var pulse=0.5+Math.sin(t*5)*0.35;
  // 정적 링 (빠르게 돌아서 잔상처럼 보임)

  });

  [13.5,16].forEach(function(r,i){

  });

  var tgtSpeed=4.5;

    var trailT=t-trail*0.04;
    var tRot=trailT*tgtSpeed;
    var trailAlpha=(1-trail*0.22)*(0.7+pulse*0.2);

    [0,Math.PI/2].forEach(function(a){
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*4,Math.sin(a)*4);ctx.lineTo(Math.cos(a)*14,Math.sin(a)*14);
      ctx.moveTo(-Math.cos(a)*4,-Math.sin(a)*4);ctx.lineTo(-Math.cos(a)*14,-Math.sin(a)*14);
      ctx.strokeStyle=colG+trailAlpha+')';ctx.lineWidth=1.4-trail*0.2;ctx.lineCap='round';ctx.stroke();
    });
    ctx.restore();
  }
  // 역방향 고속 십자선 잔상
  for(var trail2=0;trail2<3;trail2++){
    var tRot2=(t-trail2*0.035)*(-tgtSpeed*1.3);
    var tA2=(1-trail2*0.28)*(0.45+pulse*0.15);
    ctx.save();ctx.translate(rCX,by);ctx.rotate(tRot2);
    [Math.PI/4,Math.PI*3/4].forEach(function(a){
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*5,Math.sin(a)*5);ctx.lineTo(Math.cos(a)*12,Math.sin(a)*12);
      ctx.moveTo(-Math.cos(a)*5,-Math.sin(a)*5);ctx.lineTo(-Math.cos(a)*12,-Math.sin(a)*12);
      ctx.strokeStyle=colG+tA2+')';ctx.lineWidth=1-trail2*0.2;ctx.lineCap='round';ctx.stroke();
    });
    ctx.restore();
  }
  // 중심점
  ctx.beginPath();ctx.arc(rCX,by,2.2,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
  // 빠른 스캔 섹터 (여러 겹)
  for(var sc=0;sc<3;sc++){
    var scDir=sc%2===0?1:-1;
    ctx.save();ctx.translate(rCX,by);ctx.rotate(t*tgtSpeed*scDir+sc*Math.PI*0.6);
    ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,lensR-3,-0.2,0.2);ctx.closePath();
    ctx.fillStyle=colG+(0.08-sc*0.02)+')';ctx.fill();ctx.restore();
  }

  // 전체 글로우
  var gGrad=ctx.createRadialGradient(cx,by,10,cx,by,60);
  gGrad.addColorStop(0,'transparent');
  gGrad.addColorStop(0.7,colG+(0.05+Math.sin(t*2)*0.02)+')');
  gGrad.addColorStop(1,'rgba(200,40,20,0.03)');
  ctx.beginPath();ctx.arc(cx,by,60,0,Math.PI*2);ctx.fillStyle=gGrad;ctx.fill();
}

function drawUBIQUITI_EVO3(ctx, t) {
  var cx=60, cy=60;

  var bob=Math.sin(t*1.7)*2.5;

  var rCol='#ff3311';
  var rColG='rgba(255,50,20,';

  // ── 주변 궤도 타겟 표식 5개 ──
  var orbitDefs=[
    {r:46, speed:1.4,  seed:0,    size:7,  thick:1.4},
    {r:40, speed:-1.8, seed:1.2,  size:5.5,thick:1.2},
    {r:50, speed:2.1,  seed:2.5,  size:6,  thick:1.3},

  ];
  orbitDefs.forEach(function(od){
    var oa=t*od.speed+od.seed;
    var ox=cx+Math.cos(oa)*od.r;
    var oy=by+Math.sin(oa)*od.r*0.55; // 살짝 타원

    [sz,sz*0.55].forEach(function(r,ri){

      ctx.lineWidth=od.thick-(ri*0.3);ctx.stroke();
    });

    ctx.beginPath();ctx.moveTo(lCX-lensR,by);ctx.quadraticCurveTo(lCX-lensR-8,by-2,lCX-lensR-18,by+4);
    ctx.strokeStyle=ghostCol;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();

  // 다리 글리치

  ctx.beginPath();ctx.moveTo(lCX-lensR+legEV*3,by+legEV*2);ctx.quadraticCurveTo(lCX-lensR-8,by-2,lCX-lensR-18+legEV*4,by+4);
  ctx.strokeStyle=legEV>0.15?rColG+legEV*0.8+')':'rgba(136,255,68,0.3)';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
  var legErr2=(t*1.9+1.2)%5;var legEV2=legErr2<0.28?Math.sin((legErr2/0.28)*Math.PI):0;
  ctx.beginPath();ctx.moveTo(rCX+lensR,by-legEV2*3);ctx.quadraticCurveTo(rCX+lensR+8+legEV2*4,by-2,rCX+lensR+18,by+4-legEV2*3);

    ctx.beginPath();ctx.arc(lCX+pd+2,by-2,1.4,0,Math.PI*2);ctx.fillStyle='rgba(255,180,160,0.9)';ctx.fill();
    // 강렬한 빨간 글리치 라인
    for(var gi3=0;gi3<16;gi3++){
      var gp3=(t*3.2+gi3*0.38)%2;
      if(gp3<1.0){
        var gv3=Math.sin((gp3/1.0)*Math.PI);
        var gy3=by-lensR+((Math.sin(gi3*2.3)+1)*0.5)*(lensR*2);
        var goff3=Math.sin(t*13+gi3)*10*gv3;
        ctx.beginPath();ctx.rect(lCX-lensR+goff3,gy3,lensR*2*(0.3+Math.sin(gi3*1.3)*0.6),gi3%3===0?3:1.5);
        ctx.fillStyle=rColG+gv3*(0.55+gi3%2*0.3)+')';ctx.fill();
      }
    }
    // 전체 빨간 플래시
    var rf=(t*1.4)%3;
    var rfV=rf<0.15?Math.sin((rf/0.15)*Math.PI):0;
    if(rfV>0.01){
      ctx.fillStyle=rColG+rfV*0.45+')';ctx.fillRect(lCX-lensR,by-lensR,lensR*2,lensR*2);
    }
    // 눈 글로우
    var eg=ctx.createRadialGradient(lCX,by,0,lCX,by,lensR);
    eg.addColorStop(0,rColG+'0.3)');eg.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(lCX,by,lensR,0,Math.PI*2);ctx.fillStyle=eg;ctx.fill();
  } else {
    ctx.beginPath();ctx.moveTo(lCX-10,by);ctx.lineTo(lCX+10,by);
    ctx.strokeStyle=rColG+'0.85)';ctx.lineWidth=2.8;ctx.lineCap='round';ctx.stroke();
  }
  ctx.restore();

  // ── 오른쪽 타겟 — 완전 빨강 + 극초극고속 ──
  var tgtSpd=7.5;
  var pulse2=0.6+Math.sin(t*6)*0.3;

  // 빨간 타겟 링
  [10,6.5,3].forEach(function(r,i){
    ctx.beginPath();ctx.arc(rCX,by,r,0,Math.PI*2);
    ctx.strokeStyle=rColG+(0.45+i*0.25+pulse2*0.1)+')';ctx.lineWidth=i===2?2:1.3;ctx.stroke();
  });
  [13.5,16].forEach(function(r){
    ctx.beginPath();ctx.arc(rCX,by,r,0,Math.PI*2);
    ctx.strokeStyle=rColG+(0.1+Math.sin(t*5)*0.06)+')';
    ctx.lineWidth=0.8;ctx.setLineDash([2,3]);ctx.stroke();ctx.setLineDash([]);
  });

  // 극초극고속 잔상 6겹
  for(var tr2=0;tr2<6;tr2++){
    var tRot=( t-tr2*0.025)*tgtSpd;
    var tA=(1-tr2*0.14)*(0.8+pulse2*0.15);
    ctx.save();ctx.translate(rCX,by);ctx.rotate(tRot);
    [0,Math.PI/2].forEach(function(a){
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*4,Math.sin(a)*4);ctx.lineTo(Math.cos(a)*14,Math.sin(a)*14);
      ctx.moveTo(-Math.cos(a)*4,-Math.sin(a)*4);ctx.lineTo(-Math.cos(a)*14,-Math.sin(a)*14);
      ctx.strokeStyle=rColG+tA+')';ctx.lineWidth=1.5-tr2*0.15;ctx.lineCap='round';ctx.stroke();
    });
    ctx.restore();
  }
  // 역방향 잔상 4겹
  for(var tr3=0;tr3<4;tr3++){
    var tRot2=(t-tr3*0.03)*(-tgtSpd*1.4);
    var tA2=(1-tr3*0.2)*(0.55+pulse2*0.12);
    ctx.save();ctx.translate(rCX,by);ctx.rotate(tRot2);
    [Math.PI/4,Math.PI*3/4].forEach(function(a){
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*5,Math.sin(a)*5);ctx.lineTo(Math.cos(a)*12,Math.sin(a)*12);
      ctx.moveTo(-Math.cos(a)*5,-Math.sin(a)*5);ctx.lineTo(-Math.cos(a)*12,-Math.sin(a)*12);
      ctx.strokeStyle=rColG+tA2+')';ctx.lineWidth=1.1-tr3*0.18;ctx.lineCap='round';ctx.stroke();
    });
    ctx.restore();
  }
  // 중심점 빨강
  ctx.beginPath();ctx.arc(rCX,by,2.4,0,Math.PI*2);ctx.fillStyle=rCol;ctx.fill();
  var cg=ctx.createRadialGradient(rCX,by,0,rCX,by,8);
  cg.addColorStop(0,rColG+'0.4)');cg.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(rCX,by,8,0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();
  // 스캔 섹터 빨강 4겹
  for(var sc=0;sc<4;sc++){
    ctx.save();ctx.translate(rCX,by);ctx.rotate(t*tgtSpd*(sc%2===0?1:-1)+sc*Math.PI*0.5);
    ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,lensR-3,-0.2,0.2);ctx.closePath();
    ctx.fillStyle=rColG+(0.1-sc*0.02)+')';ctx.fill();ctx.restore();
  }

  // 전체 글로우 (빨강 기운 강함)
  var gGrad=ctx.createRadialGradient(cx,by,10,cx,by,62);
  gGrad.addColorStop(0,'transparent');
  gGrad.addColorStop(0.5,rColG+'0.08)');
  gGrad.addColorStop(1,rColG+'0.04)');
  ctx.beginPath();ctx.arc(cx,by,62,0,Math.PI*2);ctx.fillStyle=gGrad;ctx.fill();

  // 캔버스 엣지 빨간 빛 (임팩트 느낌)
  var edgeFlash=(t*0.8)%5;
  if(edgeFlash<0.3){
    var ev=Math.sin((edgeFlash/0.3)*Math.PI);
    var edgeG=ctx.createRadialGradient(cx,by,30,cx,by,70);
    edgeG.addColorStop(0,'transparent');
    edgeG.addColorStop(1,rColG+ev*0.18+')');
    ctx.beginPath();ctx.arc(cx,by,70,0,Math.PI*2);ctx.fillStyle=edgeG;ctx.fill();
  }
}

function drawHUAWEI_EVO1(ctx, t) {
  if(!ctx) return;
  var cx=60, cy=60;
  ctx.clearRect(0,0,120,120);
  var bob=Math.sin(t*1.5)*1.5;
  var by=cy+bob;

  // 무지개 색 헬퍼 (hue 0~1 → rgb)
  function hue2rgb(h){
    h=h%1; if(h<0)h+=1;
    var r,g,b;
    if(h<1/6){r=1;g=h*6;b=0;}
    else if(h<2/6){r=1-(h-1/6)*6;g=1;b=0;}
    else if(h<3/6){r=0;g=1;b=(h-2/6)*6;}
    else if(h<4/6){r=0;g=1-(h-3/6)*6;b=1;}
    else if(h<5/6){r=(h-4/6)*6;g=0;b=1;}
    else{r=1;g=0;b=1-(h-5/6)*6;}
    return [Math.round(r*255),Math.round(g*255),Math.round(b*255)];
  }
  function rainbowStr(h,a){var c=hue2rgb(h);return 'rgba('+c[0]+','+c[1]+','+c[2]+','+(a||1)+')';}

  var FW=62,FH=94,fx=cx-FW/2,fy=by-FH/2;
  // 4칸 격자 분할
  var midX=fx+FW/2;
  var div1Y=fy+FH*0.22;  // 위 두 칸 상단
  var div2Y=fy+FH*0.48;  // 위칸/아래칸 구분
  var div3Y=fy+FH*0.74;  // 아래 두 칸 구분
  // 4칸: TL(top-left), TR(top-right), BL(bot-left), BR(bot-right)
  // 각 칸 열림 사이클 (다른 타이밍)
  function openCycle(offset, speed){
    var c=((t+offset)*speed)%1;
    var v; if(c<0.22)v=c/0.22; else if(c<0.5)v=1; else v=1-(c-0.5)/0.5;
    return v*v*(3-2*v);
  }
  var openTL=openCycle(0,   0.22);
  var openTR=openCycle(1.3, 0.20);
  var openBL=openCycle(2.6, 0.25);
  var openBR=openCycle(3.9, 0.18);

  // ── 무지개 글로우 배경 ──
  var glowH=(t*0.15)%1;
  var glowG=ctx.createRadialGradient(cx,by,10,cx,by,62);
  glowG.addColorStop(0,'transparent');
  glowG.addColorStop(0.6,rainbowStr(glowH,0.08));
  glowG.addColorStop(1,rainbowStr((glowH+0.3)%1,0.04));
  ctx.beginPath();ctx.arc(cx,by,62,0,Math.PI*2);ctx.fillStyle=glowG;ctx.fill();

  ctx.beginPath();ctx.ellipse(cx,fy+FH+5,22*(1-bob*0.02),4,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,0.18)';ctx.fill();

  // ── 냉장고 본체 (흰색, 무지개 테두리) ──
  // 본체 배경
  ctx.beginPath();
  ctx.moveTo(fx+6,fy);ctx.lineTo(fx+FW-6,fy);ctx.quadraticCurveTo(fx+FW,fy,fx+FW,fy+6);
  ctx.lineTo(fx+FW,fy+FH-6);ctx.quadraticCurveTo(fx+FW,fy+FH,fx+FW-6,fy+FH);
  ctx.lineTo(fx+6,fy+FH);ctx.quadraticCurveTo(fx,fy+FH,fx,fy+FH-6);
  ctx.lineTo(fx,fy+6);ctx.quadraticCurveTo(fx,fy,fx+6,fy);ctx.closePath();
  ctx.fillStyle='#f5f5f5';ctx.fill();

  // 무지개 테두리 (시프팅)
  var bH=(t*0.12)%1;
  for(var bi=0;bi<6;bi++){
    var bHue=(bH+bi/6)%1;
    var bA=Math.PI*2*(bi/6), bB=Math.PI*2*((bi+1)/6);
    ctx.beginPath();
    ctx.arc(cx,by,FW/2+3,bA,bB);
    ctx.strokeStyle=rainbowStr(bHue,0.7);ctx.lineWidth=3;ctx.stroke();
  }
  // 본체 테두리 다시 (깔끔하게)
  ctx.beginPath();
  ctx.moveTo(fx+6,fy);ctx.lineTo(fx+FW-6,fy);ctx.quadraticCurveTo(fx+FW,fy,fx+FW,fy+6);
  ctx.lineTo(fx+FW,fy+FH-6);ctx.quadraticCurveTo(fx+FW,fy+FH,fx+FW-6,fy+FH);
  ctx.lineTo(fx+6,fy+FH);ctx.quadraticCurveTo(fx,fy+FH,fx,fy+FH-6);
  ctx.lineTo(fx,fy+6);ctx.quadraticCurveTo(fx,fy,fx+6,fy);ctx.closePath();
  ctx.strokeStyle='rgba(180,180,180,0.5)';ctx.lineWidth=1.5;ctx.stroke();

  // ── 격자 구분선 ──
  [div2Y].forEach(function(dy){
    ctx.beginPath();ctx.moveTo(fx+3,dy);ctx.lineTo(fx+FW-3,dy);
    ctx.strokeStyle='rgba(160,160,160,0.5)';ctx.lineWidth=2;ctx.stroke();
  });
  ctx.beginPath();ctx.moveTo(midX,fy+4);ctx.lineTo(midX,fy+FH-4);
  ctx.strokeStyle='rgba(160,160,160,0.4)';ctx.lineWidth=1.5;ctx.stroke();

  // 칸 정의
  var cells=[
    {x:fx+2,  y:fy+2,   w:FW/2-3, h:div2Y-fy-2, open:openTL, hue:0.0,  eyeOx:-1, arm:'L'},
    {x:midX+1,y:fy+2,   w:FW/2-3, h:div2Y-fy-2, open:openTR, hue:0.25, eyeOx:1,  arm:'R'},
    {x:fx+2,  y:div2Y+2,w:FW/2-3, h:fy+FH-div2Y-4, open:openBL, hue:0.55, eyeOx:-1, arm:null},
    {x:midX+1,y:div2Y+2,w:FW/2-3, h:fy+FH-div2Y-4, open:openBR, hue:0.75, eyeOx:1,  arm:null},
  ];

  // ── 각 칸 내부 그리기 ──
  cells.forEach(function(cell,ci){
    ctx.save();
    ctx.beginPath();ctx.rect(cell.x,cell.y,cell.w,cell.h);ctx.clip();

    // 내부 배경 (무지개 틴트)
    var bgH=(cell.hue+t*0.08)%1;
    var bgC=hue2rgb(bgH);
    ctx.fillStyle='rgb('+Math.min(255,bgC[0]*0.25+220)+','+Math.min(255,bgC[1]*0.25+220)+','+Math.min(255,bgC[2]*0.25+220)+')';
    ctx.fillRect(cell.x,cell.y,cell.w,cell.h);

    // 냉기 줄 (무지개 색)
    for(var i=0;i<3;i++){
      var lineH=(bgH+i*0.08)%1;
      ctx.beginPath();ctx.moveTo(cell.x+2,cell.y+8+i*8);ctx.lineTo(cell.x+cell.w-2,cell.y+8+i*8);
      ctx.strokeStyle=rainbowStr(lineH,0.35);ctx.lineWidth=1;ctx.stroke();
    }

    // 내부 무지개 소용돌이 (열릴 때)
    if(cell.open>0.15){
      var swX=cell.x+cell.w/2, swY=cell.y+cell.h/2;
      var swR=Math.min(cell.w,cell.h)*0.38;
      var swA=t*(ci%2===0?2.2:-1.8);
      var cols2=[[255,0,0],[255,140,0],[255,240,0],[0,220,60],[0,140,255],[120,0,255],[255,0,180]];
      for(var ring=0;ring<5;ring++){
        var r1=swR*(ring/5),r2=swR*((ring+1.1)/5);
        for(var seg=0;seg<18;seg++){
          var a1=swA+(seg/18)*Math.PI*2+ring*0.4,a2=swA+((seg+1)/18)*Math.PI*2+ring*0.4;
          var ci2=(ring*2+seg)%cols2.length,c2=cols2[ci2];
          ctx.beginPath();
          ctx.moveTo(swX+Math.cos(a1)*r1,swY+Math.sin(a1)*r1);
          ctx.arc(swX,swY,r2,a1,a2);ctx.arc(swX,swY,r1,a2,a1,true);ctx.closePath();
          ctx.fillStyle='rgba('+c2[0]+','+c2[1]+','+c2[2]+','+cell.open*0.85+')';ctx.fill();
        }
      }
      // 소용돌이 중심 글로우
      var cgS=ctx.createRadialGradient(swX,swY,0,swX,swY,swR*0.4);
      cgS.addColorStop(0,'rgba(255,255,255,'+cell.open*0.9+')');
      cgS.addColorStop(1,'rgba(255,255,255,0)');
      ctx.beginPath();ctx.arc(swX,swY,swR*0.4,0,Math.PI*2);ctx.fillStyle=cgS;ctx.fill();
    }

    // 눈 (위 두 칸만, 열릴 때)
    if(ci<2&&cell.open>0.25){
      var eyeA=Math.max(0,(cell.open-0.25)/0.75);
      ctx.save();ctx.globalAlpha=eyeA;
      var eyeY3=cell.y+cell.h*0.35;
      var ex=cell.x+cell.w/2;
      var blink2=Math.sin(t*1.6+ci*2.1)>0.88;
      if(!blink2){
        ctx.beginPath();ctx.arc(ex,eyeY3,5.5,0,Math.PI*2);ctx.fillStyle='#fffde0';ctx.fill();
        var pd2=Math.sin(t*1.5+ci)*1;
        ctx.beginPath();ctx.arc(ex+pd2,eyeY3,3.2,0,Math.PI*2);
        var ig2=ctx.createRadialGradient(ex+pd2,eyeY3,0,ex+pd2,eyeY3,3.2);
        var eyeH=(cell.hue+t*0.1)%1;var eyeC=hue2rgb(eyeH);
        ig2.addColorStop(0,'rgb('+Math.min(255,eyeC[0]+120)+','+Math.min(255,eyeC[1]+120)+','+Math.min(255,eyeC[2]+120)+')');
        ig2.addColorStop(0.5,'rgb('+eyeC[0]+','+eyeC[1]+','+eyeC[2]+')');
        ig2.addColorStop(1,'rgb('+Math.round(eyeC[0]*0.4)+','+Math.round(eyeC[1]*0.4)+','+Math.round(eyeC[2]*0.4)+')');
        ctx.fillStyle=ig2;ctx.fill();
        ctx.beginPath();ctx.arc(ex+pd2,eyeY3,1.4,0,Math.PI*2);ctx.fillStyle='#0a0800';ctx.fill();
        ctx.beginPath();ctx.arc(ex+pd2+1.2,eyeY3-1.2,0.9,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fill();
      } else {
        ctx.beginPath();ctx.moveTo(ex-5,eyeY3);ctx.lineTo(ex+5,eyeY3);
        ctx.strokeStyle=rainbowStr((cell.hue+t*0.1)%1,0.85);ctx.lineWidth=2;ctx.lineCap='round';ctx.stroke();
      }
      ctx.restore();
    }
    ctx.restore();
  });

  // ── 무지개 손 (위 두 칸 열릴 때, 양옆으로) ──
  function drawRainbowArm(side, open, hueBase){
    if(open<=0.05) return;
    var armAlpha=Math.min(1,open*1.4);
    var armLen=open*32;
    var armY4=by-FH*0.12;
    var baseX=side>0?(fx+FW-2):(fx+2);
    var elbX=baseX+side*(armLen*0.55);
    var elbY=armY4-8*open;
    var handX=baseX+side*armLen;
    var handY=armY4+6*open;

    ctx.save();ctx.globalAlpha=armAlpha;

    // 위팔 (무지개 그라데이션)
    var upG=ctx.createLinearGradient(baseX,armY4,elbX,elbY);
    upG.addColorStop(0,rainbowStr(hueBase,1));
    upG.addColorStop(1,rainbowStr((hueBase+0.18)%1,1));
    ctx.beginPath();ctx.moveTo(baseX,armY4);ctx.lineTo(elbX,elbY);
    ctx.strokeStyle=upG;ctx.lineWidth=8;ctx.lineCap='round';ctx.stroke();

    // 팔꿈치 관절
    ctx.beginPath();ctx.arc(elbX,elbY,4.5,0,Math.PI*2);
    ctx.fillStyle=rainbowStr((hueBase+0.12)%1,1);ctx.fill();

    // 아래팔
    var loG=ctx.createLinearGradient(elbX,elbY,handX,handY);
    loG.addColorStop(0,rainbowStr((hueBase+0.18)%1,1));
    loG.addColorStop(1,rainbowStr((hueBase+0.36)%1,1));
    ctx.beginPath();ctx.moveTo(elbX,elbY);ctx.lineTo(handX,handY);
    ctx.strokeStyle=loG;ctx.lineWidth=7;ctx.lineCap='round';ctx.stroke();

    // 손 (주먹 + 손가락 3개)
    ctx.beginPath();ctx.arc(handX,handY,6,0,Math.PI*2);
    ctx.fillStyle=rainbowStr((hueBase+0.36)%1,1);ctx.fill();
    ctx.strokeStyle=rainbowStr((hueBase+0.44)%1,0.7);ctx.lineWidth=1.2;ctx.stroke();

    // 손가락 (무지개 각각)
    [[-4,-3],[0,-5],[4,-3]].forEach(function(d,fi){
      ctx.beginPath();ctx.arc(handX+d[0]*side,handY+d[1],3,0,Math.PI*2);
      ctx.fillStyle=rainbowStr((hueBase+0.36+fi*0.07)%1,1);ctx.fill();
      // 손가락 글로우
      var fG=ctx.createRadialGradient(handX+d[0]*side,handY+d[1],0,handX+d[0]*side,handY+d[1],6);
      fG.addColorStop(0,rainbowStr((hueBase+0.4+fi*0.07)%1,0.4));
      fG.addColorStop(1,'transparent');
      ctx.beginPath();ctx.arc(handX+d[0]*side,handY+d[1],6,0,Math.PI*2);ctx.fillStyle=fG;ctx.fill();
    });

    // 팔 전체 글로우
    var armGlow=ctx.createLinearGradient(baseX,armY4,handX,handY);
    armGlow.addColorStop(0,rainbowStr(hueBase,0.2));
    armGlow.addColorStop(1,rainbowStr((hueBase+0.36)%1,0.2));
    ctx.beginPath();ctx.moveTo(baseX,armY4);ctx.lineTo(elbX,elbY);ctx.lineTo(handX,handY);
    ctx.strokeStyle=armGlow;ctx.lineWidth=14;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();

    ctx.restore();
  }

  // 무지개 손 hue는 시간에 따라 천천히 이동
  var rainbowT=(t*0.14)%1;
  drawRainbowArm(-1, openTL, rainbowT);           // 왼손 (위 왼칸)
  drawRainbowArm( 1, openTR, (rainbowT+0.5)%1);  // 오른손 (위 오른칸)
  // 아래칸도 작은 손 (절반 크기)
  drawRainbowArm(-1, openBL*0.6, (rainbowT+0.25)%1);
  drawRainbowArm( 1, openBR*0.6, (rainbowT+0.75)%1);

  // ── 문 4개 (각각 무지개 빛) ──
  cells.forEach(function(cell,ci){
    var doorOpen=cell.open;
    if(doorOpen>=0.98) return; // 완전히 열리면 안 그림
    var doorH=cell.h*(1-doorOpen*0.94);
    var doorW=cell.w;
    // 문 그라데이션 (무지개 틴트)
    var dH=(cell.hue+t*0.08)%1;
    var dC=hue2rgb(dH);
    ctx.save();
    // 위 두 칸: 위로 열림 / 아래 두 칸: 아래로 열림
    var isTop=ci<2;
    var doorY=isTop?cell.y:cell.y+(cell.h-doorH);
    ctx.beginPath();rr(ctx,cell.x,doorY,doorW,doorH,3);
    var dg=ctx.createLinearGradient(cell.x,doorY,cell.x+doorW,doorY);
    dg.addColorStop(0,'rgb('+Math.min(255,dC[0]*0.1+230)+','+Math.min(255,dC[1]*0.1+230)+','+Math.min(255,dC[2]*0.1+230)+')');
    dg.addColorStop(0.5,'#ffffff');
    dg.addColorStop(1,'rgb('+Math.min(255,dC[0]*0.15+225)+','+Math.min(255,dC[1]*0.15+225)+','+Math.min(255,dC[2]*0.15+225)+')');
    ctx.fillStyle=dg;ctx.fill();
    // 무지개 테두리
    ctx.strokeStyle=rainbowStr(dH,0.65+(Math.sin(t*3+ci)*0.25));ctx.lineWidth=1.5;ctx.stroke();
    // 손잡이 (무지개)

// ══════════ SKILL SLOTS UI ══════════
function buildSkillSlots(){
  var row=document.getElementById('skill-slots');row.innerHTML='';
  for(var i=0;i<3;i++){
    var slot=document.createElement('div');
    slot.className='sk-slot empty';slot.id='skslot_'+i;
    slot.innerHTML='<div class="sk-icon" style="opacity:0.2;">+</div><div class="sk-name" style="color:rgba(255,255,255,0.15);">비어있음</div>';
    slot.onclick=(function(idx){return function(){manualSkill(idx);};})(i);
    row.appendChild(slot);
  }
}

function updateSkillSlotUI(){
  for(var i=0;i<3;i++){
    var sk=G.skills[i];
    var slot=document.getElementById('skslot_'+i);
    if(!slot)continue;
    if(!sk){slot.className='sk-slot empty';slot.innerHTML='<div class="sk-icon" style="opacity:0.2;">+</div><div class="sk-name" style="color:rgba(255,255,255,0.15);">비어있음</div>';continue;}
    var def=SKILL_DEFS[sk.id];
    var cdPct=sk.cd/sk.maxCd;
    var ready=sk.cd<=0;
    slot.className='sk-slot'+(def.evo?' evo':ready?' ready':'');
    var lvHtml=sk.lv>0?'<div class="sk-lv">Lv'+sk.lv+'</div>':'';
    var cdHtml=ready?'':(
      '<div class="sk-cd-overlay"><span>'+Math.ceil(sk.cd)+'</span></div>'
    );
    slot.innerHTML=lvHtml+
      '<div class="sk-icon">'+def.icon+'</div>'+
      '<div class="sk-name">'+def.name+'</div>'+
      cdHtml;
  }
}

function manualSkill(idx){
  if(!G||G.paused||G.phase!=='play')return;
  var sk=G.skills[idx];
  if(!sk||sk.cd>0)return;
  var def=SKILL_DEFS[sk.id];
  def.exec(G,sk.lv);
  sk.cd=sk.maxCd;
  updateSkillSlotUI();
  // 시각 피드백
  var slot=document.getElementById('skslot_'+idx);
  if(slot){slot.style.transform='scale(0.88)';setTimeout(function(){slot.style.transform='';},120);}
}

// ══════════ MAIN LOOP ══════════
var _last=0;
function loop(ts){
  var dt=Math.min((ts-_last)/1000, 0.05);
  _last=ts;
  if(!G||G.phase==='gameover')return;
  G.dt=dt;G.t+=dt;

  if(!G.paused){
    updatePlayer(dt);
    updateEnemies(dt);
    updateBullets(dt);
    updateEffects(dt);
    updateAutoAtk(dt);
    updateSkillCDs(dt);
    updateSpawn(dt);
    updateTimer(dt);
    checkLevelUp();
  }

  render();
  updateHUD();
  requestAnimationFrame(loop);
}

// ══════════ PLAYER UPDATE ══════════
function updatePlayer(dt){
  // 이동: 적 무리 쪽으로 자동 이동 (무리 중심 방향, 랜덤 회피 섞음)
  G.moveDirTimer-=dt;
  if(G.moveDirTimer<=0){
    G.moveDirTimer=0.8+Math.random()*1.2;
    // 가장 가까운 적 무리 중심 찾기
    var alive=G.enemies.filter(function(e){return e.hp>0;});
    if(alive.length>0){
      // 중심 방향 + 약간 랜덤
      var cx=0,cy=0;
      var sample=alive.slice(0,Math.min(alive.length,8));
      sample.forEach(function(e){cx+=e.wx;cy+=e.wy;});
      cx/=sample.length;cy/=sample.length;
      var dx=cx-G.x,dy=cy-G.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d>30){
        G.moveAngle=Math.atan2(dy,dx)+(Math.random()-0.5)*0.8;
      } else {
        G.moveAngle=Math.random()*Math.PI*2;
      }
    } else {
      G.moveAngle+=( Math.random()-0.5)*1.2;
    }
  }
  var spd=G.spd;
  G.x+=Math.cos(G.moveAngle)*spd*dt;
  G.y+=Math.sin(G.moveAngle)*spd*dt;
  // 월드 경계
  var BD=2000;
  G.x=Math.max(-BD,Math.min(BD,G.x));
  G.y=Math.max(-BD,Math.min(BD,G.y));
  // 카메라
  G.camX=G.x;G.camY=G.y;
  // 히트 플래시
  if(G.hitFlash>0)G.hitFlash=Math.max(0,G.hitFlash-dt*3);
  // LINKSYS 패시브 감쇠
  if(G.atkMul>1&&G.char.id!=='linksys')G.atkMul=Math.max(1,G.atkMul-dt*0.1);
  // 아이콘 애니
  if(G.iconFn){
    var dpr2=window.devicePixelRatio||1;
    var ioc=getOffscreen('_icon',20,G.iconFn,G.t);
    G.iconCtx.clearRect(0,0,40*dpr2,40*dpr2);
    G.iconCtx.drawImage(ioc,0,0,40*dpr2,40*dpr2);
  }
  // EVO 진화 레벨 반영
  var lv=evoLv(G.char.id);
  if(EVO_DRAWS[G.char.id]&&EVO_DRAWS[G.char.id][lv]!==G.iconFn){G.iconFn=EVO_DRAWS[G.char.id][lv];}
}

function evoLv(id){return 0;} // 진화는 스킬 기반

// ══════════ AUTO ATTACK ══════════
function updateAutoAtk(dt){
  var ch=G.char;
  var aa=ch.autoAtk;
  G.autoAtkTimer-=dt;
  if(G.autoAtkTimer>0)return;
  G.autoAtkTimer=aa.interval/(G.atkMul||1)*0.8;
  var dmg=Math.floor(G.atk*(aa.dmg||1.0));
  var alive=G.enemies.filter(function(e){return e.hp>0;});
  if(!alive.length)return;

  if(aa.type==='wave'){
    // 360도 신호파
    spawnRingEffect(G.x,G.y,aa.radius||100,aa.color,0.3);
    alive.forEach(function(e){
      var dx=e.wx-G.x,dy=e.wy-G.y;
      if(Math.sqrt(dx*dx+dy*dy)<=(aa.radius||100)){dealDmg(e,dmg,aa.color);}
    });
  } else if(aa.type==='chain'){
    // 체인 번개
    var first=closest(alive,G.x,G.y);
    if(!first)return;
    var chain=[first],cur=first,cc=aa.chainCount||3;
    for(var i=0;i<cc-1;i++){var nx=closestExcept(alive,cur.wx,cur.wy,chain);if(nx)chain.push(nx);else break;cur=chain[chain.length-1];}
    chain.forEach(function(e,i){
      dealDmg(e,Math.floor(dmg*(1-i*0.2)),aa.color);
      var prev=i===0?{wx:G.x,wy:G.y}:chain[i-1];
      spawnLightning(prev.wx,prev.wy,e.wx,e.wy,aa.color);
    });
  } else if(aa.type==='burst'){
    spawnBurstEffect(G.x,G.y,aa.radius||80,aa.color,0.4);
    alive.forEach(function(e){
      var dx=e.wx-G.x,dy=e.wy-G.y;
      if(Math.sqrt(dx*dx+dy*dy)<=(aa.radius||80)){dealDmg(e,dmg,aa.color);if(aa.stunDur)e.stun=(e.stun||0)+aa.stunDur*60;}
    });
  } else if(aa.type==='press'){
    // 전방 프레스 (이동 방향으로)
    var angle=G.moveAngle;
    alive.forEach(function(e){
      var dx=e.wx-G.x,dy=e.wy-G.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d>(aa.range||130))return;
      var ea=Math.atan2(dy,dx),diff=Math.abs(normalizeAngle(ea-angle));
      var hw=Math.atan2(aa.width||80,aa.range||130);
      if(diff<hw){dealDmg(e,dmg,aa.color);}
    });
    spawnPressEffect(G.x,G.y,angle,aa.range||130,aa.width||80,aa.color);
  } else if(aa.type==='snipe'){
    var farthest=null,maxD=0;
    alive.forEach(function(e){var dx=e.wx-G.x,dy=e.wy-G.y,d=Math.sqrt(dx*dx+dy*dy);if(d>maxD){maxD=d;farthest=e;}});
    if(!farthest)return;
    var crit=aa.critChance&&Math.random()<aa.critChance;
    var sdmg=crit?Math.floor(dmg*2):dmg;
    dealDmg(farthest,sdmg,aa.color);
    if(crit)spawnDmgNum(farthest.wx,farthest.wy,'#f43f5e',sdmg,true);
    spawnBeam(G.x,G.y,farthest.wx,farthest.wy,aa.color);
  } else if(aa.type==='spin'){
    spawnSpinEffect(G.x,G.y,aa.radius||90,aa.color);
    alive.forEach(function(e){
      var dx=e.wx-G.x,dy=e.wy-G.y;
      if(Math.sqrt(dx*dx+dy*dy)<=(aa.radius||90)){dealDmg(e,Math.floor(dmg*0.8),aa.color);e.wx+=dx*0.3;e.wy+=dy*0.3;}
    });
  }
}

// ══════════ SKILL IMPLEMENTATIONS ══════════
function spawnWaveSkill(g,lv){
  var r=130+lv*25,dmg=Math.floor(g.atk*(1.2+lv*0.3)*g.atkMul);
  spawnRingEffect(g.x,g.y,r,'#00e5ff',0.5);
  g.enemies.forEach(function(e){if(e.hp<=0)return;var dx=e.wx-g.x,dy=e.wy-g.y;if(Math.sqrt(dx*dx+dy*dy)<=r)dealDmg(e,dmg,'#00e5ff');});
  addEffectParticles(g.x,g.y,24,'#00e5ff');
}
function spawnWaveEvoSkill(g,lv){
  [80,130,180].forEach(function(r,i){
    setTimeout(function(){
      if(!g.enemies)return;
      var dmg=Math.floor(g.atk*1.8*g.atkMul);
      spawnRingEffect(g.x,g.y,r,'#00e5ff',0.7);
      g.enemies.forEach(function(e){if(e.hp<=0)return;var dx=e.wx-g.x,dy=e.wy-g.y;if(Math.sqrt(dx*dx+dy*dy)<=r)dealDmg(e,dmg,'#00e5ff');});
    },i*150);
  });
}
function spawnChainSkill(g,lv){
  var alive=g.enemies.filter(function(e){return e.hp>0;});
  var first=closest(alive,g.x,g.y);if(!first)return;
  var chain=[first],cur=first,cc=4+lv;
  for(var i=0;i<cc-1;i++){var nx=closestExcept(alive,cur.wx,cur.wy,chain);if(nx)chain.push(nx);else break;cur=chain[chain.length-1];}
  var dmg=Math.floor(g.atk*(1.5+lv*0.4)*g.atkMul);
  chain.forEach(function(e,i){
    dealDmg(e,Math.floor(dmg*(1-i*0.12)),'#fbbf24');
    var prev=i===0?{wx:g.x,wy:g.y}:chain[i-1];
    spawnLightning(prev.wx,prev.wy,e.wx,e.wy,'#fbbf24');
  });
}
