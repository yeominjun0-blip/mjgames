<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MJ ARCADE — Game Portfolio</title>
<style>
@font-face{
  font-family:'Galmuri11';
  src:url('https://cdn.jsdelivr.net/npm/galmuri@latest/dist/Galmuri11.woff2') format('woff2');
  font-display:swap;
}
@font-face{
  font-family:'Galmuri9';
  src:url('https://cdn.jsdelivr.net/npm/galmuri@latest/dist/Galmuri9.woff2') format('woff2');
  font-display:swap;
}
:root{
  --bg:#0e0a1f;
  --panel:#1a1433;
  --panel2:#221a44;
  --line:#352a63;
  --ink:#efeaff;
  --dim:#9b8fd0;
  --amber:#ffb347;
  --magenta:#ff4f9a;
  --cyan:#4fe3ff;
  --act:#ff4f6d;
  --str:#4fe3ff;
  --inc:#ffb347;
  --col:#c77dff;
  --cas:#7dff8f;
  --toy:#ff9de2;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg);color:var(--ink);font-family:'Galmuri11','Galmuri9',Pretendard,'Apple SD Gothic Neo',sans-serif;-webkit-font-smoothing:none}
body{min-height:100vh;overflow-x:hidden}

/* ── 배경 그리드 ───────────────────── */
.bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(79,227,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(79,227,255,.04) 1px,transparent 1px);
  background-size:36px 36px;
  mask-image:radial-gradient(ellipse 90% 70% at 50% 0%,#000 30%,transparent 100%);
}

/* ── 마키 헤더 ───────────────────── */
header{position:relative;z-index:1;text-align:center;padding:54px 16px 26px}
.marquee-frame{display:inline-block;border:3px solid var(--line);border-radius:14px;padding:26px 38px 22px;position:relative;background:linear-gradient(180deg,#1c1540,#130e2b);box-shadow:0 0 0 3px #0a0718,0 14px 50px rgba(0,0,0,.55)}
.bulbs{position:absolute;inset:-8px;border-radius:18px;pointer-events:none}
.bulb{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--amber);box-shadow:0 0 8px var(--amber)}
.bulb:nth-child(3n+1){background:var(--magenta);box-shadow:0 0 8px var(--magenta)}
.bulb:nth-child(3n+2){background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.bulb{animation:blink 1.6s infinite}
.logo{font-family:'Press Start 2P','Galmuri11',monospace;font-size:clamp(26px,6vw,52px);letter-spacing:2px;line-height:1.1;
  background:linear-gradient(90deg,var(--amber),var(--magenta) 50%,var(--cyan));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 18px rgba(255,79,154,.35));}
.logo small{display:block;font-size:clamp(10px,1.8vw,14px);color:var(--dim);-webkit-text-fill-color:var(--dim);margin-top:12px;letter-spacing:6px}
.tagline{margin-top:18px;color:var(--dim);font-size:14px;line-height:1.7}
.tagline b{color:var(--ink)}
.stats{display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap}
.stat{border:2px solid var(--line);border-radius:8px;padding:7px 14px;font-size:12px;color:var(--dim);background:var(--panel)}
.stat b{color:var(--amber);font-size:14px;margin-right:4px}

/* ── 컨트롤 ───────────────────── */
.controls{position:sticky;top:0;z-index:5;background:rgba(14,10,31,.92);backdrop-filter:blur(8px);border-bottom:2px solid var(--line);padding:12px 16px}
.controls-inner{max-width:1180px;margin:0 auto;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.search{flex:1;min-width:180px;display:flex;align-items:center;gap:8px;border:2px solid var(--line);border-radius:8px;background:var(--panel);padding:8px 12px}
.search input{flex:1;background:none;border:none;outline:none;color:var(--ink);font-family:inherit;font-size:14px}
.search input::placeholder{color:var(--dim)}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{border:2px solid var(--line);background:var(--panel);color:var(--dim);border-radius:8px;padding:7px 12px;font-size:12px;font-family:inherit;cursor:pointer;transition:.15s}
.chip:hover{color:var(--ink);border-color:var(--dim)}
.chip.on{color:#0e0a1f;background:var(--amber);border-color:var(--amber);font-weight:700}
.chip:focus-visible,.card:focus-visible,button:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}

/* ── 카드 그리드 ───────────────────── */
main{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:26px 16px 80px}
.count{color:var(--dim);font-size:12px;margin-bottom:14px;letter-spacing:1px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:14px}
.card{position:relative;border:2px solid var(--line);border-radius:10px;background:linear-gradient(180deg,var(--panel2),var(--panel));text-align:left;cursor:pointer;font-family:inherit;color:var(--ink);overflow:hidden;transition:transform .15s,border-color .15s,box-shadow .15s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-4px);border-color:var(--c);box-shadow:0 10px 28px rgba(0,0,0,.5),0 0 18px color-mix(in srgb,var(--c) 30%,transparent)}
.strip{height:7px;background:repeating-linear-gradient(45deg,var(--c) 0 10px,color-mix(in srgb,var(--c) 55%,#000) 10px 20px)}
.card-body{padding:14px 14px 12px;display:flex;flex-direction:column;gap:8px;flex:1}
.cat-label{font-size:10px;letter-spacing:2px;color:var(--c);font-weight:700}
.title{font-size:16px;font-weight:700;line-height:1.3}
.desc{font-size:12px;color:var(--dim);line-height:1.6;flex:1}
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:10px;color:var(--dim);border:1px solid var(--line);border-radius:4px;padding:2px 6px}
.play{font-size:11px;color:var(--c);font-weight:700;letter-spacing:1px;white-space:nowrap}
.empty{color:var(--dim);text-align:center;padding:60px 0;font-size:14px}

/* ── 대기 슬롯 ───────────────────── */
.pending-h{font-size:13px;letter-spacing:2px;color:var(--dim);margin:44px 0 14px;font-weight:400}
.pending-h span{font-size:11px;letter-spacing:1px}
.slot{border:2px dashed var(--line);border-radius:10px;background:rgba(26,20,51,.45);padding:0;display:flex;flex-direction:column;opacity:.75}
.slot .strip{height:7px;background:repeating-linear-gradient(45deg,var(--line) 0 10px,transparent 10px 20px)}
.slot .title{color:var(--dim)}
.badge{font-size:10px;letter-spacing:1px;border:1px solid var(--line);border-radius:4px;padding:2px 7px;color:var(--dim);white-space:nowrap}
.badge.dev{color:var(--amber);border-color:var(--amber)}

/* ── 테스트장 (플레이어) ───────────────────── */
.player{position:fixed;inset:0;z-index:50;background:#070512;display:none;flex-direction:column}
.player.open{display:flex}
.player-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:linear-gradient(180deg,#1c1540,#120d2a);border-bottom:3px solid var(--line);flex-wrap:wrap}
.now{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.led{width:10px;height:10px;border-radius:50%;background:var(--cas);box-shadow:0 0 10px var(--cas);animation:blink 1.2s infinite;flex-shrink:0}
.now-title{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.now-cat{font-size:10px;letter-spacing:2px;color:var(--dim);white-space:nowrap}
.pbtn{border:2px solid var(--line);background:var(--panel);color:var(--ink);font-family:inherit;font-size:12px;border-radius:8px;padding:8px 13px;cursor:pointer;white-space:nowrap}
.pbtn:hover{border-color:var(--cyan);color:var(--cyan)}
.pbtn.close:hover{border-color:var(--act);color:var(--act)}
.screen{flex:1;position:relative;background:#000}
.screen iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#000}
.scanlines{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.08) 0 1px,transparent 1px 3px);mix-blend-mode:multiply}

footer{position:relative;z-index:1;text-align:center;color:var(--dim);font-size:11px;padding:0 16px 50px;line-height:2}
footer b{color:var(--amber)}

@media (max-width:520px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
  .marquee-frame{padding:20px 18px 16px}
  .scanlines{display:none}
}
@media (prefers-reduced-motion:reduce){
  .bulb,.led{animation:none}
  .card,.card:hover{transition:none;transform:none}
}
</style>

<body>
<div class="bg-grid"></div>

<header>
  <div class="marquee-frame">
    <div class="bulbs" id="bulbs"></div>
    <h1 class="logo">MJ ARCADE<small>BROWSER GAME PORTFOLIO</small></h1>
  </div>
  <p class="tagline">전부 <b>단일 HTML 파일</b>로 직접 설계하고 디버깅한 브라우저 게임들.<br>카드를 누르면 <b>테스트장</b>에서 바로 플레이할 수 있어요.</p>

<div class="controls">

<footer>
  MJ ARCADE · 모든 게임은 HTML/CSS/JS 단일 파일로 제작 · AI 협업 기반 반복 개발<br>

<!-- 테스트장 -->
<div class="player" id="player" role="dialog" aria-modal="true" aria-label="게임 플레이어">

/* ───────── 대기 슬롯 ─────────
   파일 받으면: games/에 넣고 → GAMES 배열로 옮기면 끝. 비우면 섹션 자동 숨김 */
const PENDING = [
 {t:'컵라면 티어 차트',     c:'toy', d:'팝아트 스타일 아이소메트릭 컵라면 티어표. 온도계 게이지 레이아웃.', s:'파일 대기'},
 {t:'SURVIVAL',          c:'act', d:'서바이벌 v2.', s:'파일 대기'},
 {t:'CHAOS THRONE',      c:'str', d:'카오스 스론.', s:'파일 대기'},
 {t:'KOREA FIELD OPS',   c:'str', d:'코리아 필드 옵스.', s:'파일 대기'},
 {t:'BEAT GAME',         c:'cas', d:'비트 게임.', s:'파일 대기'},
 {t:'드레펄스 DREPULSE',   c:'act', d:'현재 설계 진행 중인 신작.', s:'개발 중'},
];

/* ───────── 렌더 ───────── */
const grid=document.getElementById('grid');
const chipsEl=document.getElementById('chips');
const q=document.getElementById('q');
let cat='all', query='';

/* 마키 전구 */
(()=>{const box=document.getElementById('bulbs');
for(let i=0;i<14;i++){const b=document.createElement('span');b.className='bulb';
  b.style.left=(3+i*7)+'%';b.style.top='-4px';b.style.animationDelay=(i*0.12)+'s';box.append(b);}
for(let i=0;i<14;i++){const b=document.createElement('span');b.className='bulb';
  b.style.left=(3+i*7)+'%';b.style.bottom='-4px';b.style.animationDelay=(i*0.12+0.6)+'s';box.append(b);}})();

document.getElementById('stat-total').textContent=GAMES.length;
document.getElementById('stat-cat').textContent=Object.keys(CATS).length;

function chip(key,label){
  const b=document.createElement('button');
  b.className='chip'+(key===cat?' on':'');
  b.textContent=label; b.dataset.key=key; b.setAttribute('role','tab');
  b.onclick=()=>{cat=key;render();
    chipsEl.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.dataset.key===key));};
  return b;
}
chipsEl.append(chip('all','전체'));
for(const[k,v]of Object.entries(CATS)) chipsEl.append(chip(k,v.name));

q.addEventListener('input',()=>{query=q.value.trim().toLowerCase();render();});

function render(){
  grid.innerHTML='';
  const list=GAMES.filter(g=>
    (cat==='all'||g.c===cat)&&
    (!query||(g.t+g.d+g.g.join('')+CATS[g.c].name).toLowerCase().includes(query)));
  document.getElementById('count').textContent=`▸ ${list.length} GAMES READY`;
  document.getElementById('empty').hidden=list.length>0;
  for(const g of list){
    const c=CATS[g.c];
    const el=document.createElement('button');
    el.className='card'; el.style.setProperty('--c',c.color);
    el.innerHTML=`<div class="strip"></div>
      <div class="card-body">
        <div class="cat-label">${c.name}</div>
        <div class="title">${g.t}</div>
        <div class="desc">${g.d}</div>
        <div class="card-foot">
          <div class="tags">${g.g.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
          <span class="play">▶ PLAY</span>
        </div>
      </div>`;
    el.onclick=()=>openGame(g);
    grid.append(el);
  }
}

/* ───────── 테스트장 ───────── */
const player=document.getElementById('player');
const frame=document.getElementById('frame');
let current=null;

function openGame(g){
  current=g;
  document.getElementById('now-title').textContent=g.t;
  document.getElementById('now-cat').textContent=CATS[g.c].name.toUpperCase()+' · TEST CHAMBER';
  frame.src='games/'+g.f;
  player.classList.add('open');
  document.body.style.overflow='hidden';
  document.getElementById('btn-close').focus();
}
function closeGame(){
  player.classList.remove('open');
  frame.src='about:blank'; /* 사운드/루프 정지 */
  document.body.style.overflow='';
  current=null;
}
document.getElementById('btn-close').onclick=closeGame;
document.getElementById('btn-restart').onclick=()=>{if(current)frame.src='games/'+current.f;};
document.getElementById('btn-newtab').onclick=()=>{if(current)window.open('games/'+current.f,'_blank');};
window.addEventListener('keydown',e=>{if(e.key==='Escape'&&player.classList.contains('open'))closeGame();});

render();

/* 대기 슬롯 렌더 */
(()=>{
  if(!PENDING.length) return;
  const sec=document.getElementById('pending-sec');
  const pg=document.getElementById('pending-grid');
  sec.hidden=false;
  for(const p of PENDING){
    const c=CATS[p.c];
    const el=document.createElement('div');
    el.className='slot'; el.style.setProperty('--c',c.color);
    el.innerHTML=`<div class="strip"></div>
      <div class="card-body">
        <div class="cat-label" style="color:var(--dim)">${c.name}</div>
        <div class="title">${p.t}</div>
        <div class="desc">${p.d}</div>
        <div class="card-foot">
          <span class="badge${p.s==='개발 중'?' dev':''}">${p.s==='개발 중'?'⚙ IN DEV':'⬚ AWAITING FILE'}</span>
        </div>
      </div>`;
    pg.append(el);
  }
})();
</script>
